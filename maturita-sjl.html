tu a podpíše falošným menom. Kontrarozviedka príde hľadať tajomného muža Washingtona Irvinga.\nPo návrate z nemocnice zistí že počet náletov zvýšili na 50, a simulovanie mu nebude pomáhať večne. Myslí na to, že sa mu vojna stane osudnou, jeho a panické kľučkovanie medzi proti lietadlovou paľbou, mu paradoxne vynesie nečakané zásluhy, má si prevziať letecký kríž, avšak na slávnosť prichádza nahý. Blíži sa útok na Bolognu, Yossarian si nedokáže pomôcť (bojí sa, lebo vie že je tam najsilnejšia protiletecká obrana) a tak posunie hranicu bombardovania. Aj keď padlo mesto do rúk spojencov, nebezpečenstvo stále trvá, preto podá celej jednotke preháňadlo, aby sa útok znova doložil. Pri nálete je zranený, keď sa vráti do útvaru, postupne tu zomierajú jemu nesympatický ľudia, ale i jeho priatelia. Raz, keď bol na pláži so sestrou Ducketovou, jeho pilot sa predvádzal na pláži. Nezbadal mávajúceho Simpsona a preťal ho vrtuľou napoly. McWatt po tejto udalosti spácha samovraždu. Doktor Daneeka, chorobne sa obávajúci o svoje zdravie  na to doplatí najhoršie, lebo mal letieť spolu s McWatom. Smrti neunikol aj keď z neho administratíva urobila živého ducha. Zomrie aj Yossarianov najlepší priateľ Nately, počas bitky v ktorej mala letka veľké straty. Počas dovolenky ide do Ríma a podujme sa oznámiť Natelyho smrť jeho talianskej priateľke, hoci s ním mala povrchný vzťah tvári sa že ju správa hlboko zasiahla. Pokúsi sa zabiť Yossariana.\nPo zvýšení počtu náletov na 80 odmieta chodiť na nálety. Cez deň sa s ním nikto nerozpráva, no v noci ho navštevujú vojaci a pýtajú sa, či nedostal za odmietanie náletov nejaký trest. Plukovník Cathart a podplukovník Korn pristúpia konečne na to, že dovolia Yossarianovi odísť s frontu pod podmienkou, že bude vychvaľovať a neprezradí nič o podmienkach v tábore.\nYossarian sa opäť dostáva do  Ríma a prechádza mestom, plného stratených existencií. V dôstojníckom byte zistí, že Aarfy znásilnil a potom vyhodil z okna nepríťažlivé mladé dievča, paradoxne zatknú Yossariana pretože nemá priepustku. Po informácii, že Orr žije a emigroval do Švédska, sa rozhodne konať sám, na vlastnú päsť(emigrovať do Švédska). \n\nPostavy\n\nAutor zobrazoval postavy veľmi reálne, opisoval kladné ale i záporné vlastnosti postáv. Rôzne, pomaly až čudné vlastnosti niektorých postáv dokonale dokresľujú satiru, tragickosť diela, a pomáhajú poukazovať na absurditu vojny.\n\nYOSSARIAN\n– hlavná postava, je tragikomický(trochu klaun a trochu blázon).\nCATHART\n –plukovník zúfalo túžiaci sa stať generálom, snaží sa na seba upozorniť rôznymi administratívnymi trikmi – zvyšuje počet náletov.\n„Plukovníkom smrť Kida Simpsona tak otriasla. Že zvýšil počet náletov na 65, potom ako prišiel o život doktor Daneeka v McWatovom lietadle zvýšil počet náletov na 70.“\nMAJOR MAJOR MAJOR\n – poznamenaný svojím menom ktorí mu dal otec bez vedomia matky, na vojne dostal hodnosť major. Postupom času sa utiahol do svojho stanu kde si nechal nosiť jedlo. A do svojho veliteľského stanu chodil vykopanými zákopmi v tábore, v tomto stane prestal prijímať návštevy a prijímal ich len vtedy keď tam nebol. Jeho život bolo 31 chmúrnych rokov osamelosti a sklamania.\nMcWatt\nYossarianov pilot, bol asi najväčším bláznom celej letky, bol normálny a predsa sa mu vojna nezhnusila. Veľmi rád sa predvádzal nízkym letom na pláži a strašil tak ostatných vojakov. Raz nešťastnou náhodou zachytil vrtuľou Kida Simpsona a po pár sekundách letu rozbil svoje lietadlo o útes.\nDaneeka\nbol doktorom, trápilo ho že kvôli vojne nemôže zarábať vo svojej súkromnej ambulancii, na nálety nechodil a tak sa stalo že ho vyhlásili za mŕtveho.\nMILO MINDERBINDER\nproviantný dôstojník trochu cvok a trochu génius , nemal morálku no bol vynikajúcim obchodníkom na čiernom trhu. Zo 70  náletov si odlietal len 4 vrátane bombardovania vlastnej letky. \nDUNBAR\nYossarianov priateľ, často ležali spolu v nemocnici. Vynikajúco si rozumeli a spoločne privádzali lekárov i nadriadených do šialenstva. \nORR\nYossarianov spolubývajúci, ktorý bol veľmi zručný. V ústach nosil plánky, lebo boli lepšie ako divé gaštany, ktoré v ústach skutočne nosil, aby mal líca ako jabĺčka. V rukách nosil gumové loptičky, ktoré vznikol stláčať, aby mohol bez výčitiek každému povedať, že v ústach nosí plánky. Skoro počas každého náletu skončil vo vode, celú dobu sa hral na „blbečka“ no pritom poctivo trénoval svoj útek a prežitie.\nNATELY\nsyn z dobrej rodiny, beznádejne sa zamiluje do dievčaťa ľahších mravov. Kvôli láske nechce ísť domov a chodí na ďalšie nálety, kde aj zomiera.\nWASHINGTON IRVING\npseudonym ktorý používa pri cenzurovaní Yosssarian a neskôr aj Major Major. Nakoniec z toho bol obvinený kaplán Tappman.\nTAPPMAN\nkaplán pluku, anabaptista, nikto ho nemá rád, priateľov nachádza až v Yossarianovi a Dunbarovi. Desiatnik Whitcombh o udá že je Washington Irving, vyšetrujú ho a až správa o Yossarianovom úteku mu dodá chuť znovu veriť.\n\nKonflikt\n\nMá hlavná postava s byrokraciou veliteľstva a s niektorými postavami.\n\nPostavenie autora v diele\n\nAutor je rozprávačom – 3 os. singuláru.\n \nKompozícia\n\nDielo má 42 kapitol, z ktorých je väčšina nazvaná podľa postáv, všetky kapitola sú označené číslom.","number":29},"30":{"tema_jazyk":"Náučný štýl, formy logického myslenia","tema_lit":"Fantastická a vedecko-fantastická literatúra","autori":["Milan Rúfus","Antoine de Saint-Exupéry","J. K. Rowlingová"],"diela":["Báseň a modlitba","Malý princ","Harry Potter"],"okruh_jazyk":"Sloh - náučný štýl","okruh_lit":"Súčasná literatúra, fantastika","full":"Zadanie č. 30\n\nÚloha č. 1\n\nCharakterizujte náučný štýl a porovnajte s výrazovými prostriedkami ostatných štýlov. Vysvetlite, aké formy logického myslenia použijeme vo výkladovom slohovom postupe.\n\nVysvetlite fázy učenia sa pri vypracovaní projektu na ľubovoľnú tému: príprava, realizácia, prezentácia; dedukcia, indukcia, komparácia, analýza, syntéza, analógia\n\nVyberte z ukážky Malý princ jednu myšlienku a demonštrujte na nej rozdiel medzi presnou citáciou, voľnou citáciou a parafrázou.\n\nÚloha č. 2\n\nVysvetlite vzťah literatúry a umenia, rozdiel medzi poéziou a prózou. Zaraďte fantastickú a vedecko-fantastickú literatúru do systému literatúry a porovnajte s iným literárnym žánrom.\n\nRozoberte estetickú a poznávaciu funkciu vašej obľúbenej knihy alebo uvedenej ukážky.\n\nUkážky: M. Rúfus - Báseň a modlitba\n\n- de Saint Exupéry – Malý princ\n\nJ. Rowlingová – Harry Potter\n\nMilan Rúfus: Báseň a modlitba\n\nČo sa ty v básni dozvedáš:\n\nKeď plače oblak, to je dážď.\n\nKeď nebo plače, je to rosa.\n\nKeď plače lúka, je v tom kosa.\n\nKeď plače strom, je priskyrica.\n\nKeď ty plačeš – dve tvoje líca\n\nsa rozprávajú o duši.\n\nModlitbička to osuší.\n\nA ako Božie slniečko\n\nzatlačí slzu pod viečko.\n\nBáseň a modlitba sú sestry.\n\nPozvi ich k sebe, stôl im prestri.\n\nAntoine de Saint Exupéry: Malý princ (úryvok)\n\nTak som žil samotársky a nemal som nikoho, s kým by som si vážne pohovoril, až do tých čias, kým ma pred šiestimi rokmi nepostihla na saharskej púšti porucha motora. Čosi sa v ňom polámalo. A pretože som nemal so sebou ani mechanika , ani cestujúcich, chystal som sa, že sa tú neľahkú opravu pokúsim urobiť sám. Bola to pre mňa otázka života a smrti.\n\nPrvý večer som teda zaspal na piesku, tisíc míľ od akéhokoľvek obývaného kraja. Bol som oveľa opustenejší ako stroskotanec na plti uprostred oceána.\n\n- - - - - - - -\n\n- Zbohom, - povedala líška. – Tu je moje tajomstvo. Je veľmi jednoduché: Dobre vidíme iba srdcom. To hlavné je očiam neviditeľné.\n\n- To hlavné je očiam neviditeľné, - opakoval Malý princ, aby si to zapamätal.\n\n- Čas, ktorý si strácal pre svoju ružu, robí tvoju ružu takou dôležitou.\n\n- Čas, ktorý som strácal pre svoju ružu... – opakoval Malý princ, aby si to zapamätal.\n\n- Ľudia zabudli na túto pravdu, -povedala líška. – Ale ty na ňu nesmieš zabudnúť.\n\n Ty budeš navždy zodpovedný za všetko, čo si skrotíš. Si zodpovedný za svoju ružu...\n\n- Som zodpovedný za svoju ružu... opakoval Malý princ, aby si to zapamätal.\n\nJ. Rowlingová: Harry Potter\n\n,,Čo sa deje? Čo sa stalo?“ Argus Filch zrejme začul Malfoyov krik a predieral sa davom. Keď zbadal pani Norrisovú, ustúpil a zhrozený si zakryl tvár dlaňami.\n\n,,Moja mačka! Čo sa stalo pani Norrisovej?“ škriekal. A jeho vypúlené oči spočinuli na Harrym.\n\n,,Ty!“ zvrieskol. ,,TY! Ty si ju skántril! Ja ťa...“\n\n,,Argus!“\n\nNa miesto činu sa dostal Albus Dumbledore spolu s ďalšími učiteľmi. Prešiel sa popri Harrym, Ronovi a Hermione a zvesil pani Norrisovú zo stojana na fakle.\n\nÚloha č. 1\n\nCharakterizujte náučný štýl a porovnajte s výrazovými prostriedkami ostatných štýlov. Vysvetlite, aké formy logického myslenia použijeme vo výkladovom slohovom postupe.\n\nPatrí medzi objektívne štýly verejnej komunikácie. Rozdeľuje sa na teoretický a populárno - náučný štýl.\n\nVedecko - náučný štýl\n1.  Využíva termíny a knižné slová\n2.  Má prísne logickú kompozíciu ( presná štruktúra )\n3.  Náročná stereotypná štylizácia z hľadiska morfológie a syntaxu\n4.  Presná vedecká argumentácia, citácia, parafrázovanie, bibliografia\n5.  Neutrálnosť, nezaujatosť výkladu (zákony, leták z liekov)\n\nPopulárno – náučný štýl\n1.  Voľnejší výber slov\n2.  Voľnejšia kompozícia, členenie textu na odseky\n3.  Pestrejšia, pôsobivejšia štylizácia, beletristické a rečnícke prvky\n4.  Voľná citácia alebo parafrázovanie, bez bibliografie\n5.  Silná didaktická a presviedčacia zložka (časopis Zdravie)\n\nZákladné vlastnosti náučného štýlu:\n1.  PÍSOMNOSŤ: väčšina textov má písanú podobu. Veta môže byť komplikovaná, pretože príjemca sa k textu môže niekoľkokrát vrátiť. Prevládajú dlhšie vety a súvetia, aj zložené. Okrem názvov ( napr. kapitol )absentuje jednočlenná veta. Využíva sa polovetné konštrukcie, hlavne s príčastiami, neobracia sa na adresáta\n2.  MONOLOGOCKOSŤ: využíva len spisovnú podobu jazyka, úvodzovky znamenajú citáciu\n3.  VEREJNOSŤ: používa vyjadrovacie prostriedky zrozumiteľne verejnosti, texty sú určené širokej verejnosti.\n4.  POJMOVOSŤ: odborný text pracuje s pojmami, termínmi, nachádzajú sa tu aj nocionálne – pojmové slová (...po jeho smrti – nie po jeho skone, alebo usnutí atď.)\n5.  ODBORNOSŤ a PRESNOSŤ: údaje musia byť presné, jasne formulované, odbornosť sa dodržiava pomocou lexiky, využíva sa terminológia vedných odborov\n\nJazykové prostriedky: \nVyužíva zložité vetné, súvetné a polovetné konštrukcie (napr. s činným a trpným príčastím), enumeráciu (napr. vymenúvanie autorov, ich diel, udalostí...), termíny a internacionalizmy.\n \nLexika náučného štýlu: \n1.  Nocionálne slová (štylisticky bezpríznakové) napr. pes\n2.  Termíny – jednoznačné, jednovýznamové ustálené pomenovania\na, domáce: jednoslovné, viacslovné alebo zložené (napr. drevoryt)\nb, cudzie\nc, hybridné (neologický)\nd, kalky (geografia)\n3.  Knižné slová\n4.  Značky, skratky, skratkové slová (TANAP)\n5.  Multiverbizácia (namiesto minerálka povieme minerálna voda)\n\nVybraté útvary\n\nŠtúdiá, dizertácia (rozprava) – vedecký opis sú útvary, ktoré prinášajú výsledky vedeckej činnosti. Dizertácia sa delí na kompendium ( Dejiny Slovenska – celá vedecká disciplína) a monografiu (napr.  Slovensko v dobách Veľkej Moravy – časť vedeckej disciplíny).\n\nMonografia je spravidla vedecké dielo, publikácia alebo aj časť publikácie, kde je komplexne spracovaná jediná téma, spravidla úzko špecializovaná či vymedzená. Vznikla na základe skúmania daného problému.\n\nKompozícia a obsah SOČ\n1. titulný obal, titulný list\n2. obsah\n3. Úvod: stručný úvod do problematiky, dôvod, prečo sa autor pre tému rozhodol, cieľ práce, metódy, ktoré zvolil, môže spomenúť ťažkosti, ktoré mu stále v ceste pri práci s literatúrou alebo pri overovaní v praxi atď.\n3. Jadro: v kapitolách označených číslom a názvom analyzuje, porovnáva, prináša dôkazy, príklady, cituje z odbornej literatúry atď.\n4. Záver: Stručné zhodnotenie splnenia cieľov, prínos práce a jej možné použitia v škole\n5. Resumé: (v slovenskej a cudzej reči) stručné zhrnutie obsahu po kapitolách, aby dostal základnú informáciu aj človek, ktorý nebude čítať celú prácu, ale prípadne hľadá pramene na spracovanie podobnej témy.\n6. Bibliografický zápis: zoznam použitej literatúry, ktorá poslúžila na štúdium, argumentovanie, citáciu atď.\n7. Prílohy\n\nPOSTUPY LOGICKÉHO MYSLENIA (VYKLADOVY SLOHOVY POSTUP)\n\nindukcia – vychádza z jednotlivých faktov na základe ktorých sa formuje všeobecný záver\n\ndedukcia – opak indukcie, vychádza z všeobecného javu / faktu, snaží sa zistiť jednotlivé fakty ktoré k nemu viedli (vyšetrovanie)\n\nanalýza – rozbor\n\nsyntéza – zhrnutie\n\nanalógia – pripodobňovanie, obdoba, zhoda... 1 fakt poznáme úplne a druhý čiastočne\n\nkomparácia – porovnávanie... oba fakty poznáme úplne\n\nargumentácia – vysvetľovanie na základe konkrétnych faktov, zdôvodňovanie\n\ndemagógia – nevedecká argumentácia\n\nVysvetlite fázy učenia sa pri vypracovaní projektu na ľubovoľnú tému: príprava, realizácia, prezentácia; dedukcia, indukcia, komparácia, analýza, syntéza, analógia\n\nPríprava: zhromažďovanie všetkých potrebných materiálov, ktoré v projekte budeme potrebovať (obrázky, informácie, príklady, hmotné pomôcky...)\n\nRealizácia: uskutočnenie projektu do reálnej podoby, (prezentácie,výkresy,...atď)\n\nPrezentácia: prezentovanie, daného projektu pred, verejnosťou alebo pred daným špecifickým publikom podľa typu projektu.\n\nDedukcia: odvodzovanie jasných skutočností, ktoré vyplývajú z projektu, vysvetliť postup ako sme k daným informáciami dospeli.\n\nIndukcia: Myšlienkový postup danej problematiky\n\nKomparácia: Porovnávanie rozličných podobných alebo totožných tematicky cielených projektov ktoré možno porovnať.\n\nAnalýza: Rozbor, prácu alebo projekt detailne preskúmať a bližšie špecifikovať jednotlivé časti projektu.\n\nSyntéza: Zlučovanie časti projektu do zložiek určeného celku ( mapa mysle)\n\nAnalógia: Vyhladávame podobnosť\n\nVyberte z ukážky Malý princ jednu myšlienku a demonštrujte na nej rozdiel medzi presnou citáciou, voľnou citáciou a parafrázou.\n\nVoľná citácia – využíva sa v rečníckych a publicistických textoch, pri ktorých sa neuvádza autor či dielo, z ktorých citovaný text pochádza.\n\nParafráza – voľné prerozprávanie, spracovanie cudzej predlohy. Nevyskytuje sa v odbornej literatúre.\n\n ...pretože je jasné že Čas, ktorý strácame pre našu ružu, robí našu ružu takou dôležitou.\n\nDoslovná citácia – doslovne uvedený cudzí  výrok, s bibliografickým záznamom. Graficky sa odlišuje od ostatného textu\n\n „Čas, ktorý si strácal pre svoju ružu, robí tvoju ružu takou dôležitou.“\n\n A. de Saint.Exupery- Malý princ\n\nÚloha č. 2\n\nVysvetlite vzťah literatúry a umenia, rozdiel medzi poéziou a prózou. Zaraďte fantastickú a vedecko-fantastickú literatúru do systému literatúry a porovnajte s iným literárnym žánrom.\n\nRozoberte estetickú a poznávaciu funkciu vašej obľúbenej knihy alebo uvedenej ukážky.\n\nVzťah literatúry a umenia:\n\nUmenie- typický ľudský duchovný produkt, v ktorom sa prejavuje estetický vzťah človeka k skutočnosti.\n\nUmelecká tvorba: práca alebo činnosť, ktorú autor vytvára s určitým umeleckým úmyslom, cítením, fantáziou. Mala by mať umeleckú i kultúrnu hodnotu.\n\nFunkcie umenia: umelecko- estetická, kognitívna, hodnotiaca, pretvárajúca, náučná a zábavná.\n\nLiteratúra ako umenie: je jedným z druhov umenia, jej stavebným materiálom je jazyk, preto hovoríme o slovesnom umení. Literatúra môže pomocou slova zachytiť takmer všetky javy, skutočnosti. Predmetom poznania literatúry je skutočnosť a predmetom zobrazenia je človek, alebo subjekt v jeho zložitých vzťahoch ku skutočnosti.\n\nChápanie literatúry: širšie chápanie: vedecká, politická, právnická.. = vecná literatúra (vedecká)\n\n Krásna literatúra, beletria, esteticko- umeleckú funkciu\n\nRozdiely medzi vedeckou a umeleckou literatúrou:\n\nVedecká poskytuje informácie odpovedajúce realite. Umelecká vychádza z reality no prvoradú funkciu zohráva fantázia tvorcu, dôležité je estetické kritérium.\n\nVedecko- fantastická literatúra ( Sci- Fi/ Fantasy)\n\n-zahŕňa diela, ktoré čerpajú námet z poznatkov vedy a techniky, stvárňuje udalosti, ktoré ešte nenastali, ale v budúcnosti sa môžu stať\n\n-psychika postáv sa osobitne nevykresľuje, pretože sú predstaviteľmi určitého spoločenstva, obyčajne sú nositeľmi kladných vlastností.\n\n-dielo vždy obsahuje nejaké tajomstvo, ktoré je rozlúštené v závere diela\n\n- často sa hovorí o nových vynálezoch, strojoch..\n\n-dej je nasmerovaný do budúcnosti\n\nAutori: Jules Verne- Cesta na Mesiac, 20 000 míľ pod morom\n\n Karel Čapek- R. U. R, Továrna na abslotuno\n\n Douglas Adams- Stopárov sprievodca po galaxii\n\n J. Žarnay- Tajomstvo dračej steny\n\nPorovnanie poézie a prózy:\n\nPOÉZIA\n\n- z gréckeho poesis – tvorba\n\n- autor poézie = básnik\n\n- od bežnej reči sa odlišuje používaním umeleckých prostriedkov napr. rým, rytmus, metrum, obraznosť, symbolika\n\n- v staroveku tento názov znamenal všetku literárnu tvorbu, v klasicizme dostal nový rozmer\n\n- znamená viazanú reč (grafické členeni básne, rytmus, rým, strofu)\n\n-delí sa na : Epická poézia: má dej\n\n Lyrická poézia: nemá dej\n\n Lyricko- epická poézia: dej je potlačený ale naznačený\n\nPRÓZA\n\n- názov je odvodený z lat. oratio proversa = reč, ktorá plynie po riadkoch stále vpred – riadok je teda ohraničený rozmerom stránky, nie napr. počtom slabík, rýmom, ...\n\n- popri poézii ide o jeden z typov literatúry (niekde sa dá nájsť aj termín rod, niekde dokonca aj druh, pričom pri poslednom pomenovaní je členenie literatúry na lyriku, epiku a drámu z hľadiska estetického)\n\n- na poéziu a prózu sa literatúra člení z hľadiska jazykovo-štylistickej formy\n\n- je to rytmicky neviazaná reč (nie je ako poézia zviazaná do veršov, ale voľne plynie) - základný rozdiel spočíva v grafickom členení textu – je to voľná reč nedelená na verše\n\n- próza musí byť tiež usporiadaná, ale nie nevyhnutne metricky, zvukovo, ale tematicky (inak by čitateľ nerozumel)\n\n- základnou jazykovou jednotkou je veta – nemožno presne stanoviť, podľa akých pravidiel autor tieto vety tvoril (ako napr. pri sylabickom veršovom systéme) – autor podriaďuje svoju reč len všeobecným jazykovým pravidlám\n\n- v próze sa píšu všetky neumelecké texty a mnohé umelecké literárne diela (v staršej literatúre sa aj vedecké texty písali v poézii – napr. existovali veršované slovníky)\n\n- vo všeobecnosti sa dá tvrdiť, že lexika, štylizácia, zvuková stránka prózy sú jednoduchšie ako v poézii\n\n- rovnoprávne postavenie s poéziou získala dosť neskoro – postupne sa zrovnoprávňuje od obdobia renesancie\n\n- ale v ústnej ľudovej slovesnosti bola rovnako obľúbená ako poézia\n\n- uplatňuje sa väčšinou v epike, ale aj v dráme\n\n- v lyrike – tzv. básne v próze (hoci názov je zavádzajúci) – u nás napr. Ivan Krasko\n\n- v súčasnosti prevláda, lebo vo väčšej miere môže zobraziť šírku a zložitosť spoločenského diania\n\nAntoine de Saint Exupéry – Malý princ\n\nKompozícia: 27 kapitol \n\nŽáner: filozofická rozprávka pre dospelých \n\nLiterárne obdobie: literatúra po roku 1945 (francúzska) \n\nRok vydania: 1943 \n\nMotto: „Oči sú slepé. Treba hľadať srdcom.\" (Saint-Exupéry, A. de: Malý princ. Mladé letá 1997, str. 77) \n\nKedy a kde sa odohráva dej: zrejme počas 2. svetovej vojny kdesi na saharskej púšti \n\nPostavy: \nMalý princ \n- „zvláštny chlapček\", ktorý sa z čista jasna zjavil na púšti, malý odvážny hrdina\n- jeho domovom je planéta B 612 \n- čistý, neskazený, úprimný \n- vedel dávať otázky do omrzenia \n- kým pilot opravoval lietadlo, on mu rozprával o svojej planéte, o odchode, o ceste \n- zapochybuje o láske k svoje ruži, postupne však nachádza odpoveď na otázku, čo je skutočne dôležité a rozhodne sa k nej vrátiť \nrozprávač - pilot \n- pilot, ktorému sa na saharskej púšti pokazí lietadlo \n- prišiel k nemu Malý princ a chcel, aby mu nakreslil ovečku - a tak zase po dlhom čase (znechutili ho totiž dospelí, keď bol dieťa) kreslí \n- zistil, že Malý princ mu pripomína seba, keď bol malý a uvedomí si, že teraz je už obyčajný dospelý s obmedzenou fantáziou a trpezlivosťou \n- obľúbil si malého princa \n- chcel uveriť, že malý princ sa po uštipnutí hadom, bez svojej telesnej schránky opäť vrátil na svoju planétu, k svoje ruži \n- možno až doteraz čaká na návrat svojho Malého princa \n\nlíška \n- nemala rada ľudí \n- chcela od Malého princa, aby si ju skrotil \n- naučila Malého princa trpezlivosti \n- pokladala svoj život za jednotvárny a nudila sa \n- prezradila mu, prečo je jeho ruža jedinečná - čas, ktorý jej venoval, ju robí dôležitou \n\nhad \n- pre Malého princa sa vyjadroval v hádankách \n- pomohol mu dostať sa naspäť k svojej ruži \n\nbytosti, s ktorými sa stretol Malý princ na svojej púti 6 planétach (asteroidy 325 - 330), a ktoré predstavujú ľudské vlastnosti: \nkráľ \nmárnivec \npijan \nbiznisman \nlampár \nzemepisec \n\nzrejme na Zemi stretol: \nvýhybkára \nobchodníka - predával pilulky proti smädu, ušetrí to vraj 53 minút/týždeň, keby mal však premárniť 53 minút Malý princ, šiel by radšej pomaly k studničke \n\nDej: \n\nRozprávač začína svoj príbeh tým, ako keď mal 6 rokov snažil sa kresliť, ale jeho kresby dospelí nepochopili a poradili mu, aby sa radšej venoval niečomu inému, tak sa stal pilotom. Nakreslil vtedy aj veľhada ako zožral slona. Dospelí túto jeho kresbu tiež nepochopili, mysleli si, že je to klobúk. Vždy vo svojom živote, keď sa mu niekto zdal trochu bystrejší, ukázal mu tú kresbu a vždy počul tú istú odpoveď: „To je klobúk\". A tak sa rozprávač prispôsobil jeho chápavosti - rozprávali o bridži, o golfe, o politike a o kravatách. Pilot žil samotársky a nemal nikoho, s kým by si vážne pohovoril, až kým sa mu pre 6-imi rokmi v africkej púšti nepokazilo lietadlo. Stretol tam Malého princa, ktorý pochopil aj jeho kresbu veľhada. Chlapček od neho chcel, aby mu nakreslil ovečku. Po niekoľkých pokusoch mu napokon nakreslil debničku a povedal mu, že vo vnútri je ovečka. A bol prekvapený, keď malý chlapček zareagoval, že presne takú chcel. Vyvinul sa medzi nimi vzťah a chlapec mu rozprával o svojej planéte B 612. Porozprával mu, ako každé ráno musí upratať svoju planétu - vytrhať baobaby, povymetať sopky. Povedal mu aj o svojom kvietku - ruži, ktorá je nežná, no namyslená. Hoci ju chcel mať naozaj rád, čoskoro o nej zapochyboval. Potom uznal, že bol primladý, aby ju vedel mať rád. Malý princ odišiel zo svojej planéty, keď sa sťahovali divé vtáky. Rozlúčil sa s kvetinou a tá ho požiadala o odpustenie. Malý princ sa vybral na návštevu okolitých planét. Ani na jednej z planét sa mu nepáčilo a nerozhodol sa tam ostať. Stretol sa tam s rozličnými bytosťami. Ako siedmu planétu malý chlapček navštívil Zem a našiel tam státisíce takých typov ľudí ako na predchádzajúcich planétach. Zoznámil sa tu aj s hadom a s líškou. Pomohol na smrť vysmädnutému letcovi nájsť studňu. Videl aj veľa takých istých kvetov, ako bol ten jeho, napriek tomu, že jeho kvetinka tvrdila, že je jedinečná. Líška ho mnohé naučila a vysvetlila mu. Malý princ sa nakoniec rozhodol vrátiť sa k svojmu kvietku. Hoci letcovi to bolo smutno, princ mu to vysvetlil svojou logikou. Povedal pilotovi, aby si naňho spomenul vždy, keď sa pozrie na hviezdy. Dohodol sa s hadom, ten mu pomohol. A obdaroval ho svojím jedom … \nRozprávač sa trápil tým, že k náhubku, čo kreslil chlapčekovi zabudol pripojiť kožený remienok. Kládol si otázku, čo ak ovečka zožrala ružu. Raz tomu verí, raz nie. \n„ - Môžem ťa uniesť ďalej ako loď, - povedal had. Okrútil sa Malému princovi okolo členka ako zlatý náramok. - Keď sa niekoho dotknem, vrátim ho zemi, z ktorej vyšiel, - dodal ešte. - Ale ty si čistý a prichádzaš z hviezdy …- \nMalý princ neodpovedal. \n- Je mi ťa ľúto, si taký slabý na tejto Zemi zo žuly. \n\nCitáty:\n\nMôžem ti jedného dňa pomôcť, ak sa ti bude priveľmi cnieť za tvojou planétou. Ja môžem\n\n„Aká čudná planéta! - pomyslel si. - Je celá vyprahnutá a celá zašpicatená a celá slaná. A ľudia nemajú predstavivosť. Opakujú, čo sa im povie\n\n„No ak si ma skrotíš, budeme jeden druhého potrebovať. Budeš pre mňa jediný na svete. A ja budem pre teba jediná na svete …\"\n\n„Ty budeš navždy zodpovedný za všetko, čo si skrotíš.\"\n\n„Len deti vedia, čo hľadajú\"\n\n„Ľudia u vás pestujú päťtisíc ruží v jedinej záhrade … a nenachádzajú v nej to, čo hľadajú.\"\n\n„To, čo je dôležité, je neviditeľné …\"","number":30}},"flashcards":[{"term":"Komunikácia","definition":"Dorozumievací proces - výmena informácií medzi ľuďmi (ústne alebo písomne). Účastníci sa nazývajú komunikanti.","zadanie":1,"kategoria":"Jazyk"},{"term":"Efektívna komunikácia","definition":"Obojsmerná komunikácia založená na spolupráci, počúvaní a spätnej väzbe. Súčasťou je asertívna komunikácia.","zadanie":1,"kategoria":"Jazyk"},{"term":"Asertívna komunikácia","definition":"Otvorené a primerané vyjadrenie myšlienok a názorov bez prekročenia práv iných.","zadanie":1,"kategoria":"Jazyk"},{"term":"Devalvujúca komunikácia","definition":"Opak efektívnej - napádanie, skákanie do reči, povýšenecké správanie, zneužívanie dôvery.","zadanie":1,"kategoria":"Jazyk"},{"term":"Rytmus (v poézii)","definition":"Pravidelné opakovanie zvukového prvku reči vo verši.","zadanie":1,"kategoria":"Literatúra"},{"term":"Sylabická prozódia","definition":"Veršový systém založený na rovnakom počte slabík vo veršoch + intonačná prestávka + združený rým + rytmicko-syntaktický paralelizmus.","zadanie":1,"kategoria":"Literatúra"},{"term":"Valaská škola mravov stodola","definition":"Hugolín Gavlovič (baroko) - didakticko-reflexívna poézia, 16 000 veršov, 12-veršová strofa, 14 slabík vo verši, slovakizovaná čeština.","zadanie":1,"kategoria":"Literatúra"},{"term":"Mor ho!","definition":"Samo Chalupka (romantizmus) - národná, hrdinská, lyricko-epická skladba. Kolektívny hrdina (slov. junáci), 13-slabičný verš, dej v 4. stor.","zadanie":1,"kategoria":"Literatúra"},{"term":"Bezpríznakové (neutrálne) slová","definition":"Vyjadrujú vecný význam, dajú sa použiť v akomkoľvek štýle. Napr. dom, písať, mama, pes.","zadanie":2,"kategoria":"Jazyk"},{"term":"Termíny (odborné názvy)","definition":"Jednoslovné/viacslovné pomenovania, používané v náučných textoch. Napr. morféma, kyselina chlorovodíková.","zadanie":2,"kategoria":"Jazyk"},{"term":"Kancelarizmy","definition":"Typické slová administratívnych textov - faktúra, splatnosť, cestovný príkaz.","zadanie":2,"kategoria":"Jazyk"},{"term":"Publicizmy","definition":"Slová typické pre publicistické texty - iniciatíva, atentát, terorizmus.","zadanie":2,"kategoria":"Jazyk"},{"term":"Hovorové slová","definition":"Slová používané v súkromnom prejave - futro, žúrovať, panelák, učka.","zadanie":2,"kategoria":"Jazyk"},{"term":"Dialektizmy (nárečové slová)","definition":"Nespisovné slová viazané na región - švábka, grule, bandurky.","zadanie":2,"kategoria":"Jazyk"},{"term":"Slangové slová","definition":"Nespisovné slová používané istou skupinou - fáro (auto), kilo (100€).","zadanie":2,"kategoria":"Jazyk"},{"term":"Profesionalizmy","definition":"Nespisovné slová používané v profesii - operačka, zubárina, deckár.","zadanie":2,"kategoria":"Jazyk"},{"term":"Argot","definition":"Tajná šifrovaná reč asociálnych skupín - blcha (stopa po injekcii), televízor (komunikácia z okna do okna vo väznici).","zadanie":2,"kategoria":"Jazyk"},{"term":"Neologizmy","definition":"Novovzniknuté slová - mobilný telefón, snoubording, hamburger.","zadanie":2,"kategoria":"Jazyk"},{"term":"Archaizmy","definition":"Slová s novšími synonymami - sklep (obchod), švec (obuvník), árešt (väznica).","zadanie":2,"kategoria":"Jazyk"},{"term":"Historizmy","definition":"Slová pre veci, ktoré už neexistujú - dráb, hajdúch, groš, slúžny.","zadanie":2,"kategoria":"Jazyk"},{"term":"Deminutíva (zdrobneniny)","definition":"Expresívne slová s pozitívnym vzťahom - psíček, mačička, chlebík.","zadanie":2,"kategoria":"Jazyk"},{"term":"Eufemizmy","definition":"Zjemňujúce výrazy - zaspať (zomrieť), mať dobrú náladu (byť opitý).","zadanie":2,"kategoria":"Jazyk"},{"term":"Hypokoristiká","definition":"Lichotivé slová s príznakom maznavosti - mamka, ocinko, holúbok.","zadanie":2,"kategoria":"Jazyk"},{"term":"Pejoratíva","definition":"Hanlivé expresívne slová - žbrnda, držgroš, pracháč.","zadanie":2,"kategoria":"Jazyk"},{"term":"Augmentatíva","definition":"Slová zveličujúce význam - psisko, nosisko, dlhočizný.","zadanie":2,"kategoria":"Jazyk"},{"term":"Dysfemizmy","definition":"Hrubé/drsné vyjadrenia - ožran, chajda, hnát.","zadanie":2,"kategoria":"Jazyk"},{"term":"Vulgarizmy","definition":"Hrubé neslušné výrazy s negatívnym nábojom, v rozpore s etikou.","zadanie":2,"kategoria":"Jazyk"},{"term":"Žánre ľudovej slovesnosti","definition":"Obradový folklór, ľudové piesne, balady, príslovia, porekadlá, pranostiky, hádanky, rozprávky, povesti.","zadanie":2,"kategoria":"Literatúra"},{"term":"Príslovie vs. porekadlo","definition":"Príslovie má mravné ponaučenie (\"Komu sa nelení...\"), porekadlo je len obrazné pomenovanie bez ponaučenia (\"Aká matka, taká Katka\").","zadanie":2,"kategoria":"Literatúra"},{"term":"Pranostika","definition":"Ľudová skúsenosť z pozorovania prírody - \"Studený máj, v stodole raj.\"","zadanie":2,"kategoria":"Literatúra"},{"term":"Janko Kráľ - Zakliata panna...","definition":"Romantizmus - čerpá z ľudovej slovesnosti (zakliata panna, strigy), zdrobneniny, združený rým.","zadanie":2,"kategoria":"Literatúra"},{"term":"Ján Botto - Smrť Jánošíkova","definition":"Romantizmus - využíva zdrobneniny, magické čísla, rozprávkové prvky (Jánošíkov opasok), združený rým.","zadanie":2,"kategoria":"Literatúra"},{"term":"Morfológia","definition":"Časť gramatiky skúmajúca tvarosloví - slovné druhy a ich gramatické kategórie.","zadanie":3,"kategoria":"Jazyk"},{"term":"10 slovných druhov","definition":"Ohybné: podstatné mená, prídavné mená, zámená, číslovky, slovesá. Neohybné: príslovky, predložky, spojky, častice, citoslovcia.","zadanie":3,"kategoria":"Jazyk"},{"term":"Druhy zámen","definition":"Osobné (ja, ty), privlastňovacie (môj), ukazovacie (ten), opytovacie (kto), vzťažné (ktorý), neurčité (niekto), vymedzovacie (sám), záporné (nikto).","zadanie":3,"kategoria":"Jazyk"},{"term":"Martin Kukučín","definition":"Realista, predstaviteľ realistickej poviedky. Diela: Rysavá jalovica, Keď báčik z Chochoľova umrie, Neprebudený.","zadanie":3,"kategoria":"Literatúra"},{"term":"J. G. Tajovský","definition":"Realista (2. vlna). Sociálna poviedka, kritický pohľad na dedinu. Diela: Maco Mlieč, Mamka Pôstková, Apoliena.","zadanie":3,"kategoria":"Literatúra"},{"term":"Keď báčik z Chochoľova umrie","definition":"Kukučín - poviedka o pánovi Adušovi, ktorý čaká na dedičstvo. Humorne vykresľuje upadajúcu šľachtu.","zadanie":3,"kategoria":"Literatúra"},{"term":"Maco Mlieč","definition":"Tajovský - sociálna kriticko-realistická poviedka. Téma: vykorisťovanie chudobného sluhu, kritika rozdielu medzi pánmi a chudobnými.","zadanie":3,"kategoria":"Literatúra"},{"term":"Slovotvorné postupy","definition":"Odvodzovanie (predponami/príponami), skladanie (životopis), skracovanie (ZOH, km), preberanie z cudzích jazykov (sitcom).","zadanie":4,"kategoria":"Jazyk"},{"term":"Slovotvorný základ","definition":"Časť slova, z ktorej je odvodené nové slovo. Napr. v \"darček\" je základ \"dar\".","zadanie":4,"kategoria":"Jazyk"},{"term":"Sylabicko-tonický verš","definition":"Veršový systém - rovnaký počet slabík + striedanie prízvučných a neprízvučných slabík. Stopy: trochej, jamb, daktyl.","zadanie":4,"kategoria":"Literatúra"},{"term":"Druhy lyriky","definition":"Podľa prístupu: náladová, opisná, úvahová. Podľa tematiky: intímna, prírodná, spoločenská, reflexívna, náboženská.","zadanie":4,"kategoria":"Literatúra"},{"term":"P. O. Hviezdoslav - tvorba","definition":"Lyrika: Sonety, Letorosty 1-3, Prechádzky Jarom/Letom, Krvavé sonety. Epika: Hájnikova žena, Ežo Vlkolinský.","zadanie":4,"kategoria":"Literatúra"},{"term":"Krvavé sonety","definition":"Hviezdoslav - cyklus sonetov o 1. svetovej vojne, odsudzuje vojnu a ľudskú sebeckosť.","zadanie":4,"kategoria":"Literatúra"},{"term":"Modálnosť vety","definition":"Vzťah hovoriaceho k obsahu výpovede. Vety: oznamovacie, opytovacie, rozkazovacie, želacie, zvolacie.","zadanie":5,"kategoria":"Jazyk"},{"term":"Vetné sklady","definition":"Vzťahy medzi vetnými členmi: prisudzovací (podmet-prísudok), určovací (rozvíjacie členy), priraďovací (rovnocenné členy).","zadanie":5,"kategoria":"Jazyk"},{"term":"Novela","definition":"Epický žáner stredného rozsahu, presná kompozícia, dej s rýchlym spádom a prekvapivým koncom, 2+ dejové línie, málo postáv.","zadanie":5,"kategoria":"Literatúra"},{"term":"Novela vs. poviedka","definition":"Novela: stredný rozsah, viac postáv, 2+ dejové línie, súbor udalostí. Poviedka: krátka, menej postáv, 1 dejová línia, 1 udalosť.","zadanie":5,"kategoria":"Literatúra"},{"term":"Neprebudený","definition":"Kukučín - novela o Ondrášovi Machuľovi, mentálne postihnutom husárovi. Tragický koniec - umiera pri záchrane husí.","zadanie":5,"kategoria":"Literatúra"},{"term":"Ťapákovci","definition":"Timrava - novela o zaostalej rodine z dediny, zachytáva ich lenivosť a zastaralé myslenie.","zadanie":5,"kategoria":"Literatúra"},{"term":"Prozodické vlastnosti reči","definition":"Časová (tempo, prestávka), silová (prízvuk, dôraz, intenzita), tónová (melódia vety) modulácia.","zadanie":6,"kategoria":"Jazyk"},{"term":"Slovný prízvuk v slovenčine","definition":"Vždy na 1. slabike (pri predložkových spojeniach na predložke: \"na stole\" → prízvuk na \"na\").","zadanie":6,"kategoria":"Jazyk"},{"term":"Epika","definition":"Literárny druh - rozprávanie príbehu. Má dej, postavy, prostredie, čas. Forma: próza alebo verš.","zadanie":6,"kategoria":"Literatúra"},{"term":"Detvan","definition":"Andrej Sládkovič - lyricko-epická skladba o Martinovi Hudcovi a Eline. Idealizuje slovenský ľud.","zadanie":6,"kategoria":"Literatúra"},{"term":"Hájnikova žena","definition":"Hviezdoslav - lyricko-epická skladba. Hanka Čajková, Michal Čajka. Téma: zápas medzi panstvom a ľudom.","zadanie":6,"kategoria":"Literatúra"},{"term":"Opisný slohový postup","definition":"Vymenúva znaky predmetu/javu. Žánre: opis statický, dynamický, jednoduchý, odborný, umelecký, charakteristika.","zadanie":7,"kategoria":"Jazyk"},{"term":"Opis vs. charakteristika","definition":"Opis - vonkajšie znaky (vzhľad, vlastnosti predmetu). Charakteristika - vnútorné znaky (povaha, vlastnosti človeka).","zadanie":7,"kategoria":"Jazyk"},{"term":"Priama vs nepriama charakteristika","definition":"Priama: autor priamo opíše vlastnosti. Nepriama: prejavujú sa cez konanie, reč, myslenie postavy.","zadanie":7,"kategoria":"Jazyk"},{"term":"Karikatúra","definition":"Zveličený, satirický opis - používa sa pre humorný/kritický efekt.","zadanie":7,"kategoria":"Jazyk"},{"term":"Román","definition":"Najrozšírenejší epický žáner - veľký rozsah, viac postáv, viac dejových línií, zobrazuje široký priestor a čas spoločenského života.","zadanie":7,"kategoria":"Literatúra"},{"term":"Otec Goriot","definition":"Honoré de Balzac - román z cyklu Ľudská komédia. Goriot - obetavý otec, ktorého dcéry využijú. Realistický román.","zadanie":7,"kategoria":"Literatúra"},{"term":"Neohybné slovné druhy","definition":"Príslovky, predložky, spojky, častice, citoslovcia. Nemenia svoj tvar - nečasujú sa, neskloňujú sa, nestupňujú sa.","zadanie":8,"kategoria":"Jazyk"},{"term":"Spodobovanie","definition":"Jav, pri ktorom sa hláska v spojení mení podľa nasledujúcej. Napr. \"vo zhone\" → \"fzhone\" (znelé/neznelé).","zadanie":8,"kategoria":"Jazyk"},{"term":"Sonet","definition":"Lyrická báseň s pevnou kompozíciou: 14 veršov, dva štvorveršia + dva trojveršia (alebo 3 štvorveršia + dvojveršie). Vznikol v Taliansku.","zadanie":8,"kategoria":"Literatúra"},{"term":"Epiteton","definition":"Básnický prívlastok - prídavné meno použité na vyjadrenie subjektívneho hodnotenia. Napr. \"belasé nebo\".","zadanie":8,"kategoria":"Literatúra"},{"term":"Básnický symbol","definition":"Konkrétna predstava na vyjadrenie abstraktnej myšlienky. Napr. holubica = mier.","zadanie":8,"kategoria":"Literatúra"},{"term":"Symbolizmus","definition":"Lit. smer (koniec 19. stor.) - využíva symboly, hudobnosť verša, vyjadruje pocity, nálady, tajomné. Predstaviteľ: Ivan Krasko.","zadanie":8,"kategoria":"Literatúra"},{"term":"Ivan Krasko","definition":"Predstaviteľ slovenského symbolizmu. Zbierky: Nox et solitudo, Verše. Témy: smútok, samota, sociálne otázky. Symboly: noc, jeseň, červené brká.","zadanie":8,"kategoria":"Literatúra"},{"term":"Formy národného jazyka","definition":"Spisovný jazyk + nespisovné formy: nárečia (miestne/teritoriálne), slang (sociálne), žargon, dobové formy.","zadanie":9,"kategoria":"Jazyk"},{"term":"Slovenské nárečia","definition":"3 hlavné: západoslovenské, stredoslovenské, východoslovenské. Príklady miestnych: záhorácke, oravské, liptovské, šarišské, gemerské, spišské.","zadanie":9,"kategoria":"Jazyk"},{"term":"Epos","definition":"Rozsiahla veršovaná epická skladba s hrdinom, ktorý má nadprirodzené schopnosti. Antické začiatky (Homér).","zadanie":9,"kategoria":"Literatúra"},{"term":"Časomiera","definition":"Veršový systém antiky - založený na striedaní dlhých a krátkych slabík (nie na prízvuku). Použil ho Ján Hollý.","zadanie":9,"kategoria":"Literatúra"},{"term":"Odysea","definition":"Homér - antický epos. Návrat Odysea z Trójskej vojny domov - 10 ročná cesta plná dobrodružstiev (kyklop Polyfémos, Sirény, Kirké).","zadanie":9,"kategoria":"Literatúra"},{"term":"Svätopluk","definition":"Ján Hollý - klasicistický epos v 12 spevoch o Svätoplukovi a Veľkomoravskej ríši. Časomiera, hexameter.","zadanie":9,"kategoria":"Literatúra"},{"term":"Slávy dcéra","definition":"Ján Kollár - znelkový (sonetový) cyklus - Předzpěv + 5 spevov. Téma: bolesť nad osudom Slovanov, ideál slovanskej vzájomnosti.","zadanie":9,"kategoria":"Literatúra"},{"term":"Publicistický štýl","definition":"Funkcia: informovať, presviedčať. Znaky: aktuálnosť, verejnosť, zrozumiteľnosť, expresívnosť. Žánre: spravodajské, analytické, beletristické.","zadanie":10,"kategoria":"Jazyk"},{"term":"Spravodajské žánre","definition":"Správa, oznam, interview, reportáž, riport, inzerát.","zadanie":10,"kategoria":"Jazyk"},{"term":"Analytické žánre","definition":"Úvodník, komentár, recenzia, kritika, glosa, posudok.","zadanie":10,"kategoria":"Jazyk"},{"term":"Beletristické žánre publicistiky","definition":"Fejtón, stĺpček, čierna kronika, črta.","zadanie":10,"kategoria":"Jazyk"},{"term":"Vnútorný monológ","definition":"Spôsob zobrazenia myšlienkového procesu postavy - hovorí sama so sebou, vyjadruje myšlienky, pocity, úvahy.","zadanie":10,"kategoria":"Literatúra"},{"term":"Verbálna komunikácia","definition":"Slovná - ústna alebo písomná, využíva jazykové prostriedky.","zadanie":11,"kategoria":"Jazyk"},{"term":"Neverbálna komunikácia","definition":"Mimoslovná: mimika (tvár), gestika (ruky), proxemika (vzdialenosť), haptika (dotyky), posturika (postoj), kinezika (pohyb).","zadanie":11,"kategoria":"Jazyk"},{"term":"Proxemické zóny","definition":"Intímna (0-30cm), osobná (45-120cm), sociálna (1,5-3m), verejná (5-8m).","zadanie":11,"kategoria":"Jazyk"},{"term":"Komédia (veselohra)","definition":"Dramatický žáner s humorným obsahom, šťastným koncom. Druhy: situačná, charakterová, salónna, fraška.","zadanie":11,"kategoria":"Literatúra"},{"term":"Situačný vs. slovný humor","definition":"Situačný: vzniká z komických situácií. Slovný: zo slovných hier, dvojzmyslov, narážok.","zadanie":11,"kategoria":"Literatúra"},{"term":"Hyperbola","definition":"Zveličenie - zámerné nadsadenie reálneho stavu pre umelecký účinok.","zadanie":11,"kategoria":"Literatúra"},{"term":"Lakomec","definition":"Molière - charakterová komédia. Harpagon - chamtivý starec, jeho lakomosť spôsobí konflikt s deťmi. Klasicistická komédia.","zadanie":11,"kategoria":"Literatúra"},{"term":"Zmierenie alebo Dobrodružstvo pri obžinkoch","definition":"Ján Palárik - veselohra. Téma: zmierenie maďarskej a slovenskej šľachty. Postavy si menia úlohy.","zadanie":11,"kategoria":"Literatúra"},{"term":"Vývin slov. spisovného jazyka","definition":"1. obdobie staroslovienčiny (Konštantín, Metod), 2. obdobie slovakizovanej češtiny, 3. Bernolákova kodifikácia (1787), 4. Štúrova kodifikácia (1843), 5. súčasná norma.","zadanie":12,"kategoria":"Jazyk"},{"term":"Bernolákova kodifikácia","definition":"1787 - prvá kodifikácia. Základom západoslov. nárečie (kultúrna trnavská slovenčina). Fonetický pravopis. Dielo: Grammatica slavica.","zadanie":12,"kategoria":"Jazyk"},{"term":"Štúrova kodifikácia","definition":"1843 - druhá kodifikácia. Základom stredoslov. nárečie. Fonetický princíp. Diela: Nauka reči slovenskej, Nárečja slovenskuo.","zadanie":12,"kategoria":"Jazyk"},{"term":"Hodžovsko-Hattalova reforma","definition":"1852 - úprava Štúrovej slovenčiny - zaviedli y, ý, ä, etymologický princíp pravopisu. Dielo: Krátka mluvnica slovenská.","zadanie":12,"kategoria":"Jazyk"},{"term":"Rečnícky štýl","definition":"Funkcia: pôsobiť na poslucháča. Znaky: monológovosť, sugestívnosť, expresívnosť. Použitie retor. otázok, oslovenia.","zadanie":13,"kategoria":"Jazyk"},{"term":"Rečnícke žánre","definition":"Náučné (prednáška, referát), náboženské (kázeň), agitačné (predvolebná reč), príležitostné (slávnostný príhovor, smútočná reč).","zadanie":13,"kategoria":"Jazyk"},{"term":"Živý bič","definition":"Milo Urban - sociálny román. Téma: 1. svet. vojna a jej dôsledky na dedinu Ráztoky. Kolektívny hrdina.","zadanie":13,"kategoria":"Literatúra"},{"term":"Na západe nič nového","definition":"E. M. Remarque - protivojnový román. Pavel Baumer - mladý vojak, hrôzy 1. svet. vojny.","zadanie":13,"kategoria":"Literatúra"},{"term":"Slohové postupy","definition":"Informačný (správa), opisný (opis), rozprávací (rozprávanie), výkladový (výklad), úvahový (úvaha), publicistický (článok).","zadanie":14,"kategoria":"Jazyk"},{"term":"Nespoľahlivý rozprávač","definition":"Rozprávač, ktorému čitateľ nemôže úplne dôverovať - manipuluje, klame, jeho pohľad je subjektívny/skreslený.","zadanie":14,"kategoria":"Literatúra"},{"term":"Typy rozprávača","definition":"Vševediaci (3. os., všetko vie), priamy/personálny (1. os., postava rozpráva), nepriamy (3. os., obmedzený pohľad), nespoľahlivý.","zadanie":14,"kategoria":"Literatúra"},{"term":"Diakritické znamienka","definition":"Mäkčeň (ť), dĺžeň (á), dve bodky (ä), vokáň (ô).","zadanie":15,"kategoria":"Jazyk"},{"term":"Interpunkčné znamienka","definition":"Bodka, čiarka, bodkočiarka, dvojbodka, otáznik, výkričník, úvodzovky, zátvorky, pomlčka, spojovník, tri bodky.","zadanie":15,"kategoria":"Jazyk"},{"term":"Voľný verš","definition":"Verš bez pravidelnej rytmickej štruktúry - nemá pravidelný počet slabík, nemá rým. Rozvinul sa v moderne.","zadanie":15,"kategoria":"Literatúra"},{"term":"Automatický text","definition":"Surrealistická technika - písanie bez kontroly rozumu, zachytávanie spontánnych myšlienok. Predstaviteľ: R. Fábry.","zadanie":15,"kategoria":"Literatúra"},{"term":"Katolícka moderna","definition":"Slov. lit. smer 30. roky 20. stor. - náboženská poézia. Predstavitelia: R. Dilong, P. Strmeň, J. Silan.","zadanie":15,"kategoria":"Literatúra"},{"term":"Syntax","definition":"Časť gramatiky o stavbe vety - vetné členy, vzťahy medzi nimi, typy viet.","zadanie":16,"kategoria":"Jazyk"},{"term":"Syntagma","definition":"Spojenie dvoch slov - prisudzovacia (mama varí), určovacia (krásna mama), priraďovacia (mama a otec).","zadanie":16,"kategoria":"Jazyk"},{"term":"Jednočlenná vs. dvojčlenná veta","definition":"Jednočlenná: má len vetný základ (Blýska sa). Dvojčlenná: má podmet aj prísudok (Deti sa hrali).","zadanie":16,"kategoria":"Jazyk"},{"term":"Naturizmus","definition":"Slov. próza 30.-40. roky 20. stor. - lyrizovaná próza s prvkami mýtu, prírody, ľudovej slovesnosti. Hlavná postava silne spätá s prírodou.","zadanie":16,"kategoria":"Literatúra"},{"term":"Lyrizovaná próza","definition":"Próza s prvkami lyriky - obrazné vyjadrenie, symboly, opisy prírody, citovosť. Príklady: Chrobák, Figuli, Švantner.","zadanie":16,"kategoria":"Literatúra"},{"term":"Reťazový kompozičný princíp","definition":"Príbeh sa skladá z jednotlivých článkov (epizód), ktoré sa za sebou viažu ako reťaz, nie chronologicky podľa kauzality.","zadanie":16,"kategoria":"Literatúra"},{"term":"Tri gaštanové kone","definition":"Margita Figuli - lyrizovaná próza. Téma: čistá láska Petra a Magdalény, dobro vs. zlo (Jano Záhradník).","zadanie":16,"kategoria":"Literatúra"},{"term":"Drak sa vracia","definition":"Dobroslav Chrobák - lyrizovaná próza. Martin Lepiš zvaný Drak - vyvrhnutý dedinou, vracia sa pomôcť.","zadanie":16,"kategoria":"Literatúra"},{"term":"Gramatické kategórie slovies","definition":"Osoba (1./2./3.), číslo (jed./množ.), čas (min./prít./bud.), spôsob (oznam./rozk./podm.), rod (činný/trpný), vid (dok./nedok.).","zadanie":17,"kategoria":"Jazyk"},{"term":"Príslovky - druhy","definition":"Miesta (kde), času (kedy), spôsobu (ako), príčiny (prečo).","zadanie":17,"kategoria":"Jazyk"},{"term":"Číslovky - druhy","definition":"Základné (päť), radové (piaty), násobné (päťkrát), skupinové (pätoro), zlomkové (polovica), neurčité (mnoho).","zadanie":17,"kategoria":"Jazyk"},{"term":"Bačova žena","definition":"Ivan Stodola - tragédia. Eva Marčáková, Mišo a Ondrej. Téma: konflikt medzi dvoma manželmi po návrate prvého z Ameriky.","zadanie":17,"kategoria":"Literatúra"},{"term":"Matka (Barč Ivan)","definition":"Julius Barč Ivan - dráma o materskej láske, ktorá presahuje smrť.","zadanie":17,"kategoria":"Literatúra"},{"term":"Kým kohút nezaspieva","definition":"Ivan Bukovčan - dráma. 10 ľudí v pivnici počas vojny, Nemci žiadajú vydať jedného. Téma: morálka, zbabelosť, obeta.","zadanie":17,"kategoria":"Literatúra"},{"term":"Jednoduchá veta vs. súvetie","definition":"Jed. veta - 1 prisudzovací sklad. Súvetie - 2+ prisudzovacie sklady (priraďovacie - rovnocenné vety; podraďovacie - hlavná + vedľajšia).","zadanie":18,"kategoria":"Jazyk"},{"term":"Druhy priraďovacích súvetí","definition":"Zlučovacie (a, i), stupňovacie (ba, ba aj), odporovacie (ale, no), vylučovacie (alebo), dôsledkové (preto, tak), príčinné (lebo, veď).","zadanie":18,"kategoria":"Jazyk"},{"term":"Druhy vedľajších viet","definition":"Podmetová, prísudková, predmetová, prívlastková, príslovková (miesta, času, spôsobu, príčiny, podmienky, prípustky, účelu).","zadanie":18,"kategoria":"Jazyk"},{"term":"Prúd vedomia","definition":"Lit. technika - zachytenie myšlienok postavy v ich spontánnom toku, bez logickej organizácie. Predstaviteľ: J. Joyce - Odyseus.","zadanie":18,"kategoria":"Literatúra"},{"term":"Premena (Kafka)","definition":"Franz Kafka - novela. Gregor Samsa sa premení na obrovský hmyz. Téma: odcudzenie, absurdita, rozpad rodiny.","zadanie":18,"kategoria":"Literatúra"},{"term":"Vsuvka","definition":"Vetný člen/veta vsunutá do inej vety, oddelená čiarkami/pomlčkami. Napr. \"Pes, verný priateľ, čakal.\"","zadanie":19,"kategoria":"Jazyk"},{"term":"Výpustka (elipsa)","definition":"Vypustenie vetného člena, ktorý si môžeme z kontextu domyslieť. Napr. \"Mladosť - pochabosť.\"","zadanie":19,"kategoria":"Jazyk"},{"term":"Prístavok","definition":"Voľný prívlastok, dopĺňa význam podstatného mena. Napr. \"Bratislava, hlavné mesto Slovenska, leží pri Dunaji.\"","zadanie":19,"kategoria":"Jazyk"},{"term":"Vytýčený vetný člen","definition":"Vyzdvihnutý člen na začiatok vety, oddelený pauzou. Napr. \"Jednotka, tá ešte neznamená úspech.\"","zadanie":19,"kategoria":"Jazyk"},{"term":"Absurdná dráma","definition":"Dramatický prúd 50. r. 20. stor. - zobrazuje nezmyselnosť ľudskej existencie. Postavy bez minulosti, redukovaný dialóg, absurdné situácie.","zadanie":19,"kategoria":"Literatúra"},{"term":"Čakanie na Godota","definition":"Samuel Beckett - absurdná dráma. Vladimír a Estragon čakajú na Godota, ktorý nikdy nepríde. Symbol márnosti hľadania zmyslu.","zadanie":19,"kategoria":"Literatúra"},{"term":"Administratívny štýl","definition":"Funkcia: úradne komunikovať. Znaky: presnosť, vecnosť, neutrálnosť, ustálené formulácie, predtlače.","zadanie":20,"kategoria":"Jazyk"},{"term":"Administratívne žánre","definition":"Žiadosť, životopis, sťažnosť, reklamácia, objednávka, splnomocnenie, zápisnica, oznámenie, faktúra, motivačný list.","zadanie":20,"kategoria":"Jazyk"},{"term":"Chronologický postup","definition":"Dej je rozprávaný v časovom poradí - od najstaršej udalosti po najnovšiu.","zadanie":20,"kategoria":"Literatúra"},{"term":"Retrospektívny postup","definition":"Dej začína v prítomnosti/blízkej minulosti, postupne sa odkrývajú staršie udalosti formou spomienok.","zadanie":20,"kategoria":"Literatúra"},{"term":"Ako chutí moc","definition":"Ladislav Mňačko - román. Frank - bývalý fotograf, kritizuje skorumpovanú moc komunistických funkcionárov.","zadanie":20,"kategoria":"Literatúra"},{"term":"Homonymá","definition":"Slová s rovnakou zvukovou podobou, ale rôznym významom. Napr. koruna (peniaze/kráľovská/stromu).","zadanie":21,"kategoria":"Jazyk"},{"term":"Synonymá","definition":"Slová s rovnakým/blízkym významom. Napr. dom - obydlie, krásny - pekný.","zadanie":21,"kategoria":"Jazyk"},{"term":"Antonymá (opozitá)","definition":"Slová s opačným významom. Napr. veľký - malý, deň - noc.","zadanie":21,"kategoria":"Jazyk"},{"term":"Frazeologizmy","definition":"Ustálené slovné spojenia s preneseným významom. Napr. \"Achillova päta\" - slabé miesto.","zadanie":21,"kategoria":"Jazyk"},{"term":"Pôvod frazeologizmov","definition":"Ľudové (Bez práce nie sú koláče), biblické (babylonská veža), mytologické (Achillova päta), literárne (boj s veternými mlynmi), historické (Svätoplukove prúty).","zadanie":21,"kategoria":"Jazyk"},{"term":"Miroslav Válek","definition":"Súčasný slov. básnik. Zbierky: Dotyky, Príťažlivosť, Nepokoj, Milovanie v husej koži. Skeptický pohľad na svet.","zadanie":21,"kategoria":"Literatúra"},{"term":"Milan Rúfus","definition":"Súčasný slov. básnik. Zbierky: Až dozrieme, Chlapec maľuje dúhu, Modlitbičky. Témy: domov, viera, ľudskosť.","zadanie":21,"kategoria":"Literatúra"},{"term":"Delenie samohlások","definition":"Krátke (a, e, i, o, u), dlhé (á, é, í, ó, ú, ý), dvojhlásky (ia, ie, iu, ô). Široké (a, á), úzke (i, í), zaokrúhlené (o, u).","zadanie":22,"kategoria":"Jazyk"},{"term":"Delenie spoluhlások","definition":"Znelé/neznelé párové (b-p, d-t...), znelé nepárové (m, n, r, l), neznelé nepárové (c, č, h). Tvrdé (d, t, n, l), mäkké (ď, ť, ň, ľ), obojaké.","zadanie":22,"kategoria":"Jazyk"},{"term":"Ľubozvučnosť slovenčiny","definition":"Striedanie samohlások a spoluhlások (rytmický zákon), nahromadenie spoluhlások nie je typické. Zlepšuje výslovnosť.","zadanie":22,"kategoria":"Jazyk"},{"term":"Zvukomaľba (onomatopoja)","definition":"Napodobňovanie zvukov reality cez slová - bzučí, šuchotá, kvíli.","zadanie":22,"kategoria":"Jazyk"},{"term":"Spoločenská lyrika","definition":"Lyrika vyjadrujúca vzťah k spoločnosti, národu, sociálnym problémom. Príklady: Kollár - Slávy dcéra, Štúr - Rozžehnání.","zadanie":22,"kategoria":"Literatúra"},{"term":"Ľúbostná lyrika","definition":"Lyrika o láske, vzťahoch. Príklady: Sládkovič - Marína, Smrek - Dievča v rozkvete, Kostra - Ave Eva.","zadanie":22,"kategoria":"Literatúra"},{"term":"Marína","definition":"Andrej Sládkovič - lyricko-epická skladba, 291 strof. Téma: ľúbostná lyrika k Márii Pišlovej + úvahy o vlasti, kráse.","zadanie":22,"kategoria":"Literatúra"},{"term":"Úvaha","definition":"Slohový útvar - osobné zamyslenie sa nad problémom, otázkou. Subjektívny postoj. Použitie rečníckych otázok, citátov.","zadanie":23,"kategoria":"Jazyk"},{"term":"Tragédia","definition":"Dramatický žáner - vážny konflikt hrdinu so spoločnosťou/osudom, hrdina spravidla zomrie. Vznikla v antickom Grécku.","zadanie":23,"kategoria":"Literatúra"},{"term":"Monológ vs. dialóg","definition":"Monológ - prejav 1 postavy. Dialóg - rozhovor 2+ postáv. Replika - prejav 1 účastníka dialógu.","zadanie":23,"kategoria":"Literatúra"},{"term":"Autorská poznámka","definition":"Text v scenári (kurzívou) - opisuje prostredie, pohyby, mimiku postáv. Pre režisérov, hercov.","zadanie":23,"kategoria":"Literatúra"},{"term":"Vnútorná kompozícia drámy","definition":"Expozícia (úvod) - kolízia (zápletka) - kríza (vyvrcholenie) - peripetia (obrat) - katastrofa (rozuzlenie).","zadanie":23,"kategoria":"Literatúra"},{"term":"Antigona","definition":"Sofokles - antická tragédia. Antigona pochová brata proti zákazu kráľa Kreona, ten ju odsúdi na smrť. Konflikt: božské vs. ľudské zákony.","zadanie":23,"kategoria":"Literatúra"},{"term":"Hamlet","definition":"Shakespeare - tragédia. Dánsky princ pomstí otca zavraždeného strýkom. Známy monológ \"Byť či nebyť\".","zadanie":23,"kategoria":"Literatúra"},{"term":"Oznam vs. správa","definition":"Oznam: stručná informácia o budúcej udalosti. Správa: detailná informácia o uskutočnenej udalosti (kto, čo, kedy, kde, ako, prečo).","zadanie":24,"kategoria":"Jazyk"},{"term":"Denník vs. blog","definition":"Denník: pravidelné súkromné zápisky. Blog: verejné internetové zápisky, môžu byť o čomkoľvek.","zadanie":24,"kategoria":"Jazyk"},{"term":"Postmoderna","definition":"Lit. smer od 60. rokov 20. stor. - skepsa k veľkým príbehom, intertextualita, irónia, miešanie štýlov, experimenty.","zadanie":24,"kategoria":"Literatúra"},{"term":"Meno ruže","definition":"Umberto Eco - postmoderný román. Detektívka v stredovekom kláštore. Brat Viliam z Baskerville rieši sériu vrážd.","zadanie":24,"kategoria":"Literatúra"},{"term":"Démon súhlasu","definition":"Dominik Tatarka - novela kritizujúca konformizmus v komunistickom režime. Bartolomej Boleráz.","zadanie":24,"kategoria":"Literatúra"},{"term":"Diskusia vs. polemika vs. debata","definition":"Diskusia: vecná výmena názorov, hľadanie pravdy. Polemika: ostrá výmena, obhajoba vlastného. Debata: organizovaná diskusia s pravidlami.","zadanie":25,"kategoria":"Jazyk"},{"term":"Argumentácia vs. propaganda","definition":"Argumentácia: vecné dôkazy. Propagácia: šírenie myšlienok. Propaganda: jednostranné, manipulatívne presviedčanie.","zadanie":25,"kategoria":"Jazyk"},{"term":"Beatnici (beat generation)","definition":"Americké lit. hnutie 50. rokov 20. stor. - revolta proti konzumnej spol., voľný verš, sloboda, drogy, jazz. Allen Ginsberg, J. Kerouac.","zadanie":25,"kategoria":"Literatúra"},{"term":"Vytie (Howl)","definition":"Allen Ginsberg - manifest beatnikov. Voľný verš, kritika spoločnosti, prelomová báseň americkej poézie.","zadanie":25,"kategoria":"Literatúra"},{"term":"Kto chytá v žite","definition":"J. D. Salinger - román. Holden Caulfield - mladík v rozpore so spoločnosťou. Symbol revolty proti pokrytectvu.","zadanie":25,"kategoria":"Literatúra"},{"term":"Indoeurópske jazyky","definition":"Najväčšia jazyková rodina. Vetvy: slovanská, germánska, románska, keltská, baltská, grécka, indo-iránska, albánska, arménska.","zadanie":26,"kategoria":"Jazyk"},{"term":"Slovanské jazyky","definition":"Západné (slovenčina, čeština, poľština), východné (ruština, ukrajinčina, bieloruština), južné (slovinčina, chorvátčina, srbčina, bulharčina).","zadanie":26,"kategoria":"Jazyk"},{"term":"Ilias","definition":"Homér - antický epos. 24 spevov, posledných 51 dní Trójskej vojny. Hlavný hrdina Achilles, súboj s Hektorom.","zadanie":26,"kategoria":"Literatúra"},{"term":"Proglas","definition":"Konštantín Filozof - prvá slovanská báseň, predslov k prekladu Evanjelií. Obhajuje právo Slovanov mať vlastné písmo a bohoslužbu.","zadanie":26,"kategoria":"Literatúra"},{"term":"Decameron","definition":"Boccaccio - renesančné dielo. 10 ľudí počas moru v 10 dňoch rozpráva 100 noviel. Téma: láska, lesť, satira na cirkev.","zadanie":26,"kategoria":"Literatúra"},{"term":"Don Quijote","definition":"Cervantes - renesančný román, paródia na rytierske romány. Don Quijote a Sancho Panza, boj s veternými mlynmi.","zadanie":26,"kategoria":"Literatúra"},{"term":"Moravsko-panónske legendy","definition":"Život Konštantína a Život Metoda - hagiografické diela z 9. storočia, slovanské stredoveké lit.","zadanie":26,"kategoria":"Literatúra"},{"term":"Jazyk vs. reč","definition":"Jazyk: systém znakov a pravidiel celej spoločnosti (kodifikácia). Reč: individuálne uskutočnenie jazyka konkrétnym človekom.","zadanie":27,"kategoria":"Jazyk"},{"term":"Jazyková kultúra","definition":"Schopnosť používať jazyk správne a primerane situácii. Súvisí s kodifikáciou, jazykovou praxou, výslovnostnými štýlmi.","zadanie":27,"kategoria":"Jazyk"},{"term":"Výslovnostné štýly","definition":"Neutrálny (bežná komunikácia), vysoký (slávnostné prejavy, rozhlas), nižší (familiárny, súkromný).","zadanie":27,"kategoria":"Jazyk"},{"term":"Baroko","definition":"Lit. smer 17.-18. stor. Znaky: pochmúrnosť, vita brevis (život je krátky), memento mori, kontrast, alegória, ozdobnosť, religiozita.","zadanie":27,"kategoria":"Literatúra"},{"term":"Klasicizmus","definition":"Lit. smer 17.-19. stor. Znaky: dokonalosť, súlad, rozum, návrat k antike, pravidlá, hierarchia žánrov (vysoké/nízke).","zadanie":27,"kategoria":"Literatúra"},{"term":"Labyrint světa a ráj srdce","definition":"J. A. Komenský - alegorické dielo. Pútnik prechádza svetom-mestom, vidí jeho márnosť, útočisko nájde v srdci/u Boha.","zadanie":27,"kategoria":"Literatúra"},{"term":"Menné gramatické kategórie","definition":"Rod (mužský/ženský/stredný), číslo (jed./množ.), pád (1.-7.), vzor.","zadanie":28,"kategoria":"Jazyk"},{"term":"Slovesné gramatické kategórie","definition":"Osoba, číslo, čas, spôsob, slovesný rod (činný/trpný), vid (dokonavý/nedokonavý), trieda, vzor.","zadanie":28,"kategoria":"Jazyk"},{"term":"Skloňovanie - pán","definition":"1. pán, 2. pána, 3. pánovi, 4. pána, 5. pán/pane, 6. (o) pánovi, 7. (s) pánom. Vzor: chlap.","zadanie":28,"kategoria":"Jazyk"},{"term":"Romantizmus - znaky","definition":"Subjektivizmus, citovosť, individualita, ideál, exotika, kontrast, hrdinská minulosť, ľudová slovesnosť, slobody.","zadanie":28,"kategoria":"Literatúra"},{"term":"Realizmus - znaky","definition":"Objektívne zobrazovanie skutočnosti, kritika spoločnosti, bežný človek ako hrdina, dôraz na sociálne podmienky.","zadanie":28,"kategoria":"Literatúra"},{"term":"Chrám Matky Božej v Paríži","definition":"Victor Hugo - romantický román. Quasimodo (hluchý zvonár), Esmeralda (cigánka), Frollo (kňaz). Stredoveký Paríž.","zadanie":28,"kategoria":"Literatúra"},{"term":"Zločin a trest","definition":"Dostojevskij - psychologický román. Raskoľnikov zavraždí starenku, prežíva výčitky, nakoniec sa prizná. Téma: morálka, vina, trest.","zadanie":28,"kategoria":"Literatúra"},{"term":"Jazykové slovníky - druhy","definition":"Výkladový (KSSJ), pravopisný (PSP), synonymický, frazeologický, terminologický, prekladový, etymologický, cudzích slov, nárečový.","zadanie":29,"kategoria":"Jazyk"},{"term":"Pravidlá slovenského pravopisu (PSP)","definition":"Kodifikačná príručka - pravidlá písania, výslovnosti, gramatiky. Obsahuje aj slovník.","zadanie":29,"kategoria":"Jazyk"},{"term":"Existencializmus","definition":"Filozoficko-lit. smer 20. stor. - človek je osamotený, sloboda = zodpovednosť, absurdita existencie. Sartre, Camus.","zadanie":29,"kategoria":"Literatúra"},{"term":"Múr (Sartre)","definition":"J. P. Sartre - existencialistická poviedka. Pablo Ibbieta čaká na popravu počas občianskej vojny.","zadanie":29,"kategoria":"Literatúra"},{"term":"Hlava XXII","definition":"Joseph Heller - satirický román. Bombardér Yossarian v 2. svet. vojne. Catch-22: paragraf, ktorý nemožno obísť (chceš byť uznaný za blázna = si normálny).","zadanie":29,"kategoria":"Literatúra"},{"term":"1984","definition":"George Orwell - dystopický román. Totalitný režim, Veľký brat ťa pozoruje. Winston Smith - hlavný hrdina. Newspeak, doublethink.","zadanie":29,"kategoria":"Literatúra"},{"term":"Náučný štýl","definition":"Funkcia: poučiť, vysvetliť. Znaky: objektivita, presnosť, odborná terminológia, logická stavba, výkladový postup.","zadanie":30,"kategoria":"Jazyk"},{"term":"Formy logického myslenia","definition":"Dedukcia (zo všeobecného k jednotlivému), indukcia (z jednotlivého k všeobecnému), analýza (rozklad), syntéza (zlúčenie), komparácia (porovnanie), analógia (podobnosť).","zadanie":30,"kategoria":"Jazyk"},{"term":"Citácia vs. parafráza","definition":"Presná citácia: doslovné prevzatie (úvodzovky). Voľná citácia: parafrázovanie bez úvodzoviek. Parafráza: vyjadrenie myšlienky vlastnými slovami.","zadanie":30,"kategoria":"Jazyk"},{"term":"Poézia vs. próza","definition":"Poézia: viazaná reč (verš, rytmus, rým). Próza: voľná reč (vety, odseky, dejová línia).","zadanie":30,"kategoria":"Literatúra"},{"term":"Fantastická literatúra","definition":"Žáner využívajúci nadprirodzené prvky, mágiu, mýty, fantastické svety. Príklad: Harry Potter (Rowlingová), Pán prsteňov (Tolkien).","zadanie":30,"kategoria":"Literatúra"},{"term":"Vedecko-fantastická lit. (sci-fi)","definition":"Žáner založený na vedeckých hypotézach budúcnosti - vesmírne cesty, technológia, robotika. Príklad: Verne, Asimov, Capek.","zadanie":30,"kategoria":"Literatúra"},{"term":"Malý princ","definition":"Antoine de Saint-Exupéry - filozofická rozprávka. Princ z planéty B-612, líška: \"Správne vidíme len srdcom.\" Téma: priateľstvo, zodpovednosť.","zadanie":30,"kategoria":"Literatúra"}],"quiz":[{"q":"Kto napísal Mor ho!?","options":["Samo Chalupka","Janko Kráľ","Ján Botto","Andrej Sládkovič"],"correct":0,"zadanie":1},{"q":"Aký veršový systém má dielo Valaská škola mravov stodola?","options":["sylabicko-tonický","sylabický (12-veršová strofa, 14 slabík)","časomerný","voľný verš"],"correct":1,"zadanie":1},{"q":"Kto je predstaviteľ slovenského symbolizmu?","options":["Hviezdoslav","Ivan Krasko","Janko Kráľ","Štúr"],"correct":1,"zadanie":8},{"q":"Čo charakterizuje sonet?","options":["8 veršov","10 veršov","14 veršov","20 veršov"],"correct":2,"zadanie":8},{"q":"Bernolák kodifikoval slovenčinu v roku:","options":["1787","1843","1852","1918"],"correct":0,"zadanie":12},{"q":"Štúr kodifikoval spisovnú slovenčinu v roku:","options":["1787","1843","1852","1918"],"correct":1,"zadanie":12},{"q":"Aký bol Bernolákov základ
