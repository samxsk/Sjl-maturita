":2},{"q":"Profesionalizmus \"deckár\" znamená:","options":["dieťa","učiteľ","detský lekár","rodič"],"correct":2,"zadanie":2},{"q":"Najstarší Štúrovec je:","options":["Janko Kráľ","Samo Chalupka","Ján Botto","Andrej Sládkovič"],"correct":1,"zadanie":1},{"q":"Hrdina v Mor ho! je:","options":["jednotlivec - Mor","rímsky cár","kolektívny - slovenskí junáci","Devín"],"correct":2,"zadanie":1},{"q":"Antigona je dielom autora:","options":["Sofokles","Aischylos","Euripides","Aristofanes"],"correct":0,"zadanie":23},{"q":"Hamletov známy monológ je:","options":["\"Veni vidi vici\"","\"Byť či nebyť\"","\"Mor ho\"","\"Šťastnú cestu\""],"correct":1,"zadanie":23},{"q":"Decameron obsahuje:","options":["10 noviel","50 noviel","100 noviel","1000 noviel"],"correct":2,"zadanie":26},{"q":"Proglas napísal:","options":["Metod","Konštantín (Cyril)","Rastislav","Svätopluk"],"correct":1,"zadanie":26},{"q":"Pán Aduš je postava z diela:","options":["Maco Mlieč","Keď báčik z Chochoľova umrie","Apoliena","Mamka Pôstková"],"correct":1,"zadanie":3},{"q":"Holden Caulfield je hrdina diela:","options":["Vytie","Kto chytá v žite","Hlava XXII","1984"],"correct":1,"zadanie":25},{"q":"Krvavé sonety napísal:","options":["Hviezdoslav","Krasko","Smrek","Kollár"],"correct":0,"zadanie":4},{"q":"Eva Marčáková je postava z drámy:","options":["Antigona","Bačova žena","Matka","Kým kohút nezaspieva"],"correct":1,"zadanie":17},{"q":"Drak (Martin Lepiš) je postava z diela:","options":["Tri gaštanové kone","Drak sa vracia","Malka","Živý bič"],"correct":1,"zadanie":16},{"q":"Yossarian je hrdina diela:","options":["Múr","Hlava XXII","1984","Vytie"],"correct":1,"zadanie":29},{"q":"\"Správne vidíme len srdcom\" je citát z:","options":["Harry Potter","Malý princ","Don Quijote","Decameron"],"correct":1,"zadanie":30},{"q":"Augmentatívum je:","options":["zmenšujúce slovo","zveličujúce slovo (psisko, dlhočizný)","lichotivé slovo","hanlivé slovo"],"correct":1,"zadanie":2}]}</script>

<!-- APP CONTAINER -->
<div id="app" class="min-h-screen pb-24"></div>

<script>
"use strict";

// Load data
const DATA = JSON.parse(document.getElementById('data-blob').textContent);

// State
const STATE = {
  view: 'home', // home | zadanie | flashcards | quiz | stats
  currentZadanie: null,
  flashcardsFilter: 'all', // all | Jazyk | Literatúra | zadanie_N
  fcIndex: 0,
  fcFlipped: false,
  quizMode: 'random', // random | by-zadanie
  quizIndex: 0,
  quizAnswered: false,
  quizSelected: null,
  quizScore: 0,
  quizTotal: 0,
  quizDeck: [],
};

// Persistence
const STORAGE_KEYS = {
  done: 'maturita_done',           // {1: true, 2: true, ...}
  fcKnown: 'maturita_fc_known',    // {term: 1 (known) | -1 (struggling)}
  quizStats: 'maturita_quiz_stats', // {correct: N, total: N, byZadanie: {1: {c, t}}}
};

async function loadProgress(){
  try {
    const done = await window.storage?.get(STORAGE_KEYS.done);
    const fcKnown = await window.storage?.get(STORAGE_KEYS.fcKnown);
    const quizStats = await window.storage?.get(STORAGE_KEYS.quizStats);
    return {
      done: done ? JSON.parse(done.value) : {},
      fcKnown: fcKnown ? JSON.parse(fcKnown.value) : {},
      quizStats: quizStats ? JSON.parse(quizStats.value) : {correct:0, total:0, byZadanie:{}},
    };
  } catch(e){
    return {done:{}, fcKnown:{}, quizStats:{correct:0, total:0, byZadanie:{}}};
  }
}

async function saveProgress(){
  try {
    await window.storage?.set(STORAGE_KEYS.done, JSON.stringify(PROGRESS.done));
    await window.storage?.set(STORAGE_KEYS.fcKnown, JSON.stringify(PROGRESS.fcKnown));
    await window.storage?.set(STORAGE_KEYS.quizStats, JSON.stringify(PROGRESS.quizStats));
  } catch(e){
    console.warn('Storage save failed', e);
  }
}

let PROGRESS = {done:{}, fcKnown:{}, quizStats:{correct:0, total:0, byZadanie:{}}};

// ============ UTILITIES ============

function shuffle(arr){
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Render full markdown-ish content (from data)
function renderFullContent(text){
  if(!text) return '<p class="text-gray-500">Obsah nie je dostupný.</p>';
  
  const lines = text.split('\n');
  let html = '';
  let inQuestion = false;
  
  for (let raw of lines){
    let line = raw.trim();
    if (!line){ continue; }
    
    // Identifikuj nadpisy uloh
    if (/^Úloha č\.\s*\d/i.test(line)){
      html += `<div class="heading">📌 ${escapeHtml(line)}</div>`;
      continue;
    }
    
    // Citaty/otazky končiace .: alebo začínajúce sa s Vysvetlite, Charakterizujte...
    const questionStart = /^(Vysvetlite|Charakterizujte|Porovnajte|Analyzujte|Rozoberte|Definujte|Nájdite|Určite|Pomenujte|Zaraďte|Uveďte|Identifikujte|Vymenujte|Vyhľadajte|Priraďte|Vytvorte|Doplňte|Opravte|Adresujte|Predstavte|Pripravte|Vyjadrite|Poukážte|Zhodnoťte|Objasnite|Zarecitujte|Vysvetli)/i.test(line);
    
    if (questionStart && line.length < 300){
      html += `<div class="question">❓ ${escapeHtml(line)}</div>`;
      continue;
    }
    
    // Sub-headings - line končiaca dvojbodkou
    if (line.endsWith(':') && line.length < 70 && !/[,.!?]/.test(line.slice(0,-1))){
      html += `<div class="sub-heading">${escapeHtml(line)}</div>`;
      continue;
    }
    
    // Začína - ?
    if (line.startsWith('- ')){
      html += `<div class="bullet">${escapeHtml(line.slice(2))}</div>`;
      continue;
    }
    
    // Bežný odsek
    html += `<p>${escapeHtml(line)}</p>`;
  }
  
  return html;
}

function escapeHtml(s){
  return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

// ============ ROUTER / RENDER ============

function render(){
  const app = document.getElementById('app');
  
  switch(STATE.view){
    case 'home': app.innerHTML = renderHome(); break;
    case 'zadanie': app.innerHTML = renderZadanie(); break;
    case 'flashcards': app.innerHTML = renderFlashcards(); break;
    case 'quiz': app.innerHTML = renderQuiz(); break;
    case 'stats': app.innerHTML = renderStats(); break;
  }
  
  // Render bottom nav (mobile)
  renderBottomNav();
  
  // Re-bind events
  bindEvents();
  
  // Scroll top on view change
  window.scrollTo({top:0, behavior:'instant'});
}

function bindEvents(){
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', handleAction);
  });
}

function handleAction(e){
  const action = e.currentTarget.dataset.action;
  const arg = e.currentTarget.dataset.arg;
  
  switch(action){
    case 'go':
      STATE.view = arg;
      if (arg === 'flashcards') { STATE.fcIndex = 0; STATE.fcFlipped = false; }
      if (arg === 'quiz') initQuizDeck();
      render();
      break;
    case 'open-zadanie':
      STATE.currentZadanie = parseInt(arg);
      STATE.view = 'zadanie';
      render();
      break;
    case 'toggle-done':
      PROGRESS.done[arg] = !PROGRESS.done[arg];
      saveProgress();
      render();
      break;
    case 'fc-flip':
      STATE.fcFlipped = !STATE.fcFlipped;
      render();
      break;
    case 'fc-next':
      const deck = getFcDeck();
      STATE.fcIndex = (STATE.fcIndex + 1) % deck.length;
      STATE.fcFlipped = false;
      render();
      break;
    case 'fc-prev':
      const deck2 = getFcDeck();
      STATE.fcIndex = (STATE.fcIndex - 1 + deck2.length) % deck2.length;
      STATE.fcFlipped = false;
      render();
      break;
    case 'fc-known':
      const fcDeck = getFcDeck();
      if (fcDeck.length){
        const term = fcDeck[STATE.fcIndex].term;
        PROGRESS.fcKnown[term] = 1;
        saveProgress();
        STATE.fcIndex = (STATE.fcIndex + 1) % fcDeck.length;
        STATE.fcFlipped = false;
        render();
      }
      break;
    case 'fc-struggle':
      const fcDeck2 = getFcDeck();
      if (fcDeck2.length){
        const term = fcDeck2[STATE.fcIndex].term;
        PROGRESS.fcKnown[term] = -1;
        saveProgress();
        STATE.fcIndex = (STATE.fcIndex + 1) % fcDeck2.length;
        STATE.fcFlipped = false;
        render();
      }
      break;
    case 'fc-filter':
      STATE.flashcardsFilter = arg;
      STATE.fcIndex = 0;
      STATE.fcFlipped = false;
      render();
      break;
    case 'quiz-answer':
      handleQuizAnswer(parseInt(arg));
      break;
    case 'quiz-next':
      STATE.quizIndex++;
      STATE.quizAnswered = false;
      STATE.quizSelected = null;
      if (STATE.quizIndex >= STATE.quizDeck.length){
        initQuizDeck();
      }
      render();
      break;
    case 'quiz-restart':
      initQuizDeck();
      render();
      break;
    case 'reset-stats':
      if (confirm('Naozaj chceš vymazať všetok pokrok?')){
        PROGRESS = {done:{}, fcKnown:{}, quizStats:{correct:0, total:0, byZadanie:{}}};
        saveProgress();
        render();
      }
      break;
    case 'random-zadanie':
      const r = Math.floor(Math.random()*30)+1;
      STATE.currentZadanie = r;
      STATE.view = 'zadanie';
      render();
      break;
  }
}

function getFcDeck(){
  let deck = DATA.flashcards;
  if (STATE.flashcardsFilter === 'Jazyk') deck = deck.filter(c => c.kategoria === 'Jazyk');
  else if (STATE.flashcardsFilter === 'Literatúra') deck = deck.filter(c => c.kategoria === 'Literatúra');
  else if (STATE.flashcardsFilter === 'struggling'){
    deck = deck.filter(c => PROGRESS.fcKnown[c.term] === -1);
  } else if (STATE.flashcardsFilter === 'new'){
    deck = deck.filter(c => !PROGRESS.fcKnown[c.term]);
  } else if (typeof STATE.flashcardsFilter === 'string' && STATE.flashcardsFilter.startsWith('z')){
    const num = parseInt(STATE.flashcardsFilter.slice(1));
    deck = deck.filter(c => c.zadanie === num);
  }
  return deck;
}

function initQuizDeck(){
  STATE.quizDeck = shuffle(DATA.quiz);
  STATE.quizIndex = 0;
  STATE.quizAnswered = false;
  STATE.quizSelected = null;
}

function handleQuizAnswer(idx){
  if (STATE.quizAnswered) return;
  STATE.quizAnswered = true;
  STATE.quizSelected = idx;
  const q = STATE.quizDeck[STATE.quizIndex];
  const correct = idx === q.correct;
  
  PROGRESS.quizStats.total++;
  if (correct) PROGRESS.quizStats.correct++;
  
  if (q.zadanie){
    const z = q.zadanie;
    if (!PROGRESS.quizStats.byZadanie[z]) PROGRESS.quizStats.byZadanie[z] = {c:0, t:0};
    PROGRESS.quizStats.byZadanie[z].t++;
    if (correct) PROGRESS.quizStats.byZadanie[z].c++;
  }
  
  saveProgress();
  render();
}

// ============ VIEWS ============

function renderHome(){
  const doneCount = Object.values(PROGRESS.done).filter(Boolean).length;
  const fcKnownCount = Object.values(PROGRESS.fcKnown).filter(v => v === 1).length;
  const totalFc = DATA.flashcards.length;
  const quizAcc = PROGRESS.quizStats.total > 0 
    ? Math.round((PROGRESS.quizStats.correct / PROGRESS.quizStats.total) * 100)
    : 0;
  
  // Progress ring
  const circ = 2 * Math.PI * 32;
  const progress = doneCount / 30;
  const offset = circ - (circ * progress);
  
  return `
  <div class="anim-in">
    <!-- Header -->
    <header class="px-5 pt-8 pb-6">
      <div class="flex items-start justify-between mb-1">
        <div>
          <div class="mono text-[11px] tracking-widest text-[var(--muted)] uppercase mb-1">Maturita 2026 · SJL</div>
          <h1 class="serif text-[44px] font-black leading-[0.95] tracking-tight">30 zadaní<br><span class="italic font-light text-[var(--accent)]">jeden týždeň.</span></h1>
        </div>
        <div class="relative w-[72px] h-[72px] flex-shrink-0">
          <svg viewBox="0 0 72 72" class="w-full h-full -rotate-90">
            <circle cx="36" cy="36" r="32" fill="none" stroke="var(--line)" stroke-width="4"/>
            <circle cx="36" cy="36" r="32" fill="none" stroke="var(--accent)" stroke-width="4" 
              stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round" class="ring"/>
          </svg>
          <div class="absolute inset-0 flex flex-col items-center justify-center">
            <div class="serif text-xl font-black leading-none">${doneCount}</div>
            <div class="mono text-[9px] text-[var(--muted)]">/ 30</div>
          </div>
        </div>
      </div>
    </header>
    
    <!-- Quick actions -->
    <div class="px-5 mb-6">
      <div class="grid grid-cols-2 gap-2.5">
        <button data-action="go" data-arg="flashcards" class="paper rounded-2xl p-4 text-left btn-ghost group">
          <div class="text-2xl mb-1">🎴</div>
          <div class="serif font-bold text-[15px] leading-tight">Kartičky</div>
          <div class="mono text-[10px] text-[var(--muted)] mt-1">${fcKnownCount}/${totalFc} naučených</div>
        </button>
        <button data-action="go" data-arg="quiz" class="paper rounded-2xl p-4 text-left btn-ghost">
          <div class="text-2xl mb-1">⚡</div>
          <div class="serif font-bold text-[15px] leading-tight">Kvíz</div>
          <div class="mono text-[10px] text-[var(--muted)] mt-1">${quizAcc}% úspešnosť</div>
        </button>
        <button data-action="random-zadanie" class="paper rounded-2xl p-4 text-left btn-ghost">
          <div class="text-2xl mb-1">🎲</div>
          <div class="serif font-bold text-[15px] leading-tight">Náhodné</div>
          <div class="mono text-[10px] text-[var(--muted)] mt-1">simuluj ťahanie</div>
        </button>
        <button data-action="go" data-arg="stats" class="paper rounded-2xl p-4 text-left btn-ghost">
          <div class="text-2xl mb-1">📊</div>
          <div class="serif font-bold text-[15px] leading-tight">Štatistiky</div>
          <div class="mono text-[10px] text-[var(--muted)] mt-1">tvoj progres</div>
        </button>
      </div>
    </div>
    
    <!-- All zadania -->
    <div class="px-5">
      <div class="flex items-baseline justify-between mb-3">
        <h2 class="serif text-xl font-bold">Všetkých 30 zadaní</h2>
        <div class="mono text-[10px] text-[var(--muted)]">tap pre detail</div>
      </div>
      <div class="space-y-2">
        ${Array.from({length:30}, (_,i) => i+1).map(num => {
          const z = DATA.zadania[String(num)];
          if (!z) return '';
          const isDone = PROGRESS.done[num];
          return `
          <button data-action="open-zadanie" data-arg="${num}" class="paper rounded-xl px-4 py-3 w-full text-left flex items-center gap-3 btn-ghost ${isDone ? 'opacity-90' : ''}">
            <div class="num-badge w-8 text-3xl ${isDone ? 'text-[var(--ok)]' : 'text-[var(--accent)]'}">${num}</div>
            <div class="flex-1 min-w-0">
              <div class="flex flex-wrap items-center gap-1.5 mb-1">
                <span class="tag tag-jazyk">jazyk</span>
                <span class="text-[13px] font-medium truncate">${escapeHtml(z.tema_jazyk)}</span>
              </div>
              <div class="flex flex-wrap items-center gap-1.5">
                <span class="tag tag-lit">literatúra</span>
                <span class="text-[13px] font-medium truncate text-[var(--accent-2)]">${escapeHtml(z.tema_lit)}</span>
              </div>
            </div>
            ${isDone ? '<div class="text-[var(--ok)] text-lg">✓</div>' : '<div class="text-[var(--muted)] text-lg">›</div>'}
          </button>`;
        }).join('')}
      </div>
    </div>
    
    <div class="px-5 pt-8 pb-6">
      <div class="paper rounded-2xl p-5 text-center">
        <div class="serif italic text-[var(--accent-2)] text-sm leading-relaxed">
          „Bez práce nie sú koláče."<br>
          <span class="mono not-italic text-[10px] text-[var(--muted)] uppercase tracking-widest mt-2 block">ľudové príslovie · Zadanie 21</span>
        </div>
      </div>
    </div>
  </div>`;
}

function renderZadanie(){
  const num = STATE.currentZadanie;
  const z = DATA.zadania[String(num)];
  if (!z) return '<div class="p-5">Zadanie nenájdené.</div>';
  
  const isDone = !!PROGRESS.done[num];
  
  return `
  <div class="anim-in">
    <header class="px-5 pt-6 pb-4 sticky top-0 bg-[var(--bg)] z-20 border-b border-[var(--line)]">
      <div class="flex items-center justify-between mb-2">
        <button data-action="go" data-arg="home" class="text-sm flex items-center gap-1 text-[var(--muted)] btn-ghost px-2 py-1 rounded-md">
          ← Späť
        </button>
        <button data-action="toggle-done" data-arg="${num}" 
          class="text-xs px-3 py-1.5 rounded-full ${isDone ? 'bg-[var(--ok)] text-white' : 'paper'}">
          ${isDone ? '✓ Naučené' : '○ Označiť ako naučené'}
        </button>
      </div>
      <div class="flex items-baseline gap-3">
        <div class="num-badge text-[68px] leading-none text-[var(--accent)]">${num}</div>
        <div class="flex-1 pb-1">
          <div class="mono text-[10px] tracking-widest text-[var(--muted)] uppercase">Zadanie</div>
          <div class="serif text-[15px] font-semibold leading-tight">${escapeHtml(z.okruh_jazyk)} <span class="text-[var(--muted)]">·</span> ${escapeHtml(z.okruh_lit)}</div>
        </div>
      </div>
    </header>
    
    <!-- Quick summary -->
    <div class="px-5 py-5 paper mx-5 mt-4 rounded-2xl">
      <div class="space-y-3">
        <div>
          <div class="flex items-center gap-2 mb-1.5">
            <span class="tag tag-jazyk">úloha 1 · jazyk/sloh</span>
          </div>
          <div class="serif text-base font-semibold">${escapeHtml(z.tema_jazyk)}</div>
        </div>
        <div class="divider"></div>
        <div>
          <div class="flex items-center gap-2 mb-1.5">
            <span class="tag tag-lit">úloha 2 · literatúra</span>
          </div>
          <div class="serif text-base font-semibold text-[var(--accent-2)]">${escapeHtml(z.tema_lit)}</div>
          <div class="mt-2 mono text-[11px] text-[var(--muted)]">
            <div><span class="opacity-60">autori:</span> ${z.autori.map(escapeHtml).join(' · ')}</div>
            <div><span class="opacity-60">diela:</span> ${z.diela.map(escapeHtml).join(' · ')}</div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Full content -->
    <div class="px-5 py-5">
      <div class="paper rounded-2xl p-5">
        <div class="flex items-center gap-2 mb-3 pb-3 border-b border-[var(--line)]">
          <div class="text-lg">📚</div>
          <div class="serif font-bold text-[15px]">Vypracovanie</div>
        </div>
        <div class="content-prose">
          ${renderFullContent(z.full)}
        </div>
      </div>
    </div>
    
    <!-- Quick navigation -->
    <div class="px-5 pb-8">
      <div class="grid grid-cols-2 gap-2">
        ${num > 1 ? `<button data-action="open-zadanie" data-arg="${num-1}" class="paper rounded-xl py-3 px-4 text-left btn-ghost">
          <div class="mono text-[10px] text-[var(--muted)]">predošlé</div>
          <div class="serif font-semibold text-sm">← Zadanie ${num-1}</div>
        </button>` : '<div></div>'}
        ${num < 30 ? `<button data-action="open-zadanie" data-arg="${num+1}" class="paper rounded-xl py-3 px-4 text-right btn-ghost">
          <div class="mono text-[10px] text-[var(--muted)]">ďalšie</div>
          <div class="serif font-semibold text-sm">Zadanie ${num+1} →</div>
        </button>` : '<div></div>'}
      </div>
    </div>
  </div>`;
}

function renderFlashcards(){
  const deck = getFcDeck();
  
  if (deck.length === 0){
    return `
    <div class="anim-in px-5 pt-6">
      <header class="mb-5">
        <button data-action="go" data-arg="home" class="text-sm text-[var(--muted)] btn-ghost px-2 py-1 rounded-md inline-block mb-3">← Späť</button>
        <h1 class="serif text-3xl font-black">Kartičky</h1>
      </header>
      ${renderFcFilters()}
      <div class="paper rounded-2xl p-8 text-center mt-4">
        <div class="text-4xl mb-3">🎉</div>
        <div class="serif font-bold text-lg mb-2">Žiadne kartičky</div>
        <div class="text-sm text-[var(--muted)]">Filter nemá žiadne kartičky. Skús iný.</div>
      </div>
    </div>`;
  }
  
  const card = deck[STATE.fcIndex];
  const status = PROGRESS.fcKnown[card.term];
  
  return `
  <div class="anim-in px-5 pt-6">
    <header class="mb-4">
      <button data-action="go" data-arg="home" class="text-sm text-[var(--muted)] btn-ghost px-2 py-1 rounded-md inline-block mb-3">← Späť</button>
      <div class="flex items-baseline justify-between">
        <h1 class="serif text-3xl font-black">Kartičky</h1>
        <div class="mono text-xs text-[var(--muted)]">${STATE.fcIndex+1} / ${deck.length}</div>
      </div>
    </header>
    
    ${renderFcFilters()}
    
    <!-- Card -->
    <div class="fc-container my-5" style="height:380px">
      <div class="fc-inner ${STATE.fcFlipped ? 'fc-flipped' : ''}" data-action="fc-flip" style="cursor:pointer">
        <!-- Front -->
        <div class="fc-face paper rounded-3xl p-6 flex flex-col">
          <div class="deco-quote">"</div>
          <div class="flex items-start justify-between mb-3 relative z-10">
            <span class="tag ${card.kategoria === 'Jazyk' ? 'tag-jazyk' : 'tag-lit'}">${escapeHtml(card.kategoria)} · zadanie ${card.zadanie}</span>
            ${status === 1 ? '<span class="tag tag-done">✓ vieš</span>' : ''}
            ${status === -1 ? '<span class="tag" style="background:#f9e4d4;color:var(--err)">🤔 opakuj</span>' : ''}
          </div>
          <div class="flex-1 flex items-center justify-center text-center relative z-10">
            <div class="serif text-3xl font-bold leading-tight tracking-tight">${escapeHtml(card.term)}</div>
          </div>
          <div class="text-center mono text-[10px] text-[var(--muted)] uppercase tracking-widest">Tap pre odpoveď</div>
        </div>
        <!-- Back -->
        <div class="fc-face fc-back paper rounded-3xl p-6 flex flex-col" style="background:#fef4e6">
          <div class="flex items-start justify-between mb-3">
            <span class="tag ${card.kategoria === 'Jazyk' ? 'tag-jazyk' : 'tag-lit'}">${escapeHtml(card.term)}</span>
          </div>
          <div class="flex-1 flex items-center text-center overflow-y-auto scrollbar-thin">
            <div class="content-prose w-full text-[15px]" style="line-height:1.55">${escapeHtml(card.definition)}</div>
          </div>
          <div class="text-center mono text-[10px] text-[var(--muted)] uppercase tracking-widest">Tap pre otázku</div>
        </div>
      </div>
    </div>
    
    <!-- Controls -->
    <div class="grid grid-cols-4 gap-2">
      <button data-action="fc-prev" class="paper rounded-xl py-3 btn-ghost text-sm">←</button>
      <button data-action="fc-struggle" class="rounded-xl py-3 text-sm font-medium" style="background:#f9e4d4;color:var(--err)">🤔 opakuj</button>
      <button data-action="fc-known" class="rounded-xl py-3 text-sm font-medium" style="background:#d9e7d6;color:var(--ok)">✓ viem</button>
      <button data-action="fc-next" class="paper rounded-xl py-3 btn-ghost text-sm">→</button>
    </div>
  </div>`;
}

function renderFcFilters(){
  const filters = [
    {k:'all', l:'všetky'},
    {k:'Jazyk', l:'jazyk'},
    {k:'Literatúra', l:'literatúra'},
    {k:'struggling', l:'🤔 opakovať'},
    {k:'new', l:'nové'},
  ];
  return `
    <div class="flex gap-1.5 overflow-x-auto scrollbar-thin pb-2 -mx-1 px-1">
      ${filters.map(f => `
        <button data-action="fc-filter" data-arg="${f.k}" class="mono text-[11px] uppercase tracking-wider px-3 py-1.5 rounded-full whitespace-nowrap ${STATE.flashcardsFilter === f.k ? 'btn-active' : 'paper'}">${f.l}</button>
      `).join('')}
    </div>`;
}

function renderQuiz(){
  if (!STATE.quizDeck || STATE.quizDeck.length === 0) initQuizDeck();
  
  const q = STATE.quizDeck[STATE.quizIndex];
  const acc = PROGRESS.quizStats.total > 0 
    ? Math.round((PROGRESS.quizStats.correct / PROGRESS.quizStats.total) * 100)
    : 0;
  
  return `
  <div class="anim-in px-5 pt-6">
    <header class="mb-4">
      <button data-action="go" data-arg="home" class="text-sm text-[var(--muted)] btn-ghost px-2 py-1 rounded-md inline-block mb-3">← Späť</button>
      <div class="flex items-baseline justify-between">
        <h1 class="serif text-3xl font-black">Kvíz</h1>
        <div class="mono text-xs text-[var(--muted)]">${STATE.quizIndex+1} / ${STATE.quizDeck.length}</div>
      </div>
      <div class="flex items-center gap-3 mt-2">
        <div class="flex-1 h-1.5 bg-[var(--line)] rounded-full overflow-hidden">
          <div class="h-full bg-[var(--accent)]" style="width:${(STATE.quizIndex/STATE.quizDeck.length)*100}%"></div>
        </div>
        <div class="mono text-[11px] text-[var(--muted)]">${acc}% úspešnosť</div>
      </div>
    </header>
    
    <div class="paper rounded-2xl p-5 my-4 anim-scale">
      <div class="mono text-[10px] text-[var(--muted)] uppercase tracking-widest mb-3">Zadanie ${q.zadanie || '?'}</div>
      <div class="serif text-lg font-bold leading-snug mb-5">${escapeHtml(q.q)}</div>
      
      <div class="space-y-2">
        ${q.options.map((opt, i) => {
          let cls = 'paper';
          if (STATE.quizAnswered){
            if (i === q.correct) cls = 'quiz-opt correct';
            else if (i === STATE.quizSelected) cls = 'quiz-opt wrong';
            else cls = 'paper disabled opacity-60';
          } else {
            cls = 'paper quiz-opt';
          }
          return `
            <button data-action="quiz-answer" data-arg="${i}" class="${cls} rounded-xl px-4 py-3 w-full text-left text-sm flex items-center gap-3">
              <div class="mono text-xs w-5 text-[var(--muted)]">${String.fromCharCode(65+i)}</div>
              <div class="flex-1">${escapeHtml(opt)}</div>
              ${STATE.quizAnswered && i === q.correct ? '<div class="text-lg">✓</div>' : ''}
              ${STATE.quizAnswered && i === STATE.quizSelected && i !== q.correct ? '<div class="text-lg">✗</div>' : ''}
            </button>
          `;
        }).join('')}
      </div>
    </div>
    
    ${STATE.quizAnswered ? `
      <button data-action="quiz-next" class="w-full rounded-2xl py-4 bg-[var(--ink)] text-[var(--paper)] serif font-bold text-base anim-in">
        ${STATE.quizIndex + 1 >= STATE.quizDeck.length ? 'Začať odznova ↻' : 'Ďalšia otázka →'}
      </button>
    ` : ''}
    
    <div class="mt-4 flex justify-center">
      <button data-action="quiz-restart" class="mono text-[11px] text-[var(--muted)] underline">premiešať otázky</button>
    </div>
  </div>`;
}

function renderStats(){
  const doneCount = Object.values(PROGRESS.done).filter(Boolean).length;
  const fcStats = {
    known: Object.values(PROGRESS.fcKnown).filter(v => v === 1).length,
    struggle: Object.values(PROGRESS.fcKnown).filter(v => v === -1).length,
    total: DATA.flashcards.length,
  };
  const quiz = PROGRESS.quizStats;
  const acc = quiz.total > 0 ? Math.round((quiz.correct / quiz.total) * 100) : 0;
  
  return `
  <div class="anim-in px-5 pt-6">
    <header class="mb-5">
      <button data-action="go" data-arg="home" class="text-sm text-[var(--muted)] btn-ghost px-2 py-1 rounded-md inline-block mb-3">← Späť</button>
      <h1 class="serif text-3xl font-black">Štatistiky</h1>
    </header>
    
    <!-- Hlavné štatistiky -->
    <div class="paper rounded-2xl p-5 mb-3">
      <div class="serif font-bold mb-3 text-sm uppercase tracking-wider text-[var(--muted)]">📚 Zadania</div>
      <div class="flex items-baseline gap-2">
        <div class="num-badge text-5xl text-[var(--accent)]">${doneCount}</div>
        <div class="mono text-sm text-[var(--muted)]">/ 30 naučených</div>
      </div>
      <div class="mt-3 h-2 bg-[var(--line)] rounded-full overflow-hidden">
        <div class="h-full bg-[var(--accent)]" style="width:${(doneCount/30)*100}%"></div>
      </div>
      <div class="mt-2 mono text-[11px] text-[var(--muted)]">${Math.round((doneCount/30)*100)}% hotovo</div>
    </div>
    
    <div class="paper rounded-2xl p-5 mb-3">
      <div class="serif font-bold mb-3 text-sm uppercase tracking-wider text-[var(--muted)]">🎴 Kartičky</div>
      <div class="grid grid-cols-3 gap-3">
        <div>
          <div class="num-badge text-3xl text-[var(--ok)]">${fcStats.known}</div>
          <div class="mono text-[10px] text-[var(--muted)] uppercase">naučených</div>
        </div>
        <div>
          <div class="num-badge text-3xl text-[var(--err)]">${fcStats.struggle}</div>
          <div class="mono text-[10px] text-[var(--muted)] uppercase">opakovať</div>
        </div>
        <div>
          <div class="num-badge text-3xl text-[var(--muted)]">${fcStats.total - fcStats.known - fcStats.struggle}</div>
          <div class="mono text-[10px] text-[var(--muted)] uppercase">nové</div>
        </div>
      </div>
    </div>
    
    <div class="paper rounded-2xl p-5 mb-5">
      <div class="serif font-bold mb-3 text-sm uppercase tracking-wider text-[var(--muted)]">⚡ Kvíz</div>
      <div class="flex items-baseline gap-2">
        <div class="num-badge text-5xl ${acc >= 70 ? 'text-[var(--ok)]' : acc >= 40 ? 'text-[var(--gold)]' : 'text-[var(--err)]'}">${acc}%</div>
        <div class="mono text-sm text-[var(--muted)]">${quiz.correct} z ${quiz.total} správne</div>
      </div>
    </div>
    
    <!-- Po zadaní -->
    <div class="paper rounded-2xl p-5 mb-5">
      <div class="serif font-bold mb-3 text-sm uppercase tracking-wider text-[var(--muted)]">Stav podľa zadania</div>
      <div class="grid grid-cols-5 gap-1.5">
        ${Array.from({length:30}, (_,i) => {
          const num = i+1;
          const isDone = PROGRESS.done[num];
          const zStats = quiz.byZadanie[num];
          let cls = 'bg-[var(--line)] text-[var(--muted)]';
          if (isDone) cls = 'bg-[var(--ok)] text-white';
          else if (zStats && zStats.t > 0) cls = 'bg-[var(--gold)] text-white opacity-80';
          return `<button data-action="open-zadanie" data-arg="${num}" class="${cls} rounded-lg py-2 mono text-xs font-semibold">${num}</button>`;
        }).join('')}
      </div>
      <div class="mt-3 flex gap-3 mono text-[10px] text-[var(--muted)]">
        <span><span class="inline-block w-2 h-2 bg-[var(--ok)] rounded-full mr-1 align-middle"></span>naučené</span>
        <span><span class="inline-block w-2 h-2 bg-[var(--gold)] opacity-80 rounded-full mr-1 align-middle"></span>v progrese</span>
        <span><span class="inline-block w-2 h-2 bg-[var(--line)] rounded-full mr-1 align-middle"></span>nezačaté</span>
      </div>
    </div>
    
    <div class="mb-8">
      <button data-action="reset-stats" class="w-full text-center mono text-xs text-[var(--err)] underline py-2">vymazať celý pokrok</button>
    </div>
  </div>`;
}

function renderBottomNav(){
  // Odstránime existujúcu navigáciu
  document.querySelectorAll('#bottom-nav').forEach(el => el.remove());
  
  const items = [
    {v:'home', i:'⌂', l:'domov'},
    {v:'flashcards', i:'🎴', l:'kartičky'},
    {v:'quiz', i:'⚡', l:'kvíz'},
    {v:'stats', i:'📊', l:'štat.'},
  ];
  
  const nav = document.createElement('nav');
  nav.id = 'bottom-nav';
  nav.className = 'bottom-nav fixed bottom-0 left-0 right-0 bg-[var(--bg)] py-2 px-3 z-50';
  nav.innerHTML = `
    <div class="flex justify-around max-w-md mx-auto">
      ${items.map(it => `
        <button data-action="go" data-arg="${it.v}" class="flex flex-col items-center gap-0.5 px-4 py-1.5 rounded-xl ${STATE.view === it.v || (STATE.view === 'zadanie' && it.v === 'home') ? 'opacity-100' : 'opacity-50'}">
          <div class="text-xl leading-none">${it.i}</div>
          <div class="mono text-[9px] uppercase tracking-wider">${it.l}</div>
        </button>
      `).join('')}
    </div>
  `;
  document.body.appendChild(nav);
  
  // Bind events
  nav.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', handleAction);
  });
}

// ============ INIT ============

(async function init(){
  PROGRESS = await loadProgress();
  render();
})();

</script>
</body>
</html>
