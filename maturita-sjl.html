rostriedkov.\n\n- písomnosť- vzťahuje sa iba na elektronické a tlačené média; osobitné členenie textu, sústredenie sa na fakty.\n\n- žánre:\n\n- spravodajské- ich cieľom je objektívne, vecne, pohotovo a zrozumiteľne informovať. Patria tu: správa, interview, riport, komuniké, rezolúcia, referát, inzerát, reklama, plagát.\n\n- analytické- Patria tu: úvodník, komentár, recenzia, posudok, kritika, diskusia, glosa, pamflet, karikatúra, polemika.\n\n- beletristické- Patria tu: reportáž, fejtón, črta, stĺpček, besednica\n\n Prvá strana novín/časopisov:\n\n - názov novín/časopisu\n\n - dátum vydania\n\n - ročník\n\n - cena\n\n - časti niektorých článkov, ktorým sa venujú vnútri\n\n - reklama\n\nPoukážte na význam médií v súčasnosti a v minulosti.\n\n- v minulosti- mala prístup k médiám len úzka vrstva obyvateľstva (bola iba tlač)\n\n- v súčasnosti- sa význam médií zvyšuje a vznikajú aj nové formy médií (od konca 20. storočia- súvisí to s rozvojom počítačov)\n\n- za typických predstaviteľov nových médií sa považujú aj mobilné telefóny, rôzne bezdrôtové technológie, GPS, internet (blogy, a pod.)\n\nAké publicistické žánre by mal obsahovať školský časopis GONg? Navrhnite, čo by obsahoval váš príspevok pod názvom Lesk a bieda študentského života.\n\n - Mal by obsahovať: reportáže zo školských podujatí, správy, oznámenia, komentáre k udalostiam a situácii v škole, editoriál, glosy a fejtóny, recenzie na nové knihy, hudbu filmy, zaujímavé interview s profesormi,...\n\n - Lesk a bieda študentského života: rady na vypĺňanie prihlášky, rady na zvládanie stresu, reportáž o organizovaní stužkovej, alebo o zháňaní rôznych materiálov,...\n\nÚloha č. 2\n\nVysvetlite podstatu a funkciu vnútorného monológu v ukážkach.\n\n Vnútorný monológ- iba myslený, nahlas nevyslovený prehovor postavy. Charakterizuje spontánny tok myšlienok, ktorý umožňuje čitateľovi pochopiť vnútorné pohnútky postavy pred nejakým činom, alebo po ňom. Môže obsahovať aj myšlienky postavy o vzťahu k priateľovi, známemu, a pod. Vnútorný monológ sa môže vyjadriť polopriamou rečou, nevlastnou priamou rečou, niekedy aj priamou rečou.\n\nPorovnajte ukážky a nájdite spoločné znaky a odlišné spôsoby zobrazenia v dielach. Určite druh rozprávača, porovnajte autorovu koncepciu postavy.\n\n Milo Urban: Jašek Kutliak spod Bučinky\n\n - Urbana zaraďujeme do slovenskej literatúry v medzivojnovom období (kritický realizmus)\n\n - ľudia v jeho dielach sa vedia vyjadriť skôr činom než slovom\n\n - je expresionista a využíva to aj v tomto diele- zaujíma ho , čo prežíva Slovenský človek\n\n - napísal román: Živý bič\n\n Téma: vzťahy dvoch ľudí\n\n Miesto: dedina\n\n Postavy:\n\n Jašek Kutliak- horár, mocný a navonok tvrdý dedinský muž, pracovitý, slušný, vo vnútri veľmi citlivý (ani srnku nechce viac zabiť), ale svoje city nedáva navonok.\n\n Hanka Stašová- jeho žena\n\n Vlček- sused\n\n Dej: Horár Jašek sa ožení s Hankou, do ktorej sa úprimne zamiluje, ale manželstvo nie je šťastné. Hanka začína byť ľahostajná. Narodí sa im syn Jožko, ale nič sa tým nemení. Jašek začína piť, hoci predtým nikdy nepil. Keď sa vracia domov, takmer zamrzne po ceste. Keď príde domov, Hanka ho vyháňa z domu a na otázku, či ho má rada mu neodpovedá. Jašek pobozká ženu aj syna a odíde von, kde pri plote zmrzne. Ráno ho Hanka nájde a je ľahostajná.\n\n Rozprávač: vševediaci\n\n Literárny žáner: novela\n\n\n\n Janko Jesenský: Koniec lásky\n\n - Jesenského zaraďujeme do obdobia literatúry 20. a 21. storočia (literárnej moderny)\n\n - bol povolaním právnik\n\n - vykresľuje vlastnosti človeka z hľadiska jeho spoločenského zaradenia, zobrazuje malomeštiactvo\n\n Téma: mladý človek žijúci v meste, končiaca sa láska\n\n Miesto: ples\n\n Čas: jeden večer, retrospektíva, rôzne usporiadané udalosti (ako mu prúdili hlavou)\n\n Postavy:\n\n Miloš Krátky- muž z mesta, z ktorého vyprchalo chvíľkové opantanie ženou; má pred sebou nepríjemnú úlohu- povedať jej, že ju už viac neľúbi\n\n Elena\n\n Dej: Miloš si spomína na obdobie, keď bol zamilovaný do Eleny. Teraz ju už nechce, jej správanie mu prekáža, chce sa s ňou rozísť. Dej je realizovaný len cez vnútorné monológy autora. V závere sa rozhodne pre rozchod. (opis vzďaľujúceho sa bodu- už ju viac nestretne)\n\n Rozprávač: autorský\n\n Literárny žáner: poviedka\n\n\n\n Porovnanie Milo Urban: Jašek Kutliak spod Bučinky/Janko Jesenský: Koniec lásky\n\n - spoločné znaky: obe zobrazujú vzťah dvoch ľudí, nešťastnú lásku, ukončený vzťah; hlavné postavy sú muži- v oboch prípadoch nazeráme do ich vnútorného sveta; využívajú vnútorné monológy (dôležitú úlohu zohrávajú pocity hrdinov); na začiatku oboch vzťahov nadšenie a opantanie- postupne opadá.\n\n - odlišné znaky: dedina/mesto; manželstvo- končí tragicky (smrťou Jašeka)/iba spolu chodia- rozídu sa; Jašek Kutliak- personifikovaná príroda, expresívny jazyk/Koniec lásky- náladový opis, mestské prostredie, modernizácia spoločnosti\n\n\n\n Romain Rolland: Peter a Lucia\n\n - zaraďujeme ho do medzivojnového obdobia Francúzskej literatúry\n\n - držiteľ Nobelovej ceny, humanista,\n\n - využíva lyrizáciu a metaforizáciu reči\n\n - hrdina- kráča za nadosobnými cieľmi, vie sa obetovať za veľkú vznešenú myšlienku (kvôli víťazstvu je ochotný podstúpiť utrpenie)\n\n Téma: príbeh lásky dvoch mladých ľudí, ktorá je odkázaná na zánik\n\n Miesto: Francúzsko (Paríž)\n\n Čas: streda večer (30. januára) – Veľký piatok (29. marca) 1918- prvá svetová vojna\n\n Postavy:\n\n Peter- 18 ročný, neveriaci; pochádza z meštiackej rodiny, veľmi citlivý, neskúsený, plný otázok, nechápe vojnu, je pesimista; zamiluje sa do Lucie, s ktorou sa snaží zabudnúť na vojnu\n\n Lucia- 18 ročná amatérska maliarka, maľuje aby prežila, je polosirota, realistka; zmyslom jej života je láska; miluje život, citlivá, nežná, milá; v mysli si zariaďuje byt\n\n Filip- Petrov brat, bojuje vo vojne- vracia sa domov zmenený; vojna mu zobrala jeho plány do budúcnosti, všetko stratil (stratená generácia)\n\n Dej: Zobrazenie vnútorných svetov Petra a Lucie, ich názorov a beznádeje, konflikty s rodičmi, strach z odvedenia na front. Dielo končí tragicky- keď sa na nich zvalí mohutný pilier v kostole.\n\n Rozprávač: vševediaci\n\n Literárny žáner: psychologická novela","number":10},"11":{"tema_jazyk":"Verbálna a neverbálna komunikácia","tema_lit":"Komédia (veselohra)","autori":["Ján Palárik","Molière"],"diela":["Zmierenie alebo Dobrodružstvo pri obžinkoch","Lakomec"],"okruh_jazyk":"Sloh - komunikácia","okruh_lit":"Klasicizmus - komédia","full":"Úloha č. 1\n\nPorovnajte verbálnu a neverbálnu komunikáciu. Vysvetlite druhy neverbálnej komunikácie. Aký význam majú vo všeobecnosti gestá spolužiaka, učiteľa, policajta.\n\n Verbálna komunikácia:\n\n - predstavujú ju jazykové prostriedky reči [jazyk môže mať hovorenú, alebo písanú (grafickú) podobu], ktoré sú najdôležitejším prostriedkom odovzdávania informácii\n\n - naša reč musí byť: konkrétna, jasná, zrozumiteľná\n\n - rozsah slovnej zásoby závisí od veku, vzdelania, temperamentu, pracovného zaradenia, pohlavia komunikantov, a pod.\n\n - výber slov a schopnosť komunikovať súvisí s témou rozhovoru, situáciou a tiež vlastnosťami účastníkov rozhovoru\n\n - najčastejšie používané formy ústnej jazykovej komunikácie:\n\n - monológ- je samostatný prehovor osoby (opak dialógu). V umeleckej literatúre ním postava vysvetľuje niektoré súvislosti, resp. reaguje na konkrétnu situáciu v „deji.“\n\n - vnútorný monológ- je špecifická výpoveď osoby, ktorú táto adresuje sama sebe. Zachytáva myšlienky človeka vo chvíli ich zrodu, t. j. v ich prvotnej, ešte jazykovo nespracovanej podobe.\n\n - dialóg- je rozhovor medzi dvoma, alebo viacerými osobami. Musí mať aspoň 2 repliky.\n\n - replika- je základná jednotka dialógu. Je to relatívne uzavretá jednotka, ktorá reaguje na predchádzajúci prehovor, resp. navodzuje ďalšie pokračovanie rozhovoru. Ide o prehovor jednej osoby, alebo literárnej postavy.\n\n Neverbálna komunikácia:\n\n - predstavujú ju mimojazykové prostriedky [ide o všetko, čo reč (slová) sprevádza]\n\n - podporuje verbálnu komunikáciu a je dôležitá najmä pri prejavovaní emócií, ovplyvňovaní postojov a vytváraní dojmov\n\n - neverbálne prejavy sú spontánne, ťažko ovládateľné, väčšinou nezámerné sú dôveryhodnejšie\n\n - do neverbálnej komunikácie zaraďujeme:\n\n - zrakový kontakt- vzájomné pohľady, pohľady bokom, druh pohľadu, uhýbanie pohľadom a pod.\n\n - mimika- hlavne pohyby očí, úst, tváre, a pod.\n\n - kinetika- celkové pohyby tela, chôdza, postoj, a pod.\n\n - gestika- gestá, hlavne pohyby rúk, posunky, a pod.\n\n - iné znaky- dotyky, objatie, podávanie ruky, intonácia, účes, úprava, oblečenie, písmo, a pod\n\n gestá spolužiaka- dorozumievanie sa s ľuďmi rovnakej vekovej skupiny (rôzne signály, tajnosti,...)\n\n gestá učiteľa- napr. pomôcka pri vysvetľovaní učiva žiakom,...\n\n gestá policajta- rôzne signály (napr. na zastavenie vozidla pri prekročení rýchlosti), ako signály pri riadení dopravy (ukazuje kedy máme ísť, stáť, pridať, spomaliť,...)\n\n\n\nPriraďte k uvedeným zónam vzdialenosť a dvojicu komunikantov: sociálna zóna, osobná zóna, verejná zóna, intímna zóna, 0 - 30cm, 45 -120cm, 1,5 – 3m, 5 – 8m, dieťa – rodič, učiteľ – žiak, manžel – manželka, dvaja kamaráti, zákazník – predavačka, lekár – pacient, prednášajúci – poslucháči, moderátor – diváci\n\n sociálna zóna- 1,5-3m, zákazník – predavačka, lekár – pacient\n\n osobná zóna- 45-120cm, učiteľ – žiak,\n\n verejná zóna- 5-8m, prednášajúci – poslucháči, moderátor – diváci\n\n intímna zóna- 0-30cm; dieťa – rodič, manžel – manželka, dvaja kamaráti\n\n Charakterizujte verbálnu a neverbálnu komunikáciu hlavnej postavy v ukážke Lakomec.\n\n Verbálna komunikácia: používa množstvo otázok, zvolacie vety, dáva pomocou nej najavo, ako veľmi mu záleží na peniazoch (prehovára k peniazom)\n\n Neverbálna komunikácia: dotyky (chytá sám seba za ruku), intonácia jeho výpovede (najmä sila hlasu)\n\nÚloha č. 2\n\nVysvetlite podstatu komédie (veselohry). Poukážte na situačný a slovný humor, hyperbolu a charakterový typ postavy v uvedených dielach a ukážkach.\n\n Komédia:\n\n - zobrazuje sa v nej smiešnosť, komickosť a nezmyselnosť niektorých stránok ľudského života\n\n - humor je zacielený najmä na negatívne rysy ľudských charakterov, prípadne na záporné javy spoločenského života; je významným prostriedkom boja proti zlu\n\n - druh komédie, v ktorej prevláda situačná komika a zveličovanie sa nazýva fraška\n\n Situačný humor:\n\n - je v diele „Ján Palárik: Zmierenie alebo dobrodružstvo pri obžinkoch“ založený na zámene postáv (grófka Ežika – jej slúžka Miluša Oriešková; barón Kostrovický – inžinier Rohoň)\n\n Hyperbola:\n\n - v diele „J. B. P. Moliére: Lakomec“ v prehovore Harpagona („umieram, som mŕtvy, som pochovaný,...“)\n\n Charakterový typ postavy:\n\n - v diele „J.B.P. Moliére: Lakomec“ autor zvýrazňuje jednu typický vlastnosť (zvyčajne negatívnu)- Harpagonovo lakomstvo\n\n\n\n Ján Palárik: Zmierenie alebo Dobrodružstvo pri obžinkoch\n\n Téma: život na zámku slobodomyseľnej grófky Elízy Hrabovskej, spolunažívanie Slovanov s Maďarmi\n\n Idea: zmierenie slovenského a maďarského národa\n\n Literárny druh: dráma\n\n Literárny žáner: komédia\n\n Postavy:\n\n Elíza Hrabovská- krásna mladá grófka, predstavuje liberálnu vrstvu uhorskej spoločnosti\n\n Miluša Oriešková- predstavuje ideálnu slovenskú devu, dostatočne vzdelaná a rozhľadená\n\n Ľudovít Kostrovický- mladý barón, predstavuje ľahkomyseľnú konzervatívnu šľachtu\n\n Rohon- zememeračský inžinier, starý priateľ mladého baróna\n\n\n\n J.B.P. Moliére: Lakomec\n\n Téma: život lakomého úžerníka, ktorý žije v neustálom strachu o svoje peniaze\n\n Miesto: Paríž\n\n Čas: obdobie renesancie\n\n Idea: poukazuje na jednu zo zlých ľudských vlastností (lakomstvo, pokrytectvo)\n\n Literárny druh: dráma\n\n Literárny žáner: komédia\n\n Postavy:\n\n Harpagon- hlavný hrdina, stelesňuje negatívne vlastnosti človeka\n\n Kleant- Harpagonov syn, miluje Mariannu\n\n Elíza- Harpagonova dcéra\n\n Valér- Elizin milý, Anzelmov syn\n\n Marianna- Kleantova milá, chce si ju však vziať Harpagon\n\n Anzelm- Valérov a Mariannin otec\n\n Jakub- Harpagonov kuchár a kočiš\n\n Šidlo- Kleantov sluha\n\n Pani Klaudia- Harpagonova slúžka","number":11},"12":{"tema_jazyk":"Vývin slovenského spisovného jazyka (Bernolák, Štúr)","tema_lit":"Spoločenský, sociálny a psychologický román","autori":["Anton Bernolák","Ľudovít Štúr"],"diela":["Grammatica slavica","Nauka reči slovenskej"],"okruh_jazyk":"Vývin jazyka","okruh_lit":"Typy románu","full":"Úloha č. 1\n\nVysvetlite vývin slovenského spisovného jazyka od najstarších čias po súčasnosť a doložte konkrétnymi literárno-jazykovednými dielami.\n\n - praslovančina- spoločný jazyk predkov všetkých Slovanov (do 8. storočia), nemáme žiadne písomné pamiatky\n\n - stará slovenčina- základ budúcich slovenských nárečí, spisovného jazyka (9. storočie)\n\n - staroslovienčina- 863- Konštantín a Metod priniesli ma maše územie prvý slovanský spisový jazyk (staroslovienčinu- je to pôvodom južnoslovanský jazyk, ktorého základom bolo nárečie Macedónskych Slovanov z okolia Solúna); písmo: hlaholika (za základ si zobrali malé písmená gréckej abecedy), neskôr cyrilika (za základ si zobrali veľké písmená gréckej abecedy), diela: preklady evanjelií, Proglas,...\n\n - latinčina- začala sa používať po rozpade Veľkej Moravy v 10. storočí (11.-18. storočie)\n\n - čeština- používala sa predovšetkým v úradnom styku, aj keď úradným jazykom bola latinčina. Na Slovensku sa písalo latinsky a česky, no pri tom sa hovorilo slovenským jazykom. (15.-19. storočie)\n\n - kultúrna slovenčina- vznikla kultúrna západná slovenčina a kultúrna stredná slovenčina (z nej vychádza Ľ. Štúr pri svojej kodifikácii spisovného jazyka) (16.-17. storočie)\n\n spisovná slovenčina- do histórie sa zapísali najmä 3 nasledujúce pokusy o kodifikáciu:\n\n - Bernolákovské obdobie:\n\n Jozef Ignác Bajza- v románe „René mláďenca Príhodi a Skúsenosťi“ uplatňuje tzv. slowackí jazyk (jeho pravopisu a gramatike však chýbala pevnejšia a odôvodnenejšia kodifikácia- nevydal žiadnu gramatickú príručku)\n\n Anton Bernolák\n\n - vo svojej koncepcii vychádzal pri kodifikácii spisovného jazyka z jazykovej praxe vzdelancov\n\n - za východisko si vzal kultúrnu západoslovenčinu, a to najmä v podobe, v akej sa formulovala v trnavskom univerzitnom centre\n\n - svoju predstavu spisovného jazyka vyložil vo svojich kodifikačným dielach: Grammatica Slavica (1790); Slowár Slowenskí, Česko-Laťinsko-Ňemecko-Uherskí (1825-1827)\n\n - niektoré zásady Bernolákovej kodifikácie:\n\n - odstraňuje sa y/ý, ponecháva sa len i/í\n\n - mäkkosť ď, ť, ň, ľ sa vždy označuje\n\n - veľké písmená sa píšu pri všetkých podstatných menách a pri iných výrazoch, ktoré sa vzťahujú na osoby\n\n - predložky s a z sa píšu podľa výslovnosti\n\n - zavádza skupinu šč (napr. eščše, púščať, a pod.)\n\n - hlásku v píše vždy ako w\n\n - vylúčil zo slovnej zásoby slová, ktoré pokladal za neslovenské/vulgárne\n\n - odstránil definitívne niektoré tradičné bohemizmy\n\n - fonematický princíp pravopisu\n\n - v spisovnej Bernolákovčine vyšli diela Juraja Fándlyho- Piľní domagší a poľní Hospodár (1792), či preklad Svätého písma\n\n - používal ju aj Ján Hollý, predstaviteľ mladšej generácie Bernolákovcov\n\n - nikdy však nebola prijatá ako celonárodný slovenský jazyk\n\n\n\n - Štúrovské obdobie:\n\n - ako základ pre spisovný slovenský jazyk si Ľ. Štúr vybral stredoslovenský nárečový základ (pri výbere strednej slovenčiny bral do úvahy, že stredoslovenské nárečia sú najrozšírenejšie a najpoužívanejšie zo všetkých nárečí, prejavujú najväčšiu životaschopnosť, šíria sa aj medzi príslušníkov iných nárečí)\n\n - v roku 1843 sa Štúr, Hurban a Hodža na fare v Hlbokom dohodli na podobe spisovnej slovenčiny, na základe ktorej bol kodifikovaný spisovný jazyk\n\n - spisovnú slovenčinu kodifikoval vo svojom diele „Náuka reči slovenskej“ (1846)- nešlo o praktickú gramatiku, ale vedecký opis gramatickej stavby slovenčiny, ďalej dielo „Nárečja slovenskou alebo potreba písaňja v tomto nárečí“\n\n - niektoré zásady Štúrovej kodifikácie:\n\n - diakritický pravopis\n\n - používalo sa len mäkké i\n\n - hlásky ľ, ä, ô, y sa nepoužívali\n\n - fonematický princíp pravopisu\n\n - nepoužíva sa e, namiesto toho sa používa je\n\n - dvojhlásky ia, ie, iu sa píšu ako ja, je, ju\n\n - 1851- reforma M. M. Hodžu a Martina Hattalu- dielo „Krátka mluvnica slovenská“- ustúpilo sa od fonematického pravopisu, zavedenie y/ý, rozlišovanie de, te, ne, le, di ti, ni, li, zavedenie dvojhlásky ä, minulý čas sa končí l-kovými tvarmi (písal, čítal, chodil, a pod.)\n\n 20. storočie:\n\n - 1902- Samo Czambel vydal dielo „Rukoväť spisovnej reči slovenskej“- stala sa všeobecne prijímanou a uznávanou kodifikačnou príručkou slovenského jazyka a pravopisu na prvé 3 desaťročia 20. storočia. Prostredníctvom Czambelovej kodifikácie sa stal martinský úzus normou spisovnej slovenčiny.\n\n - Jozef Škultéty- pripravil a sám urobil úpravy v diele „Rukoväť spisovnej reči slovenskej“- ovplyvnil dnešnú podobu spisovnej slovenčiny\n\n - 1931- Pravidlá slovenského pravopisu (zavedené české slová do slovenskej slovnej zásoby) [puristi- Slováci, ktorí očistili slovenčinu od českých prvkov]\n\n - 1945-1989- zjednotili sa pravidlá o spodobovaní, odstránilo sa dvojaké písanie, „Slovník slovenského jazyka, Morfológia slovenského jazyka, Pravidlá slovenskej výslovnosti“, slovenčina a čeština rovnocennými jazykmi\n\n - súčasnosť: Pravidlá slovenského pravopisu (1991), pravidlá slovenského pravopisu (2000), Krátky slovník slovenského jazyka (2003), Slovník súčasného slovenského jazyka (2006)\n\nNa základe ukážok porovnajte kodifikáciu A. Bernoláka a Ľ. Štúra.\n\n Anton Bernolák\n\n - odstraňuje sa y/ý, ponecháva sa len i/í\n\n - mäkkosť ď, ť, ň, ľ sa vždy označuje\n\n - veľké písmená sa píšu pri všetkých podstatných menách a pri iných výrazoch, ktoré sa vzťahujú na osoby\n\n - predložky s a z sa píšu podľa výslovnosti\n\n - zavádza skupinu šč (napr. eščše, púščať, a pod.)\n\n - hlásku v píše vždy ako w\n\n - vylúčil zo slovnej zásoby slová, ktoré pokladal za neslovenské/vulgárne\n\n - odstránil definitívne niektoré tradičné bohemizmy\n\n - fonematický princíp pravopisu\n\n Ľudovít Štúr\n\n - diakritický pravopis\n\n - používalo sa len mäkké i\n\n - hlásky ľ, ä, ô, y sa nepoužívali\n\n - fonematický princíp pravopisu\n\n - nepoužíva sa e, namiesto toho sa používa je\n\n - dvojhlásky ia, ie, iu sa píšu ako ja, je, ju\n\nÚloha č. 2\n\nVysvetlite znaky spoločenského, sociálneho a psychologického románu. Zaraďte autorov a uvedené diela. Charakterizujte hlavné postavy a rozdielne umelecké prístupy autorov v uvedených ukážkach.\n\n Spoločenský román:\n\n - zaoberá sa celou spoločnosťou (od najnižších vrstiev až po najvyššie)\n\n - zobrazuje vzťahy medzi jednotlivými vrstvami\n\n - často poukazuje na „prehnitosť“ doby a spoločnosti\n\n Sociálny román:\n\n - zobrazuje spoločnosť, konanie a myslenie postáv v závislosti od sociálnych skupín\n\n - autor sa najčastejšie zameriava na najnižšie vrstvy spoločnosti, ich živorenie a problémy s prežívaním\n\n Psychologický román:\n\n - zaoberá sa vnútrom, zmýšľaním a osobným svetom (zväčša jednej) postavy, ponára sa do jej duše\n\n - zobrazuje jej konanie a myslenie nielen vo zvyčajných životných situáciách, ale aj v krízových okamihoch\n\n\n\n Martin Kukučín: Dom v stráni\n\n - spoločenský román zachytávajúci 3 spoločenské vrstvy (sedliaci [težaci], zemania [statkári], veľkopodnikatelia)\n\n - spisovateľ v diele odhaľuje základnú dynamiku spoločenského procesu, charakterizovanú rozpadom rodového patriarchálneho života sedliactva stelesneného v type Mateho Beraca a jeho rodiny; i splývaním statkárstva s podnikateľskou buržoáziou, ktorej životaschopnosť zachytáva v obraze vypočítavého, rozumovo založeného Zandomeho\n\n - Postavy:\n\n Mate Berac- vážený sedliak, ktorý je hrdý na svoj sedliacky stav; je predstaviteľom otca- patriarchu; autor ho dáva ako vzor sedliaka- zdôrazňuje uňho pracovitosť, samostatnosť, rozvážnosť; jeho životnou filozofiou je zachovávanie tradícii; je zrastený s pôdou- považuje ju za svoju „matku“; odsudzuje lásku Katice a Nika (hovorí, že to nie je pravá láska a po čase z nej zostane len sklamanie a zničená povesť dievčaťa)\n\n Šora Anzula- pochádza zo sedliackej rodiny, je múdra, rozvážna, pracovitá, energická a nemá problém pomôcť tomu, kto to potrebuje; svojho syna vychováva vo veľkopánskom štýle (všetko mu dovoľuje); Mateho s váži- príliš jej ani nevadí, že by mala sedliacku nevestu, ale obáva sa, že po časeNikovi začne vadiť jej sedliacky pôvod a spôsoby; svojho syna dobre pozná, preto mu vzťah nezakazuje, ale robí všetko pre to, aby si overila, či to myslí vážne (v tom našla podporu aj u Mateho); za nevestu pôvodne synovi vyhliadla Doricu Zorkovičovú, ktorá bola z rovnakej spoločenskej vrstvy ako on\n\n Katica- mladé sedliacke dievča, ktoré sa chce dostať do vyššej vrstvy (prostriedkom na to je pre ňu vzťah s Nikom, hoci sa sľúbila Paškovi Bobicovi); svoje chyb si uvedomí, až pri otcovej smrteľnej posteli\n\n Niko- mladý, veselý zeman, ktorý sa zaľúbi do sedliačky; je si vedomý rozdielov medzi nimi; má rád svoju matku a priateľa Zandomeho\n\n Zandome- najlepší Nikov priateľ, zeman; snaží sa mladým pomáhať; chce byť podnikateľom\n\n\n\n\n\n Jozef Cíger Hronský: Jozef Mak\n\n - sociálno- psychologický román (sociálna tematika, prienik do vnútra človeka)\n\n - témou diela sú životné osudy jednoduchého dedinského človeka Jozefa Maka, poukazuje na pomery na Slovensku\n\n - Postavy:\n\n Jozef Mak- uzavretý, široké plecia a dlane; je drevorubač z chudobných pomerov; je nemilovaný („Nik mu nenasypal krúpy do kúpeľa“); je nemanželské dieťa (je pre to odsudzovaný celou dedinou, aj vlastnou matkou a bratom)\n\n Jano Mak- v mladosti sa musel starať o Jozefa, býval v jeho otcovskej chalupe; jeho žena Jozefa milovala (kvôli tomu ho nemal rád)\n\n Matka- vdova, veľa pracovala; vyhnala syna z dediny, aby nebol na očiach; nemohla mu nájsť krstnú („Narodil sa chlapec, čo nemohol byť ani Jozef, ani Mak“)\n\n Hana Meľošová- krstná mama Jozefa, chudobná, flegmatická, ľahkomyseľná; jediná vedela s Jozefom súcitiť\n\n Maruša- milovala Jozefa, bola rapavá z alkoholu, zmenila sa; vyhľadávala situácie, keď mohla byť s Jozefom sama; vydala sa za Jana, aby sa zabezpečila (nebola šťastná, Jano ju bil, smútok zapíjala alkoholom); neskôr sa opitá utopí\n\n Jula Petrisková- mala ochrnutú ruku; rodina jej prepísala chalupu; Jozef si zobral z trucu (chcela, aby ju bil, lebo dedina neverila, že sú manželia), bola perfektná matka (jedlo dávala deťom)\n\n Biaľoš- Jozefov biologický otec (pomáhal svojmu synovi)\n\n Kubanda a dedina- klebetili","number":12},"13":{"tema_jazyk":"Rečnícky štýl","tema_lit":"Analýza románov (téma, kompozícia, štylistika)","autori":["Milo Urban","E. M. Remarque"],"diela":["Živý bič","Na západe nič nového"],"okruh_jazyk":"Sloh - rečnícky štýl","okruh_lit":"Medzivojnová próza","full":"Úloha č. 1\n\nCharakterizujte znaky, žánre a výrazové prostriedky rečníckeho štýlu.\n\n Rečnícky štýl:\n\n - patrí medzi najstaršie funkčné jazykové štýly; je štýlom ústnej komunikácie verejného styku\n\n - funkcie: presviedčať, vysvetľovať, informovať, komentovať, agitovať a zapôsobiť na city poslucháča\n\n - rečnícke prejavy majú najčastejšie ústnu podobu, ale väčšina z nich je vopred pripravená v písomnej forme (veľa z nich vznikne aj neplánovane a neoficiálne)\n\n - pri tvorbe rečníckych prejavov sa uplatňujú subjektívne aj objektívne štýlotvorné činitele (subjektívno- objektívny charakter)\n\n - znaky:\n\n - ústnosť- okrem jazykových prostriedkov rečnícky štýl využíva aj mimojazykové prostriedky (napr. mimika, gestikulácia a zrakový kontakt, a pod.)\n\n - verejnosť- útvary rečníckeho štýlu sú určené širokej verejnosti, preto musíme dbať na výber jazykových prostriedkov (napr. nesmie hromadiť odborné a cudzie slová), nesmieme používať vulgarizmy, číselné údaje zaokrúhľujeme, nepoužívame dlhé vetné konštrukcie\n\n - sugestívnosť- rečník sa snaží zapôsobiť na city poslucháčov, využívame prostriedky umeleckého štýlu (opakovanie slov, viackrát oslovíme poslucháčov, zdôrazňujeme niektoré slová, používame pauzu; zoslabíme, alebo zosilníme hlas, a pod.); v závere- vyjadrujeme svoje želania, výzvy\n\n - adresnosť- rečnícke útvary majú kolektívneho príjemcu (niektoré môžu byť venované jednotlivcom- napr. jubileá, ale počúva ich kolektív)\n\n - názornosť- využíva sa najmä v náučných prednáškach (obrazový materiál- napr. mapy, grafy, schémy, audiovizuálne pomôcky, a pod.)\n\n - žánre:\n\n - agitačné (politická reč, súdna reč, kázeň, agitačný prejav, obžaloba, a pod.)- jazyk približne rovnaký, ako jazyk publicistiky, ale doplnený mimojazykovými prostriedkami (gestikulácia, mimika, a pod.); uplatňuje sa bežná slovná zásoba, pretože adresát je široký\n\n - náučné (prednáška, referát, koreferát, diskusia, polemika, kázeň, a pod.)- sú vecné a konkrétne; v úvode je treba vysvetliť cieľ, funkciu a zámer prejavu; jadro je výkladom o danej problematike, poúčaním, odôvodňovaním, argumentovaním; v závere sa zhrňuje obsah a naznačuj sa ako využiť poznatky\n\n - príležitostné (privítací prejav, otvárací prejav, pozdravný prejav, slávnostný prejav, výstraha, výzva, rozkaz, sobášny prejav, pohrebný prejav, príhovor, a pod.)- príhovory sú krátke, prejavy dlhšie; v týchto žánroch sa nič nevysvetľuje; adresát a predmet prejavu je známy; prejav je emocionálnejší, môže byť doplnený citátmi, veršami, a pod.\n\nZaraďte uvedené rečnícke žánre: výzvu, výstrahu, rozkaz, prednášku, kázeň, reč za zosnulým, diplomatickú reč, referát, otvárací prejav\n\n výzva- príležitostné žánre\n\n výstraha- príležitostné žánre\n\n rozkaz- príležitostné žánre\n\n prednáška- náučné žánre\n\n kázeň- náučné/agitačné žánre\n\n reč za zosnulým- príležitostné žánre\n\n diplomatická reč- agitačné žánre\n\n referát- náučné žánre\n\n otvárací prejav- príležitostné žánre\n\nPriraďte k nasledujúcim komunikačným situáciám zodpovedajúci rečnícky žáner: začiatok plesu, vedecká konferencia, súdny proces, predvolebná kampaň, krst novorodenca.\n\n začiatok plesu- privítací, otvárací, slávnostný prejav\n\n vedecká konferencia- referát, koreferát, diskusia, prednáška\n\n súdny proces- obžaloba, obhajoba, súdna reč\n\n predvolebná kampaň- politická reč, diskusia\n\n krst novorodenca- kázeň\n\nVytvorte krátky slávnostný príhovor k ukončeniu maturít (minimálne 5 viet).\n\n Vážený profesorský zbor, drahí spolužiaci!\n\n Som hrdý/á na to, že tu dnes pred Vami môžem stáť, a taktiež na to, že sa v mene všetkých maturantov môžem Vám, vážený profesorský zbor, poďakovať.\n\n Teraz tu stojíme pre Vami v plnej kráse dospelosti. Áno, už uplynuli štyri krásne roky študentské. Skúška, brána dospelosti, ktorá sa zdala najťažšou, je pre nás už len spomienkou na naše detstvo. Našli sme kľúč a bránu sme otvorili. Chvíľu sme zaváhali, ale rozhodli sme sa vykročiť tou správnou nohou vpred. Sme tu naposledy, aby sme sa rozlúčili a poďakovali Vám, no priveľmi sa neradujte, ešte prídu naše deti.\n\n Prajem Vám, drahí naši profesori, aby ste na nás, Vašich študentov, spomínali s láskou, aby keď sa v budúcnosti stretneme, sme sa na seba len usmievali, a Vám milí moji spolužiaci prajem veľa úspechov v ďalšom živote.\n\n Ďakujem.\n\n\n\n\n\n\n\nÚloha č. 2\n\nNa základe všestrannej analýzy románov (téma, kompozícia, štylistika) vysvetlite autorský zámer. Zaraďte tvorbu autorov do literárneho kontextu.\n\n Milo Urban: Živý bič\n\n Téma: osudy a utrpenie dedinčanov, dopady vojny na obyvateľstvo\n\n Miesto: horno- oravské prostredie (konkrétne dedina Ráztoky)\n\n Čas: obdobie prvej svetovej vojny\n\n Kompozícia: skladá sa z 2 častí (každá z nich má 24 kapitol- sú relatívne samostatné a každá má svoju pointu)\n\n - časť- „Stratené ruky“- dedina zostala bez mužov, bez rúk, bez pomoci,\n\n - časť- „Adam Hlavaj“\n\n Autorov zámer: poukázať na to, ako dedinčanov spojili udalosti vojny, ktoré na nich doľahli (dedina sa zmenila na živel a robí zúčtovanie s vojakmi, notárom, obchodníkmi); poukazuje na to, ako vojna do Ráztok prináša zranenia (Koreň), zabitých (Štefan), biedu a hlad, choroby, dezercie, rekvirácie, nekontrolovanú moc štátnej správy, alkoholizmus (Kúrňava), skazené mravy (Krista), samovraždy,...\n\n - jedná sa o unaministický román- to znamená, že má kolektívneho hrdinu (ľud Ráztok)\n\n Milo Urban- tvorba:\n\n - poviedková- vplyv expresionizmu (novela: Za vyšným mlynom, Jašek Kutliak spod Bučinky)\n\n - románová- vplyv realizmu (vrcholom tvorby román: Živý bič)\n\n\n\n Erich Maria Remarque: Na západe nič nového\n\n Téma: príbeh Paula Bäumera a mladých vojakov- členov 1. bojového družstva\n\n Miesto: Francúzsko- Nemecký front (západný front), Nemecko\n\n Čas: obdobie počas 1. svetovej vojny\n\n Kompozícia: román sa skladá z 12 kapitol; nemá silnú hlavnú dejovú líniu (často prerušovaný rozhovormi, veľa priestoru dostávajú aj rôzne úvahy)\n\n Autorov zámer: autor chce poukázať na nezmyselnosť vojny („Sme opustení, ako deti a skúsení, ako starí ľudia, sme STRATENÍ.“)\n\n Erich Maria Remarque- tvorba:\n\n - predstaviteľ stratenej generácie, aj exilová tvorba\n\n - romány: Na západe nič nového, Víťazný oblúk\n\n - veľmi častým motívom je smrť","number":13},"14":{"tema_jazyk":"Slohové postupy a útvary","tema_lit":"Nespoľahlivý rozprávač","autori":["J. G. Tajovský","B. S. Timrava"],"diela":["Apoliena","Maco Mlieč","Ťapákovci"],"okruh_jazyk":"Sloh - postupy","okruh_lit":"Realizmus - rozprávač","full":"Úloha č. 1\n\nCharakterizujte slohové postupy a priraďte im adekvátne slohové útvary /žánre/. Prečo sa môže vyskytnúť v rámci jedného textu viac slohových útvarov? Nájdite ich v ukážkach.\n\n Slohové postupy:\n\n - je to proces skladania textu do celku; je to postup, ktorý využívame pri výstavbe textu\n\n - voľba slohového postupu vyplýva najmä z cieľa jazykového prejavu\n\n - druhy slohových postupov:\n\n - informačný slohový postup- slúži na sprostredkovanie informácií, faktov, údajov, t. j. odpovedá sa ním na otázky typu: Kto? Čo? Kedy? Kde? a pod. Uplatňuje sa najmä v administratívnom, publicistickom a hovorovom štýle. (oznámenie, správa, životopis, splnomocnenie, a pod.)\n\n - rozprávací slohový postup- slúži na tvorbu alebo reprodukciu skutočného, alebo fiktívneho príbehu; prevládajú v ňom činnostné slovesá, je založený na časovej postupnosti. Uplatňuje sa najmä v textoch hovorového a umeleckého štýlu. (rozprávanie, umelecké rozprávanie, črta, poviedka, ucelený dialóg, a pod.)\n\n - opisný slohový postup- slúži na vymenovanie znakov a vlastností osoby, veci, alebo činnosti; na priblíženie/znázornenie niečoho alebo niekoho niekomu inému. Znaky a vlastnosti osôb, vecí, zvierat a činností sa vymenúvajú v istom poradí, ktoré závisí od podávateľa, pretože ten im stanovuje dôležitosť. Uplatňuje sa hlavne v hovorovom, náučnom a umeleckom štýle. (opis osoby, opis veci, charakteristika, posudok, a pod.)\n\n - výkladový slohový postup- slúži na objektívne vysvetlenie toho, ako niečo vzniklo, na čo slúži, ako ovplyvňuje veci okolo a pod. Dôraz nie je kladený na vymenovaní faktov, autor sleduje najmä logicko- príčinné súvislosti medzi nimi. Uplatňuje sa hlavne v náučnom, publicistickom rečníckom štýle. (dizertácia, referát, výklad, prednáška, a pod.)\n\n - úvahový slohový postup- slúži na zaujatie a vyjadrenie vlastného stanoviska k najrozličnejším otázkam bytia, t. j. autor vyjadruje svoje stanovisko k problému a subjektívne ho hodnotí. Uplatňuje sa hlavne v náučnom, publicistickom, umeleckom a rečníckom štýle. (úvaha, komentár, a pod.)\n\n - hybridizácia slohového postupu- napr. v odbornej prednáške sa uplatňuje výkladový slohový postup- ale pri prednáške z biológie sa prednášajúci nevyhne ani opisnému slohovému postupu (napr. pri opise stavby istého živočícha)\n\n - alebo napr. v umeleckom rozprávaní sa môže uplatňovať okrem rozprávacieho slohového postupu aj opisný slohový postup, ale aj úvahový slohový postup\n\nKtorý slohový postup je charakteristický pre náučný štýl? Môžete vybrať z ukážok tému, ktorá by sa dala zmeniť na odbornú problematiku?\n\n V náučnom štýle sa najviac využíva výkladový slohový postup, pretože vysvetľuje javy a vzťahy medzi javmi. V odbornom opise je využitý opisný slohový postup, v referáte využívame informačný slohový postup. Rozprávací slohový postup sa využíva len v ústnej prednáške, aj to len v motivačnej časti.\n\n Téma, ktorá sa dá zmeniť na odbornú problematiku: život Ťapákovcov, vykorisťovanie Maca Mlieča\n\nÚloha č. 2\n\nIdentifikujte nespoľahlivého rozprávača v literárnych dielach, porovnajte ho s ďalšími typmi rozprávačov.\n\n Typy rozprávačov:\n\n - autorský rozprávač- javí sa v podobe nezainteresovaného pozorovateľa všetkého, čo sa deje (3. osoba)\n\n - personálny rozprávač- zobrazuje len jednu postavu v celkovej šírke jej vonkajšieho a vnútorného života; ostatné postavy si všíma len zo zorného uhla tejto postavy (3. osoba)\n\n - priamy rozprávač- všíma si vnútorný svet len jednej postavy, pri ostatných postavách zaznamenáva len ich vonkajšie prejavy (1. osoba)\n\n - rozprávač oka kamery- znázorňuje vonkajšie prejavy a vzhľad, opisy správanie, dialógy, gestá, ktoré majú poukázať na vnútorný svet postáv\n\n - nespoľahlivý (falošný) rozprávač- nerozpráva v duchu autora diela, ale je s ním v rozpore; rozprávačom je zlá, alebo nedôveryhodná osoba (zločinec, nezodpovedný človek, malé dieťa); nespoľahlivý rozprávač je „skúškou dospelosti“ čitateľa, ktorý má pochopiť, že sa s ním zahráva a je nedôveryhodný. (napr. v diele Apoliena)\n\n - vševediaci rozprávač- vie všetko, pozná postavy, aj prostredie; je anonymný, nezasahuje do deja, nestotožňuje sa zo žiadnou z postáv. (3. osoba)\n\n Analyzujte a porovnajte ukážky a vysvetlite významový plán diela.\n\n Jozef Gregor Tajovský: Apoliena\n\n Téma: príbeh hluchonemej Apolieny, ktorá je slúžka\n\n Miesto: dedina, dom u majstra\n\n Čas: 19. storočie\n\n Literárny druh: epika\n\n Literárny žáner: poviedka (zachytáva spoločenské zlá)\n\n Postavy:\n\n Apoliena- hluchonemá (od bitky otca), slušná, pokorná sedliačka; ruky mala ako švíbalky\n\n Rozprávač- jeden z pracujúcich učňov u majstra, je k Apoliene zlý (preto nespoľahlivý rozprávač)\n\n pani Majstrová- manželka majstra, nemala rada Apolienu\n\n matka Apolieny + 2 sestry Apolieny\n\n Idea: Tajovský v diele poukazuje na alkoholizmu, a zároveň ho kritizuje\n\n\n\n Jozef Gregor Tajovský: Maco Mlieč\n\n Téma: ťažký život chudobného človeka- sluhu Maca Mlieča\n\n Miesto: dedina\n\n Čas: 19. storočie\n\n - kriticko- realistická poviedka, v ktorej je autorský rozprávač, ktorý sa stretáva s Macom Mliečom pár dní pred jeho smrťou\n\n Postavy:\n\n Maco Mlieč- prezývaný mliečnik, nie práve vzhľadný, kríva, je nahluchlý; je slušný, pracovitý, nekonfliktný, nasprostastý, životná filozofia: „Poriadne robiť, sebe či cudziemu, jedno je, statočne umrieť.“\n\n gazda- v dedine bol richtárom, neľudský, k Macovi sa správa ako k majetku, využíval ho, vykorisťoval ho\n\n Idea: Tajovský poukázal na vykorisťovanie Maca Mlieča (odsudzuje ho). Ukázal na to, že ľudia sa delia na pánov a chudobných\n\n\n\n Božena Slančíková Timrava: Ťapákovci\n\n Téma: opis života rodiny Ťapákovcov, kritika ich lenivosti\n\n Čas: začiatok 20. storočia (celý rok)\n\n Miesto: univerzálna dedina (do Ťapákovcov)\n\n - nachádzame tu vševediaceho rozprávača, ktorý pozná prostredie, aj najhlbšie túžby postáv\n\n Postavy:\n\n Paľo Ťapák- ľahostajný, pokojný, lenivý, nedbá o seba, má rád staré zaužívané zvyky (nové veci nemá rád), je žiarlivý\n\n Iľa- Paľova manželka- prezývali ju „kráľovná“, panovačná, pracovitá, nepáči sa jej lenivosť a domov Ťapákovcov, pre jej názory ju nemá nikto rád, je vzdelaná, sebavedomá, má pevnú vôľu\n\n Anča- Paľova sestra- mrzáčka, nikto ju pre jej povahu nechcel, je krajčírka, nemá rada Iľu\n\n Ťapákovci- leniví, ľahkovážni, ľahostajní, málovravní (neodpovedajú na každú otázku), zanedbaní, neupravení, špinaví, nechce sa im pracovať, majú zastarané názory, správajú sa ako zvieratá (sú nečistotní,...)\n\n Idea: rieši konflikty medzi Iľou a Ťapákovcami, rozličné pohľady na svet, poukazuje na lenivosť Ťapákovcov","number":14},"15":{"tema_jazyk":"Diakritické a interpunkčné znamienka","tema_lit":"Náboženská a reflexívna lyrika, voľný verš","autori":["Rudolf Dilong","G. Apollinaire","L. Novomeský","J. Smrek","R. Fábry"],"diela":["Mesto s ružou","Nedeľa","Iba oči"],"okruh_jazyk":"Pravopis","okruh_lit":"Katolícka moderna, surrealizmus","full":"Úloha č. 1\n\nVysvetlite využitie diakritických a interpunkčných znamienok v slovenčine. Využite poznatky na príkladoch v uvedených ukážkach.\n\n Diakritické znamienka:\n\n - patria tu: dĺžeň, mäkčeň, dve bodky a vokáň\n\n - sú to rozlišovacie znamienka, ktoré sa píšu v okolí písmena, a ktoré menia jeho výslovnosť, alebo spĺňajú inú rozlišovaciu funkciu\n\n Interpunkčné znamienka:\n\n - patria tu: bodka, čiarka, apostrof, spojovník, dvojbodka, otáznik, výkričník, úvodzovky, pomlčka, lomka, tri bodky, zátvorky\n\n - sú to grafické znaky, ktoré nemajú fonetickú, ani lexikálnu hodnotu; používajú sa na členenie textu (pri čítaní nahlas sa prejavujú zmenou intonácie a prestávkami v texte)\n\n Príklady z ukážok:\n\n - diakritické znamienka: nemám, stepilá, môj, bôčky, pôžitok, smrť, slovíčko, väčšie\n\n- interpunkčné znamienka: dám ho? – to je boj!- ja rád mám všetky, Bože môj!; hlavu zmútila: čižmičky; na nás do ista vycerí zuby...\n\nDoplňte do viet čiarky a odôvodnite svoje rozhodnutie:\n\nAch to bola drina! Na to pravda nemyslel. Bol to človek nepríjemný zlostný a nemilosrdný. Bratislava hlavné mesto Slovenska leží pri Dunaji. Žiť to neznamená bojovať. Zbadala ho lež nedala to najavo. Aj dom má od železnice aj uhlie mu dáva železnica. Marián Grupač je súčasný slovenský spisovateľ. Popraviť nie oslobodiť.\n\n Ach, to bola drina! Na to, pravda nemyslel. Bol to človek nepríjemný, zlostný a nemilosrdný. Bratislava, hlavné mesto Slovenska, leží pri Dunaji. Žiť, to neznamená bojovať. Zbadala ho, lež nedala to najavo. Aj dom má od železnice, aj uhlie mu dáva železnica. Marián Grupač, je súčasný slovenský spisovateľ. Popraviť, nie oslobodiť.\n\nÚloha č. 2\n\nCharakterizujte podstatu náboženskej a reflexívnej lyriky. Vysvetlite pojmy voľný verš, čistá lyrika, automatický text. Myšlienkové a emocionálne posolstvo jednej ukážky analyzujte po veršoch, po strofách.\n\n Náboženská lyrika:\n\n - používa sa na liturgické účely, pridržiava sa náboženskej tematiky\n\n - prežívanie osobných a spoločenských pomerov, má pochmúrny tón\n\n Reflexívna lyrika:\n\n - básnik uvažuje, zamýšľa sa nad tým, čo ho trápi, čo sa ho bezprostredne dotýka (citové problémy, spoločenské problémy, a pod.)\n\n Voľný verš:\n\n - je to verš modernej literatúry formovaný od začiatku 20. storočia.\n\n - bol protikladom tradičného verša\n\n - stal sa prostriedkom oslobodenia myšlienky od predpísanej formy (podobne sa oslobodzovali modernisti, surrealisti od zaužívaných zvyklostí v živote)\n\n - opúšťa rým, rytmus nie je pravidelný, ruší pravidelnú strofu, nedodržuje rovnaký počet slabík vo verši, nedodržaná interpunkcia\n\n Čistá lyrika:\n\n - autor sa zameriava na city, intímnu spoveď, prežitie okamihu, dojem okúzlenia, zmysly, atď.\n\n - ide o vyjadrenie momentálnej nálady, „rozum“, akoby v danú chvíľu stál stranou\n\n - autor sa často vyjadruje cez symboly\n\n Automatický text:\n\n - autor nevie čo bude písať, ale prvý verš mu automaticky vyvoláva ďalší a ďalší, a nakoniec je prekvapený, čo napísal\n\n - imaginácia- schopnosť vytvárať obrazy, predstavy\n\n - zdrojom imaginácie je podvedomie\n\n\n\n Guillaume Apollinaire\n\n - francúzsky básnik a dramatik (bojoval v prvej svetovej vojne, bol ranený)\n\n - je autorom literárneho smeru- surrealizmu, je považovaný za jedného zo zakladateľov modernej francúzskej poézie\n\n - Alkoholy- jeho najslávnejšia básnická zbierka, život berie ako alkohol; všetko čo zažil chce spláchnuť a zabudnúť na to (spontánne verše, bez interpunkcie)\n\n - Pásmo- básnik putuje po Európe (svoju cestu začína v Paríži); opisuje, ako sa do popredia dostávajú nové veci a že všetko staré upadá; píše o tom, ako sa neberie ohľad na grécku a rímsku antiku, ktoré položili základ umenia (nevyužíva interpunkciu, využíva nový žáner- pásmo [charakteristický uvoľnenou myšlienkovou, aj veršovou stavbou])\n\n - Kaligramy- básnická zbierka napísaná počas vojny na fronte\n\n - Tiréziove prsníky- ide o drámu, programové dielo avantgardy; prvý krát sa tu objavuje pojem surrealizmus\n\n - Zavraždený básnik- autobiografia\n\n\n\n Rudolf Fábry\n\n - jeho básnickou zbierkou Uťaté ruky (1935) nastupuje surrealizmus v slovenskej literatúre (v zbierke spontánna uvoľnená obraznosť, voľný verš, automatické texty)\n\n - stal sa akýmsi duchovným otcom surrealizmu, hoci samotná nadrealistická básnická skupina sa formuje až v roku 1938\n\n\n\n Ladislav Novomeský\n\n - najvýznamnejší predstaviteľ ľavicovej avantgardy (experimentálnej tvorby so zreteľom na umenie)\n\n - v medzivojnovom období patril nielen k najlepším básnikom skupiny DAV, ale aj celej modernej slovenskej poézie\n\n - Nedeľa- básnická zbierka, v ktorej sa prejavil ako básnik sociálneho cítenia; chcel, aby poézia bola pre človeka nedeľným sviatkom\n\n\n\n Ján Smrek\n\n - svojou torbou sa radí medzi najvýznamnejšie osobnosti slovenskej literárnej tvorby 20. storočia\n\n - jeho básnická tvorba sa vyznačuje jednoduchosťou, melodickosťou, a vo svojich dielach vyjadruje najmä lásku k človeku a životný optimizmus\n\n - stredobodom jeho pozornosti je často žena (symbol mladosti, krásy a základnej hodnoty života)\n\n - poslaním poézie je podľa neho vyvolávať najmä pocity krásna a harmónie, pričom presadzoval názor, že báseň má byť citová a muzikálna\n\n - Iba oči- 1. nezáleží mu na strachu, ďakuje za svoje oči; 2. všetko spoznáva očami, symbol múdrosti vidí v noci, má veľké oči; 3. oči sú mu ako kompas na určenie smeru, oči chcú poznávať krásu, vyjadruje vďaku; 4. oči sa môžu pozerať na ženy; 5. iný pohľad má matka, iný milujúca žena; 6. oči matky sú spojené so srdcom\n\n Rudolf Dilong\n\n - vedúca osobnosť katolíckej moderny, františkánsky mních\n\n - svojou tvorbou sa radí medzi najvýznamnejších a najplodnejších autorov katolíckej moderny (venoval sa najmä písaniu poézie, no i dráme)\n\n - zakladateľ časopisu Postup,\n\n - svoje diela umiestňoval do vidieckeho prostredia; venoval sa témam detstva, často opisoval svoju rodnú Oravu (čo mu poskytovalo vítané útočište a stabilitu- najmä v období 2. svetovej vojny)\n\n - Budúci ľudia, Slávne na holiach, Dýchajte, lazy!- prví básnické zbierky (liturgické a náboženské motívy, oslava života a krásy)\n\n - Hviezdy a smútok, Helena nosí ľaliu, Mladý svadobník-uplatnil metódy poetizmu a surrealizmu (využíva hudobnosť verša, venuje sa náboženským aj svetským motívom)\n\n - Ja, svätý František- vyznačuje sa hlbokou náboženskou inšpiráciou\n\n - Gardisti, na stráž!- uvítal vznik Slovenskej republiky\n\n - Somnambul, Konvália, Hanička- spomienkové motívy na detstvo a na Oravu","number":15},"16":{"tema_jazyk":"Syntax - syntagma, jednočl./dvojčl. vety, vetné sklady","tema_lit":"Lyrizovaná próza, naturizmus, reťazový kompozičný princíp","autori":["Dobroslav Chrobák","Margita Figuli","František Švantner"],"diela":["Drak sa vracia","Tri gaštanové kone","Malka"],"okruh_jazyk":"Syntax","okruh_lit":"Naturizmus, lyrizovaná próza","full":"Úloha č. 1\n\nVysvetlite, čo je to syntax, syntagma a veta. Nájdite v literárnych  ukážkach príklady na vetné sklady, jednočlenné a dvojčlenné vety a vetný základ.\n\n Syntax- je jazykovedná disciplína, ktorá sa zaoberá skladaním slov do viet (spájaním viet do textov sa zaoberá nadvetná syntax, resp. textová syntax)\n\n Syntagma:\n\n - sklad, je vo vete významovou a gramatickou jednotkou (preto je tvorený len plnovýznamovými slovami)\n\n - je to najjednoduchšia syntaktická konštrukcia\n\n - je to spojenie dvoch, alebo viacerých plnovýznamových slov, ktoré sú obsahovo a gramaticky zviazané (napr. ružová blúzka, trhať kvety, písať diktát, a pod.)\n\n - podľa významovej stránky skladu rozlišujeme:\n\n - prisudzovací sklad- napr. brat vymaľoval, a pod.\n\n - určovací sklad- napr. môj brat, vymaľoval včera, vymaľoval izbu, našu izbu, a pod.\n\n - priraďovací sklad- brat a kamarát, izbu a kuchyňu, a pod.\n\n Veta:\n\n - je to základná syntaktická jednotka s uceleným významom, gramaticky usporiadaná a intonačne uzavretá\n\n - presnejšie je to komplexná gramaticko- sémantická systémová jednotka, ktorá má povahu základnej komunikatívnej jednotky.\n\n - skladá sa z vetných členov, ktoré v nej vytvárajú sklady\n\n Vetné sklady v ukážkach:\n\n - prisudzovací sklad- posiela lístoček, beriem papierik, Šimon kráča, Magdaléna zaspala, ručička píše, a pod.\n\n - určovací sklad- drobná ručička, beriem papierik, vystieram prstami, trpkým prízvukom, a pod.\n\n - priraďovací sklad- pevne a smelo, čistá a nepoškvrnená, a pod.\n\n Vety podľa členitosti v ukážkach:\n\n - jednočlenné- Šajban.\n\n - dvojčlenné- Drak je celý čierny.; Prišiel som po teba do tohto kraja, lebo ty si chcela, aby som prišiel.; Čože mi tá drobná ručička píše, čo tá pehavá hlávočka navymýšľala, čože to môže byť.\n\n\n\nUrčite vety podľa členitosti: Pomohol mi včera. Blýska sa. Deti sa vonku hrali. Nekonečný príbeh. Snažte sa! Čítam knihu. Peter od susedov zbieral včera v hore lesné plody.\n\n Pomohol mi včera.- dvojčlenná, neúplná (zamlčaný podmet- on)\n\n Blýska sa.- jednočlenná, slovesná\n\n Deti sa vonku hrali.- dvojčlenná, úplná\n\n Nekonečný príbeh.- jednočlenná, neslovesná\n\n Snažte sa!- dvojčlenná, neúplná (zamlčaný podmet- vy)\n\n Čítam knihu.- dvojčlenná neúplná (zamlčaný podmet- ja)\n\n Peter od susedov zbieral včera v hore lesné plody- dvojčlenná, úplná\n\nV poslednej vete určite všetky vetné členy. (Peter od susedov zbieral včera v hore lesné plody.)\n\n Peter- podmet\n\n od susedov- predmet (nepriamy)\n\n zbieral- prísudok\n\n včera- príslovkové určenie času\n\n v hore- príslovkové určenie miesta\n\n lesné- prívlastok (zhodný)\n\n plody- predmet (priamy)\n\n\n\nÚloha č.2\n\nPorovnajte reťazový kompozičný princíp a klasický päťfázový kompozičný princíp v próze. Vysvetlite pojem lyrizovaná próza a nájdite prvky naturizmu v ukážkach.\n\n Reťazový kompozičný princíp:\n\n - zachováva prirodzené časové (teda chronologické) usporiadanie rozprávania príbehu\n\n - často chýba typické hromadenie napätia, ktoré je charakteristické pre klasickú 5- člennú kompozíciu (takéto dielo často nemá zápletku, ani obrat v deji)\n\n - jednotlivé kapitoly sú akoby príhodami samy o sebe\n\n - každý nový príbeh je akoby spojovacím článkom medzi príbehom predchádzajúcim a nasledujúcim\n\n Päťfázový kompozičný princíp:\n\n - má klasickú päťčlennú stavbu (úvod, zápletka, vyvrcholenie, obrat v deji, rozuzlenie)\n\n Lyrizovaná próza:\n\n - koncom 20. rokov 20. storočia sa v slovenskej próze začala objavovať tendencia lyrizácie prózy\n\n - prozaici vo svojich dielach začínajú používať prvky lyriky (metafory, personifikácie, epitetá, prirovnania, smyboly,...)\n\n - vrcholom lyrizovanej prózy je umelecký smer naturizmus, ktorý vznikol v 30. rokoch\n\n - znaky lyrizovanej prózy:\n\n - dej sa odohráva v prírode\n\n - autori často dávajú do protikladu život v meste so životom na dedine\n\n - často sa utiekajú do fantazijnej predstavy sveta (často rozprávkovej- v ktorej dobro víťazí nad zlom)\n\n - využíva rozprávkové motívy, symboly, magické čísla (3, 7), rozprávkové postavy (drak)\n\n - hrdina je zahalený, tajomný, výnimočný človek; žije v styku s prírodou\n\n - lyrizácia prózy (metafory, personifikácie, epitetá, prirovnanie, symboly,...)\n\n Dobroslav Chrobák: Drak sa vracia\n\n - znaky naturizmu- dej je rozprávkový (Drak, dobro víťazí nad zlom, splnenie úlohy,...); prvky lyriky (metafory, epitetá, prirovnania,...); dej sa odohráva v prírode; v diele dominuje tajomnosť (Drak nevie odkiaľ prišiel, nevie čo je zač.); Drak bojuje o svoje šťastie, česť a prijatie dedinčanmi za svojho- je symbolom obety a obetavosti (pomáha druhým)\n\n František Švantner: Malka\n\n - znaky naturizmu- dej prebieha v prírode (vo vrchárskom prostredí); dej je popretkávaný tajomnosťou, živelným a pudovým konaním postáv; dej nám nesie mravné posolstvo (Za zlo, ktoré spáchame nebudeme potrestaní my, ale iní- nevinní.)\n\n Margita Figuli: Tri gaštanové kone\n\n - znaky naturizmu- dej sa odohráva na dedine; rozprávkovosť (dobro víťazí nad zlom, prekonávanie rôznych skúšok); symbolika čísel (3 kone, 3 úlohy); symbolika zvierat (kone- sila, mužnosť); postavy: Peter (predstaviteľ dobra a statočnosti), Magdaléna (predstaviteľka vernosti a pokory), Jano (predstaviteľ zla a sebectva); záujem o vnútorný svet postáv (zachytávanie psychiky vnútornými monológmi- najmä u Petra)","number":16},"17":{"tema_jazyk":"Plnovýznamové slov. druhy (slovesá, príslovky, číslovky)","tema_lit":"Dramatické dielo - stvárnenie postáv","autori":["Ivan Stodola","Július Barč Ivan","Ivan Bukovčan"],"diela":["Bačova žena","Matka","Kým kohút nezaspieva"],"okruh_jazyk":"Morfológia - slovesá","okruh_lit":"Slovenská dráma 20. storočia","full":"Úloha č. 1\n\nCharakterizujte plnovýznamové slovné druhy, vysvetlite slovesá, príslovky a číslovky.\n\n Plnovýznamové slovné druhy- sú také slovné druhy, ktoré majú lexikálny význam\n\n Slovesá:\n\n - plnovýznamový slovný druh, majú vetnočlenskú platnosť\n\n - ohybný slovný druh (časujú sa)\n\n - tvar:\n\n - určitý- dajú sa určiť slovesné gramatické kategórie (napr. pracujem- 1. osoba, singulár, prítomný čas, oznamovací spôsob, činný rod, nedokonavý vid)\n\n - neurčitý- nedajú sa určiť slovesné gramatické kategórie (niekedy sa nedá určiť žiadna, niekedy sa niektoré dajú určiť- napr. pracovať [nedokonavý vid]); medzi neurčité slovesné tvary patria:\n\n - neurčitok (napr. volať, písať, kresliť, a pod.)\n\n - prechodník (napr. volajúc, píšuc, kresliac, a pod.- t. j. k tvaru 3. osoby množného čísla sa pridá –c; má iba jeden tvar, čiže sa nedá skloňovať)\n\n - činné príčastie prítomné (napr. volajúci, píšuci, kresliaci, a pod.- tvorí sa od nedokonavých slovies- k tvaru3. osoby množného čísla v prítomnom čase sa pridá –ci)\n\n - činné príčastie minulé (napr. privolavší- tvorí sa od dokonavých slovies, a to tak, že sa od tvaru neurčitku odoberie prípona –ť a pridá sa prípona –vší, -všia, -všie; dnes sa tento tvar pociťuje v texte ako zastaraný)\n\n - trpné príčastie (napr. nesený, volaný, siaty, a pod.- tvorí sa od nedokonavých slovies, a to tak, že sa od tvaru neurčitku odoberie prípona –ť a pridá sa prípona [akú majú prídavné mená] –ený, -ená, -ené/ -ný, -ná, -né/ -tý, -tá, -té)\n\n - slovesné podstatné meno (napr. volanie, nesenie, siatie, a pod.- tvorí sa od základu trpného príčastia príponou –ie; skloňuje sa podľa vzoru vysvedčenie)\n\n - jednoduchý- je vyjadrený jedným slovom (napr. prídu, sedíme, čítal, a pod.)\n\n - zložený- je vyjadrený viacerými slovami (napr. chcem prísť, boli by sme sedeli, budem čítať, a pod.)\n\n - rozdelenie:\n\n - zvratné- súčasťou ich tvarov je vždy zvratné zámeno (napr. učiť, sa, budem sa učiť, učila som sa, smiať sa, smeješ sa, smiali sa, a pod.)\n\n - nezvratné- súčasťou ich tvarov nie je zvratné zámeno (napr. čítať, budem čítať, čítala som, behať, beháš, behali, a pod.)\n\n - plnovýznamové- samy o sebe vyjadrujú nejaký dej, alebo stav (napr. sedieť, počúvať, a pod.)\n\n - činnostné- vyjadrujú činnosť, dej (napr. Mama pečie koláč., Otec umýva auto., a pod.)\n\n - predmetové- vyjadrujú činnosť, ktorá vychádza od činiteľa a zasahuje nejaký objekt; majú vo vete vyjadrený predmet (napr. čítať knihu, hovoriť o prírode, a pod.)\n\n - prechodné slovesá- viažu sa s bezpredložkovým akuzatívom; t. j. je pri nich priamy predmet (napr. čítať knihu, a pod.)\n\n - neprechodné slovesá- sa viažu s iným pádom ako s bezpredložkovým akuzatívom, t. j. je pri nich nepriamy predmet (napr. hovoriť o príhode)\n\n - bezpredmetové- vyjadrujú činnosť, ktorá zasahuje subjekt (napr. Jano beží., a pod.)\n\n - stavové- vyjadrujú stav, v ktorom sa niekto, alebo niečo nachádza (napr. Otec starne., a pod.)\n\n - neplnovýznamové- (napr. chcieť, začínať, a pod.) samy o sebe nemajú úplný lexikálny význam- ten nadobudnú až v spojení s plnovýznamovým slovesom (napr. chcieť spievať, začínať kresliť, a pod.); medzi neplnovýznamové slovesá zaraďujeme:\n\n - modálne slovesá- vyjadrujú vôľu, chuť, chcenie, schopnosť, alebo nevyhnutnosť konať dej (napr. chcieť, môcť, musieť)\n\n - fázové slovesá- vyjadrujú jednotlivé fázy priebehu deja (napr. začínať, zostať, prestávať, a pod.)\n\n - sponové slovesá- vyjadrujú v spojení s plnovýznamovým slovesom jeho platnosť, ako stavu (napr. bude najlepší, stane sa lekárom, a pod.)\n\n - limitné slovesá- v spojení s neurčitkom plnovýznamového slovesa vyjadrujú hraničný stav, ktorý sa nedosiahne (napr. malo ho poraziť- ale ho neporazilo, išlo mu srdce z hrude vyskočiť- ale nevyskočilo, a pod.)\n\n - osoby: 1., 2., 3. osoba jednotného a množného čísla\n\n - čas: minulý, prítomný, budúci\n\n - spôsob: oznamovací, rozkazovací, podmieňovací\n\n - rod:\n\n - činný- podmet vykonáva dej (napr. Murári stavajú dom.)\n\n - trpný- podmet je dejom zasiahnutý, môže mať:\n\n - opisnú formu (napr. Dom je stavaný.)\n\n - zvratnú formu (napr. Dom sa stavia.)\n\n - vid:\n\n - nedokonavý- vyjadruje sa nimi neukončený priebeh deja\n\n - dokonavý- vyjadruje sa nimi ukončený priebeh deja\n\n\n\n Príslovky:\n\n - plnovýznamový slovný druh, majú vetnočlenskú platnosť\n\n - neohybný slovný druh\n\n\n\n - rozdelenie:\n\n - miesta (napr. dole, hore)- odpovedajú na otázky- Kde?, Kam?\n\n - času (napr. včera, dnes)- odpovedajú na otázku- Kedy?\n\n - príčiny (napr. preto, zato)- odpovedajú na otázku- Prečo?\n\n - spôsobu (napr. zle, dobre)- odpovedajú na otázku- Ako?\n\n - niektoré sa dajú stupňovať (tie, ktoré vznikli z akostných prídavných mien)\n\n - nepravidelne- pri stupňovaní sa mení základ slova (napr. mnoho, málo, pekne, dobre, zle, a pod.)\n\n - pravidelne- pri stupňovaní sa nemení základ slova (napr. ticho, oddane, a pod.)\n\n\n\n Číslovky:\n\n - plnovýznamový slovný druh, majú vetnočlenskú platnosť\n\n - ohybný slovný druh (skloňujú sa- okrem niektorých výnimiek)\n\n - druhy:\n\n - základné (napr. jeden, dva, tri, štyri, a pod.)\n\n - skupinové (napr. dvoje, štvoro, a pod.)\n\n - radové (napr. prvý, druhý, tretí, štvrtý, a pod.)\n\n - druhové (napr. dvojaký, štvorako, a pod.)\n\n - násobné (napr. dvakrát, päť ráz, a pod.)\n\n - zlomkové (napr. tretina, štvrtina, a pod.)\n\n - určité (vyjadrujú presný počet)\n\n - neurčité (pomenúvajú nepresný počet)\n\n - rod:\n\n - mužský (napr. prvý)- pri mužskom rode určujeme aj životnosť podľa počítaného podstatného mena\n\n - ženský (napr. prvá)\n\n - stredný (napr. prvé)\n\n - číslo:\n\n - jednotné (napr. druhému)\n\n - množné (napr. druhým)\n\n - pády: N, G, D, A, L, I\n\n - vzory:\n\n - päť- pre číslovky 5-99\n\n - pekný- pre radové a druhové číslovky\n\n - cudzí- pre radové číslovky\n\n - osobitné skloňovanie- majú základné číslovky 1, 2, 3, 4\n\n - žena- napr. pre číslovku miliarda\n\n - dub- napr. pre číslovku milión\n\n - stroj- pre samostatne stojacu číslovku 1 000 (inak je táto číslovka nesklonná)\n\n - mesto- pre samostatne stojacu číslovku 100 (inak je táto číslovka nesklonná)\n\n - rímske číslice: I- 1, V- 5, X- 10, L- 50, C- 100, D- 500, M- 1 000\n\nNájdite v ukážke Bačova žena slovesá, v ukážke Matka príslovky a v ukážke Kým kohút nezaspieva číslovky. Pri niektorých určite vhodné gramatické kategórie.\n\n Bačova žena: daj (2. osoba singuláru, prítomný čas, rozkazovací spôsob, nedokonavý vid, činný rod), trpel, musel, vidieť, nechcem, váľala (3. osoba singuláru, minulý čas, oznamovací spôsob, činný rod, dokonavý vid), sypeš, depceš, šliapeš, rozgniaviť, skáral, nepovedal, zmiluj, odpusť\n\n Matka: ukrutne (príslovka spôsobu), raz, nikdy (príslovka času), vtedy, zato (príslovka príčiny), preto\n\n Kým kohút nezaspieva: jednu, nijakú, tri (ženský rod, množné číslo, N, osobitné skloňovanie), jeden, desať, deväť\n\nVysvetlite pravopis slov: päť krát – päťkrát, dvadsaťjedna žiakov – dvadsaťjeden žiakov, blízko – blísko, vládnúť – vládnuť, piaty zo siedmich detí, vtom – v tom, spamäti – z pamäti\n\n päť krát – päťkrát- pretože číslovky s krát sa píšu vždy spolu\n\n dvadsaťjedna žiakov – dvadsaťjeden žiakov- pretože číslovka jeden je nesklonná\n\n blízko – blísko- pretože v danom slove dochádza k spodobovaniu (blísko- je napísané tak, ako počujeme pri výslovnosti)\n\n vládnúť – vládnuť- v slove vládnúť je porušené pravidlo o rytmickom krátení\n\n piaty zo siedmich detí- správne je zo siedmych detí\n\n vtom – v tom- vtom je príslovka času, v tom- napr. v nejakom predmete\n\n spamäti – z pamäti- spamäti- príslovka spôsobu\n\n\n\nÚloha č. 2\n\nVysvetlite rozličné stvárnenie postáv v ukážkach. Rozoberte najdôležitejšie časti, ktoré sú nositeľmi myšlienkového posolstva celého dramatického diela.\n\n Ivan Stodola: Bačova žena\n\n - psychologická dráma, považuje sa za to najlepšie v slovenskej literatúre\n\n - témy: láska, zasahovanie osudu do života (žena sa stáva ženou dvoch mužov)\n\n - idea: autor odhaľuje zlé ekonomické podmienky na Slovensku\n\n - postavy:\n\n Ondrej- prchký, výbušný, agresívny; všetkého sa chce zmocniť; miluje svoju ženu (nevie, ako jej to dať najavo); zmyslom jeho života bolo zarobiť peniaze (pri práci v štôlňach stratil pamäť); vracia sa z Ameriky, ako veľmi bohatý človek (istým spôsobom si chcel získať Evu pomocou majetku); chcel podobrotky Mišovi vysvetliť, že Eva je jeho (vždy sa však pohádali)\n\n Mišo- citlivý, pokorný; má rád Evu, aj obe deti; bol dobrým manželom- Eve vo všetkom pomáhal\n\n Eva- milujúca žena (mala rada svoje deti, svojho manžela; pracovitá, úctivá, citlivá; zhodou okolností sa stala ženou dvoch mužov; miluje svoje deti (keď jej ich chcú zobrať, spácha samovraždu)\n\n - dej:\n\n - dejstvo- Eva sa hrá so svojimi deťmi, prichádza svokra, ktorá jej vyčíta, že sa vydala. Prichádza Mišo a hovorí, že prišiel „Amerikán“ a odkúpil celé panstvo. Eva v ňom spoznáva Ondreja. (myslela si, že je mŕtvy- mala o tom aj doklad)\n\n - dejstvo- Ondrej žiada Evu, aby sa k nemu vrátila. (prepisuje na ňu celý majetok) Miša Ondrej posiela do Ameriky, že mu vráti všetky peniaze a dá mu 15 000. (súhlasí, ale má podmienku, že s ním pôjde aj Eva) Ondrej sa nahnevá, vyženie ho z panstva a zbavuje ho postavenia baču. Keď za ním prichádza Eva, Ondrej jej oznamuje, že jej vezme syna. (ona ho žiada, aby jej vysvetlil, prečo sa 5 rokov neozval). Ondrej jej vysvetľuje: baňa-nešťastie-strata pamäti-pamäť sa mu vracia pri železničnom nešťastí. (uvedomuje si, že je Ondrej Muranica) Eva sa zmätene vracia domov.\n\n - dejstvo- Eva v noci uteká za Mišom na salaš, ten jej oznamuje, že sa rozhodol odísť do Ameriky a berie so sebou aj malého Miška. Vtom prichádza Ondrej a oznamuje jej, že jej zobral malého Ondríka a už jej ho nikdy nevráti. (Mišo a Ondrej sa začnú biť) Eva znáša rozdelenie svojich detí veľmi zle a spácha samovraždu (posledné slová: „Teraz ma už máte obaja.“)\n\n Július Barč Ivan: Matka\n\n - psychologická dráma z baníckeho prostredia; expresionistická hra\n\n - nastoľuje sa tu otázka života a smrti; postavy prežívajú hrôzu; dej ovplyvňujú nadprirodzené zásahy; text hry je vzrušený a má veľa nedokončených viet; kompozícia má klasické členenie (hra sa skladá z dejstiev)\n\n - idea: závisť a nenávisť, ktorá ničí a zabíja všetko a všetkých\n\n - postavy:\n\n matka- typická expresionistická postava, vdova; Paľa vychovala k tomu, aby Janovi ustupoval; medzi Paľom a ňou je Oidipovský komplex; ľudia v dedine jej nerozumejú (myslia si, že je bláznivá); v hre sa pohybuje od jedného syna k druhému (naoko podporuje Jana, aby neublížil Paľovi)\n\n Jano- negatívne vlastnosti, nikto ho nemá rád; pije; z túžby po peniazoch vyháňa Paľa do Ameriky (myslí si, že Paľo sa vráti bohatý a on bude z neho profitovať); k matke sa správa veľmi zle (je surový, keď ju zabije, Paľo chce zobrať vinu na seba- Jano odmieta a poprosí susedu, aby zavolala políciu)\n\n Paľo- dobré vlastnosti, závislý na matke- matka mu dala vlastnosť (nevie s vymaniť z jej vplyvu)\n\n - dej:\n\n - expozícia- predstavujú sa postavy (matka Anna, synovia Paľo a Jano); matka má predtuchu, že Paľo sa vráti z Ameriky\n\n - kolízia- Paľo sa vráti a Jano ho privíta s nenávisťou\n\n - kríza- Kata, bývalé Paľovo dievča sa priznáva matke, že stále ľúbi Paľa (odmieta dvorenie Jana); matka má vidinu, že brat zabije brata (poprosí Paľa, aby nechodil za Katou)\n\n - peripetia- Paľo ide za paholka ku Katiným rodičom a chcú sa zobrať\n\n - katastrofa- Jano zaútočí na Paľa s nožom; matka zhasína svetlo (namiesto Paľa Jano zabije matku)\n\n Ivan Bukovčan: Kým kohút nezaspieva\n\n - existencionalistická dráma\n\n - témou je zatknutie 10 ľudí a ich charakter v boji o záchranu života (sú väznení v pivnici)\n\n - idea: poukázal na egoizmus, pud sebazáchovy v hraničnej situácii\n\n - postavy:\n\n učiteľ Tomko- predstavuje inteligenciu; spočiatku sa nechcel priznať, čo sa mu stalo (neskôr ho Ondrej odhalil); predstavuje akýsi spojovací prvok medzi všetkými postavami; zachováva si tvár človeka aj v hraničnej situácii; vyjednáva s Fischlom\n\n Ondrej- mladý chlapec, v pivnici sa ocitá medzi prvými; má rád Fanku (zastáva sa jej počas rozhodovania, koho vyberú); ku koncu príbehu stráca nervy (je zhnusený z ľudí v pivnici); chce sa obetovať za všetkých, aby skončil neznesiteľné intrigánstvo zachováva si tvár človeka\n\n Fanka- mladé dievča (ešte je pod zákonom) keď je v pivnici sama s Ondrejom chce aby si spolu ľahli do postele; bojí sa, že by mala zomrieť\n\n Tulák- človek, ktorého nikto nepoznal, nikto nikdy nevidel (je odnikiaľ); neskôr sa priznáva, že utiekol z transportu do koncentračného tábora; dostáva sa do konfliktu s Uhríkom (vychádza z neho ako morálny víťaz, aj napriek tomu, že umiera); tiež si zachováva tvár človeka, uvažuje racionálne, nič neskrýva, je priamy\n\n pán Terezčák- starý 72 ročný pán, ktorý bol v pivnici ako úplne prvý (chytili ho o pol siedmej, keď sa vracal z cintorína); potrpí si na to, aby sa k nemu ľudia správali úctivo; dozvedá sa pravdu o svojom synovi (nebol fašista, ale naopak pomáhal hrdinom v SNP); všetko mu je viac- menej jedno, chce hlavne pomstiť svojho syna); často cituje Bibliu\n\n babica- pani Babjaková- bola pôrodná baba (chytili ju pri vykonávaní činnsoti); neskôr vyšlo najavo, že pomáhala rodičke potratiť; bola proti Terezčákovi, podlizovala sa Fischlovi\n\n pani lekárnikova- hrdá, bohatá panička (odchytili ju, keď sa vracala z pošty); zistila, že ju vlastný muž podvádzal s Marikou; vykladala karty (4x jej vyšla tá istá karta)\nDr. Šustek- bol zverolekárom (chytili ho, keď sa vracal zo zabíjačky od švagra- vojaci mu zobrali výslužku); chcel sa silou mocou dostať z pivnice (nedarí sa mu to, chcel tak urobiť na úkor iných)\n\n holič Samo Uhrík- bol holičom; hovoril, že ho pán Severíni zachráni (lebo ho každý deň strihá a holí); mal pri sebe svoje holičske náradie; chcel sa dostať z pivnice, nechcel zomrieť; nevydržal situáciu, praskli mu nervy, nezachoval sa ako človek (zabil tuláka);\n\n bolo mu jedno, kto zomrie, len nech to nie je on\n\n Marika- prostitútka; povedala všetkým, čo sa stalo (ako niekto zabil nemeckého vojaka); necítila sa menejcenne len preto, že bola taká, aká bola; nechcela zomrieť\n\n pán Fischl- pôvodom Nemec, obchodník s drevom; hostiteľ majora von Lucasa; bol akýmsi prostredníkom medzi pivnicou a okolitým svetom; snažil sa pomôcť ľudďom, ktorí boli rukojemníkmi; keď sa dozvedel, že Uhrík zabil tuláka, tiež to psychicky nevydržal; robil, čo bolo v jeho silách, aby ich zachránil","number":17},"18":{"tema_jazyk":"Klasifikácia viet podľa zloženia, súvetia","tema_lit":"Prúd autorovho vedomia, voľné asociácie","autori":["Dušan Dušek","J. C. Hronský","James Joyce","Franz Kafka"],"diela":["Kufor na sny","Pisár Gráč","Odyseus","Premena"],"okruh_jazyk":"Syntax - súvetia","okruh_lit":"Moderná netradičná próza","full":"Úloha č. 1\n\nVysvetlite, čo je to veta a klasifikujte vety podľa zloženia.\n\n Veta:\n\n - je základná jednotka komunikácie\n\n - vyjadruje ucelenú myšlienku, pričom je zvukovo (intonačne) a gramaticky usporiadaným celkom\n\n - rozdelenie:\n\n - jednoduchá (má práve 1 prisudzovací sklad):\n\n - holá- obsahuje len hlavné vetné členy\n\n - rozvitá- obsahuje aspoň 1 rozvíjací vetný člen\n\n - jednočlenná (nedá sa rozčleniť na prísudkovú a podmetovú časť):\n\n - slovesná- vetný základ je vyjadrený slovesom\n\n - neslovesná- vetný základ nie je vyjadrený slovesom\n\n - dvojčlenná (dá sa rozčleniť na podmetovú a prísudkovú časť):\n\n - úplná- má vyjadrený aj podmet\n\n - neúplná- nemá vyjadrený podmet, ale je vyjadriteľný\n\n - súvetie- zložená veta (má aspoň 2 prisudzovacie sklady)\n\n - jednoduché (má práve 2 prisudzovacie sklady):\n\n - priraďovacie (2 gramaticky rovnocenné vety):\n\n - zlučovacie- deje prebiehajú súčasne, alebo tesne za sebou\n\n - stupňovacie- obsah jednej vety stupňuje obsah druhej vety\n\n - odporovacie- obsah jednej vety odporuje obsahu druhej vety\n\n - vylučovacie- obsah jednej vety vylučuje obsah druhej vety\n\n - dôvodové- obsah druhej vety vysvetľuje príčinu, alebo motív deja prvej vety\n\n - dôsledkové- obsah druhej vety vyjadruje dôsledok, alebo myšlienkový záver prvej vety\n\n - podraďovacie (1 veta je nadradená [hlavná] a 1 je podradená [vedľajšia]):\n\n - s prísudkovou vedľajšou vetou\n\n - s podmetovou vedľajšou vetou\n\n - s predmetovou vedľajšou vetou\n\n - s príslovkovou vedľajšou vetou (miestnou, časovou, spôsobovou, príčinnou)\n\n - s prívlastkovou vedľajšou vetou\n\n - s doplnkovou vedľajšou vetou\n\n - zložené (má aspoň 3 prisudzovacie sklady)\n\n\n\n\n\nUrčite v ukážkach Pes a Pisár Gráč vety označené iným typom písma (kurzívou) a určite typ súvetia.\n\n Sused má psa, ktorý nevie, že je blázon.-\n\n Musím dávať pozor, ináč mi hneď vojdú do cesty.-\n\n Sedí pod ním, vrtí chvostom tak, že zametá zem a zamilovane pozerá na svojho bláznivého pána.-\n\n Zahnú za roh a vojdu mi do cesty.-\n\n Ráčte ho prijať ako dobrú radu od človeka, ktorý nikdy nebol múdry, lebo nikdy nemlčal a myslel si, že príkazy božie sú pre ľudí.-\n\nDoplňte do textu Odyseus interpunkčné znamienka tak, aby vznikli dve podraďovacie súvetia a určite typ vedľajšej vety.\n\nÚloha č. 2\n\nVysvetlite princíp voľných asociácií v rozprávaní a pojem prúd autorovho vedomia. Vysvetlite rozdiel: dielo so skrytým významovým plánom a dielo, v ktorom absentuje dejová rovina. Objasnite bizarnosť postáv v netradičnej próze.\n\n Princíp voľných asociácií- neočakávané a voľné spájanie citov, myšlienok a obrazov mysli človeka do väčších celkov (asociácií)\n\n Prúd autorovho vedomia- pokus zachytiť myšlienkový proces skôr, ako sa myšlienka sformuje do vety; snaha vyjadriť všetko, čo je slovami nevyjadrené, slabo organizované (vyjadrené vnútorným monológom)\n\n Dielo so skrytým významovým plánom- dielo, v ktorom nie je jeho význam, alebo myšlienkové posolstvo, ktoré nám autor podáva otvorene vyslovené v pásme postáv, alebo rozprávača, ale v ktorom vyplýva z textu pri premýšľaní, dotváraní naznačených vzťahov a súvislostí\n\n Dielo, v ktorom absentuje dejová rovina- je tvorené spájaním jednotlivých príbehov a motívov, nemá pevnú dejovú líniu tvorenú časovou následnosťou udalostí\n\n Bizarnosť postáv- mnohé bizarné postavy sú alegóriou na problémy vtedajšej spoločnosti, alebo jej symbolom (napr. Franz Kafka: Premena- premena Gregora Samsu na hmyz); pri prúde autorovho vedomia splývala fantázia s realitou\n\n\n\n Dušan Dušek: Kufor na sny\n\n - zbierka 33 poviedok\n\n - mnohé poviedky sú mozaikovité (ich obsah s nedá zreprodukovať)\n\n - frekventovanou témou jeho poviedok je popri detstve aj vzťah medzi mladšou a staršou generáciou\n\n - jeho texty nemajú klasickú kompozíciu\n\n - autor hľadá originalitu vo všedných veciach, snaží sa o vykreslenie každodennosti, všednosti\n\n - poviedky sú zaplnené drobnými rázovitými postavičkami, ktorým často chýba bližšia charakteristika\n\n\n\n James Joyce: Odyseus\n\n - írsky spisovateľ píšuci po anglicky; priekopník nového, moderného typu prózy- „prúdu vedomia“\n\n - literárny žáner: román\n\n - téma: jeden deň obyvateľov Dublinu a všetko, čo sa v tento deň stihlo odohrať\n\n - je paródiou Homérovho eposu Odysea a jeho putovania\n\n - každý človek je vnímaný rozličnými osobami a popisovaný z rôznych hľadísk\n\n - zachytáva zážitky bezvýznamného židovského novinára a reklamného agenta Leopolda Blooma (predstavuje Odysea), učiteľa a spisovateľa Stephena Dedalusa (zodpovedá Telemachovi) a Bloomovej ženy- opernej speváčky Molly (predstavuje Penelopu)\n\n - rovanko, ako bájny grécky hrdina putuje aj Bloom; putuje z miesta na miesto, stretáva zaujímavých ľudí a prekonáva rôzne nástrahy\n\n - autor vytvoril kontrast medzi malicherným pachtením Blooma a činmi starovekých hrdinov\n\n\n\n Jozef Cíger Hronský: Pisár Gráč\n\n - literárny žáner: román\n\n - rozprávačom a hlavným hrdinom je Gráč, ktorý robil pisára v inkasnej firme\n\n - Gráč sa v románe retrospektívne vracia do minulosti- spomína na svoje detstvo, na svoju matku, otca, i brata, 1. svetovú vojnu,...\n\n - zobrazuje absurditu vojny- jej absurdita sa ukazuje v ľuďoch a ich absurdnom správaní\n\n\n\n Franz Kafka: Premena\n\n - literárny žáner: poviedka\n\n - téma: premena Gregora Samsu na hmyz a jeho postupný fyzický a psychický úpadok\n\n - hlavná myšlienka: autor poukazuje na plytké rodinné a medziľudské vzťahy\n\n - autor využíva nespoľahlivého rozprávača (strieda sa vševediaci s priamym)\n\n - poviedka je vybudovaná na voľne radených príbehoch a situáciách, nemá tradičnú kompozíciu poviedky\n\n - má alegorický význam- ak spoločnosť nemá zo svojich členov úžitok, alebo má s nimi problémy, tak sú pre spoločnosť zbytoční a spoločnosť ich necháva napospas osudu","number":18},"19":{"tema_jazyk":"Nepravidelnosti vetnej stavby (výpustka, vsuvka, prístavok...)","tema_lit":"Absurdná dráma","autori":["M. Lasica + J. Satinský","Samuel Beckett","Václav Havel"],"diela":["Nečakanie na Godota","Čakanie na Godota","Zahradní slavnost"],"okruh_jazyk":"Syntax - osobitosti","okruh_lit":"Absurdná dráma","full":"Úloha č. 1\n\nVysvetlite nepravidelnosti v stavbe vety a určite: vytýčený vetný člen, pripojený vetný člen, osamostatnený vetný člen, výpustku, neukončenú výpoveď, vsuvku, prístavok. Mladosť – pochabosť. Jednotka, tá ešte neznamená úspech v živote. Vrátili sme sa z výletu, včera. Hora spievala chorál. Ticho a nábožne. Prišlo mi ľúto, že som sa s Dorou... Pes, verný priateľ človeka, čakal pred domom. Remeslo má zlaté dno, ako vravievala stará mama.\n\n Nepravidelnosti v stavbe vety:\n\n - nachádzajú sa v spontánnych ústnych jazykových prejavoch, ktoré bezprostredne plynú v čase a priestore a hovoriaci nemá čas na dôkladnejšie spracovanie myšlienkového obsahu, ani na dokonalú syntaktickú stavbu výpovede\n\n - majú modifikovanú pravidelnú vetnú štruktúru\n\n - k modifikácii dochádza z objektívnych i subjektívnych príčin a to v ústnych i písaných textoch\n\n - apoziopéza (nedokončená, prerušená výpoveď)- je to násilne prerušená, alebo zo subjektívnych príčin formálne a významovo neuzavretá, neukončená výpoveď; nevyjadrená časť výpovede je jadro výpovede (napr. Chcel som prísť, ale...)\n\n - proziopéza- vynecháva sa v nej začiatok výpovede, spravidla tak, že sa nevyslovia začiatočné slabiky prvého slova, a to pod tlakom času, z nedbanlivosti, prípadne z etnických príčin (napr. brý deň!; ...si myslím, že...)\n\n - prerývaná výpoveď- graficky rozčlenená, ale na rozdiel od apozipézy formálne a významovo uzavretá syntaktická jednotka; miesta prerušenia sa graficky signalizujú troma bodkami a intonačne neskončenou prestávkou, pričom sa môže aktualizovať aj melódia, prípadne dôraz (napr. ...a ja som si myslela, že... a on tiež... a teraz som takto ostala.)\n\n - vytýčený (vysunutý) vetný člen- je to výraz zložený z menného základu a zámena, ktoré ako synonymum zdôrazňuje predchádzajúce slovo (napr. Jahody, tie si dám vždy rada.)\n\n - osamostatnený vetný člen- vzniká vyňatím z vety, a to jeho postavením, ako samostatného dodatku k vete (napr. Prekvapil si ma. Nemilo); je to výraz, ktorý je formálne povýšený na samostatnú výpoveď- tým že podávateľ časť výpovede vyčlení a povýši na samostatnú výpoveď, hierarchizuje obsah a vyjadruje svoj hodnotiaci postoj (napr. Mám rada zákusok. Kokosový; O mesiac som dostal list. Od Zuzy.)\n\n - pripojený vetný člen- vzniká tak, že sa k ukončenej vete pridá ďalší výraz; aj bez tohto dodaného výrazu by však predchádzajúca veta bola gramaticky úplná (napr. Chodím rada do kina, ale len na komédie.)- je umiestnený na konci vety\n\n - elipsa (výpustka)- je neúplná výpoveď, ktorá vzniká vypustením niektorej časti výpovede- zvyčajne tej časti, ktorá je známa z kontextu (napr. Mladí chcú cestovať. Ja do Austrálie.) alebo zo situácie (napr. Mne kofolu.- čašníkovi v reštaurácii); hoci si vynechanie tejto časti uvedomujeme, výpoveď pociťujeme, ako obsahovo úplnú\n\n - parentéza (vsuvka)- vyjadruje autorov postoj k obsahu výpovede, alebo ho spresňuje; slúži na hierarchizáciu obsahu v rámci jednej vety- hierarchicky nadradený obsah je spravidla vyjadrený v základnej výpovedi (napr. Často sa po práci – zaplavený nevýslovnou nehou – usmial pri pohľade na jej fotografiu.; Ty si, ako vidím, rozhodnutá.)\n\n Mladosť – pochabosť.- výpustka\n\n Jednotka, tá ešte neznamená úspech v živote.- vytýčený vetný člen\n\n Vrátili sme sa z výletu, včera.- pripojený vetný člen\n\n Hora spievala chorál. Ticho a nábožne.- osamostatnený vetný člen\n\n Prišlo mi ľúto, že som sa s Dorou...- apoziopéza (nedokončená, prerušená výpoveď)\n\n Pes, verný priateľ človeka, čakal pred domom.- prístavok\n\n Remeslo má zlaté dno, ako vravievala stará mama.- parentéza (vsuvka)\n\nNájdite v texte aspoň päť podobných modifikácii vetnej stavby a polovetných konštrukcií.\n\n ...že ich čakáme my...- prozipéza\n\n No predsa ten... na koho čakáte?- prerývaná výpoveď\n\n Ale tak – na kus řeči – poplkat si...- vsuvka (parentéza)\n\n Klidne vyzvídej...- apoziopéza (nedokončená, prerušená výpoveď)\n\n Prezraďte mi, prosím vás, čo tu vlastne robíte?- vsuvka (parentéza)\n\n\n\nÚloha č. 2\n\nVysvetlite podstatu absurdnej drámy. Porovnajte klasickú a absurdnú drámu. Vyjadrite osobný vzťah k absurdnému spracovaniu drámy.\n\n- po druhej svetovej vojne sa vo francúzskej literatúre objavil nový typ divadelnej hry, ktorý čiastočne nadväzoval na prózu prúdu vedomia- začal sa označovať ako absurdná (nezmyselná dráma)\n\n- pôvodní francúzski autori (Samuel Beckett, Eugéne Ionessco) podobne ako avantgardní spisovatelia experimentovali a rezignovali na racionálne postupy a logiku:\n\n- rozbili a v mnohých prípadoch celkom zlikvidovali príbeh\n\n- využívajú svojrázne dialógy\n\n- hry nemajú dej, ani kompozíciu, nijakú skutočnú zápletku, ani žiadne riešenie, pretože nebolo čo vyriešiť\n\n- dôležitú úlohu zohráva dialóg, ktorého úlohou je komentovať situáciu, vyznieva komicky, až tragicky\n\n- autori z neslobodných európskych štátov priniesli celkom nový rozmer absurdnej drámy- absurdné divadlo ponúkalo chápajúcim divákom osobitný druh komunikácie, ktorý prinášal skryté významy, ale najmä úsmev v kontraste s ideologickou pretvárkou\n\n- u nás: Milan Lasica a Július Satinský (Nečakanie na Godota, Náš priateľ René), Stanislav Štepka (Jááánošík, Človečina), Václav Havel (Záhradní slávnost, Vernisáž)\n\n- humor absurdnej drámy sa skrýva v nonsensových dialógoch, nedorozumeniach v replikách, ktoré na seba logicky nenadväzujú; využívajú sa slovné hračky; autori používajú iróniu, narážky na dobu\n\nKlasická vs. Absurdná dráma\n\n- klasická dráma- základný druh umeleckej literatúry, dialógy a monológy + neprítomnosť rozprávača (scénické poznámky); určená na scénickú realizáciu; základné žánre: tragédia, komédia, činohra\n\n- kompozícia:\n\n- klasická dráma- vonkajšia- dejstvá, výstupy; vnútorná- expozícia, kolízia, kríza, peripetia, katastrofa\n\n- absurdná dráma- chýba obvykle akákoľvek kompozícia\n\n- dialógy:\n\n- klasická dráma- prostredníctvom neho sa zobrazujú charaktery postáv, musí byť dynamický\n\n- absurdná dráma- slúži na vytvorenie humornosti a absurdných situácií- často bez vnútornej nadväznosti\n\n- kulisy:\n\n- klasická dráma- zložité hodnoverné kulisy a kostýmy\n\n- absurdná dráma- jednoduché/žiadne kulisy\n\n- dejovosť: je znakom klasickej drámy, v absurdnej dráme môže úplne chýbať\n\nOsobný vzťah k absurdnej dráme:\n\nAbsurdnú drámu považujem za zaujímavú formu literárneho diela, lebo je vtipná, napriek tomu, že rieši situácie reálneho života. Mám rada/rád intelektuálny humor plný narážok na kultúrny, spoločenský a politický život. Okrem iného preferujem divadlo pred knihami, pretože je to pohodlnejšie, a je to zaujímavá spoločenská udalosť. Mám rada/rád humor Lasicu a Satinského, a páči sa mi, že komunikovali s publikom.","number":19},"20":{"tema_jazyk":"Administratívny štýl","tema_lit":"Chronologický a retrospektívny kompozičný postup","autori":["Alfonz Bednár","Ladislav Mňačko"],"diela":["Kolíska","Ako chutí moc","Smrť sa volá Engelchen"],"okruh_jazyk":"Sloh - administratívny štýl","okruh_lit":"Slovenská próza po 1945","full":"Úloha č. 1\n\nCharakterizujte administratívny štýl. Vymenujte administratívne žánre (útvary), ktoré poznáte a ktoré z nich môžu mať predtlač.\n\n- Administratívny štýl- má viacero spoločných vlastností s náučným štýlom; ide o oficiálny štýl verejného styku, ktorý sa používa na komunikáciu medzi občanom a úradom, alebo úradmi navzájom (vo verejnej správe, v službách, v advokácii,...)\n\n- Znaky:\n\n- písomnosť- prevažuje písomná forma, ktorú upravujú STN, prevažujú zložené súvetia, oznamovacie vety\n\n- verejnosť, adresnosť- štýl verejného styku, úradnej komunikácie; niektoré z nich majú svojho adresáta\n\n- presnosť, pojmovosť- slová bez citového zafarbenia, opakuje sa niekoľko konštrukcií, ustálené slovné spojenia a združené pomenovania, kancelarizmy\n\n- schematickosť- objektívny štýl, nachádzajú sa tu viaceré slohové postupy\n\n- administratívne texty sú väčšinou monologické a písomné (môžu mať aj ústnu podobu- vopred pripravená, len ústne prednesená); sú objektívne a neosobné, ich obsah musí byť jednoznačný a vecný\n\n- cieľom je predovšetkým čo najefektívnejšia, najrýchlejšia a najpresnejšia komunikácia (komunikatívna funkcia)\n\n- žánre:\n\n- dokumentárne- zápisnica, protokol, potvrdenka, zmluva, rezolúcia, záväzok, zmenka, splnomocnenie, dlžobný úpis\n\n- oznamovacie- vyhláška, oznámenie, hlásenie, správa o činnosti, úradný prípis, oficiálne pozvánka, žiadosť, prihláška, reklamácia, urgencia, sprievodný list, objednávka, inzerát, telegram, upomienka, dotazník, ponuka služieb\n\n- heslové- vysvedčenie, štruktúrovaný životopis, diplom, faktúra, tlačivá (poštové, dopravné, bankové), cestovné príkazy\n\n- predtlač môžu mať: potvrdenka, prihláška, dotazník, vysvedčenie, diplom, tlačivá\n\nVysvetlite, aký by bol rozdiel pri vypracovaní objednávky, reklamácie a motivačného listu v porovnaní so žiadosťou.\n\n Objednávka: je v nej názov firmy, údaje o firme, údaje o objednávateľovi, číslo a dátum objednávky, popis objednávaného tovaru, množstvo a cena, dodacie a platobné podmienky, telefón/mail, podpis objednávajúceho; nie sú tu žiadne zdvorilostné frázy\n\n Reklamácia: rovnaká forma ako pri žiadosti, vo vlastnom texte popíšete, kedy ste si kúpili výrobok, kedy a ako došlo k poškodeniu výrobku, popíšete poškodenie, uvediete, či žiadate nový kus/vrátenie peňazí\n\n Motivačný list: slúži na predstavenie uchádzača budúcemu zamestnávateľovi; zdôrazňuje konkrétne špecifické vlastnosti uchádzača štruktúra motivačného listu je jednoduchá a prehľadná; pozostáva z hlavičky (meno, adresa, telefón, email), adresáta (názov a adresa spoločnosti), oslovenia, obsahu listu, dátumu, miesta, mena (resp. podpisu); vyzdvihnite svoje vlastnosti a zručnosti a zdôvodnite, prečo práve vy ste pre ich spoločnosť najlepší\n\nAdresujte Gymnáziu Jozefa Miloslava Hurbana v Čadci žiadosť, v ktorej žiadate o vyhotovenie duplikátu maturitného vysvedčenia.\n\n Meno Priezvisko, Adresa, PSČ\n\n Gymnázium Jozefa Mil
