<script>
"use strict";

const DATA = JSON.parse(document.getElementById('data-blob').textContent);

const STATE = {
  view: 'home',
  currentZadanie: null,
  flashcardsFilter: 'srs',
  fcIndex: 0, fcFlipped: false, fcDeck: [],
  quizMode: 'random', quizZadanie: null,
  quizIndex: 0, quizAnswered: false, quizSelected: null, quizDeck: [], quizCompleted: false,
  searchQuery: '',
  examActive: false, examZadanie: null, examStartTime: null, examElapsed: 0, examPhase: 'pick',
  readMode: 'full', // full | recap | qa
  openQAs: {}, // {zadanieN_qIdx: true}
  ttsPlaying: false,
  ttsPaused: false,
  ttsUtterance: null,
  ttsPanelOpen: false,
  miniQuiz: null, // {qIdx, answered, selected, deck}
};

const STORAGE_KEYS = {
  done: 'maturita_done',
  fc: 'maturita_fc_srs',
  quiz: 'maturita_quiz_stats',
  notes: 'maturita_notes',
  bookmarks: 'maturita_bookmarks',
  streak: 'maturita_streak',
  examLog: 'maturita_exam_log',
  readMode: 'maturita_read_mode',
};

let PROGRESS = {
  done:{}, fc:{}, quiz:{correct:0,total:0,byZadanie:{}},
  notes:{}, bookmarks:{}, streak:{lastDay:null,count:0,days:[]}, examLog:[],
};

async function loadProgress(){
  const defaults={done:{},fc:{},quiz:{correct:0,total:0,byZadanie:{}},notes:{},bookmarks:{},streak:{lastDay:null,count:0,days:[]},examLog:[]};
  for (const k of Object.keys(defaults)){
    try{
      const r=await window.storage?.get(STORAGE_KEYS[k]);
      if(r&&r.value) PROGRESS[k]=JSON.parse(r.value);
      else PROGRESS[k]=defaults[k];
    }catch(e){PROGRESS[k]=defaults[k]}
  }
  try{
    const rm = localStorage.getItem(STORAGE_KEYS.readMode);
    if (rm) STATE.readMode = rm;
  }catch(e){}
}
async function savePart(key){try{await window.storage?.set(STORAGE_KEYS[key],JSON.stringify(PROGRESS[key]))}catch(e){}}

function toast(msg,duration=1800){
  const c=document.getElementById('toast-container');
  c.innerHTML='';
  const t=document.createElement('div');
  t.className='toast';t.textContent=msg;
  c.appendChild(t);
  setTimeout(()=>t.remove(),duration);
}

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function todayStr(){return new Date().toISOString().slice(0,10)}
function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function slovakLower(s){return String(s).toLowerCase().replace(/[áä]/g,'a').replace(/é/g,'e').replace(/[íi]/g,'i').replace(/[óô]/g,'o').replace(/[úü]/g,'u').replace(/ý/g,'y').replace(/[čć]/g,'c').replace(/ď/g,'d').replace(/[ľĺ]/g,'l').replace(/ň/g,'n').replace(/[ŕř]/g,'r').replace(/š/g,'s').replace(/ť/g,'t').replace(/ž/g,'z')}

function highlightText(text,q){
  if(!q||q.length<2)return parseInlineMarkdown(escapeHtml(text));
  const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return parseInlineMarkdown(escapeHtml(text).replace(re,'<mark>$1</mark>'));
}

// === INLINE MARKDOWN PARSER ===
// Handles **bold** and *italic* properly
function parseInlineMarkdown(text){
  let s = text;
  // Bold: **text** (greedy but stops at next **)
  s = s.replace(/\*\*([^*\n]+?)\*\*/g, '<strong>$1</strong>');
  // Italic: *text* (after bold to avoid conflicts)
  s = s.replace(/(^|[^*])\*([^*\n]+?)\*(?!\*)/g, '$1<em>$2</em>');
  return s;
}

// === STREAK ===
function updateStreak(){
  const today=todayStr(); const s=PROGRESS.streak;
  if(s.lastDay===today)return false;
  if(s.lastDay){
    const diff=Math.floor((new Date(today)-new Date(s.lastDay))/(86400000));
    if(diff===1) s.count=(s.count||0)+1;
    else if(diff>1) s.count=1;
  } else s.count=1;
  s.lastDay=today; s.days=s.days||[];
  if(!s.days.includes(today)) s.days.push(today);
  if(s.days.length>60) s.days=s.days.slice(-60);
  savePart('streak'); return true;
}

// === SRS ===
const SRS_INTERVALS=[0,1,3,7,14,30];
function getSrsBox(term){const r=PROGRESS.fc[term];return r?(r.box||0):-1}
function markCard(term,knewIt){
  const now=Date.now(); const rec=PROGRESS.fc[term]||{box:0,lastSeen:0,nextDue:0};
  rec.box=knewIt?Math.min(5,(rec.box||0)+1):Math.max(0,(rec.box||0)-1);
  rec.lastSeen=now;
  rec.nextDue=now+SRS_INTERVALS[rec.box]*86400000;
  PROGRESS.fc[term]=rec; savePart('fc');
}
function isDue(term){const r=PROGRESS.fc[term];return !r||Date.now()>=(r.nextDue||0)}
function srsStatusOf(term){const b=getSrsBox(term);if(b===-1)return'new';if(b<=1)return'learning';if(b<=3)return'review';return'mastered'}

function buildFcDeck(){
  const f=STATE.flashcardsFilter; let deck=DATA.flashcards.slice();
  if(f==='srs'){deck=deck.filter(c=>isDue(c.term));deck.sort((a,b)=>{const ba=getSrsBox(a.term),bb=getSrsBox(b.term);if(ba===-1&&bb!==-1)return -1;if(bb===-1&&ba!==-1)return 1;return ba-bb})}
  else if(f==='Jazyk'||f==='Literatúra') deck=deck.filter(c=>c.kategoria===f);
  else if(f==='struggling') deck=deck.filter(c=>getSrsBox(c.term)>=0&&getSrsBox(c.term)<=1&&PROGRESS.fc[c.term]);
  else if(f==='new') deck=deck.filter(c=>getSrsBox(c.term)===-1);
  else if(f==='mastered') deck=deck.filter(c=>getSrsBox(c.term)>=4);
  else if(typeof f==='string'&&f.startsWith('z')){const n=parseInt(f.slice(1));deck=deck.filter(c=>c.zadanie===n)}
  return deck;
}
function refreshFcDeck(){STATE.fcDeck=buildFcDeck();if(STATE.fcIndex>=STATE.fcDeck.length)STATE.fcIndex=0}

// === IMPROVED MARKDOWN-AWARE CONTENT PARSER ===
// Parses the full text and identifies question-answer structure
function parseContentToQA(text){
  if(!text) return {sections:[]};
  
  // Normalize whitespace
  let txt = text.replace(/\r\n/g,'\n').replace(/\t/g,'');
  // Pre-clean stray ** markers
  txt = txt.replace(/\*{4,}/g,'**');
  
  // Split by Úloha headers
  const ulohaSplit = txt.split(/(?=Úloha č\.?\s*\d+)/);
  const sections = [];
  
  for (const part of ulohaSplit){
    if (!part.trim()) continue;
    const ulohaMatch = part.match(/^Úloha č\.?\s*(\d+)/);
    let ulohaNum = ulohaMatch ? parseInt(ulohaMatch[1]) : 0;
    let body = ulohaMatch ? part.slice(ulohaMatch[0].length) : part;
    body = body.trim();
    
    // Find question markers - bold passages starting with question keywords
    // Use a robust matcher: ** followed by content with question word
    const qKeywords = ['Vysvetli','Charakterizuj','Porovnaj','Rozober','Analyzuj','Vyjadr','Ako za','Definuj','Nájdite','Určite','Pomenuj','Zaraď','Uveď','Identifikuj','Vymenuj','Priraď','Vytvor','Doplň','Adresuj','Predstav','Pripravte','Poukáž','Zhodnoť','Objasn','Zarecituj','Opíš','Popíš','Zhrň','Zostav','Prečítaj','Sformul','Napíš'];
    
    // Find all bold-marked questions in body
    const questionsFound = [];
    let bodyForSearch = body;
    
    // Strategy: find all ** ... ** that look like questions
    const boldRe = /\*\*([^*\n]{15,500}?)\*\*/g;
    let m;
    while ((m = boldRe.exec(body)) !== null){
      const candidate = m[1].trim();
      const startsWithKw = qKeywords.some(k => candidate.startsWith(k));
      if (startsWithKw || candidate.endsWith('?')){
        questionsFound.push({
          start: m.index,
          end: m.index + m[0].length,
          text: candidate
        });
      }
    }
    
    if (questionsFound.length === 0){
      // No questions found, treat whole body as content
      sections.push({uloha: ulohaNum, intro: body, qas: []});
      continue;
    }
    
    // Intro before first question
    const intro = body.slice(0, questionsFound[0].start).trim();
    const qas = [];
    
    for (let i = 0; i < questionsFound.length; i++){
      const q = questionsFound[i];
      const nextStart = i+1 < questionsFound.length ? questionsFound[i+1].start : body.length;
      let answer = body.slice(q.end, nextStart).trim();
      // Remove leading/trailing stray *
      answer = answer.replace(/^\*+|\*+$/g,'').trim();
      qas.push({
        question: q.text,
        answer: answer,
        hasAnswer: answer.length > 30
      });
    }
    
    sections.push({uloha: ulohaNum, intro, qas});
  }
  
  return {sections};
}

// === RENDER CONTENT BLOCKS (lines into html) ===
function renderContentLines(text, highlightQuery){
  if (!text) return '';
  const lines = text.split('\n');
  let html = '';
  let ukazkaBuf = [];
  
  function flushUkazka(){
    if (ukazkaBuf.length){
      const txt = ukazkaBuf.join('\n').trim();
      if (txt) html += `<div class="ukazka">${parseInlineMarkdown(escapeHtml(txt))}</div>`;
      ukazkaBuf = [];
    }
  }
  
  for (let i = 0; i < lines.length; i++){
    const raw = lines[i];
    const line = raw.trim();
    if (!line){ continue; }
    
    // Sub-heading: line ends with ":" and is short, no commas
    if (line.endsWith(':') && line.length < 80 && line.length > 5 && !/[,!?]/.test(line.slice(0,-1))){
      flushUkazka();
      let h = line;
      // Strip surrounding ** if any
      h = h.replace(/^\*+|\*+$/g,'').trim();
      html += `<div class="sub-heading">${highlightQuery ? highlightText(h, highlightQuery) : parseInlineMarkdown(escapeHtml(h))}</div>`;
      continue;
    }
    
    // Bullet
    if (line.startsWith('- ') || line.startsWith('• ')){
      flushUkazka();
      const content = line.slice(2);
      html += `<div class="bullet">${highlightQuery ? highlightText(content, highlightQuery) : parseInlineMarkdown(escapeHtml(content))}</div>`;
      continue;
    }
    
    // Detect verse/quote lines (poetry from authors)
    // Heuristic: lines that start with capital, no period at end, but in a sequence
    // For now, treat as paragraph
    flushUkazka();
    html += `<p>${highlightQuery ? highlightText(line, highlightQuery) : parseInlineMarkdown(escapeHtml(line))}</p>`;
  }
  flushUkazka();
  return html;
}

// === RENDER MARKDOWN (FOR SUPPLEMENTARY) ===
// Supports **bold**, *italic*, tables, bullets, headings
function renderMarkdown(md){
  if (!md) return '';
  const lines = md.split('\n');
  let html = '';
  let inTable = false; let tableRows = [];
  
  function flushTable(){
    if (tableRows.length){
      html += '<table>';
      tableRows.forEach((row, i) => {
        const tag = i === 0 ? 'th' : 'td';
        // Skip separator row
        if (row.every(c => /^-+$/.test(c.trim()))) return;
        html += '<tr>' + row.map(c => `<${tag}>${parseInlineMarkdown(escapeHtml(c.trim()))}</${tag}>`).join('') + '</tr>';
      });
      html += '</table>';
      tableRows = [];
      inTable = false;
    }
  }
  
  for (const raw of lines){
    const line = raw.trim();
    
    // Table row
    if (line.startsWith('|') && line.endsWith('|')){
      const cells = line.slice(1,-1).split('|');
      tableRows.push(cells);
      inTable = true;
      continue;
    } else if (inTable){
      flushTable();
    }
    
    if (!line){ continue; }
    
    // Sub-heading (ends with ":")
    if (line.endsWith(':') && line.length < 80 && !/[,!?]/.test(line.slice(0,-1))){
      const cleaned = line.replace(/^\*+|\*+$/g,'').trim();
      html += `<div class="sub-heading">${parseInlineMarkdown(escapeHtml(cleaned))}</div>`;
      continue;
    }
    
    // Bullets
    if (line.startsWith('- ') || line.startsWith('• ')){
      html += `<div class="bullet">${parseInlineMarkdown(escapeHtml(line.slice(2)))}</div>`;
      continue;
    }
    
    html += `<p>${parseInlineMarkdown(escapeHtml(line))}</p>`;
  }
  flushTable();
  return html;
}

// === ROUTER ===
function render(){
  const app = document.getElementById('app');
  switch(STATE.view){
    case 'home': app.innerHTML = renderHome(); break;
    case 'zadanie': app.innerHTML = renderZadanie(); break;
    case 'flashcards': app.innerHTML = renderFlashcards(); break;
    case 'quiz': app.innerHTML = renderQuiz(); break;
    case 'stats': app.innerHTML = renderStats(); break;
    case 'search': app.innerHTML = renderSearch(); break;
    case 'exam': app.innerHTML = renderExam(); break;
    case 'browse': app.innerHTML = renderBrowse(); break;
    case 'plan': app.innerHTML = renderPlan(); break;
  }
  renderBottomNav();
  bindEvents();
  window.scrollTo({top:0,behavior:'instant'});
}

function bindEvents(){
  document.querySelectorAll('[data-action]').forEach(el => el.addEventListener('click', handleAction));
  const searchInput = document.getElementById('search-input');
  if (searchInput){
    searchInput.addEventListener('input', (e) => {
      STATE.searchQuery = e.target.value;
      const r = document.getElementById('search-results');
      if (r) r.innerHTML = renderSearchResults();
      document.querySelectorAll('#search-results [data-action]').forEach(el => el.addEventListener('click', handleAction));
    });
    if (!STATE.searchQuery) setTimeout(()=>searchInput.focus(), 100);
  }
  const notesInput = document.getElementById('notes-input');
  if (notesInput && STATE.currentZadanie){
    let saveTimer;
    notesInput.addEventListener('input', (e) => {
      const num = STATE.currentZadanie;
      PROGRESS.notes[num] = e.target.value;
      clearTimeout(saveTimer);
      saveTimer = setTimeout(()=>savePart('notes'), 400);
    });
  }
  setupFlashcardSwipe();
}

function setupFlashcardSwipe(){
  const inner = document.querySelector('.fc-inner');
  if (!inner) return;
  let startX=0, startY=0, currentX=0, dragging=false;
  function onStart(e){
    const t = e.touches ? e.touches[0] : e;
    startX = t.clientX; startY = t.clientY; dragging = true;
    inner.classList.add('fc-swipe-tracking');
  }
  function onMove(e){
    if (!dragging) return;
    const t = e.touches ? e.touches[0] : e;
    const dx = t.clientX - startX, dy = Math.abs(t.clientY - startY);
    if (dy > 60 && Math.abs(dx) < 30){
      dragging = false;
      inner.style.transform = STATE.fcFlipped ? 'rotateY(180deg)' : '';
      inner.classList.remove('fc-swipe-tracking');
      return;
    }
    currentX = dx;
    const rotate = dx * 0.05, opacity = Math.max(0.4, 1 - Math.abs(dx)/300);
    inner.style.transform = `translateX(${dx}px) rotate(${rotate}deg) ${STATE.fcFlipped ? 'rotateY(180deg)' : ''}`;
    inner.style.opacity = opacity;
  }
  function onEnd(){
    if (!dragging) return;
    dragging = false;
    inner.classList.remove('fc-swipe-tracking');
    if (Math.abs(currentX) > 100){
      if (currentX < 0) handleFcAction('struggle');
      else handleFcAction('known');
    } else {
      inner.style.transform = STATE.fcFlipped ? 'rotateY(180deg)' : '';
      inner.style.opacity = '1';
    }
    currentX = 0;
  }
  inner.addEventListener('touchstart', onStart, {passive:true});
  inner.addEventListener('touchmove', onMove, {passive:true});
  inner.addEventListener('touchend', onEnd);
}

function handleFcAction(type){
  if (!STATE.fcDeck.length) return;
  const card = STATE.fcDeck[STATE.fcIndex];
  if (!card) return;
  if (type === 'known' || type === 'struggle'){
    markCard(card.term, type === 'known');
    toast(type === 'known' ? '✓ Posunutá ďalej' : '🔄 K opakovaniu', 1000);
  }
  if (STATE.flashcardsFilter === 'srs'){
    refreshFcDeck();
    STATE.fcIndex = 0;
  } else {
    STATE.fcIndex = (STATE.fcIndex + 1) % STATE.fcDeck.length;
  }
  STATE.fcFlipped = false;
  render();
}

function handleAction(e){
  const action = e.currentTarget.dataset.action;
  const arg = e.currentTarget.dataset.arg;
  
  switch(action){
    case 'go':
      stopTTS();
      STATE.view = arg;
      if (arg === 'flashcards'){STATE.fcFlipped=false;refreshFcDeck();STATE.fcIndex=0}
      if (arg === 'quiz') initQuizDeck();
      if (arg === 'exam'){STATE.examActive=false;STATE.examPhase='pick'}
      render();
      break;
    case 'open-zadanie':
      stopTTS();
      STATE.currentZadanie = parseInt(arg);
      STATE.openQAs = {};
      STATE.miniQuiz = null;
      STATE.ttsPanelOpen = false;
      STATE.view = 'zadanie';
      render();
      break;
    case 'toggle-done':
      PROGRESS.done[arg] = !PROGRESS.done[arg];
      if (PROGRESS.done[arg]){updateStreak();toast('🎯 Zadanie naučené!')}
      savePart('done'); render();
      break;
    case 'toggle-bookmark':
      PROGRESS.bookmarks[arg] = !PROGRESS.bookmarks[arg];
      savePart('bookmarks'); render();
      break;
    case 'toggle-qa':
      STATE.openQAs[arg] = !STATE.openQAs[arg];
      // Just update the DOM
      const el = document.querySelector(`[data-qa-id="${arg}"]`);
      if (el){
        el.classList.toggle('open');
      } else render();
      break;
    case 'expand-all-qa':
      const num = STATE.currentZadanie;
      const parsed = parseContentToQA(DATA.zadania[String(num)].full);
      let i = 0;
      parsed.sections.forEach((sec) => {
        sec.qas.forEach((qa, qi) => {
          STATE.openQAs[`${num}_${i}_${qi}`] = true;
        });
        i++;
      });
      // Supplementary
      const supp = DATA.zadania[String(num)].supplementary || [];
      supp.forEach((s, si) => { STATE.openQAs[`${num}_supp_${si}`] = true; });
      render();
      break;
    case 'collapse-all-qa':
      STATE.openQAs = {};
      render();
      break;
    case 'read-mode':
      STATE.readMode = arg;
      try{localStorage.setItem('maturita_read_mode', arg)}catch(e){}
      render();
      break;
    case 'tts-toggle':
      if (STATE.ttsPlaying){
        if (STATE.ttsPaused) resumeTTS();
        else pauseTTS();
      } else startTTS();
      break;
    case 'tts-stop': stopTTS(); render(); break;
    case 'tts-panel-toggle':
      STATE.ttsPanelOpen = !STATE.ttsPanelOpen;
      render();
      break;
    case 'tts-voice-select':
      try{ localStorage.setItem('maturita_tts_voice', arg); }catch(e){}
      if (STATE.ttsPlaying){
        stopTTS();
        setTimeout(()=>startTTS(), 150);
      }
      toast('Hlas: ' + arg, 1500);
      render();
      break;
    case 'tts-rate':
      try{ localStorage.setItem('maturita_tts_rate', arg); }catch(e){}
      if (STATE.ttsPlaying){
        stopTTS();
        setTimeout(()=>startTTS(), 150);
      }
      render();
      break;
    case 'fc-flip': STATE.fcFlipped = !STATE.fcFlipped; render(); break;
    case 'fc-next':
      if (STATE.fcDeck.length){STATE.fcIndex=(STATE.fcIndex+1)%STATE.fcDeck.length;STATE.fcFlipped=false;render()}
      break;
    case 'fc-prev':
      if (STATE.fcDeck.length){STATE.fcIndex=(STATE.fcIndex-1+STATE.fcDeck.length)%STATE.fcDeck.length;STATE.fcFlipped=false;render()}
      break;
    case 'fc-known': handleFcAction('known'); break;
    case 'fc-struggle': handleFcAction('struggle'); break;
    case 'fc-filter':
      STATE.flashcardsFilter = arg; STATE.fcIndex = 0; STATE.fcFlipped = false;
      refreshFcDeck(); render();
      break;
    case 'quiz-answer': handleQuizAnswer(parseInt(arg)); break;
    case 'quiz-next':
      STATE.quizIndex++; STATE.quizAnswered = false; STATE.quizSelected = null;
      if (STATE.quizIndex >= STATE.quizDeck.length) STATE.quizCompleted = true;
      render();
      break;
    case 'quiz-restart': initQuizDeck(); render(); break;
    case 'quiz-mode':
      STATE.quizMode = arg;
      if (arg !== 'zadanie') STATE.quizZadanie = null;
      initQuizDeck(); render();
      break;
    case 'quiz-zadanie':
      STATE.quizMode = 'zadanie'; STATE.quizZadanie = parseInt(arg);
      initQuizDeck(); STATE.view = 'quiz'; render();
      break;
    case 'mini-quiz-start': startMiniQuiz(); break;
    case 'mini-quiz-answer': handleMiniQuizAnswer(parseInt(arg)); break;
    case 'mini-quiz-next': nextMiniQuiz(); break;
    case 'mini-quiz-restart': startMiniQuiz(); break;
    case 'reset-stats':
      if (confirm('Vymazať VŠETOK pokrok?')){
        PROGRESS = {done:{},fc:{},quiz:{correct:0,total:0,byZadanie:{}},notes:{},bookmarks:{},streak:{lastDay:null,count:0,days:[]},examLog:[]};
        Object.keys(STORAGE_KEYS).forEach(k => savePart(k));
        toast('Všetko zmazané'); render();
      }
      break;
    case 'reset-srs':
      if (confirm('Vymazať pokrok kartičiek?')){
        PROGRESS.fc = {}; savePart('fc');
        toast('Kartičky resetnuté');
        refreshFcDeck(); render();
      }
      break;
    case 'random-zadanie':
      stopTTS();
      STATE.currentZadanie = Math.floor(Math.random()*30)+1;
      STATE.openQAs = {}; STATE.miniQuiz = null;
      STATE.view = 'zadanie'; render();
      break;
    case 'toggle-theme':
      document.documentElement.classList.toggle('dark');
      const isDark = document.documentElement.classList.contains('dark');
      try{localStorage.setItem('maturita_theme', isDark?'dark':'light')}catch(e){}
      const meta = document.getElementById('theme-meta');
      if (meta) meta.content = isDark ? '#181410' : '#fef9f3';
      render();
      break;
    case 'exam-start':
      STATE.examZadanie = Math.floor(Math.random()*30)+1;
      STATE.examStartTime = Date.now(); STATE.examElapsed = 0;
      STATE.examActive = true; STATE.examPhase = 'prep';
      startExamTimer(); render();
      break;
    case 'exam-show':
      STATE.examPhase = 'review';
      const elapsed = Math.floor((Date.now()-STATE.examStartTime)/1000);
      PROGRESS.examLog.push({zadanie:STATE.examZadanie,time:elapsed,date:todayStr()});
      if (PROGRESS.examLog.length > 50) PROGRESS.examLog = PROGRESS.examLog.slice(-50);
      savePart('examLog'); render();
      break;
    case 'exam-end':
      stopExamTimer(); STATE.examActive = false; STATE.examPhase = 'pick';
      STATE.currentZadanie = STATE.examZadanie; STATE.view = 'zadanie'; render();
      break;
    case 'exam-cancel':
      stopExamTimer(); STATE.examActive = false; STATE.examPhase = 'pick'; render();
      break;
  }
}

// === TTS - improved Slovak ===
// Track all available Slovak voices and let user pick the best
function getSlovakVoices(){
  if (!('speechSynthesis' in window)) return [];
  const all = window.speechSynthesis.getVoices();
  // Filter strictly to Slovak voices only
  const skVoices = all.filter(v => /^sk(-|_|$)/i.test(v.lang));
  // Score voices by likely quality (cloud/neural > local; named voices > generic)
  function score(v){
    let s = 0;
    const n = (v.name || '').toLowerCase();
    // Higher quality engines
    if (n.includes('neural')) s += 100;
    if (n.includes('online')) s += 50;
    if (n.includes('natural')) s += 80;
    if (n.includes('microsoft')) s += 30;
    if (n.includes('google')) s += 40;
    if (n.includes('apple')) s += 35;
    // Named voices (better than generic)
    if (n.includes('laura')) s += 60;
    if (n.includes('filip')) s += 50;
    if (n.includes('lukas') || n.includes('lukáš')) s += 50;
    if (n.includes('viktoria') || n.includes('viktória')) s += 45;
    // Penalize obvious robotic/eSpeak voices
    if (n.includes('espeak')) s -= 50;
    if (n.includes('compact')) s -= 20;
    // Default voice bonus
    if (v.default) s += 5;
    return s;
  }
  return skVoices.sort((a,b) => score(b) - score(a));
}

function getBestSlovakVoice(){
  const voices = getSlovakVoices();
  if (voices.length === 0) return null;
  // Check stored preference
  try{
    const pref = localStorage.getItem('maturita_tts_voice');
    if (pref){
      const found = voices.find(v => v.name === pref);
      if (found) return found;
    }
  }catch(e){}
  return voices[0];
}

// Pre-process text for better Slovak pronunciation
function preprocessForTTS(text){
  let t = text;
  // Strip markdown
  t = t.replace(/\*+/g, '');
  t = t.replace(/\t/g, ' ');
  t = t.replace(/_+/g, '');
  // Convert ° to "stupňov"
  t = t.replace(/°/g, ' stupňov ');
  // Common abbreviations - expand for better pronunciation
  const abbrev = {
    'tzv\\.': 'takzvaný',
    'tzn\\.': 'to znamená',
    'napr\\.': 'napríklad',
    'tj\\.': 'to je',
    'atď\\.': 'a tak ďalej',
    'a\\. i\\.': 'a iné',
    'a\\. p\\.': 'a podobne',
    'a pod\\.': 'a podobne',
    'a i\\.': 'a iné',
    'st\\.': 'storočie',
    'stor\\.': 'storočie',
    'r\\.': 'roku',
    'roku ': 'roku ',
    'p\\. n\\. l\\.': 'pred naším letopočtom',
    'pred n\\. l\\.': 'pred naším letopočtom',
    'p\\. Kr\\.': 'pred Kristom',
    'po Kr\\.': 'po Kristovi',
    'tzv ': 'takzvaný ',
    'cca ': 'cirka ',
    'apod\\.': 'a podobne',
    'resp\\.': 'respektíve',
    'príp\\.': 'prípadne',
    'P\\. O\\.': 'Pavol Országh',
    'B\\. S\\.': 'Božena Slančíková',
    'J\\. G\\.': 'Jozef Gregor',
    'A\\. S\\.': 'Alexander Sergejevič',
    'F\\. M\\.': 'Fjodor Michajlovič',
    'L\\. N\\.': 'Lev Nikolajevič',
    'S\\. H\\.': 'Svetozár Hurban',
    'W\\.': 'William',
    'V\\.': 'Viktor',
    'G\\.': 'Gabriel',
    'J\\.': 'Ján',
    'M\\.': 'Martin',
  };
  for (const [from, to] of Object.entries(abbrev)){
    t = t.replace(new RegExp(from, 'g'), to);
  }
  // Roman numerals -> words (basic)
  t = t.replace(/\bI\b/g, 'prvý');
  t = t.replace(/\bII\b/g, 'druhý');
  t = t.replace(/\bIII\b/g, 'tretí');
  t = t.replace(/\bIV\b/g, 'štvrtý');
  t = t.replace(/\bV\b/g, 'piaty');
  // Normalize whitespace
  t = t.replace(/\s+/g, ' ').trim();
  return t;
}

function startTTS(){
  if (!('speechSynthesis' in window)){
    toast('Prehliadač nepodporuje TTS');
    return;
  }
  const num = STATE.currentZadanie;
  if (!num) return;
  const z = DATA.zadania[String(num)];
  if (!z) return;
  
  const voice = getBestSlovakVoice();
  if (!voice){
    toast('Žiadny slovenský hlas. Nainštaluj sk hlas v nastaveniach systému.', 4000);
    return;
  }
  
  let text = preprocessForTTS(z.full || '');
  text = text.slice(0, 4500);
  
  // Get user-preferred rate
  let rate = 1.0;
  try{
    const r = localStorage.getItem('maturita_tts_rate');
    if (r) rate = parseFloat(r);
  }catch(e){}
  
  STATE.ttsUtterance = new SpeechSynthesisUtterance(text);
  STATE.ttsUtterance.voice = voice;
  STATE.ttsUtterance.lang = voice.lang;
  STATE.ttsUtterance.rate = rate;
  STATE.ttsUtterance.pitch = 1.0;
  STATE.ttsUtterance.onend = () => { STATE.ttsPlaying = false; STATE.ttsPaused = false; render(); };
  STATE.ttsUtterance.onerror = (e) => { 
    STATE.ttsPlaying = false; 
    STATE.ttsPaused = false;
    if (e.error !== 'canceled' && e.error !== 'interrupted') {
      toast('Chyba TTS: ' + e.error, 2500);
    }
    render(); 
  };
  
  window.speechSynthesis.speak(STATE.ttsUtterance);
  STATE.ttsPlaying = true;
  STATE.ttsPaused = false;
  toast(`🔊 ${voice.name}`, 1500);
  render();
}

function pauseTTS(){
  if ('speechSynthesis' in window){
    window.speechSynthesis.pause();
    STATE.ttsPaused = true;
    render();
  }
}
function resumeTTS(){
  if ('speechSynthesis' in window){
    window.speechSynthesis.resume();
    STATE.ttsPaused = false;
    render();
  }
}
function stopTTS(){
  if ('speechSynthesis' in window) window.speechSynthesis.cancel();
  STATE.ttsPlaying = false;
  STATE.ttsPaused = false;
}

// === QUIZ ===
function initQuizDeck(){
  let pool = [];
  
  if (STATE.quizMode === 'author-work'){
    // Mode: Ktoré dielo napísal X? (author -> work)
    const works = DATA.works_db || [];
    works.forEach(w => {
      // Get 3 other random works as wrong answers
      const others = works.filter(o => o.work !== w.work);
      const wrongs = shuffle(others).slice(0, 3).map(o => o.work);
      const options = shuffle([w.work, ...wrongs]);
      pool.push({
        q: `Ktoré dielo napísal autor: ${w.author}?`,
        options: options,
        correct: options.indexOf(w.work),
        zadanie: w.zadanie,
        tema: 'autor→dielo',
        _mode: 'author-work'
      });
    });
  } else if (STATE.quizMode === 'work-author'){
    // Mode: Kto napísal X? (work -> author)
    const works = DATA.works_db || [];
    // Get unique authors
    const allAuthors = Array.from(new Set(works.map(w => w.author)));
    works.forEach(w => {
      const others = allAuthors.filter(a => a !== w.author);
      const wrongs = shuffle(others).slice(0, 3);
      const options = shuffle([w.author, ...wrongs]);
      pool.push({
        q: `Kto napísal dielo „${w.work}"?`,
        options: options,
        correct: options.indexOf(w.author),
        zadanie: w.zadanie,
        tema: 'dielo→autor',
        _mode: 'work-author'
      });
    });
  } else if (STATE.quizMode === 'work-plot'){
    // Mode: Aký je dej diela X? (work -> plot)
    const works = DATA.works_db || [];
    works.forEach(w => {
      // Get 3 other plots as wrong answers
      const others = works.filter(o => o.work !== w.work);
      const wrongs = shuffle(others).slice(0, 3).map(o => o.plot);
      const options = shuffle([w.plot, ...wrongs]);
      pool.push({
        q: `Ktorý dej patrí dielu „${w.work}" od ${w.author}?`,
        options: options,
        correct: options.indexOf(w.plot),
        zadanie: w.zadanie,
        tema: 'dielo→dej',
        _mode: 'work-plot'
      });
    });
  } else {
    // Default: random/zadanie - use the original quiz pool
    pool = DATA.quiz.slice();
    if (STATE.quizMode === 'zadanie' && STATE.quizZadanie){
      pool = pool.filter(q => q.zadanie === STATE.quizZadanie);
    }
  }
  
  STATE.quizDeck = shuffle(pool);
  STATE.quizIndex = 0; STATE.quizAnswered = false; STATE.quizSelected = null; STATE.quizCompleted = false;
}
function handleQuizAnswer(idx){
  if (STATE.quizAnswered) return;
  STATE.quizAnswered = true; STATE.quizSelected = idx;
  const q = STATE.quizDeck[STATE.quizIndex];
  const correct = idx === q.correct;
  PROGRESS.quiz.total++;
  if (correct){PROGRESS.quiz.correct++; updateStreak()}
  if (q.zadanie){
    const z = q.zadanie;
    if (!PROGRESS.quiz.byZadanie[z]) PROGRESS.quiz.byZadanie[z] = {c:0,t:0};
    PROGRESS.quiz.byZadanie[z].t++;
    if (correct) PROGRESS.quiz.byZadanie[z].c++;
  }
  savePart('quiz'); render();
}

// === MINI QUIZ (in zadanie page) ===
function startMiniQuiz(){
  const num = STATE.currentZadanie;
  const pool = DATA.quiz.filter(q => q.zadanie === num);
  if (pool.length === 0){
    toast('Pre toto zadanie nie sú otázky');
    return;
  }
  const deck = shuffle(pool).slice(0, Math.min(5, pool.length));
  STATE.miniQuiz = {qIdx:0, answered:false, selected:null, deck, score:0, completed:false};
  render();
}
function handleMiniQuizAnswer(idx){
  if (!STATE.miniQuiz || STATE.miniQuiz.answered) return;
  STATE.miniQuiz.answered = true;
  STATE.miniQuiz.selected = idx;
  const q = STATE.miniQuiz.deck[STATE.miniQuiz.qIdx];
  if (idx === q.correct) STATE.miniQuiz.score++;
  // Also count in main quiz stats
  PROGRESS.quiz.total++;
  if (idx === q.correct){PROGRESS.quiz.correct++; updateStreak()}
  if (q.zadanie){
    const z = q.zadanie;
    if (!PROGRESS.quiz.byZadanie[z]) PROGRESS.quiz.byZadanie[z] = {c:0,t:0};
    PROGRESS.quiz.byZadanie[z].t++;
    if (idx === q.correct) PROGRESS.quiz.byZadanie[z].c++;
  }
  savePart('quiz');
  render();
}
function nextMiniQuiz(){
  if (!STATE.miniQuiz) return;
  STATE.miniQuiz.qIdx++;
  STATE.miniQuiz.answered = false;
  STATE.miniQuiz.selected = null;
  if (STATE.miniQuiz.qIdx >= STATE.miniQuiz.deck.length){
    STATE.miniQuiz.completed = true;
  }
  render();
}

  const stats = {

    learning: DATA.flashcards.filter(c => {const b=getSrsBox(c.term);return b>=0&&b<=1}).length,
    review: DATA.flashcards.filter(c => {const b=getSrsBox(c.term);return b>=2&&b<=3}).length,
    mastered: DATA.flashcards.filter(c => getSrsBox(c.term)>=4).length,

function renderFcFilters(stats, dueCount){
  const filters = [
    {k:'srs', l:`🔥 dnes (${dueCount})`},
    {k:'all', l:'všetky'},
    {k:'new', l:`✨ nové (${stats.new})`},
    {k:'struggling', l:`🔄 zlé (${stats.learning})`},
    {k:'mastered', l:`★ zvládnuté (${stats.mastered})`},
    {k:'Jazyk', l:'jazyk'},
    {k:'Literatúra', l:'literatúra'},
  ];
  return `
    <div class="flex gap-1.5 overflow-x-auto scrollbar-thin pb-2 -mx-1 px-1">

      `).join('')}

}

function renderQuiz(){
  if (!STATE.quizDeck || STATE.quizDeck.length === 0) initQuizDeck();
  const acc = PROGRESS.quiz.total > 0 ? Math.round((PROGRESS.quiz.correct/PROGRESS.quiz.total)*100) : 0;
  
  const modeSelector = `
    <div class="flex gap-1.5 mb-3 -mx-1 px-1 overflow-x-auto scrollbar-thin pb-1">
      <button data-action="quiz-mode" data-arg="random" class="mono text-[11px] uppercase tracking-wider px-3 py-1.5 rounded-full whitespace-nowrap flex-shrink-0 ${STATE.quizMode==='random'?'btn-active':'paper'}">🎲 mix (${DATA.quiz.length})</button>
      <button data-action="quiz-mode" data-arg="work-author" class="mono text-[11px] uppercase tracking-wider px-3 py-1.5 rounded-full whitespace-nowrap flex-shrink-0 ${STATE.quizMode==='work-author'?'btn-active':'paper'}">📖→✍ dielo→autor</button>
      <button data-action="quiz-mode" data-arg="author-work" class="mono text-[11px] uppercase tracking-wider px-3 py-1.5 rounded-full whitespace-nowrap flex-shrink-0 ${STATE.quizMode==='author-work'?'btn-active':'paper'}">✍→📖 autor→dielo</button>
      <button data-action="quiz-mode" data-arg="work-plot" class="mono text-[11px] uppercase tracking-wider px-3 py-1.5 rounded-full whitespace-nowrap flex-shrink-0 ${STATE.quizMode==='work-plot'?'btn-active':'paper'}">📖→📜 dielo→dej</button>
      ${STATE.quizMode==='zadanie'&&STATE.quizZadanie?`<button class="btn-active mono text-[11px] uppercase tracking-wider px-3 py-1.5 rounded-full whitespace-nowrap flex-shrink-0">zad. ${STATE.quizZadanie}</button>`:''}
      <button data-action="quiz-restart" class="paper mono text-[11px] uppercase tracking-wider px-3 py-1.5 rounded-full whitespace-nowrap flex-shrink-0">↻ premiešať</button>
    </div>
  `;
  
  if (STATE.quizCompleted){
    return `
    <div class="anim-in px-5 pt-6">
      <header class="mb-4">
        <button data-action="go" data-arg="home" class="text-sm text-[var(--muted)] btn-ghost px-2 py-1 rounded-md inline-block mb-3">← Späť</button>
        <h1 class="serif text-3xl font-black">Hotovo!</h1>
      </header>
      <div class="paper rounded-2xl p-8 text-center mb-4">
        <div class="text-6xl mb-4">🎉</div>
        <div class="serif text-2xl font-bold mb-2">Prešiel si všetky otázky</div>
        <div class="mono text-sm text-[var(--muted)]">Úspešnosť: ${acc}%</div>
      </div>
      <button data-action="quiz-restart" class="w-full rounded-2xl py-4 bg-[var(--accent)] text-white serif font-bold text-base">Začať odznova ↻</button>
    </div>`;
  }
  
  if (!STATE.quizDeck.length){
    return `
    <div class="anim-in px-5 pt-6">
      <header class="mb-4">
        <button data-action="go" data-arg="home" class="text-sm text-[var(--muted)] btn-ghost px-2 py-1 rounded-md inline-block mb-3">← Späť</button>
        <h1 class="serif text-3xl font-black">Kvíz</h1>
      </header>
      ${modeSelector}
      <div class="paper rounded-2xl p-8 text-center">
        <div class="text-4xl mb-3">📭</div>
        <div class="serif font-bold text-lg">Žiadne otázky.</div>
      </div>
    </div>`;
  }
  
  const q = STATE.quizDeck[STATE.quizIndex];
  
  return `
  <div class="anim-in px-5 pt-5">
    <header class="mb-3">
      <button data-action="go" data-arg="home" class="text-sm text-[var(--muted)] btn-ghost px-2 py-1 rounded-md inline-block mb-2">← Späť</button>
      <div class="flex items-baseline justify-between">
        <h1 class="serif text-3xl font-black">Kvíz</h1>
        <div class="mono text-xs text-[var(--muted)]">${STATE.quizIndex+1} / ${STATE.quizDeck.length}</div>
      </div>
      <div class="flex items-center gap-3 mt-2 mb-3">
        <div class="flex-1 h-1.5 bg-[var(--line)] rounded-full overflow-hidden">
          <div class="h-full bg-[var(--accent)]" style="width:${(STATE.quizIndex/STATE.quizDeck.length)*100}%;transition:width .3s"></div>
        </div>
        <div class="mono text-[11px] text-[var(--muted)]">${acc}% celkom</div>
      </div>
    </header>
    ${modeSelector}
    <div class="paper rounded-2xl p-5 my-3 anim-scale">
      <div class="flex items-center justify-between mb-3">

        ${q.zadanie?`<button data-action="open-zadanie" data-arg="${q.zadanie}" class="mono text-[10px] text-[var(--muted)] underline">zad. ${q.zadanie} →</button>`:''}
      </div>
      <div class="serif text-lg font-bold leading-snug mb-5">${escapeHtml(q.q)}</div>
      <div class="space-y-2">
        ${q.options.map((opt, i) => {
          let cls = 'paper quiz-opt';
          if (STATE.quizAnswered){
            if (i === q.correct) cls = 'quiz-opt correct paper';
            else if (i === STATE.quizSelected) cls = 'quiz-opt wrong paper';
            else cls = 'paper opacity-60';
          }
          const isLongOption = q._mode === 'work-plot';
          return `
            <button data-action="quiz-answer" data-arg="${i}" class="${cls} rounded-xl px-4 py-3 w-full text-left text-sm flex ${isLongOption?'items-start':'items-center'} gap-3" ${STATE.quizAnswered?'disabled':''}>
              <div class="mono text-xs w-5 text-[var(--muted)] ${isLongOption?'mt-0.5':''}">${String.fromCharCode(65+i)}</div>
              <div class="flex-1 ${isLongOption?'text-[12.5px] leading-snug':''}">${escapeHtml(opt)}</div>
              ${STATE.quizAnswered && i === q.correct ? '<div class="text-lg flex-shrink-0">✓</div>' : ''}
              ${STATE.quizAnswered && i === STATE.quizSelected && i !== q.correct ? '<div class="text-lg flex-shrink-0">✗</div>' : ''}
            </button>
          `;
        }).join('')}
      </div>
    </div>
    ${STATE.quizAnswered ? `
      <button data-action="quiz-next" class="w-full rounded-2xl py-4 bg-[var(--ink)] text-[var(--paper)] serif font-bold text-base anim-in">
        ${STATE.quizIndex+1 >= STATE.quizDeck.length ? 'Dokončiť ✓' : 'Ďalšia otázka →'}
      </button>
    ` : ''}
  </div>`;
}

    </header>
    <div id="search-results">${renderSearchResults()}</div>

function renderSearchResults(){
  const qRaw = STATE.searchQuery.trim();
  if (qRaw.length < 2){
    const topAuthors = Object.entries(DATA.index.authors)
      .filter(([a,zs]) => zs.length >= 2)
      .sort((a,b) => b[1].length - a[1].length).slice(0,8);
    return `
      <div class="mono text-[10px] uppercase tracking-widest text-[var(--muted)] mb-2 mt-4">Najčastejší autori</div>
      <div class="flex flex-wrap gap-1.5">
        ${topAuthors.map(([a,zs]) => `
          <button data-action="open-zadanie" data-arg="${zs[0]}" class="paper-2 rounded-full px-3 py-1.5 text-xs font-semibold btn-ghost">
            ${escapeHtml(a)} <span class="text-[var(--muted)] mono">×${zs.length}</span>
          </button>
        `).join('')}
      </div>
      <div class="mono text-[10px] uppercase tracking-widest text-[var(--muted)] mb-2 mt-6">Tip</div>
      <div class="text-sm text-[var(--muted)]">Skús „Hviezdoslav", „realizmus", „satira", „symbol"...</div>
    `;
  }
  
  const q = slovakLower(qRaw);
  const matchedZ = [];
  for (let i = 1; i <= 30; i++){
    const text = DATA.search_text[String(i)] || '';
    if (slovakLower(text).includes(q)) matchedZ.push(i);
  }
  const matchedFc = DATA.flashcards.filter(c => 
    slovakLower(c.term).includes(q) || slovakLower(c.definition).includes(q)
  ).slice(0, 15);
  
  if (matchedZ.length === 0 && matchedFc.length === 0){
    return `<div class="text-center text-[var(--muted)] py-8 text-sm">Nič nenájdené pre „${escapeHtml(qRaw)}"</div>`;
  }
  
  return `
    ${matchedZ.length > 0 ? `
      <div class="mono text-[10px] uppercase tracking-widest text-[var(--muted)] mb-2 mt-4">Zadania (${matchedZ.length})</div>
      <div class="space-y-2 mb-4">
        ${matchedZ.map(num => {
          const z = DATA.zadania[String(num)];
          return `
            <button data-action="open-zadanie" data-arg="${num}" class="paper rounded-xl px-4 py-3 w-full text-left flex items-center gap-3 btn-ghost">
              <div class="num-badge text-2xl text-[var(--accent)] w-8">${num}</div>
              <div class="flex-1 min-w-0">
                <div class="text-[13px] font-medium truncate">${highlightText(z.tema_jazyk, qRaw)}</div>
                <div class="text-[12px] truncate text-[var(--accent-2)]">${highlightText(z.tema_lit, qRaw)}</div>
              </div>
              <div class="text-[var(--muted)]">›</div>
            </button>
          `;
        }).join('')}
      </div>
    ` : ''}
    ${matchedFc.length > 0 ? `

function renderStats(){
  const doneCount = Object.values(PROGRESS.done).filter(Boolean).length;
  const fcStats = {
    mastered: DATA.flashcards.filter(c => getSrsBox(c.term)>=4).length,
    review: DATA.flashcards.filter(c => {const b=getSrsBox(c.term);return b>=2&&b<=3}).length,
    learning: DATA.flashcards.filter(c => {const b=getSrsBox(c.term);return b>=0&&b<=1}).length,
    new: DATA.flashcards.filter(c => getSrsBox(c.term)===-1).length,
    total: DATA.flashcards.length,
  };
  const acc = PROGRESS.quiz.total>0?Math.round((PROGRESS.quiz.correct/PROGRESS.quiz.total)*100):0;
  const streak = PROGRESS.streak.count||0;
  
  const today = new Date();
  const days = [];
  for (let i = 29; i >= 0; i--){
    const d = new Date(today); d.setDate(d.getDate()-i);
    const dayStr = d.toISOString().slice(0,10);
    days.push({date:dayStr, studied:PROGRESS.streak.days?.includes(dayStr)||false, day:d.getDate()});
  }
  
  return `
  <div class="anim-in px-5 pt-5">
    <header class="mb-5">
      <button data-action="go" data-arg="home" class="text-sm text-[var(--muted)] btn-ghost px-2 py-1 rounded-md inline-block mb-3">← Späť</button>
      <h1 class="serif text-3xl font-black">Štatistiky</h1>
    </header>
    ${streak>0?`
    <div class="paper rounded-2xl p-5 mb-3">
      <div class="serif font-bold mb-3 text-sm uppercase tracking-wider text-[var(--muted)]">🔥 Streak</div>
      <div class="flex items-baseline gap-2">
        <div class="num-badge text-5xl text-[var(--accent)]">${streak}</div>
        <div class="mono text-sm text-[var(--muted)]">${streak===1?'deň':streak<5?'dni':'dní'} v rade</div>
      </div>
    </div>`:''}
    <div class="paper rounded-2xl p-5 mb-3">
      <div class="serif font-bold mb-3 text-sm uppercase tracking-wider text-[var(--muted)]">📅 Posledných 30 dní</div>
      <div class="grid grid-cols-10 gap-1">
        ${days.map(d => `<div class="heatmap-cell ${d.studied?'bg-[var(--accent)] text-white':'bg-[var(--line)] text-[var(--muted)]'}" title="${d.date}">${d.day}</div>`).join('')}
      </div>
      <div class="mt-2 mono text-[10px] text-[var(--muted)] flex justify-between">
        <span>${days.filter(d=>d.studied).length} dní aktívnych</span>
        <span>${Math.round(days.filter(d=>d.studied).length/30*100)}%</span>
      </div>
    </div>
    <div class="paper rounded-2xl p-5 mb-3">
      <div class="serif font-bold mb-3 text-sm uppercase tracking-wider text-[var(--muted)]">📚 Zadania</div>
      <div class="flex items-baseline gap-2 mb-3">
        <div class="num-badge text-5xl text-[var(--accent)]">${doneCount}</div>
        <div class="mono text-sm text-[var(--muted)]">/ 30 naučených</div>
      </div>
      <div class="h-2 bg-[var(--line)] rounded-full overflow-hidden">
        <div class="h-full bg-[var(--accent)]" style="width:${(doneCount/30)*100}%;transition:width .5s"></div>
      </div>
    </div>
    <div class="paper rounded-2xl p-5 mb-3">
      <div class="serif font-bold mb-3 text-sm uppercase tracking-wider text-[var(--muted)]">🎴 Kartičky (SRS)</div>
      <div class="grid grid-cols-4 gap-2 text-center">
        <div><div class="num-badge text-2xl text-[var(--ok)]">${fcStats.mastered}</div><div class="mono text-[9px] text-[var(--muted)] uppercase">zvládnuté</div></div>
        <div><div class="num-badge text-2xl text-[var(--warn)]">${fcStats.review}</div><div class="mono text-[9px] text-[var(--muted)] uppercase">opakovanie</div></div>
        <div><div class="num-badge text-2xl text-[var(--err)]">${fcStats.learning}</div><div class="mono text-[9px] text-[var(--muted)] uppercase">učenie</div></div>
        <div><div class="num-badge text-2xl text-[var(--muted)]">${fcStats.new}</div><div class="mono text-[9px] text-[var(--muted)] uppercase">nové</div></div>
      </div>
      <div class="mt-3 h-2 rounded-full overflow-hidden flex">
        <div class="bg-[var(--ok)]" style="width:${fcStats.mastered/fcStats.total*100}%"></div>
        <div class="bg-[var(--warn)]" style="width:${fcStats.review/fcStats.total*100}%"></div>
        <div class="bg-[var(--err)]" style="width:${fcStats.learning/fcStats.total*100}%"></div>
        <div class="bg-[var(--line)]" style="width:${fcStats.new/fcStats.total*100}%"></div>
      </div>
    </div>
    <div class="paper rounded-2xl p-5 mb-3">
      <div class="serif font-bold mb-3 text-sm uppercase tracking-wider text-[var(--muted)]">⚡ Kvíz</div>
      <div class="flex items-baseline gap-2">
        <div class="num-badge text-5xl ${acc>=70?'text-[var(--ok)]':acc>=40?'text-[var(--gold)]':'text-[var(--err)]'}">${acc}%</div>
        <div class="mono text-sm text-[var(--muted)]">${PROGRESS.quiz.correct} z ${PROGRESS.quiz.total} správne</div>
      </div>
    </div>
    <div class="paper rounded-2xl p-5 mb-3">
      <div class="serif font-bold mb-3 text-sm uppercase tracking-wider text-[var(--muted)]">Stav podľa zadania</div>
      <div class="grid grid-cols-5 gap-1.5">
        ${Array.from({length:30},(_,i) => {
          const num = i+1;
          const isDone = PROGRESS.done[num];
          const zStats = PROGRESS.quiz.byZadanie[num];
          let cls = 'bg-[var(--line)] text-[var(--muted)]';
          if (isDone) cls = 'bg-[var(--ok)] text-white';
          else if (zStats && zStats.t > 0) cls = 'bg-[var(--gold)] text-white opacity-80';
          return `<button data-action="open-zadanie" data-arg="${num}" class="${cls} rounded-lg py-2 mono text-xs font-semibold">${num}</button>`;
        }).join('')}
      </div>
    </div>
    <div class="mb-8 grid grid-cols-2 gap-2">
      <button data-action="reset-srs" class="paper rounded-xl py-2 mono text-[11px] text-[var(--muted)]">reset kartičiek</button>
      <button data-action="reset-stats" class="paper rounded-xl py-2 mono text-[11px] text-[var(--err)]">reset všetkého</button>
    </div>
  </div>`;
}

function renderBottomNav(){
  document.querySelectorAll('#bottom-nav').forEach(el => el.remove());
  const items = [
    {v:'home', i:'⌂', l:'domov'},
    {v:'flashcards', i:'🎴', l:'karty'},
    {v:'quiz', i:'⚡', l:'kvíz'},
    {v:'exam', i:'🎓', l:'skúška'},
    {v:'stats', i:'📊', l:'stats'},
  ];
  const nav = document.createElement('nav');
  nav.id = 'bottom-nav';
  nav.className = 'bottom-nav fixed bottom-0 left-0 right-0 py-2 px-3 z-50';
  nav.innerHTML = `
    <div class="flex justify-around max-w-md mx-auto">
      ${items.map(it => {
        const active = STATE.view===it.v || (STATE.view==='zadanie'&&it.v==='home') || (STATE.view==='search'&&it.v==='home') || (STATE.view==='browse'&&it.v==='home');
        return `
        <button data-action="go" data-arg="${it.v}" class="flex flex-col items-center gap-0.5 px-3 py-1.5 rounded-xl ${active?'opacity-100':'opacity-45'}">
          <div class="text-lg leading-none">${it.i}</div>
          <div class="mono text-[9px] uppercase tracking-wider">${it.l}</div>
        </button>`;
      }).join('')}
    </div>`;
  document.body.appendChild(nav);
  nav.querySelectorAll('[data-action]').forEach(el => el.addEventListener('click', handleAction));
}

// === KEYBOARD ===
document.addEventListener('keydown', (e) => {
  const tag = (e.target.tagName||'').toLowerCase();
  if (tag === 'input' || tag === 'textarea') return;
  if (STATE.view === 'flashcards' && STATE.fcDeck.length){
    if (e.key === ' '){e.preventDefault();STATE.fcFlipped=!STATE.fcFlipped;render()}
    else if (e.key === 'ArrowRight') handleFcAction('known');
    else if (e.key === 'ArrowLeft') handleFcAction('struggle');
  }
  if (STATE.view === 'quiz' && !STATE.quizCompleted){
    const q = STATE.quizDeck[STATE.quizIndex];
    if (!q) return;
    if (!STATE.quizAnswered && /^[1-4]$/.test(e.key)){
      const idx = parseInt(e.key)-1;
      if (idx < q.options.length) handleQuizAnswer(idx);
    }
  }
  if (e.key === '/' && STATE.view !== 'search'){e.preventDefault();STATE.view='search';render()}
  if (e.key === 'Escape' && STATE.view !== 'home'){STATE.view='home';render()}
});

(async function init(){
  await loadProgress();
  render();
})();
</script>
