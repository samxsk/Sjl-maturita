 \n\nzrejme na Zemi stretol: \nvýhybkára \nobchodníka - predával pilulky proti smädu, ušetrí to vraj 53 minút/týždeň, keby mal však premárniť 53 minút Malý princ, šiel by radšej pomaly k studničke \n\n**Dej:** \n\nRozprávač začína svoj príbeh tým, ako keď mal 6 rokov snažil sa kresliť, ale jeho kresby dospelí nepochopili a poradili mu, aby sa radšej venoval niečomu inému, tak sa stal pilotom. Nakreslil vtedy aj veľhada ako zožral slona. Dospelí túto jeho kresbu tiež nepochopili, mysleli si, že je to klobúk. Vždy vo svojom živote, keď sa mu niekto zdal trochu bystrejší, ukázal mu tú kresbu a vždy počul tú istú odpoveď: „To je klobúk\". A tak sa rozprávač prispôsobil jeho chápavosti - rozprávali o bridži, o golfe, o politike a o kravatách. Pilot žil samotársky a nemal nikoho, s kým by si vážne pohovoril, až kým sa mu pre 6-imi rokmi v africkej púšti nepokazilo lietadlo. Stretol tam Malého princa, ktorý pochopil aj jeho kresbu veľhada. Chlapček od neho chcel, aby mu nakreslil ovečku. Po niekoľkých pokusoch mu napokon nakreslil debničku a povedal mu, že vo vnútri je ovečka. A bol prekvapený, keď malý chlapček zareagoval, že presne takú chcel. Vyvinul sa medzi nimi vzťah a chlapec mu rozprával o svojej planéte B 612. Porozprával mu, ako každé ráno musí upratať svoju planétu - vytrhať baobaby, povymetať sopky. Povedal mu aj o svojom kvietku - ruži, ktorá je nežná, no namyslená. Hoci ju chcel mať naozaj rád, čoskoro o nej zapochyboval. Potom uznal, že bol primladý, aby ju vedel mať rád. Malý princ odišiel zo svojej planéty, keď sa sťahovali divé vtáky. Rozlúčil sa s kvetinou a tá ho požiadala o odpustenie. Malý princ sa vybral na návštevu okolitých planét. Ani na jednej z planét sa mu nepáčilo a nerozhodol sa tam ostať. Stretol sa tam s rozličnými bytosťami. Ako siedmu planétu malý chlapček navštívil Zem a našiel tam státisíce takých typov ľudí ako na predchádzajúcich planétach. Zoznámil sa tu aj s hadom a s líškou. Pomohol na smrť vysmädnutému letcovi nájsť studňu. Videl aj veľa takých istých kvetov, ako bol ten jeho, napriek tomu, že jeho kvetinka tvrdila, že je jedinečná. Líška ho mnohé naučila a vysvetlila mu. Malý princ sa nakoniec rozhodol vrátiť sa k svojmu kvietku. Hoci letcovi to bolo smutno, princ mu to vysvetlil svojou logikou. Povedal pilotovi, aby si naňho spomenul vždy, keď sa pozrie na hviezdy. Dohodol sa s hadom, ten mu pomohol. A obdaroval ho svojím jedom … \nRozprávač sa trápil tým, že k náhubku, čo kreslil chlapčekovi zabudol pripojiť kožený remienok. Kládol si otázku, čo ak ovečka zožrala ružu. Raz tomu verí, raz nie. \n„ - Môžem ťa uniesť ďalej ako loď, - povedal had. Okrútil sa Malému princovi okolo členka ako zlatý náramok. - Keď sa niekoho dotknem, vrátim ho zemi, z ktorej vyšiel, - dodal ešte. - Ale ty si čistý a prichádzaš z hviezdy …- \nMalý princ neodpovedal. \n- Je mi ťa ľúto, si taký slabý na tejto Zemi zo žuly. \n\n*Citáty:*\n\nMôžem ti jedného dňa pomôcť, ak sa ti bude priveľmi cnieť za tvojou planétou. Ja môžem\n\n„Aká čudná planéta! - pomyslel si. - Je celá vyprahnutá a celá zašpicatená a celá slaná. A ľudia nemajú predstavivosť. Opakujú, čo sa im povie\n\n„No ak si ma skrotíš, budeme jeden druhého potrebovať. Budeš pre mňa jediný na svete. A ja budem pre teba jediná na svete …\"\n\n„Ty budeš navždy zodpovedný za všetko, čo si skrotíš.\"\n\n„Len deti vedia, čo hľadajú\"\n\n„Ľudia u vás pestujú päťtisíc ruží v jedinej záhrade … a nenachádzajú v nej to, čo hľadajú.\"\n\n„To, čo je dôležité, je neviditeľné …\"","number":30,"assignment":""}},"flashcards":[{"term":"Komunikácia","definition":"Dorozumievací proces - výmena informácií medzi ľuďmi (ústne alebo písomne). Účastníci sa nazývajú komunikanti.","zadanie":1,"kategoria":"Jazyk"},{"term":"Efektívna komunikácia","definition":"Obojsmerná komunikácia založená na spolupráci, počúvaní a spätnej väzbe. Súčasťou je asertívna komunikácia.","zadanie":1,"kategoria":"Jazyk"},{"term":"Asertívna komunikácia","definition":"Otvorené a primerané vyjadrenie myšlienok a názorov bez prekročenia práv iných.","zadanie":1,"kategoria":"Jazyk"},{"term":"Devalvujúca komunikácia","definition":"Opak efektívnej - napádanie, skákanie do reči, povýšenecké správanie, zneužívanie dôvery.","zadanie":1,"kategoria":"Jazyk"},{"term":"Rytmus (v poézii)","definition":"Pravidelné opakovanie zvukového prvku reči vo verši.","zadanie":1,"kategoria":"Literatúra"},{"term":"Sylabická prozódia","definition":"Veršový systém založený na rovnakom počte slabík vo veršoch + intonačná prestávka + združený rým + rytmicko-syntaktický paralelizmus.","zadanie":1,"kategoria":"Literatúra"},{"term":"Valaská škola mravov stodola","definition":"Hugolín Gavlovič (baroko) - didakticko-reflexívna poézia, 16 000 veršov, 12-veršová strofa, 14 slabík vo verši, slovakizovaná čeština.","zadanie":1,"kategoria":"Literatúra"},{"term":"Mor ho!","definition":"Samo Chalupka (romantizmus) - národná, hrdinská, lyricko-epická skladba. Kolektívny hrdina (slov. junáci), 13-slabičný verš, dej v 4. stor.","zadanie":1,"kategoria":"Literatúra"},{"term":"Bezpríznakové (neutrálne) slová","definition":"Vyjadrujú vecný význam, dajú sa použiť v akomkoľvek štýle. Napr. dom, písať, mama, pes.","zadanie":2,"kategoria":"Jazyk"},{"term":"Termíny (odborné názvy)","definition":"Jednoslovné/viacslovné pomenovania, používané v náučných textoch. Napr. morféma, kyselina chlorovodíková.","zadanie":2,"kategoria":"Jazyk"},{"term":"Kancelarizmy","definition":"Typické slová administratívnych textov - faktúra, splatnosť, cestovný príkaz.","zadanie":2,"kategoria":"Jazyk"},{"term":"Publicizmy","definition":"Slová typické pre publicistické texty - iniciatíva, atentát, terorizmus.","zadanie":2,"kategoria":"Jazyk"},{"term":"Hovorové slová","definition":"Slová používané v súkromnom prejave - futro, žúrovať, panelák, učka.","zadanie":2,"kategoria":"Jazyk"},{"term":"Dialektizmy (nárečové slová)","definition":"Nespisovné slová viazané na región - švábka, grule, bandurky.","zadanie":2,"kategoria":"Jazyk"},{"term":"Slangové slová","definition":"Nespisovné slová používané istou skupinou - fáro (auto), kilo (100€).","zadanie":2,"kategoria":"Jazyk"},{"term":"Profesionalizmy","definition":"Nespisovné slová používané v profesii - operačka, zubárina, deckár.","zadanie":2,"kategoria":"Jazyk"},{"term":"Argot","definition":"Tajná šifrovaná reč asociálnych skupín - blcha (stopa po injekcii), televízor (komunikácia z okna do okna vo väznici).","zadanie":2,"kategoria":"Jazyk"},{"term":"Neologizmy","definition":"Novovzniknuté slová - mobilný telefón, snoubording, hamburger.","zadanie":2,"kategoria":"Jazyk"},{"term":"Archaizmy","definition":"Slová s novšími synonymami - sklep (obchod), švec (obuvník), árešt (väznica).","zadanie":2,"kategoria":"Jazyk"},{"term":"Historizmy","definition":"Slová pre veci, ktoré už neexistujú - dráb, hajdúch, groš, slúžny.","zadanie":2,"kategoria":"Jazyk"},{"term":"Deminutíva (zdrobneniny)","definition":"Expresívne slová s pozitívnym vzťahom - psíček, mačička, chlebík.","zadanie":2,"kategoria":"Jazyk"},{"term":"Eufemizmy","definition":"Zjemňujúce výrazy - zaspať (zomrieť), mať dobrú náladu (byť opitý).","zadanie":2,"kategoria":"Jazyk"},{"term":"Hypokoristiká","definition":"Lichotivé slová s príznakom maznavosti - mamka, ocinko, holúbok.","zadanie":2,"kategoria":"Jazyk"},{"term":"Pejoratíva","definition":"Hanlivé expresívne slová - žbrnda, držgroš, pracháč.","zadanie":2,"kategoria":"Jazyk"},{"term":"Augmentatíva","definition":"Slová zveličujúce význam - psisko, nosisko, dlhočizný.","zadanie":2,"kategoria":"Jazyk"},{"term":"Dysfemizmy","definition":"Hrubé/drsné vyjadrenia - ožran, chajda, hnát.","zadanie":2,"kategoria":"Jazyk"},{"term":"Vulgarizmy","definition":"Hrubé neslušné výrazy s negatívnym nábojom, v rozpore s etikou.","zadanie":2,"kategoria":"Jazyk"},{"term":"Žánre ľudovej slovesnosti","definition":"Obradový folklór, ľudové piesne, balady, príslovia, porekadlá, pranostiky, hádanky, rozprávky, povesti.","zadanie":2,"kategoria":"Literatúra"},{"term":"Príslovie vs. porekadlo","definition":"Príslovie má mravné ponaučenie (\"Komu sa nelení...\"), porekadlo je len obrazné pomenovanie bez ponaučenia (\"Aká matka, taká Katka\").","zadanie":2,"kategoria":"Literatúra"},{"term":"Pranostika","definition":"Ľudová skúsenosť z pozorovania prírody - \"Studený máj, v stodole raj.\"","zadanie":2,"kategoria":"Literatúra"},{"term":"Janko Kráľ - Zakliata panna...","definition":"Romantizmus - čerpá z ľudovej slovesnosti (zakliata panna, strigy), zdrobneniny, združený rým.","zadanie":2,"kategoria":"Literatúra"},{"term":"Ján Botto - Smrť Jánošíkova","definition":"Romantizmus - využíva zdrobneniny, magické čísla, rozprávkové prvky (Jánošíkov opasok), združený rým.","zadanie":2,"kategoria":"Literatúra"},{"term":"Morfológia","definition":"Časť gramatiky skúmajúca tvarosloví - slovné druhy a ich gramatické kategórie.","zadanie":3,"kategoria":"Jazyk"},{"term":"10 slovných druhov","definition":"Ohybné: podstatné mená, prídavné mená, zámená, číslovky, slovesá. Neohybné: príslovky, predložky, spojky, častice, citoslovcia.","zadanie":3,"kategoria":"Jazyk"},{"term":"Druhy zámen","definition":"Osobné (ja, ty), privlastňovacie (môj), ukazovacie (ten), opytovacie (kto), vzťažné (ktorý), neurčité (niekto), vymedzovacie (sám), záporné (nikto).","zadanie":3,"kategoria":"Jazyk"},{"term":"Martin Kukučín","definition":"Realista, predstaviteľ realistickej poviedky. Diela: Rysavá jalovica, Keď báčik z Chochoľova umrie, Neprebudený.","zadanie":3,"kategoria":"Literatúra"},{"term":"J. G. Tajovský","definition":"Realista (2. vlna). Sociálna poviedka, kritický pohľad na dedinu. Diela: Maco Mlieč, Mamka Pôstková, Apoliena.","zadanie":3,"kategoria":"Literatúra"},{"term":"Keď báčik z Chochoľova umrie","definition":"Kukučín - poviedka o pánovi Adušovi, ktorý čaká na dedičstvo. Humorne vykresľuje upadajúcu šľachtu.","zadanie":3,"kategoria":"Literatúra"},{"term":"Maco Mlieč","definition":"Tajovský - sociálna kriticko-realistická poviedka. Téma: vykorisťovanie chudobného sluhu, kritika rozdielu medzi pánmi a chudobnými.","zadanie":3,"kategoria":"Literatúra"},{"term":"Slovotvorné postupy","definition":"Odvodzovanie (predponami/príponami), skladanie (životopis), skracovanie (ZOH, km), preberanie z cudzích jazykov (sitcom).","zadanie":4,"kategoria":"Jazyk"},{"term":"Slovotvorný základ","definition":"Časť slova, z ktorej je odvodené nové slovo. Napr. v \"darček\" je základ \"dar\".","zadanie":4,"kategoria":"Jazyk"},{"term":"Sylabicko-tonický verš","definition":"Veršový systém - rovnaký počet slabík + striedanie prízvučných a neprízvučných slabík. Stopy: trochej, jamb, daktyl.","zadanie":4,"kategoria":"Literatúra"},{"term":"Druhy lyriky","definition":"Podľa prístupu: náladová, opisná, úvahová. Podľa tematiky: intímna, prírodná, spoločenská, reflexívna, náboženská.","zadanie":4,"kategoria":"Literatúra"},{"term":"P. O. Hviezdoslav - tvorba","definition":"Lyrika: Sonety, Letorosty 1-3, Prechádzky Jarom/Letom, Krvavé sonety. Epika: Hájnikova žena, Ežo Vlkolinský.","zadanie":4,"kategoria":"Literatúra"},{"term":"Krvavé sonety","definition":"Hviezdoslav - cyklus sonetov o 1. svetovej vojne, odsudzuje vojnu a ľudskú sebeckosť.","zadanie":4,"kategoria":"Literatúra"},{"term":"Modálnosť vety","definition":"Vzťah hovoriaceho k obsahu výpovede. Vety: oznamovacie, opytovacie, rozkazovacie, želacie, zvolacie.","zadanie":5,"kategoria":"Jazyk"},{"term":"Vetné sklady","definition":"Vzťahy medzi vetnými členmi: prisudzovací (podmet-prísudok), určovací (rozvíjacie členy), priraďovací (rovnocenné členy).","zadanie":5,"kategoria":"Jazyk"},{"term":"Novela","definition":"Epický žáner stredného rozsahu, presná kompozícia, dej s rýchlym spádom a prekvapivým koncom, 2+ dejové línie, málo postáv.","zadanie":5,"kategoria":"Literatúra"},{"term":"Novela vs. poviedka","definition":"Novela: stredný rozsah, viac postáv, 2+ dejové línie, súbor udalostí. Poviedka: krátka, menej postáv, 1 dejová línia, 1 udalosť.","zadanie":5,"kategoria":"Literatúra"},{"term":"Neprebudený","definition":"Kukučín - novela o Ondrášovi Machuľovi, mentálne postihnutom husárovi. Tragický koniec - umiera pri záchrane husí.","zadanie":5,"kategoria":"Literatúra"},{"term":"Ťapákovci","definition":"Timrava - novela o zaostalej rodine z dediny, zachytáva ich lenivosť a zastaralé myslenie.","zadanie":5,"kategoria":"Literatúra"},{"term":"Prozodické vlastnosti reči","definition":"Časová (tempo, prestávka), silová (prízvuk, dôraz, intenzita), tónová (melódia vety) modulácia.","zadanie":6,"kategoria":"Jazyk"},{"term":"Slovný prízvuk v slovenčine","definition":"Vždy na 1. slabike (pri predložkových spojeniach na predložke: \"na stole\" → prízvuk na \"na\").","zadanie":6,"kategoria":"Jazyk"},{"term":"Epika","definition":"Literárny druh - rozprávanie príbehu. Má dej, postavy, prostredie, čas. Forma: próza alebo verš.","zadanie":6,"kategoria":"Literatúra"},{"term":"Detvan","definition":"Andrej Sládkovič - lyricko-epická skladba o Martinovi Hudcovi a Eline. Idealizuje slovenský ľud.","zadanie":6,"kategoria":"Literatúra"},{"term":"Hájnikova žena","definition":"Hviezdoslav - lyricko-epická skladba. Hanka Čajková, Michal Čajka. Téma: zápas medzi panstvom a ľudom.","zadanie":6,"kategoria":"Literatúra"},{"term":"Opisný slohový postup","definition":"Vymenúva znaky predmetu/javu. Žánre: opis statický, dynamický, jednoduchý, odborný, umelecký, charakteristika.","zadanie":7,"kategoria":"Jazyk"},{"term":"Opis vs. charakteristika","definition":"Opis - vonkajšie znaky (vzhľad, vlastnosti predmetu). Charakteristika - vnútorné znaky (povaha, vlastnosti človeka).","zadanie":7,"kategoria":"Jazyk"},{"term":"Priama vs nepriama charakteristika","definition":"Priama: autor priamo opíše vlastnosti. Nepriama: prejavujú sa cez konanie, reč, myslenie postavy.","zadanie":7,"kategoria":"Jazyk"},{"term":"Karikatúra","definition":"Zveličený, satirický opis - používa sa pre humorný/kritický efekt.","zadanie":7,"kategoria":"Jazyk"},{"term":"Román","definition":"Najrozšírenejší epický žáner - veľký rozsah, viac postáv, viac dejových línií, zobrazuje široký priestor a čas spoločenského života.","zadanie":7,"kategoria":"Literatúra"},{"term":"Otec Goriot","definition":"Honoré de Balzac - román z cyklu Ľudská komédia. Goriot - obetavý otec, ktorého dcéry využijú. Realistický román.","zadanie":7,"kategoria":"Literatúra"},{"term":"Neohybné slovné druhy","definition":"Príslovky, predložky, spojky, častice, citoslovcia. Nemenia svoj tvar - nečasujú sa, neskloňujú sa, nestupňujú sa.","zadanie":8,"kategoria":"Jazyk"},{"term":"Spodobovanie","definition":"Jav, pri ktorom sa hláska v spojení mení podľa nasledujúcej. Napr. \"vo zhone\" → \"fzhone\" (znelé/neznelé).","zadanie":8,"kategoria":"Jazyk"},{"term":"Sonet","definition":"Lyrická báseň s pevnou kompozíciou: 14 veršov, dva štvorveršia + dva trojveršia (alebo 3 štvorveršia + dvojveršie). Vznikol v Taliansku.","zadanie":8,"kategoria":"Literatúra"},{"term":"Epiteton","definition":"Básnický prívlastok - prídavné meno použité na vyjadrenie subjektívneho hodnotenia. Napr. \"belasé nebo\".","zadanie":8,"kategoria":"Literatúra"},{"term":"Básnický symbol","definition":"Konkrétna predstava na vyjadrenie abstraktnej myšlienky. Napr. holubica = mier.","zadanie":8,"kategoria":"Literatúra"},{"term":"Symbolizmus","definition":"Lit. smer (koniec 19. stor.) - využíva symboly, hudobnosť verša, vyjadruje pocity, nálady, tajomné. Predstaviteľ: Ivan Krasko.","zadanie":8,"kategoria":"Literatúra"},{"term":"Ivan Krasko","definition":"Predstaviteľ slovenského symbolizmu. Zbierky: Nox et solitudo, Verše. Témy: smútok, samota, sociálne otázky. Symboly: noc, jeseň, červené brká.","zadanie":8,"kategoria":"Literatúra"},{"term":"Formy národného jazyka","definition":"Spisovný jazyk + nespisovné formy: nárečia (miestne/teritoriálne), slang (sociálne), žargon, dobové formy.","zadanie":9,"kategoria":"Jazyk"},{"term":"Slovenské nárečia","definition":"3 hlavné: západoslovenské, stredoslovenské, východoslovenské. Príklady miestnych: záhorácke, oravské, liptovské, šarišské, gemerské, spišské.","zadanie":9,"kategoria":"Jazyk"},{"term":"Epos","definition":"Rozsiahla veršovaná epická skladba s hrdinom, ktorý má nadprirodzené schopnosti. Antické začiatky (Homér).","zadanie":9,"kategoria":"Literatúra"},{"term":"Časomiera","definition":"Veršový systém antiky - založený na striedaní dlhých a krátkych slabík (nie na prízvuku). Použil ho Ján Hollý.","zadanie":9,"kategoria":"Literatúra"},{"term":"Odysea","definition":"Homér - antický epos. Návrat Odysea z Trójskej vojny domov - 10 ročná cesta plná dobrodružstiev (kyklop Polyfémos, Sirény, Kirké).","zadanie":9,"kategoria":"Literatúra"},{"term":"Svätopluk","definition":"Ján Hollý - klasicistický epos v 12 spevoch o Svätoplukovi a Veľkomoravskej ríši. Časomiera, hexameter.","zadanie":9,"kategoria":"Literatúra"},{"term":"Slávy dcéra","definition":"Ján Kollár - znelkový (sonetový) cyklus - Předzpěv + 5 spevov. Téma: bolesť nad osudom Slovanov, ideál slovanskej vzájomnosti.","zadanie":9,"kategoria":"Literatúra"},{"term":"Publicistický štýl","definition":"Funkcia: informovať, presviedčať. Znaky: aktuálnosť, verejnosť, zrozumiteľnosť, expresívnosť. Žánre: spravodajské, analytické, beletristické.","zadanie":10,"kategoria":"Jazyk"},{"term":"Spravodajské žánre","definition":"Správa, oznam, interview, reportáž, riport, inzerát.","zadanie":10,"kategoria":"Jazyk"},{"term":"Analytické žánre","definition":"Úvodník, komentár, recenzia, kritika, glosa, posudok.","zadanie":10,"kategoria":"Jazyk"},{"term":"Beletristické žánre publicistiky","definition":"Fejtón, stĺpček, čierna kronika, črta.","zadanie":10,"kategoria":"Jazyk"},{"term":"Vnútorný monológ","definition":"Spôsob zobrazenia myšlienkového procesu postavy - hovorí sama so sebou, vyjadruje myšlienky, pocity, úvahy.","zadanie":10,"kategoria":"Literatúra"},{"term":"Verbálna komunikácia","definition":"Slovná - ústna alebo písomná, využíva jazykové prostriedky.","zadanie":11,"kategoria":"Jazyk"},{"term":"Neverbálna komunikácia","definition":"Mimoslovná: mimika (tvár), gestika (ruky), proxemika (vzdialenosť), haptika (dotyky), posturika (postoj), kinezika (pohyb).","zadanie":11,"kategoria":"Jazyk"},{"term":"Proxemické zóny","definition":"Intímna (0-30cm), osobná (45-120cm), sociálna (1,5-3m), verejná (5-8m).","zadanie":11,"kategoria":"Jazyk"},{"term":"Komédia (veselohra)","definition":"Dramatický žáner s humorným obsahom, šťastným koncom. Druhy: situačná, charakterová, salónna, fraška.","zadanie":11,"kategoria":"Literatúra"},{"term":"Situačný vs. slovný humor","definition":"Situačný: vzniká z komických situácií. Slovný: zo slovných hier, dvojzmyslov, narážok.","zadanie":11,"kategoria":"Literatúra"},{"term":"Hyperbola","definition":"Zveličenie - zámerné nadsadenie reálneho stavu pre umelecký účinok.","zadanie":11,"kategoria":"Literatúra"},{"term":"Lakomec","definition":"Molière - charakterová komédia. Harpagon - chamtivý starec, jeho lakomosť spôsobí konflikt s deťmi. Klasicistická komédia.","zadanie":11,"kategoria":"Literatúra"},{"term":"Zmierenie alebo Dobrodružstvo pri obžinkoch","definition":"Ján Palárik - veselohra. Téma: zmierenie maďarskej a slovenskej šľachty. Postavy si menia úlohy.","zadanie":11,"kategoria":"Literatúra"},{"term":"Vývin slov. spisovného jazyka","definition":"1. obdobie staroslovienčiny (Konštantín, Metod), 2. obdobie slovakizovanej češtiny, 3. Bernolákova kodifikácia (1787), 4. Štúrova kodifikácia (1843), 5. súčasná norma.","zadanie":12,"kategoria":"Jazyk"},{"term":"Bernolákova kodifikácia","definition":"1787 - prvá kodifikácia. Základom západoslov. nárečie (kultúrna trnavská slovenčina). Fonetický pravopis. Dielo: Grammatica slavica.","zadanie":12,"kategoria":"Jazyk"},{"term":"Štúrova kodifikácia","definition":"1843 - druhá kodifikácia. Základom stredoslov. nárečie. Fonetický princíp. Diela: Nauka reči slovenskej, Nárečja slovenskuo.","zadanie":12,"kategoria":"Jazyk"},{"term":"Hodžovsko-Hattalova reforma","definition":"1852 - úprava Štúrovej slovenčiny - zaviedli y, ý, ä, etymologický princíp pravopisu. Dielo: Krátka mluvnica slovenská.","zadanie":12,"kategoria":"Jazyk"},{"term":"Rečnícky štýl","definition":"Funkcia: pôsobiť na poslucháča. Znaky: monológovosť, sugestívnosť, expresívnosť. Použitie retor. otázok, oslovenia.","zadanie":13,"kategoria":"Jazyk"},{"term":"Rečnícke žánre","definition":"Náučné (prednáška, referát), náboženské (kázeň), agitačné (predvolebná reč), príležitostné (slávnostný príhovor, smútočná reč).","zadanie":13,"kategoria":"Jazyk"},{"term":"Živý bič","definition":"Milo Urban - sociálny román. Téma: 1. svet. vojna a jej dôsledky na dedinu Ráztoky. Kolektívny hrdina.","zadanie":13,"kategoria":"Literatúra"},{"term":"Na západe nič nového","definition":"E. M. Remarque - protivojnový román. Pavel Baumer - mladý vojak, hrôzy 1. svet. vojny.","zadanie":13,"kategoria":"Literatúra"},{"term":"Slohové postupy","definition":"Informačný (správa), opisný (opis), rozprávací (rozprávanie), výkladový (výklad), úvahový (úvaha), publicistický (článok).","zadanie":14,"kategoria":"Jazyk"},{"term":"Nespoľahlivý rozprávač","definition":"Rozprávač, ktorému čitateľ nemôže úplne dôverovať - manipuluje, klame, jeho pohľad je subjektívny/skreslený.","zadanie":14,"kategoria":"Literatúra"},{"term":"Typy rozprávača","definition":"Vševediaci (3. os., všetko vie), priamy/personálny (1. os., postava rozpráva), nepriamy (3. os., obmedzený pohľad), nespoľahlivý.","zadanie":14,"kategoria":"Literatúra"},{"term":"Diakritické znamienka","definition":"Mäkčeň (ť), dĺžeň (á), dve bodky (ä), vokáň (ô).","zadanie":15,"kategoria":"Jazyk"},{"term":"Interpunkčné znamienka","definition":"Bodka, čiarka, bodkočiarka, dvojbodka, otáznik, výkričník, úvodzovky, zátvorky, pomlčka, spojovník, tri bodky.","zadanie":15,"kategoria":"Jazyk"},{"term":"Voľný verš","definition":"Verš bez pravidelnej rytmickej štruktúry - nemá pravidelný počet slabík, nemá rým. Rozvinul sa v moderne.","zadanie":15,"kategoria":"Literatúra"},{"term":"Automatický text","definition":"Surrealistická technika - písanie bez kontroly rozumu, zachytávanie spontánnych myšlienok. Predstaviteľ: R. Fábry.","zadanie":15,"kategoria":"Literatúra"},{"term":"Katolícka moderna","definition":"Slov. lit. smer 30. roky 20. stor. - náboženská poézia. Predstavitelia: R. Dilong, P. Strmeň, J. Silan.","zadanie":15,"kategoria":"Literatúra"},{"term":"Syntax","definition":"Časť gramatiky o stavbe vety - vetné členy, vzťahy medzi nimi, typy viet.","zadanie":16,"kategoria":"Jazyk"},{"term":"Syntagma","definition":"Spojenie dvoch slov - prisudzovacia (mama varí), určovacia (krásna mama), priraďovacia (mama a otec).","zadanie":16,"kategoria":"Jazyk"},{"term":"Jednočlenná vs. dvojčlenná veta","definition":"Jednočlenná: má len vetný základ (Blýska sa). Dvojčlenná: má podmet aj prísudok (Deti sa hrali).","zadanie":16,"kategoria":"Jazyk"},{"term":"Naturizmus","definition":"Slov. próza 30.-40. roky 20. stor. - lyrizovaná próza s prvkami mýtu, prírody, ľudovej slovesnosti. Hlavná postava silne spätá s prírodou.","zadanie":16,"kategoria":"Literatúra"},{"term":"Lyrizovaná próza","definition":"Próza s prvkami lyriky - obrazné vyjadrenie, symboly, opisy prírody, citovosť. Príklady: Chrobák, Figuli, Švantner.","zadanie":16,"kategoria":"Literatúra"},{"term":"Reťazový kompozičný princíp","definition":"Príbeh sa skladá z jednotlivých článkov (epizód), ktoré sa za sebou viažu ako reťaz, nie chronologicky podľa kauzality.","zadanie":16,"kategoria":"Literatúra"},{"term":"Tri gaštanové kone","definition":"Margita Figuli - lyrizovaná próza. Téma: čistá láska Petra a Magdalény, dobro vs. zlo (Jano Záhradník).","zadanie":16,"kategoria":"Literatúra"},{"term":"Drak sa vracia","definition":"Dobroslav Chrobák - lyrizovaná próza. Martin Lepiš zvaný Drak - vyvrhnutý dedinou, vracia sa pomôcť.","zadanie":16,"kategoria":"Literatúra"},{"term":"Gramatické kategórie slovies","definition":"Osoba (1./2./3.), číslo (jed./množ.), čas (min./prít./bud.), spôsob (oznam./rozk./podm.), rod (činný/trpný), vid (dok./nedok.).","zadanie":17,"kategoria":"Jazyk"},{"term":"Príslovky - druhy","definition":"Miesta (kde), času (kedy), spôsobu (ako), príčiny (prečo).","zadanie":17,"kategoria":"Jazyk"},{"term":"Číslovky - druhy","definition":"Základné (päť), radové (piaty), násobné (päťkrát), skupinové (pätoro), zlomkové (polovica), neurčité (mnoho).","zadanie":17,"kategoria":"Jazyk"},{"term":"Bačova žena","definition":"Ivan Stodola - tragédia. Eva Marčáková, Mišo a Ondrej. Téma: konflikt medzi dvoma manželmi po návrate prvého z Ameriky.","zadanie":17,"kategoria":"Literatúra"},{"term":"Matka (Barč Ivan)","definition":"Julius Barč Ivan - dráma o materskej láske, ktorá presahuje smrť.","zadanie":17,"kategoria":"Literatúra"},{"term":"Kým kohút nezaspieva","definition":"Ivan Bukovčan - dráma. 10 ľudí v pivnici počas vojny, Nemci žiadajú vydať jedného. Téma: morálka, zbabelosť, obeta.","zadanie":17,"kategoria":"Literatúra"},{"term":"Jednoduchá veta vs. súvetie","definition":"Jed. veta - 1 prisudzovací sklad. Súvetie - 2+ prisudzovacie sklady (priraďovacie - rovnocenné vety; podraďovacie - hlavná + vedľajšia).","zadanie":18,"kategoria":"Jazyk"},{"term":"Druhy priraďovacích súvetí","definition":"Zlučovacie (a, i), stupňovacie (ba, ba aj), odporovacie (ale, no), vylučovacie (alebo), dôsledkové (preto, tak), príčinné (lebo, veď).","zadanie":18,"kategoria":"Jazyk"},{"term":"Druhy vedľajších viet","definition":"Podmetová, prísudková, predmetová, prívlastková, príslovková (miesta, času, spôsobu, príčiny, podmienky, prípustky, účelu).","zadanie":18,"kategoria":"Jazyk"},{"term":"Prúd vedomia","definition":"Lit. technika - zachytenie myšlienok postavy v ich spontánnom toku, bez logickej organizácie. Predstaviteľ: J. Joyce - Odyseus.","zadanie":18,"kategoria":"Literatúra"},{"term":"Premena (Kafka)","definition":"Franz Kafka - novela. Gregor Samsa sa premení na obrovský hmyz. Téma: odcudzenie, absurdita, rozpad rodiny.","zadanie":18,"kategoria":"Literatúra"},{"term":"Vsuvka","definition":"Vetný člen/veta vsunutá do inej vety, oddelená čiarkami/pomlčkami. Napr. \"Pes, verný priateľ, čakal.\"","zadanie":19,"kategoria":"Jazyk"},{"term":"Výpustka (elipsa)","definition":"Vypustenie vetného člena, ktorý si môžeme z kontextu domyslieť. Napr. \"Mladosť - pochabosť.\"","zadanie":19,"kategoria":"Jazyk"},{"term":"Prístavok","definition":"Voľný prívlastok, dopĺňa význam podstatného mena. Napr. \"Bratislava, hlavné mesto Slovenska, leží pri Dunaji.\"","zadanie":19,"kategoria":"Jazyk"},{"term":"Vytýčený vetný člen","definition":"Vyzdvihnutý člen na začiatok vety, oddelený pauzou. Napr. \"Jednotka, tá ešte neznamená úspech.\"","zadanie":19,"kategoria":"Jazyk"},{"term":"Absurdná dráma","definition":"Dramatický prúd 50. r. 20. stor. - zobrazuje nezmyselnosť ľudskej existencie. Postavy bez minulosti, redukovaný dialóg, absurdné situácie.","zadanie":19,"kategoria":"Literatúra"},{"term":"Čakanie na Godota","definition":"Samuel Beckett - absurdná dráma. Vladimír a Estragon čakajú na Godota, ktorý nikdy nepríde. Symbol márnosti hľadania zmyslu.","zadanie":19,"kategoria":"Literatúra"},{"term":"Administratívny štýl","definition":"Funkcia: úradne komunikovať. Znaky: presnosť, vecnosť, neutrálnosť, ustálené formulácie, predtlače.","zadanie":20,"kategoria":"Jazyk"},{"term":"Administratívne žánre","definition":"Žiadosť, životopis, sťažnosť, reklamácia, objednávka, splnomocnenie, zápisnica, oznámenie, faktúra, motivačný list.","zadanie":20,"kategoria":"Jazyk"},{"term":"Chronologický postup","definition":"Dej je rozprávaný v časovom poradí - od najstaršej udalosti po najnovšiu.","zadanie":20,"kategoria":"Literatúra"},{"term":"Retrospektívny postup","definition":"Dej začína v prítomnosti/blízkej minulosti, postupne sa odkrývajú staršie udalosti formou spomienok.","zadanie":20,"kategoria":"Literatúra"},{"term":"Ako chutí moc","definition":"Ladislav Mňačko - román. Frank - bývalý fotograf, kritizuje skorumpovanú moc komunistických funkcionárov.","zadanie":20,"kategoria":"Literatúra"},{"term":"Homonymá","definition":"Slová s rovnakou zvukovou podobou, ale rôznym významom. Napr. koruna (peniaze/kráľovská/stromu).","zadanie":21,"kategoria":"Jazyk"},{"term":"Synonymá","definition":"Slová s rovnakým/blízkym významom. Napr. dom - obydlie, krásny - pekný.","zadanie":21,"kategoria":"Jazyk"},{"term":"Antonymá (opozitá)","definition":"Slová s opačným významom. Napr. veľký - malý, deň - noc.","zadanie":21,"kategoria":"Jazyk"},{"term":"Frazeologizmy","definition":"Ustálené slovné spojenia s preneseným významom. Napr. \"Achillova päta\" - slabé miesto.","zadanie":21,"kategoria":"Jazyk"},{"term":"Pôvod frazeologizmov","definition":"Ľudové (Bez práce nie sú koláče), biblické (babylonská veža), mytologické (Achillova päta), literárne (boj s veternými mlynmi), historické (Svätoplukove prúty).","zadanie":21,"kategoria":"Jazyk"},{"term":"Miroslav Válek","definition":"Súčasný slov. básnik. Zbierky: Dotyky, Príťažlivosť, Nepokoj, Milovanie v husej koži. Skeptický pohľad na svet.","zadanie":21,"kategoria":"Literatúra"},{"term":"Milan Rúfus","definition":"Súčasný slov. básnik. Zbierky: Až dozrieme, Chlapec maľuje dúhu, Modlitbičky. Témy: domov, viera, ľudskosť.","zadanie":21,"kategoria":"Literatúra"},{"term":"Delenie samohlások","definition":"Krátke (a, e, i, o, u), dlhé (á, é, í, ó, ú, ý), dvojhlásky (ia, ie, iu, ô). Široké (a, á), úzke (i, í), zaokrúhlené (o, u).","zadanie":22,"kategoria":"Jazyk"},{"term":"Delenie spoluhlások","definition":"Znelé/neznelé párové (b-p, d-t...), znelé nepárové (m, n, r, l), neznelé nepárové (c, č, h). Tvrdé (d, t, n, l), mäkké (ď, ť, ň, ľ), obojaké.","zadanie":22,"kategoria":"Jazyk"},{"term":"Ľubozvučnosť slovenčiny","definition":"Striedanie samohlások a spoluhlások (rytmický zákon), nahromadenie spoluhlások nie je typické. Zlepšuje výslovnosť.","zadanie":22,"kategoria":"Jazyk"},{"term":"Zvukomaľba (onomatopoja)","definition":"Napodobňovanie zvukov reality cez slová - bzučí, šuchotá, kvíli.","zadanie":22,"kategoria":"Jazyk"},{"term":"Spoločenská lyrika","definition":"Lyrika vyjadrujúca vzťah k spoločnosti, národu, sociálnym problémom. Príklady: Kollár - Slávy dcéra, Štúr - Rozžehnání.","zadanie":22,"kategoria":"Literatúra"},{"term":"Ľúbostná lyrika","definition":"Lyrika o láske, vzťahoch. Príklady: Sládkovič - Marína, Smrek - Dievča v rozkvete, Kostra - Ave Eva.","zadanie":22,"kategoria":"Literatúra"},{"term":"Marína","definition":"Andrej Sládkovič - lyricko-epická skladba, 291 strof. Téma: ľúbostná lyrika k Márii Pišlovej + úvahy o vlasti, kráse.","zadanie":22,"kategoria":"Literatúra"},{"term":"Úvaha","definition":"Slohový útvar - osobné zamyslenie sa nad problémom, otázkou. Subjektívny postoj. Použitie rečníckych otázok, citátov.","zadanie":23,"kategoria":"Jazyk"},{"term":"Tragédia","definition":"Dramatický žáner - vážny konflikt hrdinu so spoločnosťou/osudom, hrdina spravidla zomrie. Vznikla v antickom Grécku.","zadanie":23,"kategoria":"Literatúra"},{"term":"Monológ vs. dialóg","definition":"Monológ - prejav 1 postavy. Dialóg - rozhovor 2+ postáv. Replika - prejav 1 účastníka dialógu.","zadanie":23,"kategoria":"Literatúra"},{"term":"Autorská poznámka","definition":"Text v scenári (kurzívou) - opisuje prostredie, pohyby, mimiku postáv. Pre režisérov, hercov.","zadanie":23,"kategoria":"Literatúra"},{"term":"Vnútorná kompozícia drámy","definition":"Expozícia (úvod) - kolízia (zápletka) - kríza (vyvrcholenie) - peripetia (obrat) - katastrofa (rozuzlenie).","zadanie":23,"kategoria":"Literatúra"},{"term":"Antigona","definition":"Sofokles - antická tragédia. Antigona pochová brata proti zákazu kráľa Kreona, ten ju odsúdi na smrť. Konflikt: božské vs. ľudské zákony.","zadanie":23,"kategoria":"Literatúra"},{"term":"Hamlet","definition":"Shakespeare - tragédia. Dánsky princ pomstí otca zavraždeného strýkom. Známy monológ \"Byť či nebyť\".","zadanie":23,"kategoria":"Literatúra"},{"term":"Oznam vs. správa","definition":"Oznam: stručná informácia o budúcej udalosti. Správa: detailná informácia o uskutočnenej udalosti (kto, čo, kedy, kde, ako, prečo).","zadanie":24,"kategoria":"Jazyk"},{"term":"Denník vs. blog","definition":"Denník: pravidelné súkromné zápisky. Blog: verejné internetové zápisky, môžu byť o čomkoľvek.","zadanie":24,"kategoria":"Jazyk"},{"term":"Postmoderna","definition":"Lit. smer od 60. rokov 20. stor. - skepsa k veľkým príbehom, intertextualita, irónia, miešanie štýlov, experimenty.","zadanie":24,"kategoria":"Literatúra"},{"term":"Meno ruže","definition":"Umberto Eco - postmoderný román. Detektívka v stredovekom kláštore. Brat Viliam z Baskerville rieši sériu vrážd.","zadanie":24,"kategoria":"Literatúra"},{"term":"Démon súhlasu","definition":"Dominik Tatarka - novela kritizujúca konformizmus v komunistickom režime. Bartolomej Boleráz.","zadanie":24,"kategoria":"Literatúra"},{"term":"Diskusia vs. polemika vs. debata","definition":"Diskusia: vecná výmena názorov, hľadanie pravdy. Polemika: ostrá výmena, obhajoba vlastného. Debata: organizovaná diskusia s pravidlami.","zadanie":25,"kategoria":"Jazyk"},{"term":"Argumentácia vs. propaganda","definition":"Argumentácia: vecné dôkazy. Propagácia: šírenie myšlienok. Propaganda: jednostranné, manipulatívne presviedčanie.","zadanie":25,"kategoria":"Jazyk"},{"term":"Beatnici (beat generation)","definition":"Americké lit. hnutie 50. rokov 20. stor. - revolta proti konzumnej spol., voľný verš, sloboda, drogy, jazz. Allen Ginsberg, J. Kerouac.","zadanie":25,"kategoria":"Literatúra"},{"term":"Vytie (Howl)","definition":"Allen Ginsberg - manifest beatnikov. Voľný verš, kritika spoločnosti, prelomová báseň americkej poézie.","zadanie":25,"kategoria":"Literatúra"},{"term":"Kto chytá v žite","definition":"J. D. Salinger - román. Holden Caulfield - mladík v rozpore so spoločnosťou. Symbol revolty proti pokrytectvu.","zadanie":25,"kategoria":"Literatúra"},{"term":"Indoeurópske jazyky","definition":"Najväčšia jazyková rodina. Vetvy: slovanská, germánska, románska, keltská, baltská, grécka, indo-iránska, albánska, arménska.","zadanie":26,"kategoria":"Jazyk"},{"term":"Slovanské jazyky","definition":"Západné (slovenčina, čeština, poľština), východné (ruština, ukrajinčina, bieloruština), južné (slovinčina, chorvátčina, srbčina, bulharčina).","zadanie":26,"kategoria":"Jazyk"},{"term":"Ilias","definition":"Homér - antický epos. 24 spevov, posledných 51 dní Trójskej vojny. Hlavný hrdina Achilles, súboj s Hektorom.","zadanie":26,"kategoria":"Literatúra"},{"term":"Proglas","definition":"Konštantín Filozof - prvá slovanská báseň, predslov k prekladu Evanjelií. Obhajuje právo Slovanov mať vlastné písmo a bohoslužbu.","zadanie":26,"kategoria":"Literatúra"},{"term":"Decameron","definition":"Boccaccio - renesančné dielo. 10 ľudí počas moru v 10 dňoch rozpráva 100 noviel. Téma: láska, lesť, satira na cirkev.","zadanie":26,"kategoria":"Literatúra"},{"term":"Don Quijote","definition":"Cervantes - renesančný román, paródia na rytierske romány. Don Quijote a Sancho Panza, boj s veternými mlynmi.","zadanie":26,"kategoria":"Literatúra"},{"term":"Moravsko-panónske legendy","definition":"Život Konštantína a Život Metoda - hagiografické diela z 9. storočia, slovanské stredoveké lit.","zadanie":26,"kategoria":"Literatúra"},{"term":"Jazyk vs. reč","definition":"Jazyk: systém znakov a pravidiel celej spoločnosti (kodifikácia). Reč: individuálne uskutočnenie jazyka konkrétnym človekom.","zadanie":27,"kategoria":"Jazyk"},{"term":"Jazyková kultúra","definition":"Schopnosť používať jazyk správne a primerane situácii. Súvisí s kodifikáciou, jazykovou praxou, výslovnostnými štýlmi.","zadanie":27,"kategoria":"Jazyk"},{"term":"Výslovnostné štýly","definition":"Neutrálny (bežná komunikácia), vysoký (slávnostné prejavy, rozhlas), nižší (familiárny, súkromný).","zadanie":27,"kategoria":"Jazyk"},{"term":"Baroko","definition":"Lit. smer 17.-18. stor. Znaky: pochmúrnosť, vita brevis (život je krátky), memento mori, kontrast, alegória, ozdobnosť, religiozita.","zadanie":27,"kategoria":"Literatúra"},{"term":"Klasicizmus","definition":"Lit. smer 17.-19. stor. Znaky: dokonalosť, súlad, rozum, návrat k antike, pravidlá, hierarchia žánrov (vysoké/nízke).","zadanie":27,"kategoria":"Literatúra"},{"term":"Labyrint světa a ráj srdce","definition":"J. A. Komenský - alegorické dielo. Pútnik prechádza svetom-mestom, vidí jeho márnosť, útočisko nájde v srdci/u Boha.","zadanie":27,"kategoria":"Literatúra"},{"term":"Menné gramatické kategórie","definition":"Rod (mužský/ženský/stredný), číslo (jed./množ.), pád (1.-7.), vzor.","zadanie":28,"kategoria":"Jazyk"},{"term":"Slovesné gramatické kategórie","definition":"Osoba, číslo, čas, spôsob, slovesný rod (činný/trpný), vid (dokonavý/nedokonavý), trieda, vzor.","zadanie":28,"kategoria":"Jazyk"},{"term":"Skloňovanie - pán","definition":"1. pán, 2. pána, 3. pánovi, 4. pána, 5. pán/pane, 6. (o) pánovi, 7. (s) pánom. Vzor: chlap.","zadanie":28,"kategoria":"Jazyk"},{"term":"Romantizmus - znaky","definition":"Subjektivizmus, citovosť, individualita, ideál, exotika, kontrast, hrdinská minulosť, ľudová slovesnosť, slobody.","zadanie":28,"kategoria":"Literatúra"},{"term":"Realizmus - znaky","definition":"Objektívne zobrazovanie skutočnosti, kritika spoločnosti, bežný človek ako hrdina, dôraz na sociálne podmienky.","zadanie":28,"kategoria":"Literatúra"},{"term":"Chrám Matky Božej v Paríži","definition":"Victor Hugo - romantický román. Quasimodo (hluchý zvonár), Esmeralda (cigánka), Frollo (kňaz). Stredoveký Paríž.","zadanie":28,"kategoria":"Literatúra"},{"term":"Zločin a trest","definition":"Dostojevskij - psychologický román. Raskoľnikov zavraždí starenku, prežíva výčitky, nakoniec sa prizná. Téma: morálka, vina, trest.","zadanie":28,"kategoria":"Literatúra"},{"term":"Jazykové slovníky - druhy","definition":"Výkladový (KSSJ), pravopisný (PSP), synonymický, frazeologický, terminologický, prekladový, etymologický, cudzích slov, nárečový.","zadanie":29,"kategoria":"Jazyk"},{"term":"Pravidlá slovenského pravopisu (PSP)","definition":"Kodifikačná príručka - pravidlá písania, výslovnosti, gramatiky. Obsahuje aj slovník.","zadanie":29,"kategoria":"Jazyk"},{"term":"Existencializmus","definition":"Filozoficko-lit. smer 20. stor. - človek je osamotený, sloboda = zodpovednosť, absurdita existencie. Sartre, Camus.","zadanie":29,"kategoria":"Literatúra"},{"term":"Múr (Sartre)","definition":"J. P. Sartre - existencialistická poviedka. Pablo Ibbieta čaká na popravu počas občianskej vojny.","zadanie":29,"kategoria":"Literatúra"},{"term":"Hlava XXII","definition":"Joseph Heller - satirický román. Bombardér Yossarian v 2. svet. vojne. Catch-22: paragraf, ktorý nemožno obísť (chceš byť uznaný za blázna = si normálny).","zadanie":29,"kategoria":"Literatúra"},{"term":"1984","definition":"George Orwell - dystopický román. Totalitný režim, Veľký brat ťa pozoruje. Winston Smith - hlavný hrdina. Newspeak, doublethink.","zadanie":29,"kategoria":"Literatúra"},{"term":"Náučný štýl","definition":"Funkcia: poučiť, vysvetliť. Znaky: objektivita, presnosť, odborná terminológia, logická stavba, výkladový postup.","zadanie":30,"kategoria":"Jazyk"},{"term":"Formy logického myslenia","definition":"Dedukcia (zo všeobecného k jednotlivému), indukcia (z jednotlivého k všeobecnému), analýza (rozklad), syntéza (zlúčenie), komparácia (porovnanie), analógia (podobnosť).","zadanie":30,"kategoria":"Jazyk"},{"term":"Citácia vs. parafráza","definition":"Presná citácia: doslovné prevzatie (úvodzovky). Voľná citácia: parafrázovanie bez úvodzoviek. Parafráza: vyjadrenie myšlienky vlastnými slovami.","zadanie":30,"kategoria":"Jazyk"},{"term":"Poézia vs. próza","definition":"Poézia: viazaná reč (verš, rytmus, rým). Próza: voľná reč (vety, odseky, dejová línia).","zadanie":30,"kategoria":"Literatúra"},{"term":"Fantastická literatúra","definition":"Žáner využívajúci nadprirodzené prvky, mágiu, mýty, fantastické svety. Príklad: Harry Potter (Rowlingová), Pán prsteňov (Tolkien).","zadanie":30,"kategoria":"Literatúra"},{"term":"Vedecko-fantastická lit. (sci-fi)","definition":"Žáner založený na vedeckých hypotézach budúcnosti - vesmírne cesty, technológia, robotika. Príklad: Verne, Asimov, Capek.","zadanie":30,"kategoria":"Literatúra"},{"term":"Malý princ","definition":"Antoine de Saint-Exupéry - filozofická rozprávka. Princ z planéty B-612, líška: \"Správne vidíme len srdcom.\" Téma: priateľstvo, zodpovednosť.","zadanie":30,"kategoria":"Literatúra"}],"quiz":[{"q":"Kto sú účastníci komunikácie?","options":["Recipienti","Adresáti","Lokutori","Komunikanti"],"correct":3,"zadanie":1,"tema":"komunikácia"},{"q":"Aký druh komunikácie je založený na otvorenosti a rešpekte voči druhým?","options":["Manipulatívna","Pasívna","Asertívna","Agresívna"],"correct":2,"zadanie":1,"tema":"komunikácia"},{"q":"Opakom asertívnej komunikácie sú:","options":["Spisovná a hovorová","Súkromná a verejná","Verbálna a neverbálna","Pasívna a agresívna"],"correct":3,"zadanie":1,"tema":"komunikácia"},{"q":"Koľko slabík má každý verš vo Valaskej škole mravov stodole?","options":["12","10","14","16"],"correct":2,"zadanie":1,"tema":"Gavlovič"},{"q":"Hugolín Gavlovič patril k rehoľi:","options":["Dominikánskej","Jezuitskej","Benediktínskej","Františkánskej"],"correct":3,"zadanie":1,"tema":"Gavlovič"},{"q":"V akom jazyku napísal Gavlovič Valaskú školu?","options":["Latinčine","Spisovnej slovenčine","Bibličtine","Slovakizovanej češtine"],"correct":3,"zadanie":1,"tema":"Gavlovič"},{"q":"Mor ho! je dielo:","options":["Janka Kráľa","Andreja Sládkoviča","Sama Chalupku","Jána Bottu"],"correct":2,"zadanie":1,"tema":"Chalupka"},{"q":"V akom storočí sa odohráva dej skladby Mor ho!?","options":["9. storočie","1. storočie","4. storočie","13. storočie"],"correct":2,"zadanie":1,"tema":"Chalupka"},{"q":"Z koho diela čerpá Chalupka tému skladby Mor ho!?","options":["Šafárika","Bernoláka","Štúra","Bernoláka"],"correct":0,"zadanie":1,"tema":"Chalupka"},{"q":"Aký veršový systém využíva Mor ho!?","options":["Časomerný","Voľný verš","Sylabický","Sylabicko-tonický"],"correct":2,"zadanie":1,"tema":"prozódia"},{"q":"Ktorý zo štýlov sa využíva v krásnej literatúre?","options":["Administratívny","Odborný","Publicistický","Umelecký"],"correct":3,"zadanie":2,"tema":"štýly"},{"q":"Hlavnou funkciou odborného štýlu je:","options":["Vyjadrenie krásy","Presvedčiť verejnosť","Pôsobenie na city","Informovanie a poučenie"],"correct":3,"zadanie":2,"tema":"štýly"},{"q":"Aký znak je typický pre romantizmus?","options":["Realistický obraz spoločnosti","Objektivita, vedeckosť","Subjektivizmus, individualizmus","Návrat k antike"],"correct":2,"zadanie":2,"tema":"romantizmus"},{"q":"Kto je hlavný predstaviteľ slovenského romantizmu?","options":["Naturisti","Realisti","Bernolákovci","Štúrovci"],"correct":3,"zadanie":2,"tema":"romantizmus"},{"q":"Janko Kráľ patril k:","options":["Štúrovcom","Bernolákovcom","Symbolistom","Realistom"],"correct":0,"zadanie":2,"tema":"Kráľ"},{"q":"Kto napísal baladu Zakliata panna vo Váhu?","options":["Andrej Sládkovič","Janko Kráľ","Ján Botto","Samo Chalupka"],"correct":1,"zadanie":2,"tema":"Kráľ"},{"q":"Veda, ktorá skúma slovnú zásobu, sa nazýva:","options":["Morfológia","Fonetika","Syntax","Lexikológia"],"correct":3,"zadanie":3,"tema":"lexikológia"},{"q":"Slová s rovnakou alebo podobnou významovou stránkou sú:","options":["Antonymá","Paronymá","Synonymá","Homonymá"],"correct":2,"zadanie":3,"tema":"lexikológia"},{"q":"Slová s opačným významom sú:","options":["Paronymá","Homonymá","Synonymá","Antonymá"],"correct":3,"zadanie":3,"tema":"lexikológia"},{"q":"Slová rovnakého znenia, ale rôzneho významu sú:","options":["Homonymá","Synonymá","Antonymá","Hyperonymá"],"correct":0,"zadanie":3,"tema":"lexikológia"},{"q":"Kto je autorom diela Keď báčik z Chochoľova umrie?","options":["Martin Kukučín","B. S. Timrava","Ladislav Nádaši-Jégé","J. G. Tajovský"],"correct":0,"zadanie":3,"tema":"Kukučín"},{"q":"Kukučínovo dielo Keď báčik z Chochoľova umrie je:","options":["Humoristická novela","Esej","Báseň","Tragédia"],"correct":0,"zadanie":3,"tema":"Kukučín"},{"q":"Hlavná postava novely Keď báčik z Chochoľova umrie:" n":[20],"Sonety":[8],"Sonety pre Lauru":[8],"Statky-zmätky":[23],"Svätopluk":[9],"Topole":[8],"Tri gaštanové kone":[16],"Valaská škola mravov stodola":[1],"Valaská škola...":[27],"Vytie":[25],"Zahradní slavnost":[19],"Zakliata panna vo Váhu a divný Janko":[2],"Zločin a trest":[28],"Zmierenie alebo Dobrodružstvo pri obžinkoch":[11],"Zmráka sa":[8],"Čakanie na Godota":[19],"Ťapákovci":[5,14],"Živý bič":[13]}},"search_text":{"1":"komunikácia rytmus a sylabická prozódia sloh - komunikácia baroko, romantizmus (štúrovci) hugolín gavlovič samo chalupka valaská škola mravov stodola mor ho! úloha č. 1\n\nvysvetlite pojem komunikácia. charakterizujte formy efektívnej komunikácie a neúspešnej komunikácie.\n\n komunikácia znamená:\n\n - v širšom zmysle slova každú výmenu informácií medzi ľuďmi, zvieratami, ale aj neživými systémami\n\n - v užšom zmysle slova predstavuje dorozumievací proces, spoločenský styk s cieľom výmeny myšlienok medzi ľuďmi\n\n - z jazykovedného pohľadu je to sprostredkovanie informácii ústnou alebo písomnou formou.\n\n komunikácia sa uskutočňuje, ak chceme sprostredkovať nejaké informácie (skutočnosti), ktoré tvoria tému komunikácie. komunikácia môže prebiehať medzi dvoma alebo viacerými ľuďmi, pričom účastníci komunikácie sa nazývajú komunikanti.\n\n efektívna komunikácia je obojsmerná komunikácia medzi hovoriacim a počúvajúcim, v ktorej vyjadrujú podporujúco, opisne a asertívne myšlienky, pocity, postoje a názory. je založená na spolupráci, dobrom počúvaní a odovzdávaní spätnej väzby. ľudia, ktorí vedia komunikovať, majú aj schopnosť empatie. „empatickí“ ľudia:\n\n - vedia čo chcú povedať,\n\n - vedia nájsť spôsob, ktorým získajú poslucháča,\n\n - vedia utvárať a udržiavať vzťahy,\n\n - vedia, čo sa poslucháčovi páči a čo ho zaujíma\n\n - vedia si vybrať zo škály komunikačných možností,\n\n - volia si, kedy a kde komunikujú,\n\n - komunikujú jasne, stručne, zrozumiteľne,\n\n - aktívne počúvajú,\n\n - prijaté informácie vedia pochopiť a objasniť,\n\n - nie sú rozptýlení a roztržití,\n\n - vedia ako uzatvárať komunikáciu, a pod.\n\n súčasťou efektívnej komunikácie je asertívna komunikácia, ktorej základom je asertívne správanie. asertívna komunikácia je komunikácia, ktorou človek otvorene a primerane vyjadruje a presadzuje svoje myšlienky, názory a pocity. postupuje pri tom však tak, aby neprekročil svoje práva a nedotkol sa ani práv iných ľudí. súčasťou asertívnej komunikácie je aj schopnosť človeka počúvať druhých. dobrý poslucháč by mal napr. vedieť, kedy mlčať počas prehovoru druhého človeka, neprerušovať jeho výpoveď častými otázkami, alebo poznámkami, ale pritom b","2":"členenie slovnej zásoby (štylistické) žánre ľudovej slovesnosti lexikológia romantizmus, ľudová slovesnosť janko kráľ ján botto zakliata panna vo váhu a divný janko smrť jánošíkova úloha č. 1\n\nvysvetlite členenie slovnej zásoby zo štylistického hľadiska – bezpríznakové slová, príznakové slová (podľa obsahu, pôvodu, spisovnosti, doby používania a expresívnosti).\n\n štylisticky bezpríznakové (neutrálne) slová- nazývame ich aj neutrálne slová. vyjadrujú iba vecný, logický význam slova. možno ich použiť v ktoromkoľvek jazykovom štýle. tieto slová patria do jadra slovnej zásoby. patria tu napr.: koberec, dom písať, hore, desať, mama, pes, anna, peter, voz, hus, lúka, kvet, a pod.\n\n štylisticky príznakové (zafarbené) slová- sú také slová, pri ktorých si uvedomujeme ich viazanosť s určitým typom textov (napr. kancelarizmy s administratívnymi textami; termíny s náučnými textami; publicizmy s publicistickými textami a pod.). v týchto „domovských textoch“ pôsobia ako bezpríznakové (neutrálne) slová. ak ich však použijeme v iných typoch textov (napr. termín v hovorovom štýle; slangové slovo v náučnom štýle, a pod.) pôsobia v nich „cudzorodo“, pútajú na seba pozornosť, a preto hovoríme, že získali príznak (osobitý znak, špecifické zafarbenie daného slova). rozdelenie:\n\n - členenie podľa obsahu (významu):\n\n - termíny (odborné názvy)- sú jednoslovné, alebo viacslovné pomenovania, ktoré nám umožňujú vyjadrovať sa presne a jednoznačne. využívajú sa najmä v náučných textoch. napr.: svietiplyn, morféma, poniklec jarný, medveď hnedý, kyselina chlorovodíková, a pod. patria tu aj: kancelarizmy (typické slová administratívnych textov- napr. splatnosť, pohľadávka, faktúra, cestovný príkaz, a pod.); publicizmy (slová, ktoré sú typické pre publicistické texty- napr. iniciatíva, atentát, terorizmus, obnova, lukratívny, a pod.)\n\n - hovorové slová- sú tie, ktoré používame v súkromnom prejave, sú neoddeliteľnou súčasťou hovorových textov. napr.: futro, žúrovať, tlčhuba, panelák, frfľať, starký, diplomovka, autiak, učka, fajn, zlatko, a pod.\n\n - knižné slová- sa nezvyknú požívať v ústnej podobe, nachádzame ich predovštkým v písomných textoch. napr.: milota, prýštiť, riava, ","3":"morfológia - ohybné slovné druhy (podst.m., príd.m., zámená) realistická poviedka morfológia realizmus martin kukučín jozef gregor tajovský keď báčik z chochoľova umrie maco mlieč mamka pôstková úloha č. 1\n\nvysvetlite, čo skúma morfológia, ako rozdeľujeme slovné druhy. charakterizujte podstatné mená, prídavné mená a zámená.\n\n morfológia- je jazykovedná disciplína zaoberajúca sa gramatickými tvarmi, slovnými druhmi, gramatickými kategóriami a tvarotvornými postupmi.\n\n rozdelenie slovných druhov:\n\n - plnovýznamové:\n\n - podstatné mená (substantíva)\n\n - prídavné mená (adjektíva)\n\n - zámená (pronominá)\n\n - číslovky (numerália)\n\n - slovesá (verbá)\n\n - príslovky (adverbiá)\n\n - neplnovýznamové:\n\n - predložky (prepozície)\n\n - spojky (konjunkcie)\n\n - častice (partikuly)\n\n - citoslovcia (interjekcie)\n\n - majú vetnočlenskú platnosť:\n\n - podstatné mená (substantíva)\n\n - prídavné mená (adjektíva)\n\n - zámená (pronominá)\n\n - číslovky (numerália)\n\n - slovesá (verbá)\n\n - príslovky (adverbiá)\n\n - nemajú vetnočlenskú platnosť:\n\n - predložky (prepozície)\n\n - spojky (konjunkcie)\n\n - častice (partikuly)\n\n - citoslovcia (interjekcie)\n\n - ohybné:\n\n - podstatné mená (substantíva)- skloňujú sa\n\n - prídavné mená (adjektíva)- skloňujú sa\n\n - zámená (pronominá)- skloňujú sa\n\n - číslovky (numerália)- skloňujú sa\n\n - slovesá (verbá)- časujú sa\n\n - neohybné:\n\n - príslovky (adverbiá)\n\n - predložky (prepozície)\n\n - spojky (konjunkcie)\n\n - častice (partikuly)\n\n - citoslovcia (interjekcie)\n\n\n\n podstatné mená (substantíva)\n\n - pomenúvajú osoby, zvieratá, veci, vlastnosti deje a stavy\n\n - vo vete najčastejšie plnia funkciu podmetu a predmetu\n\n - plnovýznamový, ohybný (skloňujeme ich) slovný druh, majú vetnočlenskú platnosť\n\n - konkrétne (žena, stôl, a pod.); abstraktné (nádej, žiaľ, a pod.)\n\n - všeobecné (dom, pero, a pod.); vlastné (ondrej, bytča, a pod.)\n\n - rody: mužský (určujeme aj životnosť); ženský, stredný\n\n - číslo: jednotné (singulár)- iba jednotné číslo majú hromadné podstatné mená (napr. ľudstvo, a pod.), látkové podstatné mená (napr. benzín, a pod.), abstraktné podstatné mená (napr. radosť, a pod.); množné (plurál)\n\n - pády: nominatív, genitív, datív, akuzatív, lokál, inštrumentál\n\n ","4":"slovotvorba sylabicko-tonický verš, lyrika hviezdoslava slovotvorba realizmus - lyrika p. o. hviezdoslav s. h. vajanský mňa kedys' zvádzal svet krvavé sonety letorosty úloha č. 1\n\ncharakterizujte slovotvorné postupy, ktoré poznáme v slovenskom jazyku a vysvetlite ich na konkrétnych slovách. v odvodených slovách nájdite slovotvorný základ - pripísať, redaktorka, pozemský, životopis, internetový, zoh, sitcom, km, darček, chlapisko, vlasatý, velikánsky, maličký, mňaukať, spinkať, atď.\n\n slovotvorné postupy:\n\n - odvodzovanie- zo základového slova pripojením slovotvorného formantu urobíme nové (odvodené slovo). napr.: prie-beh; mút-iť; po-zem-ský; a pod.\n\n - skladanie- spojením dvoch (alebo viacerých) slovotvorných základov utvoríme nové slovo. napr.: zem-e-trasenie; živ-o-topis; na-moj-pravdu; hor-o-lezec; zem-e-pis; inter-ø-net; nos-o-hltan; zver-o-lekár a pod.\n\n - kombinácia odvodzovania a skladania- napr.: život-o-pis-ný; nov-o-vek-ý; web-ø-stránk-ový; cest-o-pis-ný; ne-každ-o-den-ný; geo-ø-graf-ia; a pod.\n\n - skracovanie- tvorenie nových slov zo skrátených častí skracovaných slov, pričom sa lexikálny význam skrátených slov nemení. vznikajú takto:\n\n - administratívne skratky- resp., napr., str., a pod., a ďalšie. píše sa za nimi vždy bodka, vyslovujú sa neskrátene.\n\n - iniciálové skratky- tvoria za s iniciál (prvých písmen) viacslovného názvu. napr.: sr- slovenská republika, loh- letné olympijské hry, sľuk- slovenský ľuo´dový umelecký kolektív, a pod.\n\n - skratkové slová- vznikajú spojením začiatočných hlások, alebo slabík viacslovného názvu. napr.: sitcom- situačná komédia, tanap- tatranský národný park, a pod.\n\n - ustálené značky- napr.: km, dm, kg, l, a pod. nikdy za nimi nepíšeme bodku, vyslovujú sa neskrátene.\n\n pripísať- odvodzovanie (slovný základ- písať)\n\n redaktorka- odvodzovanie (slovotvorný základ- redaktor)\n\n pozemský- odvodzovanie (slovotvorný základ- zem)\n\n životopis- skladanie (slovotvorné základy- živ, topis)\n\n internetový- kombinácia odvodzovania a skladania (slovotvorné základy- inter, net)\n\n zoh- skracovanie- iniciálové skratky (slovotvorný základ- zimné olympijské hry)\n\n sitcom- skracovanie- skratkové slová (slo","5":"syntax - vetné sklady, modálnosť viet novela (vs. poviedka) syntax realizmus - novela martin kukučín b. s. timrava neprebudený ťapákovci úloha č. 1\n\nvysvetlite, čo je to syntax, aké vetné sklady rozlišujeme a charakterizujte vety podľa modálnosti. určite pestrosť viet z hľadiska modálnosti a priraďte vetám typ melódie: aké máme šance na úspech? teraz by sa to malo vyjasniť. koľko je hodín? príde mama? nech ste zdraví! bodaj by sme boli zdraví. nech žije kráľovná!!! sústreď sa!!!\n\n syntax- je jazykovedná disciplína, ktorá sa zaoberá spájaním slov do viet. spájaním viet do textov sa zaoberá nadvetná syntax, resp. textová syntax.\n\n vetné sklady:\n\n - prisudzovací sklad- je to spojenie podmetu a prísudku, tvorí gramatické jadro jednočlennej vety (napr. janka spí, spevák spieva, a pod.)\n\n - určovací sklad- tvoria ho dav členy, z ktorých jeden je nadradený a druhý je podradený. podradený člen bližšie určuje nadradený člen (napr. dobrý žiak, dievča z dediny, píše list, kreslí pekne, a pod.) rozlišujeme:\n\n - slovesný určovací sklad:\n\n - sloveso a predmet- napr. písať list, dať priateľovi (radu), a pod.\n\n - sloveso a príslovkové určenie- napr. sedel vzadu, prišiel včera, a pod.\n\n - menný určovací sklad:\n\n - podstatné meno a zhodný prívlastok- napr. usilovná študentka, červený tulipán, a pod.\n\n - podstatné meno a nezhodný prívlastok- napr. ruža s tŕňom, kamarát zo školy, a pod.\n\n - podstatné meno, sloveso a doplnok- napr. brat sa vrátil uplakaný. petra sa cítila podvedená., a pod.\n\n - priraďovací sklad- je spojenie dvoch, alebo viacerých členov, ktoré sú syntakticky rovnocenné a majú zároveň rovnaký vzťah k inému (nadradenému/ podradenému) vetnému členu (napr. chlapci a dievčatá, pakne a rýchlo, poslušne a úctivo, a pod.)\n\n vety podľa modálnosti:\n\n - oznamovacia- využíva oznamovací, alebo podmieňovací spôsob slovesa, melódia vety je klesavá\n\n - rozkazovacia- využíva rozkazovací spôsob slovesa, alebo neurčitok, melódia vety je klesavá\n\n - opytovacia- využíva oznamovací spôsob slovesa, opytovacie zámená, slovosled, častice, melódia vety je:\n\n - stúpavá- zisťovacia otázka (odpoveď- áno/ nie)\n\n - stúpavo-klesavá/ k","6":"zvuková rovina jazyka - prozodické vlastnosti epika - typy postáv fonetika, fonológia romantizmus a realizmus - epika andrej sládkovič p. o. hviezdoslav a. s. puškin detvan hájnikova žena eugen onegin úloha č. 1\n\nvysvetlite, ktoré jazykovedné disciplíny skúmajú zvukovú rovinu jazyka. charakterizujte prozodické vlastnosti reči (intonáciu) podľa časovej, silovej, tónovej modulácie.\n\n fonetika- základnou jednotkou je hláska (najmenšia zvuková jednotka; rečovými orgánmi utvorený a vyslovený zvuk ustáleného znenia). fonetika skúma:\n\n - ako sa hlásky tvoria (artikulujú)\n\n - ako ich počujeme\n\n - ako sa správajú v spojení s inými hláskami (napr. spoluhlásku „v“ inak vyslovujeme v slovách dievča, chlapov, včela, vrana, a pod.)\n\n - ďalej skúma, ako sa tvoria slabiky, rečové takty, vety, akú úlohu má dĺžka hlások, prízvuk, melódia vety, tempo reči, a pod.\n\n - skúma hovorenú reč, zisťuje rozdiely vo výslovnosti, pričom využíva aj rôzne špeciálne prístroje\n\n fonológia- základnou jednotkou je fonéma (zvuková jednotka, ktorá je schopná rozlišovať význam slov, alebo tvarov). fonológia skúma:\n\n - ktoré zvuky ľudskej reči sa využívajú na dorozumievanie v jazyku\n\n - pomocou ktorých zvukov sa v jazyku rozlišujú slová a tvary\n\n - aké vlastnosti zvukov sú dôležité pre rozpoznávanie zvukov, a pod.\n\n - zaoberá sa teda tvorením zvukov ľudskej reči a ich fyziologickými a akustickými vlastnosťami\n\n ortoepia- je jazykovedná disciplína, ktorá stanovuje pravidlá spisovnej výslovnosti. naprávaním organických chýb vo výslovnosti sa zaoberá logopédia.\n\n prozodické vlastnosti reči (intonácia):\n\n - časová modulácia:\n\n - kvantita (dĺžka)- čas potrebný na vyslovenie dlhej samohlásky, alebo dvojhlásky je dvakrát dlhší, ako čas potrebný na vyslovenie krátkej samohlásky. v spisovnej slovenčine je potrebné dodržiavať pomer času pri výslovnosti 2:1 (dlhé : krátke).\n\n - pauza (prestávka)- ide o využitie prestávok v súvislom prúde reči. rozlišujeme:\n\n - fyziologické pauzy- slúžia na nadýchnutie vzduchu do pľúc\n\n - významové (logické) pauzy- používajú sa na členenie reči na vetné úseky, členenie súvetí na vety, oddeľovanie slov, ktoré nepatria do vetnej štruktúry, a pod. značia sa graficky interpunkčnými zn","7":"opisný slohový postup, opis vs. charakteristika znaky románu sloh - opis realizmus - román honoré de balzac a. s. puškin otec goriot kapitánova dcéra úloha č. 1\n\ncharakterizujte opisný slohový postup a jeho žánre. vysvetlite rozdiel medzi opisom a charakteristikou.\n\n opisný slohový postup:\n\n - slúži na vymenovanie znakov a vlastností osoby, veci, alebo činnosti\n\n - slúži na priblíženie, znázornenie niečoho/niekoho niekomu inému\n\n - prevládajú v ňom menné slovné druhy (podstatné mená, prídavné mená, zámená)\n\n - znaky a vlastnosti osôb, zvierat a vecí sa vymenúvajú v istom poradí, ktoré závisí od podávateľa, pretože ten stanovuje hierarchiu, a teda v texte zohráva úlohu subjektívny postoj podávateľa\n\n - uplatnenie: v hovorom, náučnom a umeleckom štýle\n\n - žánre:\n\n - opis:\n\n - statický- opisuje objekt bez pohybu\n\n - dynamický- opisuje objekt v pohybe, alebo popisuje nejakú činnosť (opis pracovného postupu)\n\n - jednoduchý- opisuje vlastnosti objektu bez výraznejšieho štýlového zafarbenia\n\n - umelecký- využíva umelecké jazykové prostriedky- poetizmy, figúry, trópy, a pod.\n\n - odborný- pracuje s objektom metodickým, vedeckým spôsobom a používa odborný jazyk\n\n - charakteristika: opisuje vlastnosti osoby\n\n - priama- vlastnosti človeka priamo pomenuje\n\n - nepriama- zobrazuje vlastnosti cez ich prejavy, správanie človeka\n\n - vonkajšia- zachytáva výzor, vzhľad človeka\n\n - vnútorná- všíma si charakter, povahu osoby\n\n - objektívna- autor nezainteresovane vymenúva vlastnosti\n\n - subjektívna- autor výberom, aj svojim uhlom pohľadu hodnotí vlastnosti\n\n - karikatúra: je to zvláštny druh charakteristiky, v ktorej autor zámerne zveličuje niektorú vlastnosť, črtu\n\n rozdiely medzi opisom a charakteristikou:\n\n - opis: je založený na cieľavedomom pozorovaní a následnom vymenovaní základných znakov predmetu, osoby, alebo javu. je to slohový útvar, v ktorom opisujeme osoby, veci, rôzne činnosti, prírodné deje. úlohou opisu je vystihnúť pozorovaný objekt ako celok a zároveň jeho jednotlivé časti, ich vlastnosti a vzájomné vzťahy.\n\n - charakteristika: žáner, v ktorom sa vymenúvajú typické telesné znaky a vlastnosti človeka alebo nejakej os","8":"neohybné slovné druhy sonet, symbolizmus morfológia - neohybné symbolizmus, sonet f. petrarca w. shakespeare ivan krasko sonety pre lauru sonety zmráka sa topole úloha č. 1\n\ncharakterizujte neohybné slovné druhy a ich špecifické vlastnosti.\n\n - príslovky\n\n - plnovýznamový slovný druh, vetnočlenská platnosť\n\n - neohybný slovný druh\n\n - rozdelenie:\n\n a) miesta (napr. dole, hore, a pod.)- pýtame sa otázkou: kde?\n\n b) času (napr. včera, dnes, a pod.)- pýtame sa otázkou: kedy?\n\n c) spôsobu (napr. zle, dobre, a pod.)- pýtame sa otázkou: ako?\n\n d) príčiny (napr. preto, zato, a pod.)- pýtame sa otázkou: prečo?\n\n - stupňovanie:\n\n a) pravidelné- pri stupňovaní sa nemení základ slova (napr. ticho, oddane, a pod.)\n\n b) nepravidelné- pri stupňovaní sa mení základ slova (mnoho, málo, pekne, dobre, zle)\n\n- predložky\n\n- neplnovýznamový slovný druh, nemajú vetnočlenskú platnosť\n\n- neohybný slovný druh\n\n- rozdelenie:\n\n a) podľa pôvodu:\n\n 1. prvotné- sú vždy len predložkami- nemôžu byť iným slovným druhom (napr. pred, po, pri, s, z, a pod.)\n\n 2. druhotné- v prvom význame sú príslovky/častice, alebo pochádzajú z iného slovného druhu (napr. okolo, hore, uprostred, vďaka, a pod.)\n\n b) podľa zloženia:\n\n 1. jednoduché- jedna predložka (napr. s, k, do, a pod.)\n\n 2. zložené- z viacerých predložiek (napr. popod, popred, pomedzi, namiesto, a pod.)\n\n- u niektorých môže nastať vokalizácia\n\n- spojky\n\n- neplnovýznamový slovný druh, nemajú vetnočlenskú platnosť\n\n- neohybný slovný druh\n\n- rozdelenie:\n\n a) priraďovacie: spájajú rovnocenné slová, alebo vety\n\n1. zlučovacie- napr. a, i, aj, ani, či\n\n 2. stupňovacie- napr. ba, ba aj, nielen, ale aj\n\n 3. odporovacie- napr. ale, no, a\n\n 4. vylučovacie- napr. alebo; buď, buď-buď\n\n 5. dôvodové- napr. veď, však, aj tak, i to, predsa, či\n\n 6. dôsledkové- napr. preto, zato, tak, teda, tým, potom, a preto, a zato, a tak\n\n b) podraďovacie:\n\n 1. vlastné- napr. keď, aby, že, pretože\n\n 2. spájacie výrazy- vzťažné zámená, ktoré pripájajú vetu v podraďovacom súvetí (napr. kto, ktorý, aký, čí, ako, kde)\n\n - častice\n\n - neplnovýznamový slovný druh, nemajú vetnočlenskú platnosť\n\n - neohybný slovný druh\n\n - rozdelenie:\n\n a) uvádza","9":"formy národného jazyka, nárečia epos a časomiera národný jazyk, dialekty klasicizmus - epos homér ján hollý ján kollár odysea svätopluk slávy dcéra úloha č. 1\n\ncharakterizujte formy národného jazyka. vysvetlite pojmy: miestne nárečie, dobové nárečie a sociálne nárečie.\n\n národný jazyk- je súhrn výrazových a významových prostriedkov, ktoré používajú ako nástroj myslenia a dorozumievania príslušníci jedného národa, alebo etnickej skupiny, pričom ich spája historická, spoločenská, kultúrna a politická spolupatričnosť. formy:\n\n - spisovná forma (spisovný jazyk)- je záväznou formou spisovného jazyka, ktorá sa používa na oficiálnej úrovni. je to jazyk štátnych a iných dokumentov, jazyk používaný v školstve, v elektronických i tlačených médiách, v odbornej a zvyčajne aj umeleckej literatúre. plní celospoločenskú funkciu.\n\n - norma spisovného jazyka- je súbor záväzných pravidiel ustálených predpismi. stanovuje sa/kodifikuje sa v normatívnych príručkách. až po kodifikácii sa stáva všeobecne platnou a spoločensky záväznou pre používateľov jazyka.\n\n - dnešná podoba jazyka- vrátane jeho normy je výsledkom stáročného historického vývinu. jazykovedci jazyk analyzujú, skúmajú- nemôžu doňho vnášať nič, čo by v ňom nebolo (okrem pravopisu).\n\n - štandardná forma- je taká forma jazyka, ktorá sa používa v bežnej komunikácii. vyznačuje sa menej dôsledným dodržiavaním normy, ale toto nedodržiavanie normy“ nepociťujeme ako komunikačne rušivé. rešpektuje gramatiku, ale porušuje niektoré zásady spisovnej výslovnosti, vyskytujú sa v nej: nespisovné väzby, skratkové slová, ktoré vznikajú spontánne,...\n\n - subštandardná forma- je nespisovnou formou jazyka. charakterizujú ju nespisovné výrazy, nesprávna výslovnosť. jeho osobitnou zložkou sú nárečia.\n\n miestne nárečie- nespisovný útvar národného jazyka, ktorého používanie je vymedzené na určitú oblasť územia štátu. na slovensku vyše 30.\n\n dobové nárečie- je to nárečie používané v istom historickom období\n\n sociálne nárečie- je to nárečie používané rôznymi sociálnymi vrstvami- ako napr. slang, žargón, argot)\n\n vymenujte aspoň šesť miestnych (teritoriálnych) dialektov slovenčiny.\n\n oravský di","10":"publicistický štýl a jeho žánre vnútorný monológ sloh - publicistický štýl moderná próza - vnútorný monológ milo urban janko jesenský romain rolland jašek kutliak spod bučinky koniec lásky peter a lucia úloha č. 1\n\ncharakterizujte publicistický štýl a jeho žánre. vysvetlite, čo sa nachádza na prvej strane novín alebo časopisov.\n\n publicistický štýl:\n\n- je objektívno- subjektívny jazykový štýl, s ktorým sa denne stretávame v ústnej (rozhlasová a televízna publicistika) a písanej (noviny, časopisy, týždenníky, a pod.) podobe\n\n- je to hybridný štýl- využíva prostriedky viacerých štýlov (napr. umelecký, hovorový- v závislosti od použitého útvaru)\n\n- znaky:\n\n- informatívnosť- dominuje spravodajská funkcia, cieľ: sprostredkovať verejnosti informácie.\n\n- aktualizovanosť- časová a priestorová určenosť udalosti (kto? čo? kedy? kde? ako? prečo?).\n\n- verejnosť- útvary sú adresované širokej verejnosti, preto majú byť čo najjednoduchšie; náročnosť obsahu, i formy sa prispôsobuje priemernej vzdelanostnej úrovni obyvateľstva.\n\n- monologickosť- pri tomto type komunikácie chýba autorovi spätná väzba; nemá bezprostrednú reakciu adresáta, musí predpokladať, ktoré údaje sú dôležité.\n\n- variabilnosť- bohatstvo tém, kompozičná pestrosť, grafická úprava, rozmanitosť jazykových prostriedkov.\n\n- písomnosť- vzťahuje sa iba na elektronické a tlačené média; osobitné členenie textu, sústredenie sa na fakty.\n\n- žánre:\n\n- spravodajské- ich cieľom je objektívne, vecne, pohotovo a zrozumiteľne informovať. patria tu: správa, interview, riport, komuniké, rezolúcia, referát, inzerát, reklama, plagát.\n\n- analytické- patria tu: úvodník, komentár, recenzia, posudok, kritika, diskusia, glosa, pamflet, karikatúra, polemika.\n\n- beletristické- patria tu: reportáž, fejtón, črta, stĺpček, besednica\n\n prvá strana novín/časopisov:\n\n - názov novín/časopisu\n\n - dátum vydania\n\n - ročník\n\n - cena\n\n - časti niektorých článkov, ktorým sa venujú vnútri\n\n - reklama\n\npoukážte na význam médií v súčasnosti a v minulosti.\n\n- v minulosti- mala prístup k médiám len úzka vrstva obyvateľstva (bola iba tlač)\n\n- v súčasnosti- sa význam médií zvyšuje a vznikajú aj nové formy médií (od konca 20. storočia- súvisí to s rozvojom počí","11":"verbálna a neverbálna komunikácia komédia (veselohra) sloh - komunikácia klasicizmus - komédia ján palárik molière zmierenie alebo dobrodružstvo pri obžinkoch lakomec úloha č. 1\n\nporovnajte verbálnu a neverbálnu komunikáciu. vysvetlite druhy neverbálnej komunikácie. aký význam majú vo všeobecnosti gestá spolužiaka, učiteľa, policajta.\n\n verbálna komunikácia:\n\n - predstavujú ju jazykové prostriedky reči [jazyk môže mať hovorenú, alebo písanú (grafickú) podobu], ktoré sú najdôležitejším prostriedkom odovzdávania informácii\n\n - naša reč musí byť: konkrétna, jasná, zrozumiteľná\n\n - rozsah slovnej zásoby závisí od veku, vzdelania, temperamentu, pracovného zaradenia, pohlavia komunikantov, a pod.\n\n - výber slov a schopnosť komunikovať súvisí s témou rozhovoru, situáciou a tiež vlastnosťami účastníkov rozhovoru\n\n - najčastejšie používané formy ústnej jazykovej komunikácie:\n\n - monológ- je samostatný prehovor osoby (opak dialógu). v umeleckej literatúre ním postava vysvetľuje niektoré súvislosti, resp. reaguje na konkrétnu situáciu v „deji.“\n\n - vnútorný monológ- je špecifická výpoveď osoby, ktorú táto adresuje sama sebe. zachytáva myšlienky človeka vo chvíli ich zrodu, t. j. v ich prvotnej, ešte jazykovo nespracovanej podobe.\n\n - dialóg- je rozhovor medzi dvoma, alebo viacerými osobami. musí mať aspoň 2 repliky.\n\n - replika- je základná jednotka dialógu. je to relatívne uzavretá jednotka, ktorá reaguje na predchádzajúci prehovor, resp. navodzuje ďalšie pokračovanie rozhovoru. ide o prehovor jednej osoby, alebo literárnej postavy.\n\n neverbálna komunikácia:\n\n - predstavujú ju mimojazykové prostriedky [ide o všetko, čo reč (slová) sprevádza]\n\n - podporuje verbálnu komunikáciu a je dôležitá najmä pri prejavovaní emócií, ovplyvňovaní postojov a vytváraní dojmov\n\n - neverbálne prejavy sú spontánne, ťažko ovládateľné, väčšinou nezámerné sú dôveryhodnejšie\n\n - do neverbálnej komunikácie zaraďujeme:\n\n - zrakový kontakt- vzájomné pohľady, pohľady bokom, druh pohľadu, uhýbanie pohľadom a pod.\n\n - mimika- hlavne pohyby očí, úst, tváre, a pod.\n\n - kinetika- celkové pohyby tela, chôdza, postoj, a pod.\n\n - gestika- gestá, hlavne pohyby rúk, posunky, a","12":"vývin slovenského spisovného jazyka (bernolák, štúr) spoločenský, sociálny a psychologický román vývin jazyka typy románu anton bernolák ľudovít štúr grammatica slavica nauka reči slovenskej úloha č. 1\n\nvysvetlite vývin slovenského spisovného jazyka od najstarších čias po súčasnosť a doložte konkrétnymi literárno-jazykovednými dielami.\n\n - praslovančina- spoločný jazyk predkov všetkých slovanov (do 8. storočia), nemáme žiadne písomné pamiatky\n\n - stará slovenčina- základ budúcich slovenských nárečí, spisovného jazyka (9. storočie)\n\n - staroslovienčina- 863- konštantín a metod priniesli ma maše územie prvý slovanský spisový jazyk (staroslovienčinu- je to pôvodom južnoslovanský jazyk, ktorého základom bolo nárečie macedónskych slovanov z okolia solúna); písmo: hlaholika (za základ si zobrali malé písmená gréckej abecedy), neskôr cyrilika (za základ si zobrali veľké písmená gréckej abecedy), diela: preklady evanjelií, proglas,...\n\n - latinčina- začala sa používať po rozpade veľkej moravy v 10. storočí (11.-18. storočie)\n\n - čeština- používala sa predovšetkým v úradnom styku, aj keď úradným jazykom bola latinčina. na slovensku sa písalo latinsky a česky, no pri tom sa hovorilo slovenským jazykom. (15.-19. storočie)\n\n - kultúrna slovenčina- vznikla kultúrna západná slovenčina a kultúrna stredná slovenčina (z nej vychádza ľ. štúr pri svojej kodifikácii spisovného jazyka) (16.-17. storočie)\n\n spisovná slovenčina- do histórie sa zapísali najmä 3 nasledujúce pokusy o kodifikáciu:\n\n - bernolákovské obdobie:\n\n jozef ignác bajza- v románe „rené mláďenca príhodi a skúsenosťi“ uplatňuje tzv. slowackí jazyk (jeho pravopisu a gramatike však chýbala pevnejšia a odôvodnenejšia kodifikácia- nevydal žiadnu gramatickú príručku)\n\n anton bernolák\n\n - vo svojej koncepcii vychádzal pri kodifikácii spisovného jazyka z jazykovej praxe vzdelancov\n\n - za východisko si vzal kultúrnu západoslovenčinu, a to najmä v podobe, v akej sa formulovala v trnavskom univerzitnom centre\n\n - svoju predstavu spisovného jazyka vyložil vo svojich kodifikačným dielach: grammatica slavica (1790); slowár slowenskí, česko-laťinsko-ňemecko-uherskí (1825-1827)\n\n - niektoré zásady bernolákovej kodifikácie:","13":"rečnícky štýl analýza románov (téma, kompozícia, štylistika) sloh - rečnícky štýl medzivojnová próza milo urban e. m. remarque živý bič na západe nič nového úloha č. 1\n\ncharakterizujte znaky, žánre a výrazové prostriedky rečníckeho štýlu.\n\n rečnícky štýl:\n\n - patrí medzi najstaršie funkčné jazykové štýly; je štýlom ústnej komunikácie verejného styku\n\n - funkcie: presviedčať, vysvetľovať, informovať, komentovať, agitovať a zapôsobiť na city poslucháča\n\n - rečnícke prejavy majú najčastejšie ústnu podobu, ale väčšina z nich je vopred pripravená v písomnej forme (veľa z nich vznikne aj neplánovane a neoficiálne)\n\n - pri tvorbe rečníckych prejavov sa uplatňujú subjektívne aj objektívne štýlotvorné činitele (subjektívno- objektívny charakter)\n\n - znaky:\n\n - ústnosť- okrem jazykových prostriedkov rečnícky štýl využíva aj mimojazykové prostriedky (napr. mimika, gestikulácia a zrakový kontakt, a pod.)\n\n - verejnosť- útvary rečníckeho štýlu sú určené širokej verejnosti, preto musíme dbať na výber jazykových prostriedkov (napr. nesmie hromadiť odborné a cudzie slová), nesmieme používať vulgarizmy, číselné údaje zaokrúhľujeme, nepoužívame dlhé vetné konštrukcie\n\n - sugestívnosť- rečník sa snaží zapôsobiť na city poslucháčov, využívame prostriedky umeleckého štýlu (opakovanie slov, viackrát oslovíme poslucháčov, zdôrazňujeme niektoré slová, používame pauzu; zoslabíme, alebo zosilníme hlas, a pod.); v závere- vyjadrujeme svoje želania, výzvy\n\n - adresnosť- rečnícke útvary majú kolektívneho príjemcu (niektoré môžu byť venované jednotlivcom- napr. jubileá, ale počúva ich kolektív)\n\n - názornosť- využíva sa najmä v náučných prednáškach (obrazový materiál- napr. mapy, grafy, schémy, audiovizuálne pomôcky, a pod.)\n\n - žánre:\n\n - agitačné (politická reč, súdna reč, kázeň, agitačný prejav, obžaloba, a pod.)- jazyk približne rovnaký, ako jazyk publicistiky, ale doplnený mimojazykovými prostriedkami (gestikulácia, mimika, a pod.); uplatňuje sa bežná slovná zásoba, pretože adresát je široký\n\n - náučné (prednáška, referát, koreferát, diskusia, polemika, kázeň, a pod.)- sú vecné a konkrétne; v úvode je treba vysvetliť cieľ, funkciu a zámer preja","14":"slohové postupy a útvary nespoľahlivý rozprávač sloh - postupy realizmus - rozprávač j. g. tajovský b. s. timrava apoliena maco mlieč ťapákovci úloha č. 1\n\ncharakterizujte slohové postupy a priraďte im adekvátne slohové útvary /žánre/. prečo sa môže vyskytnúť v rámci jedného textu viac slohových útvarov? nájdite ich v ukážkach.\n\n slohové postupy:\n\n - je to proces skladania textu do celku; je to postup, ktorý využívame pri výstavbe textu\n\n - voľba slohového postupu vyplýva najmä z cieľa jazykového prejavu\n\n - druhy slohových postupov:\n\n - informačný slohový postup- slúži na sprostredkovanie informácií, faktov, údajov, t. j. odpovedá sa ním na otázky typu: kto? čo? kedy? kde? a pod. uplatňuje sa najmä v administratívnom, publicistickom a hovorovom štýle. (oznámenie, správa, životopis, splnomocnenie, a pod.)\n\n - rozprávací slohový postup- slúži na tvorbu alebo reprodukciu skutočného, alebo fiktívneho príbehu; prevládajú v ňom činnostné slovesá, je založený na časovej postupnosti. uplatňuje sa najmä v textoch hovorového a umeleckého štýlu. (rozprávanie, umelecké rozprávanie, črta, poviedka, ucelený dialóg, a pod.)\n\n - opisný slohový postup- slúži na vymenovanie znakov a vlastností osoby, veci, alebo činnosti; na priblíženie/znázornenie niečoho alebo niekoho niekomu inému. znaky a vlastnosti osôb, vecí, zvierat a činností sa vymenúvajú v istom poradí, ktoré závisí od podávateľa, pretože ten im stanovuje dôležitosť. uplatňuje sa hlavne v hovorovom, náučnom a umeleckom štýle. (opis osoby, opis veci, charakteristika, posudok, a pod.)\n\n - výkladový slohový postup- slúži na objektívne vysvetlenie toho, ako niečo vzniklo, na čo slúži, ako ovplyvňuje veci okolo a pod. dôraz nie je kladený na vymenovaní faktov, autor sleduje najmä logicko- príčinné súvislosti medzi nimi. uplatňuje sa hlavne v náučnom, publicistickom rečníckom štýle. (dizertácia, referát, výklad, prednáška, a pod.)\n\n - úvahový slohový postup- slúži na zaujatie a vyjadrenie vlastného stanoviska k najrozličnejším otázkam bytia, t. j. autor vyjadruje svoje stanovisko k problému a subjektívne ho hodnotí. uplatňuje sa hlavne v náučnom, publicistickom, umeleck","15":"diakritické a interpunkčné znamienka náboženská a reflexívna lyrika, voľný verš pravopis katolícka moderna, surrealizmus rudolf dilong g. apollinaire l. novomeský j. smrek r. fábry mesto s ružou nedeľa iba oči úloha č. 1\n\nvysvetlite využitie diakritických a interpunkčných znamienok v slovenčine. využite poznatky na príkladoch v uvedených ukážkach.\n\n diakritické znamienka:\n\n - patria tu: dĺžeň, mäkčeň, dve bodky a vokáň\n\n - sú to rozlišovacie znamienka, ktoré sa píšu v okolí písmena, a ktoré menia jeho výslovnosť, alebo spĺňajú inú rozlišovaciu funkciu\n\n interpunkčné znamienka:\n\n - patria tu: bodka, čiarka, apostrof, spojovník, dvojbodka, otáznik, výkričník, úvodzovky, pomlčka, lomka, tri bodky, zátvorky\n\n - sú to grafické znaky, ktoré nemajú fonetickú, ani lexikálnu hodnotu; používajú sa na členenie textu (pri čítaní nahlas sa prejavujú zmenou intonácie a prestávkami v texte)\n\n príklady z ukážok:\n\n - diakritické znamienka: nemám, stepilá, môj, bôčky, pôžitok, smrť, slovíčko, väčšie\n\n- interpunkčné znamienka: dám ho? – to je boj!- ja rád mám všetky, bože môj!; hlavu zmútila: čižmičky; na nás do ista vycerí zuby...\n\ndoplňte do viet čiarky a odôvodnite svoje rozhodnutie:\n\nach to bola drina! na to pravda nemyslel. bol to človek nepríjemný zlostný a nemilosrdný. bratislava hlavné mesto slovenska leží pri dunaji. žiť to neznamená bojovať. zbadala ho lež nedala to najavo. aj dom má od železnice aj uhlie mu dáva železnica. marián grupač je súčasný slovenský spisovateľ. popraviť nie oslobodiť.\n\n ach, to bola drina! na to, pravda nemyslel. bol to človek nepríjemný, zlostný a nemilosrdný. bratislava, hlavné mesto slovenska, leží pri dunaji. žiť, to neznamená bojovať. zbadala ho, lež nedala to najavo. aj dom má od železnice, aj uhlie mu dáva železnica. marián grupač, je súčasný slovenský spisovateľ. popraviť, nie oslobodiť.\n\núloha č. 2\n\ncharakterizujte podstatu náboženskej a reflexívnej lyriky. vysvetlite pojmy voľný verš, čistá lyrika, automatický text. myšlienkové a emocionálne posolstvo jednej ukážky analyzujte po veršoch, po strofách.\n\n náboženská lyrika:\n\n - používa sa na liturgické účely, pridržiava sa náboženskej tematiky\n\n - prežívanie osobných a spoločenských pomerov, má poc","16":"syntax - syntagma, jednočl./dvojčl. vety, vetné sklady lyrizovaná próza, naturizmus, reťazový kompozičný princíp syntax naturizmus, lyrizovaná próza dobroslav chrobák margita figuli františek švantner drak sa vracia tri gaštanové kone malka úloha č. 1\n\nvysvetlite, čo je to syntax, syntagma a veta. nájdite v literárnych  ukážkach príklady na vetné sklady, jednočlenné a dvojčlenné vety a vetný základ.\n\n syntax- je jazykovedná disciplína, ktorá sa zaoberá skladaním slov do viet (spájaním viet do textov sa zaoberá nadvetná syntax, resp. textová syntax)\n\n syntagma:\n\n - sklad, je vo vete významovou a gramatickou jednotkou (preto je tvorený len plnovýznamovými slovami)\n\n - je to najjednoduchšia syntaktická konštrukcia\n\n - je to spojenie dvoch, alebo viacerých plnovýznamových slov, ktoré sú obsahovo a gramaticky zviazané (napr. ružová blúzka, trhať kvety, písať diktát, a pod.)\n\n - podľa významovej stránky skladu rozlišujeme:\n\n - prisudzovací sklad- napr. brat vymaľoval, a pod.\n\n - určovací sklad- napr. môj brat, vymaľoval včera, vymaľoval izbu, našu izbu, a pod.\n\n - priraďovací sklad- brat a kamarát, izbu a kuchyňu, a pod.\n\n veta:\n\n - je to základná syntaktická jednotka s uceleným významom, gramaticky usporiadaná a intonačne uzavretá\n\n - presnejšie je to komplexná gramaticko- sémantická systémová jednotka, ktorá má povahu základnej komunikatívnej jednotky.\n\n - skladá sa z vetných členov, ktoré v nej vytvárajú sklady\n\n vetné sklady v ukážkach:\n\n - prisudzovací sklad- posiela lístoček, beriem papierik, šimon kráča, magdaléna zaspala, ručička píše, a pod.\n\n - určovací sklad- drobná ručička, beriem papierik, vystieram prstami, trpkým prízvukom, a pod.\n\n - priraďovací sklad- pevne a smelo, čistá a nepoškvrnená, a pod.\n\n vety podľa členitosti v ukážkach:\n\n - jednočlenné- šajban.\n\n - dvojčlenné- drak je celý čierny.; prišiel som po teba do tohto kraja, lebo ty si chcela, aby som prišiel.; čože mi tá drobná ručička píše, čo tá pehavá hlávočka navymýšľala, čože to môže byť.\n\n\n\nurčite vety podľa členitosti: pomohol mi včera. blýska sa. deti sa vonku hrali. nekonečný príbeh. snažte sa! čítam knihu. peter od susedov zbieral včera v hore lesné plody.\n\n pomohol mi včera.- dvojčlenná, neúplná (z
