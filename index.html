tvorila aha horquilla je to neúslužná starena ustavične jej do očí padá príčesok ale ani ten jej nepomáha taká je škaredá akoby už mala 80 alebo 100 rokov tvár má celkom zvráskavenú napriek svojej zbožnosti je panovačná lebo doteraz nestrávila že sa skončili časy atlantickej flotily že polovica lodí na svete pláva s britskou zástavou že nanič sú jej carabineros keď im štyria opití Angličania spod nosa uchmatli tú skalu...\n\n**Franz Kafka: Premena**\n\nKeď sa Gregor Samsa jedného rána prebudil z nepokojných snov, zistil, že sa v posteli premenil na akýsi príšerný hmyz. Ležal na chrbte tvrdom ako pancier a len čo nadvihol hlavu, zbadal si vyklenuté hnedé brucho rozčlenené oblúkovitými výstužami, na vrchole ktorého sa ledva udržala prikrývka, pripravená celkom sa zošuchnúť. Početné, v pomere k ostatnému objemu žalostne tenké nôžky sa mu bezmocne hmýrili pred očami.\n\n--------------------------\n\n,,Musíme sa toho zbaviť,“ povedala sestra teraz už priamo otcovi, lebo matka pre kašeľ nepočula, ,,ešte vás dvoch umorí. Keď raz musí človek tak ťažko pracovať ako my všetci, nemôžeme mať predsa doma večné trápenie.“"},"19":{"tema_jazyk":"Nepravidelnosti vetnej stavby (výpustka, vsuvka, prístavok...)","tema_lit":"Absurdná dráma","autori":["M. Lasica + J. Satinský","Samuel Beckett","Václav Havel"],"diela":["Nečakanie na Godota","Čakanie na Godota","Zahradní slavnost"],"okruh_jazyk":"Syntax - osobitosti","okruh_lit":"Absurdná dráma","full":"Úloha č. 1\n\n**Vysvetlite nepravidelnosti v stavbe vety a určite: vytýčený vetný člen, pripojený vetný člen, osamostatnený vetný člen, výpustku, neukončenú výpoveď, vsuvku, prístavok. **Mladosť – pochabosť. Jednotka, tá ešte neznamená úspech v živote. Vrátili sme sa z výletu, včera. Hora spievala chorál. Ticho a nábožne. Prišlo mi ľúto, že som sa s **Dorou**... Pes, verný priateľ človeka, čakal pred domom. Remeslo má zlaté dno, ako vravievala stará mama.*\n\n**Nepravidelnosti v stavbe vety:**\n\n- nachádzajú sa v spontánnych ústnych jazykových prejavoch, ktoré bezprostredne plynú v čase a priestore a hovoriaci nemá čas na dôkladnejšie spracovanie myšlienkového obsahu, ani na dokonalú syntaktickú stavbu výpovede\n\n- majú modifikovanú pravidelnú vetnú štruktúru\n\n- k modifikácii dochádza z objektívnych i subjektívnych príčin a to v ústnych i písaných textoch\n\n- apoziopéza (nedokončená, prerušená výpoveď)- je to násilne prerušená, alebo zo subjektívnych príčin formálne a významovo neuzavretá, neukončená výpoveď; nevyjadrená časť výpovede je jadro výpovede (napr. Chcel som prísť, ale...)\n\n- proziopéza- vynecháva sa v nej začiatok výpovede, spravidla tak, že sa nevyslovia začiatočné slabiky prvého slova, a to pod tlakom času, z nedbanlivosti, prípadne z etnických príčin (napr. brý deň!; ...si myslím, že...)\n\n- prerývaná výpoveď- graficky rozčlenená, ale na rozdiel od apozipézy formálne a významovo uzavretá syntaktická jednotka; miesta prerušenia sa graficky signalizujú troma bodkami a intonačne neskončenou prestávkou, pričom sa môže aktualizovať aj melódia, prípadne dôraz (napr. ...a ja som si myslela, že... a on tiež... a teraz som takto ostala.)\n\n- vytýčený (vysunutý) vetný člen- je to výraz zložený z menného základu a zámena, ktoré ako synonymum zdôrazňuje predchádzajúce slovo (napr. **Jahody, ti**e si dám vždy rada.)\n\n- osamostatnený vetný člen- vzniká vyňatím z vety, a to jeho postavením, ako samostatného dodatku k vete (napr. Prekvapil si ma. **Nemilo**); je to výraz, ktorý je formálne povýšený na samostatnú výpoveď- tým že podávateľ časť výpovede vyčlení a povýši na samostatnú výpoveď, hierarchizuje obsah a vyjadruje svoj hodnotiaci postoj (napr. Mám rada zákusok. **Kokosový**; O mesiac som dostal list. **Od Zuzy**.**)\n\n- pripojený vetný člen- vzniká tak, že sa k ukončenej vete pridá ďalší výraz; aj bez tohto dodaného výrazu by však predchádzajúca veta bola gramaticky úplná (napr. Chodím rada do kina, **ale len na komédie**.)- je umiestnený na konci vety\n\n- elipsa (výpustka)- je neúplná výpoveď, ktorá vzniká vypustením niektorej časti výpovede- zvyčajne tej časti, ktorá je známa z kontextu (napr. Mladí chcú cestovať. **Ja do Austrálie**.) alebo zo situácie (napr. **Mne kofolu.**- čašníkovi v reštaurácii); hoci si vynechanie tejto časti uvedomujeme, výpoveď pociťujeme, ako obsahovo úplnú\n\n- parentéza (vsuvka)- vyjadruje autorov postoj k obsahu výpovede, alebo ho spresňuje; slúži na hierarchizáciu obsahu v rámci jednej vety- hierarchicky nadradený obsah je spravidla vyjadrený v základnej výpovedi (napr. Často sa po práci – **zaplavený nevýslovnou nehou** – usmial pri pohľade na jej fotografiu.; Ty si, **ako vidím**, rozhodnutá.)\n\n*Mladosť – pochabosť.-** *výpustka\n\n*Jednotka, tá ešte neznamená úspech v živote.-** *vytýčený vetný člen\n\n*Vrátili sme sa z výletu, včera.-** *pripojený vetný člen\n\n*Hora spievala chorál. Ticho a nábožne.-** *osamostatnený vetný člen\n\n*Prišlo mi ľúto, že som sa s **Dorou**...-** *apoziopéza (nedokončená, prerušená výpoveď)\n\n*Pes, verný priateľ človeka, čakal pred domom.- *prístavok\n\n*Remeslo má zlaté dno, ako vravievala stará mama.- *parentéza (vsuvka)\n\n**Nájdite v texte aspoň päť podobných modifikácii vetnej stavby a **polovetných** konštrukcií. **\n\n...že ich čakáme my...- prozipéza\n\nNo predsa ten... na koho čakáte?- prerývaná výpoveď\n\nAle tak – na kus řeči – poplkat si...- vsuvka (parentéza)\n\nKlidne vyzvídej...- apoziopéza (nedokončená, prerušená výpoveď)\n\nPrezraďte mi, prosím vás, čo tu vlastne robíte?- vsuvka (parentéza)\n\nÚloha č. 2\n\n**Vysvetlite **podstatu absurdnej drámy**. Porovnajte klasickú a absurdnú drámu. Vyjadrite osobný vzťah k absurdnému spracovaniu drámy. **\n\n- po druhej svetovej vojne sa vo francúzskej literatúre objavil nový typ divadelnej hry, ktorý čiastočne nadväzoval na prózu prúdu vedomia- začal sa označovať ako **absurdná (nezmyselná dráma)**\n\n- pôvodní francúzski autori (Samuel Beckett, Eugéne Ionessco) podobne ako avantgardní spisovatelia experimentovali a rezignovali na racionálne postupy a logiku:\n\n- rozbili a v mnohých prípadoch celkom zlikvidovali príbeh\n\n- využívajú svojrázne dialógy\n\n- hry nemajú dej, ani kompozíciu, nijakú skutočnú zápletku, ani žiadne riešenie, pretože nebolo čo vyriešiť\n\n- dôležitú úlohu zohráva dialóg, ktorého úlohou je komentovať situáciu, vyznieva komicky, až tragicky\n\n- autori z neslobodných európskych štátov priniesli celkom nový rozmer absurdnej drámy- absurdné divadlo ponúkalo chápajúcim divákom osobitný druh komunikácie, ktorý prinášal skryté významy, ale najmä úsmev v kontraste s ideologickou pretvárkou\n\n- u nás: Milan Lasica a Július Satinský (Nečakanie na Godota, Náš priateľ René), Stanislav Štepka (Jááánošík, Človečina), Václav Havel (Záhradní slávnost, Vernisáž)\n\n- humor absurdnej drámy sa skrýva v nonsensových dialógoch, nedorozumeniach v replikách, ktoré na seba logicky nenadväzujú; využívajú sa slovné hračky; autori používajú iróniu, narážky na dobu\n\n**Klasická **vs**. Absurdná dráma**\n\n- **klasická dráma- **základný druh umeleckej literatúry, dialógy a monológy + neprítomnosť rozprávača (scénické poznámky); určená na scénickú realizáciu; **základné žánre:** tragédia, komédia, činohra\n\n- **kompozícia:**\n\n- **klasická dráma- **vonkajšia- dejstvá, výstupy; vnútorná- expozícia, kolízia, kríza, peripetia, katastrofa\n\n- **absurdná dráma- **chýba obvykle akákoľvek kompozícia\n\n- **dialógy:**\n\n- **klasická dráma- **prostredníctvom neho sa zobrazujú charaktery postáv, musí byť dynamický\n\n- **absurdná dráma- **slúži na vytvorenie humornosti a absurdných situácií- často bez vnútornej nadväznosti\n\n- **kulisy:**\n\n- **klasická dráma- **zložité hodnoverné kulisy a kostýmy\n\n- **absurdná dráma- **jednoduché/žiadne kulisy\n\n- **dejovosť: **je znakom klasickej drámy, v absurdnej dráme môže úplne chýbať\n\n**Osobný vzťah k absurdnej dráme:**\n\nAbsurdnú drámu považujem za zaujímavú formu literárneho diela, lebo je vtipná, napriek tomu, že rieši situácie reálneho života. Mám rada/rád intelektuálny humor plný narážok na kultúrny, spoločenský a politický život. Okrem iného preferujem divadlo pred knihami, pretože je to pohodlnejšie, a je to zaujímavá spoločenská udalosť. Mám rada/rád humor Lasicu a Satinského, a páči sa mi, že komunikovali s publikom.","number":19,"assignment":"**Zadanie č. 19**\n\nÚloha č. 1\n\n**Vysvetlite nepravidelnosti v stavbe vety a určite: vytýčený vetný člen, pripojený vetný člen, osamostatnený vetný člen, výpustku, neukončenú výpoveď, vsuvku, prístavok. **Mladosť – pochabosť. Jednotka, tá ešte neznamená úspech v živote. Vrátili sme sa z výletu, včera. Hora spievala chorál. Ticho a nábožne. Prišlo mi ľúto, že som sa s **Dorou**... Pes, verný priateľ človeka, čakal pred domom. Remeslo má zlaté dno, ako vravievala stará mama.*\n\n**Nájdite v texte aspoň päť podobných modifikácii vetnej stavby a **polovetných** konštrukcií. **\n\nÚloha č. 2\n\n**Vysvetlite **podstatu absurdnej drámy**. Porovnajte klasickú a absurdnú drámu. Vyjadrite osobný vzťah k absurdnému spracovaniu drámy. **\n\nUkážky:* M. Lasica, J. **Satinský**: Nečakanie na **Godota*\n\n* S. **Beckett** - Čakanie na **Godota*\n\n* V. **Havel** – **Zahradní slavnost*\n\n**Samuel **Beckett**: Čakanie na **Godota** (úryvok)**\n\n- DEJSTVO\n\nESTRAGON: Ty! (*Chytí zvyšok mrkvy za konček vňate**, **zdvihne** ho **a otočí pred očami*.)\n\nTo je zaujímavé. Čím človek viac je, tým je to horšie.\n\nVLADIMÍR: U mňa je to naopak.\n\nE: To je?\n\nV: Postupne si zvykám na chuť.\n\nE: (po dlhom rozmýšľaní): A to je naopak?\n\nV: Otázka temperamentu.\n\nE: Charakteru.\n\nV: Za to človek nemôže.\n\nE: Človek sa zbytočne pechorí.\n\nV: Zostáva tým, čím je.\n\nE: Nadarmo sa trepe.\n\nV: Podstata sa nemení.\n\n------------\n\nE: Tak ideme?\n\nV: Poďme.\n\n(*nepohnú sa)*\n\n- DEJSTVO\n\nV: Keby si to skúsil?\n\nE: Už som všetko skúsil.\n\nV: Myslím topánky.\n\nE: Žeby?\n\nV: Aspoň prejde čas. (*pauza*) Uisťujem ťa, bude rozptýlenie.\n\nE: Uvoľnenie.\n\nV: Zábava.\n\nE: Uvoľnenie.\n\n**Milan Lasica, Július Satinský: Nečakanie na Godota (úryvok)**\n\n1: Prezraďte mi, prosím vás, čo tu vlastne robíte? Nečakáte náhodou na niekoho?\n\n2: Ja? Na koho by som čakal? Ja som tu len zostal, lebo keby som odišiel a niekto by sem náhodou prišiel, tak by som tu nebol. A to nemôžem riskovať.\n\n--------\n\n2: Vy na neho čakáte? Zostali ste tu kvôli nemu?\n\n1: Ja? Ja som tu nezostal. Ja som sa len vrátil, aby som sa presvedčil, či tu náhodou nie je. Aj vy ste sa vrátili?\n\n2: Nie. Ja som sa nevrátil, pretože som nikam neodišiel. A nikam som neodišiel preto, aby som sa náhodou nevrátil neskoro. A vy ste sa prečo vrátili? Budete čakať?\n\n1: Kdeže! Mám toľko práce, že som rád, keď sa konečne dostanem do postele. Keby som čakal – keby som si našiel čas na čakanie – použil by som jednu z premnohých čakární. Nebudem predsa čakať hocikde, keď máme čakárne.\n\n2: V tom s vami zásadne súhlasím. Spomeňte si na slová Godota: ,,Čakáreň je prostriedok, nástroj, pomocou ktorého sa čakajúci navzájom čakajú.“ A ja sa bojím, že dnešná mládež už ani nevie čakať!\n\n1: Oni nečakajú! Len sa hrnú dopredu!\n\n2: Asi nevedia, čo ich čaká!\n\n1: Keby sa nehrnuli, keby počkali ako my, dozvedeli by sa, čo ich čaká...\n\n2: ...že ich čakáme my...\n\n1: ...aby sme spoločne vtrhli do čakární...\n\n2: ...v ktorých sme odvážne čakali a nedovolili naše čakanie nikomu narušiť...\n\n1: ...a tak sme čakali v čakárňach a nie hocikde, ako čakáme teraz. Veď každý vidí, že čakáme len na to, aby sme mohli čakať v čakárňach...\n\n2: ...a ešte sa načakáme, kým čakajúci vymenia čakárne za čakany a postavia...\n\n1: ...nové krajšie čakárne, v ktorých budeme môcť čakať ešte lepšie a radostnejšie.\n\n2: A nebudeme musieť čakať po všelijakých jedálňach, knižniciach, alebo prepytujem v spálni! Sme proti pasivite! Sme za aktívne čakanie! A to je možné len a len v čakárňach!\n\n1: *po chvíli*. Myslíte si teda, že sem nepríde?\n\n2: Kto?\n\n1: No predsa ten... na koho čakáte?\n\n2: Ja? Ja nečakám. Keby som na niekoho čakal, mohlo by sa stať, že by som sa nedočkal. A to nemôžem riskovať.\n\n*Obaja sa s pochopením usmejú, sadnú si a mlčia.*\n\n**Václav **Havel** : Záhradní **slavnost** (úryvok)**\n\nPlzák:Hele, kocoure, co abychom si spolu tak nějak od plic popovídali?\n\nHugo**:** Jak člověk s člověkem, Ferdo?\n\nPlzák: Přesne tak! Byl bys pro?\n\nHugo: No jasně! Vždyť si tady celej večer říkam, jak by bylo fajn, kdybych si s tebou mohl tak nějak na rovinu pošprechtit! Tak co váš starej? Zlobí? Zlobí?\n\nPlzák: Šerif? Bez chýb není, ale aspoň dře, zastihneš ho tam ješte teď!\n\nHugo: V noci?\n\nPlzák: A co Ty vlastne likviduješ?\n\nHugo: Takže bych se za ním hned mohl vypravit?\n\nPlzák: A copak, copak?\n\nHugo: Ale tak – na kus řeči – poplkat si...\n\nPlzák: Chápu, nechci vyzvídat...\n\nHugo: Klidne vyzvídej...\n\nPlzák: Smím?\n\nHugo: Jasný!\n\nPLzák: Tak copak, copak?\n\nHugo: Ale tak – na kus řeči – poplkat si..."},"20":{"tema_jazyk":"Administratívny štýl","tema_lit":"Chronologický a retrospektívny kompozičný postup","autori":["Alfonz Bednár","Ladislav Mňačko"],"diela":["Kolíska","Ako chutí moc","Smrť sa volá Engelchen"],"okruh_jazyk":"Sloh - administratívny štýl","okruh_lit":"Slovenská próza po 1945","full":"Úloha č. 1\n\n**Charakterizujte administratívny štýl. Vymenujte administratívne žánre (útvary), ktoré poznáte a ktoré z nich môžu mať predtlač.**\n\n- **Administratívny štýl-** má viacero spoločných vlastností s náučným štýlom; ide o oficiálny štýl verejného styku, ktorý sa používa na komunikáciu medzi občanom a úradom, alebo úradmi navzájom (vo verejnej správe, v službách, v advokácii,...)\n\n- **Znaky:**\n\n- **písomnosť- **prevažuje písomná forma, ktorú upravujú STN, prevažujú zložené súvetia, oznamovacie vety\n\n- **verejnosť, adresnosť- **štýl verejného styku, úradnej komunikácie; niektoré z nich majú svojho adresáta\n\n- **presnosť, pojmovosť- **slová bez citového zafarbenia, opakuje sa niekoľko konštrukcií, ustálené slovné spojenia a združené pomenovania, kancelarizmy\n\n- **sch**e**matickosť-** objektívny štýl, nachádzajú sa tu viaceré slohové postupy\n\n- **administratívne texty **sú väčšinou monologické a písomné (môžu mať aj ústnu podobu- vopred pripravená, len ústne prednesená); sú objektívne a neosobné, ich obsah musí byť jednoznačný a vecný\n\n- **cieľom **je predovšetkým čo najefektívnejšia, najrýchlejšia a najpresnejšia komunikácia (komunikatívna funkcia)\n\n- **žánre:**\n\n- **dokumentárne- **zápisnica, protokol, potvrdenka, zmluva, rezolúcia, záväzok, zmenka, splnomocnenie, dlžobný úpis\n\n- **ozn**a**movacie- **vyhláška, oznámenie, hlásenie, správa o činnosti, úradný prípis, oficiálne pozvánka, žiadosť, prihláška, reklamácia, urgencia, sprievodný list, objednávka, inzerát, telegram, upomienka, dotazník, ponuka služieb\n\n- **heslové- **vysvedčenie, štruktúrovaný životopis, diplom, faktúra, tlačivá (poštové, dopravné, bankové), cestovné príkazy\n\n- **predtlač môžu mať: **potvrdenka, prihláška, dotazník, vysvedčenie, diplom, tlačivá\n\n**Vysvetlite, aký by bol rozdiel pri vypracovaní **objednávky, reklamácie a motivačného listu **v porovnaní so žiadosťou. Objednávka: **je v nej názov firmy, údaje o firme, údaje o objednávateľovi, číslo a dátum objednávky, popis objednávaného tovaru, množstvo a cena, dodacie a platobné podmienky, telefón/mail, podpis objednávajúceho; nie sú tu žiadne zdvorilostné frázy\n\n**Reklamácia: **rovnaká forma ako pri žiadosti, vo vlastnom texte popíšete, kedy ste si kúpili výrobok, kedy a ako došlo k poškodeniu výrobku, popíšete poškodenie, uvediete, či žiadate nový kus/vrátenie peňazí\n\n**Motivačný list: **slúži na predstavenie uchádzača budúcemu zamestnávateľovi; zdôrazňuje konkrétne špecifické vlastnosti uchádzača štruktúra motivačného listu je jednoduchá a prehľadná; pozostáva z **hlavičky **(meno, adresa, telefón, email), **adresáta** (názov a adresa spoločnosti), oslovenia, obsahu listu, dátumu, miesta, mena (resp. podpisu); vyzdvihnite svoje vlastnosti a zručnosti a zdôvodnite, prečo práve vy ste pre ich spoločnosť najlepší\n\n**Adresujte Gymnáziu Jozefa Miloslava Hurbana v Čadci **žiadosť**,** v ktorej žiadate o vyhotovenie duplikátu maturitného vysvedčenia. **\n\nMeno Priezvisko, Adresa, PSČ\n\nGymnázium Jozefa Miloslava Hurbana\n\nUl. 17. novembra 1296\n\n022 01 Čadca\n\nMesto\n\nDátum\n\nŽiadosť o vystavenie duplikátu maturitného vysvedčenia\n\nŽiadam o vystavenie duplikátu maturitného vysvedčenia, ktoré som získal na základe vykonania maturitnej skúšky v školskom roku 2015/2016. O vystavenie duplikátu maturitného vysvedčenia žiadam z dôvodu straty originálneho dokladu o ukončení štúdia. Čestne prehlasujem, že uvedený doklad o ukončení štúdia z dôvodu jeho straty nemám k dispozícii a z uvedeného dôvodu žiadam o vystavenie jeho duplikátu.\n\nZa kladné vybavenie žiadosti vopred ďakujem.\n\nS pozdravom ...................\n\nÚloha č. 2\n\n**Vysvetlite rozdiel medzi chronologickým a retrospektívnym kompozičným postupom. Analyzujte ukážky a porovnajte zobrazený spoločensko-kultúrny kontext doby.  Chronologický postup: príbehy, deje nasledujú chronologicky- v časovej osi (tak ako sa stali)\n\n**Retrospektívny postup: **spätný, dej je rozprávaný v opačnom slede, ako sa stal, vracia sa zo súčasnosti do minulosti, aby  oboznámil čitateľa čitateľa s udalosťami, ktoré vstupnému deju predchádzali\n\n**Alfonz Bednár: Kolíska**\n\n- **téma:** okupácia Slovenska nemeckými vojakmi, dopad vojny na obyvateľov dediny Lieskov, kriticky zachytáva priebeh súdnych procesov v 50. rokoch\n\n- **kompozícia: **retrospektíva (vracia sa do roku 1945, keď Zita spomína na Majerského)\n\n- **postavy: **\n\nZita Černeková- pekná, mladá, chudobná žena, manželka Miša Černeka- má s ním syna\n\nMišo Černek- starostlivý, miluje Zitu, avšak pomstychtivý a tvrdý vodca partizánskej skupiny\n\nJozef Majerský- nespravodlivý, lakomý, vypočítavý, nakoniec krivo obvinený a potrestaný\n\n- **dej:** Novela začína tým, ako Zita počúva v rozhlase proces, na ktorom svedčil jej muž. Svedčil proti Majerskému, ktorý bol jej bývalý milenec, a ktorý bol obvinený z rozvracania a sabotovania družstva. Druhá dejová línia sa začína rozprávaním o minulosti. K Zite počas vojny príde Majerský. Zita ho ukryje v izbe, jej muž je zatiaľ skrytý v bunkri, kde bol predtým aj Majerský. Nemci prichádzajú k Zite, pretože zvuk kolísky pripomínal zvuk vysielačky, začínajú byť dotieraví. Zita im musela nachystať pohostenie, mali stále na ňu narážky, chceli jej dieťa krstiť močom. Zita sa bála, že si všimnú mokré stopy na zemi, ktoré tam zanechal Majerský. Majerský si uvedomuje, že dostal Zitu do nebezpečenstva, preto uteká cez okno. Zrazu sa vonku spustí streľba- strieľal Majerský. Nemci vybehnú von, vrátia sa s jedným raneným a jedným mŕtvym. Novela končí, tak ako začal, že Zita počúva v rádiu súdny proces, v ktorom Majerského odsúdia na 12 rokov. Hnevá sa na svojho muža, ktorý proti nemu svedčil. Majerského na súde nenechali ani dohovoriť, jeho výpovede boli prerušované. (poukazuje na nezmyselnosť a vymyslenosť súdnych procesov)\n\n- dielo sa zaoberá životom normálnych ľudí, ktorí sa dostali do existenciálne ťažkých situácií a ich riešenie a ozveny predchádzajúcich udalostí a skutkov sa im po rokoch vracajú a majú ešte stále dopad na ich život\n\n- **literárny druh:** epika\n\n- **literárny žáner:** novela\n\n- **spoločensko-** kultúrny kontext doby: je zamerané na obdobie druhej svetovej vojny, utrpenie ľudí počas nej, utrpenie ľudí po skončení + nezmyselné súdne procesy\n\n**Ladislav **Mňačko**: Ako chutí moc**\n\n- **téma:** osudy dvoch priateľov- Franka a mŕtveho muža\n\n- **kompozícia:** 18 kapitol, takmer každá kapitola sa začína v prítomnosti a postupne cez Frankove spomienky prechádza do minulosti (minulosť je zobrazená formou rôznych epizód)\n\n- autor v diele opisuje začiatky kamarátstva Franka a muža, spoločne strávené chvíle- či už na vojne, alebo počas kariéry mŕtveho muža, no zachytáva tiež ich odcudzenie; autor tiež pre pomenovanie Frankovho priateľ používa rôzne pseudonymy ako napr. mŕtvy muž, veľký štátnik, veľký muž,...\n\n- **dej sa skladá z dvoch dejov:** Prvý dej zachytáva pohreb štátnika, ktorý trvá 3 dni, no zachytáva tiež Frankove úvahy, oboznamuje s jeho životom počas tohto obdobia. Druhý dej je tvorený z Frankových úvah. Dozvedáme sa z nich osudy týchto dvoch postáv- od počiatku ich priateľstva až po jeho rozpad.\n\n- Román je zameraný na charakteristiku moci a charakteristiku tých, ktorí ňou disponujú a nie na konkrétnu udalosť, s konkrétnymi postavami. Preto nebola postava štátnika pomenovaná. Autor chcel zobraziť, ako dokáže moc zmeniť charakter a správanie človeka.\n\n- **literárny žáner:** román\n\n- **spoločensko- kultúrny kontext doby:** zameriava sa na nástup komunizmu, obdobie po 2. svetovej vojne\n\n**Ladislav **Mňačko**: Smrť sa volá **Engelchen**\n\n- **téma: **partizánska vojna, vypálenie Ploštiny\n\n- Autor v diele zachytáva osud židovských obyvateľov na postave Marty- stala sa vyzvedačkou Nemcov. Ďalej zachytáva prítomnosť veliteľov. Engelchen- nemecký generál, ktorý dal vypáliť Ploštinú. V diele vystupuje aj partizán Voloďa- zaľúbil sa do Marty- tá vidí, ako dal Engelchen vypáliť Ploštinú. Navštevuje Voloďu v nemocnici, kde mu povie, že odchádza do Kanady, ale ide sa zabiť. V nemocnici sa o Voloďu stará sestrička Eliška, do ktorej sa zaľúbi, avšak povie jej, že musí nájsť Engelchena, aby neunikol trestu za zločiny.\n\n- **literárny žáner:** román (s autobiografickými prvkami)","number":20,"assignment":"**Zadanie č. 20**\n\nÚloha č. 1\n\n**Charakterizujte administratívny štýl. Vymenujte administratívne žánre (útvary), ktoré poznáte a ktoré z nich môžu mať predtlač. Vysvetlite, aký by bol rozdiel pri vypracovaní **objednávky, reklamácie a motivačného listu **v porovnaní so žiadosťou. Adresujte Gymnáziu Jozefa Miloslava Hurbana v Čadci **žiadosť**,** v ktorej žiadate o vyhotovenie duplikátu maturitného vysvedčenia. **\n\nÚloha č. 2\n\n**Vysvetlite rozdiel medzi chronologickým a retrospektívnym kompozičným postupom. Analyzujte ukážky a porovnajte zobrazený spoločensko-kultúrny kontext doby. **\n\nUkážky: *A. Bednár - Kolíska*\n\n* L. **Mňačko** - Ako chutí moc, Smrť sa volá **Engelchen*\n\n**Alfonz Bednár: Hodiny a minúty Kolíska (úryvok)**\n\nZita kolísala a s nepremožiteľným hnevom v sebe a bez myšlienky na to, čo sa stane, začala si ctiť každého, kto sa sprotivil Nemcom, aj Majerského.\n\n... Majerský počul do izby búchať a dunieť zodraté podnohy, a hoci dúfal, že kým Zita kolíše, ešte jej nerobia zle, aj tak mu v ušiach podnohy búchali a duneli a bili ho.\n\n............................................\n\n,,Dobre, ale o Majerskom som im povedal, ako to bolo! Nebolo mi to všetko jedno...“ Stíchol.\n\n,,Kedy si im to povedal?“\n\n,,Tam na súde, do toho rádia!“\n\nZita sa vyrovnala v tele, opovržlivo prskla: ,,Kedy?“ opýtala sa. ,,Počúvala som, a nepočula\n\nsom ťa.“\n\n,,Čože?“ Černek sa obrátil k Zite. ,,Povedal som im, aký bol Majerský s nami v horách, Čo sa\n\nmu stalo a čo tu vykonal, keď prišiel k tebe, povedal...“ Zite sa opovržlivo skrivili pery.\n\n,,Všetci to počuli, aj Majerský, aj jeho žena a deti, rodina – a do rádia to nedali!“ Zitu začala\n\npáliť tvár. Možno veriť Mišovi? Spytovala sa v duchu a bránila sa dorážajúcej myšlienke, či\n\nsa jej muž Mišo takto nevypomstil Majerskému.\n\n**....................................................................................................................................................**\n\n,,Svedčil si...“ Hnev rozochvel Zite pritíšený hlas. ,,Nemal si tak! Pre seba zabúdaš na iných!\n\nDbáš len na seba, akoby si bol sám na svete. Tebe Majerský neublížil... Prečo si tak na neho\n\nsvedčil, ty...?“\n\n,,Lebo chceli,“ povedal Černek, ,,aby si aj ty, aby si aj ty svedčila. Ty ho vraj, ty ho vraj poznáš, ty by si vedela o ňom viac povedať ako ja – a ja som nechcel, aby si na neho svedčila,\n\npreto som svedčil ja sám, ja sám, aby si, aby si nemusela ty...“\n\n,,Kto chcel?“\n\n,,Práca, ktorú konáme v tohoročnej žatve, je veľká, no neobyčajne radostná...“ hlásalo rádio.\n\n,,Mišo, to si mu nemal vykonať...“ Zita rýchle dýchala, opovržlivo hľadela na rozochveného\n\nmuža, ,,to človek nerobí! Ty...“\n\n,,Ty si myslíš, ty si myslíš, Zita, Zitka,“ povedal trhaným a trocha priduseným hlasom Černek,\n\n,,ty si myslíš, že by si bola ináč svedčila ako ja? Nebola – nebola by si – nebola, veru – a tam\n\nna súde mnohí ešte horšie svedčili – zavolali ma, povedali mi ,,podpíš!“ – vedeli o mne, že\n\nsom bol s Majerským v Povstaní – oni všetko vedia – a ja som sa bál – o teba, o deti- svedčil\n\nsom...“\n\n**Ladislav **Mňačko**: Ako chutí moc (úryvok)**\n\nTej noci Frank nemohol zaspať. To sa mu stávalo zriedka. Ležal na chrbte s otvorenými očami, hľadel do ničoho, do tmy. Možno nie do tmy. Možno do ďalekej hlbokej minulosti. Darmo si nahováral, že ten mŕtvy bol niktoš, s ktorým sa netreba zaoberať, že ho prezrel už dávno a už dávno zatratil, že je mu celkom ľahostajný, že sa dožil konca, aký si zaslúžil. Rozumom to uznával, ale človek sa neskladá len z rozumu, človek sa okrem iného skladá aj zo svojej minulosti a Frankova minulosť bola neodmysliteľná od toho mŕtveho...\n\n.......................................................................................................................................................\n\nA čo si porobil sám so sebou, ty dravý, čierny orol? Čo ťa stiahlo z jasných výšin do sveta šedivosti a ničoty, ta, kde vrabce odbavujú svoje smiešne snemy? Závrat ťa chytil? Málila sa ti výška, chcel si ju pozorovať zdola? Chcel si sa kochať v tom, kam až doletíš, a počúvať závistlivé čvirikanie tých, čo ta nedoletia. Načo ti bola všetka tá moc, ktorú si získal? Ako ti chutila? V čom ti pomohla, čo ti vyriešila, kam ťa doviedla? Kedysi si býval zdravý, mocný, plný elánu. A šťastný. Zintenzívnilo sa tvoje šťastie? Priniesla ti moc ďalšie šťastie, alebo nahradila bývalé nejakým iným?\n\n**Ladislav **Mňačko**: Smrť sa volá **Engelchen** (úryvok)**\n\nDvadsaťsedem chlapcov, medzi nimi troch štrnásťročných ploštinských faganov, vytiahli Nemci z hlúčka. Odborne im zviazali za chrbtom ruky. Obersstumbannfúhrer ukázal na Zichov dom.\n\n,,Ta s nimi!“\n\nZ nákladného auta esesáci skladali akési záhadné prístroje, nikto z obyvateľov Ploštiny si nevedel vysvetliť, na čo sú. Boli to plameňomety. Tak sa stalo...\n\n,,Všetci zahynuli? Všetci chlapi Ploštiny?“\n\n,,Všetci nie. Jeden sa zachránil. Starý Raška. Syna mu , pravda, spálili.\n\nStarý Raška nebol na Ploštine, tej noci bol v Zlíne. Ráno sa vracal domov a z lesa videl, že je zle. Utekal ako bez duše na štáb brigády. Griškova skupina bola neďaleko. Keď prišli na Ploštinu, našli tam už len Martu s Karolom. Marta nebola pri sebe. Nemci už boli preč...“\n\n,,Chudáci... nevinní ľudia...“\n\n,,Nehovor, Eliška, že nevinní! Nevinné sú len ovce, oni boli chlapi. Prehrešili sa proti nemeckým zákonom. Len – nemecké zákony boli jedným z najväčších zločinov dejín. Iba v novinách sa dnes píše, že nevinné obete. Pravdaže, Nemci zabíjali aj nevinných, ale chlapi z Ploštiny boli bojovníci! Bojovníci ako my, ba lepší ako my!“"},"21":{"tema_jazyk":"Homonymá, synonymá, antonymá, frazeologizmy","tema_lit":"Súčasná poézia, populárna pieseň","autori":["Miroslav Válek","Milan Rúfus","Milan Lasica","Jozef Urban"],"diela":["Jablko","Domov sú ruky..."],"okruh_jazyk":"Lexikológia - vzťahy slov","okruh_lit":"Súčasná slovenská poézia","full":"Úloha č. 1\n\n**Vysvetlite na príkladoch pojmy **homonymá, synonymá, antonymá, združené pomenovania frazeologické zvraty**. Homonymá- **sú to slová, ktoré rovnako znejú, ale majú rôzny význam (napr. koruna- platidlo, koruna stromu; zámok- zabezpečovacie zariadenie, sídlo v minulosti; čelo- hudobný nástroj, časť tváre, a pod.)\n\n**Synonymá-** sú to slová, ktoré rôzne znejú, ale majú rovnaký význam (napr. plakať, nariekať, bedákať)\n\n**Antonymá- **sú to slová s opačným významom (deň-noc, veľa-málo, teplo-zima, a pod.)\n\n**Združené pomenovania**- sú to ustálené slovné spojenia, ktoré ako jeden celok vyjadrujú jeden pojem (napr. triedna kniha, ľahká atletika, zoologická záhrada, a pod.)\n\n**F**razeologické zvraty**- ** frazémy (slovesné syntagmy) so slovesnou syntagmatickou stavbou; majú slovesnú povahu ale nie vetnú - často krát sa zamieňajú s frázami (napr. roniť krokodílie slzy, píliť uši niekomu, smrdieť grošom, mať rozum za groš, nemať za groš rozumu, nosiť sovy do Atén, liať vodu do mora, nosiť drevo do hory)\n\n**Roztrieďte nasledujúce frazeologizmy podľa pôvodu - **ľudové, prevzaté z biblie, mytológie, z literatúry, z histórie. **Vysvetlite ich význam: **Achillova päta, leží ako Lazár, babylonská veža, bojovať proti veterným mlynom, sizyfovská práca, tri Svätoplukove prúty, Keď ste si ma upiekli, tak si ma zjedzte. Bez práce nie sú koláče. Studený máj, v stodole raj. *\n\n*Achillova päta*- z mytológie\n\n*l**eží ako Lazár*- z biblie\n\n*b**abylonská veža*- z biblie\n\n*bojovať proti veterným mlynom*- literárne\n\n*sizyfovská práca*- z mytológie\n\n*tri Svätoplukove prúty*- z histórie\n\n*Keď ste si ma upiekli, tak si ma zjedzte.*- literárne\n\n*Bez práce nie sú koláče.*- ľudové\n\n*Studený máj, v stodole raj.*- ľudové\n\nÚloha č. 2\n\n**Vysvetlite tematické východiská tvorby uvedených autorov (**súčasná poézia, populárna pieseň)**. Analyzujte výrazné štylistické prvky a interpretujte lyrické posolstvá básní. Súčasná lyrická poézia: Milan Rúfus:**\n\n- pochádzal z remeselníckej rodiny, študoval slovenčinu a dejepis, pracoval ako vysokoškolský profesor\n\n- hlavné motívy: bolesť sveta, ohrozenie človeka, bolesť z lásky, údel a bolesť básnika, Boží súd,...\n\n- za najvyššie ľudské hodnoty považuje materinskú lásku, ktorá v sebe zosobňuje ďalšie ideové roviny- detstvo, prírodu, domov, prácu,...\n\n- vo svojej tvorbe nadviazal na tradíciu symbolizmu a neosymbolizmu; jeho poézia má aj nádych tragickosti\n\n- **Tvorba:**\n\nAž dozrieme- v tejto zbierke venoval verše otcovi, matke, domovu, ale nachádzajú sa tu aj básne s tematikou druhej svetovej vojny, básne poukazujúce na politické problémy sveta- napr. na vojnu v Kórei; kladie dôraz na vnútorné prežívanie utrpenia, využíva motívy kresťanstva (typické pre jeho tvorbu); opisuje sklamanie v láske, pocity samoty\n\nChlapec maľuje dúhu- píše o pominuteľnosti človeka, smrti, pohrebe lásky\n\nZvony- zobrazuje prostého človeka, ktorý hľadá zmysel svojho bytia; je skôr básnikom ľudskej bolesti, než optimizmu- ale vždy hľadá pozitívne východiská; kľúč vlastného života nikto nepozná, každý túži spoznať správne riešenie\n\nModlitbičky- pre deti\n\n**Miroslav **Válek**:**\n\n- najvýznamnejší predstaviteľ slovenskej poézie, mal vplyv na slovenskú poéziu v 60.-70. rokoch\n\n- jeho domovom bola trnavská rovina, bol zaradený do skupiny trnavských básnikov\n\n- uplatňoval voľný verš\n\n- jeho básne sa dotýkajú rôznych sfér; dvojmotívy v jeho poézii- poézia + láska, človek + svet,\n\n- písal ódy, reflexie, epigramy, politickú lyriku\n\n- **Tvorba:**\n\nDotyky- táto zbierka vyvolala veľký ohlas literárnej kritiky, lebo odmietol čierno- biele videnie reality; do centra svojho záujmu postavil človeka s jeho intímnymi citmi a problémami\n\nPríťažlivosť- vrchol jeho mladíckych síl a chuti žiť\n\nNepokoj- jeho vnútorná citová kríza\n\nMilovanie v husej koži- vnímanie modernej doby, sklamanie zo spoločnosti, skepsa (inšpiroval sa Beatnikmi)\n\n**Populárna pieseň: Jozef Urban:**\n\n- narodil sa v Košiciach, pôsobil v Dotykoch, zahynul pri autonehode\n\n- **tvorba:**\n\nMalý zúrivý Robinson- zbierka básní, v ktorej využil vplyv poézie amerických Beatnikov\n\nHluchonemá hudba\n\nKniha polomŕtvych\n\nUtrpenie mladého poeta\n\nVoda čo ma drží nad vodou- zbierka básní, ktorá vyšla po jeho smrti- sú v nej všetky jeho piesňové texty (pre Elán, Žbirku, Palondera,...)\n\n**Ďalší autori:** Peteraj, Filan, Sarvaš","number":21,"assignment":"**Zadanie č. 21**\n\nÚloha č. 1\n\n**Vysvetlite na príkladoch pojmy **homonymá, synonymá, antonymá, združené pomenovania frazeologické zvraty**. Roztrieďte nasledujúce frazeologizmy podľa pôvodu - **ľudové, prevzaté z biblie, mytológie, z literatúry, z histórie. **Vysvetlite ich význam: **Achillova päta, leží ako Lazár, babylonská veža, bojovať proti veterným mlynom, sizyfovská práca, tri Svätoplukove prúty, Keď ste si ma upiekli, tak si ma zjedzte. Bez práce nie sú koláče. Studený máj, v stodole raj. *\n\nÚloha č. 2\n\n**Vysvetlite tematické východiská tvorby uvedených autorov (**súčasná poézia, populárna pieseň)**. Analyzujte výrazné štylistické prvky a interpretujte lyrické posolstvá básní.**\n\nUkážky:* M. **Válek*\n\n* M. Rúfus, M. Lasica*\n\n* J. Urban*\n\n**Miroslav **Válek**:   Jablko Domov sú ruky, na ktorých smieš plakať **Jablko zo skrine sa skotúľalo na zem. Domov je chladná voda v zarosenom džbáne.\n\nTak si zbaľ svoje veci a môžeš ísť. Domov sú ruky, položené na stole\n\nOprela sa chrbtom o dvere v nedeľnom tichu, po práci,\n\na vykríkla očami: prázdne a čakajúce,\n\nPreboha ťa prosím, nie! rozhodujúce,\n\nAle ja som raz vedel, že mám toho dosť jediné, ktoré vytvárajú dejiny.\n\nvstal som,\n\nzdvihol som jablko, Domov sú ruky, na ktorých smieš plakať.\n\nzaprášené a ešte zelené, skryjú tvoju tvár, vlhkú od potu a od sĺz.\n\na položil som ho na stôl. Môžu pritúliť, zachrániť a zohriať.\n\nNeprestávala prosiť, prišla ku stolu, ale aj priložiť prsty na hrdlo a stisnúť.\n\nplakala.\n\nPozerala na mňa, utierala jablko, Každý deň si uväzujem kravatu.\n\nplakala. Každý deň myslím na to isté.\n\nAž som jej povedal: Polož to jablko a choď!\n\nUdalosti sa zbehli ako som predpokladal\n\nČo na tom záleží, že v inom poradí!\n\nOtvorila dvere,\n\nzbledol som a povedal som: Zostaň!\n\nAle ona si zbalila svoje veci a odišla.\n\nJablko zo skrine sa skotúľalo na zem.\n\n**Milan Rúfus: Abeceda** Milan Lasica: Abeceda**\n\nChoď, ži, je prestreté: Snívalo sa mi\n\nnôž, zub i pod zub. Máš, tuším včera v noci\n\nčo ti treba, a rovno na obruse. že z abecedy zmizlo zopár písmen\n\nChoď, neváhaj, vieš abecedu, píš. asi ich niekto potiahol\n\n dnes sa ľudia ulakomia na všetko\n\nViac nemôžeš, len potiaľ pochopíš. Keby tak zmizlo Q alebo Ô\n\nNepoznáš pravdu. Vieš iba abecedu. nič vážne by sa nestalo\n\nV nej slabikuješ denne svoju biedu, abeceda by nestratila svoju tvár\n\ni svoju veľkosť. Zmizlo však A a zmizlo Zet\n\n a písmenám sa zrútil svet\n\nÚzkosť prežitá, ako keď v kalendári chýba\n\nó, krutosť! Kto to po nás prečíta? december a január\n\n Zoštylizujte obyčajnú vetu\n\n keď abeceda nemá hlavu ani pätu\n\n**Jozef Urban: Voda, čo ma drží nad vodou**\n\nKeby bolo niečo\n\nČo sa ti dá zniesť\n\nOkrem neba nado mnou a miliónov hviezd\n\nTak by som to zniesol\n\nVždy znova a rád\n\nK tvojim dobré veci ako vodopád\n\n**Jozef Urban: Vráť trochu lásky medzi nás**\n\nVráť trochu lásky medzi nás\n\nChcem vnímať ako znie ten tvoj úprimný hlas\n\nVráť vráť trochu lásky medzi nás\n\nPríď aspoň s nádejou\n\nJa ju sám neviem nájsť\n\nNeviem nájsť\n\n**Jozef Urban: **C´est** la vie**\n\nZačínam byť zvedavý\n\nČi sa šťastie unaví\n\nČi ma osloví\n\nČi len mávne – C´est la vie\n\nAk som trochu hádavý\n\nNeplač to sa napraví\n\nObčas mi len tak\n\nŠpliecha na maják\n\nTak to pochop – C´est la vie"},"22":{"tema_jazyk":"Samohlásky a spoluhlásky, spodobovanie","tema_lit":"Spoločenská a ľúbostná lyrika","autori":["Ján Kollár","Andrej Sládkovič","J. Smrek","E. B. Lukáč","J. Kostra"],"diela":["Slávy dcéra","Marína","Dievča v rozkvete","Ave Eva"],"okruh_jazyk":"Fonetika - hlásky","okruh_lit":"Lyrika - spoločenská a ľúbostná","full":"Úloha č. 1\n\n**Vysvetlite rozdelenie **samohlások** a význam delenia **spoluhlások** pre slovenský pravopis. Nájdite **a vysvetlite **v ukážkach** (**Marína, Dievča v rozkvete, Ave **Eva**)** príklady na spodobovanie a výs**lovnosť zdvojených spoluhlások. Samohlásky:**\n\n- **krátke: **a, e, i, o, u, ä\n\n- **dlhé: **á, é, í, ó, ú\n\n- **dvojhlásky: **ia, ie, iu, ô\n\n**Spoluhlásky:**\n\n- **podľa vplyvu na pravopis:**\n\n- **tvrdé: **h, ch, k, g, d, t, n, l- po nich sa v domácich slovách píše y/ý\n\n- **mäkké: č, dž, š, ž, c, dz, j, ď, ť, ň, ľ- po nich sa v domácich slovách píše i/í\n\n- **obojaké: b, m, p, r, s, v, z, f- po nich sa zvyčajne píše i/í, vo vybraných slovách y/ý\n\n- **podľa znelosti:**\n\n- **znelé párové: **b, d, ď, g, dz, dž, z, ž, h,v\n\n- **neznelé párové: **p, t, ť, k, c, č. s, š, ch, f\n\n- **ne**znelé nepárové: **m, n, ň, l, ľ, ĺ, r, ŕ, j\n\n**Spodobovanie, výslovnosť zdvojených spoluhlások:**\n\nNad obraz [nat obras]\n\ndievča v rozkvete [dieuča v roskvete]\n\nk hriechu i k modlitbe [g hriechu, g modlidbe]\n\nbúria k nebezpečnej hre [búria g nebezpečnej hre]\n\n**Aký rozdiel je medzi zvukomaľbou a ľubozvučnosťou**, využite vlastné príklady a príklady z ukážok. Zvukomaľba:**\n\n- napodobňovanie zvuku vhodným využitím a spojením hlások v slovách\n\n- autor sa snaží výberom zvukov zachytiť zvuk, či atmosféru zobrazovaného javu (napr. duní Dunaj a luna za lunou sa valí)\n\n- zvukomalebné slová sa nazývajú **onomatopoje**- **napodobňujú prírodné a pracovné zvuky- používajú sa opakovane (napr. bum-bum-bum, bim-bam-bom, cingi-lingi-bom)\n\n**Ľubozvučnosť (eufónia):**\n\n- je umelecky pôsobivé usporiadanie hlások, ktoré vyvoláva estetický zážitok\n\n- zakladá sa na opakovaní hlások, slabík, alebo skupiny hlások\n\n- autor zámerne využíva a organizuje zvukové vlastnosti hlások, skupín hlások, na dosiahnutie emocionálnosti a expresívnosti textu\n\n- opakom je kakofónia- výslovnostne ťažké zoskupenie hlások a slov\n\nÚloha č. 2\n\n**Vysvetlite pojmy **spoločenská lyrika a ľúbostná lyrika** a vysvetlite zameranie uvedených ukážok.  Lyrika:**\n\n- literárny druh, ktorý nemá dej\n\n- vyjadruje pocity, nálady, dojmy, myšlienky a úvahy autora\n\n- **druhy:** osobná, úvahová, spoločenská, prírodná, politická, sociálna\n\n**Spoločenská lyrika:**\n\n- obsahuje objektívnu stránku, netotožnú s autorom básne\n\n- lyrika, v ktorej autor zaujíma postoj k vážnym spoločenským problémom a udalostiam, ktoré sa ho citovo dotýkajú\n\n- autor často premýšľa, uvažuje o týchto javoch v spoločnosti\n\n- zasahuje sociálne javy autorovho okolia- rodinu, spoločnosť, národ, ľudstvo\n\n**Ľúbostná lyrika: **\n\n- lyrika, v ktorej autor vyjadruje osobný citový vzťah k žene\n\n- autor zobrazuje svoj vnútorný svet, city, nálady, zážitky poznačené láskou (preto často označujeme túto lyriku ako intímnu)\n\n**Ján Smrek: Dievča v rozkvete**\n\n- ľúbostná báseň\n\n- **téma:** krása mladého dievčaťa\n\n- **idea: **autor sa vyznáva z obdivu nad krásou dievčaťa, ktoré dozrieva na mladú ženu; s erotickým nádychom vyjadruje svoje túžby voči nej\n\n- **vitalizmus- **vo svojich básňach vychádza z čara okamihu, z chvíľkových vnemov, pocitov; dominujú optimistické nálady, aktivita, činorodosť, senzualizmus\n\n- **štylisticky príznakové slová: epiteton- **živé jaro, zúbky dravčie; **zdrobnenina- **zúbky; **metafora- **pohľad slnca plný, spáliť to radšej v srdci plamene; **prirovnanie- **ako kvet kamélie hrdý preniká jak elektrický prúd\n\n**Andrej Sládkovič: Marína**\n\n- **2 časti: **1. nešťastná láska k Márii Pišlovej; 2. láska k vlasti\n\n- Sládkovič spája lásku k vlasti s láskou k žene\n\n- básnická skladba\n\n- téma: láska k žene a k vlasti, tematika všeslovanskej vzájomnosti, problémy vzťahov mladých ľudí\n\n- **sylabický veršový systém**\n\n- **básnické figúry: **anafora, dvojitý zápor- **nemožno mi ťa neľúbiť;** básnické otázky, personifikácie, metafory Ján Kollár: Slávy dcéra**\n\n- **2 hlavné témy: **láska k milej a láska k vlasti\n\n- lyricko- epická básnická skladba\n\n- Kollár dáva polovicu srdca vlasti a polovicu milej\n\n- využíva protiklady (minulosť a budúcnosť)\n\n- dielo napísané slovakizovanou češtinou\n\n**Ľudovít Štúr: Rozžehnání**\n\n- uprednostňuje vlasť pred ženou\n\n**Emil Boleslav Lukáč: O láske neláskavej**\n\n- v tejto zbierke sa naplno prejavujú jeho erotické city\n\n- radí, aby sa v láske držali určité tajnosti a prekonávali prekážky, láska sa nemá dávať hneď najavo, lebo sa tak upevňuje vzťah\n\n**Ján Kostra: Ave Eva**\n\n- autor touto skladbou vzdáva hold ženám a ženskej kráse; je uchvátený fyzickou krásou ženy ,žena je ako opora, istota ( prirovnáva ju ku pilierom katedrál), niekedy je žena vyzývavá, spôsobuje ,že niekto je nešťastný ( napr. rozchod- niekto ním stratí a niekto získa), meno EVA skrýva v sebe symboliku, opisuje ženu ako nositeľku života, ako základ všetkého, existencie, vníma ju ako zvodnú i zbožnú zároveň, lásku ženy prirovnáva k dvojsečnej zbrani (lebo dokáže raniť, mnohí muži už spáchali kvôli žene samovraždu), všetky ženy sú rovnaké a predsa je každá iná ,hoci muž stretne v živote veľa žien , skutočná láska je len k jednej","number":22,"assignment":"**Zadanie č. 22**\n\nÚloha č. 1\n\n**Vysvetlite rozdelenie **samohlások** a význam delenia **spoluhlások** pre slovenský pravopis. Nájdite **a vysvetlite **v ukážkach** (**Marína, Dievča v rozkvete, Ave **Eva**)** príklady na spodobovanie a výs**lovnosť zdvojených spoluhlások. Aký rozdiel je medzi zvukomaľbou a ľubozvučnosťou**, využite vlastné príklady a príklady z ukážok.**\n\nÚloha č. 2\n\n**Vysvetlite pojmy **spoločenská lyrika a ľúbostná lyrika** a vysvetlite zameranie uvedených ukážok. **\n\nVyužite poznatky zo štylistickej a kompozičnej analýzy básne na dvoch vybraných ukážkach.\n\nUkážky**: **J. Kollár – Slávy dcéra*\n\n* Ľ. Štúr – Rozžehnání, **A. Sládkovič – Marína*\n\n* J. Smrek – Dievča v rozkvete, E. B. Lukáč – O láske neláskavej*\n\n* J. Kostra – Ave Eva*\n\n**Ján Kollár: Slávy dcéra (úryvok)**\n\nLáska je všech velkých skutku zárod,\n\na kdo nemiloval, nemuže\n\nani znáti, čo jest vlast a národ.\n\n.... ...................................................................................\n\nPolnoc bije. Z lôžka vstávam. Neviem, ktorým\n\nsmerom mám ísť s čistým svedomím,\n\ntam meč, tu šíp, ona tu, tam domovina.\n\nMlčím, váham – vtom do hrude ruku vnorím,\n\nsrdce vyrvem z nej a rozlomím:\n\n„Berte,“ vravím. „Vlasti pol, pol tebe, Mína.“\n\n**Ľudovít Štúr: Rozžehnání (úryvok)**\n\nZapomeň, Drahá, zapomeň jinocha,\n\nnade nímž mraky se bouřlivé shání.\n\nZapomeň, Drahá, zapomeň na hocha,\n\njenž Ti posílá bolně rozžehnání:\n\non na vše světa zapomene slasti,\n\njenom nikdy, jen nikdy o své vlasti!\n\n**Andrej Sládkovič: Marína (úryvok)**\n\n1\n\nJa sladké túžby, túžby po kráse\n\nspievam peknotou nadšený,\n\na v tomto duše mojej ohlase\n\nsvet môj je celý zavrený;\n\nz výsosti Tatier ona mi svieti,\n\nona mi z ohňov nebeských letí,\n\nona mi svety pohýňa;\n\nona mi kýva zo sto životov:\n\nNo centrom, živlom, nebom, jednotou\n\nkrás mojich moja Marína!\n\n73.....\n\nVlasť drahú ľúbiť v peknej Maríne,\n\nMarínu drahú v peknej otčine,\n\na obe v jednom objímať!\n\n291\n\nMarína moja! Teda tak sme my\n\nako tie Božie plamene,\n\nako tie kvety na chladnej zemi,\n\nako tie drahé kamene;\n\npadajú hviezdy, aj my padneme,\n\nvädnú tie kvety aj my zvädneme,\n\na klenoty hruda kryje:\n\nAle tie hviezdy predsa svietili,\n\na pekný život tie kvety žili,\n\na diamant v hrude nezhnije.\n\n**Emil Boleslav Lukáč: O láske neláskavej (úryvok) Paradoxon**\n\nNesmiem byť šťastný, lebo šťastím\n\nuplynie šťastie,\n\nlen z kyprej pôdy pochybností\n\nnám láska rastie.\n\n**J**án Smrek: Cválajúce dni  Dievča v rozkvete**\n\nNiet pôvabnejšej veci na svete,\n\nako je dievča v rozkvete!\n\nTo živé jaro, ktoré preniká jak elektrické vlny,\n\ntá štíhlosť kokosovníka a pohľad slnca plný,\n\ndve biele sopky, v ktorých láva vrie,\n\nktoré sa búria k nebezpečnej hre.\n\nA zúbky dravčie zbrane divej mačky-\n\nvšetko to pôsobí, že byś k tomu šiel\n\nraz výbojne, raz zas kolenačky,\n\nchcel cítiť to vo svojom majetku,\n\n hladkať to, chrániť, baliť do hodvábu,\n\nrozkošnú vravieť tomu poviedku,\n\nbrávať to sebou na jar k lesu\n\ncez leto k plesu,\n\nako kvet kamélie hrdý pripínať si ho k hrudi,\n\nspáliť ho radšej v srdca plamä\n\nprv, než to samé uvädne.\n\n**Ján Kostra: Ave Eva (úryvok) **\n\n1.\n\nNad obraz sklonený šepkám si Ave, Eva.\n\nPod srdcom krylaś ho, hriešnika, ktorý spieva\n\na kajúcne vyberá slová chvál.\n\nSte ako piliere nádherných katedrál\n\nste ako liany prší z vás kvet i semä\n\nk hriechu i k modlitbe kľaká k vám mužské plemä\n\nžiadosťou šialené rúti sa do bahna\n\na trepotavým snom vylieta na rahná\n\n34.\n\nAko keď zamiešaš pre nové kolo karty,\n\nstretáš ich v krásnej hre: Márie, Magdy, Marty,\n\nZuzanky, Júlie, Anežky, Alžbety,\n\nčarovné lupienky na jednom okvetí.\n\nVšetky sú rovnaké a predsa každá iná:\n\nBeáta, Helena, Terezka, Katarína,\n\nKlára i Barbora, Agáta, Brigita,\n\nv ľúbezných kuklách mien jediná ukrytá."},"23":{"tema_jazyk":"Úvaha ako slohový útvar","tema_lit":"Tragédia, dráma - kompozícia, monológ/dialóg","autori":["Sofokles","W. Shakespeare","J. G. Tajovský"],"diela":["Antigona","Hamlet","Statky-zmätky"],"okruh_jazyk":"Sloh - úvaha","okruh_lit":"Antická a alžbetínska dráma","full":"Úloha č. 1\n\n**Charakterizujte úvahu ako slohový útvar. Nájdite v ukážke Hamlet **znaky úvahy.** Porovnajte úvahu **v umeleckom** diele s úvahou v odbornom štýle, publicistickom štýle a bežnom živote.  Úvaha v ukážke Hamlet- **keď rieši otázku „byť, či nebyť?“; ďalej sa pýta na rôzne otázky\n\n**Porovnanie úvah:**\n\n- pri porovnaní úvahy v umeleckom diele s úvahou v odbornom štýle zistíme, že v úvahe v odbornom štýle prevládajú odborné termíny, pričom v umeleckom prevládajú rečnícke otázky, voľnejšia kompozícia a štylizácia\n\n- uvažovanie v bežnom živote vzniká na základe poznatkov a skúseností, nad ktorými uvažujeme, rozoberáme ich, hodnotíme a vyvodzujeme z nich závery\n\n**Zarecitujte** zvýraznenú ukážku z *Hamleta.*\n\n**Vytvorte mapu mysle **na tému *Životné hodnoty mladého človeka.*\n\nÚloha č. 2\n\n**Vysvetlite pojmy: **divadelná hra, inscenácia, tragédia. **Odlíšte pojmy monológ, dialóg, replika, vysvetlite zmysel autorskej poznámky. Analyzujte fázy vnútornej kompozície drámy.  Divadelná hra: **audiovizuálne umenie s dôrazom na sluchové vnímanie textu, pričom zrakové vnímanie je druhotné\n\n**Inscenácia:** premena literárneho diela na divadelnú, alebo televíznu hru; na jej realizácii sa zúčastňuje viacero zložiek (literárna predloha, herci, réžia,...); jednotný umelecký zámer jej dáva režisér, no divák hru prijíma prostredníctvom hercov, ktorí ju oživujú, stvárňujú a dávajú jej konečnú podobu\n\n**Tragédia:** vznikla v antike- najstarší dramatický žáner , v ktorom sa konflikt deja nedá vyriešiť inak, ako smrťou postavy, alebo postáv; hlavným znakom je boj hlavnej postavy s nepriateľskými silami (končí tragicky, hlavným hrdinom je zväčša nadpriemerný človek)\n\n**Monológ:** prehovor jednej postavy, v dráme slúži na komentovanie udalostí; oslabuje dramatickú účinnosť hry\n\n**Dialóg: **rozhovor dvoch, alebo viacerých postáv; v dráme základný kompozičný prvok\n\n**Replika: prehovor jednej z postáv zúčastňujúcej sa dialógu\n\n**Autorské poznámky: **usmerňujú pohyb, výraz, opisujú prostredie (musí byť vytvorené na scéne)\n\n**Vnútorná kompozícia drámy:**\n\n- **úvod (expozícia)- **predstavenie prostredia a postáv\n\n- **zápletka **\n\n- **zauzlenie (kolízia)- **udalosť, ktorá skomplikuje vzťahy postáv\n\n- **vyvrcholenie (kríza)- **vyvrcholenie konfliktu\n\n- **dejový obrat (peripetia)**\n\n- **rozuzlenie\n\n- **záver** (katastrofa)**","number":23,"assignment":"**Zadanie č. 23**\n\nÚloha č. 1\n\n**Charakterizujte úvahu ako slohový útvar. Nájdite v ukážke Hamlet **znaky úvahy.** Porovnajte úvahu **v umeleckom** diele s úvahou v odbornom štýle, publicistickom štýle a bežnom živote.  Zarecitujte** zvýraznenú ukážku z *Hamleta.*\n\n**Vytvorte mapu mysle **na tému *Životné hodnoty mladého človeka.*\n\nÚloha č. 2\n\n**Vysvetlite pojmy: **divadelná hra, inscenácia, tragédia. **Odlíšte pojmy monológ, dialóg, replika, vysvetlite zmysel autorskej poznámky. Analyzujte fázy vnútornej kompozície drámy. **\n\nUkážky: *Sofokles** – Antigona*\n\n* W. Shakespeare –Hamlet*\n\n* J. G. Tajovský – Statky zmätky*\n\n**Sofokles**: Antigona (úryvok)**\n\n*Antigona:* Nieto medzi nimi rozdielu pred tvárou smrti.\n\n*Kreon**: *Vždy je rozdiel medzi zlým a dobrým!\n\n*Antigona:* Ale ja som prišla na svet milovať nie nenávidieť!\n\n*Kreon**: *Ak chceš milovať – tak miluj v podsvetí!\n\n No nado mnou, kým žijem, žena vládnuť nebude!\n\n....................................................................................................\n\n*Antigona: *Chceš ešte niečo iné ako moju smrť?\n\n*Kreon**: *Nie, nechcem. Tvoja smrť mi postačí.\n\n*Antigona*\n\nČo teda váhaš? Mne sa bridí každé slovo\n\nz tvojich úst a ani nechcem, aby sa mi\n\nnebridilo, tebe sa zas iste bridí všetko\n\nna mne. Ale uznaj – čím by som si mohla\n\nzískať väčšiu slávu než tým, že som\n\npochovala brata? Títo všetci by mi dali\n\nza pravdu, no strach im zviazal jazyk.\n\nTo len tyranovi žičí šťastie okrem iného\n\ni v tom, že môže hovoriť a robiť,\n\nčo si zmyslí.\n\n**William Shakespeare: Hamlet (úryvok)**\n\nHamlet:\n\n**Byť, či nebyť – kto mi odpovie, čo šľachtí ducha viac: či trpne znášať strely a šípy zlostnej Šťasteny, či pozdvihnúť zbraň proti moru bied  a násilne ho zdolať? Umrieť, spať- nič viac, a namýšľať si, že tým spánkom sa končí srdca bôľ a stovky hrôz, čo sú nám súdené; tak umrieť, spať- či v tom je méta našich túžení? Spať - azda snívať - to nás zaráža, čo prisniť sa nám môže v spánku smrti, keď unikli sme svetským krútňavám. A človek zaváha – tie obavy  nám predlžujú strasti života. J. G. Tajovský: Statky - zmätky (úryvok) Tomáš:**\n\n- Mati, ja som ťa nechcel zarmútiť pred tými švagrovcami. Ale ty len tak na majetok sa lakomíš. Chceš vziať dievča zo služby a do horšej ho dať. Nepoznáš ich?\n\n**Kata:**\n\n- Ale takúto vec si i tí dobre rozmysleli.\n\n**Tomáš:**\n\n- I ty pomysli, že ju viažeš na celý život. Vieš, koľko už mali za svoje i z rodiny i cudzích, a ani jedno nevydržalo. Môžeš to stokrát obanovať a dievčaťu mladý život pokaziť. Ľavkovci, ako ty, idú za majetkom. Nebudú hľadieť na deti, či sa jedno druhému pozdajú a budú môcť spolu žiť. A Palčíkovci: chcú mať lacných robotníkov.\n\n - - - - - - - - - - - - - - - - - -\n\n**Kata** (*prosebne*): Dcéra moja! S planým mužom je zle, a bez neho ešte horšie.\n\n**Zuzka** (*prísne*): Mama...\n\n**Ďurko**: Čo povieš tomu dieťaťu?\n\n**Zuzka**: Nikdy ťa mu nespomeniem, ak ho bude pánboh živiť. (*Ustrnutie*.)\n\n**Ďurko**: Čo keď narastie?\n\n**Zuzka**: Že si – že si umrel. (*Všetci slzia. Prestávka*.)\n\n**Ďurko**: A keď mu druhí povedia, že žijem?\n\n**Zuzka**: Nech potom sám súdi nad tebou.","supplementary":[{"question":"Charakterizujte úvahu ako slohový útvar","answer":"**Úvaha** je slohový útvar, v ktorom **autor osobne, subjektívne premýšľa** nad nejakou otázkou, problémom alebo javom. Vyjadruje **vlastný názor**, podopretý argumentmi a príkladmi.\n\n**Znaky úvahy:**\n\n- **Subjektivita** - osobný postoj autora, jeho názory, pocity\n- **Otázky** - rečnícke aj skutočné, autor sa pýta a hľadá odpovede\n- **Argumentácia** - podporenie tvrdení dôvodmi, príkladmi\n- **Citáty, prirovnania, metafory** - obrazné vyjadrovanie\n- **Voľnejšia kompozícia** - autor odbočuje, vracia sa, asociuje\n- **Filozofický nadhľad** - hĺbka, nad-časový pohľad\n\n**Štruktúra úvahy:**\n\n1. **Úvod** - téma, podnet (citát, udalosť, otázka)\n2. **Jadro** - úvahy, argumenty, príklady, protiklady\n3. **Záver** - zhrnutie, posolstvo, otvorené otázky\n\n**Jazykové prostriedky:**\n- rečnícke otázky („Čo je vlastne šťastie?\")\n- citáty známych osobností\n- protiklady, paradoxy\n- prirovnania, metafory\n- modálne slová (možno, asi, zdá sa, určite)\n- 1. osoba (ja, my) - osobný tón\n\n**Úvaha v rôznych štýloch:**\n\n| Štýl | Charakter úvahy |\n|------|----------------|\n| **Umelecký** | Hlboké, filozofické, obrazné (Hamletov monológ - „Byť či nebyť\") |\n| **Odborný** | Logická, argumentačná, podopretá vedeckými poznatkami |\n| **Publicistický** | Aktuálna téma, presvedčivá, kratšia (komentár, fejtón) |\n| **Bežný život** | Bežné rozhovory pri rozhodovaní („Mám to urobiť?\") |\n\n**Znaky úvahy v Hamletovom monológu „Byť či nebyť\":**\n- Rečnícka otázka ako kompozičná os\n- Filozofické premýšľanie nad zmyslom života a smrti\n- Subjektívna výpoveď\n- Obrazné vyjadrenie („more strastí\", „spánok smrti\")\n- Protikladnosť (život vs. smrť, znášanie vs. boj)\n- Záverečné posolstvo - svedomie nás robí zbabelcami"},{"question":"Vytvorte mapu mysle na tému Životné hodnoty mladého človeka","answer":"**Mapa mysle (mind map)** k téme **„Životné hodnoty mladého človeka\"**:\n\n**Centrum: ŽIVOTNÉ HODNOTY MLADÉHO ČLOVEKA**\n\n**Vetvy:**\n\n**1. RODINA**\n- láska rodičov, súrodencov\n- pocit istoty\n- výchova a vzory\n- tradície, zvyky\n\n**2. PRIATEĽSTVO**\n- vernosť, dôvera\n- spoločné záľuby\n- emocionálna opora\n- zábava, oddych\n\n**3. VZDELANIE**\n- škola, štúdium\n- rozvoj vedomostí\n- príprava na povolanie\n- celoživotné učenie\n\n**4. LÁSKA A VZŤAHY**\n- partnerstvo\n- rešpekt, porozumenie\n- prvá láska\n- intimita\n\n**5. ZDRAVIE**\n- fyzické zdravie (šport, strava)\n- psychické zdravie (oddych, hobby)\n- prevencia (vyhýbanie sa drogám, alkoholu)\n\n**6. SLOBODA A NEZÁVISLOSŤ**\n- vlastné rozhodovanie\n- finančná nezávislosť\n- cestovanie, spoznávanie\n\n**7. KARIÉRA A PRÁCA**\n- vysnívaná profesia\n- realizácia talentu\n- materiálne zabezpečenie\n\n**8. MORÁLNE HODNOTY**\n- čestnosť, pravda\n- spravodlivosť\n- empatia, pomoc druhým\n- tolerancia\n\n**9. ZÁĽUBY A KREATIVITA**\n- hudba, šport, umenie\n- záľuby, koníčky\n- sebavyjadrenie\n\n**10. DUCHOVNOSŤ (pre niektorých)**\n- viera\n- hľadanie zmyslu\n- vnútorný pokoj\n\n**Záver:**\nHodnoty mladého človeka sú **dynamické** - menia sa s vekom, skúsenosťami, prostredím. Najdôležitejšie sú tie, ktoré dávajú životu **zmysel** a vedú k **harmónii medzi „ja\" a svetom**."}]},"24":{"tema_jazyk":"Oznam a správa, denník, blog, sms, e-mail","tema_lit":"Postmoderna","autori":["Umberto Eco","Dominik Tatarka"],"diela":["Meno ruže","Démon súhlasu"],"okruh_jazyk":"Sloh - publicistika/administratíva","okruh_lit":"Postmoderna","full":"Úloha č. 1\n\n**Vysvetlite rozdiel medzi **oznamom a správou**. Uveďte príklady ústnych a písaných žánrov, ktoré plnia funkciu oznamu a správy. Zaraďte tieto žánre k slohovému postupu a jazykovému štýlu.  Oznam**- vyjadruje informáciu o tom, aká udalosť sa Kde? Kedy? a Ako? uskutoční (pozvánka, inzerát, reklama, jedálny lístok-žánre)- administratívny štýl, informačný slohový postup\n\n**Správa- **základný novinársky žáner, prináša aktuálne informácie o udalosti, ktorá sa už odohrala; správa odpovedá na otázky: Kto? Kde? Kedy? Ako? Prečo; je výstižná (krátka, rozšírená, úradná, referujúca (referát), beletrizovaná (riport), dialogizovaná (rozhovor)- žánre)-publicistický štýl, informačný slohový postup\n\n**Vysvetlite funkciu a formu týchto útvarov:** *denník, diár, blog, **sms**, e-mail*. **Pripravte si e-mail, ktorý by ste poslali pani učiteľke k oslave Dňa učiteľov.**\n\n*Denník**- *obyčajne obsahuje zápisy o osobných a verejných udalostiach ovplyvňujúcich pisateľa; o udalostiach autor podáva správu väčšinou zo svojho uhla pohľadu prezentujúc vlastný názor o nich; udalosti sú spravidla opisované v chronologickom poradí v denných intervaloch, denník si nepíšeme, ale vedieme.\n\n*Diár-** *osobný zápisník; súčasť plánovania dní, týždňov, mesiacov, ktoré sú pred nami; väčšinou o veľkosti A5 (tzv. vreckové diáre)\n\n*Blog-** *internetový denník; umožňuje blogerom publikovať svoje názory, skúsenosti k určitým témam na internete\n\n*Sms**-** *služba dostupná na väčšine mobilných telefónov, ktorá umožňuje prenos krátkych textových odkazov medzi mobilnými telefónmi\n\n*e-mail- *spôsob písania, posielania a prijímania správ v elektronických komunikačných systémoch- väčšina z nich používa internet*   *\n\nÚloha č. 2\n\n**Vysvetlite **znaky postmoderny** na konkrétnom literárnom diele. Analyzujte experimenty s epickým časom, priestorom a dejom v ukážkach. Postmoderna:**\n\n- literárny a umelecký smer poslednej tretiny 20. storočia\n\n- východiskom sa stáva odmietavý postoj ku konzumnej spoločnosti; základnou požiadavkou je pluralita názorov a ich zrovnoprávnenie\n\n- **znaky:** citátovosť (dôležité je písanie už existujúcich textov); uvedenie viacerých možností, prítomnosť viacerých hľadísk a pohľadov, prelínanie viacerých žánrov a výskyt neliterárnych žánrov;\n\n- **ustálené symboly:** labyrint, múzeum, knižnica, bludisko, zrkadlo, maska, navodenie hádanky, riešenie záhady\n\n**Umberto Eco**: Meno ruže**\n\n- román možno čítať ako:\n\n- historickú detektívku- ktorá ani nie je detektívkou (autor využil iba prostriedky detektívneho románu), pričom jeho detektív, františkánsky mních William z Baskervillu, ktorý má rozlúštiť príčinu vrážd mníchov, nemôže objasniť ani dôvody, ani následky toho, čo sa v opátstve deje\n\n- filozofický román odrážajúci nezhody medzi starým a novým svetom, medzi výkladom pravdy pod zorným uhlom ustavičných zmien (William) a výkladom pravdy na základe dogiem (Jorge)\n\n- ako román o románe, lebo v texte sa nachádza veľa citácií z iných diel\n\n- symboly postmoderny: knižnica, labyrint chodieb opátstva, riešenie tajomných záhad\n\n- text sa skladá zo žánrov: traktát, proroctvo, videnie, citáty z biblie\n\n- dej románu sa odohráva v 14. storočí, kde William a Adso vyšetrujú úmrtia mníchov\n\n**Dominik Tatarka: Démon súhlasu**\n\n- v diele kritizuje politický systém (to, že ľudia sa naučili vždy a so všetkým súhlasiť bez rozmýšľania o dôsledkoch), kritizuje dosadzovanie „figúrok“ na vysoké posty, na ktoré nestačili\n\n- kritizuje pokrytectvo verejných činiteľov, ktorí sú v súkromí iní, ako na verejnosti (verejne zastávajú ideologické názory, v súkromí s nimi nesúhlasia)\n\n- kritizuje zavádzanie kultu osobnosti, lebo ľudí dosadzovali „zhora“, bez toho, aby si ich ľudia poriadne zvolili\n\n- na postave Mataja kritizuje neomylnú moc funkcionára, ktorý mohol zvážiť užitočnosť diela nejakého spisovateľa a určiť nakoľko je škodlivé, alebo prospešné; mal neobmedzenú moc na to, aby človeka vyhlásil za génia, alebo z neho urobil zradcu\n\n- rozprávačom je Bartolomej Boleráz (spisovateľ) a Valizlosť Mataj (ideologický činiteľ)- letia spolu na zjazdovú predporadu vrtuľníkom, ten havaruje a kufrík plný ideologických materiálov im odrazí hlavy; obaja sú mŕtvi a zriadenec pri odpratávaní pozostatkov zamieša ich mozgy; na pohrebe sa fiktívne prebudí spisovateľ- začne rozprávať celý príbeh (človek dnešnej doby sa naučil súhlasiť so všetkým bez toho, aby si uvedomoval zodpovednosť za čin, ktorý spáchal)","number":24,"assignment":"**Zadanie č. 24**\n\nÚloha č. 1\n\n**Vysvetlite rozdiel medzi **oznamom a správou**. Uveďte príklady ústnych a písaných žánrov, ktoré plnia funkciu oznamu a správy. Zaraďte tieto žánre k slohovému postupu a jazykovému štýlu. **\n\nVysvetlite funkciu a formu týchto útvarov: *denník, diár, blog, **sms**, e-mail*. Pripravte si e-mail, ktorý by ste poslali pani učiteľke k oslave Dňa učiteľov.\n\nÚloha č. 2\n\n**Vysvetlite **znaky postmoderny** na konkrétnom literárnom diele. Analyzujte experimenty s epickým časom, priestorom a dejom v ukážkach. **\n\nUkážky: *U. **Eco**: Meno ruže *\n\n* D. Tatarka: Démon súhlasu*\n\n**Umberto Eco**: Meno ruže**\n\n,,Hovorilo sa o smiechu,“ povedal Jorge odmerane. Pohania písali komédie, aby rozosmiali divákov, a tým páchali zlo. Náš Pán Ježiš nikdy nerozprával komédie ani bájky, ale iba jasné podobenstvá, ktoré nás obrazným spôsobom učia, ako si máme zaslúžiť raj, tak nech sa aj stane.\n\n,,Prekvapuje ma,“ povedal Viliam, ,,prečo ste taký zaujatý proti myšlienke, že by sa Ježiš mohol smiať. Ja si myslím, že smiech, tak ako aj kúpele, dobre lieči telesné šťavy a iné chorobné stavy, najmä melanchóliu.“\n\n,,Kúpele sú dobrá vec,“ povedal Jorge, a sám Akvinský ich radí ako prostriedok zaháňajúci smútok, ktorý môže byť planým utrpením, keď nepochádza zo zla, ktoré možno prekonať odvahou. Kúpeľmi sa telesné šťavy opäť dostávajú do rovnováhy. Smiech lomcuje telom, znetvoruje črty tváre, robí človeka podobným opici.\n\n,,Opice sa nesmejú, smiech je vlastný človeku, je to znak jeho rozumnosti,“ podotkol Viliam.\n\n**Dominik Tatarka: Démon súhlasu**\n\n- Zaráža ma, že i  talentovaní spisovatelia, i  spisovatelia bez talentu napísali diela, ktoré rovnako rozleptáva lož, konvencia, nepravda – nezáleží, ako pomenujeme naše spoločné omyly. – Vravím Matajovi, že i v kultúrnej tvorbe sme premárnili veľa síl, veľa talentov, veľa prostriedkov. On súhlasí.\n\nNa veľa súhlasenia, od ktorého mi bolo, akoby ma kyjom dotĺkali, odvážil som sa položiť otázku:\n\n- Ale kto je za toto všetko zodpovedný?\n\n-------------------------\n\n Nie, ani najväčším chytrákom sa nepodarí opravdivého človeka udržať v  postavení figúrky. Ale keď seba porovnávam s  opravdivým človekom (Števom Reptišom), obávam sa a  musím povedať, že ja, spisovateľ Boleráz, som ešte stále figúrkou.\n\n- Súhlasím, - prisvedčil mi Mataj.\n\n- Len uváž, súdruh Mataj, kto je tu figúrka . . .?\n\n- Súhlasím.\n\n- Figúrka je človek, ktorý v  mene svojho presvedčenia súhlasí s  tým, že ho povyšujú na miesto, na ktoré nestačí. Figúrka je úloha, ktorú človek hrá, ktorú iba hrá, zle hrá. Figúrka je úloha, v  ktorej človek hrá, že za nič nemôže, že tamhore vyššie sú činitelia, ktorí za neho myslia, rečnia, plánujú, za neho rozhodujú, za neho nesú zodpovednosť.\n\n- Správne, veľmi správne, súhlasím . . .\n\n- Súdruh činiteľ, veď ma nechaj dopovedať . . . Figúrka kedysi veril v  mene svojho presvedčenia, teraz už ani neverí. Figúrka teraz je šarža, figúrka je teraz chytrák, figúrka je maska subordinovaného chytráka alebo karieristu, figúrka je teraz výplodom pokrytectva našich čias . . .\n\n- Súhlasím.\n\n- Figúrka si môže osobne myslieť, že je takto čestný človek, ktorý sa len obratom, celkovou zmenou dostal kdesi vedľa . . .\n\n- Súhlasím.\n\n- Figúrka je Švejk socializmu. Figúrka je beštia, figúrka je nebezpečný človek, triedny nepriateľ . . .\n\n- Súhlasím.\n\n- Nesúhlas, prosím, pokús sa nesúhlasiť, nechaj ma dohovoriť.\n\n- Súhlasím, dohovor.\n\n- Figúrka som ja, figúrkou sa stal . . .\n\n- Súhlasím.\n\nMataj, svätosväte presvedčený, že ide iba o  mňa, najmä o  mňa Boleráza, a najviac ak o  niekoľkých spisovateľov, nadšene so mnou súhlasil, ba môžem povedať, dostal sa do stavu vášnivého súhlasenia v presvedčení, že ide iba o mňa.\n\nJa dokladám ako flagelant, prečo a  ako som sa stal oportunistom, posluhovačom, poskokom, človekom, ktorý sa zriekol vlastného vkusu, názorov, vlastnej tváre. On, činiteľ, čím ďalej, tým horlivejšie so mnou súhlasí. Nepobadal, že sa dal zviesť na šikmú plochu súhlasu. Ak pripustil jedno, musel so mnou ďalej nezadržateľne, gravitačne súhlasiť.","supplementary":[{"question":"Vysvetlite funkciu a formu týchto útvarov: denník, diár, blog, sms, e-mail","answer":"Tieto útvary patria k **textom osobného a komunikačného charakteru**. Líšia sa formou (písomný/digitálny), funkciou (záznam/komunikácia) aj adresátom.\n\n**1. DENNÍK**\n- **Funkcia:** osobný záznam udalostí, pocitov, myšlienok zo dňa.\n- **Forma:** chronologický záznam s dátumom; zápisky tvoria postupne celý príbeh dní.\n- **Adresát:** **autor sám** (intímna komunikácia so sebou).\n- **Štýl:** subjektívny, hovorový, expresívny.\n- **Známe denníky v literatúre:** Denník Anny Frankovej (literárny denník vojnových rokov).\n\n**2. DIÁR**\n- **Funkcia:** plánovanie a organizácia času - schôdzky, úlohy, termíny.\n- **Forma:** kalendárová štruktúra; dni/týždne/mesiace s priestorom na záznamy.\n- **Štýl:** stručný, vecný, často heslovitý.\n- **Rozdiel od denníka:** diár plánuje **budúcnosť**, denník zaznamenáva **minulosť/prítomnosť**.\n\n**3. BLOG**\n- **Funkcia:** verejné zdieľanie myšlienok, skúseností, návodov, recenzií.\n- **Forma:** webová stránka s pravidelnými článkami (postami), zoradenými od najnovších.\n- **Adresát:** **verejnosť** - širšie publikum.\n- **Štýl:** publicistický, hovorový, niekedy odborný (podľa témy).\n- **Druhy:** osobný blog, cestovateľský, módny, technologický, kulinársky.\n- **Interaktivita:** komentáre, lajky, zdieľanie.\n\n**4. SMS (Short Message Service)**\n- **Funkcia:** rýchla, krátka komunikácia medzi dvomi osobami.\n- **Forma:** **veľmi krátka** (do 160 znakov v 1 SMS), digitálna.\n- **Štýl:** hovorový, **úsporný** - používanie skratiek (napr. „dik\" = „ďakujem\"), emotikonov.\n- **Špecifiká:** chýbajú pozdravy, formálne náležitosti.\n\n**5. E-MAIL (elektronická pošta)**\n- **Funkcia:** komunikácia medzi osobami alebo organizáciami - osobná aj úradná.\n- **Forma:** štruktúrovaná - **predmet (subject), oslovenie, telo, podpis**; možnosť príloh.\n- **Štýl:** podľa adresáta - **formálny** (úradný e-mail, žiadosť) alebo **neformálny** (priateľský).\n- **Náležitosti formálneho e-mailu:**\n  - Predmet (jasný, výstižný)\n  - Oslovenie („Vážený pán riaditeľ,\")\n  - Vlastný text (jasná štruktúra)\n  - Pozdrav („S pozdravom,\")\n  - Podpis (meno, kontakt)\n\n**Porovnanie:**\n\n| Útvar | Forma | Adresát | Štýl |\n|-------|-------|---------|------|\n| Denník | písaný, chronologický | autor sám | subjektívny |\n| Diár | tabuľkový, plánovací | autor sám | vecný |\n| Blog | webový, postový | verejnosť | publicistický |\n| SMS | krátka, digitálna | 1 osoba | hovorový, úsporný |\n| E-mail | štruktúrovaný, digitálny | 1+ osôb | formálny/neformálny |\n\n**Spoločné znaky digitálnych útvarov (blog, sms, e-mail):**\n- elektronická forma\n- rýchlosť doručenia\n- možnosť priložiť obrázky/súbory\n- archivácia"}]},"25":{"tema_jazyk":"Diskusný príspevok, diskusia vs polemika vs debata","tema_lit":"Beatnici","autori":["Allen Ginsberg","Jacques Prévert","J. D. Salinger"],"diela":["Vytie","Kto chytá v žite"],"okruh_jazyk":"Sloh - diskusia","okruh_lit":"Americká povojnová literatúra - beatnici","full":"Úloha č. 1\n\n**Charakterizujte diskusný príspevok ako slohový útvar**. **Vysvetlite, aký je rozdiel medzi diskusiou, polemikou a debatou. Poukážte na rozdiel medzi argumentáciou, propagáciou a propagandou. Diskusný príspevok- **je žáner rečníckeho štýlu. Je to hybridný žáner, ovplyvnený napr. aj náučným štýlom. Patrí medzi náučné replikové útvary rečníckeho štýlu.\n\nReplikový sa nazýva preto, lebo v diskusii sa strieda viac diskutujúcich a odpovedajú na to, čo zaznelo v referáte alebo v niektorom inom diskusnom príspevku.\n\n**Diskusia** – súčasť, resp. časť programu schôdze, zasadania, pracovného stretnutia, pracovného seminára atď. Ide o súhrn všetkých diskusných príspevkov k bodom prerokovaným na schôdzi. Diskusiu vždy vedie človek poverený vedením schôdze, dáva diskutujúcim slovo, dbá na to, aby diskusia prebiehala kultivovane.\n\n**Debata** - fr.battre= byť - živý rozhovor \n\n**Polemika** - grec. polemos= vojna - útočný rozhovor\n\n**Diskusia** – pokojný rozhovor\n\n**Argumentácia: je forma komunikácie, pri ktorý sa objasňujú, zdôvodňujú postoje názory konkrétne čina a pod. Najčastejšie argumentujeme, keď potrebujeme niečo dokázať, keď potrebujeme presvedčiť niekoho , či presadiť svoj názor či myšlienku.\n\n**Propagác**ia**:** verejné oznamovanie, odporúčanie, daného produktu, služby či inaj záujmovej činoosti ktorú predkladáme, verejnosti.\n\n**Propaganda **: verejné šírenie, často demagogické zavádzanie, presadzovanie, odporúčanie nejakých myšlienok, názorov a pod. s cieľom získať dlhodobo prívržencov. Sprievodným javom propagandy je často skresľovanie faktov. Propaganda zvykne vytvárať zdanie vyššieho cieľa, využíva ľudské vášne, strach a nenávisť.\n\n**Pripravte a predneste krátky diskusný príspevok, v ktorom kriticky zhodnotíte čitateľskú úroveň žiakov gymnázia. **(minimálne 6 viet)\n\nVážení maturitná komisia!\n\n..Dovoľte mi zareagovať na danú tému ktorú posledných pár minút preberáme.\n\nMyslím si že čitateľská úroveň našich žiakov klesla na bod mrazu. A to do slova. Ľudia prestávajú čítať. Naši milí spolužiaci z nižších ročníkov ani nepoznajú príbehy slávnych pátračov, či známe povesti a legendy o mieste kde žijeme. Naozaj sa dá povedať že strácame nie len, ľudí s fantáziou a kreativitou, ktorú títo ľudia majú, ale zhoršuje sa u nich aj gramotnosť, či používanie spisovného jazyka.\n\nNechcel by som však spochybňovať názor môjho predchodcu.\n\nNapriek tomu je to môj názor.\n\nĎakujem za slovo.\n\nÚloha č. 2\n\n**Charakterizujte tvorbu **beatnikov**. Porovnajte literárny prejav povojnovej mládeže so súčasnou. Vysvetlite vzťah autorov k životu v ukážkach.**\n\nObdobie: Po vojne, 50-60 roky.\n\nBaníci ktorí písali, šlo hlavne o slobode, o nezávislosti, individualizmus, o to aby ich meštiansky život nepohltil ...\n\nPoézia bola určená k prednesu na verejnosti . (krčma , bare ...)\n\n* Ginsbe**r**g** písal poéziu vlastného utrpenia\n\n**Salinger** -** bol veľmi vzdelaný , mal viacero VS, prežil 2 sv. takže môj názor je že ho to aj trošku poznačilo v literatúre .. napísal psychologicky román Kto chytá v žite aj poviedky.\n\nPatril k básnikom ktorý opisovali mládež.\n\n**J. D. **Salinger**: Kto chytá v žite Jerome David Salinger** - **Kto chytá v žite Literárny druh: *epika \n**Literárny žáner: *román\n**Literárne obdobie: *Americká literatúra dvadsiateho storočia\n\n**Postavy: Holden Caulfield, Phoebe Caulfieldová, Sally, Jane, Antolini, Stradlater, Auckley, Spencer \n**Kompozícia: *sa člení na 26 kapitol označených číslami\nTéma: 3 dni Holdena, ktoré prežil v New Yorku, keď ho vyhodili zo školy. \n**Idea: *Tento román je o hľadaní a nachádzaní ľudských hodnôt.\n**Miesto a čas deja: *Pencey, New York, rok 1945, tri dni pred Vianocami\n \n**Hlavnou postavou je *sedemnásť ročný chlapec, Holden Caulfield, ktorý je zároveň aj rozprávačom deja. Hrdina je rozpolená osobnosť, sám nevie čo chce, nemá rád školu, ľudí a dá sa povedať, že aj celý svet. \n \nPhoebe-  opisuje ju ako veľmi múdre a šikovné dievča, esaťročné rozkošné dievčatko, ktoré miluje svojho brata Holdena\nBratia- Ďalej svojich dvoch bratov D. B. a Allieho. Starší D. B. pracuje v Hollywoode a píše filmy a mladší brat Allie zomrel na leukémiu. D.B. ako vojak zažil 2.svetovú vojnu. Armádu nenávidel viac ako vojnu. Vrátil sa domov obratý o všetky ideály. Je talentovaným spisovateľom, ale ako mnohí iní obetoval ideály a odišiel do Holywoodu za slávou a pôžitkami.\nSTRADLATER je jeho spolubývajúci. Vyniká krásou, citový život vníma ako flirt. Chce si získať povesť lámača sŕdc. Je typom nevyrovnaného človeka. Na prvé miesto kladie pôžitok a nie lásku.  V HC sa vytvorí voči nemu pocit hnusu. Dochádza k bitke, pretože S si začne s HC dávnou láskou JANE, uvedomuje si, že sa stane jednou s jeho mnohých. HC sa obáva, že jej ublíži a využije ju.  \nROBERT ACKLEY- bol čudák, nedbal o hygienu, všade chcel byť, všetko chcel vedieť, bol neodbytný. Ľudia ho nemali radi, pretože si vyžadoval stálu pozornosť \n \n**Jazyk: román je písaný hovorovým jazykom –násťročných vrátane vulgarizmov. Rozprávanie obsahuje množstvo dialógov, vnútorných komentárov rôznych situácií a prejavov ostatných Je to pôvabný príbeh napísaný sviežim tínedžerským slangom.\n \n**Podstata diela:** Chlapčenská nevyrovnanosť a trápenie medzi predstavami mladosti a svetáctvom dospelosti vedie Holdena k protikladným rozhodnutiam. Je zhnusený svetom dospelých, ktorých považuje za pokrytcov, a citovoje pripútaný k malým deťom, ktoré chce chrániť pred zlobou.\"Proste, ja si v jednom kuse predstavujem ,ako sa davy malých deciek hrajú na takom velikánskom žitnom poli.","number":25,"assignment":"**Zadanie č. 25**\n\nÚloha č. 1\n\n**Charakterizujte diskusný príspevok ako slohový útvar**. **Vysvetlite, aký je rozdiel medzi diskusiou, polemikou a debatou. Poukážte na rozdiel medzi argumentáciou, propagáciou a propagandou. Pripravte a predneste krátky diskusný príspevok, v ktorom kriticky zhodnotíte čitateľskú úroveň žiakov gymnázia. **(minimálne 6 viet)\n\nÚloha č. 2\n\n**Charakterizujte tvorbu **beatnikov**. Porovnajte literárny prejav povojnovej mládeže so súčasnou. Vysvetlite vzťah autorov k životu v ukážkach.**\n\nUkážky*: **Allen Ginsberg*\n\n* J. **Prévert*\n\n* J. D. **Salinger**: Kto chytá v žite*\n\n**Allen Ginsberg**: Vytie**\n\nVidel som najlepšie hlavy svojej generácie zničené šialenstvom,\n\nv hlade hystericky obnažené,\n\nvlečúce sa černošskými ulicami na svitaní a hľadajúce dávku drogy\n\nhipsterov s anjelskými hlavami, túžiacich po prastarom nebeskom\n\nspojení s hviezdnym dynamom v mašinérii noci,\n\nktorí v chudobe a handrách, s prázdnymi očami,\n\nspití sedávali a fajčili v nadprirodzenej tme bytov so studenou\n\nvodou, vznášali sa nad vrcholkami veľkomiest a rozjímali o džeze,\n\nktorí obnažili svoje mozgy Nebesám pod nadzemnou železnicou a uzreli\n\nmohamedánskych anjelov, v žiare balansujúcich po strechách činžiakov,\n\nktorí prechádzali univerzitami so žiariacimi chladnými očami, halucinujúc\n\no Arkansase a tragédii Blakeovho svetla medzi vojnovými špecialistami,\n\nktorí boli vylúčení z akadémií pre bláznovstvo & publikovanie\n\nobscénnych ód na oknách lebky,\n\nktorí sa krčili strachom v neoholených izbách iba v bielizni, spaľovali\n\npeniaze v odpadkových košoch a cez stenu načúvali Hrôze,\n\nktorých nakopali do brady na ohanbí, keď sa vracali cez Laredo\n\ns opaskami marihuany pre New York...\n\n**Jacques Prévert**: Pre teba moja láska**\n\nIšiel som na trh na vtákov\n\n A nakúpil som vtákov\n\n Pre teba\n\n moja láska\n\nIšiel som na trh na kvetiny\n\n A nakúpil som kvetiny\n\n Pre teba\n\n moja láska\n\nIšiel som na trh na železo\n\n A nakúpil som reťaze\n\n Ťažké reťaze\n\n Pre teba\n\n moja láska\n\nA potom šiel som na trh na otrokov\n\n A hľadal som ťa\n\n Lež som ťa nenašiel\n\n moja láska\n\n**Lawrence Ferlinghetti**: Obrazy zmiznutého sveta (úryvok)**\n\n Svet je ohromné miesto\n\n kam sa narodiť\n\nak je vám fuk že niektorí ľudia umierajú\n\n celý ten čas\n\n alebo možno len hladujú\n\n sem-tam\n\n čo koniec koncov nie je také zlé\n\n kým sa to netýka vás\n\n..............................................................................\n\nÁno svet je najlepšie zo všetkých miest\n\n kde možno stvárať také kadečo\n\n ako sú samopašné výčiny\n\n a ľúbostné výčiny\n\na tragické výčiny\n\n.............................................................................\n\n a chodiť sa kúpať do rieky\n\nna výlete\n\n v lete\n\n a vôbec len tak\n\n „sa vyžívať“\n\nÁno\n\n ale práve vtedy keď sa rozbehnete\n\n príde usmievavý\n\n pohrebník\n\n**J. D. **Salinger**: Kto chytá v žite**\n\nAk to fakt chcete počúvať, predovšetkým asi budete chcieť vedieť, kde som sa narodil, aké som mal detstvo, čo robili moji rodičia pred mojím narodením a podobné kraviny podľa vzoru Davida Copperfielda, ale aby som vám pravdu povedal, vôbec sa mi o tom nechce rozprávať..\n\nPorozprávam vám len o tých bláznivých dňoch vlani okolo Vianoc, keď som sa zosypal, musel prísť sem a dať si pohov. Viac som nepovedal ani D. B., a to je náhodou môj brat. Teraz je v Hollywoode. Nie je to od tejto nemožnej diery tak ďaleko, a tak sem za mnou chodí skoro každý víkend. Odvezie ma aj domov. Na budúci mesiac možno už odtiaľto vypadnem. Práve si kúpil jaguára. To malé anglické fáro... Bohovsky drahý špás, dal zaň skoro štyri tisícky. Má fúru prachov, teraz. Predtým nemal. Keď bol ešte doma, bol len obyčajný spisovateľ. Napísal perfektnú knihu poviedok Tajná zlatá rybka... To je o jednom šracovi, čo nechcel nikomu ukázať svoju zlatú rybku, lebo si ju kúpil za vlastné peniaze. Na umretie!\n\nZačnem od toho dňa, keď som odchádzal z Pencey. Pencey je súkromná stredná škola v Agerstowne v štáte Pensylvánia.....\n\n......................\n\nZabudol som vám to povedať. Vyliali ma. Po prázdninách som sa už nemal vrátiť, lebo som prepadol zo štyroch predmetov, nesnažil som sa a vôbec... Pencey je veľmi náročná škola.\n\n,,No asi to rodičov dosť naštve,“ povedal som. ,,Nabetón. Toto je už asi štvrtá škola, do ktorej chodím.“ Pokrútil som hlavou. Ja veľmi často krútim hlavou. ,,Bohatstvo!“ povedal som. Aj to bohatstvo často hovorím. Jednak mám mizernú slovnú zásobu, a jednak sa občas na svoj vek správam príšerne detsky.\n\nStarý Spencer začal znova kyvkať hlavou.\n\n,, Pred niekoľkými týždňami som mal tú česť poznať tvoju mamičku a otecka... Sú to skvelí ľudia.“\n\n,,Áno, sú veľmi fajn.“\n\nSkvelí. Nenávidím to slovo. Znie strašne falošne. Je mi na grcanie , keď ho počujem.","supplementary":[{"question":"Charakterizujte diskusný príspevok ako slohový útvar","answer":"**Diskusný príspevok** je slohový útvar (ústny alebo písaný), v ktorom autor vyjadruje **svoj názor, postoj alebo stanovisko** v rámci **diskusie** o určitej téme alebo probléme.\n\n**Znaky diskusného príspevku:**\n\n- **Krátkosť, vecnosť** - sústredí sa na jeden aspekt problému\n- **Argumentácia** - obhajuje názor dôvodmi, faktami, príkladmi\n- **Subjektivita s podloženým názorom** - vyjadruje osobný postoj, ale s logickou oporou\n- **Reakcia na ostatné príspevky** - nadväzuje, súhlasí, nesúhlasí\n- **Cieľ presvedčiť** - racionálnou argumentáciou, nie emóciami\n- **Slušná, kultivovaná forma** - rešpektovanie partnera\n\n**Štruktúra:**\n\n1. **Úvod** - oslovenie, nadviazanie na predchádzajúceho rečníka, vymedzenie postoja\n2. **Jadro** - argumenty, fakty, príklady, prípadne protiargumenty\n3. **Záver** - zhrnutie postoja, výzva, otázka, návrh riešenia\n\n**Jazykové prostriedky:**\n- **Spojkové výrazy** označujúce postoj: „myslím si, že...\", „som presvedčený...\", „nesúhlasím s...\"\n- **Argumentačné spojky:** „pretože\", „preto\", „lebo\", „napriek tomu\", „na druhej strane\"\n- **Príkladové spojky:** „napríklad\", „uvediem prípad\", „dokladá to...\"\n- **Spisovný jazyk** s prvkami rečníckeho štýlu\n- **Otázky** - rečnícke, na zamyslenie\n\n**Pravidlá kultivovanej diskusie:**\n\n- Hovoriť **vecne, neurážať**\n- **Počúvať** ostatných\n- Argumentovať **logicky**, nie emocionálne\n- **Nepretrhávať** rečníka\n- Pripustiť aj **iný názor**\n- Dodržať **stanovený čas**\n- Reagovať **k téme**, nie odbočovať\n\n**Rozdiel diskusie a hádky:**\n- **Diskusia** - rešpekt, hľadanie pravdy, argumenty\n- **Hádka** - emócie, presadzovanie, urážky\n\n**Rozdiel diskusie a polemiky:**\n- **Diskusia** - výmena názorov, hľadanie spoločného riešenia\n- **Polemika** - ostrá konfrontácia, vyvrátenie protivníkového názoru\n\n**Príklady situácií, kde sa využíva diskusný príspevok:**\n- triedne diskusie, parlamentné debaty\n- okrúhle stoly v médiách\n- online diskusie pod článkami\n- besedy s autormi, odborníkmi\n- akademické konferencie"}]},"26":{"tema_jazyk":"Indoeurópska skupina, slovanské jazyky","tema_lit":"Antika, stredovek, humanizmus a renesancia","autori":["Homér","Konštantín (Filozof)","Boccaccio","Cervantes"],"diela":["Ilias","Proglas","Moravsko-panónske legendy","Decameron","Don Quijote"],"okruh_jazyk":"Slovanské jazyky","okruh_lit":"Staršia svetová literatúra","full":"Úloha č. 1\n\n**Charakterizujte indoeurópsku jazykovú skupinu. Zaraďte slovenčinu do systému **slovanských jazykov**.  Indoeurópske jazyky** (zastarano *indogermánske** jazyky*) tvoria najrozšírenejšiu [jazykovú rodinu](https://sk.wikipedia.org/wiki/Jazykov%C3%A1_rodina) na svete, ako materinskou rečou hovoria niektorým z nich asi 2,5 miliardy ľudí. Vyvíjali sa spoločne v rozsiahlych oblastiach [Eurázie](https://sk.wikipedia.org/wiki/Eur%C3%A1zia) z predpokladaného [indoeurópskeho prajazyka](https://sk.wikipedia.org/wiki/Indoeur%C3%B3psky_prajazyk). Za ťažisko a oblasť vzniku prajazyku sa považujú stepi v dnešnom [juhozápadnom](https://sk.wikipedia.org/wiki/Juhoz%C3%A1pad) [Rusku](https://sk.wikipedia.org/wiki/Rusko) a [Ukrajine](https://sk.wikipedia.org/wiki/Ukrajina). Výskum indoeurópskych jazykov sa uskutočňuje v rámci indoeuropeistiky.\n\nO vzniku indoeurópskych jazykov pozri [indoeurópsky prajazyk](https://sk.wikipedia.org/wiki/Indoeur%C3%B3psky_prajazyk).\n\n**Slovenčina : **patrí do Slovanskej vetvy indoeurópskeho prajazyku, konkrétne do západoslovanskej vetvy, patria tu : Poľština, čeština, slovenčina, Lužičština.\n\n**Porovnajte slovenčinu s vybraným cudzím jazykom** /*angličtina, nemčina, francúzština, ruština, čeština/.* Ktoré jazykové prostriedky slovenčiny sú podľa vás náročné pre cu
