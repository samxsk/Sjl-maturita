amlčaný podmet- on)\n\n blýska s","17":"plnovýznamové slov. druhy (slovesá, príslovky, číslovky) dramatické dielo - stvárnenie postáv morfológia - slovesá slovenská dráma 20. storočia ivan stodola július barč ivan ivan bukovčan bačova žena matka kým kohút nezaspieva úloha č. 1\n\ncharakterizujte plnovýznamové slovné druhy, vysvetlite slovesá, príslovky a číslovky.\n\n plnovýznamové slovné druhy- sú také slovné druhy, ktoré majú lexikálny význam\n\n slovesá:\n\n - plnovýznamový slovný druh, majú vetnočlenskú platnosť\n\n - ohybný slovný druh (časujú sa)\n\n - tvar:\n\n - určitý- dajú sa určiť slovesné gramatické kategórie (napr. pracujem- 1. osoba, singulár, prítomný čas, oznamovací spôsob, činný rod, nedokonavý vid)\n\n - neurčitý- nedajú sa určiť slovesné gramatické kategórie (niekedy sa nedá určiť žiadna, niekedy sa niektoré dajú určiť- napr. pracovať [nedokonavý vid]); medzi neurčité slovesné tvary patria:\n\n - neurčitok (napr. volať, písať, kresliť, a pod.)\n\n - prechodník (napr. volajúc, píšuc, kresliac, a pod.- t. j. k tvaru 3. osoby množného čísla sa pridá –c; má iba jeden tvar, čiže sa nedá skloňovať)\n\n - činné príčastie prítomné (napr. volajúci, píšuci, kresliaci, a pod.- tvorí sa od nedokonavých slovies- k tvaru3. osoby množného čísla v prítomnom čase sa pridá –ci)\n\n - činné príčastie minulé (napr. privolavší- tvorí sa od dokonavých slovies, a to tak, že sa od tvaru neurčitku odoberie prípona –ť a pridá sa prípona –vší, -všia, -všie; dnes sa tento tvar pociťuje v texte ako zastaraný)\n\n - trpné príčastie (napr. nesený, volaný, siaty, a pod.- tvorí sa od nedokonavých slovies, a to tak, že sa od tvaru neurčitku odoberie prípona –ť a pridá sa prípona [akú majú prídavné mená] –ený, -ená, -ené/ -ný, -ná, -né/ -tý, -tá, -té)\n\n - slovesné podstatné meno (napr. volanie, nesenie, siatie, a pod.- tvorí sa od základu trpného príčastia príponou –ie; skloňuje sa podľa vzoru vysvedčenie)\n\n - jednoduchý- je vyjadrený jedným slovom (napr. prídu, sedíme, čítal, a pod.)\n\n - zložený- je vyjadrený viacerými slovami (napr. chcem prísť, boli by sme sedeli, budem čítať, a pod.)\n\n - rozdelenie:\n\n - zvratné- súčasťou ich tvarov je vždy zvratné zámeno (napr. učiť, sa, budem sa učiť, učila som sa, smiať sa, smeješ sa, smiali sa, a pod.)\n\n - nezvratné- súčasťou ic","18":"klasifikácia viet podľa zloženia, súvetia prúd autorovho vedomia, voľné asociácie syntax - súvetia moderná netradičná próza dušan dušek j. c. hronský james joyce franz kafka kufor na sny pisár gráč odyseus premena úloha č. 1\n\nvysvetlite, čo je to veta a klasifikujte vety podľa zloženia.\n\n veta:\n\n - je základná jednotka komunikácie\n\n - vyjadruje ucelenú myšlienku, pričom je zvukovo (intonačne) a gramaticky usporiadaným celkom\n\n - rozdelenie:\n\n - jednoduchá (má práve 1 prisudzovací sklad):\n\n - holá- obsahuje len hlavné vetné členy\n\n - rozvitá- obsahuje aspoň 1 rozvíjací vetný člen\n\n - jednočlenná (nedá sa rozčleniť na prísudkovú a podmetovú časť):\n\n - slovesná- vetný základ je vyjadrený slovesom\n\n - neslovesná- vetný základ nie je vyjadrený slovesom\n\n - dvojčlenná (dá sa rozčleniť na podmetovú a prísudkovú časť):\n\n - úplná- má vyjadrený aj podmet\n\n - neúplná- nemá vyjadrený podmet, ale je vyjadriteľný\n\n - súvetie- zložená veta (má aspoň 2 prisudzovacie sklady)\n\n - jednoduché (má práve 2 prisudzovacie sklady):\n\n - priraďovacie (2 gramaticky rovnocenné vety):\n\n - zlučovacie- deje prebiehajú súčasne, alebo tesne za sebou\n\n - stupňovacie- obsah jednej vety stupňuje obsah druhej vety\n\n - odporovacie- obsah jednej vety odporuje obsahu druhej vety\n\n - vylučovacie- obsah jednej vety vylučuje obsah druhej vety\n\n - dôvodové- obsah druhej vety vysvetľuje príčinu, alebo motív deja prvej vety\n\n - dôsledkové- obsah druhej vety vyjadruje dôsledok, alebo myšlienkový záver prvej vety\n\n - podraďovacie (1 veta je nadradená [hlavná] a 1 je podradená [vedľajšia]):\n\n - s prísudkovou vedľajšou vetou\n\n - s podmetovou vedľajšou vetou\n\n - s predmetovou vedľajšou vetou\n\n - s príslovkovou vedľajšou vetou (miestnou, časovou, spôsobovou, príčinnou)\n\n - s prívlastkovou vedľajšou vetou\n\n - s doplnkovou vedľajšou vetou\n\n - zložené (má aspoň 3 prisudzovacie sklady)\n\n\n\n\n\nurčite v ukážkach pes a pisár gráč vety označené iným typom písma (kurzívou) a určite typ súvetia.\n\n sused má psa, ktorý nevie, že je blázon.-\n\n musím dávať pozor, ináč mi hneď vojdú do cesty.-\n\n sedí pod ním, vrtí chvostom tak, že zametá zem a zamilovane pozerá na svojho bláznivého pána.-\n\n zahnú za roh a vojdu mi do cesty.-\n\n ráčte ho prijať a","19":"nepravidelnosti vetnej stavby (výpustka, vsuvka, prístavok...) absurdná dráma syntax - osobitosti absurdná dráma m. lasica + j. satinský samuel beckett václav havel nečakanie na godota čakanie na godota zahradní slavnost úloha č. 1\n\nvysvetlite nepravidelnosti v stavbe vety a určite: vytýčený vetný člen, pripojený vetný člen, osamostatnený vetný člen, výpustku, neukončenú výpoveď, vsuvku, prístavok. mladosť – pochabosť. jednotka, tá ešte neznamená úspech v živote. vrátili sme sa z výletu, včera. hora spievala chorál. ticho a nábožne. prišlo mi ľúto, že som sa s dorou... pes, verný priateľ človeka, čakal pred domom. remeslo má zlaté dno, ako vravievala stará mama.\n\n nepravidelnosti v stavbe vety:\n\n - nachádzajú sa v spontánnych ústnych jazykových prejavoch, ktoré bezprostredne plynú v čase a priestore a hovoriaci nemá čas na dôkladnejšie spracovanie myšlienkového obsahu, ani na dokonalú syntaktickú stavbu výpovede\n\n - majú modifikovanú pravidelnú vetnú štruktúru\n\n - k modifikácii dochádza z objektívnych i subjektívnych príčin a to v ústnych i písaných textoch\n\n - apoziopéza (nedokončená, prerušená výpoveď)- je to násilne prerušená, alebo zo subjektívnych príčin formálne a významovo neuzavretá, neukončená výpoveď; nevyjadrená časť výpovede je jadro výpovede (napr. chcel som prísť, ale...)\n\n - proziopéza- vynecháva sa v nej začiatok výpovede, spravidla tak, že sa nevyslovia začiatočné slabiky prvého slova, a to pod tlakom času, z nedbanlivosti, prípadne z etnických príčin (napr. brý deň!; ...si myslím, že...)\n\n - prerývaná výpoveď- graficky rozčlenená, ale na rozdiel od apozipézy formálne a významovo uzavretá syntaktická jednotka; miesta prerušenia sa graficky signalizujú troma bodkami a intonačne neskončenou prestávkou, pričom sa môže aktualizovať aj melódia, prípadne dôraz (napr. ...a ja som si myslela, že... a on tiež... a teraz som takto ostala.)\n\n - vytýčený (vysunutý) vetný člen- je to výraz zložený z menného základu a zámena, ktoré ako synonymum zdôrazňuje predchádzajúce slovo (napr. jahody, tie si dám vždy rada.)\n\n - osamostatnený vetný člen- vzniká vyňatím z vety, a to jeho postavením, ako samostatného dodatku k vete (napr. prekvapil si ma. nemilo); je to výraz, ktorý je formál","20":"administratívny štýl chronologický a retrospektívny kompozičný postup sloh - administratívny štýl slovenská próza po 1945 alfonz bednár ladislav mňačko kolíska ako chutí moc smrť sa volá engelchen úloha č. 1\n\ncharakterizujte administratívny štýl. vymenujte administratívne žánre (útvary), ktoré poznáte a ktoré z nich môžu mať predtlač.\n\n- administratívny štýl- má viacero spoločných vlastností s náučným štýlom; ide o oficiálny štýl verejného styku, ktorý sa používa na komunikáciu medzi občanom a úradom, alebo úradmi navzájom (vo verejnej správe, v službách, v advokácii,...)\n\n- znaky:\n\n- písomnosť- prevažuje písomná forma, ktorú upravujú stn, prevažujú zložené súvetia, oznamovacie vety\n\n- verejnosť, adresnosť- štýl verejného styku, úradnej komunikácie; niektoré z nich majú svojho adresáta\n\n- presnosť, pojmovosť- slová bez citového zafarbenia, opakuje sa niekoľko konštrukcií, ustálené slovné spojenia a združené pomenovania, kancelarizmy\n\n- schematickosť- objektívny štýl, nachádzajú sa tu viaceré slohové postupy\n\n- administratívne texty sú väčšinou monologické a písomné (môžu mať aj ústnu podobu- vopred pripravená, len ústne prednesená); sú objektívne a neosobné, ich obsah musí byť jednoznačný a vecný\n\n- cieľom je predovšetkým čo najefektívnejšia, najrýchlejšia a najpresnejšia komunikácia (komunikatívna funkcia)\n\n- žánre:\n\n- dokumentárne- zápisnica, protokol, potvrdenka, zmluva, rezolúcia, záväzok, zmenka, splnomocnenie, dlžobný úpis\n\n- oznamovacie- vyhláška, oznámenie, hlásenie, správa o činnosti, úradný prípis, oficiálne pozvánka, žiadosť, prihláška, reklamácia, urgencia, sprievodný list, objednávka, inzerát, telegram, upomienka, dotazník, ponuka služieb\n\n- heslové- vysvedčenie, štruktúrovaný životopis, diplom, faktúra, tlačivá (poštové, dopravné, bankové), cestovné príkazy\n\n- predtlač môžu mať: potvrdenka, prihláška, dotazník, vysvedčenie, diplom, tlačivá\n\nvysvetlite, aký by bol rozdiel pri vypracovaní objednávky, reklamácie a motivačného listu v porovnaní so žiadosťou.\n\n objednávka: je v nej názov firmy, údaje o firme, údaje o objednávateľovi, číslo a dátum objednávky, popis objednávaného tovaru, množstvo a cena, dodacie a platobné podmienky, telefón/mail, pod","21":"homonymá, synonymá, antonymá, frazeologizmy súčasná poézia, populárna pieseň lexikológia - vzťahy slov súčasná slovenská poézia miroslav válek milan rúfus milan lasica jozef urban jablko domov sú ruky... úloha č. 1\n\nvysvetlite na príkladoch pojmy homonymá, synonymá, antonymá, združené pomenovania frazeologické zvraty.\n\n homonymá- sú to slová, ktoré rovnako znejú, ale majú rôzny význam (napr. koruna- platidlo, koruna stromu; zámok- zabezpečovacie zariadenie, sídlo v minulosti; čelo- hudobný nástroj, časť tváre, a pod.)\n\n synonymá- sú to slová, ktoré rôzne znejú, ale majú rovnaký význam (napr. plakať, nariekať, bedákať)\n\n antonymá- sú to slová s opačným významom (deň-noc, veľa-málo, teplo-zima, a pod.)\n\n združené pomenovania- sú to ustálené slovné spojenia, ktoré ako jeden celok vyjadrujú jeden pojem (napr. triedna kniha, ľahká atletika, zoologická záhrada, a pod.)\n\n frazeologické zvraty-  frazémy (slovesné syntagmy) so slovesnou syntagmatickou stavbou; majú slovesnú povahu ale nie vetnú - často krát sa zamieňajú s frázami (napr. roniť krokodílie slzy, píliť uši niekomu, smrdieť grošom, mať rozum za groš, nemať za groš rozumu, nosiť sovy do atén, liať vodu do mora, nosiť drevo do hory)\n\n\n\nroztrieďte nasledujúce frazeologizmy podľa pôvodu - ľudové, prevzaté z biblie, mytológie, z literatúry, z histórie. vysvetlite ich význam: achillova päta, leží ako lazár, babylonská veža, bojovať proti veterným mlynom, sizyfovská práca, tri svätoplukove prúty, keď ste si ma upiekli, tak si ma zjedzte. bez práce nie sú koláče. studený máj, v stodole raj.\n\n achillova päta- z mytológie\n\n leží ako lazár- z biblie\n\n babylonská veža- z biblie\n\n bojovať proti veterným mlynom- literárne\n\n sizyfovská práca- z mytológie\n\n tri svätoplukove prúty- z histórie\n\n keď ste si ma upiekli, tak si ma zjedzte.- literárne\n\n bez práce nie sú koláče.- ľudové\n\n studený máj, v stodole raj.- ľudové\n\n\n\núloha č. 2\n\nvysvetlite tematické východiská tvorby uvedených autorov (súčasná poézia, populárna pieseň). analyzujte výrazné štylistické prvky a interpretujte lyrické posolstvá básní.\n\n súčasná lyrická poézia:\n\n milan rúfus:\n\n - pochádzal z remeselníckej rodiny, študoval slovenčinu a dejepis, pracoval ako vysokošk","22":"samohlásky a spoluhlásky, spodobovanie spoločenská a ľúbostná lyrika fonetika - hlásky lyrika - spoločenská a ľúbostná ján kollár andrej sládkovič j. smrek e. b. lukáč j. kostra slávy dcéra marína dievča v rozkvete ave eva úloha č. 1\n\nvysvetlite rozdelenie samohlások a význam delenia spoluhlások pre slovenský pravopis. nájdite a vysvetlite v ukážkach (marína, dievča v rozkvete, ave eva) príklady na spodobovanie a výslovnosť zdvojených spoluhlások.\n\n samohlásky:\n\n - krátke: a, e, i, o, u, ä\n\n - dlhé: á, é, í, ó, ú\n\n - dvojhlásky: ia, ie, iu, ô\n\n spoluhlásky:\n\n - podľa vplyvu na pravopis:\n\n - tvrdé: h, ch, k, g, d, t, n, l- po nich sa v domácich slovách píše y/ý\n\n - mäkké: č, dž, š, ž, c, dz, j, ď, ť, ň, ľ- po nich sa v domácich slovách píše i/í\n\n - obojaké: b, m, p, r, s, v, z, f- po nich sa zvyčajne píše i/í, vo vybraných slovách y/ý\n\n - podľa znelosti:\n\n - znelé párové: b, d, ď, g, dz, dž, z, ž, h,v\n\n - neznelé párové: p, t, ť, k, c, č. s, š, ch, f\n\n - neznelé nepárové: m, n, ň, l, ľ, ĺ, r, ŕ, j\n\n spodobovanie, výslovnosť zdvojených spoluhlások:\n\n nad obraz [nat obras]\n\n dievča v rozkvete [dieuča v roskvete]\n\n k hriechu i k modlitbe [g hriechu, g modlidbe]\n\n búria k nebezpečnej hre [búria g nebezpečnej hre]\n\naký rozdiel je medzi zvukomaľbou a ľubozvučnosťou, využite vlastné príklady a príklady z ukážok.\n\n zvukomaľba:\n\n - napodobňovanie zvuku vhodným využitím a spojením hlások v slovách\n\n - autor sa snaží výberom zvukov zachytiť zvuk, či atmosféru zobrazovaného javu (napr. duní dunaj a luna za lunou sa valí)\n\n - zvukomalebné slová sa nazývajú onomatopoje- napodobňujú prírodné a pracovné zvuky- používajú sa opakovane (napr. bum-bum-bum, bim-bam-bom, cingi-lingi-bom)\n\n ľubozvučnosť (eufónia):\n\n - je umelecky pôsobivé usporiadanie hlások, ktoré vyvoláva estetický zážitok\n\n - zakladá sa na opakovaní hlások, slabík, alebo skupiny hlások\n\n - autor zámerne využíva a organizuje zvukové vlastnosti hlások, skupín hlások, na dosiahnutie emocionálnosti a expresívnosti textu\n\n - opakom je kakofónia- výslovnostne ťažké zoskupenie hlások a slov\n\n\n\núloha č. 2\n\nvysvetlite pojmy spoločenská lyrika a ľúbostná lyrika a vysvetlite zameranie uvedených ukážok.\n\n lyrika:\n\n - literárny druh, ktorý nemá dej\n\n ","23":"úvaha ako slohový útvar tragédia, dráma - kompozícia, monológ/dialóg sloh - úvaha antická a alžbetínska dráma sofokles w. shakespeare j. g. tajovský antigona hamlet statky-zmätky úloha č. 1\n\ncharakterizujte úvahu ako slohový útvar. nájdite v ukážke hamlet znaky úvahy. porovnajte úvahu v umeleckom diele s úvahou v odbornom štýle, publicistickom štýle a bežnom živote.\n\n úvaha v ukážke hamlet- keď rieši otázku „byť, či nebyť?“; ďalej sa pýta na rôzne otázky\n\n porovnanie úvah:\n\n - pri porovnaní úvahy v umeleckom diele s úvahou v odbornom štýle zistíme, že v úvahe v odbornom štýle prevládajú odborné termíny, pričom v umeleckom prevládajú rečnícke otázky, voľnejšia kompozícia a štylizácia\n\n - uvažovanie v bežnom živote vzniká na základe poznatkov a skúseností, nad ktorými uvažujeme, rozoberáme ich, hodnotíme a vyvodzujeme z nich závery\n\nzarecitujte zvýraznenú ukážku z hamleta.\n\nvytvorte mapu mysle na tému životné hodnoty mladého človeka.\n\núloha č. 2\n\nvysvetlite pojmy: divadelná hra, inscenácia, tragédia. odlíšte pojmy monológ, dialóg, replika, vysvetlite zmysel autorskej poznámky. analyzujte fázy vnútornej kompozície drámy.\n\n divadelná hra: audiovizuálne umenie s dôrazom na sluchové vnímanie textu, pričom zrakové vnímanie je druhotné\n\n inscenácia: premena literárneho diela na divadelnú, alebo televíznu hru; na jej realizácii sa zúčastňuje viacero zložiek (literárna predloha, herci, réžia,...); jednotný umelecký zámer jej dáva režisér, no divák hru prijíma prostredníctvom hercov, ktorí ju oživujú, stvárňujú a dávajú jej konečnú podobu\n\n tragédia: vznikla v antike- najstarší dramatický žáner , v ktorom sa konflikt deja nedá vyriešiť inak, ako smrťou postavy, alebo postáv; hlavným znakom je boj hlavnej postavy s nepriateľskými silami (končí tragicky, hlavným hrdinom je zväčša nadpriemerný človek)\n\n monológ: prehovor jednej postavy, v dráme slúži na komentovanie udalostí; oslabuje dramatickú účinnosť hry\n\n dialóg: rozhovor dvoch, alebo viacerých postáv; v dráme základný kompozičný prvok\n\n replika: prehovor jednej z postáv zúčastňujúcej sa dialógu\n\n autorské poznámky: usmerňujú pohyb, výraz, opisujú prostredie (musí byť vytvorené na scéne)\n\n vnútorná k","24":"oznam a správa, denník, blog, sms, e-mail postmoderna sloh - publicistika/administratíva postmoderna umberto eco dominik tatarka meno ruže démon súhlasu úloha č. 1\n\nvysvetlite rozdiel medzi oznamom a správou. uveďte príklady ústnych a písaných žánrov, ktoré plnia funkciu oznamu a správy. zaraďte tieto žánre k slohovému postupu a jazykovému štýlu.\n\n oznam- vyjadruje informáciu o tom, aká udalosť sa kde? kedy? a ako? uskutoční (pozvánka, inzerát, reklama, jedálny lístok-žánre)- administratívny štýl, informačný slohový postup\n\n správa- základný novinársky žáner, prináša aktuálne informácie o udalosti, ktorá sa už odohrala; správa odpovedá na otázky: kto? kde? kedy? ako? prečo; je výstižná (krátka, rozšírená, úradná, referujúca (referát), beletrizovaná (riport), dialogizovaná (rozhovor)- žánre)-publicistický štýl, informačný slohový postup\n\nvysvetlite funkciu a formu týchto útvarov: denník, diár, blog, sms, e-mail. pripravte si e-mail, ktorý by ste poslali pani učiteľke k oslave dňa učiteľov.\n\n denník- obyčajne obsahuje zápisy o osobných a verejných udalostiach ovplyvňujúcich pisateľa; o udalostiach autor podáva správu väčšinou zo svojho uhla pohľadu prezentujúc vlastný názor o nich; udalosti sú spravidla opisované v chronologickom poradí v denných intervaloch, denník si nepíšeme, ale vedieme.\n\n diár- osobný zápisník; súčasť plánovania dní, týždňov, mesiacov, ktoré sú pred nami; väčšinou o veľkosti a5 (tzv. vreckové diáre)\n\n blog- internetový denník; umožňuje blogerom publikovať svoje názory, skúsenosti k určitým témam na internete\n\n sms- služba dostupná na väčšine mobilných telefónov, ktorá umožňuje prenos krátkych textových odkazov medzi mobilnými telefónmi\n\n e-mail- spôsob písania, posielania a prijímania správ v elektronických komunikačných systémoch- väčšina z nich používa internet\n\n\n\núloha č. 2\n\nvysvetlite znaky postmoderny na konkrétnom literárnom diele. analyzujte experimenty s epickým časom, priestorom a dejom v ukážkach.\n\n postmoderna:\n\n - literárny a umelecký smer poslednej tretiny 20. storočia\n\n - východiskom sa stáva odmietavý postoj ku konzumnej spoločnosti; základnou požiadavkou je pluralita názorov a ich","25":"diskusný príspevok, diskusia vs polemika vs debata beatnici sloh - diskusia americká povojnová literatúra - beatnici allen ginsberg jacques prévert j. d. salinger vytie kto chytá v žite úloha č. 1\n\ncharakterizujte diskusný príspevok ako slohový útvar. vysvetlite, aký je rozdiel medzi diskusiou, polemikou a debatou. poukážte na rozdiel medzi argumentáciou, propagáciou a propagandou.\n\ndiskusný príspevok- je žáner rečníckeho štýlu. je to hybridný žáner, ovplyvnený napr. aj náučným štýlom. patrí medzi náučné replikové útvary rečníckeho štýlu.\n\nreplikový sa nazýva preto, lebo v diskusii sa strieda viac diskutujúcich a odpovedajú na to, čo zaznelo v referáte alebo v niektorom inom diskusnom príspevku.\n\ndiskusia – súčasť, resp. časť programu schôdze, zasadania, pracovného stretnutia, pracovného seminára atď. ide o súhrn všetkých diskusných príspevkov k bodom prerokovaným na schôdzi. diskusiu vždy vedie človek poverený vedením schôdze, dáva diskutujúcim slovo, dbá na to, aby diskusia prebiehala kultivovane.\n\ndebata - fr.battre= byť - živý rozhovor \n\npolemika - grec. polemos= vojna - útočný rozhovor\n\ndiskusia – pokojný rozhovor\n\nargumentácia: je forma komunikácie, pri ktorý sa objasňujú, zdôvodňujú postoje názory konkrétne čina a pod. najčastejšie argumentujeme, keď potrebujeme niečo dokázať, keď potrebujeme presvedčiť niekoho , či presadiť svoj názor či myšlienku.\n\npropagácia: verejné oznamovanie, odporúčanie, daného produktu, služby či inaj záujmovej činoosti ktorú predkladáme, verejnosti.\n\npropaganda : verejné šírenie, často demagogické zavádzanie, presadzovanie, odporúčanie nejakých myšlienok, názorov a pod. s cieľom získať dlhodobo prívržencov. sprievodným javom propagandy je často skresľovanie faktov. propaganda zvykne vytvárať zdanie vyššieho cieľa, využíva ľudské vášne, strach a nenávisť.\n\npripravte a predneste krátky diskusný príspevok, v ktorom kriticky zhodnotíte čitateľskú úroveň žiakov gymnázia. (minimálne 6 viet)\n\nvážení maturitná komisia!\n\n..dovoľte mi zareagovať na danú tému ktorú posledných pár minút preberáme.\n\nmyslím si že čitateľská úroveň našich žiakov klesla na bod mrazu. a to do slova. ľudia prestávajú čítať. naši milí spolužiaci z ni","26":"indoeurópska skupina, slovanské jazyky antika, stredovek, humanizmus a renesancia slovanské jazyky staršia svetová literatúra homér konštantín (filozof) boccaccio cervantes ilias proglas moravsko-panónske legendy decameron don quijote úloha č. 1\n\ncharakterizujte indoeurópsku jazykovú skupinu. zaraďte slovenčinu do systému slovanských jazykov.\n\nindoeurópske jazyky (zastarano indogermánske jazyky) tvoria najrozšírenejšiu [jazykovú rodinu](https://sk.wikipedia.org/wiki/jazykov%c3%a1_rodina) na svete, ako materinskou rečou hovoria niektorým z nich asi 2,5 miliardy ľudí. vyvíjali sa spoločne v rozsiahlych oblastiach [eurázie](https://sk.wikipedia.org/wiki/eur%c3%a1zia) z predpokladaného [indoeurópskeho prajazyka](https://sk.wikipedia.org/wiki/indoeur%c3%b3psky_prajazyk). za ťažisko a oblasť vzniku prajazyku sa považujú stepi v dnešnom [juhozápadnom](https://sk.wikipedia.org/wiki/juhoz%c3%a1pad) [rusku](https://sk.wikipedia.org/wiki/rusko) a [ukrajine](https://sk.wikipedia.org/wiki/ukrajina). výskum indoeurópskych jazykov sa uskutočňuje v rámci indoeuropeistiky.\n\no vzniku indoeurópskych jazykov pozri [indoeurópsky prajazyk](https://sk.wikipedia.org/wiki/indoeur%c3%b3psky_prajazyk).\n\nslovenčina : patrí do slovanskej vetvy indoeurópskeho prajazyku, konkrétne do západoslovanskej vetvy, patria tu : poľština, čeština, slovenčina, lužičština.\n\nporovnajte slovenčinu s vybraným cudzím jazykom /angličtina, nemčina, francúzština, ruština, čeština/. ktoré jazykové prostriedky slovenčiny sú podľa vás náročné pre cudzincov?\n\nslovenčina vs angličtina\n\nsj- má skloňovanie, má len 3 časy, nemá členy, tvarovanie slov,\n\naj- má 12 časov, nemá sklonovanie, má členy,\n\nnájdite v ukážkach pôvod minimálne troch cudzích slov.\n\núloha č. 2\n\nporovnajte antickú, stredovekú literatúru a literatúru humanizmu a renesancie. analyzujte ukážky a vysvetlite výrazné literárne žánre jednotlivých období.","27":"jazyk a reč, jazyková kultúra baroko a klasicizmus jazyk a reč baroko a klasicizmus ján silván hugolín gavlovič ján b. magin j. a. komenský ján hollý marnost na všem... valaská škola... ostne (obrana) labyrint světa a ráj srdce zadanie č. 27\n\núloha č. 1\n\ncharakterizujte pojmy jazyk a reč. využite niektoré slová z nasledujúceho radu: spoločenský, znaky, pravidlá, kodifikácia, kultúra, mimojazykové prostriedky, komunikácia, slovo, myslenie, národ.\n\nvysvetlite pojem jazyková kultúra a ako súvisí s kvalitou vedeckého preskúmania jazyka, jazykovou praxou a výslovnostnými štýlmi (neutrálny, vysoký, nižší štýl).\n\nopravte uvedené ,,jazykokazy“: pani učiteľka, kedy by ste mohla prísť k nám. naša stará mama tam neboli. to je k smiechu. príprava ku skúške bola náročná. behom leta, chovať sa, snílkovia, predať skúsenosti, sluší ti to, opraviť závadu, padnúť do kolien, vypadá dobre.\n\núloha č. 2\n\nporovnajte barokové umenie a literatúru s hľadaním dokonalosti v klasicizme. nájdite konkrétne znaky jednotlivých literárnych období a žánrov v ukážkach, vysvetlite názvy a žánre ukážok.\n\nukážky: ján silván: marnost na všem znám a vidím, h. gavlovič: valaská škola\n\n ján baltazár magin: ostne...alebo obrana\n\n j. a. komenský: labyrint světa a ráj srdce\n\n j. hollý – óda, elégia\n\nján silván: marnost na všem znám a vidím hugolín gavlovič: valaská škola... pána boha z celého srdce miluj\n\nmarnosť na všem znám a vidím, synu milý, v živobytí abys' byl ščaslivý nechť pak, nač chci, v světe hledím. m[o]síš na boha pobožne vždy byť pamatlivý.\n\nžádost těla, žádosť očí – búh te stvoril milostive k podobenství svému\n\nmarnosť v světe všecky věci. nemáš srdce tvé obracať k stvorení jinému.\n\n miluj boha spravedlive, nos ho v srdci tvojem,\n\nbílé tělo, černé oči, jak od toho cíle zblúdíš, nebudeš s pokojem.\n\nhladké ruce, rusé vlasy dal ti život, i to čo máš, i nebe chce dati,\n\ni všecka ozdoba těla jestliže ho spravedlive budeš milovati.\n\njakoby nikdá nebyla. vychvaluj ho jako múžeš, hoden je všej chvály,\n\n ............ pros od neho, čo ti treba, v daroch je nemalý.\n\nprotož každý obtížený všečko čo máš, mu obetuj, áno i sám sebe,\n\nčekaj konce – dlouhoť není. budeš ho meť pomocníkem v každej tvej potrebe.\n\na ty, jenž sa v zboží těši","28":"gramatické kategórie (menné, slovesné), skloňovanie romantizmus a realizmus morfológia - gram. kategórie svetový romantizmus a realizmus victor hugo f. m. dostojevskij chrám matky božej v paríži zločin a trest úloha č. 1\n\ncharakterizujte menné a slovesné gramatické kategórie slova a syntaktických konštrukcií. určite potrebné gramatické kategórie zvýraznených slov v ukážkach a doplňte vzor.\n\nvyskloňujte uvedené slová: pán, pani, goethe, najlepší žiak, kráľovná, dva psy – dvaja psi.\n\núloha č. 2\n\nporovnajte hlavné znaky literatúry romantizmu a realizmu, analyzujte ukážky a vysvetlite umelecké stvárnenie skutočnosti.\n\nukážky: v. hugo – chrám matky božej v paríži\n\n f. m. dostojevskij –zločin a trest\n\nvictor hugo: chrám matky božej v paríži (úryvok)\n\n„piť!“ zopakoval quasimodo po tretí raz a sťažka si vzdychol. v tej chvíli zbadal, že sa dav rozostupuje. vyšla z neho čudne oblečená dievčina a s ňou malá biela kozička s pozlátenými rožkami. v ruke niesla tamburínu. quasimodovo oko zaiskrilo. bola to cigánka, ktorú sa včera v noci pokúsil uniesť, a za toto prepadnutie, ako nejasne cítil, ho práve teraz trestali: mimochodom, a to bol ten najposlednejší dôvod, lebo ho trestali iba preto, že je hluchý a že ho súdil tiež hluchý. nepochyboval, že i ona sa mu prišla pomstiť a udrieť ho ako všetci ostatní.\n\n...........................\n\na tu ten hluchý úbožiačik uprel na ňu pohľad plný výčitiek a nevýslovného smútku. všade by to bolo bývalo dojímavé divadlo, ako táto krásna, svieža, čistá a pôvabná dievčina, sama taká slabá, tak nezištne pribehla na pomoc takému veľkému zúfalstvu, takej ošklivosti, úbohosti a zlobe! na pranieri bol takýto výjav vznešený.\n\n.........................\n\n,,och, dievča,“ povedal kňaz, ,,zľutuj sa nado mnou! ty sa považuješ za nešťastnú, ale beda, beda, nevieš, čo je to nešťastie. och! milovať ženu a byť kňazom, byť nenávidený! milovať ju celou náruživosťou svojej duše, cítiť, že by si dal za jejnajmenší úsmev krv, dušu, spásu, nesmrteľnosť a večnosť, život pozemský i posmrtný.“\n\nfiodor michajlovič dostojevskij: zločin a trest (úryvok)\n\n- už je neskoro, už je čas! hneď v tejto chvíli sa idem udať. len neviem, prečo to\n\nrobím.\n\nduni stekali dolu tvárou veľké slzy","29":"jazykové slovníky, pravidlá slovenského pravopisu svetová literatúra od r. 1945 (existencializmus, dystopia) jazykové slovníky svetová povojnová literatúra j. p. sartre joseph heller george orwell múr hlava xxii 1984 úloha č. 1\n\nvymenujte a charakterizujte druhy jazykových slovníkov. aký druh slovníka použijete na vysvetlenie slov:\n\n expresionizmus-vykladový, krumple- slangový, väzenie –žalár- synonimický, archeografia-vykladový, /ďeckí/ -ortoepický , design.-slovník cudzích slov\n\nslovníky\npravopisný slovník – nachádza sa  v pravidlách slovenského pravopisu a obsahuje tie slová, s ktorými môžu mať používatelia problémy pri písaní. pravidlá slovenského pravopisu sú kodifikačnou príručkou, okrem slovníkovej časti prinášajú aj poučky a pravidlá. \n\nvýkladový slovník – vykladá význam slov a slovných spojení. je dôležitý pre ľudí, ktorí sa zaoberajú štúdium jazykov. slovník slovenského jazyka má šesť zväzkov, obsahuje 130 000 slov. typom výkladového slovníka je aj krátky slovník slovenského jazyka – nájdeme v ňom najfrekventovanejšie slová zo súčasnej slovenčiny, pri problematických slovách uvádza aj ich výslovnosť a základné poučenie o gramatike a pravopise.\n\nnormatívny slovník – krátky slovník slovenského jazyka (kolektív autorov) nadväzuje na výkladový slovník slovenského jazyka – má rozsah okolo 50 000 slov.\n\nsynonymický slovník – obsahuje synonymické rady slov, ktoré majú rovnaký alebo blízky význam. každý synonymický rad má základné slovo zaradené v slovníku podľa abecedy. využívame ho na vylepšenie štýlu našich slohových útvarov, pri prekladoch, pri tvorbe poézie, prózy, textov piesní atď.\n\nfrazeologický slovník – obsahuje ustálené slovné spojenia, frazeologické jednotky aj s ich výkladom. máme viacero frazeologických slovníkov.\n\nslovník cudzích slov – používajú používatelia zo všetkých sfér odbornej činnosti. vysvetľuje význam cudzích slov a uvádza, z ktorého jazyka slovo pochádza. našim najpodrobnejším je slovník cudzích slov, obsahuje 60 000 slov.\n\netymologický slovník – uvádza prvotný význam slova, pôvod a vývin slova, uvádza slová s tým istým základom (napr. tvor – útvar – potvora). máme etymologický slovník jazyka českého a slovenského.\n\nretrográdny slovník – obsahuje slo","30":"náučný štýl, formy logického myslenia fantastická a vedecko-fantastická literatúra sloh - náučný štýl súčasná literatúra, fantastika milan rúfus antoine de saint-exupéry j. k. rowlingová báseň a modlitba malý princ harry potter zadanie č. 30\n\núloha č. 1\n\ncharakterizujte náučný štýl a porovnajte s výrazovými prostriedkami ostatných štýlov. vysvetlite, aké formy logického myslenia použijeme vo výkladovom slohovom postupe.\n\nvysvetlite fázy učenia sa pri vypracovaní projektu na ľubovoľnú tému: príprava, realizácia, prezentácia; dedukcia, indukcia, komparácia, analýza, syntéza, analógia\n\nvyberte z ukážky malý princ jednu myšlienku a demonštrujte na nej rozdiel medzi presnou citáciou, voľnou citáciou a parafrázou.\n\núloha č. 2\n\nvysvetlite vzťah literatúry a umenia, rozdiel medzi poéziou a prózou. zaraďte fantastickú a vedecko-fantastickú literatúru do systému literatúry a porovnajte s iným literárnym žánrom.\n\nrozoberte estetickú a poznávaciu funkciu vašej obľúbenej knihy alebo uvedenej ukážky.\n\nukážky: m. rúfus - báseň a modlitba\n\n- de saint exupéry – malý princ\n\nj. rowlingová – harry potter\n\nmilan rúfus: báseň a modlitba\n\nčo sa ty v básni dozvedáš:\n\nkeď plače oblak, to je dážď.\n\nkeď nebo plače, je to rosa.\n\nkeď plače lúka, je v tom kosa.\n\nkeď plače strom, je priskyrica.\n\nkeď ty plačeš – dve tvoje líca\n\nsa rozprávajú o duši.\n\nmodlitbička to osuší.\n\na ako božie slniečko\n\nzatlačí slzu pod viečko.\n\nbáseň a modlitba sú sestry.\n\npozvi ich k sebe, stôl im prestri.\n\nantoine de saint exupéry: malý princ (úryvok)\n\ntak som žil samotársky a nemal som nikoho, s kým by som si vážne pohovoril, až do tých čias, kým ma pred šiestimi rokmi nepostihla na saharskej púšti porucha motora. čosi sa v ňom polámalo. a pretože som nemal so sebou ani mechanika , ani cestujúcich, chystal som sa, že sa tú neľahkú opravu pokúsim urobiť sám. bola to pre mňa otázka života a smrti.\n\nprvý večer som teda zaspal na piesku, tisíc míľ od akéhokoľvek obývaného kraja. bol som oveľa opustenejší ako stroskotanec na plti uprostred oceána.\n\n- - - - - - - -\n\n- zbohom, - povedala líška. – tu je moje tajomstvo. je veľmi jednoduché: dobre vidíme iba srdcom. to hlavné je očiam neviditeľné.\n\n- to hlavné je očiam neviditeľné, - opakoval malý prin"},"recaps":{"1":{"title":"Komunikácia + Baroko/Romantizmus","key_facts":["**Komunikácia** = dorozumievací proces medzi komunikantmi. Druhy: **asertívna** (otvorená), **pasívna** (ustupujúca), **agresívna** (vnucujúca), **devalvujúca** (urážlivá).","**Hugolín Gavlovič: Valaská škola mravov stodola** — barokové dielo, didakticko-reflexívna poézia, 16 000 veršov v slovakizovanej češtine, 14-slabičný verš, mravné ponaučenia.","**Samo Chalupka: Mor ho!** — romantická lyricko-epická skladba, námet zo Šafárika, dej v 4. storočí pri Dunaji. Skupina slovenských junákov vs. rímsky cisár.","**Sylabický veršový systém** — rovnaký počet slabík vo verši. Používajú ho Štúrovci.","Téma vlastenectva: Gavlovič — láska k vlasti zo srdca (Sladká je vlast človekovi). Chalupka — boj za slobodu vlasti."]},"2":{"title":"Štýly + Romantizmus (Janko Kráľ)","key_facts":["**Funkčné jazykové štýly:** umelecký, odborný, publicistický, administratívny, hovorový, rečnícky.","**Romantizmus** (1830-1850): subjektivizmus, individualizmus, cit, fantázia, vlastenectvo, ľudovosť.","**Janko Kráľ** — najradikálnejší štúrovec, revolucionár. **Zakliata panna vo Váhu a divný Janko** — balada o búrlivákovi.","Slovenskí romantici (Štúrovci): Štúr, Hurban, Hodža, Sládkovič, Botto, Chalupka, Kráľ.","Romantizmus využíva: balada, lyricko-epická skladba, historické témy, ľudová slovesnosť."]},"3":{"title":"Lexikológia + Kukučín","key_facts":["**Lexikológia** = veda o slovnej zásobe. **Synonymá** (podobný význam), **antonymá** (opačný), **homonymá** (rovnaké znenie, iný význam), **paronymá** (podobné znenie).","**Martin Kukučín: Keď báčik z Chochoľova umrie** — humoristická novela, realizmus.","Hlavná postava **Ondrej Tráva** — chudobný zeman, klamár, predstiera bohatstvo.","Kukučín kritizuje **upadajúce zemianstvo**, ich snahu žiť nad pomery.","**Realizmus** v slovenskej literatúre: prvá vlna — Kukučín, Vajanský; druhá — Timrava, Tajovský, Jégé."]},"4":{"title":"Hviezdoslav + sylabicko-tonický systém","key_facts":["**P. O. Hviezdoslav** (vl. menom Pavol Országh) — najvýznamnejší slovenský básnik 19. storočia.","Zaviedol **sylabicko-tonický veršový systém** = rovnaký počet slabík + pravidelné striedanie prízvukov.","**Hájnikova žena** — lyricko-epická skladba. Hájnik **Michal Čajka** zabije pána **Artuša Villaniho**, ktorý sa pokúšal o jeho ženu **Hanku**. Hanka sa zblázni, ale priznáva vinu.","**Krvavé sonety** — reakcia na 1. svetovú vojnu, protest proti vojne.","Hviezdoslav prekladal: **Shakespeare (Hamlet), Goethe (Faust), Puškin**.","Druhy lyriky: **intímna, prírodná, spoločenská, reflexívna, ľúbostná**."]},"5":{"title":"Slohové postupy + Timrava","key_facts":["**4 slohové postupy:** rozprávací (dej), opisný (statické vlastnosti), výkladový (vysvetlenie), informačný (fakty).","**Božena Slančíková-Timrava** — realistická spisovateľka, kritická voči dedinskému prostrediu.","**Ťapákovci** — novela o zaostalom, lenivom rode. Stará Ťapáčka vládne železnou rukou.","**Iľa** — mladá, pokroková nevesta, chce zmeniť pomery, ale neuspeje.","Téma: **konflikt tradície a pokroku**, kritika konzervatívnosti."]},"6":{"title":"Druhy lyriky + Sládkovič + Puškin","key_facts":["**Andrej Sládkovič** (vl. menom Braxatoris) — štúrovský básnik, evanjelický farár.","**Marína** — 291-veršová ľúbostná báseň, venovaná **Márii Pišlovej**. Oslava krásy, mladosti, lásky.","**Detvan** — 5-spevová lyricko-epická skladba. Hl. postava **Martin** — ideálny slovenský horal, predstupuje pred **kráľa Mateja**.","**A. S. Puškin: Eugen Onegin** — veršovaný román. Onegin odmietne Tatianu, neskôr ju miluje, ona ho už nechce. Zabije v dueli **Lenského**.","Druhy lyriky: intímna, spoločenská, prírodná, reflexívna."]},"7":{"title":"Opisný postup + Tolstoj, Dostojevskij","key_facts":["**Opisný slohový postup** — zobrazuje statické vlastnosti. Druhy: jednoduchý, odborný, umelecký, karikatúra.","Žánre opisu: opis predmetu, **charakteristika** (vnútorná/vonkajšia), opis prírody, reportáž, cestopis.","**L. N. Tolstoj: Vojna a mier** — rozsiahly román o napoleonských vojnách. Hl. postavy: Pierre Bezuchov, Andrej Bolkonskij, Natáša Rostov.","**F. M. Dostojevskij: Zločin a trest** — **Raskoľnikov** zabije starú úžerníčku, trpí výčitkami. **Soňa Marmeladová** ho privedie k pokániu.","**Ruský kritický realizmus** — psychologická hĺbka, sociálna kritika, morálne otázky."]},"8":{"title":"Symbolizmus + Krasko + Shakespeare (sonet)","key_facts":["**Symbolizmus** — používa symboly, alegórie, hudobnosť. Slovenská moderna (1900-1918).","**Ivan Krasko** (vl. menom Ján Botto) — hlavný predstaviteľ slovenskej moderny.","**Otrok** — báseň o národnom útlaku, **alegória** Slovenska v Uhorsku.","**Sonet** — 14-veršová báseň, kompozícia **4+4+3+3** (alebo 8+6). Témy: láska, smrť, krása.","**Shakespearove sonety** — 154 sonetov, ľúbostné, filozofické. Téma času, lásky, smrti."]},"9":{"title":"Klasicizmus (Hollý, Kollár) + epos (Homér)","key_facts":["**Klasicizmus** — návrat k antickým vzorom, rozum, harmónia, prísna kompozícia.","**Ján Hollý: Svatopluk** — epos v 12 spevoch o Veľkomoravskej ríši. Písaný v **bernolákovčine**, **časomerný verš**.","**Ján Kollár: Slávy dcéra** — cyklus 645 zneliek (sonetov). **Predspev** je vrcholom slovanskej myšlienky.","**Homér: Iliada a Odysea** — antické eposy. Iliada o trojskej vojne, Odysea o návrate Odysea.","**Národný jazyk:** spisovná forma (kodifikovaná) + nespisovné formy (nárečia, sociolekty, hovorový jazyk)."]},"10":{"title":"Moderná próza + Tajovský","key_facts":["**Jozef Gregor-Tajovský** — druhá vlna realizmu, kritika sociálnych pomerov.","**Maco Mlieč** — poviedka o starom sluhovi, ktorý celý život drel pre statkára. **Sociálna nespravodlivosť**.","**Statky-zmätky** — dráma. Konflikt o majetok, **Ďurko Palčík** zomiera kvôli rodinnému sporu.","**Vnútorný monológ** — zobrazenie myšlienok postavy z prvej osoby, technika modernej prózy.","Tajovský zobrazuje **dedinský život**: chudoba, alkoholizmus, rodinné konflikty."]},"11":{"title":"Komédia + Palárik + Molière","key_facts":["**Komédia (veselohra)** — dramatický žáner so šťastným koncom, smiech ako prostriedok kritiky.","**Ján Palárik: Zmierenie alebo Dobrodružstvo pri obžinkoch** — veselohra so zámenou identít (gróf vs učiteľ). Národnostná téma.","**Drotár** — ďalšia Palárikova komédia, satira na nacionalizmus a národné stereotypy.","**Molière: Lakomec** — **Harpagon**, **Tartuffe** — pokrytec. **Charakterové komédie**.","**Verbálna vs neverbálna** komunikácia: slová vs gestá, mimika, postoj, proxemika."]},"12":{"title":"Typy románu + Hugo (Bedári)","key_facts":["**Román** — rozsiahly prozaický žáner. Typy: historický, spoločenský, psychologický, dobrodružný, detektívny.","**Victor Hugo: Bedári** — sociálny román. Hl. hrdina **Jean Valjean** — bývalý galejník, snaží sa o lepší život.","Postavy v Bedároch: **Javert** (policajt), **Cosette** (adopt. dcéra), **Marius** (jej láska), **Fantine** (Cosettina matka).","**Chrám Matky Božej v Paríži** (Hugo) — **Quasimodo** a **Esmeralda**, romantický román.","**Romantizmus vo Francúzsku:** Hugo, Stendhal, Dumas."]},"13":{"title":"Kodifikácia spisovnej slovenčiny","key_facts":["**Anton Bernolák, 1787** — prvá kodifikácia (**bernolákovčina**) z **západoslovenského kultúrneho jazyka**. Katolíci.","**Ľudovít Štúr, 1843** — druhá kodifikácia (**štúrovčina**) zo **stredoslovenského nárečia**. Sjednotila katolíkov a evanjelikov.","**Martin Hattala, 1852** — reforma štúrovčiny (zaviedol y, i podľa etymológie, vrátil ô, ä).","Pred Bernolákom Slováci používali **bibličtinu** (česká forma) a latinčinu.","Štúr odôvodňoval slovenčinu v knihe **Nárečja slovenskuo alebo potreba písaňja v tomto nárečí**."]},"14":{"title":"Ladislav Mňačko + dokumentárna próza","key_facts":["**Ladislav Mňačko** — novinár a spisovateľ, zachytával ťažké témy (vojna, stalinizmus).","**Smrť sa volá Engelchen** — román o SNP. Mladý partizán hľadá esesáka Engelchena, hlavná téma morálky vojny.","**Ako chutí moc** — román o mechanizme tyranskej moci, kritika kultu osobnosti.","**Oneskorené reportáže** — publicistické dielo o stalinizme na Slovensku.","**Timrava** — aj 2. vystúpenie v tomto okruhu. Jej Skon Paľa Ročka — kritika ľahostajnosti k smrti chudobného."]},"15":{"title":"Saint-Exupéry: Malý princ","key_facts":["**Antoine de Saint-Exupéry** — francúzsky spisovateľ a **pilot**, zmizol počas 2. sv. vojny.","**Malý princ** — filozofická rozprávka. Pilot stratený v púšti stretáva chlapca z asteroidu B-612.","Slávna myšlienka: **Dobre vidíme len srdcom. To, čo je dôležité, je očiam neviditeľné.**","Postavy: **Líška** (učí ho o priateľstve a krotení), **Ruža** (jeho láska), **Had**.","**Symbolika:** kritika dospelosti, dôležitosť detskej čistoty, hľadanie zmyslu."]},"16":{"title":"Morfológia (tvaroslovie)","key_facts":["**Morfológia** = veda o slovných druhoch a ich tvaroch.","**10 slovných druhov:** podstatné, prídavné, zámená, číslovky, slovesa, príslovky (plnovýznamové) + predložky, spojky, častice, citoslovcia (neplnovýznamové).","**Ohybné** (skloňujú/časujú sa): podst. mená, príd. mená, zámená, číslovky, slovesá.","**Neohybné**: príslovky, predložky, spojky, častice, citoslovcia.","**Slovesné kategórie:** osoba, číslo, čas, spôsob, slovesný rod, vid.","**Pádové kategórie:** N, G, D, A, L, I (6 pádov)."]},"17":{"title":"Lyrika 30. rokov + naturizmus","key_facts":["**DAV** — ľavicová literárna skupina (Laco Novomeský, Vladimír Clementis, Daniel Okáli).","**Laco Novomeský** — poet zo skupiny DAV. **Otvorené okná** — zbierka spoločenskej lyriky.","**Slovenský naturizmus** — smer v próze: lyrizovaná próza s vplyvom prírody, mýtické prvky.","**František Švantner: Nevesta hôľ** — román, žena ako tajomná súčasť prírody.","**Margita Figuli: Tri gaštanové kone** — lyrický román o láske a osude.","**Dobroslav Chrobák: Drak sa vracia** — psychologická novela."]},"18":{"title":"Syntax + svetová literatúra 20. storočia","key_facts":["**Syntax** = veda o skladbe vety. Vety: **jednoduché** (1 prísudok) a **súvetia** (viac prísudkov).","**Súvetia:** priraďovacie (rovnocenné vety) a podraďovacie (hlavná + vedľajšia).","**Vetné členy hlavné:** podmet a prísudok. **Vedľajšie:** prívlastok, predmet, príslovkové určenie, doplnok.","**Pražská lingvistická škola** — členenie vety: téma (známe) a réma (nové).","Svetová literatúra 20. stor. — **modernizmus** (Joyce, Kafka, Proust), **existencializmus** (Camus, Sartre)."]},"19":{"title":"Štylistika + Umberto Eco","key_facts":["**Štylistika** = náuka o štýloch. Štýl = výber a usporiadanie jazyk. prostriedkov.","**Umberto Eco: Meno ruže** — postmoderný román, **detektívka v stredovekom kláštore**.","Hl. postavy: **William z Baskervillu** (vyšetrovateľ), jeho učeň **Adso z Melku**, slepý mních **Jorge** (záporák).","**Témy:** boj vedy a viery, moc nad poznaním, tolerancia, smiech (zakázaná kniha).","**Postmoderna**: intertextovosť, hra s formou, irónia, kombinácia žánrov."]},"20":{"title":"Životopis + Orwell (1984, Zvieracia farma)","key_facts":["**Životopis** — opis života osoby. **CV (curriculum vitae)** — štruktúrovaný životopis pre zamestnanie.","**George Orwell** (vl. menom Eric Arthur Blair) — anglický spisovateľ, kritik totality.","**1984** — dystópia. Hl. hrdina **Winston Smith** sa búri proti **Veľkému bratovi**, ale prehráva. Slávne: **Big Brother is watching you.**","**Zvieracia farma** — alegória boľševickej revolúcie. Zvieratá zvrhnú farmárov, no prasatá zavedú novú tyraniu. **Všetky zvieratá sú si rovné, ale niektoré sú si rovnejšie.**","**Newspeak** — vymyslený jazyk v 1984, slúži na obmedzenie myslenia."]},"21":{"title":"Ľudová slovesnosť + Heller (Hlavička 22)","key_facts":["**Ľudová slovesnosť** — tvorba neznámych autorov: **rozprávky, povesti, balady, piesne, príslovia, porekadlá, hádanky**.","**Príslovie** — krátke ľudové múdrosti s ponaučením (Bez práce nie sú koláče).","**Porekadlo** — bez ponaučenia (Sedí ako primrazený).","**Joseph Heller: Catch-22 (Hlavička 22)** — antivojnový román o 2. sv. vojne. Bombardér **Yossarian** sa snaží uniknúť z vojny absurdnými spôsobmi.","**Catch-22** = absurdné pravidlo: aby si dostal výnimku, musíš byť šialený, ale ak chceš výnimku, si normálny."]},"22":{"title":"Sládkovič (Marína) + Kollár (Slávy dcéra)","key_facts":["**Andrej Sládkovič: Marína** — 291 veršov ľúbostnej poézie venovanej **Márii Pišlovej**.","Marína sa vydáva za bohatšieho **Pavla Geržu** — Sládkovič stratu prebíja oslavou krásy a mladosti.","**Ján Kollár: Slávy dcéra** — **645 zneliek (sonetov)** v 5 spevoch (Sála, Labe, Dunaj, Léthe, Acheron).","**Predspev** k Slávy dcére — vrchol slovanskej myšlienky (Aj zde leží zem ta...).","Sládkovič: básnik **mladosti a lásky**. Kollár: básnik **slovanskej vzájomnosti**."]},"23":{"title":"Úvaha + Shakespeare (Hamlet)","key_facts":["**Úvaha** — subjektívny slohový útvar, **osobné premýšľanie** s argumentmi.","**William Shakespeare: Hamlet** — renesančná tragédia. **Princ Hamlet** v Dánsku má pomstiť otca, zabitého strýkom **Klaudiom**.","Slávny monológ **Byť či nebyť** (To be or not to be) — filozofická úvaha o živote a smrti.","Postavy: **Ofélia** (Hamletova láska, zomiera v rieke), **Polonius** (jej otec), **Laertes** (jej brat).","**Mapa mysle** — vizuálna technika organizácie myšlienok okolo centrálnej témy."]},"24":{"title":"Administratívny štýl + Beckett (Čakanie na Godota)","key_facts":["**Administratívny (úradný) štýl** — žiadosť, životopis, zápisnica, formulár. Vlastnosti: vecnosť, presnosť, neutrálnosť.","**Samuel Beckett: Čakanie na Godota** — **absurdná dráma**. Vladimír a Estragon čakajú na Godota, ktorý nepríde.","**Absurdná dráma:** nezmyselný dialóg, statickosť, hlboký pesimizmus, neistota významu.","**Útvary digitálnej komunikácie:** e-mail (formálny/neformálny), SMS, blog, sociálne siete.","**Denník** = osobný záznam (pre seba), **diár** = plánovací (do budúcnosti)."]},"25":{"title":"Publicistický štýl + slovenská dráma 20. stor.","key_facts":["**Publicistický štýl** — **aktuálnosť, presvedčivosť, informačnosť**. Žánre: správa, reportáž, komentár, fejtón, recenzia.","**Ivan Stodola: Bačova žena** — dráma o Eve, ktorá sa zaľúbi do bačoviča, kým jej muž je za hranicami.","**Peter Karvaš: Antigona a tí druhí** — dráma o povstaní a jeho dôsledkoch.","**Ivan Bukovčan: Kým kohút nezaspieva** — dráma o desiatich rukojemníkoch, morálne dilemy.","**Diskusný príspevok** — krátky útvar v diskusii, argumentačný, vyjadruje osobný postoj."]},"26":{"title":"Antika (Sofokles, Homér)","key_facts":["**Antika** = grécka + rímska kultúra (8. st. pred Kr. — 5. st. po Kr.). Základ európskej literatúry.","**Homér: Iliada** (trojská vojna, hnev Achilla) + **Odysea** (návrat Odysea domov, 10 rokov).","**Sofokles: Antigona** — tragédia. Antigona pochová brata **Polyneika** napriek zákazu kráľa **Kreona**. Téma: **boží vs. ľudský zákon**.","**Aristoteles: Poetika** — delenie literatúry na **lyriku, epiku, drámu**. Definícia tragédie a komédie.","Antický verš: **časomerný systém** (krátke vs. dlhé slabiky)."]},"27":{"title":"Baroko (Gavlovič) + Hollý","key_facts":["**Baroko** (17.-18. stor.) — reakcia na renesanciu. Náboženskosť, mystika, kontrasty.","**Hugolín Gavlovič** — františkán, **Valaská škola mravov stodola** (16 000 veršov), didakticko-reflexívna poézia.","**Ján Hollý** — klasicista píšuci v bernolákovčine. **Svatopluk** — epos v 12 spevoch o Veľkomoravskej ríši.","Hollý: téma **slovanskej minulosti** a slávy. **Časomerný verš** (antický štýl).","Slovenské baroko: aj **Daniel Sinapius-Horčička**, **Štefan Pilárik** (pamäti zo zajatia)."]},"28":{"title":"Postmoderna (svetová a slovenská)","key_facts":["**Postmoderna** (od 60. rokov) — intertextovosť, irónia, hra s formou, paródia, sebareflexivita.","Svetová: **Umberto Eco** (Meno ruže), **Italo Calvino**, **Jorge Luis Borges**, **Milan Kundera**.","**Pavol Vilikovský** — hlavný slovenský postmodernista. **Večne je zelený... (Pán Eis)**, **Krutý strojvodca**.","Postmoderna **odmieta** veľké príbehy, totality, jednoznačnosť. Pluralizmus, relativita.","Časté znaky: nespoľahlivý rozprávač, miešanie štýlov, citácie iných diel."]},"29":{"title":"Osvietenstvo + Bel + Bajza","key_facts":["**Osvietenstvo** (18. stor.) — rozum, veda, vzdelanie, kritika tmárstva. V Európe: **Voltaire, Rousseau, Diderot**.","**Matej Bel** — polyhistor osvietenstva, **Notitia Hungariae** (encyklopedické dielo o Uhorsku, latinsky).","**Jozef Ignác Bajza: René mládenca príhody a skúsenosti** — **prvý slovenský román**, dobrodružný, výchovný, písaný bernolákovčinou.","Hl. hrdina **René** putuje, učí sa, kritizuje povery a poverčivosť.","Slovenské osvietenstvo: aj **Anton Bernolák** (jazykový kodifikátor), **Pavol Doležal**."]},"30":{"title":"Súčasná slovenská literatúra","key_facts":["**Milan Rúfus** — duchovný básnik, **Až dozrieme** (zbierka), pre deti **Modlitbičky**.","**Dominik Tatarka: Démon súhlasu** — satira na **stalinizmus a kult osobnosti**. Robotník Tomáš musí stále súhlasiť.","**Tatarka** patril k disidentom, signatár Charty 77.","**Generácia 56:** Mináč, Mihálik, Karol, Hečko — poznamenaní stalinizmom.","**90. roky a súčasnosť:** **Vilikovský, Mitana, Pišťanek, Hvorecký, Otčenášová** — postmoderna, mestská próza."]}},"works_db":[{"work":"Valaská škola mravov stodola","author":"Hugolín Gavlovič","plot":"Barokové didakticko-reflexívne dielo (16 000 veršov), súbor mravných ponaučení o životných otázkach – láske k vlasti, viere v Boha, kritike opilstva a vojen, hodnote práce. Písané slovakizovanou češtinou.","zadanie":1,"period":"baroko"},{"work":"Mor ho!","author":"Samo Chalupka","plot":"Romantická lyricko-epická skladba o slovenských junákoch, ktorí prichádzajú s pozdravom mieru k rímskemu cisárovi v 4. storočí pri Dunaji. Cisár odmieta a vyhráža sa zotročením, junáci sa vrhnú do boja s heslom Mor ho! – cár síce zvíťazí, ale morálne víťazstvo patrí Slovanom.","zadanie":1,"period":"romantizmus"},{"work":"Zakliata panna vo Váhu a divný Janko","author":"Janko Kráľ","plot":"Romantická balada o búrlivom mládencovi Jankovi, ktorý sa pokúsi vyslobodiť zakliatu pannu z Váhu a pri pokuse zahynie. Symbolika romantického hrdinu vzbúrenca proti osudu, motív vykupiteľskej obety.","zadanie":2,"period":"romantizmus"},{"work":"Smrť Jánošíkova","author":"Ján Botto","plot":"Lyricko-epická skladba o zlapaní, súdení a poprave zbojníckeho kapitána Jura Jánošíka. Stelesňuje slovenský romantický mýtus o ľudovom hrdinovi bojujúcom proti útlaku.","zadanie":2,"period":"romantizmus"},{"work":"Keď báčik z Chochoľova umrie","author":"Martin Kukučín","plot":"Humoristická novela o upadajúcom zemanovi Aureliusovi Trávovi (báčikovi), ktorý žije v dlhoch. Stretáva sa s Andrejom Zatkom, predstierajú vzájomne bohatstvo. Andrej chce Aureliusovu dcéru, no Aurelius nemá nič – iba klamstvá, že po smrti strýka z Chochoľova zdedí.","zadanie":3,"period":"realizmus"},{"work":"Maco Mlieč","author":"J. G. Tajovský","plot":"Poviedka o starom sluhovi Macovi Mliečovi, ktorý celý život slúžil u statkára za jedlo a šaty. Po smrti dostal len jednoduchý pohreb. Kritika sociálnej nespravodlivosti voči chudobnému ľudu.","zadanie":3,"period":"realizmus"},{"work":"Mamka Pôstková","author":"J. G. Tajovský","plot":"Poviedka o starej, chudobnej žene, ktorá si od mladosti odopierala všetko, aby splatila pôžičku z banky. Symbol obetavej slovenskej matky a jej tichého utrpenia.","zadanie":3,"period":"realizmus"},{"work":"Mňa kedys zvádzal svet","author":"P. O. Hviezdoslav","plot":"Báseň zo zbierky Sonety – vyznanie básnika k materinskej slovenskej reči. Hovorí o pokušení opustiť chudobný slovenský jazyk za väčší (maďarský), ale odmieta a vyzdvihuje krásu rodnej reči.","zadanie":4,"period":"realizmus"},{"work":"Krvavé sonety","author":"P. O. Hviezdoslav","plot":"Cyklus 32 sonetov ako reakcia na 1. svetovú vojnu. Hviezdoslav v nich odsudzuje vojnu, plače nad krviprelievaním a vyjadruje vieru v lepšiu budúcnosť ľudstva.","zadanie":4,"period":"moderna"},{"work":"Letorosty","author":"P. O. Hviezdoslav","plot":"Trojdielna lyrická zbierka (Letorosty I, II, III) zobrazujúca básnikov osobný a národný svet, prírodu, lásku a vlastenecký zápas. Vyjadruje reflexie o živote, smrti a ľudských hodnotách.","zadanie":4,"period":"realizmus"},{"work":"Neprebudený","author":"Martin Kukučín","plot":"Novela o mentálne zaostalom husiarovi Ondrášovi Machuľovi, ktorý žije vo sne, že sa ožení s krásnou Zuzkou Bežanovie. Tá ho v skutočnosti zo žartu povzbudzovala. Pri záchrane hydiny z požiaru Ondráš tragicky zahynie.","zadanie":5,"period":"realizmus"},{"work":"Ťapákovci","author":"B. S. Timrava","plot":"Novela o zaostalej rodine Ťapákovcov žijúcich pohromade v jednej izbe. Pokroková nevesta Iľa Kráľová sa snaží zmeniť pomery a presťahovať sa, no naráža na konzervatívnosť, najmä starej Anči-zmije. Kritika dedinskej zaostalosti.","zadanie":5,"period":"realizmus"},{"work":"Detvan","author":"Andrej Sládkovič","plot":"Päťspevová lyricko-epická skladba o slovenskom horalovi Martinovi Hudcovi z Detvy. Ten zabije sokola kráľa Mateja Korvína a nechce klamať – kráľ ho prijme do svojej Čiernej družiny. Idealizovaný obraz slovenského ľudu.","zadanie":6,"period":"romantizmus"},{"work":"Hájnikova žena","author":"P. O. Hviezdoslav","plot":"Lyricko-epická skladba. Hájnik Michal Čajka a jeho žena Hanka žijú šťastne, kým mladý pán Artuš Villáni nezačne Hanku obťažovať. Hanka v sebaobrane zabije Artuša, Michal vinu vezme na seba a Hanka sa v záchvate šialenstva prizná v kostole.","zadanie":6,"period":"realizmus"},{"work":"Eugen Onegin","author":"A. S. Puškin","plot":"Veršovaný román. Cynický petrohradský šľachtic Onegin odmietne lásku citlivej Tatiany Larinovej. V dueli zabije priateľa Lenského. O roky neskôr stretne Tatianu vydatú za generála, zaľúbi sa, ale ona ho odmietne – ostáva verná manželovi.","zadanie":6,"period":"romantizmus"},{"work":"Otec Goriot","author":"Honoré de Balzac","plot":"Román zo zbierky Ľudská komédia. Bývalý výrobca cestovín Goriot žije v skromnom penzióne a všetko, čo má, dáva svojim dvom dcéram, ktoré sa vďaka jeho peniazom dobre vydali. Dcéry ním ale opovrhujú a zanedbávajú ho. Goriot zomiera opustený, len mladý Eugène de Rastignac je pri ňom.","zadanie":7,"period":"realizmus"},{"work":"Kapitánova dcéra","author":"A. S. Puškin","plot":"Historický román o mladom dôstojníkovi Petrovi Grinjovovi, ktorý slúži v pevnosti na Urale počas Pugačovovho povstania (1773–74). Zaľúbi sa do kapitánovej dcéry Máše Mironovovej; po dobytí pevnosti mu Pugačov ušetrí život pre jeho čestnosť.","zadanie":7,"period":"realizmus"},{"work":"Sonety pre Lauru","author":"F. Petrarca","plot":"Cyklus sonetov venovaný idealizovanej Laure (Laure de Noves), ktorú videl básnik prvýkrát v kostole. Vyjadrenie nenaplnenej, čistej lásky, hlboké introspektívne meditácie o láske, čase a smrti.","zadanie":8,"period":"renesancia"},{"work":"Sonety (Shakespeare)","author":"W. Shakespeare","plot":"Zbierka 154 sonetov. Prvá časť (1–126) je adresovaná krásnemu mladíkovi, druhá (127–154) tajomnej čiernej dáme. Témy: láska, čas, krása, smrť, nesmrteľnosť cez poéziu.","zadanie":8,"period":"renesancia"},{"work":"Zmráka sa","author":"Ivan Krasko","plot":"Symbolistická báseň z prvej zbierky Nox et solitudo. Vyjadruje pocity osamelosti, nostalgie, melanchólie zapadajúceho dňa. Hlavná symbolika súmraku ako prechod do beznádeje a smútku.","zadanie":8,"period":"symbolizmus"},{"work":"Topole","author":"Ivan Krasko","plot":"Báseň zo zbierky Nox et solitudo. Topole sú symbolom slovenského národa – stojí pevne, ale je sám, opustený, smutný. Krasko vyjadruje osamelosť a túžbu po vyjasnení národného osudu.","zadanie":8,"period":"symbolizmus"},{"work":"Odysea","author":"Homér","plot":"Antický epos o desaťročnom návrate gréckeho hrdinu Odysea z trojskej vojny domov na Ithaku. Cestou prekonáva mnoho prekážok (Kyklop Polyfém, Kirké, Sirény, Skylla a Charybda). Doma medzitým Penelopa odoláva nápadníkom, ktorých Odyseus po návrate pobije.","zadanie":9,"period":"antika"},{"work":"Svätopluk","author":"Ján Hollý","plot":"Klasicistický epos v 12 spevoch napísaný bernolákovčinou a v časomernom verši. Zobrazuje boj Veľkomoravského kniežaťa Svätopluka proti východofranskému kráľovi Karolmanovi v 9. storočí. Oslavuje slovanskú statočnosť a vlastenectvo.","zadanie":9,"period":"klasicizmus"},{"work":"Slávy dcéra","author":"Ján Kollár","plot":"Cyklus 645 zneliek (sonetov) v 5 spevoch (Sála, Labe, Dunaj, Léthe, Acheron). Slávy dcéra je idealizovanou bohyňou slovanstva. Najznámejší je Predspev, oplakávajúci pohltené slovanské kmene a vyzývajúci k slovanskej vzájomnosti.","zadanie":9,"period":"klasicizmus"},{"work":"Jašek Kutliak spod Bučinky","author":"Milo Urban","plot":"Novela o mladom horalovi Jaškovi, ktorý sa zaľúbi do bohatej dievčiny. Hoci jeho cit je úprimný, narazí na sociálne rozdiely a tragicky zahynie. Naturistický štýl s prírodou ako spoluúčastníkom deja.","zadanie":10,"period":"expresionizmus"},{"work":"Koniec lásky","author":"Janko Jesenský","plot":"Krátka próza zachytávajúca sklamanie z lásky a iróniu ľudských vzťahov. Jesenský s typickým sarkazmom rozoberá nestálosť citov a malomeštiacke pomery.","zadanie":10,"period":"moderna"},{"work":"Peter a Lucia","author":"Romain Rolland","plot":"Antivojnová novela odohrávajúca sa v Paríži počas 1. svetovej vojny. Mladí Peter a Lucia sa zaľúbia uprostred bombardovania. Plánujú spoločnú budúcnosť, no Veľký piatok ich obidvoch zabije nemecká bomba v kostole.","zadanie":10,"period":"moderna"},{"work":"Zmierenie alebo Dobrodružstvo pri obžinkoch","author":"Ján Palárik","plot":"Veselohra so zámenou identít. Gróf Ladislav Kostrovický a učiteľ Miloslav Hrabovec si vymenia identity, podobne aj grófka Eliza Hrabovská a Milina Petrovská. Cez tieto zámeny sa nájdu skutoční partneri, prekoná sa národnostná rezerva.","zadanie":11,"period":"romantizmus"},{"work":"Lakomec","author":"Molière","plot":"Klasicistická komédia o lakomcovi Harpagonovi, ktorého jediná láska sú jeho peniaze. Zakopal si pokladnicu so zlatom v záhrade, ktorú mu syn Cléante ukradne. Cez peripetie sa všetko vyrieši – Harpagon dostane peniaze späť, mladí sa vezmú.","zadanie":11,"period":"klasicizmus"},{"work":"Grammatica slavica","author":"Anton Bernolák","plot":"Vedecká gramatika spisovnej slovenčiny z roku 1790. Spolu s dielom Dissertatio philologico-critica (1787) tvorí základ prvej kodifikácie spisovnej slovenčiny zo západoslovenského kultúrneho jazyka.","zadanie":12,"period":"osvietenstvo"},{"work":"Nauka reči slovenskej","author":"Ľudovít Štúr","plot":"Gramatika spisovnej slovenčiny (1846), kodifikujúca slovenčinu na základe stredoslovenského nárečia. Spolu so spisom Nárečja slovenskuo... ustanovila spisovnú slovenčinu, ktorú prijali katolíci aj evanjelici.","zadanie":12,"period":"romantizmus"},{"work":"Živý bič","author":"Milo Urban","plot":"Expresionistický román o slovenskej dedine Ráztoky počas 1. svetovej vojny. Zobrazuje utrpenie obyvateľov pod tlakom vojny – odvody mužov, hlad, krivdy. Vzbura dediny proti notárovi vrcholí jeho zabitím. Symbol vojny ako živého biča.","zadanie":13,"period":"expresionizmus"},{"work":"Na západe nič nového","author":"E. M. Remarque","plot":"Antivojnový román o nemeckom vojakovi Paulovi Bäumerovi a jeho spolužiakoch, ktorí narukovali do 1. svetovej vojny. Postupne všetci zahynú v zákopoch. Paul zomiera v deň, keď je hlásenie z frontu na západe nič nového – ukazuje absurdnosť a brutalitu vojny.","zadanie":13,"period":"moderna"},{"work":"Apoliena","author":"J. G. Tajovský","plot":"Poviedka o starnúcej slúžke Apoliene, ktorá celý život pracovala pre druhých. Po smrti jej pani ostane sama, opustená, a smúti za starými časmi. Sociálna kritika postavenia chudobných.","zadanie":14,"period":"realizmus"},{"work":"Mesto s ružou","author":"R. Fábry","plot":"Surrealistická zbierka básní (1939) zobrazujúca mesto vo sne a v realite, kombinujúca konkrétne s fantastickým. Charakteristická obraznosť, asociácie a hra so slovami.","zadanie":15,"period":"nadrealizmus"},{"work":"Nedeľa","author":"J. Smrek","plot":"Báseň zo zbierky odvíjajúca atmosféru oddychu, prírody a životnej radosti. Smrek (vitalista) oslavuje krásu obyčajného dňa, ženy, prírody.","zadanie":15,"period":"vitalizmus"},{"work":"Iba oči","author":"L. Novomeský","plot":"Báseň zo zbierky sociálnej a básnickej skupiny DAV. Reflexia o nepravdivosti vonkajšieho sveta, kde vidíme len povrch – iba oči. Sociálne ladená lyrika.","zadanie":15,"period":"DAV"},{"work":"Drak sa vracia","author":"Dobroslav Chrobák","plot":"Naturistická novela o samotárovi Martinovi Lepišovi (zvanom Drak), ktorého dedina podozrieva z prinesenia nešťastia. Po búrke ho označia za vinníka. Drak sa hrdo vráti, zachráni dedinský dobytok zo strán a získa si rešpekt.","zadanie":16,"period":"naturizmus"},{"work":"Tri gaštanové kone","author":"Margita Figuli","plot":"Lyrická naturistická novela. Mladý voziar Peter sa zaľúbi do Magdalény, ale ona je donútená vydať sa za zlého Jana Záhora. Peter za ňou prichádza s tromi gaštanovými koňmi ako symbolom čistej lásky; po Záhorovej smrti sa konečne nájdu.","zadanie":16,"period":"naturizmus"},{"work":"Malka","author":"František Švantner","plot":"Naturistická novela. Pastier Maxim sa zaľúbi do mladej Malky. Ich vzťah je opísaný cez splynutie s prírodou, mýtické prvky. Tragický koniec.","zadanie":16,"period":"naturizmus"},{"work":"Bačova žena","author":"Ivan Stodola","plot":"Sociálna dráma. Bačova žena Eva sa po jeho odchode do Ameriky znova vydá za bohatého gazdu Mišo Ondreja, lebo verí, že manžel je mŕtvy. Keď sa Ondrej vráti, Eva nedokáže žiť s rozporom – samovražedne sa otrávi.","zadanie":17,"period":"dráma"},{"work":"Matka","author":"Július Barč Ivan","plot":"Sociálna dráma o matke, ktorá stráca synov v ťažkých časoch. Symbol slovenskej matky, jej obetavosti a utrpenia. Téma chudoby, vojny, materstva.","zadanie":17,"period":"dráma"},{"work":"Kým kohút nezaspieva","author":"Ivan Bukovčan","plot":"Existencialistická dráma o desiatich rukojemníkoch zatvorených v pivnici počas 2. svetovej vojny. Nemci im oznámia, že do svitania musia sami vybrať jedného, ktorý bude popravený za zabitého vojaka. Drámu sa odhalia ich charaktery, slabosti i zbabelosť.","zadanie":17,"period":"povojnová dráma"},{"work":"Kufor na sny","author":"Dušan Dušek","plot":"Próza s lyrickými prvkami zachytávajúca obyčajné okamihy, detstvo a sny. Pre Duška typické citlivé pozorovanie detailov sveta.","zadanie":18,"period":"súčasná literatúra"},{"work":"Pisár Gráč","author":"J. C. Hronský","plot":"Psychologický román o úradníkovi Mateji Gráčovi, ktorý je rozpoltená osobnosť. Vnútorný monológ odhaľuje jeho dvojaký život, vinu, neistotu. Vrcholí jeho psychologickým rozkladom.","zadanie":18,"period":"moderna"},{"work":"Odyseus (Joyce)","author":"James Joyce","plot":"Modernistický román zobrazujúci jeden deň (16. júna 1904) v Dubline cez postavu Leopolda Blooma. Paralela s Homérovou Odyseou. Charakteristický prúd vedomia (stream of consciousness).","zadanie":18,"period":"modernizmus"},{"work":"Premena","author":"Franz Kafka","plot":"Existencialistická novela. Obchodný cestujúci Gregor Samsa sa zobudí premenený na obrovský hmyz. Rodina ho najprv prijíma, postupne ho zanedbáva a izoluje, kým neumrie sám vo svojej izbe.","zadanie":18,"period":"modernizmus"},{"work":"Nečakanie na Godota","author":"M. Lasica + J. Satinský","plot":"Slovenská paródia/inscenácia na motívy Beckettovej drámy. Lasica a Satinský v ich charakteristickom konverzačnom štýle využívajú absurdnú dramatiku pre humor a satiru.","zadanie":19,"period":"súčasná dráma"},{"work":"Čakanie na Godota","author":"Samuel Beckett","plot":"Absurdná dráma. Dvaja tuláci Vladimír a Estragon čakajú v pustom kraji na záhadného Godota, ktorý nikdy nepríde. Striedajú nezmyselné rozhovory s pokusmi o samovraždu. Symbol absurdity ľudského života a márneho čakania.","zadanie":19,"period":"absurdná dráma"},{"work":"Zahradní slavnost","author":"Václav Havel","plot":"Absurdná dráma. Mladý Hugo Pludek sa snaží uspieť v byrokratickej spoločnosti, kde ľudia hovoria frázami a stratili autentickosť. Cez paródiu úradníckeho jazyka kritizuje totalitnú spoločnosť.","zadanie":19,"period":"absurdná dráma"},{"work":"Kolíska","author":"Alfonz Bednár","plot":"Próza o SNP. Hlavná postava sa stretáva s ťažkými morálnymi rozhodnutiami počas povstania. Symbol kolísky ako miesta zrodenia, ale aj prísľubu budúcnosti.","zadanie":20,"period":"povojnová próza"},{"work":"Ako chutí moc","author":"Ladislav Mňačko","plot":"Román o smrti komunistického funkcionára, jeho zapadanie do moci postupne nivelizuje jeho charakter. Cez retrospektívu analyzuje mechanizmus moci a jej deformujúci vplyv na človeka. Ostrá kritika kultu osobnosti.","zadanie":20,"period":"povojnová próza"},{"work":"Smrť sa volá Engelchen","author":"Ladislav Mňačko","plot":"Román o SNP. Mladý partizán Vološin po vojne hľadá esesáka Engelchena, ktorý zničil dedinu Ploština a zastrelil jeho lásku Marju. Zranený leží v nemocnici a rozpomína sa na vojnové zážitky, morálne dilemy a krutosti.","zadanie":20,"period":"povojnová próza"},{"work":"Jablko","author":"Miroslav Válek","plot":"Báseň zo zbierky Dotyky. Cez obraz padajúceho jablka vyjadruje rozchod, koniec lásky, nostalgiu. Charakteristická Válekova obraznosť a moderná lyrika.","zadanie":21,"period":"súčasná lyrika"},{"work":"Domov sú ruky...","author":"Milan Rúfus","plot":"Báseň zo zbierky Až dozrieme. Domov nie je miesto, ale ruky blízkych – matka, otec. Filozoficko-duchovná lyrika o istote, koreňoch, láske rodiny.","zadanie":21,"period":"súčasná lyrika"},{"work":"Marína","author":"Andrej Sládkovič","plot":"Lyricko-reflexívna skladba 291 strof venovaná Márii Pišlovej, do ktorej sa Sládkovič zaľúbil ako bohoslovec. Ona sa však musela vydať za bohatšieho Pavla Geržu. Sládkovič oslavuje krásu, mladosť a večnú lásku.","zadanie":22,"period":"romantizmus"},{"work":"Dievča v rozkvete","author":"J. Smrek","plot":"Báseň vitalistickej lyriky oslavujúca mladosť, krásu ženy a životnú radosť. Smrekova typická citová úprimnosť a obraznosť.","zadanie":22,"period":"vitalizmus"},{"work":"Ave Eva","author":"J. Kostra","plot":"Báseň o žene ako oslave života, plodnosti, krásy. Paralela s biblickou Evou a Avemarie – žena ako pôvod a podstata sveta.","zadanie":22,"period":"moderna"},{"work":"Antigona","author":"Sofokles","plot":"Antická tragédia. Antigona pochová svojho brata Polyneika napriek zákazu kráľa Kreona, ktorý ho označil za zradcu. Za neposlušnosť ju Kreon odsúdi na smrť zamurovaním. Antigona sa obesí, Kreonov syn Haimón (jej snúbenec) sa zabije, neskôr aj Kreonova žena Eurydika. Konflikt božských a ľudských zákonov.","zadanie":23,"period":"antika"},{"work":"Hamlet","author":"W. Shakespeare","plot":"Renesančná tragédia. Princ Hamlet z Dánska sa dozvedá od ducha otca, že ho zavraždil strýko Klaudius, ktorý sa stal kráľom a oženil sa s Hamletovou matkou. Hamlet predstiera šialenstvo, váha s pomstou. Po krvavom finále zomierajú všetci hlavní – Klaudius, kráľovná, Laertes aj Hamlet. Slávny monológ Byť či nebyť.","zadanie":23,"period":"renesancia"},{"work":"Statky-zmätky","author":"J. G. Tajovský","plot":"Realistická dráma o sile peňazí v slovenskej dedine. Starý Palčík sľúbi statok mladému páru Ďurovi a Zuze za to, že sa budú o neho starať. Manželstvo nie je z lásky – Ďuro pije, Zuza sa zblíži s Tomášom. Po smrti Palčíka sa všetko rúca, ukazuje sa zhubný vplyv majetku.","zadanie":23,"period":"realizmus"},{"work":"Meno ruže","author":"Umberto Eco","plot":"Postmoderný historický román/detektívka. V severotalianskom benediktínskom kláštore v r. 1327 vyšetruje františkán William z Baskervillu so svojím učňom Adsom z Melku sériu záhadných úmrtí mníchov. Kľúčom je zakázaná Aristotelova kniha o komédii. Starý slepý knihovník Jorge pôvodca smrtí, kláštor lehne popolom.","zadanie":24,"period":"postmoderna"},{"work":"Démon súhlasu","author":"Dominik Tatarka","plot":"Satirická novela kritizujúca stalinizmus a kult osobnosti. Hrdina Bartolomej Slzička je úradník, ktorý zo strachu vždy súhlasí so všetkým – ovládol ho démon súhlasu. Ostrá kritika konformizmu a totalitnej spoločnosti.","zadanie":24,"period":"povojnová próza"},{"work":"Vytie","author":"Allen Ginsberg","plot":"Slávna báseň generácie beat. Začína sa Videl som najlepšie hlavy svojej generácie zničené šialenstvom... – obraz zničených, ale autentických duší proti americkej spoločenskej pretvárke a Molochovi (kapitalizmu).","zadanie":25,"period":"beat generation"},{"work":"Kto chytá v žite","author":"J. D. Salinger","plot":"Román. Mladý Holden Caulfield po vyhodení zo školy sa vlečie New Yorkom, kritizuje pokrytectvo dospelých. Sníva o tom, ako bude chytať deti, ktoré by spadli zo skál do žita. Kultová kniha mládeže o nepochopení a hľadaní autenticity.","zadanie":25,"period":"americká próza"},{"work":"Ilias","author":"Homér","plot":"Antický epos o desiatom roku trójskej vojny. Hlavná zápletka je hnev Achilla na vodcu Agamemnóna, kvôli ktorému Achilles odmieta bojovať. Po smrti priateľa Patrokla z rúk Hektora sa Achilles vracia do boja a zabíja Hektora. Symbol antického hrdinstva a osudu.","zadanie":26,"period":"antika"},{"work":"Proglas","author":"Konštantín (Filozof)","plot":"Najstaršia slovanská báseň (9. stor.), predslov k prekladu evanjelií. Konštantín Filozof (sv. Cyril) v nej oslavuje slovanské písmo a vyzdvihuje hodnotu čítania v rodnom jazyku.","zadanie":26,"period":"veľkomoravská lit."},{"work":"Moravsko-panónske legendy","author":"Konštantín (Filozof)","plot":"Životopisné legendy o sv. Cyrilovi a Metodovi z 9. storočia. Popisujú ich misijnú činnosť na Veľkej Morave, vytvorenie hlaholiky, boj o uznanie slovanskej liturgie pred pápežom.","zadanie":26,"period":"veľkomoravská lit."},{"work":"Decameron","author":"Boccaccio","plot":"Renesančný rámcový rozprávkový cyklus. Desať mladých Florenčanov uteká pred morom z mesta na vidiek, kde si počas 10 dní rozprávajú každý deň po jednom príbehu (spolu 100). Témy: láska, zmyselnosť, prefíkanosť, kritika cirkvi.","zadanie":26,"period":"renesancia"},{"work":"Don Quijote","author":"Cervantes","plot":"Renesančný román o zemanovi Alonsovi Quijanovi, ktorý sa od čítania rytierskych románov pomieša a vydá sa s vyhladnutým koňom Rocinante a sluhom Sancho Panzom konať dobrodružstvá ako rytier Don Quijote. Bojuje s veternými mlynmi (ktoré pokladá za obrov). Paródia rytierstva, ale aj idealizmu.","zadanie":26,"period":"renesancia"},{"work":"Marnost na všem...","author":"Ján Silván","plot":"Barokové duchovné dielo v poetickej forme, vyjadrujúce barokovú myšlienku pominuteľnosti pozemských vecí (vanitas), nutnosti obrátiť sa k Bohu a zaoberať sa duchovnými hodnotami.","zadanie":27,"period":"baroko"},{"work":"Ostne (Obrana)","author":"Ján B. Magin","plot":"Barokové polemické dielo, ktoré obraňuje slovenský národ proti útokom. Vyjadruje slovenskú národnú hrdosť a kultúrnu hodnotu.","zadanie":27,"period":"baroko"},{"work":"Labyrint světa a ráj srdce","author":"J. A. Komenský","plot":"Barokovo-alegorické dielo. Pútnik prechádza Labyrintom sveta (symbolizujúcim ľudskú spoločnosť s jej márnosťami) a hľadá zmysel života. Nachádza ho až v Raji srdca – v duchovnom vzťahu k Bohu.","zadanie":27,"period":"baroko"},{"work":"Chrám Matky Božej v Paríži","author":"Victor Hugo","plot":"Romantický román o znetvorenom zvonárovi Quasimodovi z parížskej katedrály a krásnej cigánke Esmeralde. Quasimodo ju ľúbi, no ona miluje kapitána Phoeba. Žiarlivý arcidekan Frollo ju falošne obviní z vraždy a nechá ju popraviť. Quasimodo ho zhodí z veže, sám zomiera vedľa jej tela.","zadanie":28,"period":"romantizmus"},{"work":"Zločin a trest","author":"F. M. Dostojevskij","plot":"Psychologický román. Chudobný študent Rodion Raskoľnikov v Petrohrade zavraždí starú úžerníčku a jej sestru, lebo verí, že výnimočný človek má právo na zločin pre vyššie ciele. Trápia ho výčitky svedomia, postupne ho vyšetrovateľ Porfyrij prevedie k priznaniu. Pomáha mu prostitútka Soňa Marmeladovová svojou láskou a vierou. Raskoľnikov ide do Sibíri.","zadanie":28,"period":"realizmus"},{"work":"Múr","author":"J. P. Sartre","plot":"Existencialistická poviedka. Pablo Ibbieta je zajatý v španielskej občianskej vojne a má byť ráno popravený. Strávi noc tvárou v tvár smrti, premýšľa o živote, ľuďoch okolo. Náhoda mu paradoxne zachráni život. Téma: absurdnosť a sloboda v hraničnej situácii.","zadanie":29,"period":"existencializmus"},{"work":"Hlava XXII","author":"Joseph Heller","plot":"Antivojnový satirický román o americkom bombardéri Yossarianovi počas 2. sv. vojny v Taliansku. Snaží sa uniknúť z misií, ale narazí na hlavu 22 – paragraf, ktorý hovorí: kto chce uniknúť, je príčetný, takže nemôže uniknúť. Absurdná byrokracia vojny.","zadanie":29,"period":"postmoderna"},{"work":"1984","author":"George Orwell","plot":"Dystopický román. Winston Smith žije v totalitnej Oceánii pod nadvládou Veľkého brata a Strany. Pracuje v Ministerstve pravdy, kde prepisuje históriu. Tajne si píše denník a začne vzťah s Júliou. Sú zatknutí, mučení v Ministerstve lásky a prelomení. Slávne: Vojna je mier. Sloboda je otroctvo.","zadanie":29,"period":"dystopia"},{"work":"Báseň a modlitba","author":"Milan Rúfus","plot":"Zbierka duchovnej poézie, kde Rúfus spája básnictvo s vierou. Modlitba ako forma najčistejšej poézie, hovorenie s Bohom o najdôležitejších veciach života.","zadanie":30,"period":"súčasná lyrika"},{"work":"Malý princ","author":"Antoine de Saint-Exupéry","plot":"Filozofická rozprávka. Pilot havaruje v Sahare a stretáva chlapca z asteroidu B-612 – Malého princa. Ten mu rozpráva o ceste po planétach, kde stretával dospelých zaujatých zbytočnosťami. Na Zemi sa spriatelí s líškou (skrotenie). Najslávnejšia myšlienka: Dobre vidíme len srdcom. To podstatné je očiam neviditeľné.","zadanie":30,"period":"moderna"},{"work":"Harry Potter","author":"J. K. Rowlingová","plot":"Séria fantasy románov o chlapcovi Harrym Potterovi, ktorý zistí, že je čarodejník a začne študovať na Rokforte. So priateľmi Ronom a Hermionou bojuje proti zlému Lordovi Voldemortovi, ktorý mu v detstve zabil rodičov.","zadanie":30,"period":"súčasná literatúra"}]}</script>
