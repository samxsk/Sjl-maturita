dzincov?\n\n**Slovenčina **vs** Angličtina**\n\nSJ- má skloňovanie, má len 3 časy, nemá členy, tvarovanie slov,\n\nAJ- má 12 časov, nemá sklonovanie, má členy,\n\nNájdite v ukážkach pôvod minimálne troch cudzích slov.\n\nÚloha č. 2\n\n**Porovnajte **antickú, stredovekú** literatúru a literatúru **humanizmu a renesancie**. **Analyzujte ukážky a vysvetlite výrazné literárne žánre jednotlivých období.","number":26,"assignment":"**Zadanie č. 26**\n\nÚloha č. 1\n\n**Charakterizujte indoeurópsku jazykovú skupinu. Zaraďte slovenčinu do systému **slovanských jazykov**.  Porovnajte slovenčinu s vybraným cudzím jazykom** /*angličtina, nemčina, francúzština, ruština, čeština/.* Ktoré jazykové prostriedky slovenčiny sú podľa vás náročné pre cudzincov?\n\nNájdite v ukážkach pôvod minimálne troch cudzích slov.\n\nÚloha č. 2\n\n**Porovnajte **antickú, stredovekú** literatúru a literatúru **humanizmu a renesancie**. **Analyzujte ukážky a vysvetlite výrazné literárne žánre jednotlivých období.\n\nUkážky: *Homér - **Ilias*\n\n* Moravsko-panónske legendy, Konštantín - **Proglas*\n\n* G. **Boccaccio** – **Decameron**, **Saavedra**: Dômyselný rytier Don **Quijote** de la **Mancha*\n\n**Homér: **Ilias**\n\n22. spev\n\nKeď tak šli proti sebe a celkom už blízko si boli,\n\nHektor s prilbicou lesklou ho oslovil prvý a riekol:\n\n,,Viac už nebudem utekať, Achilles, ako som bežal\n\nTrikrát okolo trójskeho mesta, keď nemal som smelosť\n\nVyčkať tvoj útok. No teraz srdce ma vyzýva stať si\n\nProti tebe. Buď zhyniem, buď, naopak, aj teba zničím.\n\nTeraz však najprv si za svedkov vezmime bohov, bo oni\n\nBudú nám najlepšie svedčiť a zmluvy naše nám strážiť.“\n\n**Moravsko-panónske legendy (úryvok) Život svätého Konštantína**\n\nOdpovedal im Filozof: „Či neprichádza dážď od Boha na všetkých rovnako? Alebo či slnce tak isto nesvieti na všetkých? Či nedýchame na vzduchu rovnako všetci? A tak vy nehanbíte sa, tri jazyky len uznávajúc a prikazujúc, aby všetky ostatné národy a plemená boli slepé a hluché?“\n\n**Život svätého Metoda **\n\n...a prijmúc ho knieža Svätopluk so všetkými Moravanmi, zveril mu všetky kostoly a duchovných vo všetkých mestách. Od toho dňa začalo rásť učenie božie a duchovní rozmnožovať sa vo všetkých mestách a pohania veriť v pravého Boha, od svojich bludov sa odvracajúc.\n\n.........\n\nKeď svital tretí deň, riekol naposledy:\n\n*,,Do rúk tvojich ,Pane, dušu svoju skladám.“*\n\nA na rukách v kňazských dokonal šiesteho dňa mesiaca apríla... I opatriac ho učeníci jeho a dôstojné úcty mu vzdajúc, službu cirkevnú latinsky i grécky i sloviensky vykonali a uložili ho v katedrálnom chráme. A ľudia, nesčíselný národ, zhromaždivší sa, odprevádzali ho sviecami, plačúc...*lebo pre všetkých stal sa všetkým, aby všetkých získal.*\n\n**Konštantín: **Proglas** (úryvok)**\n\nBo svätý Pavol učiteľ nám hovorí,\n\nkeď najprv k Bohu prosbu svoju predniesol:\n\nChcem radšej iba pätoro slov povedať,\n\nrozumom prostým chcem tých päť slov vyrieknuť,\n\naby aj bratia všetko porozumeli,\n\nnež nezrozumiteľných slov riecť tisíce.\n\n**Giovanni Boccaccio**: Dekameron (úryvok)**\n\n(Saladin sa pýta) „Mocný môj človeče, počul som od mnohých ľudí, že si náramne múdry\n\n a zbehlý v náboženstve. Rád by som vedel, ktorú vieru pokladáš za pravú, židovskú, mohamedánsku či kresťanskú.“\n\n.....\n\n(Žid Melchisedech odpovedá) ... „Tak je to, pán môj, aj s troma vierami, ktoré dal Boh Otec trom národom a na ktoré ste sa ma opýtali. Každý verí, že má jeho dedičstvo, jeho pravý zákon, jeho prikázania, ale otázka, kto je jeho dedičom nie je dodnes rozriešená...“\n\n**Miguel** de **Cervantes Saavedra**: Dômyselný rytier Don **Quijote** de la **Mancha** (úryvok)**\n\nVtom zočili v diaľke na poli zo tridsať – štyridsať veterných mlynov, a len čo ich Don Quijote uzrel, riekol zbrojnošovi: ,,Šťastie vedie naše veci lepšie, než sme si mohli želať. Či vidíš, priateľ Sancho Panza, tamhľa ten húf prinajmenej tridsiatich ozrutných obrov, s ktorými sa pustím do boja a všetkých pripravím o život? Ich korisť stane sa základom nášho bohatstva, lebo to bude boj spravodlivý a skutok veľmi bohumilý, keď vykynožím z povrchu zeme také zlé býlie.“\n\n... „Počujte, Vaša milosť,“ odvetil Sancho, „veď to, čo tam vidno, nie sú obri, ale veterné mlyny.“\n\n„Zrejme,“ odvetil Don Quijote, „sa nevyznáš ani za mak v dobrodružstvách: sú to obri a ak sa bojíš, rušaj odtiaľto a modli sa, pokým sa ja pustím s nimi do krutého a nerovného boja.“\n\n...A rieknuc to a odporučiac sa s celého srdca svojej pani Dulcinei, prosiac ju o pomoc v takejto nebezpečnej chvíli, dobre chránený štítom, s kopijou zapravenou v lôniku, popchal Rocinanta do plného cvalu a zaútočil na prvý najbližší mlyn..."},"27":{"tema_jazyk":"Jazyk a reč, jazyková kultúra","tema_lit":"Baroko a klasicizmus","autori":["Ján Silván","Hugolín Gavlovič","Ján B. Magin","J. A. Komenský","Ján Hollý"],"diela":["Marnost na všem...","Valaská škola...","Ostne (Obrana)","Labyrint světa a ráj srdce"],"okruh_jazyk":"Jazyk a reč","okruh_lit":"Baroko a klasicizmus","full":"**Zadanie č. 27**\n\nÚloha č. 1\n\n**Charakterizujte pojmy **jazyk a reč**. Využite niektoré slová z nasledujúceho radu: **spoločenský, znaky, pravidlá, kodifikácia, kultúra, mimojazykové prostriedky, komunikácia, slovo, myslenie, národ.*\n\n**Vysvetlite pojem **jazyková kultúra** a ako súvisí s kvalitou vedeckého preskúmania jazyka, jazykovou praxou a výslovnostnými štýlmi **(neutrálny, vysoký, nižší štýl).*\n\n**Opravte uvedené ,,**jazykokazy**“: **Pani učiteľka, kedy by ste mohla prísť k nám. Naša stará mama tam neboli. To je k smiechu. Príprava ku skúške bola náročná. behom leta, chovať sa, **snílkovia**, predať skúsenosti, sluší ti to, opraviť **závadu**, padnúť do kolien, vypadá dobre.*\n\nÚloha č. 2\n\n**Porovnajte **barokové umenie a literatúru** s hľadaním dokonalosti v **klasicizme**. Nájdite konkrétne znaky jednotlivých literárnych období a žánrov v ukážkach, vysvetlite názvy a žánre ukážok. Ukážky: **Ján Silván: **Marnost** na **všem** znám a vidím, H. **Gavlovič**: Valaská škola*\n\n* Ján Baltazár **Magin**: Ostne...alebo Obrana *\n\n* J. A. Komenský: **Labyrint světa a ráj srdce*\n\n* J. Hollý – óda, elégia*\n\n**Ján Silván: **Marnost** na **všem** znám a vidím **Hugolín Gavlovič**: Valaská škola...** Pána Boha z celého srdce miluj**\n\nMarnosť na všem znám a vidím, Synu milý, v živobytí abys' byl ščaslivý nechť pak, nač chci, v světe hledím. m[o]síš na Boha pobožne vždy byť pamatlivý.\n\nŽádost těla, žádosť očí – Búh te stvoril milostive k podobenství svému\n\nmarnosť v světe všecky věci. nemáš srdce tvé obracať k stvorení jinému.\n\n Miluj Boha spravedlive, nos ho v srdci tvojem,\n\nBílé tělo, černé oči, jak od toho cíle zblúdíš, nebudeš s pokojem.\n\nhladké ruce, rusé vlasy Dal ti život, i to čo máš, i nebe chce dati,\n\ni všecka ozdoba těla jestliže ho spravedlive budeš milovati.\n\njakoby nikdá nebyla. Vychvaluj ho jako múžeš, hoden je všej chvály,\n\n............ pros od neho, čo ti treba, v daroch je nemalý.\n\nProtož každý obtížený Všečko čo máš, mu obetuj, áno i sám sebe,\n\nčekaj konce – dlouhoť není. budeš ho meť pomocníkem v každej tvej potrebe.\n\nA ty, jenž sa v zboží těšiš,\n\nnež se naděješ, vše stratíš.\n\nProtož každý v tomto světe\n\nneběž jako v nejistotě.\n\nOpusť světa zlé žádosti,\n\ndrž se cnosti, spravedlnosti.\n\n**Ján Baltazár **Magin**: Ostne...alebo Obrana (úryvok)**\n\nDostatočne, vravím, by bolo možné dokázať, že všetci Slovania, žijúci v Uhorsku, majú také isté občianske práva ako Maďari, taký istý starobylý a čestný pôvod, takú istú vojenskú slávu svojich predkov, takú istú možnosť získavať výsady, takú istú vlasť, ktorú zdedili po svojich predkoch a ktorú ešte i dnes držia pevne vo svojich rukách...\n\n**Jan Amos Komenský: Labyrint světa a ráj srdce**\n\nto jest,\n\n**světlé vymalování,**\nkterak v tom světě a věcech jeho všechněch\nnic není než matení a motání,\nkolotání a lopotování,\nmámení a šalba, bída a tesknost,\na naposledy omrzení všeho a zoufání;\nale kdož doma v srdci svém sedě,\ns jediným Pánem Bohem se uzavírá,\nten sám k pravému a plnému mysli upokojení\na radosti že přichází.\n\n**Ján Hollý: Na **krásnú zahradu**\nAj ťeba ňepreňechám krásná v mích zahrado pesňách.\nTi predná jích zasluhuješ; ňech ľen že mi Umka\nPopraje a schopnú uďelí básňíkovi súcosť,\nBich hodními sahal navnuklí spevmi ťa sláviť.\nOdkáď tá spaňilosť, odkáď tá krása a rozkoš?\nTak mnohonásobní velohojnéj úrodi víbor?\nTak vzňešené, tak roztomilé sa tu všecko nachádzá?\n\n**Ján Hollý: Plač **Matki** Slávi**\nČá sa to tak smutná po povetrú kvílba ozívá?\nAj to saméj trúchlí Matki je Slávi ohlas!\nTam hľe nad ohromnú, jako mój zrak spatruje, Tatrú\nNa staveném v modréj obloze mračňe seďí.\nRoztraťené sem tam vlasi má, oči núter upadlé,\nA spaňilé predtím všecki už usta bledé.\nTam vrúcé ze zreňic horkích slz kapki ľejícá\nNad vlastními také náreki sinmi veďe:\nJá tá preščastná ve saméj ľen toľko radosťi,\n\nÚloha č. 1\n\n**Charakterizujte pojmy **jazyk a reč**. Využite niektoré slová z nasledujúceho radu: **spoločenský, znaky, pravidlá, kodifikácia, kultúra, mimojazykové prostriedky, komunikácia, slovo, myslenie, národ.*\n\n***Jazyk:  je systém ustálených **znakov a pravidiel**, na základe ktorých vzniká konkrétna reč. Jazyk nie je jav prírodný, ale spoločenský, čo znamená, že ho nemáme vrodený. Musíme sa ho naučiť, dostať do svojho ja ako model, ktorý nám umožňuje dorozumievať sa. Jazyk si teda osvojujeme v sociálnom prostredí, ale dispozíciu osvojiť si ho máme vrodenú. Jazyk môžeme chápať ako dohodnutý kód, súbor znakov a pravidiel, alebo **slov**, ktoré sa používajú na vyjadrenie, prenos a výmenu informácií., **myslenia.** Slúži ako sústava vyjadrovacích znakových prostriedkov istého ľudského spoločenstva. \n\n**Reč:** je konkrétne využitie jazyka na vyjadrenie určitých myšlienok (názorov, citov). Býva doplnená mnohými **mimojazykovými prostriedkami** napr. mimikou, pohybmi rúk alebo celého tela. Spôsob reči závisí aj od iných faktorov, napr. od osôb, s ktorými sa zhovárame, od prostredia, situácie.\nReč sa vyvíja postupne, jej zákonitosti sa začali vedecky študovať až potom, keď už bola na istom stupni rozvoja. \n\n**Vysvetlite pojem **jazyková kultúra** a ako súvisí s kvalitou vedeckého preskúmania jazyka, jazykovou praxou a výslovnostnými štýlmi **(neutrálny, vysoký, nižší štýl).*\n\n**Jazyková kultúra** je cieľavedomá činnosť smerujúca k pestovaniu spisovnej podoby národného jazyka. Odvíja sa od postavenia, úrovne a prístupnosti vedeckého spracovania teórie o jazyku, od úrovne vyučovania jazyka, od jazykovej úrovne náučných, administratívnych publicistických a umeleckých jazykových prejavov, ako i od stupňa pociťovanej potreby zlepšovať úroveň vlastných jazykových prejavov. Predpokladom vysokej úrovne jazykovej kultúry je prepracovanosť teórie o spisovnom jazyku a stupeň poznania normy spisovného jazyka. Medzi časopisy, ktoré sa snažili pozdvihnúť jazykovú úroveň užívateľov slovenčiny, patrí Kultúra slova.\n\n**Výslovnostné štýly a)  vysoký štýl –**využíva sa vo verejnom oficiálnom prostredí, pri recitácii umeleckých textov, v slávnostných prejavoch; komunikanti využívajú spisovnú slovenčinu.\n\n**b) neutrálny štýl –** najčastejšia podoba hovorenej spisovnej slovenčiny. Využíva sa v súkromnom aj pracovnom styku. Ak je medzi komunikantmi spoločenský odstup (mladší/starší, podriadený/nadriadený,  prostredie školy, úradu a pod.), tak využíva spisovný jazyk.\n\n**c)  nižší štýl –** využíva sa v súkromnom aj verejnom prostredí, všade tam, kde je medzi komunikantmi neoficiálny alebo priateľský vzťah. Vyskytujú sa v ňom odchýlky od spisovnej normy, prejavuje sa napr. vplyv miestneho dialektu.\n\n**Opravte uvedené ,,**jazykokazy**“: **Pani učiteľka, kedy by ste mohla prísť k nám. Naša stará mama tam neboli. To je k smiechu. Príprava ku skúške bola náročná. behom leta, chovať sa, **snílkovia**, predať skúsenosti, sluší ti to, opraviť **závadu**, padnúť do kolien, vypadá dobre.*\n\n*Pani učiteľka, kedy by st**e **m**oh**li** p**rísť k **nám. Naša stará mama tam **nebola**. To **je** smiešne**. P**ríprava **k** skúške bola náročná. **V priebehu** leta, **správa**ť** sa, **snílkovia**, **odovzdať skúsenosti**,** pristane** ti to, opraviť **problém,poruchu**, padnúť **na kole**n**á**, **vyzer**á** dobre.*\n\nÚloha č. 2\n\n**Porovnajte **barokové umenie a literatúru** s hľadaním dokonalosti v **klasicizme**. Nájdite konkrétne znaky jednotlivých literárnych období a žánrov v ukážkach, vysvetlite názvy a žánre ukážok. BAROKOVÁ LITERATÚRA  Baroko** = je odvodený z portugalského a talianskeho slova **barocco** - perla nepravidelného tvaru\n\n- šíril sa najmä v **Taliansku **a tiež aj do ďalších európskych krajín\n\n- nový myšlienkový, spoločenský a umelecký prúd\n\n- názov dostal z výtvarného umenia\n\n**Znaky**: hravosť, idylickosť, elegantnosť, galantnosť, radostný pohľad na život\n\n**Spoločenská situácia** = vojny, turecké vpády, náboženské vojny, zvyšuje sa bieda ľudu, sociálny útlak - vzbury, rebélie, povstania\n\n- v tejto situácií viera v pozemský život v bežné radosti upadá a do popredia sa dostáva nadpozemský svet (verili v 2. príchod Krista a jeho tisícročné kráľovstvo na zemi pred posledným súdom)\n\n- beznádejnosť a besimizmus tejto situácie vyjadrovala myšlienka **Vanitas Vanitatum** = márnosť nad márnosť - všetko je pominuteľné\n\n- pre literárny barok sú charakteristické = **dekoratívnosť** (ozdobnosť), **pompéznosť** (nádhera), **patetickosť** (nadnesenosť)\n\n**Typickým znakom baroka **sú barokové protiklady:\n\n- Náboženská predstava ↔ surová pozemská zmyselnosť\n\n- Márnosť, pominuteľnosť, ničotnosť pozemských vecí ↔ dychtivosť po svetskej kráse\n\n- Oslavnosť, nadšenie ↔ vnútorné prežitie a citovosť\n\n- Čas ↔ večnosť\n\n- Strach zo smrti ↔ radosť zo života\n\n- Jednoduchosť, ľudovosť ↔ pompéznosť, vznešenosť\n\n- Veľmi ozdobný vysoký štýl ↔ jednoduché až drsné slová\n\n- z renesancie sa prebrala túžba po poznaní, zmyslovosť a zmyselnosť\n\n**Jazykové prostriedky** = symboly, alegórie, hyperboly, metafory,…\n\n**Literárne druhy: Lyrika = **duchovná, príležitostná, didakticko - reflexívna, sociálna, ľúbostná, žartovná\n\n **- literárne žánre**: piesne, idyly, hymny, elégie, sonety, aforizmy\n\n**Próza** = veršovaná aj neveršovaná\n\n - **veršovaná**: najmä eposy, bájky\n\n - **neveršovaná: **bájky, memoáre, cestopisy, autobiografie, encyklopédie\n\n**Dráma** = najmä tragédie, školské hry, opera\n\n**Hrdina** = bol svätec, mučeník, dobyvateľ, dobrodruh\n\n- vykonávali mimoriadne skutky, ktoré pramenili zo sebazaprenia a premáhania, odolávali svetským pokušeniam a hriechu\n\n**KLASICIZMUS**\n\n- odvodený od slova classicus = dokonalý, vynikajúci\n\n- vyvrcholilo vo Francúzsku - zrod za vlády Ľudovíta 14.\n\n- **spoločenská situácia** - po potlačení sociálnych nepokojov a po skončení dlhotrvajúcich vojen, dochádza v Európe k prehĺbeniu krízy feudalizmu (cechovú výrobu vystriedala manufaktúrna výroba, upevňujú sa absolutistické monarchie)\n\n- **osvietenský absolutizmus** - panovníci - Mária Terézia a Jozef II.\n\n- myslenie ovláda túžba po poznaní a hľadaní pravdy - do popredia sa dostáva ľudský rozum\n\n- myšlienkový prúd, ktorý sa opiera o tento druh poznania je racionalizmus = rozumový\n\n- **zakladateľ: René Descartes** - „Myslím, teda som!“\n\n- myslenie sa oslobodzuje od cirkevného vplyvu a ideálom je: Krásne je len to, čo je dobré a pravdivé = **trojjednota** krásy, dobra a pravdy**\n\n- myšlienky racionalistickej filozofie prenikajú aj do umenia a takto vzniká osobitný literárny smer - **KLASICIZMUS**\n\n- básnická tvorba bola upútaná presnými pravidlami, do poetického systému tieto pravidlá usporiadal:\n\n**Nicolas **Boilequ** - dielo: **L´art poetique** - Básnické umenie, autora nezaujímal človek aký je, ale aký by mal byť\n\n- autori sa usilujú vo svojich dielach postrehnúť zovšeobecnené charakterové vlastnosti (typy postáv - lakomci)\n\n- klasicizmus bol vzorom normovanej krásy a vzorom dokonalosti bolo umenie renesančné a antické\n\n**Žánre klasicizmu: 1. vysoké** - veršovaná tragédia, hrdinský epos, óda, elégia\n\n**2. nízke** - komédia, bájka, epigram, útvary zábavné a satirické\n\n- prísne sa rozlišoval štýl vysokých a nízkych žánrov\n\n- hrdinovia tragédií boli väčšinou šľachtici, ktorí stelesňovali ideál cti a statočnosti\n\n- konflikt bol medzi láskou a povinnosťou\n\n- väčšina divadelných hier končí zásahom kráľa\n\nDráma dodržiavala trojjednotu - jednotu času, jednotu deja (iba jeden dej) a jednotu miesta (príbeh sa musel odohrať na jednom mieste)","number":27,"assignment":""},"28":{"tema_jazyk":"Gramatické kategórie (menné, slovesné), skloňovanie","tema_lit":"Romantizmus a realizmus","autori":["Victor Hugo","F. M. Dostojevskij"],"diela":["Chrám Matky Božej v Paríži","Zločin a trest"],"okruh_jazyk":"Morfológia - gram. kategórie","okruh_lit":"Svetový romantizmus a realizmus","full":"Úloha č. 1\n\n**Charakterizujte menné a slovesné gramatické kategórie slova a syntaktických konštrukcií. **Urč**i**te potrebné gramatické kategórie zvýraznených slov v ukážkach a doplňte vzor.  Vyskloňujte uvedené slová**: pán**,** pani, Goethe, najlepší žiak, kráľovná, dva psy – dvaja psi.\n\nÚloha č. 2\n\n**Porovnajte hlavné znaky literatúry **romantizmu a realizmu**, analyzujte ukážky a vysvetlite umelecké stvárnenie skutočnosti. **\n\nUkážky: *V. Hugo – Chrám Matky Božej v Paríži*\n\n* F. M. Dostojevskij –Zločin a trest*\n\n**Victor** Hugo: Chrám Matky Božej v Paríži (úryvok)**\n\n„Piť!“ zopakoval Quasimodo po tretí raz a sťažka si vzdychol. V tej chvíli zbadal, že sa dav rozostupuje. Vyšla z neho čudne oblečená dievčina a s ňou malá biela kozička **s pozlátenými rožkami.** V ruke niesla tamburínu. Quasimodovo **oko zaiskrilo**. Bola to cigánka, ktorú sa včera v noci pokúsil uniesť, a za toto prepadnutie, ako nejasne cítil, ho práve teraz trestali: mimochodom, a to bol ten **najposlednejší** dôvod**, lebo ho trestali iba preto, že je hluchý a že ho súdil tiež hluchý. Nepochyboval, že i ona sa mu prišla pomstiť a udrieť ho ako všetci ostatní.\n\n...........................\n\nA tu ten hluchý úbožiačik uprel na ňu pohľad plný výčitiek a nevýslovného smútku. Všade by to bolo bývalo dojímavé divadlo, ako táto krásna, svieža, čistá a pôvabná dievčina, sama taká slabá, tak nezištne pribehla na pomoc takému veľkému zúfalstvu, takej **ošklivosti, úbohosti** a zlobe! **Na** pranieri** bol takýto výjav vznešený.\n\n.........................\n\n,,Och, dievča,“ povedal kňaz, ,,zľutuj sa nado mnou! Ty sa považuješ za nešťastnú, ale beda, beda, nevieš, čo je to nešťastie. Och! Milovať ženu a byť kňazom, byť nenávidený! Milovať ju celou náruživosťou svojej duše, cítiť, že by si dal za jejnajmenší úsmev krv, dušu, spásu, nesmrteľnosť a večnosť, **život pozemský i posmrtný.“ Fiodor Michajlovič** Dostojevskij: Zločin a trest (úryvok)**\n\n- Už je neskoro, už je čas! Hneď v tejto chvíli sa idem udať. Len neviem, prečo to\n\nrobím.\n\nDuni stekali dolu tvárou veľké slzy.\n\n- Ty plačeš, sestra, ale môžeš mi ešte podať ruku?\n\n- A ty si o tom pochyboval?\n\nMocne ho objala.\n\n- Vari tým, že si to** ideš odpykať**, nezmývaš už polovicu svojho zločinu? – **vykríkla, zvierajúc ho v objatí a bozkávajúc ho.**\n\n- Zločinu? Akého zločinu? – vykríkol náhle v akejsi nečakanej zúrivosti. – To, že\n\nsom zabil odpornú, škodlivú voš, starú, nikomu nepotrebnú úžerníčku, za ktorej zabitie by mi mali aj tridsať ráz odpustiť, lebo vyciciavala úbožiakov, to že je zločin? Nemyslím naň a ani ho nechcem zmývať.\n\n- Brat môj, čo to vravíš! Veď si predsa prelial krv! – zúfalo vykríkla Duňa.\n\n- Ktorú všetci prelievajú, - chytil sa toho div nie v zúrivosti, - ktorá tečie a vždy\n\ntiekla na svete v celých vodopádoch, ktorá strieka ani šampanské a za ktorú sa udeľuje v kapitole Pocta prídomok Dobrodinec ľudstva! Len sa lepšie poobzeraj a uvidíš. Ja sám som chcel ľuďom preukázať dobro a vykonal by som **stá a tisíce dobrých skutkov** za túto jednu hlúposť, a vlastne ani nie hlúposť, ale jednoducho nešikovnosť, lebo celá tá myšlienka nebola až taká hlúpa, ako vyzerá teraz pri neúspechu pri neúspechu všetko vyzerá hlúpe!)... Tou hlúposťou som si iba chcel získať nezávislé postavenie, urobiť prvý krok, získať prostriedky, a potom by som to všetko odčinil neporovnateľne prospešnejšou a užitočnejšou činnosťou... Ale ja... ja som neobstál ani pri prvom kroku, lebo som podliak! V tom je to! A jednako nebudem na to pozerať vašimi očami: keby sa mi to bolo podarilo, velebili by ma, ale teraz hybaj za mreže!\n\n....................\n\nRozdiel je iba v tom, že ja vôbec nenástojím na tom, aby **výnimoční ľudia** museli, ba boli povinní páchať všelijaké bezprávia, ako vy tvrdíte. Myslím si dokonca, že **takýto článok** by ani neuverejnili. Ja som jednoducho iba naznačil, že výnimočný človek má právo... pravda nie oficiálne právo, ale svoje právo... dovoliť svojmu svedomiu prekročiť niektoré prekážky, a to jedine v tom prípade, ak si to vyžaduje uskutočnenie jeho myšlienky (dakedy možno blahodarnej pre celé ľudstvo).\n\nÚloha č. 1\n\n**Charakterizujte menné a slovesné gramatické kategórie slova a syntaktických konštrukcií. **Urč**i**te potrebné gramatické kategórie zvýraznených slov v ukážkach a doplňte vzor. **\n\nmorfologické kategórie:\na.) menné:\nrod – mužský, ženský, stredný\nčíslo – jednotné (singulár), množné (plurál)\npád – nominatív, genitív, datív, akuzatív, lokál, inštrumentál\n\nb.) slovesné:\nosoba – 1. osoba – ja (j. č.)  my (m. č.) \n  2. osoba – ty (j. č.) vy (m. č.)\n  3. osoba – on, ona, ono (j. č.)  oni, ony (m. č.)\nčíslo – jednotné (singulár), množné (plurál)  \nčas – prítomný, minulý, budúci\nspôsob – oznamovací, rozkazovací, podmieňovací\nvid – dokonavý (vyjadruje ukončený, ohraničený dej, napr. zašije) \nnedokonavý (vyjadruje neukončený, neohraničený dej, napr. šije)\nslovesný rod – činný (podmet vykonáva činnosť slovesa, napr. Otec rúbe drevo.)\ntrpný (podmet nevykonáva činnosť slovesa, napr. Drevo je rúbané.)\n- osoba a číslo, len pri niektorých slovesných tvaroch\n\n**pozlátenými rožkami. oko zaiskrilo najposlednejší** dôvod**,\n\n**ošklivosti, úbohosti Na** pranieri život pozemský i posmrtný ideš odpykať vykríkla, zvierajúc ho v objatí a bozkávajúc ho. stá a tisíce dobrých skutkov výnimoční ľudia takýto článok  **                     sg.                                    pl.\n\nN                        pani                                panie\n\nG                    bez panej                        bez paní\n\nD                        panej                            paniam\n\nA                        paniu                             panie\n\nL                     o panej                          o paniach\n\nI                      s paňou                         s paniami\n\n**Vyskloňujte uvedené slová**: pán**,** pani, Goethe, najlepší žiak, kráľovná, dva psy – dvaja psi.                             sg.                                    pl.\n\nN                       pán                                  páni\n\nG                 bez pána                            bez pánov\n\nD                     pánovi                               pánom\n\nA                     pána                                 pánov\n\nL                 o pánovi                              o pánoch\n\nI                  s pánom                             s pánmi\n\nÚloha č. 2\n\n**Porovnajte hlavné znaky literatúry **romantizmu a realizmu**, analyzujte ukážky a vysvetlite umelecké stvárnenie skutočnosti.  Realizmus**\nLiterárny realizmus vznikol veľmi skoro z romantizmu ako kvalitatívne nová umelecká metóda (1. polovica 19. storočia). Realistická metóda sa vyznačuje úsilím verne, pravdivo zobraziť spoločenské pomery a súčasne prehĺbiť psychologickú analýzu. Odmieta spoločenskú konvenčnosť, kvetnatý štýl. Vrcholným zjavom literárneho realizmu vo francúzskej próze prvej polovice 19. storočia je Honoré de Balzac. Známe je tvrdenie, že Balzac vytvoril svet, Stendhal len hrdinov. Pre Balzaca je prvoradý obraz sveta a funkciou románovej postavy je vytvárať ho. U Stendhala ide o „zrkadlenie“ tohto sveta vo vedomí románovej postavy. Za realistický zážitok považuje Stendhal nielen čo vidí a počuje, ale aj celý svoj svet – predstavy a city. Pravdivosť, historická konkrétnosť a typické charaktery v typických okolnostiach – to sú základné princípy realistickej umeleckej metódy.\nV 19. storočí sa zároveň rodí kritický realizmus – keď sa prehlbuje priepasť a vyostrujú sa rozpory medzi svetom práce a svetom peňazí, rastú sociálne problémy. Medzi najvýznamnejších predstaviteľov kritického realizmu patria vo francúzskej literatúre Stendhal, Balzac, Flaubert, Zola, Maupassant, v anglosaskej Dickens, Twain, v ruskej Gogoľ, Turgenev, Tolstoj, Dostojevskij, Čechov. V slovenskej literárnej tvorbe predstavujú prvú vlnu kritického realizmu Hviezdoslav, Vajanský, Vansová, Šoltésová, Kukučín. V druhej vlne – Timrava, Tajovský, Podjavorinská, Čajak, Jesenský, Jégé.\n\n**Znaky realizmu**\n\n- dôraz na objektívne zobrazenie skutočnosti, ľudských vzťahov, charakterov…\n\n- zobrazovanie pravdivosti človeka a jeho prostredia\n\n- charaktery sú produktom spoločenského prostredia\n\n- využívanie skúseností z vlastného života\n\n- tabuizované témy – prostitúcia, karierizmus, problémové manželstvá, nevera…\n\n- typizácia (vlastnosti istého typu sú charakteristické pre množstvo podobných ľudí)\n\n- negatívny charakter postáv, záporné vlastnosti majú symbolickú podobu\n\n- postavy sú zobrazované zo všetkých spoločenských vrstiev (od veľkomestského podsvetia až po predstaviteľov najvyšších kruhov aristokracie)\n\n- používanie nových výrazových prostriedkov (nárečia, archaizmy a pod.)\n\n- realizmus sa orientuje na prítomnosť, nie na minulosť, dej je zakotvený v súčasnosti\n\n- typické väčšie prozaické útvary, epická poézia a spoločenské drámy\n\n- literatúra reaguje na nespravodlivú sociálnu skutočnosť, pričom realizmus nehľadá a ani nenachádza východisko z krízy spoločnosti, bol iba jej kronikárom, kritikom\n\n- literárne dielo bolo obžalobou alebo výsmechom bez zobrazenia pozitívneho spoločenského ideálu\n\n- vytvára sa umelecký smer – kritický realizmus (prejavuje s zosilneným rysom kritickosti)\n\n- dominantný literárny druh je epika\n\n- dominantný literárny žáner je realistický román, ktorý zobrazuje široký okruh života a analyzuje duševný svet hrdinov (svojím rozsahom dával možnosť zobraziť „hroznú poéziu života“ meštianstva)\n\n- Hlavné znaky romantizmu:\n\n- - citovosť - úzky vzťah k prírode\n\n- - návrat do histórie\n\n- - záľuba v nezvyčajných zvláštnych až exotických prostriedkoch\n\n- - časté sú motívy ako – noc, rozbúrené more, cintoríny, chrámy, polnoc a pod.\n\n- - zložité psychologické stavy: svetabôľ, silné vášne, smútok\n\n- - v popredí je človek, ktorý nie je dokonalý\n\n- - hrdina túži po slobode a dostáva sa do konfliktu so spoločnosťou\n\n- - v tomto konflikte je hrdina osamelý a nepochopený\n\n- - rozpor medzi snom a skutočnosťou\n\n- - titanizmus , vykonanie mimoriadneho činu\n\n- - koniec je vždy tragický, hrdina zomiera\n\n- - autor sa stotožňuje s hrdinom, autoštylizácia\n\n- - hrdina sa búri (revoltuje)\n\n- - využitie protikladov, čiže kontrastov\n\n- - diela sú poznačené pesimizmom, beznádejou, smútkom\n\n- - postavy žijú na okraji spoločnosti (trestanci, žobráci, tuláci)\n\n- - literatúra je subjektívna\n\n- - námety z minulosti\n\n- - pestuje sa lyrika, epika, dráma menej lyrika splýva s epikou = vznik lyricko-epických diel\n\n**F.M. Dostojevskij – Zločin a trest -**>** psychologický román**\n\nLiterárny druh: epika\n\nLiterárny žáner: sociálno-psychologický román naturálnej školy  \n\nProstredie: Rusko, Petrohrad  \n\nTéma: Bieda, neistota, zúfalstvo vedú do záhuby  \n\nHlavné postavy: Rodion Romanovič Raskoľnikov(Roďa)  - bývalý študent, zložitá osobnosť, nedôverčivý, hypochondrický, veľkodušný, dobrý, niekedy chladný, nezhovorčivý, typ melancholika.                   \nAvdotia Romanovna Raskoľnikovová(Duňa)  -  Roďová sestra, obetavá, inteligentná, hrdá, dobrosrdečná, miluje svojho brata.            \nPuľcheria Alexandrovna Raskoľnikovová  - Roďová matka, povýšenecká, má rada peniaze.            \nAľona Ivanovna – starena, vyciciava peniaze z chudobných ľudí, v románe sa v skutočnosti objaví len dvakrát, ale je neustále prítomná v chorobných snoch Raskoľnikova počas jeho blúznenia. Typ úžerníčky.            \nPeter Petrovič Lužin – špekulant, chcel sa oženiť s Duňou, ktorá ho chce len kvôli biede a nátlakom jej matky. Typ chamtivca.            \nDmitrij Vrazumichin Prokofjič – Roďov dobrý priateľ, študent, človek činu, dobrého srdca, typ praktika.            \nMarmeladov – nešťastný chudák, typ opilca ktorý nestratil pocit lásky a ľútosti k svojej nešťastnej rodine, ale nie je v stave ju zachrániť. Nakoniec tragicky zomiera, jeho manželka čoskoro nato tiež a deťom hrozí strašný osud.            \nSofia Semionovna Marmeladovová(Soňa) - dcéra opilca Marmeladova, dobrosrdečná, pre biedu jej rodiny sa stala prostitútkou, nakoniec dobrovoľne odchádza s Roďom na Sibír na osem rokov. \n\n- Vedľajšie postavy : Katerina Ivanovna, krajčír Kapernaum, Ivan Afanasievič, Ivan Ivanovič Klopštok, Andrej Semionovič Lebezatnikov, Amalia Fiodorovna, nemec Kozeľ, Amalia Lippevechzeľová, Nastasia, Praskovia Pavlovna, Afanasij Ivanovič Vachrušin, pán Svidrigajlov, Marfa Petrovna Svidrigajlovová, Daria Francovna, Lizaveta Ivanovna, Pokoriov, pán Koch, Pestriakov, Laviza Ivanovna, Alexander Grigorievič Zametov, Čebarovov, Iľja Petrovič, Nikodim Fomič, Cheruvimovov, Pašenka, kupec Šelopajev, Zosimov, Alexej Semionovič, Semion Semionovič, Praskovia Pavlovna, Zosimov, Duškin, Mikolaj Dementiev, Mitrej, Afrosiňuška, Aľoška, Koľa, Poleňka, Lida, Amalia Ludvigovna, pán Zarnycinov, Porfirij Petrovič, poručík Potančikov, Gertrúda Karlovna Resslichová, Arkadij Ivanovič, Aniska, Filipp, Terebievová,Lenka, Amalia Ivanovna, Kaťa.  \n\n- Stručný dej:\n\n- Raskoľnikov sa z finančných dôvodov neudržal na univerzite. Po tom ako si prečítal list od svojej matky, kde písala že jeho sestra, Duňa, sa vydá za advokáta Lužina, nie z lásky,  rozhodol sa získať peniaze lúpežnou vraždou starej úžerníčky, Aľony Ivanovny, ktorú zabije sekerou v jej byte a náhodou zabije aj jej sestru, Lizavetu Ivanovnu. Na druhý deň musel ísť na políciu, pretože ho zažalovala jeho domáca, že jej dlhuje peniaze. Keď počul, že sa tam rozprávajú o starene, stratil vedomie. Vtedy ho začali podozrievať. Štyri dni ležal v horúčke a blúznil. Keď sa prebral, dozvedel sa, že z vraždy obviňujú maliarov, ktorí maľovali byt na prvom poschodí. Jedného večera sa bol pozrieť Ivanovnej byt a na návrate uvidel na zemi ležať mŕtveho Marmeladova. \nRaskoľnikov zaplatil za Marmeladovov pohreb.V jeho dome sa zoznámil so Soňou, jeho dcérou. Jej sa nakoniec priznal, že to on zabil starenu a Lízu. Lenže ich rozhovor vypočul Svidrigajlov, ktorý sa chcel oženiť s Duňou, povedal jej o tom a chcel s ňou vyjsť do zahraničia. Duňa chcela vyjsť von  a lebo ju Svidrigajlov nepustil, vytiahla revolver, s ktorým sa Svidrigajlov o jeden deň neskôr sám zastrelil. Keď sa Raskoľnikov stretol so sestrou, videl, že ona o všetkom vie. Pochopil že Soňa ho má rada a že pôjde za nim aj na kraj sveta, ak sa prizná, a preto odišiel na políciu a priznal sa. \nRaskoľnikova odsúdili na osem rokov nútených prác na Sibíri. Jeho matka od žiaľu prišla o rozum a nakoniec umrela. Soňa odišla za ním na Sibír, a pracovala ako krajčírka.   Konflikt: vnútorný konflikt Rodiona Raskoľnikova, duševná kríza, konflikt dobra a zla.   Vlastná analýza: Kniha sa mi páčila, hoci je veľmi smutná a depresívna a miestami aj príliš opisná. Zaujímavé je ako autor opisuje Raskoľnikovov duševný stav a všetky jeho zmeny ktorými prechádza.\n\n- **V.Hugo** – Chrám Matky Božej v Paríži**\n\n- - historický román, téma: romantický príbeh krásnej cigánky Esmeraldy a obludného Quasimoda, príbeh dobra a zla, lásky a vášne, spravodlivosti a trápenia\n- dej sa odohráva stredovekom Paríži a v chráme Notre Damme v 15. storočí\n- román má dve časti, dejová línia je veľká, má mnohé odbočenia a mniožstvo postáv, od nabohatších po najchudobnejších\n- postavy: Esmeralda, Quasimodo, Claude Frollo, Phoebus, Pierre Gringoire, pustovníčka Gudula (matka Esmeraldy), kozčka Džoli\n\n**- dej:** \nQuasimodo sa stáva kráľm bláznov, oblečú ho do posmešného odevu a usporiadajú sprievod. Pozornosť publika púta aj krásna cigánka Esmeralda so svojou kozičkou Džoli. Gringoire sa túla po Paríži a stane sa svedkom pokusu o únos Esmeraldy, ktorý zosnoval Frollo. Kapitán Phoebus únoscov prekvapí a zatkne, Esmeraldu pustí a ona sa doň zaľúb. Gringoire zablúdi do Parížskeho podsvetia na Dvor Divov a hrozí mu smrť. Život mu zachráni Esmeralda tým, že predstiera, že si ho vezme za manžela. Quasimoda za únos Esmeraldy zatknú, mučia a dajú ho na pranier. Jediná Esmeralda sa nad ním zľutuje a podá mu vodu. Quasimodo sa do nej zaľúbi. Phoebus sa pochváli Frollovi, že má schodzku s Esmeraldou. Frollo žiarli a rozhodne sa schôdzku prekaziť. Keď sa Esmeralda a Phoebus stretnú Frollo zaútočí na Phoeba, Esmeralda zamdlie, Frollo Phoeba zraní. \n\nKeď sa Esmeralda preberie Frollo jej oznámi, že ju žaluje z vraždy Phoeba a čarodejníctva. Esmeraldu zavrú a spod šibenice ju zachráni Quasimodo, ktorý ju ukryje v chráme. Frollo navrhne Gringoirovi, aby mu pomohol dostať Esmeraldu z chrámu. Gringoire zburcije Dvor divov a dav sa rozhodne vylúpiť chrám. Gringoire to povie Esmeralde, ktorá odhádza s ním a zo zamaskovaným mužom a verí, že jej pomôžu. Esmeralda spoznáva v zamaskovanom mužovi Frolla. Odmieta jeho návrhy, a preto ju zavrie do väzenia k pustovníčke Gudule. Tá v nej spoznáva svoju dcéru, chce ju chrániť, no od vysilenia umiera. Esmeraldu obesia a Frollo spolu s Quasimodom sa dívajú z veže na popravu. Nešťastný Quasimodo zhodí počas popravy Frolla z veže. O dva roky nájdu v hrobke kostola kostru ženy, ktorú pevne objíma kostra muža s pokrivenou chrbticou. \n\nQuasimodo – kontrastná postava, autor pri jeho zobrazení využil harmóniu kontrastov (nvonok škaredý, ale vo vnútri úprimný), našli ho v kostole, kňaz Frollo sa nad ním zľutoval a vychoval ho, je oddaný Frollovi, ale keď mu spôsobí nešťastie je schopný vraždy; zaľúbi sa do Esmeraldy, aj keď vie, že ona ho nemiluje, pre neho je dôležité, že ju môže milovať on\n\nEsmeralda – nekontrastná postava (navonok je pekná, vo vnútri citlivá a mravná), vášnivo sa zamiluje do Phoeba, i keď on ju chce mať len na pobavenie, nepristúpi na nečisté ponuky Frolla ani za cenu straty slobody a života, má nešťastný osud, lebo ako 6- mesačnú ju ukradnú cigáni jej matke Gudule; uchováva si amulet – malú črievičku, ktorú mala obutú pri únose; svoju matku spoznáva tesne pred popravou, keď je obvinená z bosoráctva, umiera ako obeť\n\nClaude Frollo – najrozpornejšia postava nezvyčajná tým, že nositeľom zlých vlastností je kňaz; v mladosti bol učenlivý, obdorník v mnohých vedách, ovláda jazyky a ľudia si ho vážili; vášeň a túžba po Esmeralde ho zmenili na morálneho netvora, uvedomuje si to a cíti, že hoi čaká zatratenie; venuje sa alchýmii, astronómii, nenávidí cigánov, prenasleduje ich, študuje procesy zo stredoveku s čarodejníkmi\n\nPierre Gringoire – svojou prítomnosťou spája jednotlivé postavy a prostredia spolu s rozprávačom nás sprevádza dejom románu; je to spisovateľ bez úspechu, bez peňazí, dobrodruh, túla sa po parížskych uliciach, pozoruje život, hľadá námety, nie je to typická romantická postava\nPhoebus – kapitán lukostrelcov, má iba krásnu tvár, Esmeraldu chce iba na pobavenie, keď ho Frollo zraní, viac sa s Esmeraldou nestretne\n- **hlavná myšlienka** – túžba po slobode, láske, ľudskosti, nenávisť voči bezpráviu a krutosti\n- **konflikt:** sen – skutočnosť","number":28,"assignment":""},"29":{"tema_jazyk":"Jazykové slovníky, Pravidlá slovenského pravopisu","tema_lit":"Svetová literatúra od r. 1945 (existencializmus, dystopia)","autori":["J. P. Sartre","Joseph Heller","George Orwell"],"diela":["Múr","Hlava XXII","1984"],"okruh_jazyk":"Jazykové slovníky","okruh_lit":"Svetová povojnová literatúra","full":"Úloha č. 1\n\n**Vymenujte a charakterizujte druhy jazykových slovníkov. Aký druh slovníka použijete na vysvetlenie slov**:\n\n ***E**xpresionizmus**-VYKLADOVÝ**, **krumple**- **SLANGOVÝ**, **väzenie –žalár**- SYNONIMICKÝ**, **archeografia**-VYKLADOVÝ**,  /**ďeckí**/** -ORTOEPICKÝ **, design.**-SLOVNÍK CUDZÍCH SLOV*\n\nSlovníky\nPravopisný slovník – nachádza sa  v Pravidlách slovenského pravopisu a obsahuje tie slová, s ktorými môžu mať používatelia problémy pri písaní. Pravidlá slovenského pravopisu sú kodifikačnou príručkou, okrem slovníkovej časti prinášajú aj poučky a pravidlá. \n\nVýkladový slovník – vykladá význam slov a slovných spojení. Je dôležitý pre ľudí, ktorí sa zaoberajú štúdium jazykov. Slovník slovenského jazyka má šesť zväzkov, obsahuje 130 000 slov. Typom výkladového slovníka je aj Krátky slovník slovenského jazyka – nájdeme v ňom najfrekventovanejšie slová zo súčasnej slovenčiny, pri problematických slovách uvádza aj ich výslovnosť a základné poučenie o gramatike a pravopise.\n\nNormatívny slovník – Krátky slovník slovenského jazyka (kolektív autorov) nadväzuje na výkladový Slovník slovenského jazyka – má rozsah okolo 50 000 slov.\n\nSynonymický slovník – obsahuje synonymické rady slov, ktoré majú rovnaký alebo blízky význam. Každý synonymický rad má základné slovo zaradené v slovníku podľa abecedy. Využívame ho na vylepšenie štýlu našich slohových útvarov, pri prekladoch, pri tvorbe poézie, prózy, textov piesní atď.\n\nFrazeologický slovník – obsahuje ustálené slovné spojenia, frazeologické jednotky aj s ich výkladom. Máme viacero frazeologických slovníkov.\n\nSlovník cudzích slov – používajú používatelia zo všetkých sfér odbornej činnosti. Vysvetľuje význam cudzích slov a uvádza, z ktorého jazyka slovo pochádza. Našim najpodrobnejším je Slovník cudzích slov, obsahuje 60 000 slov.\n\nEtymologický slovník – uvádza prvotný význam slova, pôvod a vývin slova, uvádza slová s tým istým základom (napr. tvor – útvar – potvora). Máme Etymologický slovník jazyka českého a slovenského.\n\nRetrográdny slovník – obsahuje slová zoradené abecedne od konca (napr. azda, gazda, polgazda, jazda, medzijazda, krasojazda, rozjazda, garazda). Slúži básnikom na hľadanie rýmov a jazykovedcom na skúmanie zákonitostí jazyka.\n\nTerminologický slovník – uvádza abecedný zoznam termínov – odborných názvov z jedného vedeckých odborov a ich vysvetlenie. Napr. Letecký terminologický slovník, Matematická terminológia, Názvoslovie anorganických látok, Právnický terminologický slovník, Základná jazykovedná terminológia atď.\n\nSlovník slovenského slangu – na 183 stranách prináša časť slovnej zásoby, ktorá veľmi rýchlo starne – slangové slová\n\n**Vysvetlite, čo obsahujú Pravidlá slovenského pravopisu a aký majú dnes pre nás význam. **Aké príručky a slovníky ste využili počas prípravy na maturitnú skúšku?\n\n**Pravidlá slovenského pravopisu** (skr. PSP) je jedna zo 4 záväzných kodifikačných príručiek [slovenčiny](https://sk.wikipedia.org/wiki/Sloven%C4%8Dina). Obsahuje informácie o správnom písaní slov a tvarov, pravidlá interpunkcie, niektoré gramatické pravidlá a pravopisný slovník.\n\n**Príručky ktoré som využil:**\n\nÚloha č. 2\n\n**Vysvetlite stručne vývin svetovej literatúry **od roku 1945 po súčasnosť**. Poukážte na vznik viacerých umeleckých smerov (najmä existencializmus) a rôznorodé literárne výpovede o spoločnosti**. Analyzujte aspoň dve ukážky a využite vlastné čitateľské interpretácie.\n\n**Existencializmus**\n\nSkúma otázky existencie človeka z hľadiska jeho individuality i spoločenských vzťahov. Vyjadruje sa k základným otázkam ľudského bytia. Zdôrazňuje osobnú slobodu jednotlivca. Jednotlivec prekonáva základný životný pocit opustenosti, nezmyselnosti, úzkosti a beznádeje. Je slobodný, pretože sa nepodriaďuje konvenciám. Spoločnosť je voči nemu nepriateľská, vnucuje mu svoju morálku, náboženstvo, zvyky. Človek je odsúdený na slobodu, musí zaujať stanovisko a za svoje rozhodnutie nesie zodpovednosť.\n\nPredstavitelia: Jean – Paul Sartre, Albert Camus\n\n**Vývin literatúry:**\n\nSvetová literárna moderna (koniec 19.stor.-začiatok 20.stor.)\nKoniec 19. storočia sa nesie v znamení veľkých zmien ústiacich do katastrofálnych predstáv, chaosu a dezorientácie. Rýchle životné tempo, konkurenčný boj, rast sociálnych problémov vytvárajú spoločenskú situáciu plnú pesimizmu a beznádeje. Každodenná realita je vystavená ostrej kritike. Toto obdobie sa spájalo s neistotou, nepokojom, často sa hovorilo o kríze myslenia a kultúry vôbec. V literatúre sa v tom čase objavilo viacero nových myšlienkových prúdov.\n\nParnasizmus je francúzsky literárny smer z konca 19. storočia, ktorý sa snažil o dokonalú krásu literárneho diela precíznou formou a rozmanitosťou žánrov bez spätosti básne so spoločenskou realitou. Umenie si musí postačiť samo o sebe, jeho poslaním nie je zobrazovať reálny svet a jeho problémy. Lyrika sa mohla písať len neosobná. Za ideál krásy pokladali antickú literatúru.\n\nImpresionizmus je umelecký smer, ktorý pôvodne označoval výtvarnú orientáciu voľnej skupiny mladých maliarov, ktorí sa spolu predstavili v Paríži roku 1874. Impresionizmus chce zachytiť okamžitý dojem zaťažený ani racionálnym, ani empirickým poznaním. \n\nSymbolizmus je umelecký smer, ktorý vznikol v opozícii voči impresionizmu a naturalizmu. Základným výrazovým prostriedkom v literatúre sa stalo nepriame pomenovanie- symbol, ktorý slúžil na vyjadrenie abstraktného pojmu a mal zvýrazniť viacvýznamovosť básnickej výpovede.\n\nDekadencia: Tento výraz pôvodne slúžil ako hanlivé označenie francúzskej poézie z konca 19. storočia, ktorá pohŕdala dobou, meštianskou kultúrou a jej tradíciami. Dekadencia s provokatívnou obľubou siahala k tabuizovaným témam- erotika, morbidita, poetizácia násilia a zla, neúctivý vzťah k Bohu, oslava Satana a kultu smrti. \n\nK najvýznamnejším autorom tejto doby patrí: Charles Baudelaire, Paul Verlaine, Jean Arthur Rimbaud.\n\nSlovenská literárna moderna (1900-1918). Začiatok 20. storočia znamenal pre Rakúsko- Uhorsko, konkrétne pre Slovensko, rozvoj priemyslu a hospodárstva. Prudký nárast dravého podnikateľského prostredia zhoršoval životné podmienky slovenských roľníkov. Zbedačený ľud sa začal masovo vysťahovávať za prácou do Ameriky. Vysťahovalectvo malo za následok znižovanie počtu obyvateľov slovenskej národnosti a zvýšený národnostný útlak. Vypuknutie prvej svetovej vojny znamenalo zhoršenie podmienok pre rozvoj hospodárstva.\nZnaky poézie písanej autormi obdobia literárnej moderny sú nasledovné:\na) sústreďujú sa na vykreslenie atmosféry básne, \nb) zobrazujú ponuré nálady, lebo smútia za starým svetom,\nc) dominuje symbolizmus, subjektivizácia, iracionalizmus, disharmónia,\nd) požíva sa sylabotonický veršový systém, no objavujú sa zárodky voľného verša.\nSlovenskú poéziu tohto obdobia reprezentujú svojou tvorbou Ivan Krasko a Janko Jesenský.\n9. Svetová medzivojnová literatúra (1918-1945)\nAko celok bolo 20. storočie storočím kontrastov, prostredníctvom ktorých si ľudia vo víre katastrofálnych vojenských konfliktov, rasistických a náboženských nepokojov, uvedomovali večné predstavy o ľudskej slobode, sociálnej spravodlivosti, spoločenskej rovnosti a demokracie. 20. storočie bolo preto aj storočím rozmachu nových myšlienkových, umeleckých a literárnych smerov uplatňujúcich sa v poézii, z ktorých treba spomenúť pragmatizmus, secesiu, futurizmus, kubizmus, kubofuturizmus, imaginizmus, dadaizmus, surrealizmus (smer založený na snahe spontánne a bez rozumovej kontroly vyjadrovať to, čo sa deje v ľudskom podvedomí), expresionizmus, konštruktivizmus či poetizmus. Ten vznikol v Čechách v 20- tych rokoch 20. storočia. Zdôrazňuje aktívny postoj k životu, jeho zachytenie prostredníctvom citových a fantazijných schopností umelcov. Inšpirovaný bol hravosťou dadaizmu a uprednostňoval imagináciu, fantáziu, sen, poznávanie exotických krajín. Základom poetistickej tvorivej metódy je hra a rozumom nekontrolovateľné voľné asociácie. Poézia mala prinášať čitateľom radosť a krásu. Básnici písali predovšetkým básne- pásma a hlavným vyjadrovacím prostriedkom sa stala metafora. Ďalšími znakmi poetizmu sú sklon k paródii, zľahčovanie, cestovanie, obľúbenosť ľudovej zábavy, opojenie naivným umením. Predstaviteľmi poetizmu v Čechách sú: Karel Teige a Vítězslav Nezval. Najvýznamnejšími básnikmi tohto obdobia boli: Filippo Tommaso Marinetti, Guillaume Apollinaire, Vladimír Majakovskij, Sergej Jesenin, Andre Breton, Petr Bezruč, Jiří Wolker.\n\nPrvoradou úlohou prózy a drámy tohto obdobia bolo zobraziť vojnovú tematiku, opísať vojnové hrôzy a varovať pred nimi. K takýmto spisovateľom patrili aj predstavitelia tzv. stratenej generácie. Ide o označenie generačne blízkej skupiny amerických básnikov a prozaikov, ktorí začali tvoriť v 20- tych rokoch 20. storočia. Ich videnie bolo ovplyvnené zážitkami z 1. svetovej vojny a pocitom kultúrnej vykorenenosti Američana v Európe, pocitom neschopnosti zaradiť sa po vojne do života. Základnou témou ich diel je sklamanie a skepsa, rozklad ľudských a spoločenských hodnôt a hľadanie východiska v úteku do prírody alebo ku kultúre. Maličkosti každodennosti nahrádzajú trvalé hodnoty. Hrdinami ich próz sú jednotlivci stratení v labyrinte sveta, sú to obvykle rozporuplní, silno citovo založení ľudia, ktorí nikde nenachádzajú zakotvenie. Preto žijú v provizóriu a ich jedinou hodnotou v tomto svete je kamarátstvo. Predstaviteľmi tohto typu literatúry boli: Ernest Hemingway, John dos Passos, Francis Scott Fitzgerald, William Faulkner, Harry Sinclair Lewis, Theodore Dreiser. Svojou tvorbou sa k nim približovali: Erich Maria Remarque, Thomas Mann, Hermann Hesse, Lion Feuchtwanger, Romain Rolland, Henri Barbusse, Marcel Proust. \n\nSúčasťou nemeckej literatúry tohto obdobia bola aj pražská nemecká literatúra. Ide o tvorbu autorov spojených miestom narodenia a väčšinou aj pôsobením v Prahe. Najvýznamnejšími predstaviteľmi tohto typu literatúry boli Franz Kafka a Max Brod.\n\nV medzivojnovom období pôsobili aj nasledovní autori: Michail Šolochov, Michail Bulgakov, Karel Čapek či Jaroslav Hašek.\n\nSlovenská medzivojnová literatúra (1918-1945) sa vyvíjala v období, kedy sa Slovensko stalo súčasťou Československej republiky založenej v októbri 1918. Nový štát zbavil Slovákov maďarizačného útlaku, slovenčina začala prenikať do škôl a úradov, stala sa štátnym jazykom, vznikali slovenské kultúrne ustanovizne- Univerzita Komenského v Bratislave, SND, bola znovu obnovená činnosť Matice slovenskej. V roku 1918 ukončená prvá svetová vojna však zasiahla do života ľudí natoľko, že sa odrazila aj v slovenskej medzivojnovej literatúre. \n\nSpisovatelia (básnici) sa rozdeľovali do skupín nasledovným spôsobom:\n1. staršia generácia- Janko Jesenský, Vladimír Roy,\n2. prechodná generácia- Martin Rázus, Štefan Krčméry,\n3. mladí autori- Emil Boleslav Lukáč (neosymbolizmus), Ján Smrek (vitalizmus), Ladislav Novomeský (ľavicová avantgarda, DAV), Rudolf Fabry, Štefan Žáry (nadrealizmus), Janko Silan, Rudolf Dilong (katolícka moderna), Valentín Beniak, Maša Haľamová (individuálne formovaní básnici). \nMedzivojnovú prózu a drámu, zaoberajúce sa tematikou vojnovými zážitkami, spomienkami na mladosť, povojnovou sociálnou skutočnosťou, rozdeľujeme z hľadiska uplatňovania umeleckej metódy nasledovne:\n\n1. Realizmus.\na) prvá línia, priamo rozvíjajúca realistickú tradíciu, Ladislav Nádaši Jégé, Martin Rázus,\nb) druhá línia, predstavujúca sociálno- psychologický realizmus, ktorý sa usiluje o prienik do vnútra človeka, Jozef Cíger Hronský, Milo Urban, \nc) tretia línia, tzv. socialistický realizmus, Peter Jilemnický, Fraňo Kráľ.\n\n2. Lyrizovaná próza.\n\na) ornamentalizmus, ktorý vychádzal zo snahy povýšiť tvar literárneho diela na úroveň modernistických európskych prúdov. Preto autori vychádzali z expresionizmu, v ich próze dominovali pesimistické, tragické nálady a životné pocity, nešťastné postavy. Ich vnútorné predstavy chápu ako skutočnosť. Ornamentalizmus, čiže ozdobnosť jazyka, súvisel s experimentovaním s jazykom a so slovom. Jeho predstaviteľmi sú: Gejza Vámoš, Ján Hrušovský, Ivan Horváth.\n\nb) naturizmus (lyrizovaná próza)- Ľudo Ondrejov, Dobroslav Chrobák, Margita Figuli, František Švantner.\n\nc) medzivojnová dráma- Ivan Stodola, Július Barč- Ivan, Peter Zvon.\n10. Svetová literatúra druhej polovice 20. storočia (od roku 1945)\nDruhá svetová vojna, najväčší konflikt v dejinách ľudstva, nesmierne ovplyvnila spoločenský, politický i umelecký vývoj celej druhej polovice minulého storočia a je inšpiračným zdrojom dodnes. Svet sa rozdelil na dva póly. Obdobie tzv. studenej vojny sa predĺžilo až do začiatku 90- tych rokov, kedy bol dovŕšený proces postupného rozvratu hospodárskych a politických systémov sovietskych satelitov a rozpadu samotného Sovietskeho zväzu. \n\nSvetová literatúra v druhej polovici 20. storočia sa delí na: existencialistov (Jean- Paul Sartre, Albert Camus), autorov zobrazujúcich mládež (Jerome Salinger, William Golding), rozhnevaných mladých mužov (John Osborne, John Braine, Kingsley Amis), beatnikov (Lawrence Ferlinghetti, Allen Ginsberg, Jack Kerouac), neorealistov (Pier Paolo Pasolini, Alberto Moravia), predstaviteľov „nového románu“ (Allain Robbe- Grillet), postmodernistov (Umberto Eco, Vladimír Nabokov), predstaviteľov magického románu (Gabriel Garcia Márquez, Čingiz Ajtmatov), autorov zobrazujúcich ľudí v totalitnej spoločnosti (Boris Pasternak, Alexander Solženicyn, George Orwell, Jozef Škvorecký, Milan Kundera), predstaviteľov epického divadla (Bertold Brecht), americkej psychologickej drámy ( Tenessee Williams, Arthur Miller) či predstaviteľov absurdnej drámy (Friedrich Durrenmatt, Samuel Beckett, Eugéne Ionesco, Václav Havel).\n\nExistencializmus je filozofický a umelecký smer, ktorý skúma otázky existencie človeka z hľadiska jeho individuality i z hľadiska spoločenských vzťahov. Existencialisti sa vyjadrujú k základným otázkam ľudského bytia, pričom nestrácajú zo zreteľa estetickú funkciu umeleckého diela. Zdôrazňujú osobnú slobodu jednotlivca. Podľa existencialistov život človeka záleží len na jeho voľbe. Jednotlivec prekonáva základný životný pocit nezmyselnosti, opustenosti, úzkosti a beznádeje. Slobodu dosahuje tým, že sa nepodriaďuje konvencii. Spoločnosť je pre indivíduum nepriateľská, vnucuje mu svoju morálku, náboženstvo, zvyky. Zbavuje ho osobitosti. \n\nNeorealizmus je umelecký smer rozvíjajúci sa v 40- tych rokoch a na začiatku 50- tych rokov. Prevláda v ňom sociálna tematika, všíma si tienisté stránky talianskej malomeštiackej spoločnosti, kritizuje taliansky fašizmus.\n\nPostmodernizmus je literárny a umelecký smer poslednej tretiny 20. storočia. Východiskom pre novú poetiku sa stáva odmietavý postoj ku konzumnej spoločnosti. Usiluje sa o alternatívnosť ľudských prístupov k svetu, odmieta víziu intelektuálnej a kultúrnej nadradenosti západnej civilizácie i nadradenosť racionality v procese poznania. Základnou požiadavkou je pluralita názorov a ich zrovnoprávnenie.\n\nMagický realizmus je smer, ktorý sa rozvinul v rámci postmodernej doby v karibskej oblasti a ktorý tak nazvali jeho zakladatelia Guatemalčan Asturias a Kubánec Carpentier. V tajomnom svete diel magického realizmu sa prelína mýtické vesmírno s každodennosťou, tragédia s komickosťou, výmysel s realitou, život so smrťou. \n\nEpické divadlo je doménou nemeckého dramatika Bertolda Brechta. Svoje hry stavia na rozbití divákovej ilúzie, že na javisku je predvádzaný skutočný život skutočných postáv. Divák si má stále uvedomovať, že sleduje len divadelné predstavenie a takto má byť angažovaný k aktívnemu porovnávaniu divadelného príbehu s realitou a svojim vlastným životom. Brecht nahradil dramatický prítomný čas epickým minulým, v hrách vystupuje množstvo epizódnych postáv, scéna sa často mení, dielo nie je členené na dejstvá, ale na scény, ktoré nie sú rovnako dlhé. Tajomstvo pointy stratilo svoje čaro, lebo epická hra v medzititulkoch povie dopredu, čo sa stane. \n\nSlovenská literatúra po druhej svetovej vojne (1945-1989) je charakteristická v prvom rade tým, že je v znamení nástupu komunistickej ideológie k moci, Československo je izolované od ostatných krajín na západ od našich hraníc, je pod vplyvom Sovietskeho zväzu. Obyvatelia boli nútení znovu odchádzať do emigrácie. Predstaviteľov poézie (básnikov) tohto obdobia delíme na:\na) staršiu generáciu- Ján Kostra, Pavol Horov, Andrej Plávka, Vojtech Mihálik, Milan Rúfus,,\nb) strednú generáciu- Ľubomír Feldek, Ivan Štrpka, Štefan Moravčík, Daniel Hevier,\nc) mladá generáciu- Jozef Urban, Ivan Kolenič, Viliam Klimáček.\n\nSlovenskú prózu a drámu druhej polovice 20. storočia zastupujú nasledovní autori:\na) próza- František Hečko, Rudolf Jašík, Alfonz Bednár, Dominik Tatarka, Ladislav Mňačko, Ladislav Ťažký, Vincent Šikula, Peter Jaroš, Ladislav Ballek, Ján Johanides, Rudolf Sloboda, Pavel Vilikovský, Dušan Dušek, Dušan Mitana, Jana Juráňová,\nb) dráma- Štefan Králik, Ivan Bukovčan, Peter Karvaš, Milan Lasica, Július Satinský, Stanislav Štepka.\nV dráme je známe tzv. autorské divadlo, ktoré vzniklo tým, že dovtedy oddelené tvorivé aktivity autora a herca sa spojili. Tvorca, resp. vykonávateľ sa necháva vidieť priamo v divadelnej akcii. Zdôrazňuje sa osobnostná autentickosť výpovede autora, ale aj celej hry, lebo text nie je nikdy definitívny, ostáva otvorený. Autor ponecháva priestor hercovej tvorivosti, javiskovej skúsenosti a jeho osobnosti. Nie je prísne predpísané, ako by mal herec danú rolu prezentovať, tým pádom sa táto úloha nemusí pripisovať len jedinému protagonistovi, lebo každý iný herec do nej vkladá niečo nové. V oblasti výrazových prostriedkov dominuje používanie irónie i sebairónie. Snaha priblížiť sa divákovi vedie autora k používaniu žargónu a nárečia. \n\n**J. **Heller** – Hlava XXII -**>** názov diela je europeizmus, je to vojnový román Téma **\nTémou diela sú medziľudské vzťahy v Yossarianovej letke, nesúhlas niekedy až a absurdnými príkazmi veliteľstva, konflikty a problémy jednotlivých postáv, strach vojakov, túžba po návrate domov a k pokojnému životu.\n**Idea**\nOdsúdenie absurdnosti vojny a zabíjania, vojenskej mašinérie a byrokracie.\n**Dej**\n28-ročný vojak americkej armády Yossarian, slúžiaci na ostrove Pianosa v severnom Taliansku sa necíti ako dobrý vojak, a už vôbec nie ako hrdina. Rozhodne sa nechystal položiť svoj život za vlasť, svedčí o tom aj jeho názor: „Len pár krajanov by obetovalo život by to, aby zvíťazili.“ Dej sa začína v nemocnici. (Yossarian často simuloval aby nemusel až tak často bojovať.)\nAko dôstojník musí počas liečby cenzurovať listy, ktoré posielajú vojaci z frontu domov. Často začierni všetko okrem oslovenia a podpisu, podpíše iba tie ktoré nečíta. Tie, ktoré prečíta často celé prečiarkne, alebo doplní o nejakú vetu a podpíše falošným menom. Kontrarozviedka príde hľadať tajomného muža Washingtona Irvinga.\nPo návrate z nemocnice zistí že počet náletov zvýšili na 50, a simulovanie mu nebude pomáhať večne. Myslí na to, že sa mu vojna stane osudnou, jeho a panické kľučkovanie medzi proti lietadlovou paľbou, mu paradoxne vynesie nečakané zásluhy, má si prevziať letecký kríž, avšak na slávnosť prichádza nahý. Blíži sa útok na Bolognu, Yossarian si nedokáže pomôcť (bojí sa, lebo vie že je tam najsilnejšia protiletecká obrana) a tak posunie hranicu bombardovania. Aj keď padlo mesto do rúk spojencov, nebezpečenstvo stále trvá, preto podá celej jednotke preháňadlo, aby sa útok znova doložil. Pri nálete je zranený, keď sa vráti do útvaru, postupne tu zomierajú jemu nesympatický ľudia, ale i jeho priatelia. Raz, keď bol na pláži so sestrou Ducketovou, jeho pilot sa predvádzal na pláži. Nezbadal mávajúceho Simpsona a preťal ho vrtuľou napoly. McWatt po tejto udalosti spácha samovraždu. Doktor Daneeka, chorobne sa obávajúci o svoje zdravie  na to doplatí najhoršie, lebo mal letieť spolu s McWatom. Smrti neunikol aj keď z neho administratíva urobila živého ducha. Zomrie aj Yossarianov najlepší priateľ Nately, počas bitky v ktorej mala letka veľké straty. Počas dovolenky ide do Ríma a podujme sa oznámiť Natelyho smrť jeho talianskej priateľke, hoci s ním mala povrchný vzťah tvári sa že ju správa hlboko zasiahla. Pokúsi sa zabiť Yossariana.\nPo zvýšení počtu náletov na 80 odmieta chodiť na nálety. Cez deň sa s ním nikto nerozpráva, no v noci ho navštevujú vojaci a pýtajú sa, či nedostal za odmietanie náletov nejaký trest. Plukovník Cathart a podplukovník Korn pristúpia konečne na to, že dovolia Yossarianovi odísť s frontu pod podmienkou, že bude vychvaľovať a neprezradí nič o podmienkach v tábore.\nYossarian sa opäť dostáva do  Ríma a prechádza mestom, plného stratených existencií. V dôstojníckom byte zistí, že Aarfy znásilnil a potom vyhodil z okna nepríťažlivé mladé dievča, paradoxne zatknú Yossariana pretože nemá priepustku. Po informácii, že Orr žije a emigroval do Švédska, sa rozhodne konať sám, na vlastnú päsť(emigrovať do Švédska). \n\n**Postavy**\n\nAutor zobrazoval postavy veľmi reálne, opisoval kladné ale i záporné vlastnosti postáv. Rôzne, pomaly až čudné vlastnosti niektorých postáv dokonale dokresľujú satiru, tragickosť diela, a pomáhajú poukazovať na absurditu vojny.\n\n**YOSSARIAN**\n– hlavná postava, je tragikomický(trochu klaun a trochu blázon).\n**CATHART**\n –plukovník zúfalo túžiaci sa stať generálom, snaží sa na seba upozorniť rôznymi administratívnymi trikmi – zvyšuje počet náletov.\n„Plukovníkom smrť Kida Simpsona tak otriasla. Že zvýšil počet náletov na 65, potom ako prišiel o život doktor Daneeka v McWatovom lietadle zvýšil počet náletov na 70.“\n**MAJOR **MAJOR MAJOR**\n – poznamenaný svojím menom ktorí mu dal otec bez vedomia matky, na vojne dostal hodnosť major. Postupom času sa utiahol do svojho stanu kde si nechal nosiť jedlo. A do svojho veliteľského stanu chodil vykopanými zákopmi v tábore, v tomto stane prestal prijímať návštevy a prijímal ich len vtedy keď tam nebol. Jeho život bolo 31 chmúrnych rokov osamelosti a sklamania.\n**McWatt**\nYossarianov pilot, bol asi najväčším bláznom celej letky, bol normálny a predsa sa mu vojna nezhnusila. Veľmi rád sa predvádzal nízkym letom na pláži a strašil tak ostatných vojakov. Raz nešťastnou náhodou zachytil vrtuľou Kida Simpsona a po pár sekundách letu rozbil svoje lietadlo o útes.\n**Daneeka**\nbol doktorom, trápilo ho že kvôli vojne nemôže zarábať vo svojej súkromnej ambulancii, na nálety nechodil a tak sa stalo že ho vyhlásili za mŕtveho.\n**MILO MINDERBINDER**\nproviantný dôstojník trochu cvok a trochu génius , nemal morálku no bol vynikajúcim obchodníkom na čiernom trhu. Zo 70  náletov si odlietal len 4 vrátane bombardovania vlastnej letky. \n**DUNBAR**\nYossarianov priateľ, často ležali spolu v nemocnici. Vynikajúco si rozumeli a spoločne privádzali lekárov i nadriadených do šialenstva. \n**ORR**\nYossarianov spolubývajúci, ktorý bol veľmi zručný. V ústach nosil plánky, lebo boli lepšie ako divé gaštany, ktoré v ústach skutočne nosil, aby mal líca ako jabĺčka. V rukách nosil gumové loptičky, ktoré vznikol stláčať, aby mohol bez výčitiek každému povedať, že v ústach nosí plánky. Skoro počas každého náletu skončil vo vode, celú dobu sa hral na „blbečka“ no pritom poctivo trénoval svoj útek a prežitie.\n**NATELY**\nsyn z dobrej rodiny, beznádejne sa zamiluje do dievčaťa ľahších mravov. Kvôli láske nechce ísť domov a chodí na ďalšie nálety, kde aj zomiera.\n**WASHINGTON IRVING**\npseudonym ktorý používa pri cenzurovaní Yosssarian a neskôr aj Major Major. Nakoniec z toho bol obvinený kaplán Tappman.\n**TAPPMAN**\nkaplán pluku, anabaptista, nikto ho nemá rád, priateľov nachádza až v Yossarianovi a Dunbarovi. Desiatnik Whitcombh o udá že je Washington Irving, vyšetrujú ho a až správa o Yossarianovom úteku mu dodá chuť znovu veriť.\n\n**Konflikt**\n\nMá hlavná postava s byrokraciou veliteľstva a s niektorými postavami.\n\n**Postavenie autora v diele**\n\nAutor je rozprávačom – 3 os. singuláru.\n \n**Kompozícia**\n\nDielo má 42 kapitol, z ktorých je väčšina nazvaná podľa postáv, všetky kapitola sú označené číslom.","number":29,"assignment":"**Zadanie č. 29**\n\nÚloha č. 1\n\n**Vymenujte a charakterizujte druhy jazykových slovníkov. Aký druh slovníka použijete na vysvetlenie slov**: *expresionizmus, krumple, väzenie –žalár, **archeografia**, /**ďeckí**/, **design**.*\n\n**Vysvetlite, čo obsahujú Pravidlá slovenského pravopisu a aký majú dnes pre nás význam. **Aké príručky a slovníky ste využili počas prípravy na maturitnú skúšku?\n\nÚloha č. 2\n\n**Vysvetlite stručne vývin svetovej literatúry **od roku 1945 po súčasnosť**. Poukážte na vznik viacerých umeleckých smerov (najmä existencializmus) a rôznorodé literárne výpovede o spoločnosti**. Analyzujte aspoň dve ukážky a využite vlastné čitateľské interpretácie.\n\nUkážky: *J. P. **Sartre** - Múr*\n\n* J. **Heller** – Hlava XXII*\n\n* G. **Orwell** – 1984*\n\n**Joseph Heller**: Hlava XXII (úryvok)**\n\n,,Musíte mať ustavične na mysli len prospech vlasti a ľudskú dôstojnosť.“\n\n,,No pravdaže,“ povedal Yossarian.\n\n,,Myslím to vážne, Yossarian. Toto nie je prvá svetová vojna. Nesmiete zabúdať, že bojujete proti agresorom, ktorí by v prípade svojho víťazstva nenechali na žive ani jedného z nás.“\n\n,,To viem,“ odsekol Yossarian ostro a odrazu ho skutočne pochytil hnev. ,,Doparoma, Dandy, veď ja si tu medailu zaslúžim bez ohľadu na to, ako to zdôvodnili. Odlietal som si sedemdesiat sakramentských náletov. Nehovorte mi tu, že mám bojovať za záchranu vlasti. Veď celý čas bojujem iba za záchranu vlasti. Teraz by som chcel trochu bojovať za vlastnú záchranu. Vlasti už nebezpečenstvo nehrozí, ale mne áno.“\n\n,,Vojna sa ešte neskončila. Nemci sa prebíjajú k Antverpám.“\n\n,,Nemci budú o pár mesiacov porazení. A o pár mesiacov nato sa vzdá Japonsko. Ak by som teraz prišiel o život, nebolo by to za vlasť. Bolo by to za Cathcarta a Korna. Preto sa až do konca vojny na zameriavač ani nepozriem. Odteraz myslím iba na seba.“\n\nMajor Dandy mu s blahosklonným úsmevom zhovievavo odpovedal: Ale predstavte si, Yossarian, že by si to povedali všetci.“\n\n,,Tak by som ozaj musel byť strašný hlupák, keby som uvažoval inak, no nie?“\n\n**Jean** - Paul **Sartre**: Múr (úryvok)**\n\nStačilo sa mi pozrieť na lavicu, lampu, na hŕbu uhoľného prachu, hneď som cítil, že mám umrieť. Prirodzene, nevedel som si celkom jasne predstaviť svoju smrť, ale videl som ju všade, na predmetoch, na tom, ako sa mi kdesi strácali a vzďaľovali potichučky, nenápadne, ako ľudia, čo tlmene hovoria pri záhlaví umierajúceho...\n\nKeby mi v stave, v akom som bol, prišli oznámiť, že sa môžem pokojne vrátiť domov, že mi darujú život, vôbec by to mnou nepohlo: všetko jedno, či čakáš niekoľko hodín, alebo niekoľko rokov, keď si už stratil predstavu, že si večný.\n\n**George Orwell**: 1984 (úryvok)**\n\nČokoľvek Strana považuje za pravdu, je pravda. Realitu nemožno vidieť inak, ako očami pravdy. Tento fakt sa budeš musieť znova naučiť, Winston...\n\nSpomínaš si, „“ pokračoval, ako si zapísal do denníka ,Sloboda je sloboda hovoriť, že dva a dva sú štyri´?“\n\n,,Áno,“ odpovedal Winston.\n\nO´Brien dvihol ľavú ruku chrbtom k Winstonovi, palec mal schovaný a štyri prsty roztiahnuté.\n\n,,Koľko prstov držím hore, Winston?“\n\n,,Štyri.“\n\n,,A keď strana povie, že to nie sú štyri, ale päť, koľko ich bude potom?“\n\n,,Štyri.“\n\nSlovo zaniklo v záchvate bolesti. Ručička na číselníku vystrelila na päťdesiatpäť. Winstonovi vyrazil na celom tele pot...\n\n,,Koľko prstov, Winston?“\n\nŠtyri.“\n\nRučička vyskočila na šesťdesiat.\n\n,,Koľko prstov, Winston?“\n\n,,Štyri! Štyri! Čo iné môžem povedať? Štyri!“\n\nRučička bezpochyby opäť stúpla, ale už sa na ňu nepozeral. Výhľad mu zakrývala tvrdá a prísna tvár a štyri prsty. Tie prsty mu vyvstali pred očami ako stĺpy, obrovské, nejasné a akoby vibrujúce, ale nepochybne boli štyri.\n\n,,Koľko prstov, Winston?“\n\n,,Päť! Päť! Päť!“\n\n,,Nie, Winston, to nemá zmysel. Klameš. Stále si ešte myslíš, že sú štyri. Koľko prstov, prosím?“\n\n,,Štyri! Päť! Štyri! Čo chceš? Len to zastav, zastav tú bolesť!“"},"30":{"tema_jazyk":"Náučný štýl, formy logického myslenia","tema_lit":"Fantastická a vedecko-fantastická literatúra","autori":["Milan Rúfus","Antoine de Saint-Exupéry","J. K. Rowlingová"],"diela":["Báseň a modlitba","Malý princ","Harry Potter"],"okruh_jazyk":"Sloh - náučný štýl","okruh_lit":"Súčasná literatúra, fantastika","full":"**Zadanie č. 30**\n\nÚloha č. 1\n\n**Charakterizujte náučný štýl a porovnajte s výrazovými prostriedkami ostatných štýlov. Vysvetlite, aké formy logického myslenia použijeme vo výkladovom slohovom postupe. Vysvetlite **fázy učenia sa pri vypracovaní projektu na ľubovoľnú tému: *príprava, realizácia, prezentácia; dedukcia, indukcia, komparácia, analýza, syntéza, analógia *\n\n**Vyberte z ukážky **Malý princ** jednu myšlienku a demonštrujte na nej rozdiel medzi **presnou citáciou, voľnou citáciou a parafrázou**.**\n\nÚloha č. 2\n\n**Vysvetlite **vzťah literatúry a umenia**, rozdiel medzi **poéziou a prózou**. Zaraďte **fantastickú a vedecko-fantastickú literatúru **do systému literatúry** a porovnajte s iným literárnym žánrom. Rozoberte estetickú a poznávaciu funkciu vašej obľúbenej knihy alebo uvedenej ukážky. **\n\nUkážky: *M. Rúfus** - Báseň a modlitba*\n\n- *de Saint **Exupéry** – Malý princ*\n\n*J. **Rowlingová** – Harry Potter*\n\n**Milan Rúfus: Báseň a modlitba **\n\nČo sa ty v básni dozvedáš:\n\nKeď plače oblak, to je dážď.\n\nKeď nebo plače, je to rosa.\n\nKeď plače lúka, je v tom kosa.\n\nKeď plače strom, je priskyrica.\n\nKeď ty plačeš – dve tvoje líca\n\nsa rozprávajú o duši.\n\nModlitbička to osuší.\n\nA ako Božie slniečko\n\nzatlačí slzu pod viečko.\n\nBáseň a modlitba sú sestry.\n\nPozvi ich k sebe, stôl im prestri.\n\n**Antoine** de Saint **Exupéry**: Malý princ (úryvok)**\n\nTak som žil samotársky a nemal som nikoho, s kým by som si vážne pohovoril, až do tých čias, kým ma pred šiestimi rokmi nepostihla na saharskej púšti porucha motora. Čosi sa v ňom polámalo. A pretože som nemal so sebou ani mechanika , ani cestujúcich, chystal som sa, že sa tú neľahkú opravu pokúsim urobiť sám. Bola to pre mňa otázka života a smrti.\n\nPrvý večer som teda zaspal na piesku, tisíc míľ od akéhokoľvek obývaného kraja. Bol som oveľa opustenejší ako stroskotanec na plti uprostred oceána.\n\n- - - - - - - -\n\n- Zbohom, - povedala líška. – Tu je moje tajomstvo. Je veľmi jednoduché: *Dobre vidíme iba srdcom. To hlavné je očiam neviditeľné.*\n\n- To hlavné je očiam neviditeľné, - opakoval Malý princ, aby si to zapamätal.\n\n- Čas, ktorý si strácal pre svoju ružu, robí tvoju ružu takou dôležitou.\n\n- Čas, ktorý som strácal pre svoju ružu... – opakoval Malý princ, aby si to zapamätal.\n\n- Ľudia zabudli na túto pravdu, -povedala líška. – Ale ty na ňu nesmieš zabudnúť.\n\n Ty budeš navždy zodpovedný za všetko, čo si skrotíš. Si zodpovedný za svoju ružu...\n\n- Som zodpovedný za svoju ružu... opakoval Malý princ, aby si to zapamätal.\n\n**J. **Rowlingová**:** Harry Potter**\n\n,,Čo sa deje? Čo sa stalo?“ Argus Filch zrejme začul Malfoyov krik a predieral sa davom. Keď zbadal pani Norrisovú, ustúpil a zhrozený si zakryl tvár dlaňami.\n\n,,Moja mačka! Čo sa stalo pani Norrisovej?“ škriekal. A jeho vypúlené oči spočinuli na Harrym.\n\n,,Ty!“ zvrieskol. ,,TY! Ty si ju skántril! Ja ťa...“\n\n,,Argus!“\n\nNa miesto činu sa dostal Albus Dumbledore spolu s ďalšími učiteľmi. Prešiel sa popri Harrym, Ronovi a Hermione a zvesil pani Norrisovú zo stojana na fakle.\n\nÚloha č. 1\n\n**Charakterizujte náučný štýl a porovnajte s výrazovými prostriedkami ostatných štýlov. Vysvetlite, aké formy logického myslenia použijeme vo výkladovom slohovom postupe.**\n\nPatrí medzi objektívne štýly verejnej komunikácie. Rozdeľuje sa na teoretický a populárno - náučný štýl.\n\nVedecko - náučný štýl\n1.  Využíva termíny a knižné slová\n2.  Má prísne logickú kompozíciu ( presná štruktúra )\n3.  Náročná stereotypná štylizácia z hľadiska morfológie a syntaxu\n4.  Presná vedecká argumentácia, citácia, parafrázovanie, bibliografia\n5.  Neutrálnosť, nezaujatosť výkladu (zákony, leták z liekov)\n\nPopulárno – náučný štýl\n1.  Voľnejší výber slov\n2.  Voľnejšia kompozícia, členenie textu na odseky\n3.  Pestrejšia, pôsobivejšia štylizácia, beletristické a rečnícke prvky\n4.  Voľná citácia alebo parafrázovanie, bez bibliografie\n5.  Silná didaktická a presviedčacia zložka (časopis Zdravie)\n\nZákladné vlastnosti náučného štýlu:\n1.  PÍSOMNOSŤ: väčšina textov má písanú podobu. Veta môže byť komplikovaná, pretože príjemca sa k textu môže niekoľkokrát vrátiť. Prevládajú dlhšie vety a súvetia, aj zložené. Okrem názvov ( napr. kapitol )absentuje jednočlenná veta. Využíva sa polovetné konštrukcie, hlavne s príčastiami, neobracia sa na adresáta\n2.  MONOLOGOCKOSŤ: využíva len spisovnú podobu jazyka, úvodzovky znamenajú citáciu\n3.  VEREJNOSŤ: používa vyjadrovacie prostriedky zrozumiteľne verejnosti, texty sú určené širokej verejnosti.\n4.  POJMOVOSŤ: odborný text pracuje s pojmami, termínmi, nachádzajú sa tu aj nocionálne – pojmové slová (...po jeho smrti – nie po jeho skone, alebo usnutí atď.)\n5.  ODBORNOSŤ a PRESNOSŤ: údaje musia byť presné, jasne formulované, odbornosť sa dodržiava pomocou lexiky, využíva sa terminológia vedných odborov\n\nJazykové prostriedky:\nVyužíva zložité vetné, súvetné a polovetné konštrukcie (napr. s činným a trpným príčastím), enumeráciu (napr. vymenúvanie autorov, ich diel, udalostí...), termíny a internacionalizmy.\n \nLexika náučného štýlu:\n1.  Nocionálne slová (štylisticky bezpríznakové) napr. pes\n2.  Termíny – jednoznačné, jednovýznamové ustálené pomenovania\na, domáce: jednoslovné, viacslovné alebo zložené (napr. drevoryt)\nb, cudzie\nc, hybridné (neologický)\nd, kalky (geografia)\n3.  Knižné slová\n4.  Značky, skratky, skratkové slová (TANAP)\n5.  Multiverbizácia (namiesto minerálka povieme minerálna voda)\n\nVybraté útvary\n\nŠtúdiá, dizertácia (rozprava) – vedecký opis sú útvary, ktoré prinášajú výsledky vedeckej činnosti. Dizertácia sa delí na kompendium ( Dejiny Slovenska – celá vedecká disciplína) a monografiu (napr.  Slovensko v dobách Veľkej Moravy – časť vedeckej disciplíny).\n\nMonografia je spravidla vedecké dielo, publikácia alebo aj časť publikácie, kde je komplexne spracovaná jediná téma, spravidla úzko špecializovaná či vymedzená. Vznikla na základe skúmania daného problému.\n\nKompozícia a obsah SOČ\n1. titulný obal, titulný list\n2. obsah\n3. Úvod: stručný úvod do problematiky, dôvod, prečo sa autor pre tému rozhodol, cieľ práce, metódy, ktoré zvolil, môže spomenúť ťažkosti, ktoré mu stále v ceste pri práci s literatúrou alebo pri overovaní v praxi atď.\n3. Jadro: v kapitolách označených číslom a názvom analyzuje, porovnáva, prináša dôkazy, príklady, cituje z odbornej literatúry atď.\n4. Záver: Stručné zhodnotenie splnenia cieľov, prínos práce a jej možné použitia v škole\n5. Resumé: (v slovenskej a cudzej reči) stručné zhrnutie obsahu po kapitolách, aby dostal základnú informáciu aj človek, ktorý nebude čítať celú prácu, ale prípadne hľadá pramene na spracovanie podobnej témy.\n6. Bibliografický zápis: zoznam použitej literatúry, ktorá poslúžila na štúdium, argumentovanie, citáciu atď.\n7. Prílohy\n\nPOSTUPY LOGICKÉHO MYSLENIA (VYKLADOVY SLOHOVY POSTUP)\n\n**indukcia – **vychádza z jednotlivých faktov na základe ktorých sa formuje všeobecný záver\n\n**dedukcia – **opak indukcie, vychádza z všeobecného javu / faktu, snaží sa zistiť jednotlivé fakty ktoré k nemu viedli (vyšetrovanie)\n\n**analýza – **rozbor\n\n**syntéza – **zhrnutie\n\n**analógia – **pripodobňovanie, obdoba, zhoda... 1 fakt poznáme úplne a druhý čiastočne\n\n**komparácia – **porovnávanie... oba fakty poznáme úplne\n\n**argumentácia – **vysvetľovanie na základe konkrétnych faktov, zdôvodňovanie\n\n**demagógia – **nevedecká argumentácia\n\n**Vysvetlite **fázy učenia sa pri vypracovaní projektu na ľubovoľnú tému: *príprava, realizácia, prezentácia; dedukcia, indukcia, komparácia, analýza, syntéza, analógia *\n\n**Príprava: **zhromažďovanie všetkých potrebných materiálov, ktoré v projekte budeme potrebovať (obrázky, informácie, príklady, hmotné pomôcky...)\n\n**Realizácia:** uskutočnenie projektu do reálnej podoby, (prezentácie,výkresy,...atď)\n\n**Prezentácia: **prezentovanie, daného projektu pred, verejnosťou alebo pred daným špecifickým publikom podľa typu projektu.\n\n**Dedukcia: odvodzovanie jasných skutočností, ktoré vyplývajú z projektu, vysvetliť postup ako sme k daným informáciami dospeli.\n\n**Indukcia: **Myšlienkový postup danej problematiky\n\n**Komparácia: Porovnávanie rozličných podobných alebo totožných tematicky cielených projektov ktoré možno porovnať.\n\n**Analýza: Rozbor, prácu alebo projekt detailne preskúmať a bližšie špecifikovať jednotlivé časti projektu.\n\n**Syntéza: **Zlučovanie časti projektu do zložiek určeného celku ( mapa mysle)\n\n**Analógia: Vyhladávame podobnosť\n\n**Vyberte z ukážky **Malý princ** jednu myšlienku a demonštrujte na nej rozdiel medzi **presnou citáciou, voľnou citáciou a parafrázou**.* Voľná citácia** – využíva sa v rečníckych a publicistických textoch, pri ktorých sa neuvádza autor či dielo, z ktorých citovaný text pochádza.\n\n**Parafráza – **voľné prerozprávanie, spracovanie cudzej predlohy. Nevyskytuje sa v odbornej literatúre.\n\n ...pretože je jasné že Čas, ktorý strácame pre našu ružu, robí našu ružu takou dôležitou.\n\n**Doslovná citácia** – doslovne uvedený cudzí  výrok, s bibliografickým záznamom. Graficky sa odlišuje od ostatného textu\n\n „Čas, ktorý si strácal pre svoju ružu, robí tvoju ružu takou dôležitou.“\n\n *A. de **Saint.Exupery**- Malý princ*\n\nÚloha č. 2\n\n**Vysvetlite **vzťah literatúry a umenia**, rozdiel medzi **poéziou a prózou**. Zaraďte **fantastickú a vedecko-fantastickú literatúru **do systému literatúry** a porovnajte s iným literárnym žánrom. Rozoberte estetickú a poznávaciu funkciu vašej obľúbenej knihy alebo uvedenej ukážky.  Vzťah literatúry a umenia:**\n\nUmenie- typický ľudský duchovný produkt, v ktorom sa prejavuje estetický vzťah človeka k skutočnosti.\n\nUmelecká tvorba: práca alebo činnosť, ktorú autor vytvára s určitým umeleckým úmyslom, cítením, fantáziou. Mala by mať umeleckú i kultúrnu hodnotu.\n\nFunkcie umenia: umelecko- estetická, kognitívna, hodnotiaca, pretvárajúca, náučná a zábavná.\n\nLiteratúra ako umenie: je jedným z druhov umenia, jej stavebným materiálom je jazyk, preto hovoríme o slovesnom umení. Literatúra môže pomocou slova zachytiť takmer všetky javy, skutočnosti. Predmetom poznania literatúry je skutočnosť a predmetom zobrazenia je človek, alebo subjekt v jeho zložitých vzťahoch ku skutočnosti.\n\nChápanie literatúry: širšie chápanie: vedecká, politická, právnická.. = vecná literatúra (vedecká)\n\nKrásna literatúra, beletria, esteticko- umeleckú funkciu\n\nRozdiely medzi vedeckou a umeleckou literatúrou:\n\nVedecká poskytuje informácie odpovedajúce realite. Umelecká vychádza z reality no prvoradú funkciu zohráva fantázia tvorcu, dôležité je estetické kritérium.\n\n**Vedecko- fantastická literatúra ( **Sci**- **Fi**/ **Fantasy**)**\n\n-zahŕňa diela, ktoré čerpajú námet z poznatkov vedy a techniky, stvárňuje udalosti, ktoré ešte nenastali, ale v budúcnosti sa môžu stať\n\n-psychika postáv sa osobitne nevykresľuje, pretože sú predstaviteľmi určitého spoločenstva, obyčajne sú nositeľmi kladných vlastností.\n\n-dielo vždy obsahuje nejaké tajomstvo, ktoré je rozlúštené v závere diela\n\n- často sa hovorí o nových vynálezoch, strojoch..\n\n-dej je nasmerovaný do budúcnosti\n\nAutori: Jules Verne- Cesta na Mesiac, 20 000 míľ pod morom\n\nKarel Čapek- R. U. R, Továrna na abslotuno\n\nDouglas Adams- Stopárov sprievodca po galaxii\n\nJ. Žarnay- Tajomstvo dračej steny\n\n**Porovnanie poézie a prózy: POÉZIA**\n\n- z gréckeho poesis – tvorba\n\n- autor poézie = básnik\n\n- od bežnej reči sa odlišuje používaním umeleckých prostriedkov napr. rým, rytmus, metrum, obraznosť, symbolika\n\n- v staroveku tento názov znamenal všetku literárnu tvorbu, v klasicizme dostal nový rozmer\n\n- znamená viazanú reč (grafické členeni básne, rytmus, rým, strofu)\n\n-delí sa na : Epická poézia: má dej\n\nLyrická poézia: nemá dej\n\nLyricko- epická poézia: dej je potlačený ale naznačený\n\n**PRÓZA**\n\n- názov je odvodený z lat. oratio proversa = reč, ktorá plynie po riadkoch stále vpred – riadok je teda ohraničený rozmerom stránky, nie napr. počtom slabík, rýmom, ...\n\n- popri poézii ide o jeden z **typov** literatúry (niekde sa dá nájsť aj termín **rod**, niekde dokonca aj **druh**, pričom pri poslednom pomenovaní je členenie literatúry na lyriku, epiku a drámu z hľadiska estetického)\n\n- na poéziu a prózu sa literatúra člení z hľadiska jazykovo-štylistickej formy\n\n- je to **rytmicky neviazaná reč** (nie je ako poézia zviazaná do veršov, ale voľne plynie) - základný rozdiel spočíva **v grafickom členení textu – **je to voľná reč nedelená na verše\n\n- próza **musí byť tiež usporiadaná, ale nie nevyhnutne metricky, zvukovo, ale tematicky** (inak by čitateľ nerozumel)\n\n- základnou jazykovou jednotkou je **veta** – nemožno presne stanoviť, podľa akých pravidiel autor tieto vety tvoril (ako napr. pri sylabickom veršovom systéme) – autor podriaďuje svoju reč len **všeobecným jazykovým pravidlám**\n\n- v próze sa píšu **všetky neumelecké texty a mnohé umelecké literárne diela** (**v staršej literatúre sa aj vedecké texty písali v poézii** – napr. existovali veršované slovníky)\n\n- vo všeobecnosti sa dá tvrdiť, že **lexika, štylizácia, zvuková stránka prózy sú jednoduchšie ako v poézii**\n\n- rovnoprávne postavenie s poéziou získala dosť neskoro – **postupne sa zrovnoprávňuje od obdobia renesancie**\n\n- **ale v ústnej ľudovej slovesnosti bola rovnako obľúbená ako poézia**\n\n- uplatňuje sa **väčšinou v epike, ale aj v dráme**\n\n- **v lyrike – tzv. básne v próze** (hoci názov je zavádzajúci) – u nás napr. Ivan Krasko\n\n- **v súčasnosti prevláda**, lebo **vo väčšej miere môže zobraziť šírku a zložitosť spoločenského diania Antoine** de Saint **Exupéry** – Malý princ Kompozícia:** 27 kapitol \n\n**Žáner:** filozofická rozprávka pre dospelých \n\n**Literárne obdobie:** literatúra po roku 1945 (francúzska) \n\n**Rok vydania:** 1943 \n\n**Motto:** „Oči sú slepé. Treba hľadať srdcom.\" (Saint-Exupéry, A. de: Malý princ. Mladé letá 1997, str. 77) \n\n**Kedy a kde sa odohráva dej:** zrejme počas 2. svetovej vojny kdesi na saharskej púšti \n\n**Postavy:** \nMalý princ \n- „zvláštny chlapček\", ktorý sa z čista jasna zjavil na púšti, malý odvážny hrdina\n- jeho domovom je planéta B 612 \n- čistý, neskazený, úprimný \n- vedel dávať otázky do omrzenia \n- kým pilot opravoval lietadlo, on mu rozprával o svojej planéte, o odchode, o ceste \n- zapochybuje o láske k svoje ruži, postupne však nachádza odpoveď na otázku, čo je skutočne dôležité a rozhodne sa k nej vrátiť \nrozprávač - pilot \n- pilot, ktorému sa na saharskej púšti pokazí lietadlo \n- prišiel k nemu Malý princ a chcel, aby mu nakreslil ovečku - a tak zase po dlhom čase (znechutili ho totiž dospelí, keď bol dieťa) kreslí \n- zistil, že Malý princ mu pripomína seba, keď bol malý a uvedomí si, že teraz je už obyčajný dospelý s obmedzenou fantáziou a trpezlivosťou \n- obľúbil si malého princa \n- chcel uveriť, že malý princ sa po uštipnutí hadom, bez svojej telesnej schránky opäť vrátil na svoju planétu, k svoje ruži \n- možno až doteraz čaká na návrat svojho Malého princa \n\nlíška \n- nemala rada ľudí \n- chcela od Malého princa, aby si ju skrotil \n- naučila Malého princa trpezlivosti \n- pokladala svoj život za jednotvárny a nudila sa \n- prezradila mu, prečo je jeho ruža jedinečná - čas, ktorý jej venoval, ju robí dôležitou \n\nhad \n- pre Malého princa sa vyjadroval v hádankách \n- pomohol mu dostať sa naspäť k svojej ruži \n\nbytosti, s ktorými sa stretol Malý princ na svojej púti 6 planétach (asteroidy 325 - 330), a ktoré predstavujú ľudské vlastnosti: \nkráľ \nmárnivec \npijan \nbiznisman \nlampár \nzemepisec
