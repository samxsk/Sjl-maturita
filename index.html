<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#fef9f3" id="theme-meta">
<title>Maturita SJL — 30 zadaní</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,800;9..144,900&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root{
  --bg:#fef9f3; --ink:#1a1612; --paper:#fff8ee; --paper-2:#faeed8;
  --accent:#c8401f; --accent-2:#7d3a0d; --gold:#b8893d; --muted:#857966;
  --line:#e8dfd0; --line-2:#d9cdb5; --ok:#3d6b3a; --err:#a8331a; --warn:#b8762b;
  --jazyk:#5b4a35; --lit:#7d2828;
  --uloha1-bg:#f5e8d0; --uloha1-bd:#b8893d;
  --uloha2-bg:#f3dcd3; --uloha2-bd:#c8401f;
  --shadow:0 1px 0 rgba(0,0,0,.03), 0 4px 16px -8px rgba(125,58,13,.08);
}
html.dark{
  --bg:#181410; --ink:#f0e7d6; --paper:#221c16; --paper-2:#2c241c;
  --accent:#e87856; --accent-2:#f0a974; --gold:#d4a55a; --muted:#8a7e6c;
  --line:#352c22; --line-2:#453a2d; --ok:#7fb878; --err:#e57658; --warn:#d4a55a;
  --jazyk:#c5b594; --lit:#e8a99b;
  --uloha1-bg:#3a2f1f; --uloha1-bd:#d4a55a;
  --uloha2-bg:#3d2620; --uloha2-bd:#e87856;
  --shadow:0 1px 0 rgba(0,0,0,.2), 0 4px 16px -8px rgba(0,0,0,.4);
}
*{-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--ink);font-family:'Instrument Sans',system-ui,sans-serif;overscroll-behavior:none;transition:background-color .3s,color .3s}
.serif{font-family:'Fraunces',Georgia,serif}
.mono{font-family:'JetBrains Mono',monospace}
.paper{background:var(--paper);border:1px solid var(--line);box-shadow:var(--shadow)}
.paper-2{background:var(--paper-2);border:1px solid var(--line-2)}
.divider{height:1px;background:var(--line)}
.btn-ghost{transition:all .15s}
.btn-ghost:hover{background:rgba(200,64,31,0.06)}
.btn-active{background:var(--ink);color:var(--paper)}
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;font-size:11px;letter-spacing:.02em;border-radius:99px;font-weight:500}
.tag-jazyk{background:rgba(184,137,61,0.18);color:var(--jazyk)}
.tag-lit{background:rgba(200,64,31,0.12);color:var(--lit)}
.tag-done{background:rgba(61,107,58,0.18);color:var(--ok)}
.tag-warn{background:rgba(184,118,43,0.18);color:var(--warn)}
.tag-supp{background:rgba(133,121,102,0.18);color:var(--accent-2);font-weight:600}
.num-badge{font-family:'Fraunces',serif;font-weight:800;letter-spacing:-.04em}

/* Flashcard 3D */
.fc-container{perspective:1200px}
.fc-inner{position:relative;width:100%;height:100%;transition:transform .55s cubic-bezier(0.4,0.0,0.2,1);transform-style:preserve-3d}
.fc-flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden}
.fc-back{transform:rotateY(180deg)}
.fc-swipe-tracking{transition:none}

.scrollbar-thin::-webkit-scrollbar{width:6px}
.scrollbar-thin::-webkit-scrollbar-track{background:transparent}
.scrollbar-thin::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}

/* === CONTENT TYPOGRAPHY === */
.content-prose{font-family:'Instrument Sans',sans-serif;font-size:15.5px;line-height:1.7;color:var(--ink)}
.content-prose b,.content-prose strong{font-weight:700;color:var(--ink)}
.content-prose em,.content-prose i{font-style:italic;color:var(--accent-2)}
.content-prose p{margin:8px 0}
.content-prose ul{margin:8px 0;padding-left:0}
.content-prose .bullet{display:flex;gap:10px;margin:5px 0;align-items:flex-start;line-height:1.6}
.content-prose .bullet::before{content:"";flex-shrink:0;width:5px;height:5px;background:var(--gold);border-radius:50%;margin-top:10px}
.content-prose .sub-heading{font-family:'Fraunces',serif;font-weight:700;color:var(--accent-2);margin:18px 0 8px;font-size:17px;line-height:1.3}
.content-prose .ukazka{
  background:var(--paper-2);border-left:4px solid var(--gold);
  padding:14px 18px;margin:14px 0;border-radius:0 8px 8px 0;
  font-family:'Fraunces',serif;font-size:14.5px;line-height:1.65;
  white-space:pre-wrap;font-style:italic;
}
.content-prose table{border-collapse:collapse;margin:12px 0;width:100%;font-size:13.5px}
.content-prose td,.content-prose th{border:1px solid var(--line);padding:8px 10px;text-align:left}
.content-prose th{background:var(--paper-2);font-weight:600}
.content-prose mark{background:rgba(200,64,31,0.18);color:var(--accent);padding:1px 3px;border-radius:2px}

/* Q&A foldable */
.qa-item{margin:12px 0;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--paper)}
.qa-question{
  padding:12px 16px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;
  background:linear-gradient(135deg,var(--paper) 0%,var(--paper-2) 100%);
  transition:background .15s;font-family:'Fraunces',serif;font-weight:600;font-size:14.5px;line-height:1.4;
}
.qa-question:hover{background:var(--paper-2)}
.qa-item.open .qa-question{border-bottom:1px solid var(--line)}
.qa-icon{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--accent);color:white;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:13px;font-family:'Instrument Sans',sans-serif;margin-top:1px}
.qa-arrow{margin-left:auto;flex-shrink:0;transition:transform .2s;color:var(--muted)}
.qa-item.open .qa-arrow{transform:rotate(90deg)}
.qa-answer{padding:14px 16px;animation:fadeInDown .25s ease;display:none}
.qa-item.open .qa-answer{display:block}
.qa-supp .qa-icon{background:var(--gold)}
.qa-supp .qa-question{background:linear-gradient(135deg,rgba(184,137,61,0.08) 0%,rgba(184,137,61,0.16) 100%)}

/* Section dividers */
.uloha-section{margin:24px 0;border-radius:16px;overflow:hidden;border:1px solid var(--line-2)}
.uloha-header{
  padding:14px 18px;font-family:'Fraunces',serif;font-weight:800;font-size:17px;
  display:flex;align-items:center;gap:10px;
}
.uloha-1{background:var(--uloha1-bg);border-bottom:2px solid var(--uloha1-bd)}
.uloha-1 .uloha-header{color:var(--jazyk)}
.uloha-2{background:var(--uloha2-bg);border-bottom:2px solid var(--uloha2-bd)}
.uloha-2 .uloha-header{color:var(--lit)}
.uloha-body{padding:16px 18px;background:var(--paper)}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.anim-in{animation:fadeIn .4s ease}
@keyframes scaleIn{from{opacity:0;transform:scale(0.96)}to{opacity:1;transform:scale(1)}}
.anim-scale{animation:scaleIn .3s ease}
@keyframes fadeInDown{from{opacity:0;max-height:0}to{opacity:1;max-height:5000px}}

.ring{transition:stroke-dashoffset .6s ease}
.quiz-opt{transition:all .2s;cursor:pointer}
.quiz-opt:hover{background:rgba(200,64,31,0.06);border-color:var(--accent)}
.quiz-opt.correct{background:rgba(61,107,58,0.18);border-color:var(--ok);color:var(--ok)}
.quiz-opt.wrong{background:rgba(168,51,26,0.15);border-color:var(--err);color:var(--err)}

.bottom-nav{box-shadow:0 -1px 0 var(--line),0 -10px 30px -10px rgba(26,22,18,.08);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:color-mix(in srgb, var(--bg) 90%, transparent)}

body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:-1;
  background-image:radial-gradient(circle at 20% 30%,rgba(200,137,61,0.04) 0%,transparent 50%),radial-gradient(circle at 80% 70%,rgba(200,64,31,0.03) 0%,transparent 50%);
}
html.dark body::before{
  background-image:radial-gradient(circle at 20% 30%,rgba(232,120,86,0.04) 0%,transparent 50%),radial-gradient(circle at 80% 70%,rgba(212,165,90,0.03) 0%,transparent 50%);
}

.deco-quote{font-family:'Fraunces',serif;font-size:160px;line-height:0.8;color:var(--gold);opacity:0.08;position:absolute;top:10px;right:14px;pointer-events:none;user-select:none;font-weight:900}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:10px 18px;border-radius:99px;font-size:13px;font-weight:500;z-index:100;box-shadow:0 8px 30px -8px rgba(0,0,0,.3);animation:fadeIn .25s ease}

.heatmap-cell{aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:'JetBrains Mono';font-weight:600}

.timer-display{font-variant-numeric:tabular-nums}

.search-input{background:var(--paper);border:1px solid var(--line);color:var(--ink);font-size:15px}
.search-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,64,31,0.12)}
.search-input::placeholder{color:var(--muted)}

.notes-input{background:var(--paper-2);border:1px solid var(--line-2);color:var(--ink);font-family:'Fraunces',serif;font-size:14px;line-height:1.55;width:100%;resize:vertical;min-height:90px;padding:10px 14px;border-radius:10px}
.notes-input:focus{outline:none;border-color:var(--gold)}

/* Recap card */
.recap-card{background:linear-gradient(135deg,var(--paper) 0%,var(--paper-2) 100%);border:1px solid var(--line-2);border-radius:16px;padding:16px 18px}

/* Reading toggle */
.read-mode-bar{display:flex;gap:6px;margin:10px 0;flex-wrap:wrap}
.read-mode-btn{padding:6px 12px;border-radius:999px;font-family:'JetBrains Mono';font-size:11px;letter-spacing:.05em;text-transform:uppercase;border:1px solid var(--line);background:var(--paper);cursor:pointer;transition:all .15s}
.read-mode-btn.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}

@media (max-width: 640px){
  .content-prose{font-size:15px}
}
html.dark{color-scheme:dark}
</style>

</script>

<script type="application/json" id="data-blob">{"zadania":{"1":{"tema_jazyk":"Komunikácia","tema_lit":"Rytmus a sylabická prozódia","autori":["Hugolín Gavlovič","Samo Chalupka"],"diela":["Valaská škola mravov stodola","Mor ho!"],"okruh_jazyk":"Sloh - komunikácia","okruh_lit":"Baroko, Romantizmus (Štúrovci)","full":"Úloha č. 1\n\n**Vysvetlite pojem komunikácia. Charakterizujte formy efektívnej komunikácie a neúspešnej komunikácie. Komunikácia **znamená:\n\n- v širšom zmysle slova **každú výmenu informácií **medzi ľuďmi, zvieratami, ale aj neživými systémami\n\n- v užšom zmysle slova predstavuje **dorozumievací proces**, spoločenský styk s cieľom výmeny myšlienok medzi ľuďmi\n\n- z jazykovedného pohľadu je to **sprostredkovanie informácii **ústnou alebo písomnou formou.\n\n**Komunikácia **sa uskutočňuje, ak chceme sprostredkovať nejaké informácie (skutočnosti), ktoré tvoria **tému** komunikácie. Komunikácia môže prebiehať medzi dvoma alebo viacerými ľuďmi, pričom účastníci komunikácie sa nazývajú **komunikanti**.\n\n**Efektívna komunikácia **je obojsmerná komunikácia medzi hovoriacim a počúvajúcim, v ktorej vyjadrujú podporujúco, opisne a asertívne myšlienky, pocity, postoje a názory. Je založená na spolupráci, dobrom počúvaní a odovzdávaní spätnej väzby. Ľudia, ktorí vedia komunikovať, majú aj schopnosť empatie. „Empatickí“ ľudia:\n\n- vedia čo chcú povedať,\n\n- vedia nájsť spôsob, ktorým získajú poslucháča,\n\n- vedia utvárať a udržiavať vzťahy,\n\n- vedia, čo sa poslucháčovi páči a čo ho zaujíma\n\n- vedia si vybrať zo škály komunikačných možností,\n\n- volia si, kedy a kde komunikujú,\n\n- komunikujú jasne, stručne, zrozumiteľne,\n\n- aktívne počúvajú,\n\n- prijaté informácie vedia pochopiť a objasniť,\n\n- nie sú rozptýlení a roztržití,\n\n- vedia ako uzatvárať komunikáciu, a pod.\n\nSúčasťou efektívnej komunikácie je **asertívna komunikácia**, ktorej základom je asertívne správanie. **Asertívna komunikácia **je komunikácia, ktorou človek otvorene a primerane vyjadruje a presadzuje svoje myšlienky, názory a pocity. Postupuje pri tom však tak, aby neprekročil svoje práva a nedotkol sa ani práv iných ľudí. Súčasťou asertívnej komunikácie je aj schopnosť človeka **počúvať druhých**. Dobrý poslucháč by mal napr. vedieť, kedy mlčať počas prehovoru druhého človeka, neprerušovať jeho výpoveď častými otázkami, alebo poznámkami, ale pritom by mal byť pripravený odpovedať na jeho otázky, povzbudiť ho k rozprávaniu.\n\n**Devalvujúca komunikácia **je opakom efektívnej komunikácie. Jej prejavy možno považovať za nízky stupeň úrovne kultivovanosti a vychovanosti človeka, ale tiež za prejav hnevu, neschopnosti ovládať emócie. K prejavom devalvujúcej komunikácia patrí:\n\n- nebrať komunikujúceho partnera na vedomie,\n\n- napádať ho,\n\n- skákať mu do reči,\n\n- vopred zavrhnúť partnerovu myšlienku, alebo nápad,\n\n- podozrievať partnera,\n\n- správať sa povýšenecky,\n\n- podceňovať, zahanbovať, urážať, strápňovať partnera,\n\n- opovrhovať partnerom,\n\n- zneužívať dôveru,\n\n- nedodržiavať dohodnuté pravidlá,\n\n- nehovoriť celú pravdu,\n\n- zámerne poskytovať falošné informácie, a pod.\n\nOpakom asertívnej komunikácie je **pasívna **a **agresívna komunikácia.  Pasívna komunikácia **vychádza z pasívneho správania, v ktorom človek často ustupuje, pociťuje stratu vlastnej hodnoty, chýba mu sebaúcta. Nedokáže jasne vyjadriť svoje názory, má nervózne gestá, vyhýba sa z pohľadu z očí do očí, hovorí ticho, váhavo, trasie sa mu hlas.\n\n**Agresívna komunikácia **vychádza z agresívneho správania, pri ktorom vnucujeme iným svoje názory, myšlienky a pocity. Často býva sprevádzaná trhavými pohybmi a povýšeneckým tónom hlasu.\n\n**Vyjadrite sa k citátom:** a) *Bez komuni**kovania o komunikovaní by sme ** nemohli rozumne komunikovať. b) Dialóg je umenie.*\n\n**Ako zareagujete na kritiku rodiča: *Ak budeš takto ďalej žiť, môžeš ochorieť. *Vysvetli**te typy odpovedí**:* a) Máš pravdu, musím s tým niečo robiť. b) Prečo, nerozumiem, čo sa ti nepáči? c) Ešte niečo ti prekáža?*\n\n**Rozoberte formy komunikácie v skladbe Mor ho!**\n\nÚloha č. 2\n\n**Vysvetlite na uvedených ukážkach pojmy **rytmus a sylabická prozódia.* Rytmus: **zakladá sa na pravidelnom opakovaní rovnakých, alebo podobných prvkov v časovej, alebo priestorovej následnosti. V poézii sa pod pojmom **rytmus **chápe pravidelné opakovanie zvukového prvku reči.\n\n**Sylabická prozódia: **je založená na výskyte rovnakého počtu slabík vo verši. Na vytváraní rytmu verša sa zúčastňujú:\n\n- opakovanie rovnakého počtu slabík vo veršoch (rovnoslabičnosť)\n\n- intonačná prestávka- rozdeľuje verš na dve časti\n\n- združený rým\n\n- rytmicko- syntaktický paralelizmus (1 verš = 1 myšlienka)\n\nUplatňuje sa v ľudovej slovesnosti. V umeleckej poézii sa rozšíril v romantizme, lebo Štúrovci čerpali z ľudovej slovesnosti. Tento veršový systém nájdeme však aj v staršej literatúre, napr. **Hugolín Gavlovič**: Valaská škola mravov stodola**.\n\n**Rozoberte osobitosti tvorby **Hugolína Gavloviča** a **Sama Chalupku**. **Porovnajte tému vlastenectva. Hugolín Gavlovič**: Valaská škola mravov stodola - obdobie: **slovenská baroková literatúra\n\n- pôsobil ako kazateľ (člen františkánskej rehole), ochorel na pľúca, chodieval na salaš, kde čerpá námet pre svoje dielo\n\n**Valaská škola mravov stodola**\n\n- didakticko- reflexívna poézia; pokladnica životnej múdrosti\n\n- touto zbierkou chcel poslúžiť ľuďom namiesto priameho kázania; využíva zábavné prvky, ktoré skladbu oživujú, no podraďuje sa morálnym hodnotám\n\n- obsahuje 16 000 veršov (1 200 básní); je napísaná slovakizovanou češtinou\n\n- každá báseň obsahuje mravné ponaučenie o rôznych životných otázkach:\n\n- nabáda k bázni pred Bohom a ochote slúžiť mu („Znášaj bídy kríže, prídeš k Bohu blíže.“)\n\n- vystríha pred zlozvykom opilstva, kritizuje alkoholizmus („Človek opilý, každému nemilý.“)\n\n- netají nechuť voči pánom, ktorí sú vlastne príčinou biedy a súženia ľudu („Bohatý má mnoho peněz, chudobný detí.“)\n\n- vyjadril nesúhlas s vojnami\n\n- vyjadruje lásku k vlasti („Sladká je vlast človekovi, v kterej sa narodí.“)\n\n- skláňa sa pred skutočnou a vytrvalou prácou\n\n- vystríha pred slepou dôverou a mocou peňazí\n\n- vyzdvihuje vlastenecké city a najkrajšími slovami sa vyjadruje o láske k vlasti, pod ktorou myslí krajinu, kde sa človek narodil a bol vychovávaný. Na vlasť sa nesmie zabúdať, veľké bláznovstvo je tupiť svoju vlasť a vnucovať jej cudzie mravy („Velmi je hlúpy, kdo vlast svú tupí.“)\n\n- **skladba:**\n\n- obsahuje: **prológ **(titul básne, naznačuje, o čom báseň bude), **jadro, epilóg**\n\n- **12 veršová strofa- **v každom verši je 14 slabík (to vytvára rytmus básne, lebo je to pravidelne sa opakujúci prvok)\n\n- prestávka uprostred verša\n\n- združený rým\n\n**Samo Chalupka: Mor ho! - **priekopník romantickej poézie v slovenskej literatúre\n\n- najstarší Štúrovec\n\n- tvorca národnej a hrdinskej epiky, ktorá prenikla do širokých vrstiev\n\n- jeho poézia odráža hlboké vlastenecké cítenie a nadšenie pre boj za národnú slobodu\n\n- **tvorba:** Branko, Turčin Poničan, Mor ho!\n\n**Mor ho! - **národná, hrdinská, lyricko- epická skladba\n\n- ide o vrcholné zobrazenie ideí slobody víťaziacej i nad smrťou\n\n- tému získal zo Šafárikovho diela: Dejiny slovenskej reči a literatúry\n\n- **dej: **\n\n- je stručný\n\n- odohráva sa v 4. storočí na rovinách pri Dunaji, pod Devínom\n\n- rímsky cisár sa tu utáborí so svojím vojskom so zámerom podmaniť si Slovanov\n\n- skupina slovenských junákov prichádza k cisárovi s posolstvom mieru\n\n- keď cisár odmieta ich pozdrav a vyhlási, že si zotročí celý národ, skupina poslov sa vrhne na Rimanov s výkrikom **Mor ho!**\n\n- cár síce zvíťazí (ale nad slabšími)- morálne víťazstvo mu nepatrí\n\n- báseň sa končí odsúdením vrahov a výzvou do boja za slobodu\n\n- Chalupka sa nezameriava na opis boja, vyzdvihuje smelosť a hrdosť junákov, ich túžbu po mieri a slobode, odsudzuje násilie a zotročovanie\n\n- zdôrazňuje rovnosť človeka s človekom, národa s národom\n\n- **hrdina básne:** je kolektívny (slovenskí junáci, ktorí majú ideálne vlastnosti)\n\n- využíva kontrasty (typická romantická črta) pri charakteristike postáv- cár je pyšný a zbabelý zotročovateľ, junáci sú hrdí, smelí, obetaví\n\n- využíva hyperboly, zvukomaľbu, prirovnania, epitetá\n\n- **13 slabičný verš**- v každom verši 13 slabík (to vytvára rytmus básne, pretože sa to pravidelne opakuje)\n\n- združený rým\n\n- prestávka uprostred verša","number":1,"assignment":"**Zadanie č. 1**\n\nÚloha č. 1\n\n**Vysvetlite pojem komunikácia. Charakterizujte formy efektívnej komunikácie a neúspešnej komunikácie. Vyjadrite sa k citátom:** a) *Bez komuni**kovania o komunikovaní by sme ** nemohli rozumne komunikovať. b) Dialóg je umenie.*\n\n**Ako zareagujete na kritiku rodiča: *Ak budeš takto ďalej žiť, môžeš ochorieť. *Vysvetli**te typy odpovedí**:* a) Máš pravdu, musím s tým niečo robiť. b) Prečo, nerozumiem, čo sa ti nepáči? c) Ešte niečo ti prekáža?*\n\n**Rozoberte formy komunikácie v skladbe Mor ho!**\n\nÚloha č. 2\n\n**Vysvetlite na uvedených ukážkach pojmy **rytmus a sylabická prozódia.* Rozoberte osobitosti tvorby **Hugolína Gavloviča** a **Sama Chalupku**. **Porovnajte tému vlastenectva.**\n\nUkážky: *H. **Gavlovič** – Valaská škola mravov stodola*\n\n* S. Chalupka – Mor ho!*\n\n**Hugolín Gavlovič**: Valaská škola **mravúv** stodola  Velmi** je hlúpy, **kdo vlast svú** tupí**\n\nSladký je chren červíčkovi, když se v nem uláhne,\n\na jak z neho kdy vyleze, zas se k nemu táhne.\n\nSladká je vlast človekovi, v kterej se narodí,\n\nkterú sladkost v človekovi prirodzenost plodí.\n\nBlázen je, kdo pred jinými vlast svú potupuje,\n\ns potupením svojej vlasti cudzú vychvaluje.\n\nKdo vlast svoju potupuje, i sám seba haní,\n\nnevdečný je, kdo uctivost svej matky nebrání.\n\nKdyž je vlast v neuctivosti, i ten bez cti bývá,\n\nkterý v neuctivej vlasti narodzení mívá.\n\nA tým vetšé pro nevdečnost potupení získá,\n\njak nálezky, cudzé mravy do svej vlasti vtíská.\n\n**Samo Chalupka: Mor ho! (úryvok)**\n\nZleteli orli z Tatry, tiahnu na podolia,\n\nponad vysoké hory, ponad rovné polia;\n\npreleteli cez Dunaj, cez tú šíru vodu,\n\nsadli tam za pomedzím slovenského rodu.\n\nDuní Dunaj a luna za lunou sa valí;\n\nnad ním svieti pevný hrad na vysokom bralí.\n\nPod tým hradom Riman-cár zastal si táborom:\n\nbelia sa rady šiatrov ďalekým priestorom.\n\nPokraj tábora sedí cár na zlatom stolci,\n\nokol neho cárska stráž, tuhí to paholci,\n\na pred cárom družina neveliká stojí:\n\nsú to cudzí víťazi, každý v jasnej zbroji.\n\nPobelavé kaderie šije im otáča,\n\nmodré oči ich bystro v okolo si páča.\n\nRastom sú ako jedle, pevní - ani skala:\n\nzdalo by sa ti, že ich jedna mater mala.\n\nKrásna zem -jej končiny valný Dunaj vlaží\n\na Tatra skalnou hradbou okol nej sa väzí:\n\ntá zem, tie pyšné hory, tie žírne moravy:\n\nto vlasť ich, to kolíska dávna synov slávy.\n\nSlovenský rod ich poslal, zo slávneho snemu,\n\naby išli s pozdravom k cárovi rímskemu.\n\nOni čelom nebijú, do nôh nepadajú:\n\ntaká otroč neznáma slovenskému kraju.\n\n.......\n\nNo zahyň, studom večným zahyň, podlá duša,\n\nčo o slobodu dobrý ľud môj mi pokúša.\n\nLež večné meno toho nech ovenčí sláva,\n\nkto seba v obeť svätú za svoj národ dáva.\n\nA ty, mor ho! – hoj, mor ho! detvo môjho rodu,\n\nkto kradmou rukou siahne na tvoju slobodu;\n\na čo i tam dušu dáš v tom boji divokom:\n\nmor ty len, a voľ nebyť, ako byť otrokom.","supplementary":[{"question":"Vyjadrite sa k citátom o komunikácii","answer":"**a) „Bez komunikovania o komunikovaní by sme nemohli rozumne komunikovať.\"**\n\nTento citát upozorňuje na metakomunikáciu - rozprávanie o tom, ako rozprávame. Ak chceme byť dobrí komunikátori, musíme vedieť reflektovať vlastnú komunikáciu: či sme zrozumiteľní, či nás partner chápe, či nedochádza k nedorozumeniu. Bez tejto schopnosti by sme robili stále tie isté chyby a nedokázali by sme komunikáciu zlepšiť.\n\n**b) „Dialóg je umenie.\"**\n\nDialóg nie je len výmena slov - je to umenie, lebo si vyžaduje:\n- aktívne počúvanie partnera (nielen čakanie na svoju repliku)\n- empatiu - vciťovanie sa do druhého\n- schopnosť reagovať primerane\n- jasné a stručné vyjadrovanie myšlienok\n- ovládanie emócií\n- rešpekt voči odlišnému názoru\n\nSkutočný dialóg vedie k vzájomnému porozumeniu a obohateniu, nie k víťazstvu jedného nad druhým."},{"question":"Ako zareagujete na kritiku rodiča","answer":"**Kritika rodiča:** „Ak budeš takto ďalej žiť, môžeš ochorieť.\"\n\nTypy odpovedí:\n\n**a) „Máš pravdu, musím s tým niečo robiť.\"** - Toto je **asertívna odpoveď** s prijatím spätnej väzby. Reagujem konštruktívne, priznám si chybu, zaviažem sa k zmene. Komunikácia pokračuje pozitívnym smerom.\n\n**b) „Prečo, nerozumiem, čo sa ti nepáči?\"** - Toto je **otvorená otázka**, požiadanie o konkretizáciu. Je to dobrá technika asertívnej komunikácie - **otvorené dvere** alebo **negatívne pýtanie**. Núti kritika upresniť výhrady a vyhýba sa hádke.\n\n**c) „Ešte niečo ti prekáža?\"** - Tu ide o **negatívne pýtanie sa** - vedome pozývam ďalšiu kritiku. Tým odzbrojím kritika, ukážem že nie som v defenzíve a som ochotný počúvať.\n\nVšetky tri odpovede sú asertívne (nie agresívne ani pasívne), líšia sa však mierou prijatia kritiky."},{"question":"Rozoberte formy komunikácie v skladbe Mor ho!","answer":"V skladbe Mor ho! sa nachádza niekoľko foriem komunikácie:\n\n**Dialóg medzi cárom a slovenskými poslami:**\n- Slovenskí junáci prichádzajú s **pozdravom mieru** - ide o pokus o diplomatickú, asertívnu komunikáciu.\n- Cár ich pozdrav odmieta a oznamuje, že si národ zotročí - to je **agresívna komunikácia**, devalvujúca, pohŕdavá.\n- Komunikácia končí neúspechom, lebo cár nerešpektuje rovnocenného partnera.\n\n**Monológ rozprávača (autora):**\n- Vlastenecký, hrdinský pátos.\n- Adresovaný čitateľovi - **apel**, výzva, varovanie.\n- Záverečné „Mor ho!\" je **direktívna výzva** - rozkaz do boja.\n\n**Symbolická komunikácia:**\n- Junáci nesklonia hlavu, nepadajú do nôh - to je **neverbálna komunikácia**, ktorou ukazujú hrdosť a rovnosť.\n- „Pobelavé kaderie\", „modré oči\" - vizuálna komunikácia ich slovanskej identity.\n\n**Funkcie komunikácie v skladbe:**\n- estetická (poetická)\n- výzvová (apelatívna) - „Mor ho!\"\n- vlastenecká (referenčná) - sprostredkováva myšlienku slobody"}]},"2":{"tema_jazyk":"Členenie slovnej zásoby (štylistické)","tema_lit":"Žánre ľudovej slovesnosti","autori":["Janko Kráľ","Ján Botto"],"diela":["Zakliata panna vo Váhu a divný Janko","Smrť Jánošíkova"],"okruh_jazyk":"Lexikológia","okruh_lit":"Romantizmus, ľudová slovesnosť","full":"Úloha č. 1\n\n**Vysvetlite členenie slovnej zásoby zo štylistického hľadiska – bezpríznakové slová, príznakové slová** (podľa obsahu, pôvodu, spisovnosti, doby používania a expresívnosti).\n\n**Štylisticky bezpríznakové** (neutrálne)** slová- **nazývame ich aj neutrálne slová. Vyjadrujú iba vecný, logický význam slova. Možno ich použiť v ktoromkoľvek jazykovom štýle. Tieto slová patria do jadra slovnej zásoby. Patria tu napr.: koberec, dom písať, hore, desať, mama, pes, Anna, Peter, voz, hus, lúka, kvet, a pod.\n\n**Štylisticky príznakové (zafarbené) slová- sú také slová, pri ktorých si uvedomujeme ich viazanosť s určitým typom textov (napr. **kancelarizmy** s administratívnymi textami; **termíny** s náučnými textami; **publicizmy** s publicistickými textami a pod.). V týchto „domovských textoch“ pôsobia ako bezpríznakové (neutrálne) slová. Ak ich však použijeme v iných typoch textov (napr. **termín** v hovorovom štýle; **slangové slovo** v náučnom štýle, a pod.) pôsobia v nich „cudzorodo“, pútajú na seba pozornosť, a preto hovoríme, že získali **príznak **(osobitý znak, špecifické zafarbenie daného slova). Rozdelenie:\n\n- **členenie podľa obsahu (významu):**\n\n- **termíny (odborné názvy)**- **sú jednoslovné, alebo viacslovné pomenovania, ktoré nám umožňujú vyjadrovať sa presne a jednoznačne. Využívajú sa najmä v náučných textoch. **Napr.:** svietiplyn, morféma, poniklec jarný, medveď hnedý, kyselina chlorovodíková, a pod. **Patria tu aj: kancelarizmy (typické slová administratívnych textov- napr. splatnosť, pohľadávka, faktúra, cestovný príkaz, a pod.); **publicizmy **(slová, ktoré sú typické pre publicistické texty- napr. iniciatíva, atentát, terorizmus, obnova, lukratívny, a pod.)\n\n- **hovorové slová- **sú tie, ktoré používame v súkromnom prejave, sú neoddeliteľnou súčasťou hovorových textov. **Napr.:** futro, žúrovať, tlčhuba, panelák, frfľať, starký, diplomovka, autiak, učka, fajn, zlatko, a pod.\n\n- **knižné slová- **sa nezvyknú požívať v ústnej podobe, nachádzame ich predovštkým v písomných textoch. **Napr.:** milota, prýštiť, riava, slovutvorný, a pod. Mnohé z nich sú **cudzieho pôvodu**- napr. decentný, letargia a pod. Časť z nich hodnotíme ako **poetizmy (básnické slová)- **napr. krásnota, deva, luna, a pod.\n\n- **členenie podľa pôvodu:**\n\n- **domáce slová- **majú domáci pôvod. Väčšina z nich sa môže použiť vo všetkých textoch. **Napr.: zbojník, noha, kniha, a pod.\n\n- **cudzie slová-** sú slová, ktoré sa preberali a aj v súčasnosti preberajú z cudzích jazykov. V slovnej zásobe slovenčiny sa nachádzajú slová asi z 30 jazykov- v minulosti išlo najmä o latinské slová, dnes sú to slová anglické. Používajú sa najmä v náučných textoch. Delia sa na: **zdomácnené- **už ich nepociťujeme ako cudzie (napr. rádio, televízor, meter, uniforma, niektoré nespisovné- vercajk, gang, bačkory, vulgárne slová, a pod.); **medzinárodné slová (internacionalizmy)**- vyskytujú sa vo viacerých (aspoň troch) jazykoch, pomenúvajú javy z oblasti politiky, kultúry, vedy, a pod. Uľahčujú medzinárodné dorozumievanie sa (napr. kardiochirurgia, aliancia, terorizmus, a pod.)\n\n- **členenie podľa spisovnosti:**\n\n- **spisovné slová**- **patria do slovnej zásoby spisovného jazyka a sú kodifikované v normatívnych príručkách. Väčšina z nich sa dá použiť vo všetkých typoch textov.\n\n- **nespisovné slová-** sú slová, ktorých použitie je obmedzené len na veľmi úzky okruh textov (napr. súkromný rozhovor, zvada, slangový prejav, a pod.). Zaraďujeme tu:\n\n- **nárečové slová (dialektizmy)- **napr. švábka, grule, bandurky, a pod.\n\n- **slangové slová-** nespisovné slová, ktoré vznikajú často deformáciou známych slov, používa ich istá spoločenská vrstva, alebo záujmová skupina. Ide o osobité, neštandardné vyjadrovanie sa. Poznáme viacero druhov slangov- napr. mládežnícky, študentský, vojenský, a pod. **Napr.: fáro**- auto; **dostať **zaracha**- niečo mať zakázané; **kilo**- sto korún (€); **seknúť s niečím**- nechať to tak, a pod.\n\n- **profesionalizmy-** nespisovné slová, používané v istej profesii. Slúžia na rýchle a úsporné vyjadrovanie sa.** Napr.: operačka**- operačná sála; **zubárina**- **zubné lekárstvo; **deckár**- odborný detský lekár, a pod. Mnohé sa postupne včleňujú do spisovnej slovnej zásoby, ako napr. stavbár, slovenčinár, a pod.\n\n- **argot- **tajná šifrovaná reč, v ktorej sa známe slová používajú v kontexte, ktorému nezasvätený človek nerozumie. Používajú ju rôzne asociálne skupiny. **Napr.:** blcha- **stopa po injekčnej striekačke; **televízor- **dorozumievanie sa z okna do okna vo väznici; a pod.\n\n- **členenie podľa doby používania (dobovosti):**\n\n- **neologizmy**- **sú novovzniknuté slová, alebo spojenia slov. Vyžaduje si ich spoločenský vývoj. Vznikajú najmä pre potreby náučných, administratívnych a publicistických textov. **Napr.:** mobilný telefón, privatizácia, snoubording, rogalo, hamburger, a pod. Často sú to slová prebraté z cudzích jazykov- v súčasnosti najmä z angličtiny.\n\n- **príležitostné slová (**okazionalizmy**)- **sú slová používané príležitostne. Tieto slová vznikajú s aktuálnym textom- „žijú“ pre jeden konkrétny prípad podmienený aktuálnym kontextom. Využívajú sa najmä v umeleckých a hovorových textoch. **Napr.: sladkoústa dievčina, chrumkavý človek, rešpektuchtivý, topankáreň, a pod.\n\n- **zastarané slová- **sú slová, alebo slovné spojenia, ktoré sa už dnes nepoužívajú, dostali sa na okraj slovnej zásoby. Rozdeľujú sa na:\n\n- **archaizmy- sú slová, ktoré už bežne nepoužívame, pretože v procese vývinu jazyka sa začali častejšie využívať iné, novšie slová (ich synonymá). Používajú sa najmä v umeleckých textoch, kde slúžia na zdôraznenie starých čias. **Napr.: sklep- **obchod; **švec**- obuvník; **árešt**- väznica; **letá **(roky), a pod.\n\n- **historizmy- sú slová, ktoré kedysi pomenúvali hlavne predmety, povolania, a pod., ktoré už dnes neexistujú, a preto v súčasnej slovenčine nemajú synonymá. Nachádzajú sa v dielach s historickou tematikou, alebo odborných textoch. **Napr.: dráb, hajdúch, vicišpán, dereš, slúžny, groš, zlatka, felčiar, a pod.\n\n- **členenie podľa expresívnosti:**\n\n- **kladný postoj:**\n\n- **zdrobneniny (deminutíva)- **sú expresívne slová, alebo slovné spojenia, ktorými podávateľ vyjadruje svoj pozitívny, alebo lichotivý vzťah k pomenúvanej realite, pomenúvajú sa nimi drobné veci. **Napr.: očká, noštek, mačička, psíček, zlatučký, človiečik, chlebík, a pod.\n\n- **eufemizmy- **sú expresívne slová, alebo slovné spojenia, použitím ktorých podávateľ zjemňuje, zmierňuje svoj prejav. **Napr.:** zaspať- **namiesto zomrieť; **mať dobrú náladu- **namiesto byť opitý; **nehovorí pravdu- **namiesto klame; **byť pri tele- **namiesto byť tlstý; a pod.\n\n- **hypokoristiká- **sú lichotivé slová s príznakom maznavosti. Používajú sa hlavne v súkromných prejavoch. **Napr.: mamka, ocinko, holúbok, a pod.\n\n- **záporný postoj:**\n\n- **pejoratíva**- **sú hanlivé expresívne slová, ktorými sa vyjadruje záporný, alebo odsudzujúci postoj. **Napr.: žbrnda, pisárik, držgroš, pracháč, a pod.\n\n- **augmentatíva- **sú opakom deminutív, teda sú to expresívne slová, ktorými zveličujeme základný význam. **Napr.: hlavisko, psisko, dlhočizný, očiská, nosisko, a pod.\n\n- **dysfemizmy**- **sú opakom eufemizmov. Sú príbuzné s pejoratívami, ale pri nich ide o zveličované, nadsadené, zdôrazňovanie zápornej vlastnosti, alebo nedostatku, hrubé a drsné vyjadrovanie sa.** Napr.:** ožran (pijan), chajda (dom), hnát (noha), ty teľa, ty zmija, ty hyena, a pod.\n\n- **vulgarizmy-** sú hrubé neslušné výrazy, s výrazne negatívnym nábojom, ktorým sa treba vyhýbať. Ich použitie je v rozpore s etikou spoločenského správania.\n\n**Zaraďte slová podľa štylistického príznaku: **snežienka jarná, morféma, faktúra, cestovný príkaz, **editoriál**, milota, deva, **švábka**, **fáro**, mať **zaracha**, **zubárina**, **deckár**, groš, zeman, šuster, e-mail, softvér, mamička a ocinko, držgroš, pracháč, psisko, psíček.*\n\n**snežienka jarná-** termíny (odborné názvy)\n\n**morféma- **termíny (odborné názvy)\n\n**faktúra- **termíny (odborné názvy)- kancelarizmy\n\n**cestovný príkaz- **termíny (odborné názvy)- kancelarizmy\n\n**editoriál**- **knižné slová\n\n**milota- knižné slová\n\n**deva- **knižné slová- poetizmy\n\n**švábka**- nespisovné slová- nárečové slová (dialektizmy)\n\n**fáro**- **nespisovné slová- slangové slová\n\n**mať **zaracha**- **nespisovné slová- slangové slová\n\n**zubárina**- **nespisovné slová- profesionalizmy\n\n**deckár**- **nespisovné slová- profesionalizmy\n\n**groš- **zastarané slová- historizmy\n\n**zeman- **zastarané slová- historizmy\n\n**šuster- **zastarané slová- archaizmy\n\n**e-mail- **neologizmy\n\n**softvér- **neologizmy\n\n**mamička a ocinko- **expresívne slová- kladný postoj- hypokoristiká\n\n**držgroš- **expresívne slová- záporný postoj- pejoratíva\n\n**pracháč**- **expresívne slová- záporný postoj- pejoratíva\n\n**psisko**- **expresívne slová- záporný postoj- augmentatíva\n\n**psíček**- **expresívne slová- kladný postoj- zdrobneniny (deminutíva)\n\n**Nájdite päť príznakových slov v prvej  ukážke Zakliata panna vo Váhu a vysvetlite význam ich použitia. **\n\nmamička, pesnička, synček, šantuvať, múrik\n\nÚloha č. 2\n\n**Vymenujte žánre **ľudovej slovesnosti**. Nájdite znaky ľudovej slovesnosti v dielach: **Zakliata panna vo váhu a divný Janko a Smrť Jánošíkova**. Žánre ľudovej slovesnosti:**\n\n- **rodinný obradový folklór- **svadobné piesne, pohrebné vykladania nad mŕtvym, krstové piesne, a pod. Zaraďujeme tu aj zariekania a zaklínadlá.\n\n- **kalendárny obradový folklór- **koledy, morény, a pod.\n\n- **ľudové piesne: 1. **historické piesne- **zobrazujú významné udalosti spoločenských dejín, alebo historické postavy, ktoré zohrali v dejinách dôležitú úlohu.\n\n**2. **regrútske a vojenské piesne 3. **ľúbostné piesne 4. **pracovné piesne- **pastierske a valašské piesne, trávnice, banícke a hutnícke piesne.\n\n- **balady- **ľudové a umelé\n\n- **kratšie epické žánre:**\n\n- **príslovia- **ustálené slovné spojenia, ktoré majú konštrukciu vety, prípadne súvetia a prinášajú mravné ponaučenie. („Komu sa nelení, tomu sa zelení.“, „Kto je skúpy, ten je i hlúpy.“, „Všade dobre, doma najlepšie.“, „Jedna lastovička leto nerobí.“, „Pod lampou býva najväčšia tma.“, a pod.)\n\n- **porekadlá- **sú obrazným pomenovaním, sú podobné, ale nevyplýva z nich ponaučenie. („Aká matka, taká Katka.“, „Akoby hrach na stenu hádzal.“, „Dostal sa z blata do kouže.“, a pod.)\n\n- **pranostiky-** ustálené slovné spojenia, ktorí predstavujú ľudové skúsenosti z dlhodobého pozorovania prírodných javov. („Na hromnice o hodinu více.“, „Katarína na ľade, Vianoce na blate.“, „Studený máj, v stodole raj.“, a pod.)\n\n- **hádanky**\n\n- **dlhšie epické žánre:**\n\n- **ľudové rozprávky- **sú najznámejšie zo všetkých foriem ľudového rozprávania, zakladajú sa na vymyslenom príbehu a na boji dobra so zlom. Vystupujú tu nadprirodzené postavy, nachádzajú sa tú magické čísla, a pod.ň\n\n- **ľudové povesti- **viažu sa na konkrétne historické udalosti, postavy, alebo miesta (zámky, rieky, pohoria,...)\n\n**Znaky ľudovej slovesnosti: Janko Kráľ: Zakliata panna vo Váhu a divný Janko - **čerpá z ľudovej slovesnosti\n\n- rozprávkové motívy (zakliata panna, strigy, a pod.)\n\n- využíva množstvo zdrobnenín\n\n- združený rým\n\n**Znaky ľudovej slovesnosti: Ján **Botto**: Smrť Jánošíková - **využíva zdrobneniny a magické čísla („zbíjal som ja, zbíjal, sedem rôčkov v lete.“)\n\n- združený rým\n\n- rozprávkové prvky (napr. Jánošíkov opasok- dával mu silu)\n\n**Uveďte ďalšie spracovanie jánošíkovskej a junáckej tematiky v slovenskej literatúre.**\n\n- ľudové piesne a príbehy s Jánošíkovskou a junáckou tematikou majú spoločné idealizovanie prvkov, magické deje a predmety, silných hrdinov (Jánošík, junáci,...)\n\n- Jánošíkovská tematika- zachytáva len život konkrétneho zbojníka na základe povestí a príbehov, ktoré sa o ňom zachovali (zakladá sa na pravde, pretože Jánošík existoval).\n\n- junácka tematika- pojednáva o akomkoľvek junákovi/ družine (nemusí sa zakladať na pravde- postavy môžu byť vymyslené).\n\n- Samo Chalupka: Mor ho! (junácka tematika); Samo Chalupka: Likavský väzeň (Jánošíkovská tematika); Janko Kráľ: Výlomky z Jánošíka (Jánošíkovská tematika)","number":2,"assignment":"**Zadanie č. 2**\n\nÚloha č. 1\n\n**Vysvetlite členenie slovnej zásoby zo štylistického hľadiska – bezpríznakové slová, príznakové slová** (podľa obsahu, pôvodu, spisovnosti, doby používania a expresívnosti).\n\n**Zaraďte slová podľa štylistického príznaku: **snežienka jarná, morféma, faktúra, cestovný príkaz, **editoriál**, milota, deva, **švábka**, **fáro**, mať **zaracha**, **zubárina**, **deckár**, groš, zeman, šuster, e-mail, softvér, mamička a ocinko, držgroš, pracháč, psisko, psíček.*\n\n**Nájdite päť príznakových slov v prvej  ukážke Zakliata panna vo Váhu a vysvetlite význam ich použitia. **\n\nÚloha č. 2\n\n**Vymenujte žánre **ľudovej slovesnosti**. Nájdite znaky ľudovej slovesnosti v dielach: **Zakliata panna vo váhu a divný Janko a Smrť Jánošíkova**. Uveďte ďalšie spracovanie jánošíkovskej a junáckej tematiky v slovenskej literatúre.**\n\nUkážky: * J. Kráľ – Zakliata panna vo Váhu a divný Janko*\n\n* J. **Botto** – Smrť Jánošíkova*\n\n**Janko Kráľ: Zakliata panna vo Váhu a divný Janko (úryvok)**\n\nČi znáte ten tichý kraj, kde večer mamičku\n\ndeti prosia o jednu národnú pesničku,\n\nlebo o dáku hádku a o dáku povesť;\n\nže nebudú radšej, vraj, na ráno pýtať jesť,\n\nže nebudú záškodné, nebudú šantuvať,\n\nže budú mamičku napotom počúvať,\n\naby len povedala – deti, chlapci všetci,\n\nna múrik vyskákajú tam okolo peci,\n\nmamička medzi nimi pradúc im rozpráva;\n\na aby boli dobré, naučenie dáva...\n\n.............\n\nSynček je veľmi divný, nikdy nie veselý,\n\nhrdý, ukrutný, divý, hockde ta ísť smelý;\n\nnikoho si neváži, nikomu nedvojí,\n\nv ľuďoch lásky nehľadá, hnevu sa nebojí;\n\n**Ján **Botto**: Smrť Jánošíkova (úryvok)**\n\nHorí ohník, horí na Kráľovej holi.\n\nKtože ho nakládol? – dvanásti sokoli.\n\nDvanásti sokoli, sokolovia bieli,\n\nakých ľudské oči viacej nevideli!\n\nDvanásti sokoli, sokolovia Tatier,\n\nakoby ich bola mala jedna mater;\n\n.....\n\nZvonia na deň – mne na noc. Oj, srdce nežiali:\n\nmy skoro spať musíme, bo sme skoro vstali!\n\nSpať večne – kto to káže? Boh? – ľudia, tyrani!\n\nZ polcesty, z sveta môjho, ja ľuďmi vyhnaný!\n\nOj, ľudia, ľúti ľudia, vy draví šakali!\n\nbrať život! Skiaď to právo? – či ste ho vy dali?!\n\nĽudia – hej! Ľuďmi radi menujú sa oni,\n\ntí, čo ľudské i božské šliapajú zákony.\n\nZákon je len jeden u nich, jeden zákon vlčí;\n\nprávo v putách – a pravda na hraniciach blčí.\n\nNo príde i prísť musí ten bohatier Boží,\n\nčo zákon pošliapaný na oltár vyloží;\n\nno príde i prísť musí ten veľký deň súdu –\n\na za stôl si zasadne pravda môjho ľudu!\n\n .....\n\nZomrieť, tak výrok – dobre, ja chodil po zboji;\n\nale kto viacej zbíjal, ja, či kati moji?!\n\nJa chodil po zboji, po tom šírom poli,\n\naby som zabudol o ťažkej nevoli,\n\nja chodil po zboji poľanou bezdrahou,\n\naby som naučil pravde pyšných vrahov;\n\nja chodil po zboji, za slobodou zlatou,\n\naby som rozrážal putá svojich bratov.\n\nSloboda, sloboda, slobodienka moja,\n\npre teba mne páni šibenice stroja!"},"3":{"tema_jazyk":"Morfológia - ohybné slovné druhy (podst.m., príd.m., zámená)","tema_lit":"Realistická poviedka","autori":["Martin Kukučín","Jozef Gregor Tajovský"],"diela":["Keď báčik z Chochoľova umrie","Maco Mlieč","Mamka Pôstková"],"okruh_jazyk":"Morfológia","okruh_lit":"Realizmus","full":"Úloha č. 1\n\n**Vysvetlite, čo skúma morfológia, ako rozdeľujeme slovné druhy. Charakterizujte podstatné mená, prídavné mená a zámená. Morfológia- **je jazykovedná disciplína zaoberajúca sa gramatickými tvarmi, slovnými druhmi, gramatickými kategóriami a tvarotvornými postupmi.\n\n**Rozdelenie slovných druhov:**\n\n- **plnovýznamové:**\n\n- podstatné mená (substantíva)\n\n- prídavné mená (adjektíva)\n\n- zámená (pronominá)\n\n- číslovky (numerália)\n\n- slovesá (verbá)\n\n- príslovky (adverbiá)\n\n- **neplnovýznamové:**\n\n- predložky (prepozície)\n\n- spojky (konjunkcie)\n\n- častice (partikuly)\n\n- citoslovcia (interjekcie)\n\n- **majú **vetnočlenskú** platnosť:**\n\n- podstatné mená (substantíva)\n\n- prídavné mená (adjektíva)\n\n- zámená (pronominá)\n\n- číslovky (numerália)\n\n- slovesá (verbá)\n\n- príslovky (adverbiá)\n\n- **nemajú **vetnočlenskú** platnosť:**\n\n- predložky (prepozície)\n\n- spojky (konjunkcie)\n\n- častice (partikuly)\n\n- citoslovcia (interjekcie)\n\n- **ohybné:**\n\n- podstatné mená (substantíva)- skloňujú sa\n\n- prídavné mená (adjektíva)- skloňujú sa\n\n- zámená (pronominá)- skloňujú sa\n\n- číslovky (numerália)- skloňujú sa\n\n- slovesá (verbá)- časujú sa\n\n- **neohybné:**\n\n- príslovky (adverbiá)\n\n- predložky (prepozície)\n\n- spojky (konjunkcie)\n\n- častice (partikuly)\n\n- citoslovcia (interjekcie)\n\n**Podstatné mená (substantíva) -** pomenúvajú osoby, zvieratá, veci, vlastnosti deje a stavy\n\n- vo vete najčastejšie plnia funkciu podmetu a predmetu\n\n- plnovýznamový, ohybný (skloňujeme ich) slovný druh, majú vetnočlenskú platnosť\n\n- **konkrétne** (žena, stôl, a pod.); **abstraktné** (nádej, žiaľ, a pod.)\n\n- **všeobecné** (dom, pero, a pod.); **vlastné **(Ondrej, Bytča, a pod.)\n\n- **rody**:** mužský (určujeme aj životnosť); ženský, stredný\n\n- **číslo: **jednotné **(singulár)- iba jednotné číslo majú hromadné podstatné mená (napr. ľudstvo, a pod.), látkové podstatné mená (napr. benzín, a pod.), abstraktné podstatné mená (napr. radosť, a pod.); **množné **(plurál)\n\n- **pády: Nominatív, Genitív, Datív, Akuzatív, Lokál, Inštrumentál\n\n- **vzory: **\n\n- **mužský rod:** chlap, hrdina, dub, stroj, kuli\n\n- **ženský rod:** žena, ulica, dlaň, kosť, gazdiná\n\n- **stredný rod:** mesto, srdce, vysvedčenie, dievča\n\n**Prídavné mená (adjektíva)**\n\n- vyjadrujú vlastnosti podstatných mien alebo spresňuj, či inak vymedzujú ich význam\n\n- vo vete najčastejšie plnia funkciu zhodného prívlastku, ale môžu byť aj doplnkom, či mennou časťou prísudku\n\n- plnovýznamový, ohybný (skloňujeme ich) slovný druh, majú vetnočlenskú platnosť\n\n- rozdelenie:\n\n- **vlastnostné:**\n\n- akostné- dajú sa stupňovať (napr. dobrý, múdry, a pod.)\n\n- vzťahové- nedajú sa stupňovať (napr. kovový, sobotný, a pod.)\n\n- **privlastňovacie: nedajú sa stupňovať (napr. synov, sestrina, líškin, a pod.)\n\n**- **stupňovanie:\n\n- **pravidelné: **pri skloňovaní sa nemení základ slova (napr. smelý, smelší, najsmelší)\n\n- **nepravidelné: **pri skloňovaní sa mení základ slova (napr. dobrý, zlý, pekný, veľký, malý)\n\n**- rody: **mužský (dobrý); ženský (dobrá); stredný (dobré)\n\n**-** číslo: **jednotné, množné\n\n**- pády: **Nominatív, Genitív, Datív, Akuzatív, Lokál, Inštrumentál\n\n**- vzory: pekný**/-á/-é; **cudzí**/-ia/-ie; **páví**/-ia/-ie; **otcov**/-a/-o\n\n**- **na základe zhody preberajú rod, číslo a pád nadradeného podstatného mena\n\n**Zámená (**pronominá**) -** zastupujú podstatné a prídavné mená, číslovky, či príslovky na ne odkazujú\n\n- vo vete môžu byť tými vetnými členmi, ako sú slová, ktoré zastupujú\n\n- plnovýznamový, ohybný (skloňujeme ich) slovný druh, majú vetnočlenskú platnosť\n\n- rozdelenie:\n\n- **osobné:**\n\n- **základné-** skloňujú sa (ja, ty, on, ona, ono, my, vy, oni, ony)\n\n- **privlastňovacie- sklonné (môj, tvoj, váš); nesklonné (jeho, jej, ich)\n\n- **zvratné:**\n\n- **základné- **seba, sa\n\n- **privlastňovacie- **svoj\n\n- **ukazovacie: **napr. ten, tá, to, tí, tie, tento, onen, oná, toľký, onaký, tam, a pod.\n\n- **opytovacie: **napr. kto, čo, aký, ktorý, čí, koľký, kedy, kde, ako, a pod.\n\n- **vymedzovacie: **napr. sám, samý, každý, ten istý, tenže, iný, nik, všetci, a pod.\n\n- **neurčité: **napr. dakto, niečo, voľajaký, ledačo, bársčo, ktosi, a pod.\n\n**- **rody:\n\n- **rodové zámená: **skloňujú sa podľa vzorov zámen, alebo prídavných mien\n\n- **bezrodové zámená: **nevyjadrujú gramatickú kategóriu rodu (napr. ja, ty, vy, my, sa, a pod.)- majú samostatné skloňovanie\n\n**-číslo: **jednotné, množné\n\n- **pády: **Nominatív, Genitív, Datív, Akuzatív, Lokál, Inštrumentál\n\n- **vzory:**\n\n- vzory prídavných mien\n\n- vzor môj\n\n- samostatné skloňovanie\n\n**Určite slovné druhy v prvej vete ukážky **Keď báčik z Chochoľova umrie**. Doplňte slovné druhy, ktoré chýbajú vo vete.**\n\nV ohrade stáli štyri jasene, hrubé, rovné ani svieca.\n\n**v- predložka, prvotná jednoduchá\n\n**ohrade-** podstatné meno, ženský rod, konkrétne, všeobecné, sg., L, vzor: žena\n\n**stáli-** sloveso, určité, 3. os. pl., minulý čas, oznamovací spôsob, činný rod,\n\n**štyri-** číslovka, základná určitá, mužský rod, neživ., pl., N, osobitné skloňovanie\n\n**jasene-** podstatné meno, mužský rod, neživ., konkrétne, všeobecné, pl., N, vzor: stroj\n\n**hrubé-** prídavné meno, mužský rod, vlastnostné akostné, pravidelné stupňovanie, pl., N, vzor: pekný\n\n**rovné-** prídavné meno, mužský rod, vlastnostné akostné, pravidelné stupňovanie, pl., N, vzor: pekný\n\n**ani- spojka, zlučovacia\n\n**svieca-** podstatné meno, ženský rod, konkrétne, všeobecné, sg., N, vzor: ulica\n\n**Chýbajúce slovné druhy: **zámená, príslovky, častice, citoslovcia\n\n**Vyhľadajte v ukážke minimálne **šesť podstatných mien a prídavných mien**. Podstatné mená: **ohrada, Ondrej, jasene, tvár, okamih, hanba\n\n**Prídavné mená: uradovaný, mŕtvych, pokrytá, veľký, svätý, živých\n\n**Nájdite v prvej ukážke - v predposlednom odseku **zámená** a určite ich druh.**\n\noni- osobné, základné\n\non- osobné, základné\n\njeho- osobné, privlastňovacie, nesklonné\n\nÚloha č. 2\n\n**Porovnajte osobitosti prozaickej tvorby Martina **Kukučína** a Jozefa Gregora Tajovského. Vysvetlite znaky poviedky v ukážkach, poukážte na ich významový plán. Poviedka- **patrí medzi malé žánre epiky, zachytáva jednu udalosť, málo postáv, charaktery postáv sa nevyvíjajú, menej dramatická a napínavá než novela.\n\n**Martin Kukučín: - **písal v období prvej vlny realizmu (opisný realizmus), písal poviedky (napr. Rysavá Jalovica, Neprebudený, Keď Báčik z Chochoľova umrie, a pod.), novely (Mladé letá), romány (Dom v strání), divadelné hry, cestopisy\n\n- zapojil sa do činnosti spolku Detvan\n\n- uviedol do literatúry ľudovú reč a ľudové postavy\n\n- vo svojich poviedkach sa sústredil najmä na vykreslenie povahy a osudov dedinských ľudí- zameral sa na pozorovanie a opis dedinských ľudí, zvykov a tradícii (dedinského človeka zobrazoval chápavým, láskavým humorom)\n\n**Martin Kukučín: Keď Báčik z Chochoľova umrie  Téma: **úpadok zemianstva\n\n**Miesto: oravské dediny- Kameňany, Chochoľovo, Domanice\n\n**Čas: 2. polovica 19. storočia\n\n**Hlavné postavy: **Aduš Domanický, Ondrej Tráva\n\n**Idea: odsudzuje zemanov, vedúcu silu vidí v rodiacej sa buržoázii\n\n**Názov:** fráza, na ktorú sa Aduš odvolával\n\n**Rozprávač:** vševediaci rozprávač, v 3. osobe\n\n**Kompozícia:** 6 častí\n\n**Literárny druh: epika\n\n**Literárny žáner: humoristicko- satirická poviedka\n\n**Jazyk:** jednoduchý jazyk s množstvom prirovnaní, využíva situačný humor, protiklad (Aduš, Ondrej)\n\n**Jazykové prostriedky:** epitetá **(malý domec, krvavé mozole, skrehnutá duša,...); **prirovnania **(rozloží sa tam sťa pahreba; premenlivé brehy, ako aprílový čas,...); **personifikácia **(každá žilka ihrá a kričí); **zdrobneniny **(vozíček, jabĺčka, ohník,...)\n\n**Jozef Gregor Tajovský: -** písal v druhej vlne realizmu (kritický realizmus), písal črty a poviedky (Apoliena, Maco Mlieč, Mamka Pôstková, a pod.), veselohra (Ženský zákon), jednoaktovky (Matka, Hriech)\n\n- zobrazil pravdivý obraz slovenskej dediny- chcel poukázať na osud najbiednejších ľudí, ktorí živorili a predsa boli naplnení bohatstvom ľudského citu\n\n- v čitateľovi chce vzbudiť súcit\n\n- útočí proti slovenskej pasivite, odnárodňovaniu, neochote prijať vzdelanie a kritizuje, ktorí si svoje nešťastie zapríčinili vlastnou vinou\n\n- nahrádza Kukučínovskú mäkkosť podania vlastnou prítomnosťou v rozprávaní\n\n- poviedky majú humoristické, niekedy ironické a najčastejšie tragické ladenie\n\n**Jozef Gregor Tajovský: Maco Mlieč Téma: **ťažký život chudobného človeka, ktorý sa nedokáže sám brániť\n\n**Miesto: **dedina\n\n**Čas: **19. storočie\n\n**Hlavné postavy: **Maco Mlieč, Gazda\n\n**Idea: **Poukazuje na vykorisťovanie, odsudzuje ho. Ukázal, že ľudia sa delia n pánov a chudobných. Vyzdvihuje Mliečove morálne vlastnosti a ľudskosť- sú v kontraste s jeho odpudzujúcim zvonkajškom.\n\n**Názov: **je hlavnou postavou, má súvis s rastlinou mlieč voľný (rýchlo sa rozširuje)\n\n**Rozprávač: **na začiatku autor v 1. osobe, potom v 3. osobe, nepriamy rozprávač\n\n**Literárny druh: **epika\n\n**Literárny žáner: **kriticko- realistická poviedka\n\n**Jozef Gregor Tajovský: Mamka **Pôstková Téma: **ťažký život mamky Pôstkovej, ktorá musí splácať dlh\n\n**Miesto:** dedina, banka\n\n**Čas:** 19. storočie\n\n**Hlavné postavy:** mamka Pôstková, bankár, manžel, syn mamky Pôstkovej\n\n**Idea:** autor vyzdvihuje čestnú, spravodlivú mamku Pôstkovú, jej neobyčajnú silu. Vyčíta Slovákom, že si takýchto ľudí nevážia.\n\n**Názov:** vyjadruje ťažký život mamka- pôst\n\n**Literárny druh:** epika\n\n**Literárny žáner:** sociálna poviedka\n\n**Rozprávač: **bankový úradník (Tajovský)","number":3,"assignment":"**Zadanie č. 3**\n\nÚloha č. 1\n\n**Vysvetlite, čo skúma morfológia, ako rozdeľujeme slovné druhy. Charakterizujte podstatné mená, prídavné mená a zámená. Určite slovné druhy v prvej vete ukážky **Keď báčik z Chochoľova umrie**. Doplňte slovné druhy, ktoré chýbajú vo vete. Vyhľadajte v ukážke minimálne **šesť podstatných mien a prídavných mien**.  Nájdite v prvej ukážke - v predposlednom odseku **zámená** a určite ich druh.**\n\nÚloha č. 2\n\n**Porovnajte osobitosti prozaickej tvorby Martina **Kukučína** a Jozefa Gregora Tajovského. Vysvetlite znaky poviedky v ukážkach, poukážte na ich významový plán.**\n\nUkážky: *M. Kukučín – Keď báčik z Chochoľova umrie*\n\n* J. G. Tajovský – Maco Mlieč, Mamka **Pôstková*\n\nMartin Kukučín: Keď báčik z Chochoľova umrie (úryvok)\n\nV ohrade stáli štyri jasene, hrubé, rovné ani svieca. Sám Ondrej musel sa priznať, že nevidel v svojom živote takých jaseňov. Desiatku boli hodny otcu-materi. V ohrade pod jaseňmi boli – hroby, štyri hroby. Ležali rad-radom, zanesené snehom. Nad prvými dvoma vypínal sa spoločný kamenný náhrobok.\n\n,,Pod týmto kameňom leží môj starý otec a stará mať,“ riekol pán Aduš vážne, zložiac klobúk. ,,Tuto zasa moji rodičia bez kameňa. Toto miesto si vyhliadol sám starý otec, ohradil i tieto jasene zasadil. Jasene sú nie moje. Nemôžem ich predať.“\n\n,,Tu je všetko vaše – jasene, alebo desiatka!“ riekol Ondrej, uradovaný, že teraz mu už neujde.\n\n„Ako to môžete žiadať? Mám vlastným rodičom olúpiť hroby! A báčik z Chochoľova tiež tu chce ležať pri svojej sestre...Ako by ja to urobil? Kde by mal svedomie?\n\n,,Keď môžete živých – mŕtvych tobôž. Im tých jaseňov netreba, ale mne desiatku treba.“\n\n,,Aspoň nech vedia, čo mali za syna. Nech sa oni zaň hanbia, keď on nemá hanby.“ Ondrej hovoril s hlbokým presvedčením. Jeho každé slovo nachádzalo tisíc ozvien v prázdnej duši Adušovej.\n\nPán Aduš pozrel na Ondreja. Pohľady sa im sňali. Ondrej bol dojatý. Nebolo v Ondrejovom pohľade stopy po hnevu, ani úsmevu, ani ľahkej mysle – bôľ sa v ňom zračil. Tvár pokrytá rumencom – nemohla vydržať cudzieho pohľadu – odvrátila sa. Ondrej sa ani nehýbal. Nevedel, čo sa deje, ale tušil, že je to veľký, svätý okamih.\n\n**Jozef Gregor Tajovský: Maco Mlieč (úryvok)**\n\nGazda mal už aspoň šesťdesiat rokov, lenže sa ten nedal s Macom ani porovnať. Bohatý, doprial si, nič nerobil, peši nevyšiel ani do poľa, nuž mal brucho ako súdok a tvár ako mesiac na splni, a na Macovi iba ohorená čierna chlpatá kožka na širokých kostiach, čaptavá noha a dokľavené prsty na rukách.\n\n,,A plácu že akú máte?“\n\n,,Peňazí?“\n\n,,Hej.“\n\n,,A len tak, čo potrebujem: na dohán, švíbalky a... A načože sú mi už teraz? Aj tak by som ich užiť nemohol. Ženy, deti nemám... A gazda sľúbil, že ma opatrí až do smrti, či budem vládať dačo robiť, alebo nie,“ s akousi hrdosťou odpovedal starý Mliečnik, že má také zásluhy.\n\n**...........**\n\nKonečne i richtárovi vypadli slzy a v svedomí bohvie čo si myslel, ale všetko dobré.\n\nBolo však už neskoro.\n\nMaca našli ráno studeného v telínci.\n\nGazda vystrojil mu krásny pohreb, s kňazom a odobierkou, na truhle bolo ešte naposledy spravodlivé meno Macovo, i kedy sa narodil a umrel, že richtára celá obec pochválila, len sluhovia si povrávali, že však ho mal za čo pochovať.\n\n**J. G. Tajovský: Mamka **Pôstková** (úryvok)**\n\nA pustila sa do plaču, že už mala korunu, raz i dve opatrovala, tajila ich, ale syn pýtal, druhý raz nevesta vydrankala, a čo raz stisla a nám odložila, vydriapali jej, silou vzali, že vy dočkáte... ,,Tak som prišla ohlásiť a doniesla som zas interes(úroky)...“ – kládla šesták.\n\n,,Ešte vám tamtých stačilo na roky. Teraz sú lacnejšie peniaze, ako boli,“ sotva som si stačil rýchlo spomenúť, že som pred dvoma rokmi na drobných dlžníkov prepísal jej tri koruny a zmenka je kdesi na dne kasy...\n\n,,Keď stačí... Ale už by to vari nemalo. Veď som šesták bola dala. Či ste sa nepomýlili v rátaní?“\n\n,,Nie, mamka, to je dobre vyrátané...“\n\n,,Len aby, prosím, do všechsviat došlo. Lebo tak sa mi stalo, ruku som si v jeseni zlomila, aha, tu za päsťou. Spadla som z pôjda, keď som si hábočky vešala. Starý človek, hlava sa točí, iba keď som sa našla v pitvore a ruka ako zvonec. Nemôžem na ňu a jednou rukou chlebíka nezamiesiš. Ale pôjdem do repy, nuž zarobím a vrátim vám. Len sa už nebojte. Kým žijem, ja zmenky nehodím. O statočnosť prísť na starosť? Ja už na to nemám svedomia. Keď bolo peniažky brať na zmenku, vtedy ,,prosím vás“, a teraz hodiť? Kým žijem, neopustím sa, a keď umriem, zostanú háby, perinka, truhla, posteľ, nech si predajú...“"},"4":{"tema_jazyk":"Slovotvorba","tema_lit":"Sylabicko-tonický verš, lyrika Hviezdoslava","autori":["P. O. Hviezdoslav","S. H. Vajanský"],"diela":["Mňa kedys' zvádzal svet","Krvavé sonety","Letorosty"],"okruh_jazyk":"Slovotvorba","okruh_lit":"Realizmus - lyrika","full":"Úloha č. 1\n\n**Charakterizujte **slovotvorné postupy, ktoré poznáme v slovenskom jazyku a vysvetlite ich na konkrétnych slovách. V odvodených slovách nájdite slovotvorný základ - * pripísať, redaktorka, pozemský, životopis, internetový, ZOH, **sitcom**, km,** darček, chlapisko, vlasatý, velikánsky, maličký, mňaukať, spinkať, atď. *\n\n**Slovotvorné postupy:**\n\n- **odvodzovanie**- zo základového slova pripojením slovotvorného formantu urobíme nové (odvodené slovo). **Napr.: prie-**beh; mút-**iť**; po-**zem-**ský**; **a pod.\n\n- **skladanie**- spojením dvoch (alebo viacerých) slovotvorných základov utvoríme nové slovo. **Napr.: zem-**e-**trasenie**; **živ**-o-**topis**; **na-**moj**-pravdu**; **hor**-o-**lezec**; **zem**-e-**pis**; **inter**-Ø-**net**; nos-o-hltan; zver-o-lekár a pod.\n\n- **kombinácia odvodzovania a skladania**- napr.: **život**-o-**pis**-ný; **nov**-o-**vek**-ý; **web**-Ø-**stránk**-ový; **cest**-o-**pis**-ný; ne-**každ**-o-**den**-ný; **geo**-Ø-**graf**-ia; a pod.\n\n- **skracovanie- **tvorenie nových slov zo skrátených častí skracovaných slov, pričom sa lexikálny význam skrátených slov nemení. Vznikajú takto:\n\n- **administratívne skratky- **resp., napr., str., a pod., a ďalšie. Píše sa za nimi vždy bodka, vyslovujú sa neskrátene.\n\n- **iniciálové skratky- **tvoria za s iniciál (prvých písmen) viacslovného názvu. **Napr.:** SR- **Slovenská republika, **LOH- **Letné olympijské hry, **SĽUK- **Slovenský ľuo´dový umelecký kolektív, a pod.\n\n- **skratkové slová- **vznikajú spojením začiatočných hlások, alebo slabík viacslovného názvu. **Napr.: sitcom**- **situačná komédia, **TANAP- **Tatranský národný park, a pod.\n\n- **ustálené značky- **napr.: km, dm, kg, l, a pod**. **Nikdy za nimi nepíšeme bodku, vyslovujú sa neskrátene.\n\n**pripísať- **odvodzovanie (slovný základ- písať)\n\n**redaktorka- **odvodzovanie (slovotvorný základ- redaktor)\n\n**pozemský- **odvodzovanie (slovotvorný základ- zem)\n\n**životopis- **skladanie (slovotvorné základy- živ, topis)\n\n**internetový- **kombinácia odvodzovania a skladania (slovotvorné základy- inter, net)\n\n**ZOH- skracovanie- iniciálové skratky (slovotvorný základ- Zimné olympijské hry)\n\n**sitcom**- skracovanie- skratkové slová (slovotvorný základ- situačná komédia)\n\n**km- skracovanie- ustálené značky (slovotvorný základ- kilometer)\n\n**darček- odvodzovanie (slovotvorný základ- dar)\n\n**chlapisko- odvodzovanie (slovotvorný základ- chlap)\n\n**vlasatý- odvodzovanie (slovotvorný základ- vlas)\n\n**velikánsky- odvodzovanie (slovotvorný základ- velikán)\n\n**maličký- odvodzovanie (slovotvorný základ- mal)\n\n**mňaukať- odvodzovanie (slovotvorný základ- mňau)\n\n**spinkať- odvodzovanie (slovotvorný základ- spin)\n\n**atď.- skracovanie- administratívne skratky (slovný základ- a tak ďalej)\n\n**Poukážte na osobitosti **slovnej zásoby** v tvorbe P. O. Hviezdoslava, príklady nájdite v ukážkach. P. O. Hviezdoslav **často vo svojich dielach skracuje slová, aby mohol dodržať stopy v sylabicko- tonickom veršovom systéme (napr. kedys’, var’, Bo,...)\n\nÚloha č. 2\n\n**Definujte sylabicko-tonický veršový systém**. **Charakterizujte druhy **lyriky a vysvetlite tematickú rôznorodosť v lyrike Pavla Országha Hviezdoslava**. * Sylabicko- tonický veršový systém:**\n\n- opiera sa o stopovú organizáciu veršov\n\n- dôležitá nie je dĺžka slabiky, ale jej prízvučnosť, resp. neprízvučnosť, teda slovný prízvuk\n\n- sylabicko- tonický veršový systém pozná 3 stopy:\n\n- trochej (prízvuk a neprízvuk)\n\n- jamb (naprízvuk a prízvuk)\n\n- daktyl (prízvuk, neprízvuk a neprízvuk)\n\n- podľa toho z akej stopy je verš tvorený rozlišujeme verše:\n\n- trochejské\n\n- daktylské\n\n- jambické\n\n- daktylotrochejské\n\n- tento veršový systém dosť narúša rytmicko- syntaktický paralelizmus, čoho dôkazom sú veršové presahy (veľmi časté)\n\n**Druhy lyriky:**\n\n- **podľa prístupu autora k téme:**\n\n- **náladová**- **vyjadruje citové rozpoloženie lyrického hrdinu\n\n- **opisná**- **opisuje javy, udalosti očami lyrického hrdinu\n\n- **úvahová**- **vyjadruje úvahu lyrického hrdinu nad istým problémom, javom\n\n- **podľa tematiky:**\n\n- **intímna**- **vyjadruje pocity, city lyrického hrdinu, jeho vnútorný svet. Najčastejšími témami sú láska, radosť, smútok,...\n\n- **prírodná**- **vyjadruje pocity, city lyrického hrdinu, ktorí vznikli pod silným vplyvom prírody\n\n- **spoločenská**- **vyjadruje pocity, city lyrického hrdinu vo vzťahu k celej spoločnosti, pocity, city vyvolané sociálnymi príčinami (sociálny útlak, ekonomické problémy,...)\n\n**Pavol Országh Hviezdoslav- lyrická tvorba: Sonety-** 21 básní, rieši zmysel života\n\n**Letorosty** 1 Letorosty** 2-** osobný charakter- čierny rok pre Hviezdoslava\n\n**Letorosty** 3-** sociálny lyrika- chcel by byť víchrom, morom, sopkou\n\n**Prechádzky Jarou-** témou je príroda- miesto relaxu, odpočinku, inšpirácie\n\n**Prechádzky Letom-** vyzdvihuje poctivú prácu, odsudzuje zaháľačov („Zlodej, klamár, preč z pod nôh.“)\n\n**Stezky**, Dozvuky-** pochmúrne, vyrovnáva sa so svojou starobou\n\n**Krvavé sonety**- **podnetom** je jeho vlastná skúsenosť, **témou** je prvá svetová vojna, využíva sonet, **odsudzuj**e vojnu, za príčinou vojny vidí ľudskú sebeckosť\n\n**Prečítajte si ukážky a sformulujte svoju čitateľskú interpretáciu.**","number":4,"assignment":"**Zadanie č. 4**\n\nÚloha č. 1\n\n**Charakterizujte **slovotvorné postupy, ktoré poznáme v slovenskom jazyku a vysvetlite ich na konkrétnych slovách. V odvodených slovách nájdite slovotvorný základ - * pripísať, redaktorka, pozemský, životopis, internetový, ZOH, **sitcom**, km,** darček, chlapisko, vlasatý, velikánsky, maličký, mňaukať, spinkať, atď. *\n\n**Poukážte na osobitosti **slovnej zásoby** v tvorbe P. O. Hviezdoslava, príklady nájdite v ukážkach.**\n\nÚloha č. 2\n\n**Definujte sylabicko-tonický veršový systém**. **Charakterizujte druhy **lyriky a vysvetlite tematickú rôznorodosť v lyrike Pavla Országha Hviezdoslava**. * Prečítajte si ukážky a sformulujte svoju čitateľskú interpretáciu.**\n\nUkážky*: P. O. Hviezdoslav*\n\n* S. H. Vajanský*\n\n**P. O. Hviezdoslav: Mňa **kedyś** zvádzal svet (úryvok)**\n\nMňa kedys’ zvádzal svet, mi hovoriac:\nReč, ktorú z domu vieš, ó, jak je lichá!\njak biedny nástroj ona pre snem prác,\nčo žitím srdca sú a duchu pýcha…\nTak pohoď totú handru, odev vetchú,\ndo ktorej hriech je haliť pomysly;\nmáš krídla, známe, — no máš ich var’ k letku?\njak však, keď strapy tebou ovisly!? —\n\nÓ, mojej matky reč je krásota,\nje milota, je rozkoš, láska svätá;\nje, vidím, cítim, celok života,\nmôj pokrm dobrý, moja čaša zlatá\na moja odev, ktorej neviem ceny…\nBuď požehnaný, kto sa pohodil\nv tom so mnou, trvá pritom nepremenný;\nbuď kliaty, kto sa zaprel, odrodil…\n\n**Do lesa! Do lesa!**\n\nDo lesa! Do lesa!\nTam srdce zmôže sa,\nzotaví z choroby; do tesknej útroby,\nrán vrelých do plamu on vleje balzamu:\ni len sa prihlási bôľ, už ho zahasí.\n\nDo lesa! Do lesa,\nkde vládnu čudesá\nv kráľovstve bezslnia. Dušu mi naplnia\nhlbokým úkojom, vysokým pokojom;\ndnu vtiahne navždycky slávomier mystický.\n\n**Ó, mládež!**\n\nÓ, mládež, drž sa verne ideálu!\nBo keď sa spustíš vidiny,\nzapadneš v nížiny,\ni v svojej hrudi nájdeš iba skalu.\nJa nezachytil som ho cele,\nlen odrobinku… život súril už:\nno mám ho aspoň na nedele:\nraz v týždni blažený som muž!\n\n** Svetozár Hurban Vajanský: **Nôžka**\n\nStretol som vám mladú dámu,Okamžite odleteli\nzamyslený trošku,z jasných očiek hnevy,\noslepený krásou, stúpimvďačný úsmev zajasal sa\nna jej nežnú nôžku!z tvári mladej devy.\n\nVýkrik —! pardon moja — moja drahá,Vám ale však, moji milí,\nže sa chyba stala:poviem pravdu vcelku:\nnemohol som nôžku zbadať,mala moja vďačná dáma\ntak je ona… malá.Nôžku hodne veľkú.","supplementary":[{"question":"Definujte sylabicko-tonický veršový systém","answer":"**Sylabicko-tonický veršový systém** je veršový systém založený na **kombinácii dvoch princípov**:\n- **sylabický princíp** - rovnaký počet slabík vo verši\n- **tonický (prízvučný) princíp** - pravidelné striedanie prízvučných a neprízvučných slabík\n\n**Charakteristika:**\n- Rytmus vytvárajú **stopy** - pravidelne sa opakujúce jednotky prízvučných a neprízvučných slabík.\n- Najpoužívanejšie stopy:\n  - **trochej** (´∪) - prízvučná + neprízvučná (napr. „máma\")\n  - **jamb** (∪´) - neprízvučná + prízvučná\n  - **daktyl** (´∪∪) - prízvučná + dve neprízvučné\n- Na Slovensku zavedený **P. O. Hviezdoslavom** koncom 19. storočia (parnasizmus).\n- Nahradil starší **sylabický systém** (Štúrovci).\n\n**Príklad u Hviezdoslava:**\n„**Mňa** kedys´ **zvád**zal svet, mi **ho**voriac\" - striedanie prízvučných/neprízvučných slabík je pravidelné.\n\n**Rozdiel oproti sylabickému systému (Štúrovci):**\n- Sylabický: len rovnaký **počet slabík** (Mor ho! - 12 slabík vo verši)\n- Sylabicko-tonický: navyše **pravidelné striedanie prízvukov** - rytmus je vyrovnaný, „prísnejší\"."}]},"5":{"tema_jazyk":"Syntax - vetné sklady, modálnosť viet","tema_lit":"Novela (vs. poviedka)","autori":["Martin Kukučín","B. S. Timrava"],"diela":["Neprebudený","Ťapákovci"],"okruh_jazyk":"Syntax","okruh_lit":"Realizmus - novela","full":"Úloha č. 1\n\n**Vysvetlite, čo je to syntax, aké vetné sklady rozlišujeme a charakterizujte vety podľa modálnosti. Určite pestrosť viet z hľadiska modálnosti a priraďte vetám typ melódie: **Aké máme šance na úspech? Teraz by sa to malo vyjasniť. Koľko je hodín? Príde mama? Nech ste zdraví! Bodaj by sme boli zdraví. Nech žije kráľovná!!! Sústreď sa!!! *\n\n**Syntax-** je jazykovedná disciplína, ktorá sa zaoberá spájaním slov do viet. Spájaním viet do textov sa zaoberá **nadvetná** syntax**, resp. **textová syntax**.\n\n**Vetné sklady:**\n\n- **prisudzovací sklad- **je to spojenie podmetu a prísudku, tvorí gramatické jadro jednočlennej vety (napr. Janka spí, spevák spieva, a pod.)\n\n- **určovací sklad-** tvoria ho dav členy, z ktorých jeden je nadradený a druhý je podradený. Podradený člen bližšie určuje nadradený člen (napr. dobrý žiak, dievča z dediny, píše list, kreslí pekne, a pod.) Rozlišujeme:\n\n- slovesný určovací sklad:\n\n- sloveso a predmet- napr. písať list, dať priateľovi (radu), a pod.\n\n- sloveso a príslovkové určenie- napr. sedel vzadu, prišiel včera, a pod.\n\n- menný určovací sklad:\n\n- podstatné meno a zhodný prívlastok- napr. usilovná študentka, červený tulipán, a pod.\n\n- podstatné meno a nezhodný prívlastok- napr. ruža s tŕňom, kamarát zo školy, a pod.\n\n- podstatné meno, sloveso a doplnok- napr. Brat sa vrátil uplakaný. Petra sa cítila podvedená., a pod.\n\n- **priraďovací sklad- **je spojenie dvoch, alebo viacerých členov, ktoré sú syntakticky rovnocenné a majú zároveň rovnaký vzťah k inému (nadradenému/ podradenému) vetnému členu (napr. chlapci a dievčatá, pakne a rýchlo, poslušne a úctivo, a pod.)\n\n**Vety podľa modálnosti:**\n\n- **oznamovacia- **využíva oznamovací, alebo podmieňovací spôsob slovesa, melódia vety je klesavá\n\n- **rozkazovacia- **využíva rozkazovací spôsob slovesa, alebo neurčitok, melódia vety je klesavá\n\n- **opytovacia- **využíva oznamovací spôsob slovesa, opytovacie zámená, slovosled, častice, melódia vety je:\n\n- stúpavá- zisťovacia otázka (odpoveď- áno/ nie)\n\n- stúpavo-klesavá/ klesavá- doplňovacia otázka (odpoveď obsahuje doplnenie údaja)\n\n- **želacia- využíva oznamovací, alebo podmieňovací spôsob slovesa, melódia vety je stúpavo- klesavá\n\n***Aké máme šance na úspech?**- **opytovacia veta, klesavá melódia\n\n**Teraz by sa to malo vyjasniť.**- **oznamovacia veta, klesavá melódia\n\n**Koľko je hodín?**- **opytovacia veta, stúpavo- klesavá melódia\n\n**Príde mama?**- **opytovacia veta, stúpavá melódia\n\n**Nech ste zdraví!**- **želacia veta, stúpavo- klesavá melódia\n\n**Bodaj by sme boli zdraví.**- **želacia veta, stúpavo- klesavá melódia\n\n**Nech žije kráľovná!!!**- **žvolacia veta, stúpavo- klesavá melódia\n\n**Sústreď sa!!!**- *rozkazovacia veta, klesavá melódia\n\n**Nájdite v ukážkach všetky typy viet podľa modálnosti. Vysvetlite, ktoré z nich obsahujú emocionálnu štylistickú **príznakovosť**?**\n\nKroky zaznievali smerom k nemu.- oznamovacia veta\n\nTy, neutekaj!- rozkazovacia veta\n\nTu nie si ty pani!- zvolacia veta\n\nA si to ty, Zuzka?- opytovacia veta- zisťovacia\n\nA keď sa ti nepáči, načo si šla za Paľa?- opytovacia veta- doplňovacia\n\nÚloha č.2\n\n**Vysvetlite **znaky novely**, **poukážte na rozdiel medzi novelou a poviedkou /uveďte konkrétnu poviedku/. Vysvetlite na ukážkach **dejový a významový plán diela** a určite typ rozprávača. Znaky novely:**\n\n- epický žáner (stojí medzi poviedkou a románom)\n\n- stredný rozsah\n\n- presne vymedzená kompozícia bez väčších odklonov od ústrednej dejovej línie\n\n- dve a viac dejových línii\n\n- dej má rýchly spád a väčšinou sa končí prekvapivo a nečakane\n\n- málo postáv, počas deja neprechádzajú zmenami\n\n- predstavuje súbor niekoľkých udalostí zo života človeka, zachytáva určitý úsek jeho života\n\n- príbeh je jednoduchý, ale má napätie\n\n- príbeh sa odohráva v kratšom časovom rozpätí\n\n**Rozdiely medzi novelou a poviedkou:**\n\n- novela- stredný rozsah; poviedka- krátky epický útvar\n\n- novela- zachytáva súbor niekoľkých udalostí zo života človeka; poviedka: opisuje jednu udalosť zo života človeka\n\n- novela- má viac postáv ako poviedka\n\n- novela- väčšinou 2 a viac dejových línii; poviedka- jedna dejová línia\n\n**Poviedky: **Jozef Gregor Tajovský: Žliebky, Jozef Gregor Tajovský: Maco Mlieč, Martin Kukučín: Rysavá Jalovica, Martin Kukučín: Na Ondreja, a pod.\n\n**Martin Kukučín**: Neprebudený**\n\nDejový plán diela: Dielo zachytáva tragický osud Ondráša Machuľu- mentálne postihnutého husára. Končí tragicky, pri tom, ako chce zachrániť husi pred ohňom zo stodoly.\n\nVýznamový plán diela: Autor kritizuje myslenie, postoj dediny voči Ondrášovi, vyzdvihuje Ondráša, ako človeka.\n\nRozprávač: on- rozprávanie (3. os. sg.), vševediaci rozprávač.\n\n**Božena **Slančíková** Timrava: **Ťapákovci**\n\nDejový plán diela: Dielo zachytáva život Ťapákovcov žijúcich na dedine. Zachytáva ich zastaralý spôsob života, ich lenivosť.\n\nVýznamový plán diela: Autor poukazuje na zaostalosť dediny, kritizuje ľudí ktorých nezaujíma nič nové, držia sa tradícii, ktoré im zanechali predkovia. Snaha o kultúrnejší život na dedine.\n\nRozprávač: on- rozprávanie (3. os. sg.), vševediaci rozprávač.","number":5,"assignment":"**Zadanie č. 5**\n\nÚloha č. 1\n\n**Vysvetlite, čo je to syntax, aké vetné sklady rozlišujeme a charakterizujte vety podľa modálnosti. Určite pestrosť viet z hľadiska modálnosti a priraďte vetám typ melódie: **Aké máme šance na úspech? Teraz by sa to malo vyjasniť. Koľko je hodín? Príde mama? Nech ste zdraví! Bodaj by sme boli zdraví. Nech žije kráľovná!!! Sústreď sa!!! *\n\n**Nájdite v ukážkach všetky typy viet podľa modálnosti. Vysvetlite, ktoré z nich obsahujú emocionálnu štylistickú **príznakovosť**?**\n\nÚloha č.2\n\n**Vysvetlite **znaky novely**, **poukážte na rozdiel medzi novelou a poviedkou /uveďte konkrétnu poviedku/. Vysvetlite na ukážkach **dejový a významový plán diela** a určite typ rozprávača.**\n\nUkážky: * M. Kukučín – Neprebudený*\n\n* B. S. Timrava – **Ťapákovci*\n\n**Martin Kukučín: Neprebudený (úryvok)**\n\nKroky zaznievali smerom k nemu. Ondráš zažmúril oči. Tváril sa, že spí. Cez viečka navlas pootvorené v neurčitých kontúrach videl postavu, no nie detskú. To je väčšie čosi. Hľa, zhýba sa nad neho, i počuť mäkký, tichý hlas:\n\n„Ondráš! Ondráš!“\n\nOtvoril oči, ba vytreštil ich. Ten hlas, oj, ten hlas! Ani princeznin!\n\n„A si to ty, Zuzka?“\n\nStrojná hlavička prikývla mu, hlava Zuzky Bežanovie. Ondráš prižmúril oči, žiara toľkej krásy oslňovala ho. A nie div. Jej tvár jasná, červená ako ruža, keď slnce jej lístky ohreje. Dvoje modrých očú, akoby ta kus oblohy vložil, zádumčivo hľadeli na Ondráša. Červený ret odokrýval dva rady bielych perál. Ondrášovi zas zišla na um princezná. Ani tá nebola krajšia, ibaže tie šaty mala s hviezdičkami. Ale ani Zuzkine nie sú špatnejšie. Tá červená šatka na hrdle s tými strapci dodáva jej pôvabnosti spolu s bielymi nadurenými rukávy jej oplecka. A to okrúhle rameno, akoby vyrástlo bolo z bielych záhybov rukáva. Ondráš s vytreštenými očami hľadel na milý zjav: myslel, že je pred stračím zámkom.\n\nZuzka, nebadajúc, čo sa s ním deje, rezko ponúkla ho:\n\n„No, vstaň chytro a jedz!“\n\n„Aha, aha!“ Len teraz dovtípil sa, že to nie kňažná, ale Zuzka. Ona neprišla, aby ho vôkol hrdla objala a do stračieho zámku voviedla, ale doniesla mu jesť. Mal vyjednané od mladých husí po groši a od starých po dva — pritom, kým paša trvá, chovu z dom do domu. Dnes chová sa u Bežanov: Zuzka mu priniesla obed.\n\n--------------------------------------\n\n„Ty, neutekaj! Pozajtre je sobota: prídem si po pero.“\n\n„Nie, pozajtra nie. Veď ti ja poviem, keď budeš mať prísť. Ešte nechtík nekvitne. Vieš?“\n\nOndráš sa uspokojil.\n\n„Dobre, dobre!“\n\nZuzka strmým krokom odišla. Ondráš dlho pozeral za ňou, páčila sa mu. „Hm… bude z nej žena! Dobrá robotnica. Chôdzu má ani granatier, nám dvom bude svedčať. A Dúbravovie? Ale čo, ten jej je nie hoden! A ona sa mi prizná… hm, hm…“\n\nA husár do večera nerozmýšľal o inom, len o princeznej, ktorú už našiel, ale v skutočnosti. Zámok na stračej nôžke nekrúti sa už, zastal. Nebolo mu treba ani dupnúť naň.\n\n**B. S. Timrava: **Ťapákovci\n\nNajstaršia nevesta Iľa, braná od Jablonckov, myslí, že veslo jej náleží, i drží ho v ruke, no z ostatných ani jedna nie je s tým spokojná, a najnespokojnejšia je Anča-mrzáčka s peknou tvárou. Ona k nenávisti popudzuje ešte i druhé.\n\nChce rozkazovať a vždy to chce, čo nechce Iľa, ktorú nik nemá rád, lebo sa vyvyšuje nad všetky druhé. Je i v obecnej službe: je babicou. Asi dva mesiace bola na kurze v Sobote a odvtedy sa povýšene drží nad druhé, akoby bola nie zo sedliackeho, ale z panského rodu. Nič\n\nsa jej odvtedy v dome nepáči, s ničím nie je spokojná. Poučuje, majstruje a chce zrútiť staré obyčaje, zakorenené odjakživa u Ťapákov.\n\nAni jeden z nich neodpovedal. U Ťapákov nie je v obyčaji odpovedať na každú reč. Ale Anča-mrzáčka jej skočila do reči:\n\n„Čo by si ty zažalovala? Choď si do Jablonckov rozkazovať. Tu nie si ty pani!\"\n\n„A ktože je? Ba veru som!\" smeje sa Iľa. „A oni to musia robiť, čo ja chcem!\" povie srdnato.\n\n„A ty sa nestaraj, ty čuš! Ja tebe nevravím, ale tu týmto somárom!\"\n\n„Somári\" mlčali i ďalej, akoby sa boli odriekli vravieť v to ráno.\n\nNa poludnie vystúpila Il'a, že je chyža malá, nespracú sa do nej, i žiadala, aby sa postavil ešte\n\njeden dom.\n\n„Ale vy, čo by vás toľko bolo, že by sté jeden druhému po hlavách chodili - vy nedbáte. Druhí\n\nľudia, aj čo ich je pomenej, hladia jeden druhému ustúpiť, ale vy sa budete jeden o druhého\n\npotkýnať, a netuchnete sa. Vy si na piaď od nosa nevidíte, nehodníci!\"\n\nZ chlapov boli vtedy v izbe traja, no nedbali a neohlásili sa, akoby Iľa nie im, ale ktovie komu\n\nvravela. Ani ženy sa nezastarejú. Lení sa im jazykmi pohnúť. Okrem toho vedia, že mrzáčka to lepšie spraví ako ony. A ani sa nesklamali. Ledvaže odzneli slová z úst Ile, už otvorila ústa\n\nona:\n\n„Čože by si ty mojim bratom nadávala! A keď sa ti nepáči, načo si šla za Paľa? Mohla si sa vydať za kráľa. Lebo ty si len za kráľa súca - ty kráľovná. Keď sa ti tu nevidí - môžeš ísť. Paľa operú druhé ženy – dosť je ich v dome. My bez teba budeme!\" Mrzáčka od seba odsotila plechový tanierik, z ktorého jedla na obed. Bola zlostná, skoro vždy nahnevá."},"6":{"tema_jazyk":"Zvuková rovina jazyka - prozodické vlastnosti","tema_lit":"Epika - typy postáv","autori":["Andrej Sládkovič","P. O. Hviezdoslav","A. S. Puškin"],"diela":["Detvan","Hájnikova žena","Eugen Onegin"],"okruh_jazyk":"Fonetika, fonológia","okruh_lit":"Romantizmus a realizmus - epika","full":"**\n\nÚloha č. 1\n\n**Vysvetlite, ktoré jazykovedné disciplíny skúmajú zvukovú rovinu jazyka. Charakterizujte prozodické vlastnosti reči (intonáciu)** podľa časovej, silovej, tónovej modulácie.\n\n**Fonetika- **základnou jednotkou je **hláska (najmenšia zvuková jednotka; rečovými orgánmi utvorený a vyslovený zvuk ustáleného znenia). Fonetika skúma:\n\n- ako sa hlásky tvoria (artikulujú)\n\n- ako ich počujeme\n\n- ako sa správajú v spojení s inými hláskami (napr. spoluhlásku „v“ inak vyslovujeme v slovách *dievča, chlapov, včela, vrana, *a pod.)\n\n- ďalej skúma, ako sa tvoria slabiky, rečové takty, vety, akú úlohu má dĺžka hlások, prízvuk, melódia vety, tempo reči, a pod.\n\n- skúma hovorenú reč, zisťuje rozdiely vo výslovnosti, pričom využíva aj rôzne špeciálne prístroje\n\n**Fonológia- **základnou jednotkou je **fonéma **(zvuková jednotka, ktorá je schopná rozlišovať význam slov, alebo tvarov)**. **Fonológia skúma:\n\n- ktoré zvuky ľudskej reči sa využívajú na dorozumievanie v jazyku\n\n- pomocou ktorých zvukov sa v jazyku rozlišujú slová a tvary\n\n- aké vlastnosti zvukov sú dôležité pre rozpoznávanie zvukov, a pod.\n\n- zaoberá sa teda tvorením zvukov ľudskej reči a ich fyziologickými a akustickými vlastnosťami\n\n**Ortoepia- **je jazykovedná disciplína, ktorá stanovuje pravidlá spisovnej výslovnosti. Naprávaním organických chýb vo výslovnosti sa zaoberá **logopédia**.\n\n**Prozodické vlastnosti reči (intonácia):**\n\n- **časová modulácia:**\n\n- **kvantita **(dĺžka)- čas potrebný na vyslovenie dlhej samohlásky, alebo dvojhlásky je dvakrát dlhší, ako čas potrebný na vyslovenie krátkej samohlásky. V spisovnej slovenčine je potrebné dodržiavať pomer času pri výslovnosti 2:1 (dlhé : krátke).\n\n- **pauza **(prestávka)- ide o využitie prestávok v súvislom prúde reči. Rozlišujeme:\n\n- **fyziologické pauzy- **slúžia na nadýchnutie vzduchu do pľúc\n\n- **významové (logické) pauzy- **používajú sa na členenie reči na vetné úseky, členenie súvetí na vety, oddeľovanie slov, ktoré nepatria do vetnej štruktúry, a pod. Značia sa graficky interpunkčnými znamienkami.\n\n- **tempo **(rýchlosť)\n\n- **rytmus**- vzniká striedaním prízvučných a neprízvučných slabík v slove.\n\n- **silová modulácia:**\n\n- **prízvuk**- je zvýraznenie intenzity jednej slabiky v slove. Rozlišujeme:\n\n- **hlavný prízvuk- **je v slovenčine pevný a na prvej slabike v slove.\n\n- **vedľajší prízvuk- **vyskytuje sa v dlhších ako trojslabičných slovách (napr. najlepšiemu, a pod.)\n\n- **dôraz- je výrazné intonačné vyzdvihnutie slova vo vete. V slovenčine je výraz na prvej, prízvučnej slabike zdôrazneného slova.\n\n- **emfáza **(citový, expresívny dôraz)- je zdôrazňovanie istej časti jazykového prejavu, pri ktorom sa uplatňuje citový (emocionálny) prvok.\n\n- **intenzita hlasu **(sila hlasu)- spolu s tempom vytvára dynamiku rečového prejavu.\n\n- **tónová modulácia:**\n\n- **melódia- v slovenčine rozoznávame 3 druhy melódie:\n\n- **uspokojivá končiaca melódia- **uplatňuje sa v oznamovacích vetách a v dopĺňacích otázkach, ktoré vyžadujú doplnenie, upresnenie informácie.\n\n- **neuspokojivá končiaca melódia- **sa uplatňuje v zisťovacích otázkach, ktoré očakávajú odpoveď áno/nie.\n\n- **neuspokojivá nekončiaca melódia- **je rovnomerný priebeh melódie v úseku, ktorým sa nekončí výpoveď. Naznačuje teda, že sa vo výpovedi pokračuje.\n\n- **hlasový register **(výška hlasu)- vzniká nasadením hlasu do istej výšky. Ide väčšinou o prirodzený a neuvedomelý spôsob reči. Výšku hlasu možno využiť aj funkčne (napr. na odlíšenie výpovedí postáv pri čítaní umeleckého textu).\n\n**Vysvetlite všetky prozodické vlastnosti v prvej strofe **Detvana. **\n\n- **pauza- **významová pauza\n\n- **kvantita **(dĺžka)- dodržanie pomeru 2:1\n\n- **tempo **(rýchlosť)- pomalšie pri čítaní umeleckého textu\n\n- **dôraz**\n\n- **intenzita hlasu Vyberte si ľubovoľný text a využite všetky poznatky o intonácii v prednese textu.**\n\nÚloha č. 2\n\n**Charakterizujte **epiku**, vysvetlite **literárnodruhovú** príslušnosť uvedených literárnych diel. Analyzujte autorskú koncepciu postáv a porovnajte ukážky. Epika:**\n\n- jeden z troch základných literárnych druhov (lyrika, **epika**, dráma)\n\n- zakladá sa na deji\n\n- má veršovanú, aj prozaickú podobu\n\n- zachytáva rôzne udalosti\n\n- rozlišujeme 3 druhy epiky:\n\n- veľká (epos, román)\n\n- stredná (novela, poviedka, humoreska)\n\n- krátka (báj, bájka, rozprávka, povesť, legenda)\n\n**Andrej Sládkovič: Detvan Téma: **oslava podpolianskej prírody a slovanského ľudu\n\n**Miesto: dedina Detva\n\n**Čas: **približne 15. storočie, nadčasové\n\n**Postavy: **nájdeme tu kladnú romantickú postavu bez jedinej zlej vlastnosti\n\nMartin Hudcovie- zidealizovaný, odvážny, hrdý, verný, čestný, vlastenec, zastupuje slovenského junáka, je zžitý s prírodou, pochádza zo sedliackeho rodu,\n\nElena- milá, ideálna predstaviteľka ľudu, Martinova deva,\n\nKráľ Matiáš- v skutočnosti Matej Korvín, zaujíma sa o to, ako žije ľud, počúva názory ľudu, smúti nad stratou slovenského územia, má vrúcny vzťah k Tatrám, Váhu a Hronu\n\n**Kompozícia:**\n\n- **spev = Martin- **narodenie Martina Hudcovie v Detve; Martin zabíja kráľovského sokola, pretože sa pustil do slabšieho zajaca\n\n- **spev = **Družina- **Martin prichádza ku svojim kamarátom; sedia pri ohni, jedia barana, pijú žinčicu, neskôr tancujú odzemky; vždy sa delia rovným dielom\n\n- **spev = Slatinský jarmok- **Martin sa ide priznať na jarmok kráľovi Matiášovi, že mu zabil sokola; kráľ mu odpúšťa\n\n- **spev = Vohľady- **krá
