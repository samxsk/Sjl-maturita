ľ chce zistiť, či aj Elena je taká charakterná ako Martin; prichádza v prestrojení a daruje Elene prsteň; Martin ho vyhodí, pretože sa bojí kliatby\n\n- **spev = Lapačka- **Martin vstupuje do kráľovho Čierneho pluku- s podmienkami: ponechať valašku, opasok, vlasy, fujaru a Elenu\n\n**Pointa: **autor vyzdvihuje morálnu silu, kvalitu Martina\n\n**Literárny druh: **epika\n\n**Literárny žáner: **lyricko- epická skladba\n\n**Pavol Országh Hviezdoslav: Hájnikova žena Téma: **ide o porovnanie 2 svetov- svet chalúp a svet kaštieľov\n\n**Miesto: Orava, horáreň na Podvŕší\n\n**Čas: 19. storočie\n\n**Postavy:**\n\nMichal Čajka- hrdý, úctivý, pracovitý, poctivý\n\nHanka Čajková- pekná, pracovití, verná Mišovi,\n\nArtuš Villáni- nebol dobrým pánom, bol záletník, mal rád poľovačky, nestaral sa o majetok\n\n**Dej: Čajka je horárom na Orave. Jeho manželka Hanka je zvedená mladým Artušom Villánim. V sebaobrane ho zabije. Vinu na seba berie Michal. Hanka sa pomätie a v deň súdu vbehne do súdnej siene a Michal je oslobodený. Hanka potom vyzdravie.\n\n**Pointa: autor vyzdvihuje slovenský ľud pred šľachtou\n\n**Literárny druh: epika\n\n**Literárny žáner: lyricko- epická básnická skladba\n\n**Alexandre **Sergejevič Puškin**: Eugen **Onegin** Tatianin list **Oneginovi Téma: **autor v diele vykresľuje obraz ruského života v 1. polovici 19. storočia\n\n**Miesto:** Rusko\n\n**Čas:** 1. polovica 19. storočia\n\n**Postavy:**\n\nEugen Onegin- je prototypom zbytočného človeka, prechádza bezcieľne životom a nevyužíva svoje nadanie\n\nTatiana Larinová- protiklad Eugena, je to ušľachtilá, citlivá a do snov ponorené mladá žena\n\nVladimír Lenský- romantický a zasnívaný básnik, stáva sa Oneginovým priateľom\n\nOľga Larinová- sestra Tatiany- veselá, pekná\n\n**Dej: **Eugen Onegin svoje dni napĺňa nudou, nesúhlasí s prázdnym životom petrohradskej šľachty, ale nič proti tomu nerobí. Ruská šľachta nevyužíva svoje vzdelanie v práci pre Rusko. Mladí ľudia strácajú čas v šľachtických salónoch. Onegin nevidí, alebo nechce vidieť, že existujú aj iní ľudia- morálni, priami a čestní. Zabije v súboji pre hlúposť svojho priateľ Lenského. Odmietne úprimnú lásku mladej Tatiany, hoci sa mu ona sama musí k nej priznať. Až po rokoch pochopí, čo odmietol. Snaží sa ju (už ako bohatú a vydatú) získať, ale Tatiana ho odmieta.\n\n**Literárny druh: **epika\n\n**Literárny žáner: **román","number":6,"assignment":"**Zadanie č. 6**\n\nÚloha č. 1\n\n**Vysvetlite, ktoré jazykovedné disciplíny skúmajú zvukovú rovinu jazyka. Charakterizujte prozodické vlastnosti reči (intonáciu)** podľa časovej, silovej, tónovej modulácie.\n\n**Vysvetlite všetky prozodické vlastnosti v prvej strofe **Detvana. * Vyberte si ľubovoľný text a využite všetky poznatky o intonácii v prednese textu.**\n\nÚloha č. 2\n\n**Charakterizujte **epiku**, vysvetlite **literárnodruhovú** príslušnosť uvedených literárnych diel. Analyzujte autorskú koncepciu postáv a porovnajte ukážky.**\n\n Ukážky: *A. Sládkovič: Detvan*\n\n*P. O. Hviezdoslav: Hájnikova žena*\n\n*A. S. **Puškin**: Eugen **Onegin*\n\nAndrej Sládkovič: Detvan (úryvok)\n\n1\nStojí vysoká, divá Poľana,\nmať stará ohromných stínov,\npod ňou dedina Detvou volaná,\nmať bujná vysokých synov:\nči tých šarvancov Detvy ozrutných\nPoľana na tých prsiach mohutných\nnenosí a nenadája?\nAlebo aspoň na tie výšiny\nnehľadí dcéra tejto rodiny,\nkeď má porodiť šuhaja? —\n\n13\nAle sotva to zazrie náš šuhaj,\nšvihne valaškou blýskavou —\nspasený zajko závozom, hybaj!\nSokolík mrie medzi trávou:\nČo si ho, Martin, chudáka zabil?\nČi ťa ten chochlík jarabý zvábil? —\nSokol nech si orla volí! —\nSedem hrmených! — sokol zajaca!\nMal sa do mňa dať, aby tá práca\nctila aspoň dva sokoly.\n250\nRod môj, ty ľúb si tvojho Detvana,\nv ňom duša tvoja je zmaľovaná,\n\nzhrej obrazom tým, čo schladlo!\n\nPavol Országh Hviezdoslav: Hájnikova žena (úryvok)\n\nA u dvier hrmot, durkotanie\nvtom, rykot, vrava čudesná,\nže všetkých zraky zabočili\nk nim. — Tuho vzpečoval sa dráb,\nno dvere preds’ sa rozborili:\na nimi žena nerestná,\nzmut v ťahoch, telom veteš háb,\ndo siene vbehla ani strela,\nHuk vôkol, pohyb, zarazenie.\nI Čajka zbočil naposled,\nzrel — skúmal — revnul: „Moja Hana!“ —\n„Hej, ona,“ muky na znamenie\nkríž vrhla. „Vidíš? Ešte žije,\nby mohla ťažkú na spoveď —\noch!“ — metla sa mu kolo šije,\n„ty mrcha, mrcha, mrcha muž!\nÓ, koľká v duši mojej rana...!\nNo vidím slnka zlatú pruž,\nhľa, jak sa oknom z kužľa vije;\ni prvej než sa zase skryje,\nnež zatvorí sa čierna brána:\ntu si mi, našla som ťa už,\na nepustím ťa nikdy, nikdy! —\nMiškovi nerobte mi krivdy!\nJa pána sklala — ale no!\nJa veru — ojoj! — svetlo — huš!“\n\n**Alexander **Sergejevič Puškin**: Eugen **Onegin  Tatianin list **Oneginovi** (úryvok)**\n\n*Píšem vám – prečo, neviem sama.*\n\n*Čože mám ešte povedať?*\n\n*Vy môžete ma dnes, och, tá hana,*\n\n*opovrhnutím potrestať.*\n\n*No ak len kvapku zľutovania*\n\n*cítite k môjmu nešťastiu,*\n\n*nenecháte ma zmierať tu.*\n\n*Sprvu som, verte, mlčať chcela;*\n\n*a nepadla by do hanby*\n\n*a u vás čistá bola by,*\n\n*keby som aspoň dúfať smela,*\n\n*že môžem čo len v týždni raz*\n\n*v dedine našej vidieť vás...*\n\n*No o vás vravia, odľud ste;*\n\n*žiť vás tu nudí, a v nás predsa*\n\n*niet lesku v ničom... odpusťte,*\n\n*hoc milý ste nám z hĺbky srdca.*"},"7":{"tema_jazyk":"Opisný slohový postup, opis vs. charakteristika","tema_lit":"Znaky románu","autori":["Honoré de Balzac","A. S. Puškin"],"diela":["Otec Goriot","Kapitánova dcéra"],"okruh_jazyk":"Sloh - opis","okruh_lit":"Realizmus - román","full":"Úloha č. 1\n\n**Charakterizujte opisný slohový postup a jeho žánre**. **Vysvetlite rozdiel medzi opisom a charakteristikou**.\n\n**Opisný slohový postup:**\n\n- slúži na vymenovanie znakov a vlastností osoby, veci, alebo činnosti\n\n- slúži na priblíženie, znázornenie niečoho/niekoho niekomu inému\n\n- prevládajú v ňom menné slovné druhy (podstatné mená, prídavné mená, zámená)\n\n- znaky a vlastnosti osôb, zvierat a vecí sa vymenúvajú v istom poradí, ktoré závisí od podávateľa, pretože ten stanovuje hierarchiu, a teda v texte zohráva úlohu subjektívny postoj podávateľa\n\n- **uplatnenie: **v hovorom, náučnom a umeleckom štýle\n\n- **žánre:**\n\n- **opis:**\n\n- statický- opisuje objekt bez pohybu\n\n- dynamický- opisuje objekt v pohybe, alebo popisuje nejakú činnosť (opis pracovného postupu)\n\n- jednoduchý- opisuje vlastnosti objektu bez výraznejšieho štýlového zafarbenia\n\n- umelecký- využíva umelecké jazykové prostriedky- poetizmy, figúry, trópy, a pod.\n\n- odborný- pracuje s objektom metodickým, vedeckým spôsobom a používa odborný jazyk\n\n- **charakteristika: opisuje vlastnosti osoby\n\n- priama- vlastnosti človeka priamo pomenuje\n\n- nepriama- zobrazuje vlastnosti cez ich prejavy, správanie človeka\n\n- vonkajšia- zachytáva výzor, vzhľad človeka\n\n- vnútorná- všíma si charakter, povahu osoby\n\n- objektívna- autor nezainteresovane vymenúva vlastnosti\n\n- subjektívna- autor výberom, aj svojim uhlom pohľadu hodnotí vlastnosti\n\n-  karikatúra**: **je to zvláštny druh charakteristiky, v ktorej autor zámerne zveličuje niektorú vlastnosť, črtu\n\n**Rozdiely medzi opisom a charakteristikou:**\n\n- **opis: **je založený na cieľavedomom pozorovaní a následnom vymenovaní základných znakov predmetu, osoby, alebo javu. Je to slohový útvar, v ktorom opisujeme osoby, veci, rôzne činnosti, prírodné deje. Úlohou opisu je vystihnúť pozorovaný objekt ako celok a zároveň jeho jednotlivé časti, ich vlastnosti a vzájomné vzťahy.\n\n- **charakteristika: **žáner, v ktorom sa vymenúvajú typické telesné znaky a vlastnosti človeka alebo nejakej osoby (povahové vlastnosti, záujmy, schopnosti, názory, a pod.).\n\n**Nájdite príklad na priamu a nepriamu charakteristiku a opis v uvedených ukážkach. Kedy autor môže použiť karikatúru?**\n\nJean Joachim Goriot bol pred revolúciou obyčajný cestovinársky robotník, zručný, sporivý a dosť podnikavý, aby si mohol kúpiť závod svojho majstra, ktorý sa náhodou stal obeťou prvého povstania roku 1789.- **priama charakteristika**\n\n„Hanbi sa, ty starý pes, že napriek mojim prísnym rozkazom nepodal si mi správu o mojom synovi Petrovi Andrejevičovi a že ma cudzí ľudia museli upovedomiť o jeho kúskoch. Tak si ty plníš svoju povinnosť a pánovu vôľu? Pošlem ťa svine pásť, ty starý pes, za to, že si tajil pravdu a nadŕžal mládencovi!“- **nepriama charakteristika (otec Petra- je výbušný, agresívny, krutý)\n\nPeter Andrejič bol ranený pod pravým plecom do pŕs, priam pod kostičku, do hĺbky asi pol druha palca, a ležal vo veliteľovom dome, kde sme ho odniesli z brehu, a liečil ho tunajší barbier Stepan Paramanov; a teraz je Peter Andrejič chvalabohu zdravý a okrem dobrého nič o ňom napísať nemôžem.- **opis Použitie karikatúry- **ak chce autor zámerne zveličiť istú črtu, alebo vlastnosť\n\n**Predstavte si, že ste na dôležitom pracovnom pohovore a máte povedať vlastnú charakteristiku. Čo na seba prezradíte, aby vás prijali?**\n\n- vyberať vlastnosti ktoré súvisia s pracovnou pozíciou\n\n- väčšia časť patrí pozitívnym vlastnostiam, ale treba spomenúť aj negatívne\n\n- napr.: pozitívne- komunikatívnosť, priateľská povaha, bezkonfliktnosť, cieľavedomosť, pracovitosť, a pod.\n\n- napr. negatívne- tvrdohlavosť, individualizmus, prehnaná priebojnosť, a pod.\n\nÚloha č. 2\n\n**Analyzujte **znaky románu** na konkrétnom literárnom diele**. **Zhodnoťte spoločenský a umelecký prínos románov. Charakterizujte hlavné postavy. Honore de **Balzac**: Otec **Goriot Znaky románu:**\n\n- viac dejových línii (Goriot- dcéry, Rastignac- Delphine, Rastignacova snaha dostať sa do vyššej spoločnosti)\n\n- množstvo postáv (otec Goriot, jeho dve dcéry- Anastázia, Delphine, Rastignac, Vautrin, Poiret, Victoria)\n\n- vývoj postáv (Rastignac- z mladíka túžiaceho po vyššom postavení sa stáva morálne zmýšľajúci človek, ktorý pomáha druhým a chce robiť správne rozhodnutia)\n\n- časové rozpätie (niekoľko rokov)\n\n**Spoločenský a umelecký prínos románov:**\n\n- **spoločenský význam:**\n\n- **umelecký význam: Honore de **Balzac**: Otec **Goriot**- postavy (charakteristika)**\n\nOtec Goriot- bývalý cestovinár, najskôr bol dôvtipný, dobrácky a živý, mení sa na otupeného, ťarbavého a chudobného, nebol veľmi obľúbený, bol predmetom posmechu, žil v samote\n\nAnastázia- Goriotova dcéra, pekná, aristokratická, bola márnivá, necitlivá k otcovi, vydala sa za grófa, mala viacerých milencov- minula na nich všetky peniaze, dokonca i mužove šperky\n\nDelphina- Goriotova dcéra, pekná, márnivá, má rada peniaze, je citlivejšia ako Anastázia, závidí jej však styky a postavenie, vydáva sa za bankára, keď jej otec ochudobnie- hanbia sa zaňho\n\nEugene de Rastignac- pekný, sympatický, úprimný a priateľský študent; prichádza z vidieka, kvôli štúdiu práva; je jediný, kto pomáha otcovi Goriotovi; chce sa dostať do vyššej spoločnosti- využíva pri tom Delphinu (je jej milenec)\n\npani Vauquerová- je majiteľkou penziónu, kde bývajú\n\nVautrin- bývalý väzeň, ktorý taktiež žije v tomto penzióne, vydáva sa za niekoho iného, dávala Rastignacovi rady\n\nPoiret- starec, obyvateľ penziónu, bol naklonený k slečne Michommeauovej, patril k vyššej spoločnosti\n\nVictoria- dcéra milionára, ľúbi Eugena\n\n**Alexander **Sergejevič Puškin**: Kapitánova dcéra- postavy (charakteristika)**\n\n- **hlavné postavy:**\n\nPeter Andrejič Griňov- je zároveň rozprávačom, je to mladý šľachtic, statočný, rozumný, občas ľahkomyseľný; keď bol dieťa, bol zapísaný do pluku; ako 17- ročný musí slúžiť v Belogorskej pevnosti\n\nMária Ivanovna- plachá, rozumná, citlivá dievčina, zamiluje sa do Petra; je dcérou Ivana Kuzmiča\n\nPugačov- zakladateľ povstania, bol zástancom ľudu; ocitol sa aj vo väzení, z ktorého však ušiel, jeho povstanie bolo potlačené; bol verejne popravený v Moskve v roku 1775\n\n- **vedľajšie postavy:**\n\nŠvabrin- je to bývalý vojak, ktorý je seržantom v Belogorskej pevnosti; je veľmi skúsený, smelý, ale je hrubý; chce sa pomstiť Petrovi za to, že Máša si vybrala jeho\n\nSaveljič- Griňovov služobník, jeho sprievodca; verný a dobrácky starec\n\nIvan Kuzmič- veliteľ Belogorskej pevnosti, Máriin otec; neučený a prostý človek, no i tak veľmi dobrý a statočný\n\nVasilisa Jegorovna- Kuzmičova žena, spravuje pevnosť; k Petrovi sa správa, ako k svojmu synovi","number":7,"assignment":"**Zadanie č. 7**\n\nÚloha č. 1\n\n**Charakterizujte opisný slohový postup a jeho žánre**. **Vysvetlite rozdiel medzi opisom a charakteristikou**.\n\n**Nájdite príklad na priamu a nepriamu charakteristiku a opis v uvedených ukážkach. Kedy autor môže použiť karikatúru? Predstavte si, že ste na dôležitom pracovnom pohovore a máte povedať vlastnú charakteristiku. Čo na seba prezradíte, aby vás prijali?**\n\nÚloha č. 2\n\n**Analyzujte **znaky románu** na konkrétnom literárnom diele**. **Zhodnoťte spoločenský a umelecký prínos románov. Charakterizujte hlavné postavy.**\n\nUkážky: *H. de **Balzac**: Otec **Goriot*\n\n- *S. **Puškin**: Kapitánova dcéra*\n\n**Honore de **Balzac**: Otec **Goriot** (úryvok)**\n\nJean Joachim Goriot bol pred revolúciou obyčajný cestovinársky robotník, zručný, sporivý a dosť podnikavý, aby si mohol kúpiť závod svojho majstra, ktorý sa náhodou stal obeťou prvého povstania roku 1789.\n\nAk ho niekto videl, ako vedie obchod, vysvetľuje zákony o vývoze a dovoze obilia, študuje ich zmysel, postihuje ich chyby, bol by usúdil, že je schopný stať sa štátnym ministrom. Bol trpezlivý, činný, energický, vytrvalý, rýchly v podnikaní, mal orlí zrak, všetkému predišiel, všetko predvídal, všetko vedel, všetko utajil; bol diplomat v rozhodovaní, vojak pri postupe.\n\n............\n\nKeď už dcéry boli súce na vydaj, mohli si vybrať mužov podľa chuti: každá mala dostať do vena polovicu otcovho majetku. Anatasie, ktorej pre jej krásu dvoril gróf de Restaud, mala aristokratické sklony, a tak opustila otcovský dom, aby sa vyšvihla do vysokých spoločenských kruhov. Delphine mala rada peniaze, vydala sa za Nucingena, bankára nemeckého pôvodu, ktorý sa stal barónom Svätej ríše rímskej. Goriot ostal cestovinárom. Dcéry a zaťovia sa čoskoro pohoršovali, keď ho videli, ako pokračuje v obchodovaní, hoci v tom bol celý jeho život. Päť rokov znášal ich naliehanie, no napokon súhlasil, že sa utiahne do ústrania...\n\n Uchýlil sa do tohto penziónu zo zúfalstva, ktoré sa ho zmocnilo, keď videl, že manželia oboch dcér nedovolili, aby ho vzali k sebe, ale nesmeli ani prijímať verejne jeho návštevy.\n\n Zaťovia mi zabili dcéry. Áno, nemal som už dcéry, odkedy sa vydali. Otcovia, žiadajte od snemovní, aby vydali zákon o manželstve. A nevydávajte dcéry, ak ich ľúbite. Zať je zločinec, ktorý všetko v dievčati skazí, pošpiní. Už nijaké sobáše! Berú nám dcéry, takže ich už nemáme, keď zomierame. Uzneste sa na zákone o smrti otcov! Veď toto je strašné! Pomstu!\n\n............................\n\nNapokon, vy ste nevinné. Sú nevinné, milý priateľ! Len to pekne všetkým povedzte, aby ich kvôli mne neodsudzovali. To všetko je moja chyba, ja som ich naučil, aby po mne šliapali.\n\n**A. S. **Puškin**: Kapitánova dcéra **\n\nA/\n\n*,,*Dvanásť košieľ plátenných holandských s manžetami v cene desať rubľov. Truhlička s čajovým príborom v cene dva a pol rubla...“\n\n,,Aké sú to táraniny?“ prerušil ho Pugačov. ,,Čo ma po akýchsi truhličkách a nohaviciach s manžetami?“ Saveljič si odkašlal a začal vysvetľovať:\n\n,,To je, prosím pekne, ak dovolíš, súpis pánovho majetku, čo rozkradli zbojníci..“\n\n,,Akí zbojníci?“ hrozivo sa opýtal Pugačov.\n\n,,Prepáč, ušlo mi to z jazyka,“ odpovedal Saveljič. ,,Zbojníci – nezbojníci, ale tvoji mládenci\n\nvšetko prekutrali a rozvláčili. Nehnevaj sa, kôň má štyri nohy a potkne sa. Rozkáž to dočítať.“\n\n,,Dočítaj,“ nariadil Pugačov. Sekretár pokračoval: ,,Pokrývka plátenná, druhá bavlnená, taftová, v cene štyri ruble. Líščí kožuch, podšitý červenou angliou, v cene štyridsať rubľov.\n\nOkrem toho zajačí kožuštek, darovaný tvojej milosti v prícestnom hostinci v cene pätnásť rubľov.“\n\n,,Ešte to!“ skríkol Pugačov a zablýskal očami. Priznám sa, pochytil ma strach o chudáka pestúna. Znova chcel dačo vysvetľovať, ale Pugačov ho prerušil. ,,Ako sa opovažuješ obťažovať ma takýmito taľafatkami?“ skríkol, vytrhol sekretárovi papier a hodil ho Saveljičovi do tváre. ,,Hlúpy starigáň! Orabovali ich: Dajsami svete! Do smrti sa môžeš modliť za mňa a za mojich chlapcov, že nevisíš aj so svojím urodzeným pánom len medzi neposlušníkmi, ty starý paprdák... Zajačí kožuch! Ja ti dám zajačí kožuch! A čo keď dám z teba zaživa kožu stiahnuť na kožuchy?“\n\n,,Ako ráčiš rozkázať,“ odpovedal Saveljič, ,,ale ja som obyčajný poddaný a zodpovedám za\n\npanský majetok“.\n\nB/„Hanbi sa, ty starý pes, že napriek mojim prísnym rozkazom nepodal si mi správu o mojom synovi Petrovi Andrejevičovi a že ma cudzí ľudia museli upovedomiť o jeho kúskoch. Tak si ty plníš svoju povinnosť a pánovu vôľu? Pošlem ťa svine pásť, ty starý pes, za to, že si tajil pravdu a nadŕžal mládencovi! Len čo dostaneš tento list, rozkazujem ti, naskutku mi odpíš, ako je to teraz s jeho zdravím, o ktorom mi píšu, že sa mu polepšilo, a na ktorom mieste je ranený a či ho dobre ošetrili.“\n\nC/ „Veľkomožný pane Andrej Petrovič, otec náš láskavý!\n\nVáš milostivý list som dostal, v ktorom sa ráčiš hnevať na mňa, svojho nevoľného poddaného, že vraj sa môžem hanbiť, lebo neplním pánove rozkazy. Lenže ja nie som starý pes, ale Váš verný služobník, pánove rozkazy poslúcham a vždy som Vám horlivo slúžil, až som ošedivel. O zranení Petra Andrejiča som Vám nič nepísal, aby som Vás darmo nenaľakal, ale ako som počul, urodzená pani, naša matka Avdoťja Vasilievna, aj tak od ľaku ochorela a za jej zdravie sa budem modliť. Peter Andrejič bol ranený pod pravým plecom do pŕs, priam pod kostičku, do hĺbky asi pol druha palca, a ležal vo veliteľovom dome, kde sme ho odniesli z brehu, a liečil ho tunajší barbier Stepan Paramanov; a teraz je Peter Andrejič chvalabohu zdravý a okrem dobrého nič o ňom napísať nemôžem. Velitelia, ako počúvam, sú s ním spokojní. Vasilisa Jegorovna ho má ako vlastného syna. A že sa mu stala taká kalamita, za to mládenca netreba trestať: kôň má štyri nohy a potkne sa. A ráčite mi písať, že ma pošlete svine pásť, nuž to je Vaša bojarská vôľa. S tým sa Vám poddansky klaniam.","supplementary":[{"question":"Charakterizujte opisný slohový postup a jeho žánre","answer":"**Opisný slohový postup** je slohový postup, ktorý zobrazuje **statické vlastnosti** osôb, vecí, javov, dejov - ich vzhľad, znaky, časti, vlastnosti.\n\n**Znaky opisu:**\n- Statický charakter (na rozdiel od dynamického rozprávania)\n- Časté slovesá v 3. osobe, prítomný čas\n- Veľa prídavných mien (akostných, vzťahových)\n- Konkrétne podstatné mená\n- Vymenovávanie znakov, častí, vlastností\n- Logická postupnosť (napr. zhora dolu, zvonku dnu, celok → časti)\n\n**Druhy opisu:**\n\n| Druh | Charakteristika | Príklad |\n|------|----------------|---------|\n| **Jednoduchý opis** | Vecný, objektívny, faktografický | opis predmetu v inzeráte |\n| **Odborný opis** | Presný, terminológia, výklad | opis svalu v anatómii |\n| **Umelecký opis** | Subjektívny, expresívny, obrazný | opis krajiny v poézii |\n| **Náladový opis** | S citovým zafarbením | opis jesennej krajiny |\n| **Karikatúra** | Zveličený, satirický | satirický portrét |\n\n**Žánre založené na opise:**\n\n- **Opis predmetu** - vzhľad, časti, funkcie (auto, dom)\n- **Opis osoby (charakteristika)** - vzhľad + povaha\n  - vonkajšia (vzhľad)\n  - vnútorná (povaha)\n  - priama / nepriama / kontrastná\n- **Opis pracovného postupu** - návod, recept\n- **Opis prírody / krajiny**\n- **Reportáž** - opis udalosti so subjektívnym pohľadom\n- **Cestopis** - opis krajín a ciest\n\n**Jazykové prostriedky:**\n- prídavné mená v základných tvaroch\n- podstatné mená v rôznych pádoch (lokalizácia: vedľa, nad, pod)\n- časté metafory a prirovnania (umelecký opis)"}]},"8":{"tema_jazyk":"Neohybné slovné druhy","tema_lit":"Sonet, symbolizmus","autori":["F. Petrarca","W. Shakespeare","Ivan Krasko"],"diela":["Sonety pre Lauru","Sonety","Zmráka sa","Topole"],"okruh_jazyk":"Morfológia - neohybné","okruh_lit":"Symbolizmus, sonet","full":"Úloha č. 1\n\n**Charakterizujte neohybné slovné druhy a ich špecifické vlastnosti.**\n\n- **P**ríslovky - **plnovýznamový slovný druh, vetnočlenská platnosť\n\n**- **neohybný slovný druh\n\n- **rozdelenie:**\n\n a) miesta (napr. dole, hore, a pod.)- pýtame sa otázkou: Kde?\n\n b) času (napr. včera, dnes, a pod.)- pýtame sa otázkou: Kedy?\n\n c) spôsobu (napr. zle, dobre, a pod.)- pýtame sa otázkou: Ako?\n\n d) príčiny (napr. preto, zato, a pod.)- pýtame sa otázkou: Prečo?\n\n- **stupňovanie:**\n\n a) pravidelné- pri stupňovaní sa nemení základ slova (napr. ticho, oddane, a pod.)\n\n b) nepravidelné- pri stupňovaní sa mení základ slova (mnoho, málo, pekne, dobre, zle)\n\n- **Predložky  - **neplnovýznamový slovný druh, nemajú vetnočlenskú platnosť\n\n**-** neohybný slovný druh\n\n**-** rozdelenie:\n\n** a) podľa pôvodu:**\n\n1. prvotné- sú vždy len predložkami- nemôžu byť iným slovným druhom (napr. pred, po, pri, s, z, a pod.)\n\n2. druhotné- v prvom význame sú príslovky/častice, alebo pochádzajú z iného slovného druhu (napr. okolo, hore, uprostred, vďaka, a pod.)\n\n **b) podľa zloženia:**\n\n1. jednoduché- jedna predložka (napr. s, k, do, a pod.)\n\n2. zložené- z viacerých predložiek (napr. popod, popred, pomedzi, namiesto, a pod.)\n\n- u niektorých môže nastať **vokalizácia**\n\n- **Spojky  - **neplnovýznamový slovný druh, nemajú vetnočlenskú platnosť\n\n**- **neohybný slovný druh\n\n**-** rozdelenie:\n\n a) priraďovacie: **spájajú rovnocenné slová, alebo vety\n\n1. zlučovacie- napr. a, i, aj, ani, či\n\n2. stupňovacie- napr. ba, ba aj, nielen, ale aj\n\n3. odporovacie- napr. ale, no, a\n\n4. vylučovacie- napr. alebo; buď, buď-buď\n\n5. dôvodové- napr. veď, však, aj tak, i to, predsa, či\n\n6. dôsledkové- napr. preto, zato, tak, teda, tým, potom, a preto, a zato, a tak\n\n** b) podraďovacie: **\n\n1. vlastné- napr. keď, aby, že, pretože\n\n2. spájacie výrazy- vzťažné zámená, ktoré pripájajú vetu v podraďovacom súvetí (napr. kto, ktorý, aký, čí, ako, kde)\n\n- **Častice**\n\n- neplnovýznamový slovný druh, nemajú vetnočlenskú platnosť\n\n- neohybný slovný druh\n\n- rozdelenie:\n\n **a) uvádzacie**- stoja pred slovom, ku ktorému hovoriaci vyjadruje vlastný postoj\n\n1. pripájacie- napr. no, i, a, ale (**A **so mnou to neskúsiš?)\n\n2. pobádacie- napr. kiež, aby (**Aby **si nezaspala!)\n\n** b) vytyčovacie**- stoja na začiatku vety a vyjadrujú postoj hovoriaceho k celej výpovedi\n\n1. vysvetľovacie- napr. aspoň, ako\n\n2. hodnotiace- napr. asi, sotva, akiste\n\n3. zdôrazňovacie- napr. áno, najmä, predovšetkým\n\n- **Citoslovcia - **neplnovýznamový slovný druh, môžu mať vetnočlenskú platnosť v úlohe slovesného prísudku\n\n**-** neohybný slovný druh\n\n**-** rozdelenie:\n\n** a) podľa toho, čo vyjadrujú:**\n\n1. vlastné- vyjadrujú emócie (napr. au, fuj, aj) a vôľu (napr. hajde!, marš, ahoj)\n\n2. zvukomalebné (onomatopoje)- napodobňujú zvuky prírody, alebo predmetov, ktoré zhotovil človek (napr. kvá, mú, krá-krá, tik-tak)\n\n **b) podľa pôvodu:**\n\n1. prvotné- môžu byť len citoslovcom (napr. jaj, juj, och, ach)\n\n2. druhotné- môžu byť utvorené **zo slovies** (napr. hybaj) alebo utvorené **z podstatných mien** (napr. beda)\n\n**V básni **Topole **v prvom dvojverší určite všetky slovné druhy. hej- **citoslovce\n\n**topole- **podstatné meno\n\n**tie- **zámeno\n\n**vysoké- **prídavné meno\n\n**okolo- **príslovka\n\n**nich- **zámeno\n\n**šíre- **prídavné meno\n\n**pole- **podstatné meno\n\n**Nájdite v ukážke **Sonety *a *Zmráka sa*** predložky a spojky. Pomenujte jav, ktorý vznikol v predložkovom spojení: **...*zapadli vo zhone žitia ***a uveďte ďalšie príklady**.* Predložky: k, od, do, v, bez, z, vo\n\n**Spojky: i, a, keď, veď\n\nJav, ktorý vznikol v predložkovom spojení *zapadli vo zhone žitia* = **vokalizácia predložky (ďalšie príklady na vokalizáciu- so sestrou, vo vode, zo záhrady, vo svojom, a pod.)\n\n**Vo vetách rozlíšte slovný druh slova **ale**: **Viem, ale nepoviem. Ale už choď. Ale, daj mi pokoj**. **Nahraďte synonymami uvedené častice**: *obzvlášť, obdobne, bezpochyby, samozrejme.*\n\n*Viem, ale nepoviem.- *spojka\n\n*Ale už choď-** *častica\n\n*Ale, daj mi pokoj-** *častica* *\n\n**obzvlášť**- výnimočne, najmä, mimoriadne, veľmi\n\n**obdobne**- podobne, takisto, rovnako\n\n**bezpochyby**- isto, rozhodne, spoľahlivo, neomylne\n\n**samozrejme**- áno, pravda, hej, dobre, pravdaže\n\nÚloha č. 2\n\n**Vysvetlite pojmy: **sonet, epiteton, básnický symbol, symbolizmus**. Sonet:**\n\n- básnická forma so záväzným počtom veršov- 14 (4+4+3+3)\n\n- na konci je pointa, ktorá môže meniť zmysel predchádzajúceho textu\n\n- pôvodný rýmový vzorec: abba, cdc, dcd\n\n- prvé štvorveršie obsahuje **tézu **(nastolenie problému)\n\n- ďalšie štvorveršie obsahuje antitézu (neguje problém)\n\n- posledné trojveršia obsahujú **syntézu**\n\n- do Európskej poézie ho zaviedol F. Petrarca (Sonety pre Lauru)\n\n**Epiteton- **obrazný básnický prívlastok; obrazné pomenovanie, ktoré obsahuje aj citový význam; vyjadruje hodnotiaci vzťah autora k pomenovanému faktu\n\n- stály prívlastok (epiteton constans)- tvorí s podstatným menom stabilné spojenie, vyskytuje sa v ľudovej slovesnosti, v antických a klasicistických eposoch\n\n- ozdobný prívlastok (epiteton ornans)- oživuje a konkretizuje podstatné mená, vnáša do deja statickosť, opisnosť, ale súčasne poetickosť\n\n**Básnický symbol:**\n\n- symbol je znak, ktorý splynul so svojím významom do vnútornej jednoty\n\n- vzniká na základe zaužívaného označenia\n\n- predstavuje tematickú metonymiu\n\n- v umeleckom texte patrí symbol k základným prostriedkom zobrazovania javov\n\n- slovo, ktoré označuje konkrétny predmet má aj abstraktný zmysel (napr. holubica- mier, srdce- láska, kríž- kresťanský symbol, čierna mačka- nešťastie, ľalia- nevinnosť, a pod.)\n\n**Symbolizmus:**\n\n- literárne a umelecké hnutie nastupujúce v 80. rokoch 19. storočia vo Francúzsku\n\n- vznikol ako reakcia na naturalizmus\n\n- základným prostriedkom na vyjadrenie abstraktného pojmu je symbol, ktorý má zvýrazniť viacvýznamovosť básnikovej výpovede\n\n- autori skutočnosť priamo nepomenúvali, ale využívali viacvýznamové náznaky, obrazy, nadradili ducha nad hmotu, podvedomie nad realitu\n\n- priniesol revolúciu v prozódii- priniesol voľný verš\n\n- symbolistická báseň je postavená na obraznosti, predstavivosti, na zmyslovom vnímaní skutočnosti\n\n- k zakladateľom patria **Charles Baudelaire** (zbierka Kvety zla) a **Jean Arthur Rimbaud** (zbierka Iluminácie)\n\n**Poukážte na vonkajšiu a vnútornú **kompozíciu sonetu** v ukážkach. Analyzujte symboly v tvorbe Ivana Krasku. Ivan Krasko: Topole- **symbolom sú *topole*- vyjadruje nimi smútok, pocit nepochopenia, osamelosť seba, aj ľudí na začiatku 20. storočia. (*topole* stoja osamotené a ošarpané uprostred šíreho poľa- tak ako nešťastný človek, okolo ktorého nie je nikto, kto by mu pomohol; hrdo prijíma rany osudu- tak ako *topole* musia znášať nápor vetra a mrazu)\n\n**Ivan Krasko: Otcova roľa- **tulák-* človek, ktorý sa po rokoch vracia domov, na *otcovu roľu, *ktosi blízky mu vyčíta, že nechal *starootcovskú pôdu* bez ochrancu; *dračie zubále *(z antických bájí)- ľudia verili, že zem, v ktorej sa objavia dračie zuby bude šťastná a prosperujúca.\n\n**Ivan Krasko: Otrok-** *otrok- *symbol poddaných- má spoločenské zameranie. Dielo je založené na symbole otroka, ktorému zneli v ušiach od detstva piesne neslobodnej, zotročenej matky. (*otrokom* je celý slovenský národ; napriek neustálemu útlaku sa *otrok *odmieta zbaviť svojej národnosti- teda podriadiť sa Uhorsku)\n\n**Ivan Krasko: Plachý akord-** *pár chladných rúk-* láska zostala nenaplnená, neopätovaná, *plachý akord-* súzvuk jeho pocitov- bojí sa o nich rozprávať. (bolelo by ho to)\n\n**Ivan Krasko: Zmráka sa-** *zmrákaním sa*, *chýlením sa k noci *symbolizuje plynúci čas svojho života- obraz spoločenskej situácie, postavenie slovenského národa- vyžaruje beznádej, smútok, pesimizmus.","number":8,"assignment":"**Zadanie č. 8**\n\nÚloha č. 1\n\n**Charakterizujte neohybné slovné druhy a ich špecifické vlastnosti. Nájdite v ukážke **Sonety *a *Zmráka sa*** predložky a spojky. Pomenujte jav, ktorý vznikol v predložkovom spojení: **...*zapadli vo zhone žitia ***a uveďte ďalšie príklady**.* V básni **Topole **v prvom dvojverší určite všetky slovné druhy.  Vo vetách rozlíšte slovný druh slova **ale**: **Viem, ale nepoviem. Ale už choď. Ale, daj mi pokoj**. **Nahraďte synonymami uvedené častice**: *obzvlášť, obdobne, bezpochyby, samozrejme.*\n\nÚloha č. 2\n\n**Vysvetlite pojmy: **sonet, epiteton, básnický symbol, symbolizmus**. Poukážte na vonkajšiu a vnútornú **kompozíciu sonetu** v ukážkach. Analyzujte symboly v tvorbe Ivana Krasku.**\n\nUkážky: *F. Petrarca*\n\n* W. Shakespeare*\n\n* I. Krasko*\n\n**Francesco Petrarca: Sonety pre Lauru**William Shakespeare: Sonety**\n\nSennuccio, priznám sa ti, aká náruživáAko zlý herec, ktorý na scéne\n\nláska ma trýzni, v akom žijem súžení.zabudol text, keď prišla naňho tréma,\n\nHorím a zožieram sa Laurou zmučenýalebo prehnal svoje nadšenie\n\nno stále taký, akým som bol odjakživa.a zrazu zistil, že hlas v hrdle nemá,\n\ntak i ja, plachý, zrazu nemám viet\n\nZdá sa mi pokorná, a predsa pyšná býva,a neviem lásku nahlas nazvať menom.\n\ntvrdá i zbožná, smutná – samé premeny: Zdá sa, že lásky vôbec vo mne niet -\n\njej krása raz je chladná a raz v plameni,a klesám pod ňou ako pod bremenom.\n\nraz býva krotká a raz rozmarná a divá.Nech oči za mňa všetko povedia\n\nvyslovia bez slov, čo je v srdci nové!\n\nTu sladko zaspievala, tu si sadla vstala,Veď hoci oči vravieť nevedia,\n\ntu pobehla, tu náhle zastavil ju strach,jazyk to nikdy lepšie nevypovie.\n\ntu svojím krásnym zrakom srdce prebodla mi,\n\nNauč sa čítať mlčanlivé hlásky!\n\ntu povedala slovko, tu sa usmievalaOčami počuť – to je múdrosť lásky.\n\na tu jej kvapla slza. V takých myšlienkach\n\nmi Láska ustavične rinčí okovami.\n\n**Ivan Krasko: Topole**Ivan Krasko: Zmráka sa**\n\nHej, topole, tie topole vysoké!Zmráka sa, stmieva sa, k noci sa chýli.\nOkolo nich šíre pole - -------------------------------------------\nČnejú k nebu veľké, čierneOd hory, od lesa tak plače kvíli...!\n- zrovna jako čiesi bôle -Výčitky neznámych duše sa chytia.\ntopole. ... Vyplniť nádeje nebolo sily –\nzapadli, zapadli vo zhone žitia...\n\nHej, topole, tie topole bez lístia!Oblaky nízko sú, tak letia, letia...!\nDuch jak čísi špatnej vôleŽaluje zúfale žaloby márne\nhrdo stoja ošarpané,ktos’ príliš úbohý z šíreho sveta,\nv mraze, vetre, nahé, holéže veril, že čakal, že starne, starne...\ntopole.\n\nHej, topole, tie topole bez žitia!Zmráka sa, stmieva sa. Zhora i zdola\nNemo stoja v úzkom kolehavrany veslujú do noci spešne...\n- prízraky sťa z nirvány by -ktos’ príliš úbohý o pomoc volá,\npozerajú v prázdno doledo tváre hádže nám spomienky hriešne...\ntopole. --------------------------------------------\nZmráka sa, pôjdeme... Noc je už spola.\nHej, tie hrdé, vysočizné topole!\nAko vzhľad ich duch môj zmizne...\nHore...? Dolu...? Do nirvány...?\n- Ako havran ošarpaný\ndo noci..."},"9":{"tema_jazyk":"Formy národného jazyka, nárečia","tema_lit":"Epos a časomiera","autori":["Homér","Ján Hollý","Ján Kollár"],"diela":["Odysea","Svätopluk","Slávy dcéra"],"okruh_jazyk":"Národný jazyk, dialekty","okruh_lit":"Klasicizmus - epos","full":"Úloha č. 1\n\n**Charakterizujte formy národného jazyka.** Vysvetlite pojmy: miestne nárečie, dobové nárečie a sociálne nárečie.  Národný jazyk- **je súhrn výrazových a významových prostriedkov, ktoré používajú ako nástroj myslenia a dorozumievania príslušníci jedného národa, alebo etnickej skupiny, pričom ich spája historická, spoločenská, kultúrna a politická spolupatričnosť. **Formy:**\n\n- **Spisovná forma (spisovný jazyk)- **je záväznou formou spisovného jazyka, ktorá sa používa na oficiálnej úrovni. Je to jazyk štátnych a iných dokumentov, jazyk používaný v školstve, v elektronických i tlačených médiách, v odbornej a zvyčajne aj umeleckej literatúre. Plní celospoločenskú funkciu.\n\n- **norma spisovného jazyka- **je súbor záväzných pravidiel ustálených predpismi. Stanovuje sa/kodifikuje sa v normatívnych príručkách. Až po kodifikácii sa stáva všeobecne platnou a spoločensky záväznou pre používateľov jazyka.\n\n- **dnešná podoba jazyka- **vrátane jeho normy je výsledkom stáročného historického vývinu. Jazykovedci jazyk analyzujú, skúmajú- nemôžu doňho vnášať nič, čo by v ňom nebolo (okrem pravopisu).\n\n- **Štandardná forma- **je taká forma jazyka, ktorá sa používa v bežnej komunikácii. Vyznačuje sa menej dôsledným dodržiavaním normy, ale toto nedodržiavanie normy“ nepociťujeme ako komunikačne rušivé. Rešpektuje gramatiku, ale porušuje niektoré zásady spisovnej výslovnosti, vyskytujú sa v nej: nespisovné väzby, skratkové slová, ktoré vznikajú spontánne,...\n\n- **Subštandardná forma- **je nespisovnou formou jazyka. Charakterizujú ju nespisovné výrazy, nesprávna výslovnosť. Jeho osobitnou zložkou sú **nárečia**.\n\n**Miestne nárečie- **nespisovný útvar národného jazyka, ktorého používanie je vymedzené na určitú oblasť územia štátu. Na Slovensku vyše 30.\n\n**Dobové nárečie-** je to nárečie používané v istom historickom období\n\n**Sociálne nárečie- je to nárečie používané rôznymi sociálnymi vrstvami- ako napr. slang, žargón, argot)\n\n**Vymenujte aspoň šesť miestnych (teritoriálnych) dialektov slovenčiny.**\n\nOravský dialekt, Gemerský dialekt, Hornonitriansky dialekt, Komárňanský dialekt, Turčiansky dialekt, Liptovský dialekt\n\n**Poznáte nárečie vášho regiónu? Uveďte príklady a povedzte nám daný text nárečím**: *Gazda už nerobil v lese**. Zhotovil peknú plť, ktorú spustil na Kysucu a hneď rozmýšľal, či dnes alebo zajtra sa vydá na cestu, koľko zarobí, koho si zoberie so sebou... Toľko starostí mal s novou prácou.*\n\n**Skalitské** nárečie:**\n\n*gymba*- ústa\n\n*šasnuč*- spadnúť\n\n*huškacka*- hojdačka\n\n*švynto*- sviatok\n\n*vyndžič*- údiť\n\n*pajšle*- pľúca\n\n*jedzyne*- jedlo\n\n*štuchanki*- zemiaková kaša\n\n*peľucha*- plienka\n\n*pigľajs*- žehlička\n\n*štrynfľa*- ponožka\n\n*zoglovek*- vankúš\n\n*koľypka*- kolíska\n\n*šyň*- predsieň\n\n*gvuždž*- klinec\n\nGazda už nerobel v ľese. Zhotovel si peknú plť, kerú spustel na Kysucu a včuľ hutal, či neska, aľebo zajtra sa vydá na cestu, keľo zarobí, keho si zebere ze sebu... Teľo starostí mal s novú prácu.\n\nÚloha č. 2\n\n**Vysvetlite **znaky eposu a p**orovnajte epos Odysea a epos Svä**topluk.  Epos:**\n\n- dielo širšieho rozsahu, epická veršovaná skladba\n\n- často vychádzajú z gréckej mytológie- do dejov zasahujú bohovia, ktorí sú nesmrteľní, a konajú ako ľudia\n\n- hlavné postavy sú výnimoční hrdinovia, nositelia príbehu\n\n- obsahuje veľa opisov a lyrických zložiek, ako sú spevy/kapitoly\n\n- **druhy: **bohatiersky, historický, komický, zvierací, duchovný, moderný\n\n**Homér: Odysea**\n\n- starogrécky hrdinský epos (patrí k nemu epos Illias)\n\n- **hlavné postavy:**\n\nOdyseus- bol veľmi silný, múdry; vyznamenal sa i tým, že dal pod hrdbami Tróje postaviť obrovského dreveného koňa (ukryli sa doňho achájski bojovníci, a takto dobyli a zničili hrdinské mesto)\n\nPenelopa- krásna a milujúca manželka, ktorá večne dúfala, že sa Odyseus vráti (aj keď tomu už sama prestávala veriť)\n\nTélemachos- syn Odysea; bol spravodlivý a odvážny, avšak bol príliš mladý a neskúsený na to, aby prevzal vladárske kreslo.\n\n- **dej: **Odyseus, ktorý upadol do nemilosti boha Poseidóna blúdi svetom a prežíva najrôznejšie príhody. Zostúpi do ríše mŕtvych, aby sa stretol s duchom Achilla- pretože chce od neho radu, ako premôcť nepriazeň bohov. Chce sa vrátiť na rodnú Itaku. Nakoniec sa mu to darí a za pomoci svojho syna Télemachosa sa dostane do kráľovského paláca, zabije všetkých nápadníkov svojej ženy Penelope a znova sa ujíma vlády.\n\n**Ján Hollý: Svätopluk**\n\n- historický/národný epos (Hollý ho napísal pre pozdvihnutie kultúry Slovákov)\n\n- hrdina v ňom je zidealizovaný (kvôli pozdvihnutiu národa)\n\n- **dej:**\n\n- **spev**- Svätopluk je v žalári, kam ho dali Nemci- lebo ho podozrievali. Prosí Boha o vyslobodenie. Je vypočutý, Boh posiela svojho posla ku Karolmanovi, aby Svätopluka prepustil. Svätopluk je pepustený + Karolman sa mu rozhodne dať Rastislavovu krajinu za istých podmienok.\n\n- **spev**- krajina sa chystá na vojnu, ktorá sa blíži.\n\n- **spev**- Černoboh- symbol diabla sa hnevá na Svätopluka, že dal spáliť jeho modlu a vystupuje z pekla. Premení sa na kňaza a navádza ľud- ten je však poučený od Konštantína a Metoda o pravom náboženstve (vysmieva ho). Černoboh kuje pomstu.\n\n- **spev**- Černoboh prichádza na Devín k Slavomírovi a berie na seba Rastislavovu podobu. Vo sne mu vykresľuje, aká hrôza ho čaká, keď sa dostane Svätopluk na trón. Černoboh zvolá svojich druhov a burcujú Slovanov k hnevu a zlosti.\n\n- **spev**- Ľudomír sa vracia domov, Slavomír mu oznamuje, čo mu vyjavil Rastislav vo sne. Svätopluk tiahne proti ním- chcú s ním ísť do vojny.\n\n- **spev**- báj o príchode Slovanov do Európy, ich zvyky, spôsob života.\n\n- **s**pev**- Karolman dáva Svätoplukovi pre neho kovanú výzbroj, Svätopluk ide za vojskom.\n\n- **spev**- Černoboh vidí, že vojsko sa blíži k Devínu, a tak burcuje svojich druhov, aby im postavili prekážku- čo sa aj stane. Svätopluk tiahne s Nemcami. Vojská bojujú. Svätopluk nenápadne berie polovicu svojho vojska a napáda Slovákov z boku- tí sa vystrašení utiahnu na Devín.\n\n- **spev**- Svätopluk je s Nemcami, lebo nemal na výber- inak by zostal v žalári do smrti. Prichádza za Slavomírom na Devín a chce, aby ho vyhlásili za kráľa- odmieta, že radšej všetci umrú. Svätopluk im vykresľuje svoju ťažkú situáciu. Všeslav navrhne, nech sa Svätopluk vráti k Slovanom a stane sa ich kráľom- všetci súhlasia. Rozzúrení Nemci tiahnu na Devín.\n\n- **spev**- boje na Devíne. Slováci sú odvážni, Nemci nakoniec prehrávajú a tiahnu napäť.\n\n- **spev**- Černoboh vyčíňa a tak Konštantín prosí Boha, aby ho poslal naspäť do pekla. Boh pomôže, zosiela Michala. Svätopluk posiela zvedov k Nemcom, aby zistil ich plány. Tí sa vracajú s tým, že Nemci budú ráno pripravení bojovať.\n\n- **spev**- Ešte ani slnko nevyšlo, už sa vojská stretávajú a bojujú. Svätoplukove vojsko začína vyhrávať a preto Nemec Britwlad vyzýva na súboj Svätopluka. Svätopluk ho poráža a potom vytvára veľké kráľovstvo Slovákov.\n\n**Analyzujte ukážku od Jána Kollára: Slávy dcéra (**Předspěv**) a stručne vysvetlite princíp časomiery. Ján Kollár: Slávy dcéra**\n\n- skladá sa z predspevu a 5 spevov\n\n- vyjadruje žiaľ nad osudom Lužických Srbov (Slovania žijúci v Nemecku a zároveň im predpovedá slávu v budúcnosti)\n\n- hlavnou postavou je Mína (Frederika Schmidtová), ktorú Kollár spoznal na štúdiu v Jene\n\n- skladba obsahuje **romantické** (láska), aj **klasicistické** (vlastenectvo) prvky\n\n- **dej:**\n\n- **spev** (SÁLA)- **ľúbostné sonety, sľubujú si s Mínou vernosť\n\n- **spev** (LABE RÉN VLTAVA)- **prechádza na Slovanské územie (ČR) a žiali nad tým, že sú komandovaní Nemcami. Vzbudzuje nádej a vieru v lepšiu národnú budúcnosť, spomína na Mínu (so žiaľom- je ďaleko).\n\n- **s**pev** (DUNAJ)- **hovorí o utrpení slovenského národa a nápravu vidí v spojení s ostatnými slovanskými štátmi.\n\n- **s**pev** (LÉTHE)**- je slovanské nebo, básnik tu necháva vchádzať vlastencov, sprevádza ho Mína, ktorá sa premenila na vílu.\n\n- **s**pev** (ACHERON)**- peklo- sú tu neprajníci Slovanov.\n\n**Časomerný veršový systém:**\n\n- je založený na striedaní dlhých a krátkych slabík\n\n- základnou jednotkou v časomiere je **móra** (pričom jedna móra zodpovedá krátkej slabike [značíme „—“], a dve móry zodpovedajú dlhej slabike [značíme „U“])\n\n- **časomerné stopy:**\n\n- trochej („—U“)\n\n- daktyl („—UU“)\n\n- jamb („U —“)\n\n- spondej („— —“)\n\n- na Slovensku sa vyskytuje hlavne v klasicistických dielach (napr. Ján Kollár: Slávy dcéra)","number":9,"assignment":"**Zadanie č. 9**\n\nÚloha č. 1\n\n**Charakterizujte formy národného jazyka.** Vysvetlite pojmy: miestne nárečie, dobové nárečie a sociálne nárečie.  Vymenujte aspoň šesť miestnych (teritoriálnych) dialektov slovenčiny.  Poznáte nárečie vášho regiónu? Uveďte príklady a povedzte nám daný text nárečím**: *Gazda už nerobil v lese**. Zhotovil peknú plť, ktorú spustil na Kysucu a hneď rozmýšľal, či dnes alebo zajtra sa vydá na cestu, koľko zarobí, koho si zoberie so sebou... Toľko starostí mal s novou prácou.*\n\nÚloha č. 2\n\n**Vysvetlite **znaky eposu a porovnajte epos Odysea a epos **Svatopluk**.  Analyzujte ukážku od Jána Kollára: Slávy dcéra (**Předspěv**) a stručne vysvetlite princíp časomiery.**\n\nUkážky*: Homér – Odysea*\n\n* Ján Hollý – Svätopluk*\n\n* Ján Kollár – Slávy dcéra*\n\nHomér: Odysea (úryvok)\n\nHovor mi Múza, o bystrom mužovi, ktorý sa veľa\n\nnablúdil po šírom svete, keď vyvrátil posvätnú Tróju,\n\nuvidel mestá a spoznal zmýšľanie premnohých ľudí,\n\nvo svojom srdci vytrpel na mori preveľa strastí,\n\nchcejúc si zachrániť život a druhom umožniť návrat.\n\nTúžil nesmierne po tom, no nemohol uchrániť druhov,\n\ntí totiž zhynuli pre svoju spupnosť a slepotu ducha,\n\nhlupáci biedni, keď jedli dobytok Hélia, syna\n\nHyperióna, a tento im zmaril deň návratu domov.\n\nZ tohto niečo povedz aj nám, ó, Diova dcéra!\n\n................\n\nOzrutný Polyfémos im na to zas z jaskyne riekol:\n\n„Nikto ma, priatelia, vraždí a ľsťou, nie silou ma vraždí.“\n\nNa to mu oni zas v odpoveď riekli perutné slová:\n\n„Ak si v jaskyni sám a nikto ti ublížiť nechce,\n\nZeus iste na teba chorobu zoslal, tej ale ťa nik z nás\n\nnezbaví. Pekne sa pomodli k otcovi, vládcovi mora!\n\nRiekli a odišli preč. Mne srdce sa zasmialo milé,\n\nAko som šikovne výmyslom oklamal všetkých.\n\n**Ján Kollár: Slávy dcéra  * **Předs**pěv** (úryvok)* Aj, **zde** leží zem ta **před okem mým** slzy **ronícím**, někdy kolébka**, **nyní** národu **mého rakev**.**\n\nStúj, noho! posvátná místa jsou, kamkoli kráčíš,\n\nk obloze, Tatry synu, vznes se, vyvýše pohled,\n\nneb raději k velikému přichyl tomu tam se dubisku,\n\njenž vzdoruje zhoubným až dosaváde časúm.\n\nVšak času ten horší je člověk, jenž berlu železnou\n\nv těchto krajích na tvou, Slávie, šijí chopil.\n\nHorší nežli divé války, hromu,ohně divější,\n\nzaslepenec na své když zlobu plémě kydá.\n\nÓ věkové dávní, jako noc vukol mne ležící,\n\nó krajino, všeliké slávy i hanby obraz!\n\n......\n\nSám svobody kdo hoden, svobodu zná vážiti každou,\n\nten kdo do pout jíma otroky, sám je otrok.\n\n*** Labe, **Rén**, Vltava (úryvok**)\n\n 328\n\nStokrát jsem mluvil, teď už křičím\n\nk vám, o rozkydaní Slávové!\n\nBuďme celek a ne drobtové,\n\nbuďme svorně všecko aneb ničím.\n\nNárodem nás zovou holubičím\n\nnež, aj holuby jsou takové,\n\nže milují hejno spolkové,\n\n i vám tedy vlastnost tuto žičím.\n\nSlávové, vy národ mnohohlavý!\n\nMoudří horší smrti neznají,\n\nnež je život hnilý, prázdný, tmavý.\n\n**Ján Hollý: Svätopluk (úryvok)**\n\n*Prvý spev*\n\nSpívám, jak hroznú Svatopluk na Karolmana védel\n\nvojnu; i jak víťaz, seba aj svój od jeho vlády\n\noslobodiv národ, nepodlehlý stal sa panovník;\n\na zmužilých veľké založil kráľovstvo Slovákov.\n\nUmko milá, jestliž mne si v mých kedy prispela pesňach,\n\nvčil najvác prispej na pomoc; tebe všecky ti dobre\n\nznámí sú bojové, ponevač sama buďto na Bílých\n\nnekde horách, buď nad Kobylú, v tvém bydle sedícá,\n\naj na Devín, aj na hrozné mohla vojska si patriť.\n\nTehdy ma už ponadýchni; mysel tvým zjasni mi svetlom\n\na všelikú rozplaš tmu,abych tak hodne o týchto,\n\nod žádného ze všech posaváď až veščca nereklých,\n\nprospevoval pótkách a Svatopluka z mrákot i smutnéj\n\nvazby na královskú hodnosť a na prestol uvédel.\n\n*Šiesty spev*\n\nTak v sile už veľkí, tak počtem bývali hojní,\n\nnež boju a všelikéj hrozní nepráteli války.\n\nNikdy aniž sa do súsedných nezamíšali búrek,\n\nlútých vražd a preukrutných nevyvádzali mordov,\n\nne škaredých lúpež, ne ohavných ludstva koristí.\n\nRadšej vždycky pokoj milující žíjali všecci\n\nmezi sebú rovní a obecné mávali všecko,\n\naj straty aj všelijaké obsahlé prácami zisky.\n\nVlastnú rídil otec svornú sám toľko čeládku,\n\nsám rodu bol králem, sám jak hlava, zákony dával.\n\nTak pre svú k pokoju sklonnosť a pre války nenávisť\n\nprez množší vekov obchod i stred rozbúreň ohavných,\n\npohromy a zhubných, jakové potkávali inšé\n\nnárody lúpežné, prázní bývávali náhod\n\na vlastním verní zostávali vždycky sedliskám.","supplementary":[{"question":"Charakterizujte formy národného jazyka","answer":"**Národný jazyk** je súhrn všetkých jazykových prostriedkov, ktoré používa určitý národ. Delí sa na **spisovnú formu** a **nespisovné formy**.\n\n**1. Spisovná forma národného jazyka**\n- **Najvyššia kultivovaná forma** jazyka.\n- Má **kodifikované normy** - pravidlá pravopisu, výslovnosti, gramatiky, slovnej zásoby (Pravidlá slovenského pravopisu, Krátky slovník slovenského jazyka).\n- **Záväzná** vo verejnom styku, školstve, médiách, úradoch, literatúre.\n- Tri **štýly** spisovnej formy:\n  - **úradný (administratívny)**\n  - **odborný (vedecký)**\n  - **publicistický**\n  - **umelecký**\n  - **rečnícky**\n  - **hovorový** (hranica medzi spisovným a nespisovným)\n\n**2. Nespisovné formy národného jazyka**\n\n**a) Nárečia (dialekty)**\n- Územne vymedzená forma jazyka.\n- Slovenčina má 3 hlavné nárečové skupiny:\n  - **západoslovenské** (Trnava, Trenčín)\n  - **stredoslovenské** (Banská Bystrica, Zvolen) - základ spisovnej slovenčiny\n  - **východoslovenské** (Prešov, Košice)\n\n**b) Sociolekty (sociálne nárečia)**\n- Jazyk používaný určitou sociálnou skupinou.\n- Druhy:\n  - **slang** - jazyk povolaní, záľub (študentský, IT, športový)\n  - **argot** - jazyk uzavretých skupín (väzni, podsvetie) - utajovacia funkcia\n  - **profesionalizmy** - odborný slang pracovníkov\n\n**c) Hovorový jazyk**\n- Polooficiálna forma, používaná v bežnom styku.\n- Spojnica medzi spisovným a nárečovým prejavom.\n\n**Vzájomný vzťah foriem:**\n- Spisovná forma vznikla z nárečia (zo stredoslovenského - Štúr 1843).\n- Vplývajú na seba navzájom - nárečové slová prenikajú do spisovnej (napr. „šuhaj\", „dievča\")."}]},"10":{"tema_jazyk":"Publicistický štýl a jeho žánre","tema_lit":"Vnútorný monológ","autori":["Milo Urban","Janko Jesenský","Romain Rolland"],"diela":["Jašek Kutliak spod Bučinky","Koniec lásky","Peter a Lucia"],"okruh_jazyk":"Sloh - publicistický štýl","okruh_lit":"Moderná próza - vnútorný monológ","full":"Úloha č. 1\n\n**Charakterizujte **publicistický štýl a jeho žánre. **Vysvetlite, čo sa nachádza na prvej strane novín alebo časopisov.  Publicistický štýl:**\n\n- je objektívno- subjektívny jazykový štýl, s ktorým sa denne stretávame v **ústnej** (rozhlasová a televízna publicistika) a **písanej** (noviny, časopisy, týždenníky, a pod.) podobe\n\n- je to hybridný štýl- využíva prostriedky viacerých štýlov (napr. umelecký, hovorový- v závislosti od použitého útvaru)\n\n- **znaky:**\n\n- **informatívnosť- **dominuje spravodajská funkcia, **cieľ: **sprostredkovať verejnosti informácie.\n\n- **aktualizovanosť**- **časová a priestorová určenosť udalosti (Kto? Čo? Kedy? Kde? Ako? Prečo?).\n\n- **verejnosť- **útvary sú adresované širokej verejnosti, preto majú byť čo najjednoduchšie; náročnosť obsahu, i formy sa prispôsobuje priemernej vzdelanostnej úrovni obyvateľstva.\n\n- **monologickosť- **pri tomto type komunikácie chýba autorovi spätná väzba; nemá bezprostrednú reakciu adresáta, musí predpokladať, ktoré údaje sú dôležité.\n\n- **variabilnosť- **bohatstvo tém, kompozičná pestrosť, grafická úprava, rozmanitosť jazykových prostriedkov.\n\n- **p**ísomnosť**- **vzťahuje sa iba na elektronické a tlačené média; osobitné členenie textu, sústredenie sa na fakty.\n\n- **žánre:**\n\n- **spravodajské- **ich cieľom je objektívne, vecne, pohotovo a zrozumiteľne informovať. **Patria tu: správa, interview, riport, komuniké, rezolúcia, referát, inzerát, reklama, plagát.\n\n- **analytické- Patria tu:** úvodník, komentár, recenzia, posudok, kritika, diskusia, glosa, pamflet, karikatúra, polemika.\n\n- **beletristické- Patria tu: reportáž, fejtón, črta, stĺpček, besednica\n\n**Prvá strana novín/časopisov:**\n\n- názov novín/časopisu\n\n- dátum vydania\n\n- ročník\n\n- cena\n\n- časti niektorých článkov, ktorým sa venujú vnútri\n\n- reklama\n\n**Poukážte na význam médií v súčasnosti a v minulosti. **\n\n- **v minulosti**- mala prístup k médiám len úzka vrstva obyvateľstva (bola iba tlač)\n\n- **v súčasnosti- **sa význam médií zvyšuje a vznikajú aj nové formy médií (od konca 20. storočia- súvisí to s rozvojom počítačov)\n\n- za typických predstaviteľov nových médií sa považujú aj mobilné telefóny, rôzne bezdrôtové technológie, GPS, internet (blogy, a pod.)\n\n**Aké publicistické žánre by mal obsahovať školský časopis **GONg**? Navrhnite, čo by obsahoval váš príspevok pod názvom **Lesk a bieda študentského života.*\n\n- **Mal by obsahovať:** reportáže zo školských podujatí, správy, oznámenia, komentáre k udalostiam a situácii v škole, editoriál, glosy a fejtóny, recenzie na nové knihy, hudbu filmy, zaujímavé interview s profesormi,...\n\n- **Lesk a bieda študentského života:** rady na vypĺňanie prihlášky, rady na zvládanie stresu, reportáž o organizovaní stužkovej, alebo o zháňaní rôznych materiálov,...\n\nÚloha č. 2\n\n**Vysvetlite podstatu a funkciu **vnútorného monológu** v ukážkach**.\n\n**Vnútorný monológ- **iba myslený, nahlas nevyslovený prehovor postavy. **Charakterizuje** spontánny tok myšlienok, ktorý umožňuje čitateľovi pochopiť vnútorné pohnútky postavy pred nejakým činom, alebo po ňom. **Môže obsahovať** aj myšlienky postavy o vzťahu k priateľovi, známemu, a pod. Vnútorný monológ **sa môže vyjadriť** polopriamou rečou, nevlastnou priamou rečou, niekedy aj priamou rečou.\n\n**Porovnajte ukážky a nájdite spoločné znaky a odlišné spôsoby zobrazenia v dielach. Určite druh rozprávača, porovnajte autorovu koncepciu postavy.  Milo Urban: **Jašek Kutliak** spod **Bučinky**\n\n- Urbana zaraďujeme do slovenskej literatúry v medzivojnovom období (kritický realizmus)\n\n- ľudia v jeho dielach sa vedia vyjadriť skôr činom než slovom\n\n- je expresionista a využíva to aj v tomto diele- zaujíma ho , čo prežíva Slovenský človek\n\n- napísal román: Živý bič\n\n**Téma: **vzťahy dvoch ľudí\n\n**Miesto: **dedina\n\n**Postavy:**\n\nJašek Kutliak- horár, mocný a navonok tvrdý dedinský muž, pracovitý, slušný, vo vnútri veľmi citlivý (ani srnku nechce viac zabiť), ale svoje city nedáva navonok.\n\nHanka Stašová- jeho žena\n\nVlček- sused\n\n**Dej: **Horár Jašek sa ožení s Hankou, do ktorej sa úprimne zamiluje, ale manželstvo nie je šťastné. Hanka začína byť ľahostajná. Narodí sa im syn Jožko, ale nič sa tým nemení. Jašek začína piť, hoci predtým nikdy nepil. Keď sa vracia domov, takmer zamrzne po ceste. Keď príde domov, Hanka ho vyháňa z domu a na otázku, či ho má rada mu neodpovedá. Jašek pobozká ženu aj syna a odíde von, kde pri plote zmrzne. Ráno ho Hanka nájde a je ľahostajná.\n\n**Rozprávač: **vševediaci\n\n**Literárny žáner:** novela\n\n**Janko **Jesen**s**ký**: Koniec lásky**\n\n- Jesenského zaraďujeme do obdobia literatúry 20. a 21. storočia (literárnej moderny)\n\n- bol povolaním právnik\n\n- vykresľuje vlastnosti človeka z hľadiska jeho spoločenského zaradenia, zobrazuje malomeštiactvo\n\n**Téma: **mladý človek žijúci v meste, končiaca sa láska\n\n**Miesto:** ples\n\n**Čas:** jeden večer, retrospektíva, rôzne usporiadané udalosti (ako mu prúdili hlavou)\n\n**Postavy:**\n\nMiloš Krátky- muž z mesta, z ktorého vyprchalo chvíľkové opantanie ženou; má pred sebou nepríjemnú úlohu- povedať jej, že ju už viac neľúbi\n\nElena\n\n**Dej: **Miloš si spomína na obdobie, keď bol zamilovaný do Eleny. Teraz ju už nechce, jej správanie mu prekáža, chce sa s ňou rozísť. Dej je realizovaný len cez vnútorné monológy autora. V závere sa rozhodne pre rozchod. (opis vzďaľujúceho sa bodu- už ju viac nestretne)\n\n**Rozprávač:** autorský\n\n**Literárny žáner:** poviedka\n\n**Porovnanie Milo Urban: **Jašek Kutliak** spod **Bučinky**/Janko **Jesenský**: Koniec lásky**\n\n- **spoločné znaky: **obe zobrazujú vzťah dvoch ľudí, nešťastnú lásku, ukončený vzťah; hlavné postavy sú muži- v oboch prípadoch nazeráme do ich vnútorného sveta; využívajú vnútorné monológy (dôležitú úlohu zohrávajú pocity hrdinov); na začiatku oboch vzťahov nadšenie a opantanie- postupne opadá.\n\n- **odlišné znaky: **dedina/mesto; manželstvo- končí tragicky (smrťou Jašeka)/iba spolu chodia- rozídu sa; **Jašek Kutliak**- personifikovaná príroda, expresívny jazyk/**Koniec lásky**- náladový opis, mestské prostredie, modernizácia spoločnosti\n\n**Romain Rolland**: Peter a Lucia**\n\n- zaraďujeme ho do medzivojnového obdobia Francúzskej literatúry\n\n- držiteľ Nobelovej ceny, humanista,\n\n- využíva lyrizáciu a metaforizáciu reči\n\n- hrdina- kráča za nadosobnými cieľmi, vie sa obetovať za veľkú vznešenú myšlienku (kvôli víťazstvu je ochotný podstúpiť utrpenie)\n\n**Téma:** príbeh lásky dvoch mladých ľudí, ktorá je odkázaná na zánik\n\n**Miesto:** Francúzsko (Paríž)\n\n**Čas:** streda večer (30. januára) – Veľký piatok (29. marca) 1918- prvá svetová vojna\n\n**Postavy:**\n\nPeter- 18 ročný, neveriaci; pochádza z meštiackej rodiny, veľmi citlivý, neskúsený, plný otázok, nechápe vojnu, je pesimista; zamiluje sa do Lucie, s ktorou sa snaží zabudnúť na vojnu\n\nLucia- 18 ročná amatérska maliarka, maľuje aby prežila, je polosirota, realistka; zmyslom jej života je láska; miluje život, citlivá, nežná, milá; v mysli si zariaďuje byt\n\nFilip- Petrov brat, bojuje vo vojne- vracia sa domov zmenený; vojna mu zobrala jeho plány do budúcnosti, všetko stratil (stratená generácia)\n\n**Dej: **Zobrazenie vnútorných svetov Petra a Lucie, ich názorov a beznádeje, konflikty s rodičmi, strach z odvedenia na front. Dielo končí tragicky- keď sa na nich zvalí mohutný pilier v kostole.\n\n**Rozprávač:** vševediaci\n\n**Literárny žáne**r:** psychologická novela","number":10,"assignment":"**Zadanie č. 10**\n\nÚloha č. 1\n\n**Charakterizujte **publicistický štýl a jeho žánre. **Vysvetlite, čo sa nachádza na prvej strane novín alebo časopisov.  Poukážte na význam médií v súčasnosti a v minulosti.  Aké publicistické žánre by mal obsahovať školský časopis **GONg**? Navrhnite, čo by obsahoval váš príspevok pod názvom **Lesk a bieda študentského života.*\n\nÚloha č. 2\n\n**Vysvetlite podstatu a funkciu **vnútorného monológu** v ukážkach**.\n\n**Porovnajte ukážky a nájdite spoločné znaky a odlišné spôsoby zobrazenia v dielach. Určite druh rozprávača, porovnajte autorovu koncepciu postavy. **\n\nUkážky: *M. Urban – **Jašek Kutliak** spod **Bučinky*\n\n* J. **Jesenský** – Koniec lásky*\n\n* R. **Rolland** – Peter a Lucia*\n\n**M. Urban – **Jašek Kutliak** spod **Bučinky**\n\nJašek Kutliak bol chlapisko: vysoký, mocný ako buk. Úzky horský chodník sa triasol pod jeho strunistým krokom. Keď zaujúkal, v štyroch dolinách sa mu ozvalo. A nebolo – nebolo strelca na neho. Keď priložil pušku k lícu, keď výstrel zadunel ponad šíre hory, cválajúci jeleň sa vzopäl, zaryčal, vyvalil krvou podbehnuté oči, i padal sťa balvan dolu strmým svahom.\n\nKutliak sa usmial. Oči mu svietili radosťou, vzrušením. Ale keď videl dokonávajúce zviera, ranu a krv – zosmutnel. Ľúto mu bolo, že ho zabil.\n\nZajaca zložil v najrýchlejšom behu, zostrelil kaňu, keď sa vznášala medzi plavými oblakmi ako tmavá bodka, sluku na súmraku trafil ako nič. Taký on bol strelec. Nemal páru. Ale srnu... Jednu jedinú zastrelil, a ešte i nad tou sa tvrdo zaprisahal, že na srnu už nikdy nezdvihne pušku.\n\n**Janko **Jesenský**: Koniec lásky**\n\nPovstal som z miesta a Elena podišla ku mne. Aby som videl, pohol som sa a otvoril dvercia na peci. Hľa, ona žiada, a to hlasne, aby sa jej nestránil, aby bol vždy pri nej. To je to, čo mi ju sprotivilo… Nie, ja ju nerád… Aká je dlhá! Všetko na nej je dlhé a tenké. Tvár, hrdlo, driek, ruky, dlane, prsty. I jej hlas je zdĺhavý a plačlivý. Belasá toaleta so stužkami… Načo prišla?…\n\n„Ja sa nerada hrám,“ povedala, „povedzte rovno! Všetci zbadali, že sa ma tak stránite. Čo som vám urobila?“\n\n„Čo ste mi urobili? Nič.“\n\n— Ako hovorí, ani čoby ja musel vždy pri jej boku stáť! — prelietlo mi mysľou. — Nerada sa hrá! Nároky vidno. Ech, musím jej povedať všetko… Keby sa teraz tak nahol ku jej tvári. Neušla by, mohol by to urobiť, neušla by.\n\nAle ja som jej vtedy ani ruku podať nemohol. Čosi ma odstŕkalo. Stála predo mnou a ja som sa díval popri jej hlave niekam do kúta, chladno, bez rozochvenia.\n\n„Neberte ma vážne,“ riekol som ticho a vrátil sa ku peci.\n\n— Teraz je koniec všetkému, — myslel som si.\n\nZazdalo sa mi, že sa jej oči zakalili. Pozrel som ešte raz v jej stranu. Odišla. Ja som tomu potom neveril. Pre mňa by ona zaplakala? Je mladá a pekná. Nájdu sa iní. U nej je tak, ako u ostatných.\n\nNa obloky fŕkal hnusný zimný dážď. Von všetko skryté v tmavej, nepriehľadnej noci, ani jedinkého svetlého bodu. Smutne i tam, i tu… Ani čoby nič nezaujímalo dušu. Svet prázdny, bez radosti… Kde si, tichá, bojazlivá Elena so svetlými vlasmi a smutnými očami? Kde je tebou vyčarovaný svet nezapomenuteľných pocitov? Strácaš sa ako vták na jasnom nebi, letiaci do diaľky, vždy menší a menší…drobný bod…i on mizne… S tebou sa viacej nestretnem.\n\n**Romain Rolland**: Peter a Lucia**\n\n- Poďme domov! - riekla Lucia, zachvátená akousi posvätnou hrôzou.\n\nŤahala ho.\n\n- Lucia, však ma nenecháš odísť z tohto života, prv než...?\n\n- Ó, Bože! - riekla Lucia, stískajúc mu ruku. - Pomyslenie na to by bolo horšie ako smrť!\n\n- Ty moja láska! - riekli si obidvaja.\n\nZnovu sa zastavili.\n\n- Kedy budem tvojím? - spýtal sa Peter. (Nebol by sa opovážil spýtať:„Kedy budeš mojou?\")\n\nLucia si to všimla a dojalo ju to.\n\n- Drahý môj, - odvetila mu... - Čoskoro! Nesúr! Netúžiš potom väčšmi ako ja!... Zostaňme ešte nejaký čas takto... Je to také krásne!...Ešte tento mesiac, až do konca!...\n\n- Do Veľkej noci? - spýtal sa.\n\n(Veľká noc bola tohto roku posledného marca.)\n\n- Áno, do Vzkriesenia.\n\n-Ach! - zvolal Peter. - Pred Vzkriesením je vždy smrť!\n\n- Mlč! - riekla a umlčala mu ústa svojimi ústami.\n\nPustili sa.\n\n- Dnes večer bolo naše zasnúbenie, - povedal Peter.\n\nIdúcky v tme, opierajúc sa druh o druha, v rozcítení temer tíško plakali.\n\nPod ich krokmi škrípali rozbité obločné tabule a dlažba akoby bola krvou zrosená. Okolo ich lásky chúlila sa smrť a noc. Lež nad ich hlavami ako v magickom kruhu, nad ráztočinou dvoch čiernych múrov úzkej ulice, zbiehajúcich sa komínovite, kdesi vysoko v lone nebies, bilo srdce hviezdy...\n\nA hľa! Hlasy zvonov spievajú, svetlá sa zapaľujú a ulice ožívajú!\n\nVzduch je slobodný, bez nepriateľov, Paríž dýcha. Smrť kdesi unikla."},"11":{"tema_jazyk":"Verbálna a neverbálna komunikácia","tema_lit":"Komédia (veselohra)","autori":["Ján Palárik","Molière"],"diela":["Zmierenie alebo Dobrodružstvo pri obžinkoch","Lakomec"],"okruh_jazyk":"Sloh - komunikácia","okruh_lit":"Klasicizmus - komédia","full":"Úloha č. 1\n\n**Porovnajte verbálnu a neverbálnu komunikáciu**. Vysvetlite druhy **neverbálnej komunikácie*.** Aký význam majú vo všeobe**cnosti gestá **spolužiak**a, učiteľa, policajta**. Verbálna komunikácia:**\n\n- predstavujú ju jazykové prostriedky reči [jazyk môže mať hovorenú, alebo písanú (grafickú) podobu], ktoré sú najdôležitejším prostriedkom odovzdávania informácii\n\n- naša reč musí byť: konkrétna, jasná, zrozumiteľná\n\n- rozsah slovnej zásoby závisí od veku, vzdelania, temperamentu, pracovného zaradenia, pohlavia komunikantov, a pod.\n\n- výber slov a schopnosť komunikovať súvisí s témou rozhovoru, situáciou a tiež vlastnosťami účastníkov rozhovoru\n\n- **najčastejšie používané formy ústnej jazykovej komunikácie:**\n\n- **monológ- **je samostatný prehovor osoby (opak dialógu). V umeleckej literatúre ním postava vysvetľuje niektoré súvislosti, resp. reaguje na konkrétnu situáciu v „deji.“\n\n- **vnútorný monológ- **je špecifická výpoveď osoby, ktorú táto adresuje sama sebe. Zachytáva myšlienky človeka vo chvíli ich zrodu, t. j. v ich prvotnej, ešte jazykovo nespracovanej podobe.\n\n- **dialóg- **je rozhovor medzi dvoma, alebo viacerými osobami. Musí mať aspoň 2 repliky.\n\n- **replika- **je základná jednotka dialógu. Je to relatívne uzavretá jednotka, ktorá reaguje na predchádzajúci prehovor, resp. navodzuje ďalšie pokračovanie rozhovoru. Ide o prehovor jednej osoby, alebo literárnej postavy.\n\n**Neverbálna komunikácia:**\n\n- predstavujú ju mimojazykové prostriedky [ide o všetko, čo reč (slová) sprevádza]\n\n- podporuje verbálnu komunikáciu a je dôležitá najmä pri prejavovaní emócií, ovplyvňovaní postojov a vytváraní dojmov\n\n- neverbálne prejavy sú spontánne, ťažko ovládateľné, väčšinou nezámerné sú dôveryhodnejšie\n\n- **do neverbálnej komunikácie zaraďujeme: **\n\n- **zrakový kontakt- **vzájomné pohľady, pohľady bokom, druh pohľadu, uhýbanie pohľadom a pod.\n\n- **mimika- **hlavne pohyby očí, úst, tváre, a pod.\n\n- **kinetika- **celkové pohyby tela, chôdza, postoj, a pod.\n\n- **gestika**- **gestá, hlavne pohyby rúk, posunky, a pod.\n\n- **iné znaky- **dotyky, objatie, podávanie ruky, intonácia, účes, úprava, oblečenie, písmo, a pod\n\n**gestá spolužiaka- **dorozumievanie sa s ľuďmi rovnakej vekovej skupiny (rôzne signály, tajnosti,...)\n\n**gestá učiteľa- **napr. pomôcka pri vysvetľovaní učiva žiakom,...\n\n**gestá policajta**- rôzne signály (napr. na zastavenie vozidla pri prekročení rýchlosti), ako signály pri riadení dopravy (ukazuje kedy máme ísť, stáť, pridať, spomaliť,...)\n\n**Priraďte k uvedeným zónam vzdialenosť a dvojicu **komunikantov**: sociálna zóna, osobná zóna, verejná zóna, intímna zóna, 0 - 30cm, 45 -120cm, 1,5 – 3m, 5 – 8m, *dieťa – rodič, učiteľ – žiak, manžel – manželka, dvaja kamaráti, zákazník – predavačka, lekár – pacient, prednášajúci **–** poslucháči**, moderátor **–** diváci*\n\n**s**ociálna zóna**- 1,5-3m, *zákazník – predavačka**, **lekár – pacient*\n\n**o**sobná zóna**- 45-120cm, *učiteľ – žiak,*\n\n**v**erejná zóna**- 5-8m, *prednášajúci **–** poslucháči**, moderátor – diváci*\n\n**i**ntímna zóna**- 0-30cm; *dieťa – rodič**, **manžel – manželka**, dvaja kamaráti*\n\n**Charakterizujte verbálnu a neverbálnu komunikáciu **hlavnej postavy v ukážke Lakomec.\n\n**Verbálna komunikácia:** používa množstvo otázok, zvolacie vety, dáva pomocou nej najavo, ako veľmi mu záleží na peniazoch (prehovára k peniazom)\n\n**Neverbálna komunikácia:** dotyky (chytá sám seba za ruku), intonácia jeho výpovede (najmä sila hlasu)\n\nÚloha č. 2\n\n**Vysvetlite podstatu **komédie (veselohry**). Poukážte na situačný ** a slovný **humo**r, hyperbolu** a charakterový typ postavy v uvedených dielach a ukážkach. Komédia:**\n\n- zobrazuje sa v nej smiešnosť, komickosť a nezmyselnosť niektorých stránok ľudského života\n\n- **humor** je zacielený najmä na negatívne rysy ľudských charakterov, prípadne na záporné javy spoločenského života; je významným prostriedkom boja proti zlu\n\n- druh komédie, v ktorej prevláda situačná komika a zveličovanie sa nazýva **fraška Situačný humor: - **je v diele **„Ján **Palárik**: Zmierenie alebo dobrodružstvo pri **obžinkoch**“** založený na zámene postáv (grófka Ežika *–** *jej slúžka Miluša Oriešková; barón Kostrovický *–** *inžinier Rohoň)\n\n**Hyperbola:**\n\n- v diele **„**J**. B. P. **Moliére**: Lakomec“ v prehovore Harpagona („umieram, som mŕtvy, som pochovaný,...“)\n\n**Charakterový typ postavy:**\n\n- v diele **„J.B.P. **Moliére**: Lakomec“ autor zvýrazňuje jednu typický vlastnosť (zvyčajne negatívnu)- Harpagonovo lakomstvo\n\n**Ján **Palárik**: Zmierenie alebo Dobrodružstvo pri **obžinkoch Téma: život na zámku slobodomyseľnej grófky Elízy Hrabovskej, spolunažívanie Slovanov s Maďarmi\n\n**Idea:** zmierenie slovenského a maďarského národa\n\n**Literárny druh: **dráma\n\n**Literárny žáner: **komédia\n\n**Postavy:**\n\nElíza Hrabovská- krásna mladá grófka, predstavuje liberálnu vrstvu uhorskej spoločnosti\n\nMiluša Oriešková- predstavuje ideálnu slovenskú devu, dostatočne vzdelaná a rozhľadená\n\nĽudovít Kostrovický- mladý barón, predstavuje ľahkomyseľnú konzervatívnu šľachtu\n\nRohon- zememeračský inžinier, starý priateľ mladého baróna\n\n**J.B.P. **Moliére**: Lakomec Téma: **život lakomého úžerníka, ktorý žije v neustálom strachu o svoje peniaze\n\n**Miesto: **Paríž\n\n**Čas:** obdobie renesancie\n\n**Idea: poukazuje na jednu zo zlých ľudských vlastností (lakomstvo, pokrytectvo)\n\n**Literárny druh: dráma\n\n**Literárny žáner: komédia\n\n**Postavy:**\n\nHarpagon- hlavný hrdina, stelesňuje negatívne vlastnosti človeka\n\nKleant- Harpagonov syn, miluje Mariannu\n\nElíza- Harpagonova dcéra\n\nValér- Elizin milý, Anzelmov syn\n\nMarianna- Kleantova milá, chce si ju však vziať Harpagon\n\nAnzelm- Valérov a Mariannin otec\n\nJakub- Harpagonov kuchár a kočiš\n\nŠidlo- Kleantov sluha\n\nPani Klaudia- Harpagonova slúžka","number":11,"assignment":"**Zadanie č. 11**\n\nÚloha č. 1\n\n**Porovnajte verbálnu a neverbálnu komunikáciu**. Vysvetlite druhy **neverbálnej komunikácie*.** Aký význam majú vo všeobe**cnosti gestá **spolužiak**a, učiteľa, policajta**. Priraďte k uvedeným zónam vzdialenosť a dvojicu **komunikantov**: sociálna zóna, osobná zóna, verejná zóna, intímna zóna, 0 - 30cm, 45 -120cm, 1,5 – 3m, 5 – 8m, *dieťa – rodič, učiteľ – žiak, manžel – manželka, dvaja kamaráti, zákazník – predavačka, lekár – pacient, prednášajúci **–** poslucháči**, moderátor - diváci*\n\n**Charakterizujte verbálnu a neverbálnu komunikáciu **hlavnej postavy v ukážke Lakomec.\n\nÚloha č. 2\n\n**Vysvetlite podstatu **komédie (veselohry**). Poukážte na situačný ** a slovný **humo**r, hyperbolu** a charakterový typ postavy v uvedených dielach a ukážkach. **\n\nUkážky: *Ján **Palárik**: Zmierenie alebo D**obrodružstvo pri **obžinkoch*\n\n* ** J. B. P. **Moliére**: Lakomec*\n\nVALÉR: Ach, pán Harpagon, také nadávky som si nezaslúžil. Je pravda, že som sa proti vám prehrešil, ale azda sa dá moje previnenie ospravedlniť.\n\nHARPAGON: Čo, ospravedlniť? Takú zákernosť? Taký ohavný zločin?\n\nVALÉR: Prosím vás, len sa nehnevajte. Keď ma vypočujete, uvidíte, že nešťastie nie je také veľké, ako ho maľujete.\n\nHAPRAGON: Že nešťastie nie také veľké, ako ho maľujem? Ech, ty naničhodník, veď je to moja krv, môj život!\n\nVALÉR: Vaša krv, pán Harpagon, sa nedostala do zlých rúk. Som z takej rodiny, že jej hanbu neurobím, a konečne nestalo sa nič také, čo by som nemohol napraviť.\n\nHARPAGON: Veď práve to chcem. Tak mi rúče vráť, o čo si ma obral.\n\n..................................................................................................................................................\n\nZLODEJ! Zlodej! Vrah! Mordár! Spravodlivosť, ó, spravodlivé nebesá! Som stratený. Som zavraždený. Krk mi podrezali. Ukradli mi moje peniaze. Kto to mohol byť? Kde sa podel? Kde je? Kde sa skrýva? Čo robiť, aby som ho našiel? Kde utekať? Kde neutekať? Nie je tamto? Nie je tuná? Kto si? Stoj! (Chytí sa sám za ruku.) Vráť mi moje peniaze, oplan!... Ach, veď som to ja. Už sa mi z toho rozum múti. Už ani neviem, kto som, kde som, čo robím. Jaj, jaj, moje úbohé peniaze! Moji drahí priatelia! Ozbíjali ma o vás. A keď mi vás vzali, stratil som svoju oporu, svoju útechu, svoje potešenie. Všetkému je koniec. Už nemám čo hľadať na svete. Bez vás mi žiť nemožno! Už mi je amen, nevládzem ďalej, to je môj koniec, moja smrť, môj hrob! Nieto tu nikoho, čo by ma vzkriesil, čo by mi vrátil moje drahé peniaze, alebo mi aspoň prezradil, kto ich vzal? Ha, čo vravíte? Nikto nič! Nech to už ktokoľvek urobil, musel paromovsky striehnuť na vhodný čas. Vybral si práve chvíľku, keď som hovoril so svojím nezdarným synom. Preč odtiaľto! Idem po policajtov a dám na škripec natiahnuť všetkých, čo sú v dome, slúžky, sluhov, syna, dcéru a naostatok aj seba.\n\n**Ján **Palárik**: Zmierenie alebo** Dobrodružstvo pri **obžinkoch (úryvok)**\n\nMILUŠA:\n\nAký vlastenectva krásy pochop máte,\n\nto mi už váš husár Pišta vyrozprával.\n\nVy ste za šesť rokov v Pešti sa zabával,\n\ntrocha steny školské od prachu ošúchal,\n\nniečo z vied a krásnych umení oňuchal,\n\na včul maďarčinou celkom napáchnutý,\n\npýchou vzdelanosti domnele] nadutý\n\ndo svojeho domu naspät prichádzate,\n\nhanbiac sa za vlastný, z nehož pochádzate,\n\nnárod; vaši vlastní úbohí krajani\n\nsú hazafickému oku vášmu ani\n\nlen za sluhov, slúžky, kočišov nesúci;\n\n**...**\n\nÓ, mne sa ver´ také vlastenectvo hnusí,\n\nktoré má v škaredom odrodilstva hriechu\n\nsvoj koreň; kto vlastný národ zanedbáva,\n\njeho jazyk haní, ľudom pohrdáva\n\na k jeho osvete ani len stebolka\n\nnepriloží, lež len svojim časným volká\n\nvýhodám - trebárs vždy na jazyku nosí\n\nkrásne slová lásky k vlasti a otčine -\n\nÓ, darmo sa sebec tým menom honosí:\n\nKto nie priateľ ľudu, ten nie je vlastenec,\n\nlež márny šarlatán alebo streštenec,\n\nktorý len nesvornosť rozsieva v krajine!\n\n**...**.......................................**\n\nĽUDOVÍT (stranou Rohoňovi) : Aká to rozpustilá dievka!\n\nROHOŇ (stranou k nemu) : Nuž, nedostatok výchovy, barátom.\n\nGRÓFKA: Nuž, či som nie dobre vymaľovaná:\n\nĽUDOVÍT (stranou k Rohoňovi): Krásna, krásna! (ku grófke nahlas) Ó, výborne si vymaľovaná, no veru sto ráz krajší je živý model nežli to ,,portrait“.\n\nGRÓFKA: To portrét? Neviem, čo chcete povedať, ale ten obraz nikto nesmie ,,potreť“.\n\nLUDOVÍT (stranou k Rohoňovi): Ha, ha, škoda, že je taká hlúpa! (k nej) No, no, krásna Slovenka, veď ho nikto nechce potrieť, iba toto tvoje červené líčko. (Chce ju poláskať.)\n\nGRÓFKA: (Odsotí mu ruku.) Prečo do mňa! Na päť krokov! Vidíte ten kosák!","supplementary":[{"question":"Porovnajte verbálnu a neverbálnu komunikáciu","answer":"**Verbálna komunikácia** = komunikácia **slovami** (hovorenou alebo písanou rečou).\n\n**Neverbálna komunikácia** = komunikácia **bez slov**, „rečou tela\".\n\n**Porovnanie:**\n\n| Znak | Verbálna | Neverbálna |\n|------|----------|------------|\n| Prostriedok | slová, jazyk | gestá, mimika, postoj |\n| Kontrola | vedomá | často nevedomá |\n| Informačná hustota | presná, konkrétna | doplnková, emocionálna |\n| Učenie | naučená (jazyk) | čiastočne vrodená |\n| Klamanie | ľahšie zaklamať | ťažšie zaklamať |\n| Univerzálnosť | jazykovo viazaná | čiastočne univerzálna |\n\n**Prostriedky neverbálnej komunikácie:**\n\n- **Mimika** - výraz tváre (úsmev, mračenie, prekvapenie)\n- **Gestá (gestikulácia)** - pohyby rúk, hlavy\n- **Postoj tela (posturika)** - sed, postoj, sklon\n- **Pohyb (kinezika)** - chôdza, pohyby\n- **Vzdialenosť (proxemika)** - intímna (do 45 cm), osobná (do 1,2 m), spoločenská (do 3,5 m), verejná (nad 3,5 m)\n- **Dotyk (haptika)** - podanie ruky, objatie\n- **Pohľad očí** - dĺžka, smer, intenzita\n- **Tón a intenzita hlasu (paralingvistika)** - rýchlosť, melódia, hlasitosť\n- **Mlčanie** - významová pauza\n- **Úprava zovňajška** - oblečenie, účes\n\n**Vzájomný vzťah:**\n- Verbálnu komunikáciu **dopĺňa**, **zvýrazňuje** alebo **popiera** neverbálna.\n- Ak sú v rozpore, ľudia veria viac neverbálnym signálom.\n- **Typická pomerová štúdia (Mehrabian):** pri vyjadrovaní emócií verbálne 7%, hlas 38%, mimika a gestá 55%."},{"question":"Vysvetlite podstatu komédie (veselohry)","answer":"**Komédia (veselohra)** je dramatický žáner, ktorý zobrazuje **veselé, humorné situácie** s cieľom **rozosmiať diváka** a zároveň **kritizovať** nedostatky spoločnosti, ľudské slabosti, charakterové chyby.\n\n**Hlavné znaky komédie:**\n\n- **Šťastný koniec** (rozuzlenie v prospech hlavnej postavy)\n- **Veselé, smiešne situácie** - vyplývajú z konfliktu, nedorozumenia, charakterových chýb\n- **Komické postavy** - typizované, často karikované\n- **Spoločenská kritika** - cez smiech sa odhaľujú spoločenské problémy\n- **Bežné, „nízke\" témy** - na rozdiel od tragédie (hrdinská, vznešená)\n- **Hovorový jazyk**, slovné hračky, irónia, satira\n\n**Druhy komédie:**\n\n- **Situačná komédia** - humor vyplýva zo situácií (zámen, nedorozumení)\n- **Charakterová komédia** - humor vyplýva z povahových chýb postáv (skúpec, pokrytec)\n- **Konverzačná komédia** - humor v rozhovoroch, slovných hračkách\n- **Fraška** - lacný humor, hrubé komické prostriedky\n- **Satirická komédia** - ostrá kritika spoločnosti\n\n**Funkcie komédie:**\n- **Zábavná** - rozosmiať diváka\n- **Kritická** - odhaľovať chyby\n- **Mravoučná** - „smiechom napraviť svet\" (castigat ridendo mores)\n- **Spoločenská** - odzrkadľuje dobu, mravy\n\n**Slávne komédie a autori:**\n- **Antika:** Aristofanes (Mier, Žaby)\n- **Renesancia:** Shakespeare (Sen noci svätojánskej, Skrotenie zlej ženy)\n- **Klasicizmus:** Molière (Lakomec, Mizantrop, Tartuffe)\n- **Slovenská:** Ján Palárik (Zmierenie alebo Dobrodružstvo pri obžinkoch, Drotár, Inkognito)"}]},"12":{"tema_jazyk":"Vývin slovenského spisovného jazyka (Bernolák, Štúr)","tema_lit":"Spoločenský, sociálny a psychologický román","autori":["Anton Bernolák","Ľudovít Štúr"],"diela":["Grammatica slavica","Nauka reči slovenskej"],"okruh_jazyk":"Vývin jazyka","okruh_lit":"Typy románu","full":"Úloha č. 1\n\n**Vysvetlite **vývin slovenského spisovného jazyka** od najstarších čias po súčasnosť a doložte konkrétnymi literárno-jazykovednými dielami. **\n\n- **praslovančina- **spoločný jazyk predkov všetkých Slovanov **(do 8. storočia)**, nemáme žiadne písomné pamiatky\n\n- **stará slovenčina- **základ budúcich slovenských nárečí, spisovného jazyka **(9. storočie)**\n\n- **staroslovienčina- 863- **Konštantín a Metod priniesli ma maše územie prvý slovanský spisový jazyk (**staroslovienčinu**- je to pôvodom južnoslovanský jazyk, ktorého základom bolo nárečie Macedónskych Slovanov z okolia Solúna); **písmo: hlaholika (za základ si zobrali malé písmená gréckej abecedy), neskôr cyrilika (za základ si zobrali veľké písmená gréckej abecedy), **diela: **preklady evanjelií, Proglas,...\n\n- **latinčina- **začala sa používať po rozpade Veľkej Moravy v 10. storočí (**11.-18. storočie)**\n\n- **čeština-** používala sa predovšetkým v úradnom styku, aj keď úradným jazykom bola latinčina. Na Slovensku sa písalo latinsky a česky, no pri tom sa hovorilo slovenským jazykom.  (15.-19. storočie)**\n\n- **kultúrna slovenčina- **vznikla kultúrna západná slovenčina a kultúrna stredná slovenčina (z nej vychádza Ľ. Štúr pri svojej kodifikácii spisovného jazyka) **(16.-17. storočie) spisovná slovenčina- **do histórie sa zapísali najmä 3 nasledujúce pokusy o kodifikáciu:\n\n- **Bernolákovské obdobie: Jozef Ignác Bajza- **v románe „René mláďenca Príhodi a Skúsenosťi“ uplatňuje tzv. slowackí jazyk (jeho pravopisu a gramatike však chýbala pevnejšia a odôvodnenejšia kodifikácia- nevydal žiadnu gramatickú príručku)\n\n**Anton Bernolák **\n\n- vo svojej koncepcii vychádzal pri kodifikácii spisovného jazyka z jazykovej praxe vzdelancov\n\n- za východisko si vzal kultúrnu západoslovenčinu, a to najmä v podobe, v akej sa formulovala v trnavskom univerzitnom centre\n\n- svoju predstavu spisovného jazyka vyložil vo svojich kodifikačným dielach: Grammatica Slavica (1790); Slowár Slowenskí, Česko-Laťinsko-Ňemecko-Uherskí (1825-1827)\n\n- **niektoré zásady Bernolákovej kodifikácie:**\n\n- odstraňuje sa *y/ý*, ponecháva sa len *i/í*\n\n- mäkkosť *ď, ť, ň, ľ* sa vždy označuje\n\n- veľké písmená sa píšu pri všetkých podstatných menách a pri iných výrazoch, ktoré sa vzťahujú na osoby\n\n- predložky *s* a *z* sa píšu podľa výslovnosti\n\n- zavádza skupinu *šč* (napr. eščše, púščať, a pod.)\n\n- hlásku *v *píše vždy ako *w*\n\n- vylúčil zo slovnej zásoby slová, ktoré pokladal za neslovenské/vulgárne\n\n- odstránil definitívne niektoré tradičné bohemizmy\n\n- fonematický princíp pravopisu\n\n- v spisovnej Bernolákovčine vyšli diela Juraja Fándlyho- Piľní domagší a poľní Hospodár (1792), či preklad Svätého písma\n\n- používal ju aj Ján Hollý, predstaviteľ mladšej generácie Bernolákovcov\n\n- nikdy však nebola prijatá ako celonárodný slovenský jazyk\n\n- **Štúrovské obdobie:**\n\n- ako základ pre spisovný slovenský jazyk si Ľ. Štúr vybral stredoslovenský nárečový základ (pri výbere strednej slovenčiny bral do úvahy, že stredoslovenské nárečia sú najrozšírenejšie a najpoužívanejšie zo všetkých nárečí, prejavujú najväčšiu životaschopnosť, šíria sa aj medzi príslušníkov iných nárečí)\n\n- v roku 1843 sa Štúr, Hurban a Hodža na fare v Hlbokom dohodli na podobe spisovnej slovenčiny, na základe ktorej bol kodifikovaný spisovný jazyk\n\n- spisovnú slovenčinu kodifikoval vo svojom diele **„Náuka reči slovenskej“ **(1846)- nešlo o praktickú gramatiku, ale vedecký opis gramatickej stavby slovenčiny, ďalej dielo **„**Nárečja** slovenskou alebo potreba **písaňja** v tomto nárečí“**\n\n- **niektoré zásady Štúrovej kodifikácie:**\n\n- diakritický pravopis\n\n- používalo sa len mäkké *i*\n\n- hlásky *ľ, ä, ô, y * sa nepoužívali\n\n- fonematický princíp pravopisu\n\n- nepoužíva sa *e*, namiesto toho sa používa *je*\n\n- dvojhlásky *ia**, **ie**, **iu** * sa píšu ako *ja, je, ju*\n\n- **1851- **reforma M. M. Hodžu a Martina Hattalu- dielo **„Krátka **mluvnica** slovenská“- **ustúpilo sa od fonematického pravopisu, zavedenie *y/ý**, *rozlišovanie *de, **te**, **ne**, **le**, di ti, **ni**, li, *zavedenie dvojhlásky *ä, *minulý čas sa končí *l-**kovými* tvarmi (písal, čítal, chodil, a pod.)\n\n**20. storočie:**\n\n- **1902- **Samo Czambel vydal dielo **„Rukoväť spisovnej reči slovenskej“**- stala sa všeobecne prijímanou a uznávanou kodifikačnou príručkou slovenského jazyka a pravopisu na prvé 3 desaťročia 20. storočia. Prostredníctvom Czambelovej kodifikácie sa stal martinský úzus normou spisovnej slovenčiny.\n\n- **Jozef Škultéty-** pripravil a sám urobil úpravy v diele **„Rukoväť spisovnej reči slovenskej“- **ovplyvnil dnešnú podobu spisovnej slovenčiny\n\n- **1931- Pravidlá slovenského pravopisu **(zavedené české slová do slovenskej slovnej zásoby) [puristi- Slováci, ktorí očistili slovenčinu od českých prvkov]\n\n- **1945-1989- **zjednotili sa pravidlá o spodobovaní, odstránilo sa dvojaké písanie, **„Slovník slovenského jazyka, Morfológia slovenského jazyka, Pravidlá slovenskej výslovnosti“,** slovenčina a čeština rovnocennými jazykmi\n\n- **súčasnosť: **Pravidlá slovenského pravopisu (1991), pravidlá slovenského pravopisu (2000), Krátky slovník slovenského jazyka (2003), Slovník súčasného slovenského jazyka (2006)\n\n**Na základe ukážok porovnajte **kodifikáciu A. Bernoláka a Ľ. Štúra.* Anton Bernolák**\n\n- odstraňuje sa *y/ý*, ponecháva sa len *i/í*\n\n- mäkkosť *ď, ť, ň, ľ* sa vždy označuje\n\n- veľké písmená sa píšu pri všetkých podstatných menách a pri iných výrazoch, ktoré sa vzťahujú na osoby\n\n- predložky *s* a *z* sa píšu podľa výslovnosti\n\n- zavádza skupinu *šč* (napr. eščše, púščať, a pod.)\n\n- hlásku *v *píše vždy ako *w*\n\n- vylúčil zo slovnej zásoby slová, ktoré pokladal za neslovenské/vulgárne\n\n- odstránil definitívne niektoré tradičné bohemizmy\n\n- fonematický princíp pravopisu\n\n**Ľudovít Štúr**\n\n- diakritický pravopis\n\n- používalo sa len mäkké *i*\n\n- hlásky *ľ, ä, ô, y * sa nepoužívali\n\n- fonematický princíp pravopisu\n\n- nepoužíva sa *e*, namiesto toho sa používa *je*\n\n- dvojhlásky *ia**, **ie**, **iu** * sa píšu ako *ja, je, ju*\n\nÚloha č. 2\n\n**Vysvetlite znaky **spoločenského, sociálneho a psychologického románu**. Zaraďte autorov a uvedené diela. Charakterizujte hlavné postavy a rozdielne umelecké prístupy autorov v uvedených ukážkach. Spoločenský román:**\n\n- zaoberá sa celou spoločnosťou (od najnižších vrstiev až po najvyššie)\n\n- zobrazuje vzťahy medzi jednotlivými vrstvami\n\n- často poukazuje na „prehnitosť“ doby a spoločnosti\n\n**Sociálny román:**\n\n- zobrazuje spoločnosť, konanie a myslenie postáv v závislosti od sociálnych skupín\n\n- autor sa najčastejšie zameriava na najnižšie vrstvy spoločnosti, ich živorenie a problémy s prežívaním\n\n**Psychologický román:**\n\n- zaoberá sa vnútrom, zmýšľaním a osobným svetom (zväčša jednej) postavy, ponára sa do jej duše\n\n- zobrazuje jej konanie a myslenie nielen vo zvyčajných životných situáciách, ale aj v krízových okamihoch\n\n**Martin Kukučín: Dom v stráni**\n\n- spoloč
